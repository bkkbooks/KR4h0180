body:
  text: 沈約湘州枳園寺剎下石記佛教東流適末尤著始自洛京盛於江左晉故車騎將軍琅琊王邵玄悟獨曉信解淵微於太祖文獻公清廟之北造枳園精舍其始則芳枳樹籬故名因事立雖房殿嚴整而瓊剎未樹邵玄孫尚書僕射南徐州大中正奐深達法相洞了宗極勤誠外著仁隱內弘食不過中者一十一載雖翼務朝端而事鄰奈圃日者作翰湘州樹麾蠡服位與年升秩隨歲厚顧惟隆主盼寵結皇情任處東方寄深外屏徒欲盡能竭慮知無不為下被民和上宣聖澤而自以力弱途遠終慚短效且義止今生報褰來果非所以酬鴻貺於冥津暢丹誠於遐劫自乘傳衡皋辭簪派渚誓於舊寺光樹五層捐割藩俸十遺其一凡厥所收三十有六萬齊之永明六年六月三日蓋木運將啓之令辰上帝步天之嘉日乃抗崇表於蒼雲植重扃於玄壤仰願宸居納祜福履攸歸八神擎室萬祇翼體寶祚隆邈比固須彌靈算遐永齊軌常住諸聖延祥挹天和於少極藩王碩茂播宗英於梁楚群后流克讓之風庶民垂可封之德含生愷樂物不夭性嘉穀年登餘糧棲畝夷荒內附邊城解析家備十善人懷六度魔衆稽顙外道屈膝抽薪止火折劍摧鋒拯幽酸於無擇陟神化於有頂三界五道咸同斯願刊石重壤式昭厥心廣弘明集十六竟陵王造釋迦像記夫理貴空寂雖鎔範不能傳業動因應非形相無以感是故日華月彩照曜天外方區散景咫尺塵方太祖皇帝濯襟慧水凝神淨域厭世珍陛遷靈寶地竟陵王諱泣明臺之不臨慟高山之方遠慕迸王鑾情殷雙樹永惟可以炳發神功崇高妙業莫若式金寫好資巧傳儀以皇齊之四年日子敬制釋迦像一軀尊麗自天工非世造色符留影妙越檀香俾穀林之思永旌於萬劫用刊徽迹式垂不朽云爾廣弘明集十六武帝集序文思安安欽明所以光宅日月光華南風所以興詠日角之主出自諸生鋭頂之君少明古學漢高宋武雖闕章句歌大風以還沛好清談於暮年夫成天地之大功膺樂推之寶運未或不文武兼資能事斯畢者也我皇誕縱自天生知在御清明內發疏通外典爰始貴遊篤志經術究淹中之雅旨盡曲臺之奧義莫不因流極源披條振藻若前疑往滯舊學罕通而超然直詣妙拔終古善發談端精於持論置壘難踰摧鋒莫擬有同成誦無假含毫興絶節於高唱振清辭於蘭畹至於春風秋月送別望歸皇王高宴心期促賞莫不超挺睿興濬發神衷及登庸歷試辭翰繁蔚箋記風動表議雲飛雕蟲小藝無纍大道懷君人之大德有事君之小心為下奉上形於辭旨雖密奏忠規遺稿必削而國謨藩政存者猶多逮乎俯應歸運仰修乾録載筆握簡各有司存如綸之旨時或染翰暨於設虡靈囿愷樂在鎬鹿鳴四牡皇華棠棣之歌伐木采薇出車杕杜之宴皆詠志摛藻廣命群臣上與日月爭光下與鍾石比韻事同觀海義等窺天觀之而不測遊之而不知者矣竊惟左史記言右史記事君舉必書無論大小況乎感而後思思而後積積而後滿滿而後言若斯而已哉謹因事立名隨源編次藝文類聚十四棊品序奕之時義大矣哉體希微之趣含奇正之情靜則合道動必適變若夫入神造極之靈經武緯文之德故可與和樂等妙上藝齊工支公以為手談王生謂之坐隱是以漢魏名賢高品間出晉宋盛士逸思爭流雖復理生於數研求之所不能涉義出乎幾爻象未之或盡聖上聽朝之餘因日之暇回景紆情降臨小道以為凝神之性難限入玄之致不窮今撰録名氏隨品詳書俾粹理深情永垂芳於來葉藝文類聚七十四內典序尚矣哉群生之始也義隱三藏之外事非二乘所窺自竝識同奔隨緣受業人天異軌翾動殊貫苦樂翻回愚智相襲莫不宅火輪騖擬焰飆遷以寸陰之短晷馳永劫之延路精靈起伏萬緒千名如來發源恆品蓋亦含生之一至於竝首爭馳斯固未或異也至於覆簣無始之初成功斷籌之末塗遙業遠妙軫遐長纍明積慧靈覺獨曉巨相四八照曜於大千尊法二九包籠乎無外六度之業既深十力之功自遠濟物以權降魔匪力妙法輪轉甘露啓霏舟輿六趣津梁五道登四衢之長陌遊一乘之廣路斯既已事盈方等義滿神宣逮於大權協化對揚宗極徇物兆於慈悲亡身著乎非已行符四等道升十地若乃靈性特達得自懷抱神功妙力無待學成孤策獨騖莫知所限結習紛綸一隨理悟又有捐情屏慮身心靡欲厭生死之長勤眷寂滅而投軫遙然自得漏纍煙銷且津心適道功非一業雖會理共源而萌情或異是故高心邈行分路同趨忘懷屏欲殊塗一致或草礫身體投骸林澤內忘形相外馴兕虎或坐臥行立迹不違衆禪業定門造次無爽安忍與金石同固戒行與寶珠等色雖秋禽年至春鮪時登而耿介長蔬忡怛在念妙迹匪遐神塗密邇有悟必通由之斯至故能藉智探虛乘心照理區區懷抱融然靡執俱處三界獨與神遊包括四天卷舒萬劫聞片議而陟道場受一言而升彼岸長夜未開心關自曉淹回聖迹寢息神光既負橐以從師亦棲林以綜業足蹈慧門學通龍藏妙吼遐徹鸞音自遠若夫叉跪運心期誠匪迹而導達神功照啓未悟唱說之美義兼在斯暨九土殊風八方舛俗遊化所包事出弘獎皆足以遷光淨域登儀寶地竝黜華翦飾破愛辭親鼓枻無生之流方軌俗表之路固已千佛摩頂七住齊功至夫清信士女植緣曠劫雖復容服未改而戒德內弘瞻毗邪而聳轡望波斯而回軫駕四禪之眇眇泛八解之悠悠若乃十號尊崇三達靡礙雖法身非有而常住在躬能仁權迹四門既非悟道之始假滅雙樹寧有薪盡之窮而天人瞻慕髣佛興情雕金範玉圖容寫狀靈儀炫日寶剎臨雲或役鬼神之功或資髓腦之力製非人匠寶以合成莫不龍章八彩瓊華九色至乃齒髮傳靈衣履遺證聖迹彪炳日煥於閻浮神光陸離星繁於淨剎若乃乘此直心推誠暗往則半息可追一念斯至感降參差雲霏霧委此又昭被象譯輝映縑圖夫秉牘書事其流已遠蓋所以彪著往迹煥述遐聲雖篆籀異文胡華舛則至於叶暢心靈抑揚訓義固亦內外同規人神一揆墳典丘索域中之史策本起下生方外之紀傳統而為言未始或異也而經記繁廣條流舛散一事始末袠異卷分或詞義離斷或文字互出甫涉後條已昧前覽尋源討流未知攸適雖精理瑩心止乎句偈而初悟始學致惑者多且中外群聖咸載訓典雖教有殊門而理無異趣故真俗兩書遞相扶獎孔發其端釋窮其致撤網去綱仁惠斯在變民遷俗宜以漸至精粗抑引各有由然是故曲辨情靈棲心妙典伏膺空有之說博綜兼忘之書該括群流集成茲典事以例分義隨理合功約悟廣莫尚於斯可以理求證成妙果若乃載司南之車猶稱靡惑服四照之草得用不迷況乎六馬同鑣萬流共貫日月經天方斯未已河海帶地夫豈足云蓋人道之筌蹄群生有悟於此也廣弘明集十九藝文類聚七十七佛記序含靈萬品既非記牒所窮物物稟生豈伊積塵能計莫不起乎無理而至乎無生者也雖要終有地而原始莫聞自非靈照特達宗極斯在則理閉機初鑽叩事絶非唯四果不議固亦十地罔窺邈乎悠敻有之而莫知所從者也如來覆簣爰始言登永路起滅回還馳驟不息去來五道大千比之毫端往復三界祗劫未足稱遠積明纍照念念不休離此生滅證成妙果固已空有兼謝豈徒齊遷魯變而已哉昊昊區區猶秉何言之稱至人無己寧以詞義為珍蓋由萬惑相扇昧明代起業假緣開事須曉達一音所吐無思不服義在徇物動非為己法吼震灑於無外甘露炳煥於龍宮開宗闡教致之有漸標四諦於鹿園辨百非於雙樹廓不二之法門廣一乘之長陌行迷復路弱喪知歸而因應回舛厥塗不一白毫所照遍剎土於恆沙七步降踐壅龍堆而攸被推極神道原本心靈感之所召跨無邊而咫尺緣之所乖面法城而不覩及像教云末經紀東流熱坂艱長寒山峻阻橫書左字纍萬方通翦葉成文重譯未曉自此迄今千祀過半靈迹稍啓名僧間出律藏方等行來漸至蘊乎西國未至者多雖法身常住之奧遠二諦三假之淵曠悟道求宗於斯可足而能仁體茲大聖實為本師悠悠群品精靈所係迄於前因往業多所昧略然神化應感參差互見又世胄名氏本國俗緣散析衆部卒難討究神功妙力同出異名降胎求道寧止一相託生迦維本由權迹出自北門非悟法之始遍照東方豈通化之極適道已來四十九載妙應事多宜加總緝共成區畛至於經像舊録境剎遺記開勸之功於斯自遠大權弘曠亡身以濟物應真耿介標心非為己分蹤或異適末必同神塗詭互難以臆辨靈怪倜儻言語斯絶圖澄之龍見趙魏羅什之鳳集關輔犍陀近遊京洛單開遠適羅浮雖迹與俗同而意無可察塗出玉門法座不遠七處九會峨然在目靈應肸蠁遍富延澤以西光景葳蕤多見天山之表有志奇僧每經遊歷神迹昭然咸有文注繁蕪舛雜實須裁整分五道於人天設重牢於厚地各隨業力的焉不差此皆卷舒真俗終始名相其玄塗幽遠大則直至道場其徵證切近小則開勸晚學斯實兼濟之方舟大悲之廣路雖復智昏視肉形窮尺棰緣動必應又況進於此者乎是以至聖殷勤每存汲引垂文見意貽厥將來皇帝行成無始道承曠劫十號在躬三達靡礙屈茲妙有同此轉輪傷昏愍惑久迷正路悱發之徒空懷鑽仰條流緬曠事難總一志淺業勞迄用無就非可以闢彼四衢出之火宅者也乃詔中書侍郎虞闡太子洗馬劉溉後軍記室周捨博尋經藏搜採注說條別流分各以類附日少功多可用譬此名曰佛記凡三十篇其有感應之流事類相似止取其一餘悉不書或後死而更生陳說經見事涉杳冥取驗無所亦皆靡載同之闕疑或憑人以言託想成夢尤難信曉一無所録若夫欲遐適者必遠記所從欲悟道者必妙識所宗然後能允得其門親承音旨未有不知厥路莫辨伊人膠目暗踐自與理合所以引彼衆流歸之一源可令莘莘含識望塗知往案砥矢而言歸不回遑於岐路俾厥清信之士亦有取於此云廣弘明集十五佛知不異衆生知義佛者覺也覺者知也凡夫之與佛地立善知惡未始不同也但佛地所知者得善之正路凡夫所知者失善之邪路凡夫得正路之知與佛之知不異也正謂以所善非善故失正路耳故知凡夫之知與佛之知不異由於所知之事異知不異也凡夫之所知不謂所知非善在於求善而至於不善若積此求善之心會得歸善之路或得路則至於佛也此衆生之為佛性實在其知性常傳也廣弘明集二十二六道相續作佛義一切種智與五道六趣衆生其有受知之分無分異也問曰受知非知邪答曰非也問此以何為體答曰相續不滅是也相續不滅所以能受知若今生陶練之功漸積則來果所識之理轉精轉精之知來應以至於佛而不斷不絶也若今生無明則來果所識轉暗轉暗之知亦來應以至於六趣也受知之具隨緣受知知之美惡不關此受知之具也問曰知非知既聞命矣受知受知自是相續不滅知自然因緣中來與此受知之具從理而相關答曰有此相續不滅自然因果中來有因有果何得無美無惡乎廣弘明集二十二因緣義凡含靈之性莫不樂生求生之路參差不一一爾流遷塗徑各異一念之間衆緣互起一因一果內有差忒好生之性萬品斯同自然所稟非由緣立固知樂生非因緣因緣非樂生也雖然復俱宅形骸而各是一物一念既召衆緣衆緣各隨念起善惡二念誠有不同俱資外助事由一揆譬諸非水非土穀芽不生因緣性識其本既異因果不惑雖則必然善惡獨起亦有受礙雖云獨起起便成因內因外緣實由乎此也廣弘明集二十二齊丹徒故宮頌聖祖神傑堯蹤漢烈嶽峻雄圖天張武節墜命既升霸略將騁清渭走烽濁河獻警恃峭劍關憑深桂嶺彝章委闕禮樂沈河拯壓傾構引溺危波盡物稱瑞窮靈委和玄精翼日丹羽巢阿藝文類聚六十二初學記二十四雪贊火競乃上炎陰矯亦下潤獨有凝雨姿貞晼而無殉排雲寧自高晞光本非吝委谷不辭深因巖豈知峻潔貌雖同賞英心共誰振藝文類聚二高士贊有序余之所謂高士者悠悠皆是請試言之聖人蒞天下則賢人贊務禼益皋陶是也自中智以下莫有不學以從政佐國安民者也易曰聖人之大寶曰位非學則不得也學所以行其志孝悌慈仁信義是也雖誦先王之典謨而不行其志聖人之大寶亦不可得也要須學行兼有然後取之悠悠之徒莫不攘袂而議進取怒目而爭權利悅愚諂暗苟得忘廉若斯人者豈入國士之塗動衣冠之眄藉此而登高位未或有也贊曰亦有哲人獨執高志避世避言不友不事恥從汙祿靡惑守餌心安藜藿口絶炮胾取足落毛寧懷組織如金在沙顯然自異猶玉在泥涅而不緇身標遠迹名重前記有美高尚處知若無劣哉群品事靜心驅苟能立志爭此匹夫進忘隕穫退守恬愈曰仁與義其徑不迂為之則至非物所拘宦成名立陟彼高衢藝文類聚三十六又銷聲贊寂矣棲魂非海非樊若人焉往斯理空存天標已曖絶羽孤騫堯逢豈讓札值奚言藝文類聚三十六千佛讚道有偕適理無二歸寂照同是形相俱非千覺符應遞扣冥機七尊緬矣感謝先違既過已滅未來無象一剎靡停三念齊想不常不住非今非曩賢劫雖遼倏焉如響棲林籍樹背室違家前佛後佛跡罔隆窊或遊堅固或蔭龍華能達斯道可類恆沙萃萃群聖均此妙極先後參差各隨願力密迹弘道數終乃陟誓覩來運永傳令識初學記二十三廣弘明集十六繡像贊並序維齊永明四年歲次丙寅秋八月己未朔二日庚申第三皇孫所生陳夫人含微宅理炳慧臨空結言寶位騰心淨覺敬因樂林寺主比丘尼釋寶願造繡無量壽尊像一軀乃為讚曰表相異儀傳形匪一鏤玉圖光雕金寫質亦有淑人含芳上律絢發綺情幽摛寶術縟文內炳靈姿外溢水耀金沙樹羅瓊實現符淨果來膺妙秩育藻震閨騰華梵室有億斯年於萬茲日廣弘明集十六彌勒贊乘教本一法門不二業基纍明功由積地眇眇長津遙遙遐轡道有常尊神無恆器脫屣王家來承寶位慧日晨開香雨宵墜藉感必從憑緣斯至曰我聖儲儀天作二尚想龍柯瞻言思媚鐫石圖徽雕金寫祕望極齊工舉光等邃超矣福臻融然理備敬勒玄蹤式傳遐懿廣弘明集十六連珠臣聞烈風雖震不斷蔓草之根巧壤誠微遂霣崇山之峭是以一夫不加威於赫怒千乘必致亡於巧笑臣聞鳴籟受響非有志於要風涓流長邁寧厝心於歸海是以萬竅怒號不叩而咸應百川是納用卑而為宰藝文類聚五十七文苑英華七百七十一瑞石像銘並序夫靈應微遠無迹可追心路照通有感斯順我皇體神御極挹睿臨乾幽顯成袠無思不服若夫二儀叶德五精翼化下洞淵泉上達蒼昊天無息瑞地不湮祥十住髣佛於林衡應真肸蠁於清夜素毫月舉騰光於梵室妙趾神行布武於椒殿至於事符緗牒既表禎圖無不雲霏霧委盈簡被策莫黑三距眇千齡而再現皓露淳腴望鳳蓋而沾陛此皆舜日未書堯年罕降豈直朱烏動色玄秬相趣而已哉嘉玉遠自北戎梁弱水而委質潤徹環奇曠世之所不覩白金近發東山剖幽巖而啓瑞傍被崖巘鴻靈之所未刊雖復素環之絶貺燭銀之瑤寶方斯蔑如也若夫金石具剛非游泳之質自非霈德潛衍感極回靈豈變堅沈之體顯輕浮之相維永明七年某月爰有祥石眇發天津浮海因潮翻流迥至表異淅河獻奇禁圃瓊瑜等潤精金比色帝上眷幽關之易啓咨玄應之無方雖拊事寂寥而因心咫尺愛其貞恆之性嘉其可久之姿莫若圖妙像於檀香寫遺影於祇樹乃詔名工是鐫是琢靈相瑞華煥同神造至於雕削之餘遺刊委斫方圓小大觸水斯沈駐罕停蹕親加臨試良由法身是託不溺沈玉之淵剖析既離方須浮金之水至矣哉禎符若斯之妙也敢銘寶貺永福天人其詞曰遙哉上覺曠矣神功四禪無像三達皆空表靈降世演露開蒙惟聖仁宇寶化潛融道非迹應事以感通沈精浮質遠自河葱悠悠亙水眇眇因風泛彼遼碣瑞我國東有符皇德乃眷宸衷永言鷲室棲誠梵宮載雕載範寫好摛工藉茲妙力祚闡業隆冕旒南面比壽華嵩廣弘明集十六光宅寺剎下銘並序光宅寺蓋上帝之故居行宮之舊兆揚州丹陽郡秣陵縣某鄉某里之地自去茲邠亳來儀京輔拓宇東第咫武城闉聖心留愛間素遷負南郭義等去酆事均徙鎬及剋濟橫流膺斯寶運命帝閽以廣闢即太微而為宇既等漢高流連於豐沛亦同光武眷戀於南陽思所以永流聖迹垂之不朽令事與須彌等固理與天地無窮莫若光建寶塔式傳於後乃以大梁之天監六年歲次星紀月旅黃鍾閏十月二十三日戊寅仲冬之節也乃樹剎玄壤表峻蒼雲下洞淵泉仰迫星漢方當銷巨石於賢劫拯未來於忍土若夫朱光所耀彤雲所臨非止天眷兼因地德皇帝乃啓扉閶闔造舟淮涘接神飆而動驂越浮梁而徑度芝蓋容與翠華葳蕤下輦停蹕躬展誠敬廣集四部揆景同蔬弘此廣因被之無外同由厥路俱至道場乃作銘曰八維悠闊九服荒茫靈聖底止咸表厥祥壽丘靉靉電繞樞光周原膴膴五緯入房自茲遐敻在處弗亡安知若水寧辨窮桑自天攸縱於我惟皇即基昔兆為世舟航重檐纍構迥剎高驤土為淨國地即金床因斯太極溥被翱翔豈徒三界寧止十方濡足萬古援手百王一念斯答萬壽無疆如日之久如天之長廣弘明集十六藝文類聚七十七彌陀佛銘法身無象常住非形理空反應智滅為靈窮寂震響大夜開冥眇哉遐壽非歲非齡物愛雕彩人榮寶飾事儉欲興情充纍息至矣淵聖流仁動惻順彼世心成茲願力於惟淨土既麗且莊琪路異色林沼焜煌靡胎靡娠化自餘方託生在焉紫蒂青房眷言安養興言遐適報路雖長由心咫尺幽誠曷寄刊靈表迹髣佛尊儀圖金寫石瀢沱玉沙乍來乍往玲瓏寶樹因風韻響願遊彼國晨翹暮想七珍非羡三達斯仰廣弘明集十六釋迦文佛像銘積智成朗積因成業能仁奚感將吼妙法駐景上天降生右脅始出四門終超九劫眇求靈性曠追玄軫道雖有門迹無可朕物我兼謝心行同泯一去後心百非寧盡式資理悟悟以言陳言不自布出之者身有來必應如泥在鈞形酬響答且物且人應我以形而余矇瞽守茲大夜焉拔斯苦仰尋靈相法言攸吐不有尊儀薆焉誰覩廣弘明集十六初學記二十三棲禪精舍銘並序此寺征西蔡公所立昔廁番麾預班經創之始今重遊踐覽舊興懷故為此銘以傳芳迹在郢州永徽三年歲次某時某月某朔某日子巖靈旅逸地遠棲禪蘭房葺蕙嶠甍架煙南瞻巫野北望淮天遙哉林澤曠矣江田空心觀寂慧相淳荃眷惟斯踐愴屬遐年游仁廁遠宅賞憑旃頒創神苑陪構靈椽瞻禁拓圃望鷲疏山製石調響棲理凝玄曠移羽旆眇別松泉委組東國化景西蓮巒隰夷改蓬籜徂遷重依漢遠復逐旌懸往辭妙幄今承梵筵八翻海鶴九噪巖蟬珮華長掩懋迹空傳式籍雲拱敢告祥緣廣弘明集十六齊明帝哀策文龍菆既徹備物已陳殯宮無夜夕燎終晨號環輬幄攀標應路容衛弗改軒檻如故望東川而不追仰昊天而自訴列聖同軌諡法樹聲爰詔掌牘式播遺英其辭曰五曜在天遞作民主赫矣帝高蒸哉嗣武多難固業隱憂啓聖時惟我皇功符受命爰始濡足坐運機深鵬逝風舉龍動雲陰之郢南泝即豫西臨體茲大德懷此小心賓于四門四門穆穆納于百揆百揆肅肅德浸堇荼仁被比屋何遠何邇無思不服嗣君喪道不式典謨神器業懷事等瞻烏民懷奧主后來其蘇皇天眷命授以籙圖臨朝凝睟昧旦丕顯斟酌前王擇其令典不言斯應不行斯踐路臺靡營離宮弗宴眷言膠孰弘啓上庠軌儀四代祖述三王德暉內動英華外揚禮行樽俎義及幽荒仰庶天德降年永久北極齊光南山獻壽滄溟奄竭嵩岱皆朽沴非昊穹惟余之咎攀龍詎幾大隧玄玄厭世崇陛即宮下泉殯階已遽素幕高褰端闈洞啓蜃紼徐前背朱闕以南轉乘翠龍而東度經原野之荒涼屬西成之云暮伐金鼓以清道揚悲笳而啓路極厚地而不追終蒼天而永慕蒼梧晦遠慎徽不泯紀事寂寞龜書可循哲王違世克播遺塵猗歟萬古暉光日新藝文類聚十四丞相長沙宣武王墓志銘山嶽鎮地日月麗天鄰幾者庶亞極稱賢峨峨哲人實惟天縱德基內美功成日用亦既東轅實拯朝難迅鋒雷駭霜戈電斷震主必危功高不賞哀動上霄痛銘玄壤聖武爰發後恥申冤大禮空備幽駕莫援藝文類聚四十五齊太尉文憲王公墓志銘德被九官功苞十亂帝圖必舉皇猷偕煥斯謂國楨是惟民幹翱翔禮園優游文館祕義烟涵瓌辭雨散揆路揚輝台庭改觀方翊隆平燮茲天網福履每愆降年多爽微言永謝庶僚誰長鐃吹罷音松風代響藝文類聚四十六初學記十一齊太尉徐公墓志銘公美風儀善言笑愛重琴棊流連情賞拓宇東郊曖然間素榮貴之來無概懷抱任居端揆萬務同歸簿領盈前囂塵滿席直舉枉錯虛來實反天道不仁與善褰應藝文類聚四十六司徒謝朏墓志銘嶽神昔降和氣令鍾以彼天爵鬱為人龍崇墓往峻世德今重漢車作傳靈位攸待我君應符非公莫宰華袞既襲輕羅自改形雖廟堂心猶江海經邦已備皇情回屬素騑輟御玄雲罷曲藝文類聚四十七尚書右僕射范雲墓志銘合契興王匪勞物色乘風鬱起化成龍翼乃作喉脣帝猷必舉乃作銓衡彝倫有序北京岨峻東川回薄蘊吾名臣終天靡作藝文類聚四十八太常卿任昉墓志銘天才俊逸文雅弘備心為學府辭同錦肆含華振藻鬱焉高致川溪望歸巖阿待闕幽光忽斷窮鐙黯滅爾有令問蘭薰無絶藝文類聚四十九
