body:
  text: 釋僧祐弘明集序夫覺海無涯慧鏡圓照化妙域中實陶鑄于堯舜理擅繫表乃埏埴乎周孔矣然道大信難聲高和寡須彌峻而藍風起寶藏積而怨賊生昔如來在世化震大千猶有四魔蓄忿六師懷毒況乎像季其可勝哉自大法東流歲幾五百緣各信否運亦崇替正見者敷讚邪惑者謗訕至于守文曲儒則距為異教巧言左道則引為同法距有拔本之迷引有朱紫之亂遂令詭論稍繁訛辭孔熾夫鶡鴠鳴夜不翻白日之光精衛銜石無損滄海之勢然以暗亂明以小罔大雖莫動豪髮而有塵眂聽將令弱植之徒隨僞辨而長迷倒置之倫逐邪說而永溺此幽塗所以易墜淨境所以難陟者也祐以末學志深弘護靜言浮俗憤慨于心遂以藥疾微閒山棲餘暇撰古今之明篇總道俗之雅論其有刻意翦邪建言衛法製無大小莫不畢采又前代勝士書記文述有益三寶亦皆編録類聚區分列為十四卷夫道以人弘教以文明弘道明教故謂之弘明集兼率淺懷附論于末庶以涓埃微裨瀛岱但學孤識寡愧在褊局搏綜君子惠增廣焉釋藏百二出藏記集十二弘明集不載弘明集後序余所集弘明為法禦侮通人雅論勝士妙說摧邪破惑之衝弘道護法之塹亦已備矣然智者不迷迷者乖智若導以深法終于莫領故復撮舉世典指事取徵言非榮華理歸質實庶迷塗之人不遠而復總釋衆疑故曰弘明論云夫二諦差別道俗斯分道法空寂包三界以等觀俗教封滯執一國以限心心限一國則耳目之外皆疑等觀三界則神化之理常照執疑以迷照群生所以永淪者也詳檢俗教並憲章五經所尊唯天所法唯聖然莫測天形莫窺聖心雖敬而信之猶矇矇弗了況乃佛尊于天法妙于聖化出域中理絶繫表肩吾猶驚怖于河漢俗士安得不疑駭于覺海哉既駭覺海則驚同河漢一疑經說迂誕大而無徵二疑人死神滅無有三世三疑莫見真佛無益國治四疑古無法教近出漢世五疑教在戎方化非華俗六疑漢魏法微晉代始盛以此六疑信心不樹將溺宜拯故較而論之若疑經說迂誕大而無徵者蓋以積劫不極世界無邊也今世咸知百年之外必至萬歲而不信積萬之變至于曠劫是限心以量造化也咸知赤縣之表必有四極而不信積極之遠復有世界是執見以判太虛也昔湯問革曰上下八方有極乎革曰無極之外復無無極無盡之中復無無盡朕是以知其無極無盡也上古大賢據理酬聖千載符契懸與經合井識之徒何智得異夫以方寸之心謀已身而致謬圓分之眸隔牆壁而弗見而欲侮尊經背聖說誣積劫罔世界可為愍傷者一也若疑人死神滅無有三世是自誣其性靈而蔑棄其祖禰也然則周孔制典昌言鬼神易曰游魂為變是以知鬼神之情狀既情且狀其無形乎詩云三后在天王配于京升靈上旻豈曰滅乎禮云夏尊命事鬼敬神大禹所祗寧虛誕乎書稱周公代武云能事鬼神姬旦禱親可虛罔乎苟亡而有靈則三世如鏡變化輸回孰知其極俗士執禮而背叛五經非直誣佛亦侮聖也若信鬼于五經而疑神于佛說斯固聾瞽之徒非議所及可為哀矜者二也若疑莫見真佛無益國治則禋祀望秩亦宜廢棄何者蒼蒼積空誰見上帝之貌茫茫纍塊安識后祇之形民自躬稼社神何力人造庸畷蠟鬼奚功然猶盛其犧牲之費繁其歲時之祀者豈不以幽靈宜尊教民美報邪況佛智周空界神凝域表上帝成天緣其陶鑄之慈聖王為人依其亭育之戒崇法則六天咸喜廢道則萬神斯怒今人莫見天形而稱郊祀有福不覩金容而謂敬事無報輕本重末可為震懼者三也若疑古無佛教近出漢世者夫神化隱顯孰測始終哉尋羲農緬邈政績猶湮彼有法教亦安得聞之昔佛圖澄知臨淄伏石有舊像露盤犍陀勒見槃鴟山中有古寺基墌衆人試掘並如其言此萬代之遺徵晉世之顯驗誰判上古必無佛乎列子稱周穆王時西極有化人來入水火貫金石反山川移城邑乘虛不墜觸實不礙千變萬化不可窮極既能變人之形又且易人之慮穆王敬之若神事之若君觀其靈迹乃開士之化大法萌兆已見周初感應之漸非起漢世而封執一時可為歎息者四也若疑教在戎方化非華夏者則是前聖執地以定教非設教以移俗也昔三皇無為五帝德化三王禮刑七國權勢地當諸夏而世教九變今反以至道之原鏡以大智之訓感而遂通何往不被夫禹出西羌舜生東夷孰云地賤而棄其聖丘欲居九聃適西戎道之所在寧選于地夫以俗聖設教猶不繫于華夷況佛統大千豈限化于西域哉案禮王制云四海之內方三千里中夏所據亦已不曠伊洛本夏而鞠為戎墟吳楚本夷而翻成華邑道有運流而地無恆化矣且夫厚載無疆寰域異統北辰西北故知天竺居中今已區分中土稱華以距正法雖欲距塞而神化常通可為悲涼者五也若疑漢魏法微晉代始盛者道運崇替未可致詰也尋沙門之修釋教何異孔氏之述唐虞乎孔修五經垂範百王然春秋諸侯莫肯遵用戰伐蔑之將墜于地爰至秦皇復加燔燼豈仲尼之不肖而詩書之淺鄙哉邇及漢武始顯儒教舉明經之相崇孔聖之術寧可以見輕七國而遂廢後代乎案漢元之世劉向序仙云七十四人出在佛經故知經流中夏其來已久逮明帝感夢而傅毅稱佛于是秦景東使而攝騰西至乃圖像于關陽之觀藏經于蘭臺之室不講深文故莫識奧義是以楚王修仁潔之祠孝桓建華蓋之祭法相未融唯神之而已至魏武英鑒書述妙化孫權雄略崇造塔寺晉武之初機緣漸深耆域耀神通之迹竺護集法寶之藏所以百辟搢紳洗心以進德萬邦黎憲刻意而遷善暨晉明睿悟秉一棲神手畫寶像表觀樂覽既而安上弘經于山東什公宣法于關右精義既敷實相彌照英才碩智並驗理而伏膺矣故知法雲始于觸石慧水流于濫觴教心有漸神化之常感應因時非緣如何故儒術非愚于秦而智于漢用與不用耳佛法非淺于漢而深于晉明與不明耳故知五經恆善而崇替隨運佛化常熾而通塞在緣一以此思可無深惑而執疑莫悟可為痛悼者六也夫信順福基迷謗禍門而況矇矇之徒多不量力以己所不知而誣先覺之遍知以其所不見而罔至人之明見鑒達三世反號邪僻專拘目前自謂明智于是迷疑塞胸謗讟盈口輕議以市重苦顯誹以賈幽罰言無錙銖之功慮無毫釐之益逝川若飛藏山如電一息不還奄然後世報隨影至悔其可追夫神化茫茫幽明代運五道變化于何不之天宮顯驗趙𥳑秦穆之錫是也鬼道交報杜柏彭生之見是也修德福應殷代宋景之驗是也多殺禍及白起程普之證是也現世幽徵備詳典籍來生冥應布在尊經但緣感理奧因果義微微奧難領故略而不陳前哲所辨關鍵已正聊率鄙懷繼之于末雖文非圭璋而事足盤鑑惟愷悌君子自求多福焉弘明集十四法集雜記銘目録序祐少長山居遊息淨衆雖業勤罔立而誓心無墜常願覺道流于忍士正化隆于像運是以三寶勝迹必也詳録四衆福緣每事述記所撰法集以為七部至于雜記碎文條例無附輒別為一帙以存時事兵山寺碑銘僧衆行記文自彼製而造自鄙衷竊依前古總入于集雖俗觀為煩而道緣成業矣出三藏記集雜録出三藏記集序夫真諦玄凝法性虛寂而開物導俗非言莫津是以不二默訓會于義空之門一音震辨應乎群有之境自我師能仁之出世也鹿苑唱其初言金河究其後說契經以誘小學方典以勸大心妙輪區別十二惟部法聚總要八萬其門至善逝晦跡而應真結藏始則四含集經中則五部分戒大寶斯在含識資焉然道由人弘法待緣顯有道無人雖文存而莫悟有法無緣雖竝世而弗聞聞法資乎時來悟道藉于機至機至然後理感時來然後化通矣昔周代覺興而靈津致隔漢世像教而妙典方流法待緣顯信有徵矣至漢末安高宣譯轉明魏初康會注述漸畼道由人弘于茲驗矣自晉氏中興三藏彌廣外域勝賓稠疊以總至中原慧士暐曄而秀生提什舉其宏綱安遠震其奧領渭濱務逍遙之集廬嶽結般若之臺像法得人于斯為盛原夫經出西域運流東方提挈萬里翻轉梵漢國音各殊故文有同異前後重來故題有新舊而後之學者鮮克研核遂乃書寫繼踵而不知經出之歲誦說比肩而莫測傳法之人授受之道亦已闕矣夫一時聖集猶五事證經況千載交譯寧可昧其人世哉昔安法師以鴻才淵鑒爰撰經録訂正聞見炳然區分自茲已來妙典閒出皆是大乘寶海時競講習而年代人名莫有銓貫歲月逾邁本源將沒後生疑惑爰所取明祐以庸淺豫憑法門翹仰玄風誓弘大化每至昏曉諷持秋夏講說未嘗不心馳菴園影躍靈鷲于是牽課羸恙沿波討源綴其所聞名曰出三藏記集一撰緣記二銓名録三總經序四述列傳緣記撰則原始之本克昭名録銓則年代之目不墜經序總則勝集之時足徵列傳述則伊人之風可見竝鑽析內經研鏡外籍參以前識驗以舊聞若人代有據則表為司南聲傳未詳則文歸蓋闕秉殰凝翰志存信史三復九思事取實録有證者既標則無源者自顯庶行潦無雜于醇乳燕石不亂于荊玉但井識管窺多慚博練如有未備請寄明哲釋藏跡一出三藏記集名録序法寶所被遠矣夫神理木寂感而後通緣應中夏始自漢代昔劉向校書已見佛經故知成帝之前法典久至矣逮孝明感夢張騫遠使西于月支寫經四十二章韜藏蘭臺帝王所印于是妙像麗于城闉金剎曜乎京洛慧教發揮震照區寓矣竊尋兩漢之季世構亂離西京蕩覆墳典皆散東都播遷載籍多亡子政所覩其文雖沒而顯宗所寫厥篇猶存東流初法于斯有徵祐檢閲三藏訪核遺源古經現在莫先于四十二章傳譯所始靡踰于張騫之使洎章和已降經出蓋闕良由梵文雖至緣運或殊有譯乃傳無譯則隱苟非其人道不虛行也邇及桓靈經來稍廣安清朔佛之儔支讖嚴調之屬翻譯轉梵萬里一契離文合義炳煥相接矣僕法輪屆心莫或條敘爰自安公始述名録銓品譯才標列歲月妙典可徵實賴伊人敢以未學嚮附前規率其管見接為新録兼廣訪別目括正異同追討支竺時獲異經安録所記則為未盡今悉更苞舉以備録體發源有漢迄于大梁運歷六代歲漸五百梵文證經四百有十九部華梵傳譯八十有五人魚貫名第略為備矣或同是一經而先後異出新舊舛駮卷數參差皆別立章條使無疑亂至于律藏初啓則詳書本源審核人代列于上録若經存譯亡則編于下卷將使傳法之緣有孚聞道之心無惑敬貽來世庶在不墜焉釋藏跡二出三藏記集雜録序夫靈源啓潤則萬流脈散玄根育萌則千條雲積何者本人而末盛基遠而緒長也自尊經神運秀出俗典由漢屆梁世歷明哲雖復緇服素飭竝異跡同歸講議讚析代代彌精注朮陶練人人競密所以記論之富盈閣以牣房書序之繁充車而被軫矣宋明皇帝投心淨境載餐玄味乃敕中書侍郎陸澄撰録法集陸博識洽聞苞舉群籍銓品名例隨義區分凡十有六帙一百有三卷其所閲古今亦已備矣今即其本録以相綴附雖非正經而毗讚道化可謂聖典之羽儀法門之警衛足以輝顯前緒照進後學是以寄于三藏集末以廣枝葉之覽焉釋藏百二齊太宰竟陵文宣王法集録序夫五時九部之契三請四卷之機玄哉邈乎奧不可議己然法海無涯航而知大慧藏不極采而得寶是以弘誓之士隨時斟酌馬鳴抽其幽宗龍樹振其絶緒提婆析其名數訶梨總其條理竝翼讚妙典俘翦外學迷津見衢長夜逢曉故智慧之日名飛于摧邪功德之月績翔于闡化亦已盛矣但群萌殊乘根力異品運季道澆信淡識淺至于披瞽發聾事資懇厲藥愚針惑宜務切近是以後代敷訓顯晦不一或揚言以泛解或提耳而指授所以卷舒教義抑揚風軌豈滯恆方期于悟俗而已齊太宰竟陵文宣王淨剎萌因忍土現果慧自天成道為期出孝忠淳和之深仁智博愛之厚率由而極因心則至若乃棲神二諦宅業三寶瞻前卓爾望後不群用能降帝子之尊灼淨土之操屏朱觀之貴下白屋之禮磨踵以拯俗刻髓以徇道望億劫以長驅淩千載而獨上若乃闡經律弘福施濟蒼黎育翾動未嘗不慮積昏明慈洽巨細感靈瑞于顯徵通覺應于宵夢固已威蕤民譽昭晳神聽矣至于苞括儒訓藻鏡釋典空有雙該內外咸照常欲廣彼洲渚熾此法燈駐四生之風波燭九居之霾霧指來際以為期總大千以為任故惻隱乘教殷勤敷道干是鋭臨雲之思壯談天之文網羅字輪儀形法印是以淨住命氏啓入道之門華嚴纓珞標出世之術決定要行進趣乎金剛戒果莊嚴克成乎甘露爾其衆經注義法塔讚頌僧制藥記之流導文願疏之屬莫不誠在言前理出辭表大者鉤深測幽小者馳辨感俗森成條章鬱為卷帙可謂開士住心道場初跡冠一代之妙化乘千祀之勝範者也祐昔以道緣豫屬嘉會律任法使謬荷其寄齊堂梵席時枉其請哲人徂謝而道心不亡靜尋遺篇僾乎如在遂序茲集録以貽來世云爾釋藏百二齊竟陵王世子撫軍巴陵王雜集序蓋閒世諦善論法海所總嚴飭文辭初位是攝自大化東漸沿世詠歌魏來雜製閒出群集至于才中含章思入精理固法門之羽纛梵聲之金石也齊竟陵文宣王世子故撫軍巴陵王稟璿華于琨峰敏明璣于珠海慧發觿辰識表觭歲孝友淳至機穎朗徹故幼無弱弄夙有老成甫在志學固已總括墳典矣雅好辭賦允登高之才藉意隸書均臨池之敏業盈竹素慮滿風月是時齊方有德文宣翼讚康衢既熙慧教傍遠世子以枝葉之慶藩守浙河下襜風舉升席治立含靜臺以御己垂𥳑蕙以振俗郡富名山巖多靈寺故勝業愈高清心彌往每遊踐必訓思若淵泉信足以揄揚至道炳發玄極觀其摛賦經聲述頌繡像千佛願文拾身弘誓四城九相之詩釋迦十聖之讚竝英華自凝新聲閒出故僕射范雲篤賞文會雅相嗟重以為後進之佳才也至隆昌之時始兆無妄永元之末運屬道消葛藟失庇磐石傾翦虎兕出柙宗室致猜而樂天知命夷憂味道在艱不虧其貞處約無改其節鏡因果而靡晦洞真俗其如曉專精于太覺之門懍烈于經典之奧于是下帷墐戶注解百論拔出幽旨妙盡纖典乃躬算縑素手寫方等所書大經凡有十部鋒刀刊削風趣妍靡論其思理所徹業藝所貫有踰箕裘之能克副青藍之敏矣夫深宮寡識著自格言梁肉多驕聞之前記而能拔類獨立超然高舉豈非內鑄堅芳之性外瑩過庭之風哉以法而說譬金龍之嗣信相由俗而議邁允恭之紹陳思可謂開士宿因旃檀眷屬無忝堂構克勝負荷者也余昔緣法事亟覿清暉及律集稽川屢延供禮惜乎早世文製未廣今撰録法詠以繼文宣內集使千祀之外知蘭菊之無絶焉同上法集總目序嘗聞瀝泣助河之談捧土埤岱之論雖誚發于古而愧集于今矣僧祐漂隨前因報生閻浮幼齡染服早備僧數而慧解弗融禪味無紀剎那之息徒積錙毫之勤未基是以懼結香朝慚動鐘夕茫茫塵劫空閲斬籌然竊有堅誓志是大乘頂受方等遊心四含加以山房寂遠泉松清密以講席閒時僧事餘日廣評衆典披覽為業或專日遺餐或通夜繼燭短力共尺波爭馳淺識與寸陰競晷雖復管窺迷天蠡測惑海然遊目積心頗有微悟遂綴有聞誡言法寶仰稟群經傍采記傳事以類合義以例分顯明覺應故敘釋迦之譜區辨六趣故述世界之記訂正經譯故編三藏之録尊崇律本故銓師資之傳彌綸福源故撰法苑之篇護持正化故集弘明之論且少受律學刻意毗尼旦夕諷持四十許載春秋講說七十餘遍既稟義先師弗敢墜失標括章條為律記十卷并雜碑記撰為一帙總其所集凡有八部冀微啓于今業庶有藉于來津豈曰善述庶非妄作但理遠識近多有未周明哲儻覽取諸其心使道場之果異跡同臻焉釋迦𧪻五卷右一部第一帙世界記五卷右一部第二帙出三藏記集十卷右一部第三帙薩婆多部相承傳五卷右一部第四帙法苑集十卷右一部第五帙弘明集十卷右一部第六帙十誦義卷記十卷右一部第七帙法集雜記傳銘七卷右一部第八帙同上釋迦𧪻序蓋聞菩提之為極神妙寂通圓智湛照道絶于形識之封理畢于生滅之境形識久絶豈實誕于王宮生滅已畢寧真謝于堅固哉但群萌長寢同歸大覺緣來斯化感至必應若應而不生誰與悟俗化而無名何以導世是以標號釋迦檀種剎利體域中之尊冠人天之秀然後脫屣儲宮貞觀道樹舍金輪而馭大千明玉毫而制法界此其所以垂跡也爰自降胎至于分搭偉化千條靈瑞萬變竝義炳經典事盈紀傳而群言參差首尾散出事緒舛駮同異莫齊散出首尾宜有貫一之區莫齊同異必資會通之契故傳訊難該而總集易覽也祐以不敏業謝多聞時因疾隙頗存尋玩遂乃披經案記原始要終敬述釋迦𧪻記列為五卷若夫胤裔託生之源得道度人之要泥洹塔像之徵遺法將滅之相總衆經以正本綴世記以附末使聖言與俗說分條古聞共今跡相證萬里雖邈有若躬踐千載誠隱無隔面對今鈔集衆經述而不作庶脫尋訪力半功倍敬率丹心略敷誓願同上世界記序夫三界定位六道區分粗妙異容苦樂殊跡觀其原始不離色心檢其會歸莫非生滅生滅輪回是曰無常色心影幻斯謂苦本故涅槃喻之于大河法華方之于火宅聖人超悟息駕反源拔出三有然後為道也尋世界立體四大所成業和緣合與時而興數盈災起復歸乎滅所謂壽短者謂其長壽長者見其短矣夫虛空不有故厥量無邊世界無窮故其狀不一然則大千為法王所統小千為梵主所領須彌為帝釋所居鐵圍為藩牆之域大海為八維之浸日月為四方之燭總總群生于茲是宅瑣瑣含識莫思塗炭沈俗而觀則迂誕之奢言大道而察乃掌握之近事耳但世宗周孔雅伏經書然辨括宇宙臆度不了易稱天玄蓋取幽深之名莊說蒼蒼近在遠望之色于是野人信明謂旻青如碧儒生據典謂乾黑如漆青黑誠異乖體是同儒野雖殊不知一也是則俗尊天名而莫識天實豈知六欲之嚴麗十梵之光明哉至于準步地勢則虛信章亥圖度日月則深委算術未值一隅差以千里誰復夏革說地不過戶牖之閒鄒子談天甫在奧穾之內鍊石既誣鼇足亦詭俗書徒繁竟無顯說世士蒙昧莫詳厥體是以憑惠獨慮閟六合之相持桓談拒問率五藏以為喻通人碩學思鬱理窮況乃牆見其能辨乎嗟夫區界現事猶莫之知不思妙義固其已矣竊惟方等大典多說深空唯長鋡樓炭辨章世界而文博偃廣難卒檢究且名師法匠職競玄義事源委積未必曲盡祐以庸固志在拾遺故鈔集兩經以立根本兼附雜典互出同異撰為五卷名曰世界集記將令三天階序煥若披圖六趣群分照如臨鏡庶溺俗者發蒙服道者瑩解共見慧眼之因俱成覺智之業焉同上薩婆多部記序大聖遷輝歲紀綿邈法僧不墜其唯律乎初集律藏一軌共學中代異執五部各分既分五部則隨師傳習唯薩婆多部偏行齊土蓋源起天竺流化罽賓前聖後賢重明疊耀或德升住地或道證四果或顯相標瑞或晦跡同凡皆秉持律儀闡揚法化舊記所載五十三人自茲以後睿哲繼出竝嗣徽于在昔垂軌于當今季世五衆依斯立教遺風餘烈炳然可尋夫蔭樹者護其本飲泉者敬其源寧可服膺玄訓而不記列其人哉祐幼齡憑法年踰知命仰前覺之弘慈奉先師之遺德猥以庸淺承業十誦諷味講說三紀于茲每披聖文以凝感望遐蹤以翹心遂搜訪古今撰薩婆多記其先傳同異則竝録以廣聞後賢未絶則製傳以補闕總其新舊九十餘人使英聲與至教永被懋實共日月惟新此撰述之大旨也條序餘部則委之明勝疾恙惛漠辭之銓藻儻有覽者略文取心同上法苑雜緣原始集序夫經藏浩汗記傳紛綸所以導達群方開示後學設教緣跡煥然備悉訓俗事源鬱爾咸在然而講匠英德鋭精于玄義新進晚習專志于轉讀遂令沙門常務月修而莫識其源僧衆恆儀日用而不知其始不亦甚乎余以率情業謝多聞六時之隙頗好尋覽于是檢閲事緣討其根本遂綴翰墨以藉所好庶辨始以驗末明古以證今至于經唄道師之集龍華聖僧之會菩薩稟戒之法止惡興善之教或制起帝皇或功積黎庶竝八正基趾十力逵路雖事寄形跡而勳遍空界宋齊之隆實弘斯法大梁受命道冠百王神教傍通慧化冥彼自幼屆老備觀三代常願一乘寶訓與天地而彌新四部盛業隨日月而長照是故記録舊事以章勝緣條例業雜故謂之法苑區以類別凡為十卷豈足𥳑夫淵識蓋布之眷屬而已同上十誦義記序夫戒律者蓋四雙之雲梯五衆之鎔範也性以止制為本體以無作為相始袪十惡終圓萬善在昔覺世因事制戒心跡俱防輕重備設持戒堅淨則羅睺惟最曉律精明則波離為首至于泥洹遺囑殷勤金色迦葉結集斯藏洲渚所依莫踰茲典逮至中葉學同說異五部之詻森然競分仰惟十誦源流聖賢繼踵師資相承業盛東夏但至道難凝微言易爽果向之人猶跡有兩說況在凡識孰能一論是以近代談講多有同異大律師潁土積道河西振德河東綜學月朗砥行冰潔行以尸羅為基學以十誦為本且幼選明師歷事名勝校理精密無幽不貫常以此律廣授二部教流于京寓之中聲高于宋齊之世可謂七衆之宗師兩代之元匠者矣是以講肄之座環春接冬稟業之徒雲聚波沓僧祐藉法乘緣少預鑽仰扈錫侍筵二十餘載雖深言遠旨未敢庶幾而章條科目竊所早習每服佩思尋懼有墜失遂集其舊聞為義記十卷夫心識難均意見多緒竊同芻蕘時綴毫露輒布其別解録之未盡率其木訥指序條貫而已昔少述私記辭句未整而好事傳寫數本兼行今削繁補略以後撰為定敬述先師之旨匪由庸淺之說明哲倘覽采其正意焉同上
