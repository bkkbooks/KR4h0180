body:
  text: 任昉奏請郊廟備六代樂據魏王肅議周禮賓客皆作備樂況天地宗廟事之大者周官以六律六同五聲八音六舞大合樂以致鬼神以和邦國請依王肅祀祭郊廟備六代樂通典一百四十七太常任昉奏奏彈曹景宗御史中丞臣任昉稽首言臣聞將軍死綏咫步無卻顧望避敵逗橈有刑至乃趙母深識乞不為坐魏主著令抵罪已輕是知敗軍之將身死家戮爰自古昔明罰斯在臣昉頓首頓首死罪死罪竊尋獯獫侵軼暫擾疆陲王師薄伐所向風靡是以淮徐獻捷河兗凱歸東關無一戰之勞塗中罕千金之費而司部懸隔斜臨寇境故使狡虜憑陵淹移歲月故司州刺史蔡道恭率厲義勇奮不顧命全城守死自冬徂秋猶其轉戰無窮亟摧醜虜方之居延則陵降而恭守比之疏勒則耿存而蔡亡若使郢部救兵微接聲援則單于之首久懸北闕豈直受降可築涉安啓土而已哉實由郢州刺史臣景宗受命致討不時言邁故使蝟結蟻聚水草有依方復按甲盤桓緩救資敵遂令孤城窮守力屈凶威雖然猶應固守三關更謀進取而退師延頸自貽虧衄疆埸侵駭職是之由不有嚴刑誅賞安置景宗即主臣謹案使持節都督郢司二州諸軍事左將軍郢州刺史湘西縣開國侯臣景宗擢自行閒遘茲多幸指蹤非擬獲獸何勤賞茂通侯榮高列將負檐裁弛鐘鼎遽列和戎莫效二八已陳自頂至踵功歸造化潤草塗原豈獲自已且道恭云逝城守纍旬景宗之存一朝棄甲生曹死蔡優劣若是惟此人斯有靦面目昔漢光命將坐知千里魏武置法案以從事故能出必以律錙銖無爽伏惟聖武英挺略不世出料敵制變萬里無差奉而行之實弘廟算惟此庸固理絶言提自逆胡縱逸久患諸夏聖朝乃顧將一車書愍彼司氓致辱非所早朝永歎載懷矜惻致茲虧喪何所逃罪宜正刑書肅明典憲臣謹以劾請以見事免景宗所居官下太常削爵土收付廷尉法獄治罪其軍佐職僚偏裨將帥絓諸應及咎者別攝治書侍御史隨違續奏臣謹奉白𥳑以聞云云文選四十奏彈劉整御史中丞臣任昉稽首言臣聞馬援奉嫂不冠不入泛育字孤家無常子是以義士節夫聞之有立千載美談斯為稱首臣昉頓首頓首死罪死罪謹案齊故西陽內史劉寅妻范詣臺訴列稱出適劉氏二十許年劉氏喪亡撫養孤弱叔郎整常欲傷害侵奪分前奴教子當伯並已入衆又以錢婢姊妹弟溫仍留奴自使伯又奪寅息逡婢緑草私貨得錢並不分逡寅第二庶息師利去歲十月往整田上經十二日整便責范米六斗哺食米未展送忽至戶前隔箔攘拳大罵突進房中屏風上取車帷準米去二月九日夜婢采音偷車欄夾杖龍牽范問失物之意整便打息逡整及母并奴婢等六人來至范屋中高聲大罵婢采音舉手查范臂求攝檢如訴狀輒攝整亡父舊使奴海蛤到臺辨問列稱整亡父興道先為零陵郡得奴婢四人分財以奴教子乞大息寅寅亡後第二弟整仍奪教子云應入衆整便留自使婢姊及弟各准錢五千文不分逡其奴當伯先是衆奴整兄弟未分財之前整兄寅以當伯貼錢七千共衆作田寅罷西陽郡還雖未別火食寅以私錢七千贖當伯仍使上廣州去後寅喪亡整兄弟後分奴婢唯餘婢緑草入衆整復云寅未分財贖當伯又應屬衆整意貪得當伯推緑草與逡整規當伯還擬欲自取當伯遂經七年不返整疑已死亡不回更奪取婢緑草貨得錢七千整兄弟及姊共分此錢又不分逡寅妻范云當伯是亡夫私贖應屬息逡當伯天監二年六月從廣州還至整復奪取云應充衆准雇借上廣州四年夫直今在整處使進責整婢采音列整兄寅第二息師利去年十月十二日忽往整墅停住十二日整就兄妻范求米六斗哺食范未得還整怒仍自進范所往屏風上取車帷為質范送米六斗整即納受范今年二月九日夜失車欄子夾杖龍牽等范及息逡道是采音所偷整聞聲仍打逡范喚問何意打我兒整母子爾時便同出中庭隔箔與范相罵婢采音及奴教子楚玉法志等四人于時在整母子左右整語采音其道汝偷車校具汝何不進裏罵之既進爭口舉手誤查范臂車欄夾杖龍牽實非采音所偷進責寅妻范奴苟奴列娘去二月九日夜失車欄夾杖龍牽疑是整婢采音所偷苟奴與郎逡往津陽門糴米遇見采音在津陽門賣車欄龍牽苟奴登時欲捉取逡語苟奴已爾不須復取苟奴隱僻少時伺視人買龍牽售五千錢苟奴仍隨逡歸宅不見度錢並如采音苟奴等列狀粗與范訴相應重核當伯教子列娘被奪今在整處使悉與海蛤列不異以事訴法令史潘僧尚議整若輒略兄子逡分前婢貨賣及奴教子等私使若無官令輒收付近獄測治諸所連逮絓應洗之源委之獄官悉以法制從事如法所稱整即主臣謹案新除中軍參軍臣劉整閭閻闟茸名教所絶直以前代外戚仕因紈袴惡積釁稔親舊側目理絶通問而妄肆醜辭終夕不寐而謬加大杖嶭包分財取其老弱高鳳自穢爭訟寡嫂未見孟嘗之深心唯斆文通之僞迹昔人睦親衣無常主整之撫姪食有故人何其不能折契鍾庾而襜帷交質人之無情一何至此實教義所不容紳冕所共棄臣等參議請以見事免整所除官輒勒外收付廷尉法獄治罪諸所連逮應洗之源委之獄官悉以法制從事婢采音不款偷車龍牽請付獄測實其宗長及地界職司初無糾舉及諸連逮請不足申盡臣昉云云誠惶誠恐以聞文選四十奏彈蕭穎達臣聞貧觀所取窮視不為在於布衣窮居介然之行尚可以激貪厲俗惇此薄夫況乎伐冰之家爭雞豚之利衣繡之士受賈人之服風聞征虜將軍臣蕭穎達啓乞魚軍稅輒攝穎達宅督彭難當到臺辨問列稱尋生魚典稅先本是鄧僧琰啓乞限訖今年五月十四日主人穎達于時謂非新立仍啓乞接代僧琰即蒙降許登稅與史法論一年收直五十萬如其列狀則與風聞符同穎達即主臣謹案征虜將軍太子左衛率作唐縣開國侯臣穎達備位大臣預聞執憲私謁亟陳至公寂寞屠中之志異乎鮑肆之求魚飧之資不俟潛有之數遂復申茲文二追彼十一風體若茲準繩斯在陛下弘惜勳良每為曲法臣當官執憲敢不直繩臣等參議請以見事免穎達所居官以侯還第梁書蕭穎達傳奏彈范縝臣聞息夫歷詆漢有正刑白褎一奏晉以明罰況乎附下訕上毀譽自口者哉風聞尚書左丞臣范縝自晉安還語人云我不詣餘人惟詣王亮不餉餘人惟餉王亮輒收縝白從左右萬休到臺辨問與風聞符同又今月十日御餞梁州刺史臣珍國宴私既洽群臣竝已謁退時詔留侍中臣昂等十人訪以政道縝不答所問而橫議沸騰遂貶裁司徒臣朏褎舉庶人王亮臣於時預奉恩留肩隨竝立耳目所接差非風聞竊尋王有遊豫親御軒陛義深推轂情均湛露酒闌宴罷當扆正立記事在前記言在後軫早朝之念深求瘼之情而縝言不遜妄陳褎貶傷濟濟之風缺側席之望不有嚴裁憲準將頽縝即主臣謹案尚書左丞臣范縝衣冠緒餘言行舛駮誇諧里落喧詬周行曲學謏聞未知去代弄口鳴舌祇足飾非乃者義師近次縝丁罹艱棘曾不呼門墨縗景附頗同先覺實奉龍顏而今黨協疊餘翻為矛楯人而無恆成茲姦詖日者飲至策勳功微賞厚出守名邦入司管轄苞篚罔遺而假稱折轅衣裙所弊讒激失所許與疵廢廷辱民宗自居樞憲糾奏寂寞顧望縱容無至公之議惡直醜正有私訐之談宜置之徽纆肅正國典臣等參議請以見事免縝所居官輒勒外收付廷尉法獄治罪應諸連逮委之獄官以法制從事縝位應黃紙臣輒奉白𥳑梁書王亮傳朝堂諱榜議撝取證明之文僴之即情惟允直班諱之典爰自漢世降及有晉歷代無爽今之諱榜兼明義訓邦之字國實為前事之徵名諱之重情敬斯極故懸諸朝堂縉紳所聚將使起伏晨昏不違耳目禁避之道昭然易從此乃敬恭之深旨何情典之或廢尊稱霍氏理例乖方居下以名故以不名為重在上必諱故以班諱為尊因心則理無不安即事則習行已久謂宜式遵無所創革南齊書王慈傳永明中儀曹郎任昉議齊明帝諡議窮神之跡無繼於成名教思所宗言歸於有稱是以則天為大義盡於翼善武功受命理貫於斯文伏惟功高五讓道冠三極愛敬始於揚名孝饗終乎嚴配寥廓大度誕君人之符閨庭小節應軌物之訓歷試允諧納揆時序貽厥之寄義均負圖榱棟惟新壓焉將及於是承制宣德定策公卿登嗣后於西鍾反獨夫於侯服既而主幼時艱仍離屯蹇應當璧之祥注息肩之願立德以長紹開中興擬度天行取則乾健日昃罷朝幽枉必達官曹寂寞圄犴空虛虎門肆義大足協律巖廊有縉紳之談鄉孰無橫議之士既富而教弘此孝治遂使家無蕩子野有栖畝置天下於掌握覽八荒於戶牖寵微金穴之家恩絶椒風之館天應民和祥符總暨故能上變雲物下漏深泉若乃青丘丹陵之國黃銀紫玉之瑞幽符遠萃詢德報功方將馳道日觀清宮鳴澤為而不恃高揖成功百川所以朝宗參辰於焉取正豈所謂中衢均奠懸衡共軌者歟藝文類聚十四到大司馬記室箋記室參軍事任昉死罪死罪伏承以今月令辰肅膺典策德顯功高光副四海含生之倫庇身有地況昉受教君子將二十年咳唾為恩眄睞成飾小人懷惠顧知死所昔承嘉宴屬有緒言提挈之旨形乎善謔豈謂多幸斯言不渝雖情謬先覺而迹淪驕餌湯沐具而非弔大廈構而相賀明公道冠二儀勳超邃古將使伊周奉轡桓文扶轂神功無紀作物何稱府朝初建俊賢翹首惟此魚目唐突璵璠顧己循涯實知塵忝千載一逢再造難答雖則殞越且知非報不勝荷戴屏營之情謹詣廳奉白箋謝聞昉死罪死罪文選四十梁書任昉傳為府僚勸進梁公箋伏承嘉命顯至佇策明公逡巡盛禮斯實謙尊之旨未窮遠大之致何者嗣君棄常自絶宗社國命民生翦為仇讎折棟崩榱壓焉自及卿士懷脯斫之痛黔首懼比屋之誅明公亮格天之功拯水火之切再躔日月重綴參辰反龜玉於塗泥濟斯民於坑岸使夫匹婦童兒羞言伊呂鄉校里孰恥談五霸而位卑乎阿衡地狹於曲阜慶賞之道尚其未洽夫大寶公器非要非距至公至平當仁誰讓明公宜祗奉天人允膺大禮無使後豫之歌同彼胥怨兼濟之仁翻為獨善梁書武帝紀上又見藝文類聚十四以為任昉作又箋近以朝命蘊策冒奏丹誠奉被還命未蒙虛受縉紳顒顒深所未達蓋聞受金於府通人之弘致高蹈海隅匹夫之小節是以履乘石而周公不以為疑增玉璜而太公不以為讓況世哲繼軌先德在民經綸草昧歎深微管加以朱方之役荊河是依班師振旅大造王室雖復纍繭救宋重胝存楚居今觀古曾何足云而惑甚盜鍾功疑不賞皇天后土不勝其酷是以玉馬駿奔表微子之去金版出地告龍逢之怨明公據鞍輟哭厲三軍之志獨居掩涕激義士之心故能使海若登祇罄圖效祉山戎孤竹束馬景從伐罪弔民一匡靖亂匪叨天功實勤濡足且明公本自諸生取樂名教道風素論坐鎮雅俗不習孫吳遘茲神武驅盡誅之氓濟必封之俗龜玉不毀誰之功歟獨為君子將使伊周何地某等不達通變實有愚誠不任悾款悉心重謁伏願時膺典冊式副民望文選四十梁書武帝紀上南史六藝文類聚十四為王金紫謝齊武帝示皇太子律序啓臣聞化澄上業草纓垂典教清中世艾服懲刑自禮失宗周俗反炎漢張馮導其迹賈杜浚其流仲舒之得情孔子之博約故以義該往哲盡美前王而年世浸遠篇牘訛誤朽編落𥳑見誣前淑侮文擅議取弊後昆立不倚衡遂均鴻毛之殞傷足居憂忘貽髮膚之痛豈所以臨河永歎含育最靈者也伏惟陛下施博天地澤深禹湯溫舒之策優游虛授衛展之議寧失弗經削秋荼之法解凝脂之網藝文類聚五十四奉答敕示七夕詩啓臣昉啓奉敕并賜示七夕五韻竊惟帝迹多緒俯同不一託情風什希世罕工雖漢在四世魏稱三祖寧足以繼想南風克諧調露性與天道事絶稱言豈其多幸親逢旦暮臣早奉龍潛與賈馬而入室晚屬天飛比嚴徐而待詔惟君知臣見於訥言之旨取求不疵表於辨才之戲謹輒牽率庸陋式酬天獎拙速雖效蚩鄙已彰臨啓慚恧罔識所置謹啓文選三十九為卞彬謝修卞忠貞墓啓臣彬啓伏見詔書并鄭義泰宣敕當賜修理臣亡高祖晉故驃騎大將軍建興忠貞公壼墳塋臣門緒不昌天道所昧忠遘身危孝積家禍名教同悲隱淪惆悵而年世貿遷孤裔淪塞遂使碑表蕪滅丘樹荒毀狐兔成穴童牧哀歌感慨自哀日月纏迫陛下弘宣教義非求效於方今壼餘烈不泯固陳力於異世但加等之渥近闕於晉典樵蘇之刑遠流於皇代臣亦何人敢謝斯幸不任悲荷之至謹奉啓事以聞謹啓文選三十九啓蕭太傅固辭奪禮昉啓近啓歸訴庶諒窮款奉被還旨未垂哀察悼心失圖泣血待旦君於品庶示均鎔造干祿祈榮更為自拔虧教廢禮豈關視聽所不忍言具陳茲啓昉往從末宦祿不代耕飢寒無甘旨之資限役廢晨昏之半膝下之歡已同過隙几筵之慕幾何可憑且奠酹不親如在安寄晨暮寂寥闃若無主所守既無別理窮咽豈及多喻明公功格區宇感通有塗若霈然降靈賜寢嚴命是知孝治所被爰至無心錫類所及匪徒教義不任崩迫之情謹奉啓事陳聞謹啓文選三十九求為劉瓛立館啓昔在魏中爰及晉始書貴虛玄人悅陶縱瑚璉廢泗上之容樽俎恣林下之適春干秋羽委曠而弗陳西序東膠寂寥而誰仰所以金雞忘曉玉羊失馭神器毀於獯戎寶曆遷於干越豈不悲歟劉瓛澡身浴德修行明經賤圭璧於光陰竟松筠於歲晚貧不隕穫其心窮不二三其操而困無居止浮寓親遊垣棟傾鑽窐衢墊側有朋自遠無用栖憑皆負笈擔簦櫛風沐露瓛之器學無謝前修輒欲與之周旋開館招屈臣第西偏官有間地北拒晉山南望通邑雖曰人境實少浮喧廣輪裁盈數畝布以施立黌孰簿藝桑麻粗創茨宇藝文類聚三十八與江革書此段雍府妙選英才文房之職總卿昆季可謂馭二龍於長途騁騏驥於千里梁書江革傳與沈約書范僕射遂不救疾范侯淳孝睦友在家必聞直道正色立朝斯著一金之俸必遍親倫鍾庾之秩散之故舊佐命興王心力俱盡謀猷忠允諒誠匪躬破産而字死友之孤開門而延故人之殯則惟其常無得而稱矣器用車馬無改平生之素憑論款對不易布素之交若斯人者豈云易遇昉將蒞此邦務在遄速雖解駕流連再貽款顧將乖之際不忍告別無益離悲祗增今悵永念平生忽焉疇曩追尋笑緒皆成悲端藝文類聚三十四弔樂永世書永世孝友之至發自天真皎潔之操曾非矯飾意有所固白刃不移理有所託淄澠自辨餘息惟存視陰無幾終始之託方寄祁侯豈謂樂生反先朝露以理遣滯鄙識未曉以事尋悲哀楚交至宿草易滋傷恨不滅松檟可拱悲緒無窮藝文類聚三十四為昭明太子答何胤書得書知便遠追疏董超然高蹈雖朝旨殷勤而輕棹已遠供餞莫申瞻言增慨善保嘉猷比致音息懷人望古潸然久之藝文類聚三十七為庾杲之與劉居士虯書自別荊南迄將二紀杲之牽滯形有推遷物役丈人沒志外身超然獨善雖心路咫尺而事阻山河悠悠白雲依然有道金涼佇運想恆納宜沖明在襟履候無爽體道為用蹈理則和杲之牽綴疲朽愧心已多訪德則山林窅然觀道則風雲自遠歲暮之期指塗衡嶽神虛氣懋無待怡和江湖相望安事行李司徒竟陵王懋於神者言象所絶接乎士者遐邇所宗鍾石非禮樂之本纓褐豈朝野之謂想暗投之懷不以形體為阻一日通籍梁邸親奉話言夢想清塵為歲已積以丈人非羔雁所榮故息蒲帛之典勝寄冥通諒有風期之遲君王卜居郊郭縈帶川阜顯不絢功晦不摽迹從容乎人野之閒以窮二者之致且弘護為心廣孚真俗思聞繫表共剖衆心妙域筵山河虛館帶川涘實望賁然少酬側遲昔東平樂善旌君大於東閣今王愛素致吾子於西山豈不盛歟百齡飄驟凝滯自物千載一朝為仁由己且淩雪戒塗非滅迹之郊鴻鍾在御豈銷聲之道己摽異人之迹故有同物之勞夫山水無情應之以會愛間在我觸目蕭條衡嶽何親鍾嶺何薄想弘思有在不俟繁言藝文類聚三十七
