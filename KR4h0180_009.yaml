body:
  text: 簡文帝即位大赦詔太清三年五月辛巳朕以不造夙丁閔凶大行皇帝奄棄萬國攀慕號躃厝身靡所猥以寡德越居民上煢煢在疚罔知所託方賴藩輔社稷用安謹遵先旨顧命遺澤宜加億兆可大赦天下梁書簡文帝紀原放北人為奴婢者詔太清三年五月壬午育物惟寬馭民惟惠道著興王本非隸役或開奉國便致擒虜或在邊疆濫被抄劫二邦是競黎元何罪朕以寡昧創承鴻業既臨率土化行宇宙豈欲使彼獨為匪民諸州見在北人為奴婢者并及妻兒悉可原放梁書簡文帝紀營莊陵詔簡皇后窀穸有期昔西京霸陵因山為藏東漢壽陵流水而已朕屬值時艱歲飢民斃方欲以身率下永示敦朴今所營莊陵務存約儉梁書太宗王皇后傳贈江子一子四子五詔故戎昭將軍通直散騎侍郎南津校尉江子一前尚書右丞江子四東宮直殿主帥子五禍故有聞良以矜惻死事加等抑惟舊章可贈子一給事黃門侍郎子四中書侍郎子五散騎侍郎梁書江子一傳改元大寶大赦詔大寶元年正月辛亥蓋天下者至公之神器在昔三五不獲已而臨蒞之故帝王之功聖人之餘事軒冕之華儻來之一物太祖文皇帝含光大之量啓西伯之基高祖武皇帝道洽二儀智周萬物屬齊季薦瘥彝倫剝喪同氣離入苑之禍元首懷無厭之欲乃當樂推之運因億兆之心承彼掎角雪茲讎恥事非為己義實從民故功成弗居卑宮菲食大慈之業普薰汾陽之詔屢下於茲四紀無得而稱朕以寡昧哀煢孔棘生靈已盡志不圖全僶俯視陰企承鴻緒懸旌履薄未足云喻痛甚愈遲諒暗彌切方當玄默在躬栖心事外即王道未直天步猶艱式憑宰輔以弘庶政履端建號仰惟舊章可大赦天下改太清四年為大寶元年梁書簡文帝紀解嚴詔大寶元年二月丙戌近東垂擾亂江陽縱逸上宰運謀猛士雄奮吳會肅清濟兗澄謐京師畿內無事戎衣朝廷達官齋內左右並可解嚴梁書簡文帝紀與湘東王令王筠本自舊手後進有蕭愷可稱信為才子梁書蕭子顯傳為孔休源舉哀令中大通四年五月金紫光祿大夫孔休源立身中正行己清恪昔歲西浮渚宮東泊枌壤毗佐蕃政實盡厥誠安國之詳審公儀之廉白無以過之奄至殞喪情用惻怛今須舉哀外可備禮梁書孔休源傳與劉孝儀令悼劉遵大同元年賢從中庶奄至殞逝痛可言乎其孝友淳深立身貞固內含玉潤外表瀾清美譽嘉聲流於士友言行相符始終如一文史該富琬琰為心辭章博贍玄黃成采既以鳴謙表性又以難進自居未嘗造請公卿締交榮利是以新沓莫之舉杜武弗之知自阮放之官野王之職栖遲門下已踰五載同僚已陟後進多升而怡然清靜不以少多為念確爾之志亦何易得西河觀寶東江獨步書籍所載必不是過吾昔在漢南連翩書記及忝朱方從容坐首良辰美景清風月夜鷁舟乍動朱鷺徐鳴未嘗一日而不追隨一時而不會遇酒闌耳熱言志賦詩校覆忠賢榷揚文史益者三友此實其人及弘道下邑未申善政而能使民結去思野多馴雉此亦威鳳一羽足以驗其五德比在春坊載獲申晤博望無通賓之務司成多節文之科所賴故人時相媲偶而此子溘然實可嗟痛惟與善人此為虛説天之報施豈若此乎想卿痛悼之誠亦當何已往矣奈何投筆惻愴吾昨欲為志銘并為撰集吾之劣薄其生也不能揄揚吹歔使得騁其才用今者為銘為集何益既往故為痛惜之情不能已已耳梁書劉遵傳威明昨宵奄復殂化甚可痛傷其風韻遒上神峰標映千里絶迹百尺無枝文辨縱橫才學優贍跌宕之情彌遠濠梁之氣特多斯實俊民也一爾過隙永歸長夜金刀掩芒長淮絶涸去歲冬中已傷劉子今茲寒孟復悼王生俱往之傷信非虛説梁書王規傳又南史二十二停省婦見令纁雁之儀既稱合於二姓酒食之會亦有因不失親若使榛栗腶修贄饋必舉副笄編珈盛飾斯備不應婦見之禮獨以親闕頃者敬進酏醴已傳婦事之則而奉盤沃盥不行侯服之家是知繁省不同質文異世臨城公夫人於妃既是姑姪宜停省隋書禮儀志四與衡山侯恭手令彼士流骯髒有關輔餘風黔首扞格但知重劍輕死降胡惟尚貪婪邊蠻不知禮讓懷抱不可皂白法律無所用施願充實邊戍無數遷徙諜候惟遠箱庾惟積長以控短靜以制躁早蒙愛念敢布腹心甄異張景願復讎教夫理感禽魚道均荊棘亦有鄉因行改江以孝移張景願自縛到郡稱其父為韋法所殺今於公田渚斬法級祭墓訖束身歸官昔沂澤撫劍河南執戟遠符古義實足可嘉防廣刃讎赦其桎梏之罪丁蘭雪恥擢以大夫之位藝文類聚三十三資遣孔燾二女教夫思人生至輕事惟悼往表閭式墓義匪字孤至如遊殷之息見撫張既橋玄之子受託魏王斯故美在令終愛兼身後故無錫令孔燾經術弘長志履貞概遊處積年一朝長往聞其在室二女並未有行可廣訪姻家務求偶對藝文類聚四十御覽五百四十一臨雍州原減民間資突教誠欲投軀決隄曝身求雨九伐方弘三驅未息役爨之憂兵家斯急師興之費日用彌廣今春流既長艫舳爭前轉漕相追饋糧不闕義存矜急無俟多費藝文類聚五十臨雍州革貪惰教壯夫疲於擐甲匹婦勞於轉輸藜藿難充轉死溝壑春蠶不暖寒肌冬收不周夏飽胡寧斯忍復加裒削傷盜抵罪遂為十一之資金作贖刑翻成潤屋之産藝文類聚五十圖雍州賢能刺史教冀州表朱穆之象太丘有陳實之畫或有留愛士氓或有傳芳史籍昔越王鎔金尚思范蠡漢軍染畫猶高賈彪矧彼前賢寧忘景慕可並圖象廳事以旌厥善藝文類聚五十二罷雍州恩教折以片言事關往聖寄之勿擾傳彼昔賢故刻木不對畫獄無入吾自之雍矜懷圄犴幸得天無虛旱地歇怪蟲今軸車行塗舟艎且戒植柳官度尚或依然寄飯曹僖猶思恩宥況義化君民節離寒暑憫茲岐路宜留惠澤藝文類聚五十復臨丹陽教昔越張修猛用弘美績邊延善政實著民謠吾沖弱寡能未明理道猥以庸薄作守京河將恐五袴無謠兩岐難頌思立恩惠微宣風範藝文類聚五十移市教臨淮作守白鹿隨而忘反蕭令解綬黃雀從而不歸況復衛卒遮車追民擁榜瞻言前古眇愧弘多吾旅泊東川阻茲涸水日中總會交貿遷移雖樊無外取要得所求而旗亭舊體自有常處不容近違孔奮遠逐曹參正恐舊肆盈虛或成雕廢藝文類聚六十五下僧正教此州伽藍支提基列雖多設莊嚴盛修供具觀其外迹必備華侈在乎意地實有未弘何者凡鑄金刻木鏤漆圖瓦蓋所以仰傳應身遠注靈覺羡龍瓶之始晨追鶴林之餘慕故祭神如在敬神之道既極去聖茲遠懷聖之理必深此土之寺止乎應生之日則暫列形像自斯已後封以篋笥乃至棄服離身尋炎去頂或十尊五聖共處一廚或大士如來俱藏一匱信可謂心與事背貌是情非增上意多精進心少昔塔裏紅函止傳舍利象頭白繖非謂全身夫以畫像追陳尚使吏民識敬鎔金圖範終令越主懷思匹以龍阿尚能躍鞘方之虎兕猶稱出柙況復最大圓慈無上善聚聞名去煩見形入道而可慢此雕香蘊斯木榓緘匿玉毫封印金掌既殊羅閲久入四天又異祇洹掩戶三月寶殿空臨瓊階虛敞密帷不開非仲舒之曲學紅壁長掩似邠卿之避讎且廣夏雲垂崇甍鳥跂若施之玉座飾以金鈿必不塵靄日姿虧點月面琉璃密窗自可輕風難人龍鬚細網足使飛燕不過兼得虔敬之理必崇接足之心彌重可即宣敕永使準行廣宏明集十六為南平王拜大司馬章臣度連宸萼地實璿跗王業權輿夙奉締構爰頒盧綰同贊密謀豫均鄧禹俱奉明詔故摶飛九萬實假扶搖之力沖天百尺無俟剞劂之勞藝文類聚四十七為王規拜吳郡太守章臣今願斂衽後思循牆所忝示山河而形勝顧浮橋而不見蒼鷹一遊望仙掌而逮然方當駕吉祥之車入句吳之地驅緹扇之馬撫奉德之鄉製錦何階棼絲方始藝文類聚五十謝賜新曆表五司告肇萬壽載光琯叶璧輪慶休寶曆班和布政懸闕徇道式弘敬授之典載闡浹辰之教藝文類聚五又璿籥環璣鳳司肇律觀斗辨氣玉琯移春萬福維新剋固天保藝文類聚五上南郊頌表雖周郊南甸宗伯之官徒設漢興北畤夤恪之道未隆而體元含極先後弗違典盛望禋理通孝敬潔靜之禮載光禘郊之風斯洽昔東平琅琊著藻炎德臨淄中山摛文魏美藝文類聚三十八求寧國臨城二公入學表臣聞瞻彼緝孤既次良冶相諸筍玉猶符他山故沮渙之水可居鄒魯之鄉為貴下帷投斧昔人以為精力棄竿委麥先哲以為美談伏惟陛下弘至德之微言闡無為之妙説話郊講道不勞賈生之議就陽啓位無待公玉之圖願得齒年國胄隨肩選造藝文類聚三十八讓驃騎揚州刺史表常願親侯就列希同特進之班角弓還第不競龍驤之賞而天澤無涯名器總集竊以驃騎之官既為上將神州之重實號中土故以彈壓六戎冠冕九牧豈止司隸絳節金吾緹騎況復任總皇畿位重連率何則驃騎之號歷選為重元狩之中始自去病永平之建特授劉蒼齊憲為公主所申吳漢因群臣之舉藝文類聚四十八御覽二百三十八讓鼓吹表寬博為善不飾被於聲明緣寵成功未增榮於鐃管豈宜響芳樹於西河鳴朝飛於黑水彼己之譏何懼尸素之誡知慚藝文類聚六十八在州羸疾自解表昔違紫復曾不弱冠今夢青蒲逝將已立願歸之謁不逮宸矜民請之書遽降天允屬上黨之雄山西宣將五校失道八尉驕貪一箭而解重圍更成戎阻九戰而絶甬道翻就喪師雖王郭不追朱買難嗣實以褰襜明目日夜厲精地雜黠羌民多獷俗人非公孝欲使任類汝南勳異伯宗必須榮踰戊己州牧良才實屬多士無令菲薄徒積妨賢藝文類聚七十五謝為皇太子表伏見詔書以臣為皇太子有命自天實驚物聽鴻名盛典爰萃庸薄勢舉千鈞方茲未重高摶九萬比此非遙臣本凡蔽賓實無取特以育慶雲霄憑暉璿極鳴玉內侍指麾外蕃猶懼不任尚疑廢職況復監撫守從道著前經恭敬溫文義彰昔記震維禮絶離景事尊養德北宮贊業東序魏平非擬漢莊靡繼臣牧拙樊漢始獲言歸遂以下才屬當上嗣事異定陶之舉有類膠東之册將何以著三善之德延四皓之遊屈叔譽之辭繹卞蘭之頌藝文類聚十六拜皇太子臨軒竟謝表臣聞團暉麗天洊雷居震必資令德實建賢明臣本空薄器業無取已慚好儒之志且乏豐下之姿叨逢慈獎事出希世方將問安寢門視膳天幄察陳奏之章示嚴警之書出龍樓而祗召息車馳道侍鑾輿而巡幸説經孔庭足踐閶闔風雲之勢斯近飛陵倒景神仙之舉超然何以允副元良和茲守器逢師曠之褒值史丹之述藝文類聚十六上昭明太子集別傳等表臣聞無懷有巢之前書契未作尊盧赫胥之氏墳典不傳若夫正少陽之位主承祧之則口實為美唯稱啓誦自茲厥後罕或聞焉昭明太子稟仁聖之姿縱生知之量孝敬兼極溫恭在躬明月西流幼有文章之敏羽籥東序長備元良之德蘊茲三善弘此四聰非假二疏寧勞四皓虎賁恧其經學智囊慚其調護豈止博望延賓壽春能賦問疑棗據書戒馬陵而已哉玉折何追星頽靡續地尊虢嗣外陽之術無徵位比周儲緱山之駕不反臣以不肖妄作明離出入銅龍瞻仰故實思所以揄揚盛軌宣記德音謹撰昭明太子別傳文集請備之延閣藏諸廣內永彰茂實式表洪徽藝文類聚十六又五十五初學記十為子大心讓當陽公表日蝕之餘無黃童之對荷戟入榛異子烏之辨遂復早建茅社夙開井賦爵列五等綬參四色藝文類聚五十一為子大款讓石城公表詭對鶴書俯羞鵜翼臣生處深宮未覿焦原之險不出戶庭豈觀砥柱之峻臣聞坳塘泛水豈議大瀆之流覆簣為峰終乖小魯之説藝文類聚五十一為長子大器讓宣城王表襄野之辨尚對軒君弘羊之計猶干漢主徒以結慶璿源乘蔭霄極一日千里困騏驥之馳高陰百尺藉雲崖之遠熙祖流聰慧之稱方建臨淮之國元仲表岐嶷之姿乃啓平原之封南郡奧部春穀名區民化仲翔之俗山峻陵陽之嶺而緑車赤綬交映相暉金璽銀券照灼光彩藝文類聚五十一為武陵王讓揚州表臣延首青冥傾心紫府言非東里誠譬北辰而滔滔雲漢不被霈然之澤鬱鬱仙居方隔下臣之奏周任量力請固所陳明主理奪伏冀照許臣聞繫風捕影涉求之路靡階玉馬金舟適遠之資無託藝文類聚五十為南康王會理讓湘州表絲言自天而忽委玉刻披雲而下墜浮舟千仞呂梁之暢已深總轡萬尋懸車之懼非淺藝文類聚五十請右將軍朱異奉述制旨易義表臣聞仰觀俯察定八卦之宗河圖洛書符三易之教譬彼影圭居四方之中極猶彼黃鍾總六律之殊氣疑關永闢踰弘農之洞啓辭河既吐邁龍門之已鑿臣以庸蔽竊尚名理鑽仰幾深伏惟舞蹈冒欲請侍中右衛將軍臣異於玄圃宣猷堂奉述制旨易義弘闡聖作垂裕蒙求謹以表聞伏願垂允藝文類聚五十五請尚書左丞賀琛奉述制旨毛詩義表臣聞樂由陽來性情之本詩以言志政教之基故能使天地咸亨人倫敦序故東魯夢周窮茲刪採西河紹魏著彼纘述叶星辰而建詩觀斗儀而命禮以為陳徐雅頌膏肓匪一燕韓篇什痼疾多端北海鄭君徒逢箋釋南郡太守空為異序庶令中和永播碩學知宗大胥負師國子咸紹孝敬之德化洽天下多識之風道行比屋藝文類聚五十五上白兔表瑞表丹陵祥因舊沛四靈可邁既驗玉衡之精千歲變采有符明月之狀豈殊丹岫之羽不止帝梧庶比素質之禽得遊君囿藝文類聚九十五上大法頌表臣綱言臣聞至理隆而德音闡成功臻而頌聲作在乎奚斯考甫神雀嘉樹或事止乎區中慶昭乎一物猶且手舞足蹈傳式方來況乃迫出百王義高三代而可閣筆韜詞詠歌不作者也伏惟陛下天上天下妙覺之理獨圓三千大千無緣之慈普被慧舟匪隔法力無垠躬紆尊極降宣至理澤雨無偏心田受澗是以九圍共溺並識歸涯萬國均夢一日俱曉佛法之勝事國家之至美稽之上古未有斯盛雅頌之作不可闕也謹上大法頌一首曹丕從征之賦劉坦遊侍之談曾無連類伏兼悚恧不勝喜悅之誠謹遣狀詔鍾超寶奉表獻頌以聞釋藏輕五廣弘明集二十藝文類聚七十七答穰城永和移文屬彼數及悔亡運逢瓦解石言水鬭實驗地凶飛絮雨粟還符天怪故淪俗駿奔遺黎南請所以皇略北征事同拯溺愍百姓之未安傷一物之失所故餘民襁負掃地來王而向化之黨忽覽今移咸以陶茲禮樂重覩衣冠已變伊川之髮兼削呼韓之衽寧當生入玉關死歸建業民情若此匪我求蒙行人遠屆實亦勞止想近察時機遠詳圖緯早去中原遽反桑梓旋地脈而北移越天渠而南指然後三姓二賢可存十半如其遂固守株不達玄象將恐衛將之師復有狼居之戰應侯之討更覩陰山之哭藝文類聚五十八
