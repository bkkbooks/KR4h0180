body:
  text: 武帝求言詔政在養民德存被物上令如風民應如草朕以寡德運屬時來撥亂反正倏焉三紀不能使重門不閉守在海外疆埸多阻車書未一民疲轉輸士勞邊防徹田為糧未得頓止治道不明政用多僻百辟無沃心之言四聰闕飛耳之聽州輟刺舉郡忘共治致使失理負謗無由聞達侮文弄法因事生姦肺石空陳懸鍾徒設書不云乎股肱惟人良臣惟聖實賴賢佐匡其不及凡厥在朝各獻讜言政治不便於民者可悉陳之若在四遠刺史二千石長吏並以奏聞細民有言事者咸為申達朕將親覽以紓其過文武在位舉爾所知公侯將相隨才擢用拾遺補闕勿有所隱梁書武帝紀下檢括江子四等封事詔古人有言屋漏在上知之在下朕所鍾過不能自覺江子四等封事如上尚書可時加檢括於民有蠹患者便即勒停宜速詳啓勿致淹緩梁書武帝紀下先是尚書右丞江子四上封事極言得失改南郊明堂陵廟等令班次詔南郊明堂陵廟等令與朝請同班於事為輕可改視散騎侍郎梁書武帝紀下贈蕭子顯詔仁威將軍吳興太守子顯神韻峻舉宗中佳器分竹未久奄到喪殞惻愴於懷可贈侍中中書令今便舉哀梁書蕭子顯傳以李胤之得牙像赦詔天慈普覆義無不攝方便利物豈有方所上虞縣民李胤之掘地得一牙像方減二寸兩邊雙合俱成獸形其內一邊佛像一十二軀一邊一十五軀刻畫明淨巧迹妙絶將神靈所成非人功也中有真形舍利六焉東州昔經奏上未以為意而胤之銜愆縲紲東冶真形舍利降在中署光明顯發示希有相大悲救苦良有以乎宜承佛力弘茲寬大凡天下罪無輕重在今月十六日昧爽已前皆赦除之即日散出奉迎法身還臺供養廣弘明集十五幸阿育王寺赦詔天地盈虛與時消息萬物不得齊其蠢生二儀不得恆其覆載故勞逸異年歡慘殊日去歲失稔斗粟貴騰民有困窮遂臻斯濫原情察咎或有可矜下車問罪聞諸前誥責歸元首窮在朕躬若皆以法繩則自新無路書不云乎與殺不辜寧失不經易曰隨時之義大矣哉今真形舍利復見於世逢希有之事起難遭之想今出阿育王寺設無礙會耆年童齒莫不欣悅如積饑得食如久別見親幽顯歸心遠近馳仰士女霞布冠蓋雲集因時布德允叶人靈凡天下罪無輕重皆赦除之廣弘明集十五案五年正月以張纘為尚書僕射有詔見梁書及南史纘傳今編入朱异集使州郡縣進言詔朕四聰既闕五識多蔽畫可外牒或致紕繆凡是政事不便於民者州郡縣即時皆言勿得欺隱如使怨訟當境任失而今而後以為永準梁書武帝紀下守護晉宋齊諸陵詔命世興王嗣賢傳業聲稱不朽人代徂遷二賓以位三恪義在時事浸遠宿草榛蕪望古興懷言念愴然晉宋齊三代諸陵有職司者勤加守護勿令細民妄相侵毀作兵有少補使充足前無守視並可量給梁書武帝紀下疑事先議後聞詔經國有體必詢諸朝所以尚書置令僕丞郎旦旦上朝以議時事前共籌懷然後奏聞頃者不爾每有疑事倚立求決古人有云主非堯舜何得發言便是是故放勳之聖猶咨四嶽重華之睿亦待多士豈朕寡德所能獨斷自今尚書中有疑事前於朝堂參議然後啓聞不得習常其軍機要切前須咨審自依舊典梁書武帝紀下贈袁昂詔侍中特進左光祿大夫司空昂奄至薨逝惻怛於懷公器㝢凝素志誠貞方端朝燮理嘉猷載緝追榮表德實惟令典可贈本官鼓吹一部給東園祕器朝服一具衣一襲錢二十萬絹布一百匹蠟二百斤即日舉哀梁書袁昂傳赦除民閒愆耗逋負詔民之多幸國之不幸恩澤屢加彌長姦盜朕亦知此之為病矣如不優赦非仁人之心凡厥愆耗逋負起今七年十一月九日昧爽以前在民閒無問多少言上尚書督所未入者皆赦除之梁書武帝紀下禁豪家占假公田詔用天之道分地之利蓋先聖之格訓也凡是田桑廢宅沒入者公創之外悉以分給貧民皆使量其所能以受田分如聞頃者豪家富室多占取公田貴價僦稅以與貧民傷時害政為蠹已甚自今公田悉不得假與豪家已假者特聽不追其若富室給貧民種糧共營作者不在禁例梁書武帝紀下禁守宰誅求及越界分斷詔古人云一物失所如納諸隍未是切言也朕寒心消志為日久矣每當食投箸方眠撤枕獨坐懷憂憤慨申旦非為一人萬姓故耳州牧多非良才守宰獸而傅翼楊阜是故憂憤賈誼所以流涕至於民閒誅求萬端或供廚帳或供廄庫或遣使命或待賓客皆無自費取給於民又復多遣遊軍稱為遏防姦盜不止暴掠繁多或求供設或責腳步又行劫縱更相枉逼良人命盡富室財殫此為怨酷非止一事亦頻禁斷猶自未已外司明加聽採隨事舉奏又復公私傳屯邸冶爰至僧尼當其地界止應依限守視乃至廣加封固越界分斷水陸採捕及以樵蘇遂致細民措手無所凡自今有越界禁斷者禁斷之身皆以軍法從事若是公家創內止不得輒自立屯與公競作以收私利至百姓樵採以供煙爨者悉不得禁及以採捕亦勿訶問若不遵承皆以死罪結正梁書武帝紀下贈諡顧協詔員外散騎常侍鴻臚卿兼中書通事舍人顧協廉潔自居白首不衰久在省闥內外稱善奄然殞喪惻怛之懷不能已已傍無近親彌足哀者大殮既畢即送其喪柩還鄉并營冢槨並皆資給悉使周辦可贈散騎常侍令便舉哀諡曰溫子梁書顧協傳幸蘭陵恩詔朕自違桑梓五十餘載乃眷東顧靡日不思今四方款關海外有截獄訟稍𥳑國務小閒始獲展敬園陵但增感慟故鄉老少接踵遠至情貌孜孜若歸於父宜有以慰其此心其可錫位一階并加頒賚所經縣邑無出今年租賦監所責民蠲復二年并普賚內外從官軍主左右錢米各有差梁書武帝紀下赦詔今茲遠近雨澤調適其穫已及冀必萬箱宜使百姓因斯安樂凡天下罪無輕重已發覺未發覺討捕未擒者皆赦宥之侵割耗散官物無問多少亦悉原除田者荒廢水旱不作無當時文例應追稅者并作田不登公格者並停各備臺州以文最逋殿罪悉從原其有因饑逐食離鄉去土悉聽復業蠲課五年梁書武帝紀下除省不便於民者皇王在昔澤風未遠故端居玄扈拱默巖廊自大道既淪澆波斯逝動競日滋情僞彌作朕負扆君臨百年將半宵漏未分躬勞政事白日西浮不遑飧飯退居猶被布素含咀匪過藜藿寧以萬乘為貴四海為富唯欲億兆康寧下民安乂雖復三思行事而百慮多失凡遠近分置內外條流四方所立屯傳邸冶市埭桁渡津稅田園新舊守宰遊軍戍邏有不便於民者尚書州郡各速條上當隨言除省以舒民患梁書武帝紀下復開贖刑詔堯舜以來便開贖刑中年依古許罪身入資吏下因此不無姦猾所以一日復敕禁斷川流難壅人心惟危既乖內典慈悲之義又傷外教好生之德書云與殺不辜寧失不經可復開罪身皆聽入贖梁書武帝紀下犯罪者父母祖父母勿坐詔禽獸知母而不知父無賴子弟過於禽獸至於父母並皆不知多觸王憲致及老人耆年禁執大可傷愍自今有犯罪者父母祖父母勿坐唯大逆不預今恩梁書武帝紀下禁用九陌錢詔朝四而暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌減則物貴陌足則物賤非物有貴賤是心有顛倒至於遠方日更滋甚豈直國有異政乃至家有殊俗徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並同三年梁書武帝紀下又略見南史七答劉之遴上春秋義詔省所撰春秋義比事論書辭微旨遠編年之教言闡義繁丘明傳洙泗之風公羊稟西河之學鐸椒之解不追瑕丘之說無取繼踵胡毋仲舒云盛因循穀梁千秋最篤張蒼之傳左氏賈誼之襲荀卿源本分鑣指歸殊致詳略紛然其來舊矣昔在弱年久經研味一從遺置迄將五紀兼晚冬晷促機事罕暇夜分求衣未遑搜括須待夏景試取推尋若溫故可求別酬所問也梁書劉之遴傳又南史五十南郊大赦詔天行彌綸覆燾之功博乾道變化資始之德成朕沐浴齊宮虔恭上帝祗事槱燎高熛太一大禮克遂感慶兼懷思與億兆同其福惠可大赦天下尢窮者無出即年租調清議禁錮並皆宥釋所討逋叛巧籍隱年暗丁匿口開恩百日各令自首不問往罪流移他鄉聽復宅業蠲課五年孝弟力田賜爵一級居局治事賞勞二年可班下遠近博採英異或德茂州閭道行鄉邑或獨行特立不求聞達咸使言上以時招聘梁書武帝紀下分改二豫等州詔二豫分置其來久矣今汝潁剋定可依前代故事以懸瓠為豫州壽春為南豫改合肥為合州北廣陵為淮州項城為殷州合州為南合州梁書武帝紀下赦緣邊初附諸州詔今汝南新復嵩潁載清瞻言遺黎有勞鑒寐宜覃寬惠與之更始應是緣邊初附諸州部內百姓先有負罪流亡逃叛入北一皆曠蕩不問往愆并不得挾以私讎而相報復若有犯者嚴加裁問梁書武帝紀下賻陸雲公手詔給事黃門侍郎掌著作陸雲公風尚優敏後進之秀奄然殂謝良以惻然可剋日舉哀賻錢五萬布四十匹梁書陸雲公傳求賢詔為國在於多士寧下寄於得人朕暗於行事尢闕治道孤立在上如臨深谷凡爾在朝咸思匡救獻替可否用相啓沃班下方嶽傍求俊乂窮其屠釣盡其巖穴以時奏聞梁書武帝紀下贈朱异詔故中領軍异器宇弘通才力優贍咨謀帷幄多歷年所方贊朝經永申寄任奄先物化惻悼兼懷可贈侍中尚書右僕射給祕器一具凶事所須隨由資辦梁書朱异傳手詔戲到溉得無貽厥之力乎南史以伏𣈶為豫章內史詔國子博士領長水校尉伏𣈶為政廉平宜加將養勿使恚望致虧士風可豫章內史梁書伏𣈶傳手詔勞問梁秦二州刺史修犬牙不入無以過也南史五十二鄱陽王恢附傳光宅寺金像詔銅初不送何緣乃爾豈不以真相應感獨表神奇乎可鐫著花趺以為靈志釋藏兵釋道宣集神州塔寺三寶感通録詔答大士傅弘大士為度衆生欲來隨意續高僧傳敕答王珍國昔田子泰固辭絹穀卿體國情深良在可嘉梁書王珍國傳案梁書何胤傳有高祖手敕藝文類聚以為沈約作今編入沈約集手敕答張率省賦殊佳相如工而不敏枚皋速而不工卿可謂兼二子於金馬矣梁書張率傳率為待詔賦奏之甚見稱賞手敕答手敕答劉孝綽美錦未可便製簿領亦宜稍習梁書劉孝綽傳孝綽遷太子舍人俄以本官兼尚書水部郎奉啓陳謝手敕答又見御覽二百十八敕何胤頃者學業淪廢儒術將盡閭閻搢紳鮮聞好事吾每思弘獎其風未移當扆興言為歎本欲屈卿暫出開導後生既屬廢業此懷未遂延佇之勞載盈夢想理舟虛席須俟來秋所望惠然申其宿抱耳卿門徒中經明行修厥數有幾且欲瞻彼堂堂置此周行便可具以名聞副其勞望梁書何胤傳比歲學者殊為寡少良由無復聚徒故明經斯廢每一念此為之慨然卿居儒宗加以德素當敕後進有意向者就卿受業想深思誨誘使斯文載興同上敕答陸倕太子中舍人陸倕所製石闕銘辭義典雅足為佳作昔虞丘辨物邯鄲獻賦賞以金帛前史美談可賜絹三十匹梁書陸陲傳敕何點弟胤賢兄徵君弱冠拂衣華首一操心遊物表不滯近跡脫落形骸寄之遠理性情勝致遇興彌高文會酒德撫際逾遠朕膺籙受圖思長聲教朝多君子既貴成雅俗野有外臣宜弘此難進方賴清徽式隆大業昔在布衣情期早著資以仲虞之秩待以子陵之禮聽覽暇日角巾引見窅然汾射茲焉有託一旦萬古良懷震悼卿友于純至親從凋亡偕老之願致使反奪纏綿永恨伊何可任永矣奈何梁書何點傳敕晉安王孔休源人倫儀表汝年尚幼當每事師之梁書孔休源傳敕徐勉卿寒士而子與王志子同迎偃王以來未之有也南史六十徐勉傳揚徐迎主簿勉子嵩充南徐選首帝敕之手敕答沈衆卿文體翩翩可謂無忝爾祖陳書沈衆傳武帝令衆為竹賦賦成奏帝善之手敕答敕賜費昶才意新拔有足嘉異昔郎惲博物卞蘭巧辭束帛之賜實惟勸善可賜絹十匹南史七十二何思澄傳江夏費昶作鼓吹曲武帝重之敕敕捨道事佛門下大經中說道有九十六種唯佛一道是於正道其餘九十五種皆是外道朕捨外道以事如來若有公卿能入此誓者各可發菩提心老子周公孔子等雖是如來弟子而為化既邪止是世閒之善不能革凡成聖公卿百官侯王宗室宜反僞就真捨邪入正故經教成實論說云若事外道心重佛法心輕即是邪見若心一等是無記不當善惡事佛心強老子心弱者乃是清信言清信者清是表裏俱淨垢穢惑纍皆盡信是信正不邪故言清信佛弟子其餘諸信皆是邪見不得稱清信也門下速施行釋藏陪八又駕八敕答邵陵王綸能改迷入正可謂是宿植勝因宜加勇猛也同上敕有司禁斷搜捕近以神實愛民不責無識所貴誠信非尚血膋凡有水旱之患使歸咎在上不同牲牢止告知而已而萬姓祈求諂黷為事山川小祇難期正直晴雨或乖容市民怨愚夫滯習難用理移自今祈請報答可如俗法所用以身塞咎事自依前廣弘明集二十六唐釋道宣敘梁武斷殺絶宗廟犧牲事手敕報皇太子頃年已來處處之役唯資徒謫逐急充配若科制繁細義同𥳑絲切須之處終不可得引例興訟紛紜方始防杜姦巧自是為難更當別思取其便也隋書刑法志敕湘東王到溉非直為汝行事足為汝師閒有進止每須詢訪梁書到溉傳與劉之遴手敕朕聞妻子具孝衰於親爵祿具忠衰於君卿既內足理忘奉公之節梁書劉之遴傳與江革手敕世閒果報不可不信豈得底突如對元延明邪梁書江革傳敕太子進食聞汝所進過少轉就羸瘵我比更無餘病正為汝如此胸中亦圮塞成疾故應強加饘粥不使我恆爾懸心梁書昭明太子傳敕答蕭子雲請改郊廟樂辭此是主者守株宜急改也梁書蕭子雲傳敕蕭子雲撰定郊廟樂辭郊廟歌辭應須典誥大語不得雜用子史文章淺言而沈約所撰亦多舛謬同上敕雍州刺史蕭續賀拔勝北閒驍將汝宜慎之勿與爭鋒魏書賀拔勝傳又周書賀拔勝傳少末一句敕責賀琛謇謇有聞殊稱所期但朕有天下四十餘年公車讜言見聞聽覽所陳之事與卿不異常欲承用無替懷抱每苦倥傯更增惛惑卿珥貂紆組博物洽聞不宜同於闟茸止取名字宣之行路言我能上事明言得失恨朝廷之不能用或誦離騷蕩蕩其無人遂不御乎千里或誦老子知我者希則我貴矣如是獻替莫不能言正旦獸樽皆其人也卿可分別言事啓乃心沃朕心卿云今北邊稽服政是生聚教訓之時而民失安居牧守之過朕無則哲之知觸向多弊四聰不開四明不達內省責躬無處逃咎堯為聖主四凶在朝況乎朕也能無惡人但大澤之中有龍有蛇縱不盡善不容皆惡卿可分別顯出某刺史橫暴某太守貪殘某官長凶虐尚書蘭臺主書舍人某人姦猾某人取與明言其事得以黜陟向令舜但聽公車上書四凶終自不知堯亦永為暗主卿又云東境戶口空虛良由使命繁多但未知此是何使卿云駑困邑宰則拱手聽其漁獵桀黠長吏又因之而為貪殘並何姓名廉平掣肘復是何人朝廷思賢有如飢渴廉平掣肘實為異事宜速條聞當更擢用凡所遣使多由民訟或復軍糧諸所飆急蓋不獲已而遣之若不遣使天下枉直云何綜理事實云何濟辦惡人日滋善人日蔽欲求安臥其可得乎不遣使而得事理此乃佳事無足而行無翼而飛能到在所不威而伏豈不幸甚卿既言之應有深見宜陳祕術不可懷寶迷邦卿又云守宰貪殘皆由滋味過度貪殘糜費巳如前答漢文雖愛露臺之産鄧通之錢布於天下以此而治朕無愧焉若以下民飲食過差亦復不然天監之初思之已甚其勤力營産則無不富饒惰游緩事則家業貧窶勤修産業以營盤案自己營之自己食之何損於天下無賴子弟惰營産業致於貧窶無可施設此何益於天下且又意雖曰同富富有不同慳而富者終不能設奢而富者於事何損若使朝廷緩其刑此事終不可斷若急其制則曲房密室之中云何可知若家家搜檢其細已甚欲使吏不呼門其可得乎更相恐脅以求財帛足長禍萌無益治道若以此指朝廷我無此事昔之牲牢久不宰殺朝中會同菜蔬而已意粗得奢約之節若復減此必有蟋蟀之譏若以為功德事者皆是園中之所産育功德之事亦無多費變一瓜為數十種食一菜為數十味不變瓜菜亦無多種以變故多何損於事亦豪芥不關國家如得財如法而用此不愧乎人我自除公宴不食國家之食多歷年稔乃至宮人亦不食國家之食積纍歲月凡所營造不關材官及以國匠皆資雇借以成其事近之得財頗有方便民得其利國得其利我得其利營諸功德或以卿之心度我之心故不能得知所得財用暴於天下不得曲辭辨論卿又云女妓越濫此有司之責雖然亦有不同貴者多畜妓樂至於勳附若兩掖亦復不聞家有二八多畜女妓者此並宜具言其人當令有司振其霜豪卿又云乃追恨所取為少如復傅翼增其搏噬一何悖哉勇怯不同貪廉各用勇者可使進取怯者可使守城貪者可使捍禦廉者可使牧民向使叔齊守於西河豈能濟事吳起育民必無成功若使吳起而不重用則西河之功廢今之文武亦復如此取其搏噬之用不能得不重更任彼亦非為朝廷為之傅翼卿以朝廷為悖乃自甘之當思致悖所以卿云宜導之以節儉又云至治者必以淳素為先此言大善夫子言其身正不令而行其身不正雖令不從朕絶房室三十餘年無有淫佚朕頗自計不與女人同屋而寢亦三十餘年至於居處不過一床之地雕飾之物不入於宮此亦人所共知受生不飲酒受生不好音聲所以朝中曲宴未嘗奏樂此群賢之所觀見朕三更出理事隨事多少事少或中前得竟或事多至日昃方得就食日常一食若晝若夜無有定時疾苦之日或亦再食昔腰腹過於十圍今之瘦削裁二尺餘舊帶猶存非為妄說為誰為之救物故也書曰股肱惟人良臣惟聖向使朕有股肱可得中主今乃不免居九品之下不令而行徒虛言耳卿今慊言便罔知所答卿又云百司莫不奏事詭競求進此又是誰何者復是詭事今不使外人呈事於義可否無人廢職職可廢乎職廢則人亂人亂則國安乎以咽廢飧此之謂也若斷呈事誰尸其任專委之人云何可得是故古人云專聽生姦獨任成亂猶二世之委趙高元后之付王莽呼鹿為馬卒有閻樂望夷之禍王莽亦終移漢鼎卿云吹毛求疵復是何人所吹之疵擘肌分理復是何人乎事及深刻繩逐並復是誰又云治署邸肆何者宜除何者宜省國容戎備何者宜省何者未須四方屯傳何者無益何者妨民何處興造而是役民何處費財而是非急若為討召若為徵賦朝廷從來無有此事靜息之方復何者宜各出其事具以奏聞卿云若不及於時大息其民事至方圖知無及也如卿此言即時便是大役其民是何處所卿云國弊民疲誠如卿言終須出其事不得空作漫語夫能言之必能行之富國彊兵之術急民省役之宜號令遠近之法並宜具列若不具列則是欺罔朝廷空示頰舌凡人有為先須內省惟無瑕者可以戮人卿不得歷詆內外而不極言其事佇聞重奏當候省覽付之尚書班下海內庶亂羊永除害馬長息惟新之美復見今日梁書賀琛傳時任職者皆緣飾姦諂深害時政琛遂啓陳事條封奏高祖大怒召主書於前口授敕責琛敕貞陽侯淵明侯景志清鄴洛以雪讎恥其先率大軍隨機撫定汝等衆軍可止於寒山築堰引清水以灌彭城大水一沈孤城自殄慎勿妄動南史五十一梁宗室傳武帝既納侯景大舉北侵以明為都督水陸諸軍趣彭城大圖進取敕
