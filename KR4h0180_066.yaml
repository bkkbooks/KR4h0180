body:
  text: 庾肩吾為武陵王謝拜儀同章臣宅慶紫霄聯休皇極地均指日既無迹而成高仕若乘風故不行而自遠今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邊非勞七戰豈能屯兵大夏封萬里之侯飛箭聊城受千金之壽論其才望有懼茂弘先佩印綬常羞叔度藝文類聚四十七御覽二百四十三為寧國公讓中書郎表臣聞陟彼太行伯后之車屢怠望茲吳坂少游之馬難躋是知美非流水立致摧轅駿靡浮雲便期頓轡起登天漢寧陪九萬之風坐濟星橋非使千年之翼豈有幼稱辨慧足對元禮弱標俊穎能嘲子叔玉重組長空見休寵深宮邃宇孰知懷憂藝文類聚四十八初學記十一御覽二百二十為南康王讓丹陽尹表臣聞劍鏤七星非有司天之用簾圖五嶽寧識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國幸聞其讓石門之水獲免于貪藝文類聚五十御覽二百五十二謝曆日啓淩渠所奏弦望既符鄧平之言錙銖皆合登臺視朔覩雲物之必書拂管移灰識權衡之有度初開卷始暫謂春留末覽篇終便傷冬及徘徊厚渥比日為年藝文類聚五謝賚銅硯筆格啓煙磨青石已賤孔氏之壇管撫銅龍還笑王生之璧西域胡人臥織成之金簟遊仙童子隱芙蓉之行障莫不竝出梁園來頒狹室藝文類聚五十八初學記二十一謝東宮賜宅啓肩吾居異道南才非巷北流寓建春之外寄息靈臺之下豈望地無湫隘里號乘軒巷轉幡旗門容幰蓋況乃交垂五柳若元亮之居夾石雙槐似安仁之縣卻瞻鍾阜前枕洛橋池通西舍之流窗映東鄰之棗來歸高里翻成侍封之門夜坐書臺非復通燈之壁才下應王禮加溫阮官成名立無事非恩藝文類聚六十四謝東宮示古迹啓竊以仙巖遺傳入握成塵孔壁藏文隨開已蠹石書有暗廚畫猶飛豈有迹經四代年踰十紀芝英雲氣之巧未損松鉛鵲反鸞驚之勢不侵蒲竹必使酒肆來人池流色變將損北海之牘還代西河之𥳑藝文類聚七十四謝東宮賚內人春衣啓階邊細草猶推綟葉之光戶前桃樹反訝藍花之色遂得裾飛合燕領鬭分鸞試顧采薪皆成留客藝文類聚六十七謝東宮賚米啓滍水鳴蟬香聞七里瓊山合穎租歸十縣肩吾人慚振藻徒降雲閒之松職濫便繁空撤家丞之俸成珠委地事重逢仙游玉為糧珍踰入楚雖復激水滄流不待濫河之說春風掃地方誚文學之篇藝文類聚七十二謝湘東王賚米啓竊以月滿則虧恩來無爽海潮雖大萬江恆注遂使連箱委地不殊陽翟盈倉接宇寧異海陵藝文類聚七十二謝謝賚炭啓識慚曼倩似見昆明之灰清愧伯鸞不復因人之熱白孔六帖謝賚粳米啓出梁國之租兼水陸之殊品伊尹說而不至石崇豪所未及遇處默之得賓同苻朗之舉著長河可塞上德無酬謝湘東王賚米啓味重新城香踰潦水連舟入浦似彥伯之南歸積地為山疑馬援之西至不待候沙同新渝之再熟無勞拜石均遼倉之重滿前恩未遠次渥仍流墨翟假以故書裴楷慚其國賜答湘東王賚粳米啓竊以農夫力耕時逢儉歲疏賤待澤必取豐年椓斛瀉珠嘉聞陶量翻庭委玉欣見馬圖竝藝文類聚八十五答陶隱居賚朮煎啓竊以緑葉抽條生于首峰之側紫花標色出自鄭岩之下百邪外禦六府內充山精見書華神在籙朮榮火謝盡采擷之難啓旦移申窮淋漉之劑故能競爽雲珠爭奇水玉自非身疲掌硯役倦攀桃豈可立致還年坐生羽翼臨洗丹井方覺可捐酈縣菊泉無勞復汲庶得遨遊海岸追涓子之塵馳騖霍山共陳生為侶謠俗輕施尚曰難酬出世鴻恩寧知上報藝文類聚八十一答陶隱居賚朮蒸啓味重金漿芳踰玉液足使芝慚九明丹愧芙蓉坐致延生伏深銘戴藝文類聚八十一大觀本草六謝賚菱啓上林紫水雜蘊藻而俱浮雲夢清池閒芙蓉而外發珍踰百味來薦畫盤恩重千金遂沾菲席淩霜朱橘愧此開顏含露蒲桃慚其不䬼藝文類聚八十二謝武陵王賚絹啓肩吾啓蒙賚絹二十匹清河之珍丘園慚其束帛關東之妙潛織陋其卷綃下官謬奉扁舟暫瞻還旆而天人渥盻增餘論之榮江漢安流無泝洄之阻遂使鶴露宵凝輕絺立變雁風朝急冶服成溫有謝筆端無辭陳報不任下情謹奉啓事謝聞謹啓初學記二十七又略見藝文類聚八十五謝武陵王賚白綺綾啓圖雲緝鶴鄴市稀逢寫霧傅花叢臺罕遇雖復馬均騁思比巧猶慚虞卿受金方恩未重比扁舟獨反燕路有心載寶言歸銜珠無日藝文類聚八十五謝賚梨啓睢陽東苑子圍三尺新豐箭谷枝懸六斤未有生因粉水産自銅丘影連鄧橘林交苑柿遠薦中廚爰頒下室事同靈棗有願還年恐似仙桃無因留核藝文類聚八十六謝湘東王賚甘啓名傳地理遠自武陵之洲族茂神經遙聞建春之嶺王逸為賦取對荔枝張衡制辭用連石蜜足使萍實非甜蒲萄猶䬼藝文類聚八十六初學記二十八謝賚橘啓光分璇宿影接銅峰去青馬之迢遞服朱闉之爽塏楚原洪筆頌記不遷陳王麗藻賦稱遙植昔朝歌季重才賜海魚大理元常止蒙秋菊藝文類聚八十六謝賚朱櫻啓成叢殿側猶連製賦之條結實西園非復粘蟬之樹異合浦之歸來疑藏朱實同秦人之逐彈似得金丸藝文類聚八十六初學記二十八謝東宮賚栗啓查或火成鑽以為屑奈稱煎用曝而成糗未若北燕巨實用奪榮枯南國脯山翻慚齒決承恩踴躍對聞喜之河念報屏營問知來之鳥藝文類聚八十七謝賚林檎啓丹徒故苑歲綿長而不見岷山舊植路重阻而來難未有徙核圓丘移根閬坂仙廚始摘猶青玉之盤下賤爰頒遂入抽蒲之座藝文類聚八十七謝賚檳榔啓形均緑竹詎掃山壇色譬青桐不生空井事踰紫奈用兼芳菊方為口實永以蠲痾謝東宮賚檳榔啓無勞朱實兼荔枝之五滋能發紅顏類芙蓉之十酒登玉案而上陳出珠盤而下逮澤深溫奈恩均含棗藝文類聚八十七答餉綾綺書潔同雪霜華踰紵綺長裾可曳無愧王門之賓廣袖將裁翻有城中之製藝文類聚八十五東宮玉帳山銘玉帳寥廓崑山抵鵲總葉成帳連枝起幕玉蕊難徙金花不落隱士彈琴仙人看博巖留故鼎竈聚新荊煮石初爛燒丹欲成桑田屢盡海水頻傾長聞鳳笛永聽簫聲藝文類聚七又見文苑英華七百八十七以為庾信作團扇銘武王玄覽造扇于前班生贍博白綺仍傳裁筠比霧裂素輕蟬片月內掩重規外圓炎隆火正石鑠沙煎清逾蘋末瑩等寒泉恩深難恃愛極則遷秋風颯至篋笥長捐勒銘華扇敢薦夏筵藝文類聚六十九書品序玄靜先生曰豫遍求邃古逖訪厥初書名起于玄洛字勢發于倉史故遺結繩取諸文象諸形會諸人事未有廣此緘縢深茲文契是以一畫加大天尊可知乙力增土地卑可審日以君道則字勢圓月以臣輔則文體缺及其轉注假借之流指事會意之類莫不狀範毫端形呈字表開篇玩古則千載共朝削𥳑傳今則萬里對面記善則惡自削書賢則過必改玉曆頒正而化俗帝載陳言而設教變通不極日用無窮與聖同功參神竝運爰洎中葉捨煩從省漸失潁川之言竟逐雲陽之字若乃鳥迹孕于古文壁書存于科斗符陳帝璽摹調蜀漆署表宮門銘題禮器魚猶捨鳳鳥已分蟲仁義起于麒麟威形發于龍虎雲氣時飄五色仙人還作兩童龜若浮溪蛇如赴穴流星疑燭垂露似珠芝英轉車飛白掩素參差倒薤既思種柳之謠長短懸針復想定情之製蚊腳傍低鵠頭仰立填飄板上謬起印中波回墮鏡之鸞楷顧雕陵之鵲竝以篆籀重復見重昔時或巧能售酒或妙令鬼哭信無味之奇珍非趨時之急務且具録前訓今不復兼論惟草正疏通專行于世其或繼之者雖百代可知尋隸體發源秦時隸人下邳程邈所作始皇見而重之以奏事繁多篆字難製遂作此法故曰隸書今時正書是也草勢起于漢時解散隸法用以赴急本因草創之義故曰草書建初中京兆杜操始以善草知名今之草書是也余自少迄長留心茲藝敏手謝于臨池鋭意同于削板而蕺山之扇竟未增錢淩雲之臺無因誡子求諸古迹或有淺深輒刪善草隸者一百二十八人伯英以稱聖居首法高以追駿處末推能相越小例而九引類相附大等為三復為略論總名書品書品論一上之上張芝伯英鍾繇元常王羲之逸少論曰隸既發源秦史草乃激流齊相跨七代而彌遵將千載而無革誠開博者也均其文總六書之要指其事籠八體之奇能拔篆籀于繁蕪移楷真于重密分行紙上類出繭之蛾結畫篇中似聞琴之鶴峰崿間起瓊山慚其斂霧漪瀾遞振碧海愧其下風抽絲散水定其下筆倚刀較尺驗于成字真草既分于星芒烈火復成于珠佩或橫牽豎掣或濃點輕拂或將放而更留或因挑而還置敏思藏于胸中巧意發于毫銛詹尹端策故以迷其變化英韶傾耳無以察其音聲殆善射之不注妙斫輪之不傳是以鷹爪含利出彼兔毫龍管潤霜遊茲蠆尾學者鮮能具體窺者罕得其門若探妙測深盡形得勢烟華落紙將動風彩帶字欲飛疑神化之所為非人世之所學惟張有道鍾元常王右軍其人也張工夫第一天然次之衣帛先書稱為草聖鍾天然第一工夫次之妙盡許昌之碑窮極鄴下之牘王工夫不及張天然過之天然不及鍾工夫過之羊欣云貴越群品古今莫二兼撮衆法備成一家若孔門以書三子入室矣允為上之上書品論二上之中崔瑗子玉杜度伯度師宜官張昶文舒王獻之子敬崔子玉擅名北中迹罕南度世有得其摹者王子敬見之稱美以為功類伯英杜度濫觴于草書取奇于漢帝詔復奏事皆作草書師宜官鴻都為最能大能小文舒聲劣于兄時云亞聖子敬泥帚早驗天骨兼以掣筆復識人工一字不遺兩葉傳妙此五人允為上之中書品論三上之下索靖幼安梁鵠孟皇韋誕仲將皇象休明胡昭孔明鍾會士季衛瓘伯玉荀輿長胤阮研文機論曰幼安斂蔓舅氏抗名衛令孟皇功盡筆力字入帳中仲將不妄染毫必須張筆而左紙孔明動見模楷所為胡肥而鍾瘦休明斟酌二家聯駕八絶士季之範元常猶子敬之稟逸少而工拙兼效真草皆成伯玉遠慕張芝近參父迹長胤狸骨方擬而難逮阮研居今觀古盡窺衆妙之門雖復師王祖鍾終成別構一體此九人允為上之下書品論四中之上張超子竝郭伯道劉德升君嗣崔實子真衛夫人名鑠字茂猗李式景則庾翼稚恭郗愔方回謝安安石王珉季琰桓玄敬道羊欣敬元王僧虔孔琳之彥琳殷鈞季和論曰子竝崔家州里頗相倣效可謂醬鹹于鹽冰寒于水伯道里居朝廷遠討其迹德升之妙鍾胡各採其美子真俊才門法不墜李妻衛氏自出華宗景則毫素流靡稚恭聲彩遒越郗愔安石草正竝驅季琰桓玄筋力俱駿羊欣早隨子敬最得王體孔琳之聲高宋氏王僧虔雄發齊代殷均頗耽愛好終得肩隨此一十五人允為中之上書品論五中之中魏武帝曹操孟德吳主元宗孫晧衛覬伯儒左子邑伯字衛恆巨山杜預元凱王廙世將張彭祖任靖韋旭文休王修敬仁范懷約張永景初吳休尚施方泰論曰魏帝筆墨雄贍吳主體裁綿密伯儒兼敘隸草子邑分鑣梁邯巨山三世元凱纍葉王廙為右軍之師彭祖取羲之之道任靖矯名文休題柱敬仁清舉致畏逼之詞張范逢時俱東南之美施吳鄴下後生同年拔萃此十五人允為中之中書品論六中之下羅暉叔景趙襲元嗣劉輿張昭子布陸機士衡朱誕王導茂弘庾亮元規王洽敬和郗超敬輿張翼君徂宋文帝劉義隆康昕徐希秀謝朓玄暉劉繪士章陶隱居弘景王崇素論曰叔景元嗣竝稱西州劉輿之筆札張昭之無懈陸機以弘才掩迹朱誕以偏藝流聲王導則列聖推能庾亮則群公挹巧王洽以竝通諸法郗超以晚年取譽張翼善效宋帝康昕希秀孤生謝朓劉繪文宗書範近來少前陶隱居仙才翰彩拔于山谷王崇素繪靡倫書筆傳于里閭此十八人允為中之下書品論七下之上姜詡梁宣韋秀鍾輿向泰羊忱晉元帝景文識道人范曄蔚宗宗炳王薈敬文謝靈運蕭思話薄紹之敬叔齊高帝紹伯庾黔婁子貞費元瑤孫奉伯羊祜叔子論曰此十九人並擅毫翰動成楷則殆逼前良見希後彥允為下之上書品論八下之中陽經諸葛融楊潭張炳岑淵張輿王濟李夫人劉穆之道和朱齡石伯兒庾景休張融思光褚元明孔敬通王籍文海論曰此十五人雖未窮字奧書尚文情披其叢薄非無香草視其涯岸皆有潤珠故遺斯紙以為世玩允為下之中書品論九下之下衛宣李韞陳基傅庭堅張陰光韋熊少季張畼曹任宋嘉裴邈羊固謝晦宣明傅夫人辟閭訓徐羡之宗文孔閭顏寶光周仁皓張欣泰張熾僧嶽道人論曰此二十二人皆五味一和五色一彩視其雕文非特刻鵠人人下筆寧止追嚮遺迹見珍餘芳可折誠以驅馳竝駕不逮前鋒而中權後殿各盡其美允為下之下書品後序今以九例該此衆賢猶如玄圃積玉炎洲聚桂其中實相推謝故有茲多品然終能振此鱗翼俱上龍門倘後之學者更隨點曝云爾七録序日月貞明匪光景不能垂照嵩華載育非風雲無以懸感大聖挺生應期命世所以匡濟風俗矯正彝倫非夫丘素墳典詩書禮樂何以成穆穆之功致蕩蕩之化也哉故洪荒道喪帝昊興其爻畫結繩義隱皇頡肇其文字自斯以往沿襲異宜功成治定各有方冊正宗既殄樂崩禮壤先聖之法有若綴旒故仲尼歎曰大道之行也與三代之英丘未逮也而有志焉夫有志以為古文猶好也故自衛反魯始立素王于是刪詩書定禮樂列五始于春秋興十翼于易道夫子既亡微言殆絶七十竝喪大義遂乖逮于戰國殊俗異政百家競起九流互作嬴政嫉之故有坑焚之禍至漢惠四年始除挾書之律其後外有太常太史博士之藏內有延閣廣內祕室之府開獻書之路置寫書之官至孝成之世頗有亡逸乃使謁者陳農求遺書于天下命光祿大夫劉向及子俊歆等讎校篇籍每一篇已輒録而奏之會向亡喪帝使歆嗣其前業乃徙溫室中書于天祿閣上歆遂總括群篇奏其七略及後漢蘭臺猶為書部又于東觀及仁壽闥撰集新記校書郎班固傅毅竝典祕籍固乃因七略之辭為漢書藝文志其後有著述者袁山松亦録在其書魏晉之世文籍逾廣皆藏在祕書中外三閣魏祕書郎鄭默刪定舊文時之論者謂為朱紫有別晉領祕書監荀勖因魏中經更著新簿雖分為十有餘卷而總以四部別之惠懷之亂其書略盡江左草創十不一存後雖鳩集淆亂已甚及著作佐郎李充始加刪正因荀勖舊簿四部之法而換其乙丙之書沒略衆篇之名總以甲乙為次自時厥後世相祖述宋祕書監謝靈運丞王儉齊祕書丞王亮監謝朏等竝有新進更撰目録宋祕書殷淳撰大四部目儉又依別録之體撰為七志其中朝遺書收集稍廣然所亡者猶大半焉齊末兵火延及祕閣有梁之初缺亡甚衆爰合祕書監任昉躬加部集又于文德殿內別藏衆書使學士劉孝標等重加校進乃分數術之文更為一部使奉朝請祖𣈶撰其名録其尚書閣內別藏經史雜書華林園又集釋氏經論自江左篇章之盛未有踰于當今者也孝緒少愛墳籍長而弗倦臥病閒居傍無塵雜晨光才啓緗囊巳散宵漏既分緑袠方掩猶不能窮究流略探盡祕奧每披録內省多有缺然其遺文隱記頗好搜集凡自宋齊巳來王公搢紳之館苟能蓄聚墳籍必思致其名簿凡在所遇若見若聞校之官目多所遺漏遂總集衆家更為新録其方內經史至于術伎合為五録謂之內篇方外佛道各為一録謂之外篇凡為録有七故名七録昔司馬子長記數千年事先哲愍其勤雖復稱為良史猶有捃拾之責況總括群書四萬餘卷皆討論研核標判宗旨才愧疏通學慚博達靡班嗣之賜書微黃香之東觀儻欲尋檢內寡卷軸如有疑滯傍無沃啓其為紕繆不亦多乎將恐後之罪豫者豈不在于斯録論其指歸辨其訛謬隨竟奏上皆載在本書時又別集衆録謂之別録即今之別録是也子歆撮其指要著為七略其一篇即六篇之總最故以輯略為名次六藝略次諸豫略次詓賦略次兵書略次數術略次方伎略王儉七志改六藝為經典次諸子次詩賦為文翰次兵書為軍書次數術為陰陽次方伎為術藝以向歆雖云七略實大六條故別立圖譜一志以全七限其外又條七略及二漢藝文志中經簿所闕之書并方外之經佛經道經各為一録雖繼七志之後而不在其數今所撰七録斟酌王劉王以六藝之稱不足標榜經目改為經典今則從之故序經典録為內篇第一劉王竝以衆史合于春秋劉氏之世史書甚寡附見春秋誠得其例今衆家記傳倍于經典猶從此志實為繁蕪且七略詩賦不從六藝詩部蓋由其書既多所以別為一略今依擬斯例分出衆史序記傳録為內篇第二諸子之稱劉王並同又劉有兵書略王以兵字淺薄軍言深廣故改兵為軍竊謂古有兵革兵戎治兵用兵之言斯則武事之總名也所以還改軍從兵兵書既少不足別録今附于子末總以子兵為稱故序子兵録為內篇第三王以詩賦之名不兼餘制故改為文翰竊以頃世文詞總謂之集變翰為集于名尤顯故序文集録為內篇第四王以數術之稱有繁雜之嫌故改為陰陽方伎之言事無典據又改為藝術竊以陰陽偏有所繫不如數術之該通術藝則濫六藝與數術不逮方伎之要顯故還依劉氏各守本名但房中神仙既入仙道醫經經方不足別創故合術伎之稱以名一録為內篇第五王氏圖譜一志劉略所無劉數術中雖有曆譜而與今譜有異竊以圖畫之篇宜從所圖為部故隨其名題名附本録譜既注記之類宜與史體相參故載于記傳之末自斯已上皆內篇也釋氏之教實被中土講說諷味方軌孔籍王氏雖載于篇而不在志限即理求事未是所安故序佛法録為外篇第一仙道之書由來尚矣劉氏神仙陳于方伎之末王氏道經書于七志之外今合序仙道録為外篇第二王則先道而後佛今則先佛而後道蓋所宗有不同亦由其教有淺深也凡內外兩篇合為七録天下之遺書祕記庶幾窮于是矣有梁普通四年歲維單閼仲春十有七日于建康禁中里宅始述此書通人平劉杳從余遊因說其事杳有志積久未獲操筆聞余已先著鞭欣然會意凡匠鈔集盡以相與廣其聞見實有力焉斯亦康成之于傳釋盡歸之慎之書也古今書最七略書三十八種六百三家一萬三千二百一十九卷五百七十二家亡三十一家存漢書藝文志書三十八種五百九十六家一萬三千三百六十九卷五百五十二家亡四十四家存袁山松後漢藝文志書案此下當有脫文八十七家亡晉中經簿四部書一千八百八十五部二萬九百三十五卷其中十六卷佛經書簿少二卷不詳所載多少一千一百一十九部亡七百六十六部存晉元帝書目四部三百五袠三千一十四卷晉義熙四年祕閣四部目録案此下當有脫文宋元嘉八年祕閣四部目録一千五百六十四袠一萬四千五百八十二卷五十五袠四百三十八卷佛經宋元徽元年祕閣四部書目録二千二十袠一萬五千七十四卷齊永明元年祕閣四部目録五千新足合二千三百三十二袠一萬八千一十卷梁天監四年文德正御四部及術數書目録合二千九百六十八袠二萬三千一百六卷祕書丞殷鈞撰祕閣四部書少于文德書故不録其數也新集七録內外篇圖書凡五十五部六千二百八十八種八千五百四十七袠四萬四千五百二十六卷六千七十八種八千二百八十四袠四萬三千六百二十四卷經書二百三種二百六十三袠八百七十九卷圖符內篇五録四十六部三千四百五十三種五千四百九十三袠三萬七千九百八十三卷三千三百一十八種五千三百六袠三萬七千一百八卷經書一百三十五種一百八十七袠七百七十五卷圖也外篇二録九部二千八百三十五種三千五十四袠六千五百三十八卷二千七百五十九種五千九百七十八袠六千四百三十四卷經書七十六種七十八袠一百卷符圖經典録內篇一易部六十四種九十六帙五百九十卷尚書部二十七種二十八帙一百九十卷詩部五十二種六十一帙三百九十八卷禮部一百四十種二百一十一帙一千五百七十卷樂部五種五帙二十五卷春秋部一百一十一種一百三十九帙一千一百五十三卷論語部五十一種五十二帙四百一十六卷孝經部五十九種五十九帙一百四十四卷小學部七十二種七十二帙三百一十三卷右九部五百九十一種七百一十帙四千七百一十卷記傳録內篇二國史部二百一十六種五百九帙四千五百九十六卷注曆部五十九種一百六十七帙一千二百二十一卷舊事部八十七種一百二十七帙一千三十八卷職官部八十一種一百四帙八百一卷儀典部八十種二百五十二帙二千二百五十六卷法制部四十七種九十五帙八百八十六卷僞史部二十六種二十七帙一百六十一卷雜傳部二百四十一種二百八十九帙一千四百四十六卷鬼神部二十九種三十四帙二百五卷土地部七十三種一百七十一帙八百六十九卷譜狀部四十二種四百二十三帙一千六十四卷簿録部三十六種六十二帙三百三十八卷右十二部一千二十種二千二百四十八帙一萬四千八百八十八卷子兵録內篇三儒部六十六種七十五帙六百四十卷道部六十九種七十六帙四百三十一卷陰陽部一種一帙一卷法部十三種十五帙一百一十八卷名部九種九帙二十三卷墨部四種四帙一十九卷縱橫部二種二帙五卷雜部五十七種二百九十七帙二千三百三十八卷農部一種一帙三卷小說部十種十二帙六十三卷兵部五十八種六十一帙二百四十五卷右一十一部二百九十種五百五十三帙三千八百九十四卷文集録內篇四楚辭部五種五帙二十七卷別集部七百六十八種八百五十八帙六千四百九十七卷總集部十六種六十四帙六百四十九卷雜文部二百七十三種四百五十一帙三千五百八十七卷右四部一千四十二種一千三百七十五帙一萬七百五十五卷術伎録內篇五天文部四十九種六十七帙五百二十八卷緯讖部三十二種四十七帙二百五十四卷曆笇部五十種五十帙二百一十九卷五行部八十四種九十三帙六百一十五卷卜筮部五十種六十帙三百九十卷雜占部十七種十七帙四十五卷刑法部四十七種六十一帙三百七卷醫經部八種八帙五十卷經方部一百四十種一百八十帙一千二百五十九卷雜藝部十五種十八帙六十六卷右十部五百五種六百六帙三千七百三十六卷案已上內篇每録總數多與每部下數不合外篇之仙道録亦然皆弘明集傳寫之誤也今無以知為孰是仍其舊而録之佛法録三卷外篇一戒律部七十一種八十八帙三百二十九卷禪定部一百四種一百八帙一百七十六卷智慧部二千七十七種二千一百九十帙三千六百七十七卷疑似部四十六種四十六帙六十卷論記部一百一十二種一百六十四帙一千一百五十八卷右五部二千四百一十種二千五百九十六帙五千四百卷仙道録外篇二經戒部二百九十種三百一十八帙八百二十八卷服餌部四十八種五十二帙一百六十七卷房中部十三種十三帙三十八卷符圖部七十種七十六帙一百三卷右四部四百二十五種四百五十九帙一千一百三十八卷文字集略一帙三卷序録一卷正史刪繁十四帙一百三十五卷序録一卷高隱傳一帙十卷序例一卷古今世代録一帙七卷序録二帙一十一卷雜文一帙十卷聲緯一帙一卷右七種二十一帙一百八十一卷案此數亦不合說見前阮孝緒撰不足編諸前録而載于此廣弘明集三高隱傳論夫至道之本貴在無為聖人之跡存乎拯斃斃拯由跡跡用有乖于本本既無為為非道之至然不垂其跡則世無以平不究其本則道實交喪丘旦將存其跡故宜權晦其本老莊但明其本亦宜深抑其跡跡既可抑數子所以有餘本方見晦尼丘是故不足非得一之士闕彼明智體之之徒獨懷鑒識然聖已極照反創其跡賢未居宗更言其本良由跡須拯世非聖不能本實明理在賢可照若能體茲本跡悟彼抑揚則孔莊之意其過半矣梁書阮孝緒傳
