body:
  text: 沈約齊武帝謚議臣聞天德平分而四時之名或異聖功一揆而皇王之稱不同蓋跡因隨事名由義立堯臣禹佐咸率茲典伏惟盡寂窮微含神獨照德茂始裳之主道冠初耜之君含精靈於五緯駕貞明於三象初九勿用英氣淩雲負揭日月抑揚霄漢龍姿鳳采煥若麗天登庸在試盛績雲舉雖屈景潢汙降情尺木而拯世濟民浚發懷抱昔成湯百家仁被比屋文王十里化先寡妻前聖後賢重規沓矩震雄圖於九江播靈威於夏汭旌旆未麾鯨鯢自殞弗勞羌僰之長無待六事之人義等伐謀功高善陣建有國之符成定鼎之業會朝清明事資於牧野受命作周非止於西伯視瞻寢門孝德光備守器宗祧元良載遠嗣大寶以君百辟敷景化以致隆平守在四夷威行海內囹圄寂寞禮讓交興八柄馭下九官咸事臨朝凝默尊嚴若神風行日烜無思不暢至仁與造化爭流靈威與雷霆齊軌上貫蒼昊下洞深泉春無淒風夏無苦雨時若罔愆多稔如積三革不累五刃不砥庠塾大啟儒雅雲集訓閱得宜蒐狩有序丹徼青丘之野跂踵反舌之民浮深駕阻迴首革面北夷畏力獻琛內款不藉終軍之使無假絕漠之威嘉祥霧合秘瑞泉涌史不輟文簡無虛日方當垂七曜之旗駕八龍之乘望禮中嶽肆覲群后造化不仁穆卜愆應慕切遺弓哀同遏密晦朔不居殯宮將啟勒茲大名宜盡徽極藝文類聚十四齊明帝謚議臣聞君德靡二辟王之名不一聖功無爽堯禹之稱或殊兼以拯世寍亂致平未必同道崇墠增祧嘉號不可相襲伏惟自天誕睿英聖在躬皇矣之符夙著蒸哉之謠早集賓門納揆天平地成自南自北無思不韙在屬負圖導揚末命值嗣主狂凶人倫道盡宗社阽危瞻烏靡託國難立長亂極治刑四海樂推三靈以眷東向而讓天下功高代入流涕而膺寶位如就重負日昃劬勞躬親庶事撫辜納隍之念義同於罪己振民厚下之情無廢於終食聰明神武逖聽邇聞萬目備張紘綱靡漏御轡不迷寍藉聽於襄野大川可濟不待備於舟楫崢嶸之下澤靡不懷寥廓之上明無不燭包以宇宙潤以風雨霜露所交人跡所至百姓仰之而不知其始萬物用之而罔識其終上庠廢業忽焉已久三載弗為淪弛將及臨朝引領思隆雅訓貴遊胥萃俊造成群方將驅世反本既仁且壽告成東嶽高宴汾陽造化不仁厭世云及放勛之慕不追負鄉之思空遠殯宮將撤輴軫難留英聲茂實於是乎在藝文類聚十四梁武帝郄后謚議表號垂名義昭不朽先皇后應祥月德比載坤靈柔範陰化儀形自遠俔天作合義先造舟而神猷夙掩所隔升運宜式遵景行用昭大典謹按謚法忠和純備曰德貴而好禮曰德宜崇曰德皇后梁書高祖郄皇后傳梁正會乘輿議正會儀注御出乘輿至太極殿前納舄升階尋路寢之設本是人君居處不容自敬宮室案漢氏則乘小車升殿請自今元正及大公事御宜乘小輿至太極階仍乘版輿升殿隋書禮儀志四天監六年尚書僕射沈約議詔可又見通典七十謝勑賜冰啟竊惟司寒輟響眇自前代凌室曠官歷茲永久聖功闡物逸典備甄窮深既採園池靡用有籍羔秬無災霜雹藝文類聚九謝賜甘露啟約言左右徐儼宣勑垂賜法音寺松葉上甘露臣往年經見不過霑條而已時或凝結纔若輕霧未有玉聚珠聯光粲若是實由積仁上通冥德下降故能委華宵極雰被後彫慈旨曲洽頒此祥賚不任欣荷謹以啟事謝以聞臣約言初學記二賀齊明帝登祚啟竊惟皇源浚遠帝寶連暉基深慶厚道貫萬葉而鬱林凶德早樹行悖人經逖聽之所未書宗廟之殆如綴百靈聳動九服迴遑結后來之望思庇民之主日月以冀遐邇翹心伏惟陛下大聖在躬君德夙表龍章日綵煥若麗天納麓賓門道風遐被眷化神行無思不洽獄訟允歸天人戴仰屈飛龍之眇轡紆汾陽之遠情運堯心以臨億兆敷舜烈以膺寶命雖中宗之興殷道宣后之隆漢德異世同符千載一揆刑措之業方遠隆平之基在焉率土含欣懷生戴賴況臣早蒙覆潤夙荷恩靈踊躍外畿心不勝慶謹縃民和式流皇澤塗歌里抃載懷鳧藻藝文類聚十四謝齊竟陵王教撰高士傳啟竊聞高尚其事義光爻象賢者避世聲煥典墳豈徒激貪勉競澡身浴德而已爾乃大弘義訓百代通風是以梁鴻蘇伯記遠迹於前叔夜士安書高塵於後雖去取異情群略殊軫而獨行必彰斥言罔極貞操與日月俱懸孤芳隨山壑共遠明公得一含道體二居宗迹屈巖廊之下神遊江海之上愛奇商洛訪美東都蓋欲隱顯齊功出處同致巢由與伊旦並流三辟與四門共軌肅奉明規思自罄勖藝文類聚三十七謝齊竟陵王示永明樂歌啟鳳綵鸞章霞鮮錦縟覿寶河宗未必比麗觀樂帝所遠有慚德雖日月在天理絕稱詠而徘徊光景不能自息藝文類聚四十三謝齊竟陵王賚母赫國雲氣黃綾裙襦啟竊以積絲成綵散繭騰花巧擅易水之間價貴叢臺之下民受祿為養霑荷彌深聖恩曲漸自葉流根複袖縕裾豈伊恆飾榮新之寵固難輕報藝文類聚六十七為東宮謝勑賜孟嘗君劍啟田文重氣徇名四豪莫及寶劍雄身故能威陵秦楚人高事遠遺物足奇謹加玩服以深存古之懷藝文類聚六十御覽三百四十四為皇太子謝賜御所射雉啟輕鑾微動密翳徐張黃間所彀矢無虛發南皮之獲未足稱工臣任惟守器事隔陪奉天慈曲降賜物頒禽藝文類聚六十六謝司徒賜北蘇啟曠阻陰山之外眇絕蒲海之東自非神力所引莫或輕至聖慈普洽遂遍芻薇停鑣懼喘既宏道於世務方駕四衢又興言於俗表藝文類聚七十二謝賜軫調絹等啟霜紈雪委霧縠冰鮮昔劉氏歸國未聞漢儲之禮曹植還蕃非降魏兩之賜恩愈枉道賁深束帛藝文類聚八十五謝女出門宮賜絹綺燭啟桓室金縷本非所議孟姬作具獨若未周慈澤曲臨珍華兼重製為美服隻綺易儔舉而不息三夜有待藝文類聚八十五謝勑賜絹葛啟素采冰華絺文霜潔變溽暑於閨閣起涼風於襟袖藝文類聚八十五謝賜交州檳榔啟龍編嘉實厥包遐遠為柳世隆謝賜樂遊胡桃啟挺自禁園味逾井絡動物迴祗在微必應此乃胡羯奔逃吉之先見者也藝文類聚八十七應詔進佛記序啟臣約言佛記序今謹以上呈詞義無取伏懷自恧謹啟廣弘明集十五上錢隨喜光宅寺啟伏惟中陽故里舂陵舊居夷漫滌蕩曾無遺築若使大教早流法尊二代開塔白水樹剎枌榆可以傳美垂跡迄今不朽藝文類聚七十七送育王像并上錢燭等啟竊以無名無色理絕應感不身即身猶觀願力惟願燈明道成長為八喜之侶菩提無上永廁千子之蹤同上謝齊竟陵王示華嚴瓔珞啟竊以六詩雨散百氏雲興或事止襃刺或義單小辨莫不雕風煙之氣狀流日月之英華明公該玄體妙凝神宙表廕法雲於六合揚慧日於九天因果悟其初心菩提證其後業陟無生之遠岸汎正水之安流受三遠十號之尊崇建四辨八聲之妙極法身與金剛齊固常住與至理俱存藝文類聚七十七荅釋法雲書難范縝神滅論神本不滅久所服膺神滅之談良用駭惕近約法師殿內出亦蒙敕荅臣下一本懽受頂戴尋覽忘疲豈徒伏斯外道可以永摧魔眾孔釋兼弘於是乎在實不刊之妙旨萬代之舟航弟子亦即彼論微厝疑覈比展具以呈也沈約呈弘明集十荅樂藹書丞相風道弘曠獨秀生民凝猷盛烈方軌伊旦憖遺之感朝野同悲承當刊石紀功傳華千載宜須盛述實允來談郭有道漢末之匹夫非蔡伯喈不足以偶三絕謝安石素族之台輔時無麗藻迄乃有碑無文況文獻王冠冕彝倫儀形㝢內自非一世辭宗難或與此約閭閈鄙人名不入第欻酬今旨便是以禮許人聞命慚顏已不覺汗之沾背也南齊書豫章王嶷傳荅庾光祿書忌日制假應是晉宋之間其事未久制假前止是不為宴樂本不自封閉如今世自處者也居喪再周之內每至忌日哭臨受弔無不見人之義而除服之後乃不見人實由世人以忌日不樂而不能竟日興感以對賓客故過自晦匿不與外接設假之由實在於此封氏聞見記六荅沈麟士書獨往之業雖聞前載高塵逸軌罕或共時未嘗不拊袠興懷望古遐矚尊賢拔俗遙然沈冥自遠幽貞之操義高篆策雖蔣詡不窺城市鄭真名動京師何遠之有名山既鄉內所豐清川又坐臥可對不出戶庭而與禽尚齊美哉約少不自涯早愛蟲鳥逐食推遷未諧夙願冀幽期可託克全素履與尊賢弋釣泉皋以慰閑暮則平生之心於此遂矣藝文類聚三十七與范述曾論竟陵王賦書夫眇汎滄流則不識涯涘雜陳鍾石則莫辨宮商雖復吟誦迴環編離字滅終無所辨仰酬睿旨微表寸長藝文類聚五十八初學記二十一與陶弘景書先生糠秕流俗超然獨遠烈電羽帶摠轡雲霞方當名書絳簡身遊玄闕憑星夕臥望日朝湌而至理深微曖焉難睹惟欲下風問道未知厥路若夫栖遲閑遠咀嚥瓊芝出入清都師友靈聖循崖反跡無缺惟心藝文類聚七十八報王筠書覽所示詩實為麗則聲和被紙光影盈字夔牙接響顧有餘慚孔翠群翔豈不多愧古情拙目每佇新奇爛然總至權輿已盡會昌昭發蘭揮玉振克諧之義寍比笙簧思力所該一至乎此歎服吟研周流忘念昔時幼壯頗愛斯文含咀之間倏焉疲暮不及後進誠非一人擅美推能實歸吾子遲比閑日清覯乃申梁書王筠傳報劉杳書生平愛嗜不在人中林壑之懽多與事奪日暮塗殫此心往矣猶獲少存閑遠徵懷清曠結宇東郊匪云止息政復頗寄夙心時得休偃仲長遊居之地休璉所述之美望慕空深何可髣髴君愛素情多惠以二贊辭采妍富事義畢舉句韻之間光影相照便覺此地自然十倍故知麗辭之益其事弘多輒當置之閣上坐臥嗟覽別卷諸篇並為名製又山寺既為警策諸賢從時復高奇解頤愈疾義兼乎此遲比聚會更共申析梁書劉杳傳荅陸厥書宮商之聲有五文字之別累萬以累萬之繁配五聲之約高下低昂非思力所舉又非止若斯而已也十字之文顛倒相配字不過十巧厤已不能盡何況復過於此者乎靈均以來未經用之於懷抱固無從得其髣髴矣若斯之妙而聖人不尚何邪此蓋曲折聲韻之巧無當於訓義非聖哲立言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宮羽之殊商徵之別雖知五音之異而其中參差變動所昧實多故鄙意所謂此祕未覩者也以此而推則知前世文士便未悟此處若以文章之音韻同弦管之聲曲則美惡妍蚩不得頓相乖反譬猶子野操曲安得忽有嘽緩失調之聲以洛神比陳思他賦有似異手之作故知天機啟則律呂自調六情滯則音律頓舛也士衡雖云炳若縟錦寍有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精麤輪扁不能言老夫亦不盡辨此南齊書陸厥傳與徐勉書吾弱年孤苦傍無朞屬往者將墜於地契闊屯邅困於朝夕崎嶇薄宦事非為已望得小祿傍此東歸歲逾十稔方忝襄陽縣公私情計非所了具以身資物不得不任人事永明末出守東陽意在止足而建武肇運人世膠加一去不反行之未易及昏猜之始王政多門因此謀退庶幾可果託卿布懷於徐令想記未忘聖道聿興謬逢嘉運往志宿心復成乖爽今歲開元禮年云至懸車之請事由恩奪誠不能弘宣風政光闡朝猷尚欲討尋文簿時議同異而開年以來病增慮切當由生靈有限勞役過差總此凋竭歸之暮年牽策行止努力祗事外觀傍覽尚似全人而形骸力用不相綜攝常須過自束持方可僶俛解衣一臥支體不復相關上熱下冷月增日篤取煖則煩加寒必利後差不及前差後劇必甚前劇百日數旬革帶常應移孔以手握臂率計月小半分以此推算豈能支久若此不休日復一日將貽聖主不追之恨冒欲表聞乞歸老之秩若天假其年還得平健才力所堪惟思是策梁書沈約傳與約法師書悼周捨周中書風趣高奇志託夷遠真情素韻水桂齊質自接彩同栖年逾一紀朝夕聯事靡日暫違每受沐言休逍遙寡務何嘗不北茨游覽南居宴宿春朝聽鳥秋夜臨風匪設空言皆為實事音容滿目言笑在耳宿草既陳楸檟將合眷往懷人情不勝慟此生篤信精深甘此藿食至于歲時包篚每見請求凡厥菜品必令以薦弟子輒靳而後與用為歡謔其事未遠其人已謝昔之諧調倏成悲緒去冬今歲人鬼見分石耳紫菜愴焉興想淚下不禁指遣恭送以充蔬僧一飯法師與周情期契闊非止恆交覽物存舊彌當楚切痛矣如何往矣奈何弟子沈約和南釋藏策五廣弘明集二十八上書今年殆差故爾始得此事至沈約白十一月十六日淳化閣帖四
