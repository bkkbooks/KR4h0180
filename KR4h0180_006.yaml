body:
  text: 武帝荅蕭穎冑書今坐甲十萬糧用自竭況所藉義心一時驍發事事相接猶恐疑怠若頓兵十旬必生悔吝童兒立異便大事不成今太白出西方仗義而動天時人謀有何不利處分已定安可中息昔武王伐紂行逆太歲復須待年月乎與何胤書想恆清豫縱情林壑致足懽也既內絕心戰外勞物役以道養和履候無爽若邪擅美東區山川相屬前世嘉賞是為樂土僕推遷簿官自東徂西悟言素對用成暌闋傾首東顧曷日無懷疇昔懽遇曳裙儒肆實欲臥遊千載畋漁百氏一行為吏此事遂乖屬以世道威夷仍離屯故投袂數千剋黜舋禍思得矚卷諮款寓情古昔夫豈不懷事與願謝君清襟素託棲寄不近中居人世殆同隱淪既俯拾青組又脫屣朱黻但理存用捨義貴隨時往識禍萌實為先覺超然獨善有識欽嗟今者為邦貧賤咸恥好仁由己幸無凝滯比別具白此未盡言今遣候承音息矯首還翰慰其引領梁書何胤傳高祖霸府建引胤為軍謀祭酒與書與諸王及吳平侯景書稱周捨弟捨立議引武王周公故事皆曰汝從之南史手書與蕭寶夤謝齊建安王寶夤亡兄長沙宣武王昔投漢中值北寇華陽地絕一隅內無素畜外絕繼援守危疏勒計踰田單卒能全土破敵以弱為彊使至之日君臣動色左右相賀齊明帝每念此功未嘗不輟箸咨嗟及至張永崔慧景事大將覆軍於外小將懷貳於內事危累卵勢過綴旒亡兄忠勇奮發旋師大峴重圍累日一鼓魚潰克定慧景功踰桓文亡弟衛尉兄弟戮力盡心內外大勳不報翻罹荼酷百口幽執禍害相尋朕於齊明帝外有龕敵之力內盡帷幄之誠日自三省曾無寸咎遠身邊外亦復不免遂遣劉山陽輕舟西上來見掩襲時危事迫勢不得已所以誓眾樊鄧會踰孟津本欲翦除梅蟲兒茹法珍等以雪冤酷拔濟親屬反身素里屬張稷王珍國已建大事寶晊子晉屢動危機迫樂推之心應上天之命事不獲已豈其始願所以自有天下絕棄房室斷除滋味正欲使四海見其本心耳勿謂今日之位是為可重朕之視此曾不如一芥雖復崆峒之蹤難追汾陽之志何遠而今立此堰卿當未達本意朕於昆蟲猶不欲殺亦何急爭無用之地戰蒼生之命也正為李繼伯在壽陽侵犯邊境歲月滋甚或攻小城小戍或掠一村一里若小相詶荅終無寍日邊邑爭桑吳楚連禍所以每抑鎮戍不與校計繼伯既得如此濫竊彌多今修此堰止欲以報繼伯侵盜之役既非大舉所以不復文移北土卿幼有倜儻之心早懷縱橫之氣往日卿於石頭舉事雖不克捷亦丈夫也今止河洛真其時矣雖然為卿計者莫若行率此眾襲據彭城別當遣軍以相應援得捷之後便遣卿兄子屏侍送卿國廟并卿室家及諸姪從若方欲還北更設奇計恐機事一差難復重集勿為韓信受困野雞魏書蕭寶夤傳荅陶弘景書四首近二卷欲少留差不為異紙卷是出裝書既須見前所以付耳無正可取備於此及欲更須細書如論箴例逸少迹無甚極細書樂毅論乃微麤健恐非真跡太師箴小復方媚筆力過嫩書體乖異二者已經至鑒其外便無可付也道藏本陶隱居集又省別疏云故當宜微以著賞此既勝事雖風訓非嫌云云然非所習聊試略言夫運筆邪則無芒角執手寬則書緩弱點撇短則法擁腫點撇長則法離澌畫促則字橫畫疏則形慢拘則乏勢放又少則純骨無媚純肉無力少墨浮澀多墨笨鈍比並皆然任意所之自然之理也若抑揚得所趣舍無違值筆連斷觸勢峰鬱揚波折節中規合矩分閒下注濃纖有方肥瘦相和骨力相稱婉婉曖曖視之不足稜稜凜凜常有生氣適眼合心便為甲科眾家可識亦當復貫串耳六文可工亦當復由習耳一聞能持一見能記且古且今不無其人大抵為論終歸是習程邈所以能變書體為之舊也張芝所以能善書工學之積也既舊既積方可以肆其談吾少來乃至不嘗畫甲子無論於篇紙老而言之亦復何謂正足見嗤於當今貽笑於後代遂有獨冠之言覽之背熱隱真於是乎累真矣此直一蓺之工非吾所謂勝事此道心之塵非吾所謂無欲也道藏本陶隱居集又略見御覽七百七十八省區別諸書良有精賞所異同所可未知悉可否耳給事黃門二紙為任竫書觀所送竫書諸字相附彼二紙竫書體解雜便當非竫書要復當以點畫波撇論極諸家之致此亦非可倉卒運於毫楮且保拙守中也許任二迹并摹者並付反道藏本陶隱居集鍾書乃有一卷傳以為真意謂悉是摹學多不足論有兩三行許似摹微得鍾體逸少學鍾的可知近有二十許首此外字細畫短多是鍾法今欲令人帖裝未便得付來月有竟者當遣送也同上荅陶弘景書知欲徙卜想諮請幽勝謀及蓍龜但遷徙之日為當使人為當使鬼猶躡蹻因地其不滅也同上荅陶弘景進周氏冥通記書省疏并見周氏遺跡真言顯然符驗前誥二三明白益為奇特四卷今留之見淵文并具一二唯增讚歎同上與某書數朝腳氣轉動不得多有憂懸情也二謝處委曲復當有情故舊數有書問否可復有興也知何時再言話報之淳化閣帖一眾軍行人最今封如別曹郢州近遣樊士真領三百人猶在漁湖其應用行合應有四千人故指白蕭衍疏淳化閣帖一報侯景書三首大夫出境尚有所專況始創奇謀將建大業理須適事而行隨方以應卿誠心有本何假詞費朕與公大義已定豈有成而相納敗而相棄乎今高氏有使求和朕亦更思偃武進退之宜國有常制公但清靜自居無勞慮也朕為萬乘之主豈可失信於一物想公深得此心不勞復有啟也復鄴人書貞陽旦至侯景夕反南史八十侯景傳景偽作鄴人書求以貞陽侯換景帝復書為手書與諸軍確若不入者宜以軍法送之魏書蕭衍傳蕭確趙威方為景所憚乃謂衍曰召此二人入城者吾當解圍衍又為手書與諸軍荅任昉奏郊廟備六代樂周官分樂饗祀虞書止鳴兩懸求之於古無宮懸之議何事人禮縟事神禮𥳑也天子襲衮而至敬不文觀天下之物無可以稱其德者則以少為貴矣大合樂者是使六律與五聲克諧八音與萬舞合節耳豈謂致鬼神祇用六代樂也其後即言分樂序之以祭以享此乃曉然可明肅則失其旨矣推檢載籍初無郊禋宗廟徧舞六代之文唯明堂位曰禘祀周公於太廟朱干玉戚冕而舞大武皮弁素幘裼而舞大夏納夷蠻之樂於太廟言廣魯於天下也夫祭尚於敬無使樂繁禮黷是以季氏逮闇而祭繼之以燭有司跛倚其為不敬大矣他日祭子路與焉質明而始晏朝而退孔子聞之曰誰謂由也不知禮乎若依肅議郊既有迎送之樂又有登歌各頌功德徧以六代繼之出入方待樂終此則乖於仲尼韙晏朝之意矣隋書音樂志上案言大合樂者是使六律與五聲克諧八音與舞蹈合節耳豈謂致鬼神祇用六代樂也其後即言乃分樂而序之以祭以享以祀此則曉然已明肅則失其旨矣推檢記載初無宗廟郊禋徧舞之文唯明堂位云以禘禮祀周公於太廟朱干玉戚冕而舞大武皮弁素幘裼而舞大夏納夷蠻之樂於太廟言廣德於天下也案所以舞大武大夏者止欲備其文武二舞耳非兼用六代也夏以文受周以武功所以兼之而不用濩者濩武舞也周監於二代質文乃備納蠻夷樂者此明功德所須蓋止施禘祭不及四時也今四海之祭而不徧舞者何夫祭尚於敬不欲使樂繁禮縟故季氏逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與焉質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎儒者知子頹宴享猶舞六代不知有司跛倚不敬已大若依肅議用六代樂者郊堂既有迎神之樂又有登歌各頌功德徧以六律繼以出入方待樂終然後罷祭者此則乖仲尼韙晏朝之旨若三獻禮畢即便卒事則無勞於徧舞也通典一百四十七荅南司奏免臨川王宏愛宏者兄弟私親免宏者王者正法所奏可南史五十一臨川王宏傳宏妾弟吳法壽殺人南司奏免宏司徒驃騎揚州刺史荅皇太子啟審降服大功行三禮云大功之末可以冠子父小功之末可以冠子嫁子取婦己雖小功既卒哭可以冠取妻下殤之小功則不可晉代蔡謨謝沈丁纂馮懷等遂云降服大功可以嫁女宋代裴松之何承天又云女有大功之服亦得出嫁范堅荀伯子等雖復率意致難亦未能折太始六年虞龢立議大功之末乃可取婦於時博詢咸同龢議齊永明十一年有大司馬長子之喪武帝子女同服大功左丞顧杲之議云大功之末非直皇女嬪降無疑皇子聘納亦在非硋凡此諸議皆是公背正文務為通耳徐爰王文憲並云朞服降為大功皆不可以婚嫁於義乃為不乖而又不釋其義天監十年信安公主當出適而有臨川長子大功之慘具論此義粗已詳悉太子今又啟審大功之末及下殤之小功行婚冠嫁三吉之事案禮所言下殤小功本是朞服故不得有三吉之禮況本服是朞降為大功理當不可人閒行者是用鄭玄逆降之義雜記云大功之末可以冠子嫁子此謂本服大功子則小功踰月以後於情差輕所以許有冠嫁此則小功之末通得取婦前所云大功之末可以冠子嫁子此則簡出大功之身不得取婦後言小功之末可以冠子嫁子非直子得冠嫁亦得取婦故有出沒婚禮國之大典宜有畫一今宗室及外戚不得復輒有干啟禮官不得輒為曲議可依此以為法隋書禮儀志三大同六年皇太子啟帝云云天象論自古以來談天者多矣皆是不識天象各隨意造家執所說人著異見非直豪釐之差蓋失千里之謬戴盆而望安能見天譬猶宅蝸牛之角而欲論天之廣狹懷蚌螺之殼而欲測海之多少此可謂不知量矣繫辭云易有太極是生兩儀元氣已分天地設位清浮升乎上沈濁居乎下陰陽以之而變化寒暑用此而相推辨尊卑貴賤之道正內外男女之宜在天成象三辰顯曜在地成形五雲布澤斯昏明于晝夜榮落于春秋大聖之所經綸以合三才之道清浮之氣升而為天天以妙氣為體廣遠為量彌覆無所不周運行來往不息一晝一夜圜轉一周彌覆之廣莫能測其邊際運行之妙無有見其始終不可以度數而知不可以形象而譬此天之大體也沈濁之氣下凝為地地以土水為質廣厚為體邊際遠近亦不可知質常安伏寂而不動山岳水海育載萬物此地之大體也天地之閒別有升降之氣資始資生以成萬物易曰大哉乾元萬物資始至哉坤元萬物資生資始之氣能始萬物一動一靜或此乃天之別用非即天之妙體資生之氣能生萬物一翕一闢或此亦地之別用非即地之妙體四大海之外有金剛山一名鐵圍山金剛山北又有黑山日月循山而轉周迴四面一晝一夜圍繞環帀於南則見在北則隱冬則陽降而下夏則陽升而高高則日長下則日短寒暑昏明皆由此作夏則陽升故日高而出山之道遠冬則陽降故日下而出山之道促出山遠故日長出山促故日短二分則合高下之中故半隱半見所以晝夜均等無有長短日照於南故南方之氣燠日隱在北故北方之氣寒南方所以常溫者冬日近南而下故雖冬而猶溫夏日近北而高故雖夏猶不熱北方所以常寒者日行繞黑山之北黑山之南日光常自不照積陰所聚熏氣遠而不及無冬無夏所以常寒故北風則寒南風則㬉一歲之中則日夏升而冬降一日一夜則晝見而夜隱黑山之峰正當北極之南故夏日雖高而不能至至寅而見至戌而隱春秋分則居高下之中朝至金剛山之外雖與山平而去山猶遠故為金剛所障日未能出須至卯然後乃見西方亦復如是冬則轉下所隱亦多朝至於辰則出金剛之上夕至於申則入金剛之西四面略齊黑山在北當北彌峻東西連峰近前轉下所以日在北而隱在南而見夫人目所望至遠則極二山雖有高下固不能揜三辰之體理繫陰陽或升或降隨時而動至於天氣清妙無所不周雖自運動無間日月星辰遲疾各異晷度多少不繫乎天金剛自近天之南黑山則近天之北極雖於金剛為偏而於南北為心開元占經一月體不全光星亦自有光非受明於日若是日曜月所以成光去日遠則光全去日近則光缺五星行度亦去日有遠近五星安得不盈缺當知不然太陰之精自有光景但異於太陽不得渾赫星月及日體質皆圓非如圓鏡當如丸矣開元占經一輿駕東行記有覆船山酒罌山南次高驪山傳云昔有高驪國女來東海神乘船致酒禮聘之女不肯海神撥船覆酒流入曲阿故曲阿酒美也立神明成佛義記夫涉行本乎立信信立由乎正解解正則外邪莫擾信立則內識無疑然信解所依其宗有在何者源神明以不斷為精精神必歸妙果妙果體極常住精神不免無常無常者前滅後生剎那不住者也若心用心於攀緣前識必異後者斯則與境俱往誰成佛乎經云心為正因終成佛果又言若無明轉則變成明案此經意理如可求何者夫心為用本本一而用殊殊用自有興廢一本之性不移一本者即無明神明也尋無明之稱非太虛之目土石無情豈無明之謂故知識慮應明體不免惑惑慮不知故曰無明而無明體上有生有滅生滅是其異用無明心義不改將恐見其用異便謂心隨境滅故繼無明名下加以住地之目此顯無明即是神明神明性不遷也何以知然如前心作無閒重惡後識起非想妙善善惡之理大懸而前後相去甚迥斯用果無一本安得如此相續是知前惡自滅惑識不移後善雖生暗心莫改故經言若與煩惱諸結俱者名為無明若與一切善法俱者名之為明豈非心識性一隨緣異乎故知生滅遷變酬於往因善惡交謝生乎現境而心為其本未曾異矣以其用本不斷故成佛之理皎然隨境遷謝故生死可盡明矣宏明集九注解大品經序機事未形六畫得其悔吝玄象既運九章測其盈虛斯則鬼神不能隱其情狀陰陽不能遁其變通至如摩訶般若波羅密者洞達無底虛豁無邊心行處滅言語道斷不可以數術求不可以意識知非三明所能照非四辯所能論此乃菩薩之正行道場之直路還源之真法出要之上首本來不然畢竟空寂寄大不能顯其博名慧不能庶其用假度不能機其通借岸不能窮其實若談一相事絕百非補處默然等覺息行始乃可謂無德而稱以無名相作名相說導涉求之意開新發之眼故有般若之字彼岸之號頃者學徒罕有尊重或時聞聽不得經味帝釋誠言信而有徵此實賢眾之百慮菩薩之魔事故唱愈高和愈寡知愈希道愈貴致使正經沈匱於世實由虛己情少懷疑者多虛己少則是我之見深懷疑多則橫構之慮繁然則雖繁慮紛紜不出四種一謂此經非是究竟多引涅槃以為碩訣二謂此經未是會三咸誦法華以為盛難三謂此經三乘通教所說般若即聲聞法四謂此經是階級行於漸教中第二時說舊義如斯乃無是非較略四意粗言所懷涅槃是顯其果德般若是明其因行顯果則以常住佛性為本明因則以無生中道為宗以四諦言說是涅槃是般若以第一義諦言說豈可復得談其優劣法華會三以歸一則三遣而一存一存未免乎相故以萬善為乘體般若即三而不三則三遣而一亡然無法之可得故以無生為乘體無生絕於戲論竟何三之可會所謂百花異色共成一陰萬法殊相同入般若言三乘通教多執二文今復開五意以增所疑一聲聞若智若斷皆是菩薩無生法忍二三乘學道宜聞般若三三乘同學般若俱成菩提四三乘欲住欲證不離是忍五羅漢辟支從般若生於此五義不善分別堅著三乘教同一門遂令朱紫共色珉玉等價若明察此說深求經旨連環既解弄丸自息謂第二時是亦不然人心不同皆如其面根性差別復過於此非可局以一教限以五時般若無生非去來相豈可以數量拘寍可以次第求始於道樹終於雙林初中後時常說智慧復何可得名為漸教釋論言須菩提聞法華經中說於佛所作少功德乃至戲笑漸漸必當作佛又聞阿鞞跋致品中有退不退又復聞聲聞人皆當作佛是故今問為畢定為不畢定以此而言去之彌遠夫學出離非求語言應定觀道以正宗致三乘不分休何義說相與無相有如水火二性相違豈得共貫雖一切聖人以無為法三乘入空其行各異聲聞以壞緣觀觀生滅空緣覺以因緣觀觀法性空菩薩以無生觀觀畢竟空此則淄澠殊味涇渭分流非可以口勝非可以力爭欲及弱喪去斯何適值大寶而不取遇深經而不求亦何異窮子反走於宅中獨姥掩目於道上此迺惑行之常性迷途之恆心但好龍而觀畫愛象而玩迹荊山可為流慟法水所以大悲經譬兔馬論喻鹿犀俱以一象配成三獸用渡河以測境因圍鹿以驗智格得空之淺深量相心之厚薄懸鏡在前無待耳識離婁既睇豈勞相者若無不思議之理豈有不思議之事放瑞光於三千集奇蓮於十方變金色於大地嚴華臺於虛空表舌相之不虛證般若之真實所以龍樹道安童壽慧遠咸以大權應世或以殆庶救時莫不服膺上法如說修行況於細人可離斯哉此經東漸二百五十有八載始於魏甘露五年至自于闐叔蘭開源彌天導江鳩摩羅什澍以甘泉三譯五校可謂詳矣龍樹菩薩著大智論訓解斯經義旨周備此實如意之寶藏智慧之滄海但其文遠曠每怯近情朕以聽覽餘日集名僧二十人與天保寺法寵等詳其去取露根寺慧令等兼以筆功探采釋論以注經本略其多解取其要釋此外或捃關河舊義或依先達故語時復閒出以相顯發若章門未開義勢深重則參懷同事廣其所見使質而不𥳑文而不繁庶令學者有過半之思講般若經者多說五時一往聽受似有條理重更研求多不相符唯仁王般若具書名部世既以為疑經今則置而不論僧叡小品序云斯經正文凡有四種是佛異時適化之說多者十萬偈少者六百偈略出四種而不列名釋論言般若部黨有多有少光讚放光道行止舉三名復不滿四此土別有一卷謂為金剛般若欲以配數可得為五既不具得經名復不悉時之前後若以臆斷易致譏嫌此非義要請俟多聞今注大品自有五段非彼所言五時般若勸說以不住標其始命說以無教通其道願說以無得顯其行信說以甚深歎其法廣說以不盡要其終中品所以累教未章所以三屬義備後釋不復詳言設乃時曠正教處無法名猶且苦辛草澤經歷險遠翹心逷聽澍意希夷冀遲玄應想像空聲輕生以重半偈賣身以尊一言甘歃血而不疑欣出髓而無吝況復龍宮神珠寶臺金牒難得之貨難聞之法遍布塔寺充牣目前豈可不伏心受持虛懷鑽仰使佛種相續菩提不斷知恩反覆更無他道方以雪山匹以香城寍得同日語其優劣率書所得懼增來過明達後進幸依法行釋藏跡八寶亮法師涅槃義疏序非言無以寄言言即無言之累累言則可以息言言息則諸見競起所以如來乘本願以託生現慈力以應化離文字以設教忘心相以通道欲使珉玉異價涇渭分流制六師而正四倒反八邪而歸一味折世智之角杜異人之口導求珠之心開觀像之目救灼燒於火宅拯沈溺於浪海故法雨降而燋種受榮慧日升而長夜蒙曉發迦葉之悱憤吐真實之誠言雖復二施等於前五大陳於後三十四問參差異辯方便勸引各隨意荅舉要論經不出兩途佛性開其本有之源涅槃明其歸極之宗非因非果不起不作義高萬善事絕百非空空不能測其真際玄玄不能窮其妙門自非德均平等心合無生金牆玉室豈易入哉有青州沙門釋寶亮者氣調爽拔神用俊舉少貞苦節長安法忍耆年愈篤齯齒不衰流通先覺孳孳如也後進晚生莫不依仰以天監八年五月八日敕亮撰大涅槃義疏以九月二十日訖光表微言贊揚正道連環既解疑網云除條流明悉可得略言朕從容暇日將欲覽焉聊書數行以為記別云爾高僧傳八藝文類聚七十七廣弘明集二十連珠蓋聞水鏡不以妍蚩殊照芝蘭寍為貴賤異芳是以弘道歸於兼濟至德由乎兩忘蓋聞一眚不足以掩德五刑非可以妄加是以徑寸之珍有時而纇盈尺之寶不能無瑕蓋聞理漸其萌豈須拔岳之力物有易傷不待淩雲之繳是以微照積而山飄虛弦動而隼落藝文類聚五十七賜到溉連珠研磨墨以騰文筆飛毫以書信如飛蛾之赴火豈焚身之可𠫤必耄年其已及可假之於少藎梁書到溉傳凡百箴凡百眾庶爾其聽之事無大小先當熟思思之不熟致成反覆其心不定不可施令是曰亂常是曰敗政弗止辱身亦喪厥命惟慈惟恕惟孝惟敬嚴惟率下直惟厥正如彼互鄉如彼暴虎家聲不建有忝爾祖思之既熟決意而行臨難必勇見義忘生門有賢良家有忠貞勿恃爾尊驕慢淫昏勿謂爾貴長夜荒醉日不恆中月盈則虧崇山落峰高樹折枝履邪念正居安思危莫言爾賤而不受命君子小人本無定性莫言人微而以自輕張他為卒李衡為兵忠信孝友皆以揚名有黃叔度父牛醫者聲高海內名重天下伊尹負鼎太公屠肉甯戚飯牛傅說版築皆王霸師世受爵祿誡爾凡百勿戾勿昏人無貴賤道在則尊余重告爾莫自卑抑克家棟梁唯斯為吉水清照淨表直影端近取諸身無假遠觀猗與哲人勿謂斯難又略見藝文類聚二十三硯銘音假墨圖心寫德模藝文類聚五十八論蕭子雲書筆力勁駿心手相應巧踰杜度美過崔實當與元常並驅爭先梁書蕭子雲傳觀鍾繇書法子敬不迨逸少逸少不迨元常學子敬者如畫虎也學元常者比畫龍也御覽七百四十八草書狀蔡邕云昔秦之時諸侯爭長𥳑檄相傳望鋒走驛以篆隸之難不能救速遂作赴急之書蓋今草書是也杜氏之變隸亦由程氏之改篆其先出自杜氏以張為祖以衛為父索范者伯叔也二王父子可為兄弟薄為庶息羊為僕隸目而敘之亦不失倉公觀鳥迹之措意邪但體有疏密意有倜儻或有飛走流注之勢驚疏峭絕之氣滔滔閒雅之容卓犖調宕之志百體千形而呈其巧豈可一概而論哉皆古英儒之撮撥豈群小皁吏所能為因為之狀曰疾若驚蛇之失道遲若綠水之徘徊緩則鴉行急則鵲厲抽如雉啄點如兔擲乍駐乍引任意所為或麤或細隨態運奇雲集水散風迴電馳及其成也麤而有筋似蒲萄之蔓延女蘿之繁縈澤蛇之相絞山熊之對爭若舉翅而不飛欲走而還停狀雲山之有玄玉河漢之有列星厥體難窮其類多容婀娜如削弱柳聳拔如裊長松婆娑而飛舞鳳宛轉而起蟠龍縱橫如結纏綿如繩流離似繡磊落如陵暐暐曄曄奕奕翩翩或臥而似倒或立而似顛斜而復正斷而還連若白水之遊群魚藂林之掛騰猿狀眾獸之逸原陸飛鳥之戲晴天象烏雲之罩恆嶽紫霧之出衡山巉巖若嶺脈脈如泉文不謝於波瀾義不愧於深淵傳志意於君子報款曲於人閒蓋略言其梗概未足稱其要妙焉古文苑觀鍾繇書法十二意平謂橫也直謂縱也均謂閒也密謂際也鋒謂端也力謂體也輕謂屈也決謂牽掣也補謂不足也損謂有餘也巧謂布置也稱謂大小也字外之奇文所不書世之學者宗二王元常逸迹曾不睥睨羲之有過人之論後生遂爾雷同元常謂之古肥子敬謂之今瘦今古既殊肥瘦頗反如自省覽有異眾說張芝鍾繇巧趣精細殆同機神肥瘦古今豈易致意真跡雖少可得而推逸少至學鍾書勢巧形密及其獨運意疏字緩譬猶楚音習夏不能無楚過言不悒未為篤論又子敬之不迨逸少猶逸少之不迨元常學子敬者如畫虎也學元常者如畫龍也余雖不習偶見其理不習而言必慕之歟聊復自記以補其闕非欲明解強以示物也儻有均思思盈半矣張彥遠法書要錄菩提達磨大師碑為玉㲲久灰金言未剖誓傳法印化人天竺及乎杖錫來梁說無說法如暗室之揚炬若明月之開雲聲振華夏道邁古今帝后聞名欽若昊天嗟乎見之不見逢之不逢今之古之悔之恨之朕雖一介凡夫敢師之於後傳法正宗記達摩于普通八年由天竺至梁與武帝語機緣不契去梁渡江北止嵩山少林寺至大通二年魏以其喪告帝追慕為碑即位告天文皇帝臣衍敢用玄牡昭告於皇天后帝齊氏以厤運斯既否終則亨欽若天應以命於衍夫任是司牧惟能是授天命不于常帝王非一族唐謝虞受漢替魏升爰及晉宋憲章在昔咸以君德馭四海元功子萬姓故能大庇氓黎光宅區宇齊代云季世主昏凶狡焉群慝是崇是長肆厥姦回暴亂以播虐於我有邦俾溥天惴惴將墜於深壑九服八荒之內連率岳牧之君蹶角頓顙匡救無術臥薪待然援天靡訴衍投袂星言推鋒萬里厲其掛冠之情用拯兆民之切銜膽誓眾履銳屠堅建立人主克翦昏亂遂因時來宰司邦國濟民康世實有厥勞而晷緯呈祥川岳效祉朝夕坰牧日月郊畿代終之符既顯革運之期已萃殊俗百蠻重譯獻款人神遠邇罔不和會於是群公卿士咸致厥誠並以皇乾降命難以謙拒齊帝脫屣萬邦授以神器衍自惟匪德辭不獲許仰迫上玄之睠俯惟億兆之心宸極不可久曠民神不可乏主遂藉樂推膺此嘉祚以茲寡薄臨御萬方顧求夙志永言祗惕敬𥳑元辰恭茲大禮升壇受禪告類上帝克播休祉以弘盛烈式傳厥後用永保於我有梁惟明靈是饗梁書武帝紀中又見南史六捨道事佛疏文天監三年四月八日梁國皇帝蘭陵蕭衍稽首和南十方諸佛十方尊法十方菩薩僧伏見經文玄義理必須詮云發菩提心者即是佛心其餘諸善不得為喻能使眾生出三界之苦門入無為之勝路標空察理淵玄微妙就義立談因用致顯故如來漏盡智凝成覺至道通機德圓取聖發慧炬以照迷鏡法流以澄垢啟瑞迹於天中爍靈儀於像外度眾生於苦海引含識於涅槃登常樂之高山出愛河之深際言乖四句語絕百非應迹娑婆示生淨飯王宮誕相步三界而為尊道樹成光普大千而流照但以此土根情淺薄好生猒怠自期二月當至雙林亦是湛說圓常且復潛輝鶴樹闍王滅罪婆藪除殃若不逢遇大聖法王誰能救接在迹雖隱其道無虧弟子經遲迷荒躭事老子歷葉相承染此邪法習因善發棄迷知返今捨舊醫歸憑正覺願使未來世中童男出家廣弘經教化度眾生共取成佛入諸地獄普濟群萌寍可在正法中長淪惡道不樂依老子教暫得生天涉大乘心離二乘念正願諸佛證明菩薩攝受蕭衍和南釋藏陪八辨正論八又駕八廣宏明集四金剛般若懺文菩薩戒弟子皇帝稽首和南十方諸佛無量尊法一切賢聖如來以四十年中所說般若本末次第略有五時大品小品枝條分散仁王天王宗源派別金剛道行隨義制名須真法才以人標題雖復前說後說應現不同至理至言其歸一揆莫非無相妙法悉是智慧深經以有取之既為殊失就無求也彌見深乖義異去來道非內外遣之又遣之不能得其真空之以空之未足明其妙真俗同棄本迹俱冥得之於心然後為法是以無言童子妙得不言之妙不說菩薩深見無說之深弟子習學空無修行智慧早窮尊道克己行法方欲以家刑國自近及遠一念之善千里斯應一心之力萬國皆歡恆沙眾生皆為法侶微塵世界悉是道場今謹於某處建如干僧如干日金剛般若懺現前大眾至心敬禮釋迦牟尼佛金剛般若禮長老須菩提願諸佛菩薩以般若因緣同時集會哀憐萬品護念群生引入慧流同歸佛海得金剛之妙寶見金牒之深經頂戴奉持終不捨離逮得己利盡諸有結心行自在無復塵勞稽首敬禮常住三寶釋藏策六廣弘明集二十八下摩訶般若懺文菩薩戒弟子皇帝稽首和南十方諸佛及無量尊法一切賢聖觀夫常樂我淨蓋真常之妙本無常苦空乃世相之累法而苦樂殊見分別之路興真俗異名計著之情反顛倒我人之所彌見愚癡取舍有無之閒轉成專附豈知妙道無相至理絕言實法惟一真如不二諸佛以慈悲之力開方便之門教之以遣蕩示之以冥滅百非俱棄四句皆亡然後無復塵勞解脫清淨但般若之說唯有五時而智慧之旨終歸一趣莫非第一義諦悉是無上法門弟子頗學空無深知虛假王領四海不以萬乘為尊攝受兆民彌覺萬幾成累每時丕顯嗟三有之洞然終日乾乾歎四生之俱溺常願以智慧燈照朗世閒般若舟航濟渡凡識今謹於某處建如干僧如干日大品懺現前大眾至心敬禮慧命須菩提願諸眾生離染著相迴向法喜安住禪悅同到香城共見寶臺般若識諸法之無相見自性之恆空無生法忍自然具足稽首敬禮常住三寶釋藏策六廣弘明集二十八下
