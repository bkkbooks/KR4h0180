body:
  text: 𥳑文帝三日侍皇太子曲水宴并序竊以周成洛邑自流水以禊除晉集華林同文軌而高宴莫不禮具義舉沓矩重規昭動神明雍熙鍾石者也皇太子生知上德英明在躬智湛靈珠辯均河注騰茂實於三善振嘉聲於八區是節也上巳屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽疏泉泛爵蘭觴沿泝蕙肴來往賓儀式序盛德有容吹發孫枝聲流嶰谷舞豔七盤歌新六變遊雲駐綵仙鶴來儀都人野老雲集霧會結軫方衢飛軒照日震德叶靈年芳節淑濯伊臨灞蕩心愉目驤騎晨野摐金曉陸蕙氣卷旌神飆擎轂層岑偃蹇聳觀岧嶢煙生翠幕日照綺寮銀華晨散金芝暮搖綠水動葉丹距映條顧惟菲薄徒承恩裕藝學未優聲績不樹豈辯河書寧摛淮賦徒偶群龍終慚並馭類聚四古今歲時雜詠十六詩紀六十八又初學記四引淑目陸轂嶢寮搖七韻藝文類聚四初學記四御覽三十昭明太子集序竊以文之為義大哉遠矣故孔稱性道堯曰欽明武有來商之功虞有格苗之德故易曰觀乎天文以察時變觀乎人文以化成天下是以含精吐景六衛九光之度方珠喻龍南樞北陵之采此之謂天文文籍生書契作詠歌起賦頌興成孝敬於人倫移風俗於王政道綿乎八極理浹乎九垓贊動神明雍熙鍾石此之謂人文若夫體天經而總文緯揭日月而諧律呂者其在茲乎昭明太子懸明離之極照履得一之休徵曰孝與仁窮神盡聖豐下表異垂髮應期若夫嵩霍之峻無以方其高滄溟之深不能比其大二曜朓蝕而凝明弗虧四氣猶爽而履信或一言出知乎微行立彰乎遠湛然玄默巍乎莊敬居身以約在滿必沖九德之保無以喻其審諭六行之傳豈可語其拾遺叔譽知窮師曠心服行一物而三善固無得稱焉至如翠幃晨興斑輪曉騖胡香翼蓋葆吹從風問安寢門之外視膳東廂之側三朝有則一日弗虧恭承宸扆陪贊顏色化闕梓於商庭既欣拜夢望直城而結軌有悅皇心此一德也地德褰帷天雞掩色構傾椒殿沴結堯門水漿不入圭溢罕進喪過乎哀毀幾乎滅池綍既啟探擗摽之慟陵園斯踐震中路之號率由至要之道以為生民之則固已事彰朱草理感圖雲此二德也垂慈豈弟篤此棠棣善誘無倦誨人弗窮躬履禮教俯示楷模群藩戾止流連於終讌下國遠征殷勤於翰墨降明兩之尊匹姜肱之同被紆作貳之重弘臨菑而共館此三德也好賢愛善甄德與能曲閣命賓雙闕延士剖美玉於荊山求明珠於枯岸賞無繆實舉不失才巖穴知歸屠釣棄業左右正人巨僚端士丹轂交景長在鶴關之內花綬成行恆陪畫堂之裏雍容河曲竝當今之領袖侍從北場信一時之俊傑豈假問謝鯤於溫嶠謀黃綺於張良此四德也皇上垂拱巖廊積成庶務式總萬幾副是監撫山依搖彩地立少陽物無隱情人服睿聖此五德也罰慎其濫書有作則勝殘去殺孔著明文任刑逞威伋疵淳化終食不違理符道德故假約法於關中秦民胥悅感嚴刑於闕下漢后流名是以遠鑒前史垂恩獄犴仁同泣罪幽比推溝玉科歸理遣之恩金條垂好生之德黔首齊民亭育含養咸欣然不知所以然此六德也梧丘之首魂沈而靡託射聲之鬼曝骨而無歸起掩骼之慈被錫槥之澤若使驄馬知歸感埋金於地下書生雖殞尚飛被於天上恩均西伯仁同姬祖此七德也玄冥戒節沍陰在歲雪號千里冰重三尺炎鑪吐色豐貂在御留上人之重愍終寠之氓發於篇藻形乎造次輟宴心歡矜容動色嘆陋巷之無褐嗟負薪之屢亡發私藏之銅鳧散垣下之玉粒施周澤洽無幽不普銜命之人不告而足受惠之家餐恩之士咸謂櫟陽之金自空而墮南陽之粟自野而生此八德也陽阿淥水奇音玅曲遏雲繁手仰秣來風靡悅於胸襟非關於懷抱事等棄琴理均放鄭豈同魏兩作歌於長笛終噪漢貳託賦於洞簫此九德也怪寶奇琛不留於器服仙珠玉玦無取於浮玩土木無宮殿靡磨礱此十德也承華廣闊肅成旦啟秋光洞入春花洒樹名僧結侶長裾總集吐納名理從容持論五稱既辯九言斯洽如觀巨海如見游龍令羅折談名儒稱疾無勞擁經入巷豈假羊車詣門此十一德也研精博學手不釋卷含芳腴於襟抱揚華綺於心極韋編三絕豈直爻象起先五鼓非直甲夜而欹案無休書幌密倦此十二德也群玉名記洛陽素簡西周東觀之遺文刑名墨儒之旨要莫不殫茲聞見竭彼綈緗總括奇異徵求遺逸命謁者之使置籯金之賞惠子五車方茲無以比文終所收形此不能匹此十三德也借書治本遠紀齊攸一見自書聞之闞澤事唯列國義止通人未有降貴紆尊躬刊手掇高明斯辨己亥無違有識風長正魚魯此十四德也至於登高體物展詩言志金銑玉徽霞章霧密致深黃竹文冠綠槐控引解騷包羅比興銘及盤盂贊通圖象七高愈疾之旨表有殊健之則碑窮典正每出則車馬盈衢議無失體纔成則列藩擊缶近逐情深言隨手變麗而不淫臨安公主集序四德之美戚里仰以為風七行之奇濯龍規以為則若夫託勾陳之貴出玉臺之尊鳳儀閒潤神姿照朗愛敬之道夙彰柔嫺之才必備鳳桐遐遠清管遼亮湘川寂寞淚篠入葳蕤北渚之句尚傳仙靈之典不泯況復文同積玉韻比風飛謹求散逸貽厥於後藝文類聚五十五馬槊譜序馬槊為用雖非遠法近代相傳稍已成蓺鄧蔗索魏后之庭武而猶質桓馬入丹陽之寺雄而未巧聊以餘暇復撰斯法搜採抑揚斟酌煩簡至如春亭落景秋皋晚淨青霜且盡密雨初晴驖驪沃若天馬半漢盼金精而轉態交流汗血愛連錢而息影不畏衣香雕衢與白刃同暉翠眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之楫越女踟躕無假如皋之箭藝文類聚六十御覽三百五十四彈棊譜序觀夫模穹蒼而挺質寫博厚而成形峙五岳而標奇停四海而為量協日月之數應律呂之期總玄黃之武略校孫吳之應變語其用心壯哉之戲也爾乃觀壯士之出師望兵棊之式道上昇則搏翼穹天赴下則建瓴高屋乘危則棧山航海歷險則束馬懸車完五憶霸國之勳全六想陳平之智反八均高陽之數四角思漢后之歌飛九同晉侯之琴徘徊異鄴中之輦牽牛覺乘槎之來織女擬雲軿之去故古人或言之禮樂或比之仁讓或喻以修身或齊諸道德良有旨也蓺文類聚七十四詩序余七歲有詩癖長而不倦梁書簡文帝紀莊嚴旻法師成實論義疏序夫事秉文辭理通氣象涉之者尚迷求之者或躓是以問玄經於揚子且云不習奏古樂於文侯猶稱則睡曆校清臺壽王之課不密氣現斗牛南昌之地或爽況乎慧門深邃入之者固希法海波瀾汎之者未易自使河濟混淆魔塵紛糾皎皎毒霜童童苦樹善田之苗不吐意華之彩詎發無常之樓互起暗室之火無暉是以餐蜜挫糟俱珍異論持牛臥棘競起邪宗自佛日團空正流蕩垢手擎四鉢始乎鹿園之教身臥雙林終於象喻之說含生弗等開塞之義因機感受不同淺深之言或異處處散說本應根緣有不次第各隨群品金棺已掩旃檀之炭無追乳池且涸白㲲之灰斯盡迦葉入定歡喜智滅末地之報已終優波之身且謝於是五部橫流八乾起執尋源既舛取著尤別四相乃無常之刀三聚為苦家之質習續不斷稱為集諦無為有體介然可求等智能斷羅漢猶退豈啻千里之舛義起毫釐三豕之書謬符晉史北轅趨郢木末搴蕖譬乎服子論丘利害不識膠柱鳴瑟燥溼無變自佛滅之後八百餘年中天竺國婆羅門子名訶梨跋摩梁云師子鎧四種圍陀在家必習三品慧藏入道彌通師事達磨沙門事均反啟於是歎微言之已絕傷頹風之不振抗言動論以朱紫為先發意吐詞必涇渭繇己於是標撮領會商搉異端刪夷浮詭搜聚貞實造百有二品以為斯論成則據文實則明理舉成對壞稱實形虛欲令毗曇外道二途皆廢如來論主兩理兼興若夫龍樹馬鳴止筌大教旃延法勝縈縛小乘兼而總之無踰此說故華氏之王於茲頂戴樓佉外道結舌無辭百流異出同歸一海萬義區分總乎成實豈止鼓腹涅槃旗靡轍亂雞鳴真諦喪精掩色多歷年所復寡英才粵我大梁炎圖啟運皇帝含天包地之德春生夏長之仁以本誓願率化斯土梵輪常轉三寶現前甘露聿宣四部無厭有莊嚴旻法師羽儀鸞鳳負揭光景深以通志神以知來其跡同凡其源莫測故以心包四忍行合三空慧比文殊玄如善吉總持均阿難之德樂說有富樓之功思媚我皇起予正法宣弘此論大盛乎京師負笈爭趨懷鉛來遠無勞冠軍之勢自傾衛客固有華陰之德人歸成市擬儀舍衛超邁泗洙西關自恥南宮不競湘官寺智蒨筆札之功不殊法汰之報安石清辯之玅何止道林之折子猷凡如十卷勒成一部法師大漸深相付囑豈直田生之亡獨臥施讎之手馬公之學方由鄭氏而陳其義云廣宏明集二十八關齋制序夫五宅易昏四流不汨業動心風情漂愛燄自非識達真空照靈珠於難曉神緣妙境蓄慈根於未化無以卻此四魔登茲十善今列筵肅靜高宇間邃香吐六銖烟浮五色目對金容耳餐玉韻無容使情緣異染形不肅恭類倚於鴛宮同力於羊角宜制此心虵祛斯醉象立制如左咸勉聽思謹條八關齋制如左睡眠籌至不覺罰禮二十拜擎香鑪聽經三契一出不請刺罰禮十拜二出過三契經不還罰禮十拜三鄰座睡眠維那至而不語者罰禮十拜四鄰座睡眠私相容隱不語維那者罰禮十拜五維那不勤聽察有犯制者不即糾舉為眾座所發覺者維那罰禮二十拜擎香鑪聽經三契六白黑維那更相糾察若有阿隱罰禮二十拜七聽經契終有不唱讚者罰禮十拜八請刺無次第罰禮十拜九請刺白黑刺有誤者罰禮十拜十廣宏明集二十八上幽縶題壁自序有梁正士蘭陵蕭世纘立身行道終始如一風雨如晦鷄鳴不已弗欺暗室豈況三光數至於此命也如何梁書簡文帝紀南郊頌并序臣聞惟天為大聖人敬其德知幾其神聖人契其道故龍官弱言之后合揆於蒼昊鳥紀垂衣之君昭格於上帝莫不巍巍乎穆穆乎渙汗於綠篇氛氳於丹冊者矣我梁皇帝之御天下也乘熛祇之盛曜即璧日之遐照等乾覆之燾養合坤載之靈長四三六五之意十堯九舜之明名與功偕業將時並自撥亂反正伐罪弔民馮玉几握金鏡君臨萬國於今二十有二載也緯天維理地軸移澆風於末俗反淳正於區中化不言而先顯教不嚴而已肅流樂復雅遠符雲韶之世墜禮還章非因忠信之薄九垓同軌四海無波儲明變照儀天作兩三袞咸作叶化台光麴糱王風鹽梅帝載塵清世晏蒼兕無用其武功運謐時平鵷鷺咸修其文德桃林散甲華山弢刃玉門罷候紫塞沈鋒屠羊釣壑之士厭洗耳而襲簪佩版築藏巖之逸去燥穀而紆珩組異人俊乂既閒出而在官世鏡河仙亦雍容而廊廟蹇蹇同於多士諤諤比乎得人五典三墨既葳蕤於璧水九流八索亦繽紛於石渠畫一之政萬代表於時和三章之律百姓沐於仁壽於是龍光之地日浴之鄉紫舌黃支頭飛鼻飲自西自南無思不服款關質子稱臣內向珠樹素禽越火枝之地銀甕邛杖踰沈羽之涘出赤野而連翩度玄妙之泱漭於是嘉祥被眾瑞登金人澤馬丹甑玉雞三角九尾四眉六足抽鋪地之九莖發端門之連理參差於郊藪布濩於宮闕府無虛月史弗能記周稱黃鳥之旗夏有玄珪之錫無以踰此嘉祥方茲總萃道洽世昌國殷民阜鄉知舜讓邑比堯封委粟西畝神絲被澤可謂我化若風民應如草我靜如鏡物動猶煙天子猶未明求衣日昃不勌撤膳匪躬詢輿訪道鑾旗徐動棄千里而弗乘寶瑟無虞捐百金而不服廣行四等被慈雨於枯根大闡三明驚法雷於群夢曲成萬物去殺愛生幽獘之民與蒼雷而共悅否滯之義同谷風而開杼昆蟲得性跂蠢欣生三驅有緩前之禽九門無餧獸之藥至德之事如此太平之風如彼乃以恭肅神祇理通孝敬江左以來爽塏未闢爰命將作揆日載營三靈叶響百工咸事宛如神造儼類仙居沖祕隱嶙跨千畝於晉日閑曠麗遠吞七里於漢年五達四通廓郊彌野南瞻重嶽北眺芒嶺東臨灞滻西望舊豐紆餘委蛇丘陵起伏澎湃嶢屼山川異態飛梁邃宇洞燭宂懸紫殿仙宮霞騫鳥翥霧映倒梁日光疏鈑玉桃卷葉銀樹抽芳百果千株三珠八柱朝葉與蜜露共鮮晚花與薰風俱落露禽乍聚望比翼之翱翔歸飛時宿聞同心之夜響故以熊熊灼灼炫兩明而仰七曜紛紛沐沐承五烟而帶三靈圓丘閑靜紫壇肅設五精之場千神之位八階弘麗四維博敞宛若千仞狀懸流之仙館煥如五彩同瑤山之帝壇石牒神昌之瑞方臻金縷飛光之徵永固是雕是琢鄙茅茨之為儉非珠非玉嗤甘泉之已奢望昔方今獨高千古沿襲異等質文斯中於是歲在單閼星次訾陬律中太簇日惟辛卯特有事於南郊甸師清野封人壝宮朱幕夕峙帷宮宿設曉漢斜陰挈壺升漏天子御玉輅動金根八驥揚衡雙龍翼蓋雲罕徐迴鳴鐃韻響風承豹尾日映鶡冠萬騎天行千乘雷動石鎧犀衣之士連七萃而雲屯珠旗日羽之兵亙五營而星列鬱鬱阡阡震震填填充溢乎國都彌漫於鄽邑者也若乃迴輿降蹕薦禮帝儀揖太清秩群望被大裘服山冕恭蒼璧之明祀穆靈壇之禋敬黍稷非馨明德惟馨日曜彤精天澄翠色百僚師師九官濟濟千神叶福萬億均慶六典斯備三禮必該焚柴告成罔不欽若翠烟升綠同河濱之瑞雲丹燎燭天若帝鄉之美氣雲門麗舞咸池廣樂已叶九韶之曲復諧六列之奏金匏既動望蜿蟬之遊龍玉磬徐鳴觀參差之舞鳳桂轊駕肩士女填噎接袂為幃連裾猶堵鼓腹擊轅行歌舞抃然後紆玉輦而謝書生登靈臺而望雲物欽明美化跨萬古於茲日廣運愉樂表千載於當今方當巡云云之禮啟亭亭之業封天荅睠禮地徵靈南山之壽無極七百之基長固豈不懋哉豈不盛哉菲薄微臣謬與藩服馳心休禮秣馬之願無由徒罄褊辭清風之藻多愧敢敷庸理獻頌十章其辭曰元始道一渾德氛氳遙哉邃古敻矣初分磅礴地載清朗天文大人覩物生民樹君蛇驅龍準作樂垂衣皇圖炤灼帝篆葳蕤廓寥中代合聖與誰於鑠我后命世天飛玄默馭辯寂照秉真就雲握厤望日臨民謙光履德義禮稱珍車書同軌天下歸仁期章孔備盛化弘道酌衢敬賓欽賢愛老變正是珍燭車非寶如海之深如日之杲肅恭明神逖聽前踵配天道尊迎陽義重玄酒陶匏燔柴雲聳跨舜論韶籠堯稱拱赫矣郊宮載惟靜謐肅肅禁圍陰陰仙室六戎列野八鸞照日架殿星羅重宮霧出蒲萄金橘靈壽木難素奈開暑貞檜陵寒山池壯麗階閤彤丹葉垂疊雨花落重巒康哉盛德美矣世豐三辰炳耀七政永隆五方來洎四隩茲通懸繩度笮駕鹿追風既隆懋化復覩瑞滋金車出野玉露霑墀紫脫神草華平瑞芝長愉汪濊永固雍熙照天漏涘遠肅邇睦惠靡齊民恩彌比屋式光惇史踰斯郁郁皇哉康哉同斯景福文苑英華七百七十二又見藝文類聚三十八初學記十三皆有刪節馬寶頌并序皇帝應百姓之心副四海之願復履玉衡還臨億兆天地交泰日月貞明至理惟新隆平方始遐邇壹體中外禔福含生欣欣若耘耰之逢夏雨懷情坎坎譬草木之值春風帝王之道超邁開闢睿聖之功殫厤邃古軒羲不足鑿枘堯舜不足憲章至哉大哉無得而稱也五月丁酉朔絲竹會於德陽之堂於時日進內宮星次鶉首仲夏之晷稍極陽城之圭蕤賓之鍾初應潁川之律縉雲旦卷南風晚扇惠氣入帷清陰周宇玉輿雲罕照日充庭羽林中權分階列校簪笏成行貂纓在席昭天之樂金石鏗鏘報地之禮威儀肅省詔以馬寶示群臣太僕效官趣馬掌贊三令五申丞聯事舉八麗四圍給役相趨暉煜金鑣陸離寶勒天地無疆之德永星致遠之功鸞眄善鳴龍儀美稱沸毅權奇之威趨攄抑揚之態足轉驚電眼流含燭霧噴紛霏流沫飄洒數千為壽豈待原蠶之禁萬里一息不藉杜衡之草王良不能控其衡策伯樂不能辨其文機方知總轡崑岑周非吾馭張樂大野夏有慚德豈止沈河用璧獨有綠文之稱盛德在木偏受蒼龍之名至於干將寶劍遙服晉鄭之軍蓮花烏玉騰威大海之際況乎馬寶義實踰之方當夙沙自歸滑橋屈膝款關入塞偃武脩文去病無出師之勞充國罷議邊之略五律成珍九河如鏡臣謹按瑞應經彌勒成佛經中阿含經覽愚經並稱第三之馬者三千歲華子云堯漢皆得馬者堯漢皆火德正斗南方乘德而至也豈非聖德汪濊皇風洋溢研機洞元備禮達義是以天下愛道白馬嘶風王澤效祥朱鬣降祉比夫圓蹄方足躑躅在郊風嘯電奔聲遨處囿五彩依樹三雀登巢安髣髴於當今弗擬議於休應百辟卿士咸稱萬歲伊臣不佞結慶雲霄親承詔旨預觀寶瑞手舞足蹈贊揚不足宴禮斯畢退而作頌其辭曰帝廣運德欽明儀郊升道形聲德為軌仁作經璇璣正太階平割五禮和六英開四攝行八政轉輪皇飛行聖愍含識資惠命引蒼生歸法性菩提真般若淨七寶均萬邦寍逖惇史觀陳詩域中大唯聖期聞玄妙復孝慈解流澤隨因時刑已措績咸熙三農盛九穀滋萬祗悅八神怡律有節厤得天景星曜慶雲連珠為月醴為泉民何幸值皇年乾道應坤馬來度玉關升玉臺鏤錫煥鸞鑣迴槃雲轉堞塵開千天駟百龍媒永伏皁掃騊駼秣瑤粟委芳芻九夷款四表清甿胥樂輿頌興文苑英華七百七十八玄圃園講頌并序竊以寶山峻極駘足未窺惠海遙波輕舟詎泛故以探沙亂妙類杵迷形百代同昏千年誰啟皇上託應金輪均符玉鏡俯矜苦習續照慈燈鶴樹還春龍泉更曉玄水躍祥丹陵寫電功韜火宅德覆雲衢智惠之光猶初日照忍辱之力如明月珠天成地平遐肅邇穆澤漏無底化行靡外滄河鏡淥碧海調氛停瑞氣於三辰汎祥煙於五節鱗羽被解羅之澤黎元沐至仁之道正化潛通法輪常轉類空鏡之傳虛猶懸河之瀉潤儲君德彰妙象體眷春瓊視膳閒辰遨遊心法搦管摛章既便娟錦縟清談論辯亦參差玉照夏啟愧德周誦慚風乃於玄圃園栖聚德心之英並命陳徐之士摳談永日講道終朝賓從無聲芳香動氣七辯懸流雙因俱啟情遊彼岸理愜祇園靈塔將涌天花乍落於時藏秋仲節麗景妍辰氣冷金扉霜浮玉宇聖慈沖獨幸勝地朱堂玉砌碧水銀沙鳥弄翅於瓊音樹葳蕤於妙葉液水穿流蓬山寫狀風生月殿日照槐煙綱叨籍殊寵陪奉末塵預入寶樓竊窺妙簡鳧藻喜忭獨瑩心靈敢作頌云皇儀就日帝道昌雲化隆垂拱德蔓鴻芬機乘八解道照三墳巍巍蕩蕩萬代一君重離照景玉潤舒華七淨標美三善稱嘉降茲法雨普洽生芽漣漪義水照曜文花芳園靉靆天宮類寶析論冥空玄機入道密宇浮清重關相藻日映金根風搖銀草肩隨接武握寶靈珠皆抽四照並按九衢顧惟多缺徒奉瑛瑜終如燕石更似齊竽文苑英華七百七十二又見藝文類聚七十六廣宏明集二十
