body:
  text: 柳憕賦體飛轡竦兮不停陰徂川逝兮無暫舍白日出兮爍晚辰春雷奮兮動蘭夜竊匪報於儲闈叨洪恩於良駕何眇身之多幸濯微纓於唐化藝文類聚五十六答釋法雲書難范縝神滅論辱告惠示敕答臣下審神滅論淵旨沖邈理窮幾奧竊以修因趣果神無兩識由道得滅佛惟一性殷人示民有知孔子祭則神在或理傳妙覺或義闡生知而楊墨紛綸徒然穿鑿凝滯逐往將掩名教聖情玄鑒理證無閒振領持綱舒張毛目抑揚三代汲引同歸實假雙袪朗然無礙伏奉循環疑吝俱盡來告存及悲抱惟深柳憕頓首白弘明集十答釋法雲書難范縝神滅論綽和南辱告蒙示敕答臣下審神滅論伏覽淵謨用清魂府既排短說實啓群疑竊惟人生最靈神用不極上則知來藏往次乃鄰庶入幾以此觀之理無可滅是以巨儒伸其祀事大慈照其生緣內外發明已足袪滯況復天誨諄諄引諭彌博弘資始於黔黎導識業於精爽固令開蒙出障坐測重玄異端既絶正路斯反論者慚其墨守范氏悟其膏肓預在有識孰不擊讚但弟子徒懷游聖終懵管窺頂奉戴躍永歡廕誘謝綽和南弘明集十答釋法雲書難范縝神滅論辱告惠示至尊答臣下神滅論伏覽未周煙雲再廓竊惟蠕動有知草木無識神滅瞽論欲以有知同此無識乃謂種智亦與形骸俱盡此實理之可悲自非德合天地均大域中屬反流之日值飲化之幾則二諦之言無以得被三世之談幾乎息矣聖上愍此四生方淪六道研校孔釋共相提證使窮陸知海幽都見日至言與秋陽同朗群疑與春冰俱釋雖發論弘道德感沖襟而預聞訓誘俯欣前業法師服膺法門深同此慶謹當讚味吟誦始終無斁弟子庾詠和南弘明集十答釋法雲書難范縝神滅論辱告惠示至尊答臣下審神滅論謹罄庸管恭覽聖製聲溢金石理洞淵泉義貫六爻言該三世足使僻學知宗迷途識反弟子生幸休明身叨渥澤復得傾耳天上拭目神藻鳧抃之誠良無紀極猥惠頒逮銘躍惟重弟子王琳答弘明集十宿山寺賦脂車秣駟薄暮來遊入界道而遼朗息祇樹而淹留惟基構之所處實顯敞而高居延層軒之迢遞屬廣廡之踟蹰差繡栭而反宇列緹柱而承隅爾乃陟飛陛於峻岥登步櫩於絶頂既中天而升降亦攀雲而遊騁宇陰陰而怡曠階肅肅而虛靜朗華鍾之妙音曜光燈之清影其房則開窗木末浮柱山叢引含光之澄月納自遠之輕風因明兮目極憑迥兮望通平原兮無際連山兮不窮識生煙於岫裏眄列樹於巖中樹陵危而秀色煙出遠而浮空情迢遙於原野心放曠於簾櫳夜悠悠而何期露瀼瀼而漸落玩一葉之流螢聆九野之鳴鶴盥泉兮藉芳杜入谷兮佩滋蘭靜嘯兮疏煩想獨往兮恣遊盤信一致之易息豈萬物之能干就薄帷而安夜寢乃高枕而極星闌廣弘明集二十九上奏聞獲銅瑞劍薄伐凶醜而龍淵耀質凶奴將滅白旗表徵御覽三百四十二引梁書天監五年廬陵太守王希聃於高昌縣獲銅瑞劍二口以聞云云案今梁書武帝紀天監五年四月丙申廬陵高昌之仁山獲銅劍二不載王希聃奏梁中書郎謝吳有梁書一百卷隋志僅存四十九卷御覽所引蓋謝吳本也答釋法雲書難范縝神滅論尋三世昞然二果昭著安可惑六塵而不曉迷五途而長沒以為形謝神滅骸亡識朽此外道之邪見豈可御瞿曇之正法所謂輕塵一旅敵堂堂之鋒輒馳駑駘與騏驥而並行恐長劫有盡領蟲方至一身死壞復受一身精神無異人畜隨緣涅槃明文瑞應高說主上聖照幽深鏡察潭遠譬兩祭而知不滅喻妄作於背親義隨入引而舛入言比性道而難聞弟子少遊弱水受戒樊鄧師白馬寺期法師屢為設生死之深趣亟說精神之妙言爾來歸心絶此疑想復覩斯判益破魔徒非但聞覿於今方欲結緣於後徒知歸信暗比求名猥惠沾示深承眷篤弟子張緬和南弘明集十答釋法雲書難范縝神滅論璉白逮告垂示敕答臣下審神滅論伏讀天旨照鏡塵蒙弟子門宗三寶少奉道訓雖誠歸至教識暗玄津謹尋內外群聖開引殊文如來說三乘以標一致言二諦以悟滯方先王銓五禮以通愛敬宣六樂以導性靈或顯三世以徵因果或明神感以驗應實豈可頓排神源永絶緣識者哉若口則善惡之報虛陳祭敬之設為妄求之情理其可安乎而昧惑之徒尚多偏執是以聖明玄覽游神妙門動言出理皎若朝暉發文顯證朗如宵燭頓足開建愚昏㥾信凡鄙者也伏習詔旨綜檢心源謹裁還白不宣抃舞弟子陸璉呈弘明集十答釋法雲書難范縝神滅論弟子宏稽首和南辱告伏覽敕答臣下審神滅論夫惟機難曉用晦易昏自非凝神斯鑒探頤斯朗豈能拯重氛於有惑豈能運獨見於無明竊惟大聖御宇上德表物垂法雲以湛潤開慧日而增暉遠比溟海近譬井幹粵今遂古孰能識乎此焉至如經喻雀飛瓶在火滅字存禮云非類弗歆祭乃降祉且夢蘭以授鄭穆結草以抗杜回凡此群列不可悉紀又五道遞往六度同歸皆神之顯驗不滅之幽旨但郤克屣足豈從邯鄲比蹤盧敖捷至寧與若士齊跡今仰墜五藻俯逮闡提所謂若披重霧以攀合璧出幽夜而眄燭龍短綆爰汲望瀾覘海實觀喜頂戴若無價寶珠沈宏頓首和南弘明集十答釋法雲書難范縝神滅論猥枉明誥頒述敕旨審神不滅以答臣下理據昞然表裏該妙所以慧現獨宣舟梁含氣夫目所不覩帷屏為隔耳所不聞遐邇致擁不得以不聞不見便謂無聲無物今欲詰內教當仗外書外書不殊內教茲現書云魂氣無所不之佛經又曰而神不滅既內外符同神在之事無所多疑疑其滅者即蜉蝣不知晦朔蟪蛄之非春秋寧識大椿之永久日月之無窮主上聖明超古微妙通神三世之旨有證孝饗之理斯光蒼生管見已晦而復曉晚俗淪冥既迷而更悟弟子宿植逢幸預從餐道投心慈氏歸敬誠深惟孱來緣可期載懷鳧藻而已弟子顏繕呈弘明集答釋法雲書難范縝神滅論辱告惠示敕答臣下審神滅論伏奉欣仰喜不自支夫江海淵曠非井蛙所達泊然入定豈外道能干故一毛不動則衆邪退散舟航既濟而彼岸斯登聖后體蘊二儀德兼三代撫靈機而總極秉上智以調民發號施令則風行草偃臨朝尊默而化動如神隆五帝以比蹤超萬劫其方永猶復震全聲於指掌降妙思以發蒙理既仰而方深趣彌鑽而踰遠均寶珠於無價齊蓮華之下塵孝敬被乎群黎訓範侔於先聖蚑行喘息同識斯歡翾飛蠕動共陶茲慶班告來臨用深榮荷謹頂受書紳永啓庸惑弟子孫挹和南弘明集答釋法雲書難范縝神滅論辱告奉覿敕旨所答臣下審神滅論伏披素札仰瞻玄談文貫韶夏義測爻繫囊括經典牢寵述作弘彼正教垂之方𥳑希夷卓爾難得而聞斟酌賢聖剖破亳髮兼通內外之塗語過天人之際矣自非體茲至德思與神會豈能深明要道人知企及謹書諸紳永以為佩冷乎既人照若發蒙比故修詣共伸講復也弟子劉洽頓首呈弘明集十答釋法雲書難范縝神滅論仲欣白辱告惠示詔所答臣下審神滅論伏讀淵麗抃不勝躍皇帝睿性自天機神獨遠五體外照三明內映金輪徐轉則道濟八紘玉瓚既陳則孝隆七廟開慧日於清漢垂法雲於大千如在之義重闡茲晨常住之明永證來劫故以德冠百王聲高萬古弟子棲心法門崇信大典舞蹈之誠獨深鳧藻王仲欣和南弘明集十答釋法雲書難范縝神滅論緄和南弟子竊以為交求之道必取與為濟至於瀆蒙不告則空致憧憧倏魚之觀殆將可息所以自絶咨受崇深莫窺誠自愧也徒以暗識因果循循局誡冀履霜不退堅冰可至耳而法師弘心山藪幸能藏疾雖未升堂遂招以法流杜夷云召渴馬於滮泉不待鞭策而至矣垂示上答臣下神滅論晨宵伏讀用忘疲寢構斯法棟導彼迷流天屬既伸三世又辨鬼神情狀於焉可求然謂海實廣廣孰能知謂天蓋高高不可測聖論鉤深旨超繫表蒙情易駘恧能是空銘末示終愧鑽仰弟子沈緄和南弘明集十答釋法雲書難范縝神滅論辱告伏見敕答臣下審神滅論盛旨窮機微言合道生知出六儒之首自然該千聖之外至如感果之規理照三世孝饗之範義貫百王妙會與春冰等釋至趣若秋旻共朗足使調闡變情桀跖移志反澆風於遂古振淳波乎方冊英聲茂實粵不可尚法師精理之秀擅高日下俱沐聖化獨游神明深鑒道蘊洞識宗塗弟子昔聞師說悟太傅之旨今偶昌時奉不滅之訓信以照晳希蒙紓洗塵蓋足蹈手舞言象豈能勝張翻和南弘明集十輿櫬詣闕上封事大梁應運功高百王慈悲既弘憲律如替愚輩罔識褫慢斯作各競奢侈貪穢遂生頗由陛下寵勳太過馭下太寬故廉潔者自進無途貪苛者取入多徑直弦者淪溺溝壑曲鉤者升進重沓飾口利辭競相推薦訥直守信坐見理沒勞深勳厚祿賞未均無功側人反加寵擢昔宋人賣酒犬惡致酸陛下之犬其甚矣哉臣聞人為國本食為人命故禮曰國無六年之儲謂非其國也推此而言農為急務而郡縣苛暴不加勸獎本年豐歲稔猶人有饑色設遇水旱何以救之陛下昔歲尚學置立五館行吟坐詠誦聲溢境比來慕法普天信向家家齊戒人人懺禮不務農桑空談彼岸夫農桑者今日濟育功德者將來勝因豈可墮本勤末置邇效賒也今商旅轉繁游食轉衆耕夫日少杼軸日空陛下若廣興屯田賤金貴粟勤農桑者擢以階級惰耕織者告以明刑如此數年則家給人足廉讓可生夫君子小人智計不同君子志於道小人謀於利志於道者安國濟人志於利者損物圖己道人者害國小人也忠良者捍國君子也臣見知者詣道士則勸奏章僧尼則令齊講俗師則鬼禍須解醫診則湯尉散丸皆先自為也臣謂為國之本與療病相類療病當去巫鬼尋華扁為國當黜佞邪用管晏今之所任腹背之毛耳論外則有勉捨說內則有雲旻雲旻所議則傷俗盛法勉捨之志唯願安枕江東主慈臣恇息謀外甸使中國士女南望懷冤若賈誼重生豈不慟哭臣今直言犯顏罪或容宥而乖忤貴臣則禍在不測所以不憚鼎鑊區區必聞者正以社稷計重而螻蟻命輕使臣言入身滅臣何所恨夫謀臣良將何代無之貴在見知要在見用耳陛下皇基兆運二十餘載臣子之節諫爭是誰執事皆同而不和答問唯唯而已入對則言聖旨紳衷出論則云誰敢逆耳過實在下而謫見於上遂使聖皇降誠躬自引咎宰輔晏然曾無謙退且百僚卿士鮮有奉公尸祿競利不尚廉潔聚全積鏹侍列如仙不田不商何故而爾法者人之父母惠者人之仇讎法嚴則人思善德多則物生惡惡不可長欲不可縱伏願去貪濁進廉平明法令嚴刑罰禁奢侈薄賦斂則天下幸甚謹上封事二十九條伏願抑獨斷之明少察愚瞽都下佛寺五百餘所窮極宏麗僧尼十餘萬資産豐沃所在郡縣不可勝言道人又有白徒尼則皆畜養女皆不貫人籍天下戶口幾亡其半而僧尼多非法養女皆服羅紈其蠹俗傷法抑由於此請精加檢括若無道行四十已下皆使還俗附農罷白徒養女聽畜奴婢婢唯著青布衣僧尼皆令蔬食如此則法興俗盛國富人殷不然恐方來處處成寺家家剃落尺土一人非復國有朝廷擢用勳舊為三陲州郡不顧御人之道唯以貪殘為務迫脅良善害甚豺狼江湘人尢受其斃自三關以外是處遭毒而此勳人投化之始但有一身及被任用皆募部曲而揚徐之人逼以衆役多投其募利其貨財皆虛名上簿止送出三津名在遠役身歸鄉里又懼本屬檢問於是逃亡他境僑戶之興良由此故梁興以來發人征役號為三五及投募將客主將無恩存恤失理多有物故輒刺叛亡或有身殞戰場而名在叛目監符下討稱為逋叛録質家丁合家又叛則取同籍同籍又叛則取比伍比伍又叛則望村而取一人有犯則合村皆空雖肆眚時降蕩滌惟始而監符猶下舊日限以嚴程上下任信下轉相督促臺使到州州又遣押使至郡州郡競急切同趣下城令宰多庸才望風畏伏於是斂戶課薦其筐篚使人納重貨許立空文其百里微欲矯俗則嚴科立至自是所在恣意貪利以事上官請斷界首將生口入北及關津廢替須加糾擲盧陵年少不宜鎮襄陽左僕射王暕在喪被起為吳郡曾無辭讓請復郊四星南史七十郭祖深傳帝溺情內教朝政縱弛祖深輿櫬詣闕上封事其略云云帝雖不能悉用然嘉其正直擢為豫章鍾陵令拍張賦東方曼倩發憤於侏儒遂與火頭食子稟賜不殊南史三十三何遜傳窮烏賦嗟窮烏之小鳥意局促而馴擾聲遇物而知哀翮排空而不矯望絶侶於夕霞聽翔群於月曉既滅志於雲霄遂甘心於園沼時復搶榆決至觸案窮歸若中氣而自墮似驚弦之不飛同雉塒而共宿啄鴈稗以爭肥異海鷗之去就無青鳥之是非豈能瑞周德而丹羽感燕悲而素暉雖有知於理會終失悟於心機初學記三十又略見藝文類聚九十二與建安王謝秀才箋州民泥塗何遜死罪即日被板以民充年秀才民謝聲非關右月旦名誰録覩物託興乏淡雅之才文豈飄然之作伏惟大王殿下令聞令望邁楚逾河好德好士雲歸海赴若夫選重雄州望隆觀國必使聲高後進德繼前修民學異扣鍾辨慚炙輠將以允應貢選待問金門上第甲科既慚髣佛管窺錐畫彌畏友朋恩榮忽賁固請無涯便當妄忝魯服濫同齊吹戰荷屏營欣惶共色不任下情謹奉箋以聞為孔導辭建安王箋士實塗泥美非竹箭昔逢際會忝申名質悠悠漢水獨騖輕舟雖慕義如歸而暗投多懼遂禮頻上席愛比後車感此隆遇久知輕死軒蓋出內歷念陪遊府朝升進隨事多幸賜餘論於顏色奉德音於宴和藉此增榮遂延繆價今便除名復足在寬身非木石戀同犬馬雖朝夕曳裾無違接侍而職務一離有同賓客瞻階下拜屑涕無從永言僚故載懷罔已頡頏之禽慚悲於出幕蒙茸之獸結志於首丘為衡山侯與婦書昔人遨遊洛汭會遇陽臺神仙髣佛有如今別雖帳前微笑涉想猶存而幄裏餘香從風且歇掩屏為疾引領成勞鏡想分鸞琴悲別鶴心如膏火獨夜自煎思等流波終朝不息始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虛路邇人遐音塵寂絶一日三秋不足為喻聊陳往翰寧寫款懷遲枉瓊瑤慰其杼軸藝文類聚三十二答釋法雲書難范縝神滅論緄和南辱告并逮示敕答神滅論伏覽淵旨疏心蕩纍竊惟希夷之本難尋妙密之源莫覩自非上聖無以談其宗非夫至睿焉能導其極皇上窮神體寂鑒道居微發德音則三世自彰布善言而千里承響誠叶禮敬義感人祇理扇玄風德被幽顯悠悠巨夜長昏倏曉蠢蠢愚生一朝獨悟勵鹿苑之潛功澍法流於日用鴻名永播懋實方馳迷滯知反淪疑自息弟子歸向早深倍兼抃悅輒奉以周旋弗敢云墜但蠡測管窺終懷如失耳徐緄和南弘明集十答釋法雲書難范縝神滅論垂示聖旨答臣下審神滅論伏惟至尊垂拱巖廊游心萬古居無棄日道勝惟機爰訪群下恢弘孝義睿藻淵玄理深樞極自非聰明徇齊之君就日望雲之主豈有剖判冥寂明章雅論闡大聖於須臾定俗疑於俄頃非惟理測宸衷亦乃義切臣子含和飲憓之邦衣裳道素之域莫不傾首仁澤沐浴唐風弟子江淮孤身不學無術雖復從師北面一經不明縱憶舊文豈伊髣佛五經紛綸事類弘博神明之旨其義多端至如金石絲竹之響公旦代武之說寧非聖旨且祭義而談尢為顯據若論無神亦可無聖許其有聖便應有神理且炳然豈容寂絶弟子所見庸淺無以宣揚至澤既涉訪逮輒率所懷弟子王靖和南弘明集十
