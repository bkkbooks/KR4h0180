body:
  text: 闕名奏敬貴嬪禮禮母以子貴皇儲所生不容無敬宋泰豫元年六月議百官以吏敬敬帝所生陳太妃則宋明帝在時百官未有敬臣竊謂母以子貴義著春秋皇太子副二宸極率土咸執吏禮既盡禮皇儲則所生不容無敬但帝王妃嬪義與外隔以理以例無致敬之道也今皇太子聖睿在躬儲禮夙備子貴之道抑有舊章王侯妃主常得通信問者及六宮三夫人雖與貴嬪同列並應以敬皇太子之禮敬貴嬪宋元嘉中始興武陵國臣並以吏敬敬所生潘淑妃路淑媛貴嬪于宮臣雖非小君其義不異與宋泰豫朝議百官以吏敬敬帝所生事義正同謂宮閹施敬宜同吏禮詣神獸門奉箋致謁年節稱慶亦同如此婦人無閫外之事賀及問訊箋什所由官報聞而巳夫婦人之道義無自專若不仰繫于夫則當俯繫于子榮親之道應極其所榮未有子所行而所從不足者也故春秋凡王命為夫人則禮秩與子等列國雖異于儲二而從尊之義不殊前代依准布在舊事貴嬪載誕元良克固太業禮同儲君實為舊典尋前代始置貴嬪位次皇后爵無所視其次職者位視相國爵比諸侯王此貴嬪之禮已高朝列況母儀春宮義絶常算且儲妃作配率由盛則以婦踰姑彌乖從序謂貴嬪典章一與太子不異梁書高祖丁貴嬪傳天監元年八月為貴嬪及昭明太子定位有司奏又略見南史十二奏請郊祭用俎禮云觀天下之物無可以稱其德則知郊祭為俎理不應染又藉用白茅禮無所出皇天大帝坐既用俎則知郊有俎義隋書禮儀志一天監十一年八座奏于是改用素俎奏停南北二郊坎位五帝之義不應居坎良由齊代圜丘小而且峻邊無安神之所今丘形既大易可取安請五帝座悉于壇上外域二十八宿及雨師等座悉停為坎隋書禮儀志一天監十一年八座奏奏定雜號將軍天監七年改定將軍之名有因有革並通六年又置百號將軍更加刊正雜號之中微有移異隋書百官志上大通三年有司奏奏岑之敬年例未應高第皇朝多士例止明經若顏閔之流乃應高第陳書岑之敬傳年十六策擢高第御史奏云云帝省其策曰何妨使失復有顏閔邪齊日鼓吹議請與駕始出鼓吹從而不作還宮如常儀通典一百四十二天監七年八座丞郎參議帝從之宗廟應省迎送樂議漢禮樂志云太祀迎神于廟門奏嘉至猶古降神之樂也宋孝建則奏肆夏元徽則奏昭夏魏晉無文齊則因宋案周禮尸出入奏昭夏二者尸牲所奏本無迎送之義郊特牲曰殷以樂降神周以鬯降神殷尚質據天而起先聲樂乃灌地周尚文據地而主先灌地乃擊樂以殷而言止施郊壇清廟嚴閟此唯靈宅主安于龕神若是依既無出入何事迎送歌陽而迎彌非降神之敬儒者云周祀尸出入奏肆夏今無復尸即以迎神尸非神神非尸回此迎神失之以遠宗廟則應省迎送樂通典一百四十七參跣襪議案禮跣襪事由燕坐屨不宜陳尊者之側今則極敬之所莫不皆跣清廟崇嚴既絶恆禮凡有履行者應皆跣襪隋書禮儀志六天監十一年尚書參議詔可朱异贈官啓异忝歷雖多然平生所懷願得執法梁書朱异傳舊尚書官不己為贈及异卒高祖惜之方議贈事左右有善异者乃啓為王太尉僧辨答貞陽侯書孤子僧辨頓首頓首席威卿反命具有奉答馬嵩仁至又奉去月二十八日誨增用傾悚秦為不道西都失守率士臣妾莫不驚惶喪君有君實惟典禮繼世嗣曆明于通誥所以百辟群司四方嶽牧共立大計僉議所歸故紹晉安殿下用傳寶祚樹立之宜無由遠謀鄰國足下宗枝蕃戚德譽早隆既身限北庭事隔匡贊今者借助齊主揚旆南轅但嗣守洪基即既其主若何衡帝載誠所推揖弘佐中興唯曰不可所望齊朝永存信誓謹當命北舟人奉迎麾駕無容進枉齊兵遠千江表仰冀弼諧時政用極奮庸但江東之地數千餘里民附國險水陸襟帶若舊京從命揚徐承旨又恐西南之地二十餘州不即威懷容為齊國之患而糧裹之宜更遲動靜祇展之日冀在一二謹因馬嵩仁并遣真威將軍通直郎散騎常侍馬瑱口宣咨述孤子王僧辨頓首頓首文苑英華六百七十七以為徐陵作舊校云陳書徐陵傳齊送貞陽侯蕭淵明為梁嗣遣陵隨還僧辨不納淵明往復致書皆陵詞今僧辨答書恐非陵作後同案校語其確今改列于闕名中後同又為王太尉答貞陽侯書僧辨頓首頓首曰席威卿至奉今月五日誨披函伸紙口恥交哀天未悔禍地維重絶九縣沸騰四海悲憤嗣主欽明濬哲齊聖廣淵體自宸極受命文祖主梁祀者非此而誰且年倍漢昭弗明上官之詐德踰姬誦彌昭周旦之誠今海內衣冠中朝卿士或南陽舊隸官成天監之初代邸故臣榮光承聖之始莫不人竭其力爭求效命輸心嗣主以執先帝之恩今荊陜淪覆正是江北數縣即東南藩翰萬里而遙主甲治兵艫舳相接長波天限方漢城池修德綏民中興可待孤子本以庸懦加復窮喘且平生素蓄志不在位世蒙朝寵身實許國武皇擢之千里先主申其三顧因此踰濫遂居端右屬天步艱難寄深憂積方欲詢于髦傑采之輿皂同康時務共贊皇猷一彼車書刷茲讎恥然後守其侯服歸老赤松至如今日使須白事披奉來誨承彼送還今琁枝令戚播越奏虜明公儻能入朝同獎王室伊呂之任僉曰仰歸寧不副茲仄席濟扶匡救若斯言不渝更聽後旨便遣蠲舟弘舸奉迎麾旆但閲來朝意在主盟今江東所奉彼屬披圖未蒙朝意鄭拒子忽左史是之漢背劉襄班書稱允況屬疏于踖彌不敢聞命謀期通識賜亮此誠孤子王僧辨頓首頓首文苑英華六百七十七代陳司空答貞陽侯書某頓首頓首使人孔文端至奉此月四日誨兼翰纍牘俯加循覽以悲以慰先皇聖德在躬體道康哲允恭克讓就日望雲玄雀銜書皇天眷命光宅區宇司牧黎元澤與風行恩隨雨散朔南暨教要荒貢篚而運鍾百六時屬陵夷賊臣侯景內奰中國掘翦公室鞭撻寓縣三光掩𦡱四海分崩嗣后大孝發衷志清國舋載齊車以誓衆墨衰裳而鞠旅遙授兵略沿流電邁不崇朝而戮封豕才信宿而翦奔鯨雖天未絶梁伊帝之力方欲克復梁雍吞滅崤函即都渚宮將議進取而窮昊不惠頻降愍凶秦氏虎狼肆其虐暴主上幽辱鑾輿播遷悲結萬姓痛深九服社稷須主天下難曠晉安殿下地惟密戚親實愛子弱表徇齊幼而岐嶷群公卿士嶽牧藩鎮莫不頓首屈膝請嗣宗祧王太尉秉德居宗實為元輔僕以不敏預參末將今朝野寧晏方鎮協和戮力華夷同獎王室庶竭股肱蕩刷讎舋殿下夙標令譽早播明德親則章興地惟蔣邢昔因多故託身大國今蒙發敕巳次壽春載披來旨實深傾注但帝子承制非為乏主冢宰匡翊寧俟長君雖則末學頗聞前載成王踐阼曾未壯年昭帝君臨實惟童孺若以家國多故思濟艱難仰惟尊戚莫不屬望分陜之寄側聽高旨如使不繼親地便議崇極上相居中自當奉報昔仲子舍孫檀弓有作趙求外主穆嬴以諦前事不忘可為故實蕃維末鎮敢用多陳遠降誨函唯深哽佩陳某頓首頓首文苑英華六百七十七以為徐陵作今改列闕名中七召假是先生負茲徑逞狀群飛之器侶似獨行之迷徑神忽忽而若忘意衝衝而不定鑒丹緑其無主聞鐘鼓以失聽至及冬霰積庭室靡人聲春花滿野他無行者圜堵常閉曲突無煙同生芻之暫有共死灰之一燃篤論公子聞而崛起雖道術之可忘亦切磋之所恥命徒御以絡繹將有事于巖中車煜爚而流水馬泮渙以追風乃踰汗漫入蒙籠至深潭之瀴溟有洞室之窮崇居隱磷而出沒望嶔岑而下上竹距石以斜通水韻松以含響地不寒而蕭瑟日無雲而曭朗于是整容投刺屣履排門揚眉就席舉袂而言曰若五秀稟其生靈六情通其愛惡增共集于鄙老嗜同歸于美樂今足下群鳥獸以為娛處貧賤而不作欲賓實于孤介乃貽譏于隕穫至乃喀喀死于道邊瞀瞀填乎溝壑削松筆以晝虎鼓鉛刀而刻鶴身既勞而不見事何感而莫懲欲模名于帶索豈知命于泥繩何異走長衢以避影煎流水以求冰今欲道足下以衛生之祕術怡神之妙道譬之愈投口于寒植同起尸于仙草寧願聞乎先生曰有為之生已逼無益之慮常勞若見明于礙滯幸求救于肓膏公子曰千門始搆百常洞啓激洛開渠疏山抗陛延袤水陸曠望東西下臨江海上屬雲霓百丈杳冥以飛跨九層鬱律以階梯步三休而更回塗中宿而方迷雕牆屈曲以交牙網戶周流以重積既陰涔而影響亦叫嘯而回易沙板金鋪紫柱玉舄煒煌熻赩硱磳摶敝圖雲霧之蔽虧狀神仙之來往壁璫自耀珠綴恆響蜉蝣動而晝喧熠耀飛而夜朗既臨下以寥沈亦憑高而泱漭聞疾雷于階陛弄奔星于帷幌亘以曲當周以洞房北負連闥南注長廊綺疏交映鏤檻相望燕飛蓮井日照杏梁陽鳥騫其將動雲鳳矯而欲翔若乃後沼開源延石崇壤擬崑閬之𡿥岪比滄溟之瀇漾其中則有桂宮柏寢吳臺柘館復道耿介而連雲阿閣窮隆而仰漢望虯欄之映水見丹鶴之出岸豔草奇色臺樹珍名長生靈壽男華女貞河柳垂葉山榴發英玩奇之春滿摘甘實于夏成此實宮苑之壯麗豈能從我而為榮先生日多言反道辨口傷實懼貽斃于蔀家且自安乎容膝公子曰銅瓶玉井金釜桂薪六穀九鼎百葉千珍熊蹯虛掌雞跖狸脣𩻛魚兩味玄犀五肉捨卵鳳巢剖胎豹腹三臠甘口七葅愜目蒸餅十字湯官五熟梅椒魯豉河鹽蜀薑劑水火而調和糅蘇蔱以芬芳脯追復而不盡犢魚稍割其無傷黿羹流啜蚔醬先嘗鱠溫湖之美蚶切丙穴之嘉魴落俎霞散逐刃飛揚輕同曳繭白似飛霜蔗有盈丈之名桃表兼斤之實杏積魏國之貢菱為巨野所出衡曲黃梨汶垂蒼栗隴西白榛楠南朱橘荔枝沙棠蒲萄石蜜瓜稱素腕之美棗有細腰之質並抗吻以除煩亦咀牙而消疾于是三雅陳席百味開印玉機星稀蘭英縹潤既夷志于坎壈亦懷忘于鄙吝此蓋滋旨之極珍豈能從豫而共進先生曰不貴偷食寧甘醇酒既深悟干腐腸豈自迷于爽口公子曰秦氏獨立燕姝絶世如短如長不穠不細信耳目之妖冶乃古今之佳麗妍姿豔逸淑性間華效施顰于宋里經墮馬于梁家折纖腰以微步里皓腕乎輕紗臨池正領拂鏡看花觀堵牆以颯沓傾城國以喧譁墨欲歸而抽軡惠將返而回車至乃鄭衛繁聲抑揚絶調足使風雲變動性靈感召擊哀響則春臺之人愴焉而雪泣起歡情則崩城之婦嫣然而微笑嶰谷調鳳之竹龍門獨鵠之柯緑珠絳樹宋獵韓娥青春婉娩上客經過開洞房以命賞召才人而合宴舉輕幔以徐來隔珠簾而可見床披珠象簟展羅薦聽促柱之方進聞廣聲之始囀步想象以頓足腕蹣連而拂面托斜視于遺簪寄含情而舉扇俄而夕烏東反落日西懸綺霞映水蛾月升天解鴛鴦之繡被拂距䭹之長氈燭中幃而動爛香山帳而微烟願橫施以自昵脫斜領于君前此乃聲色之妖蕩將不從我而留連先生曰淫聲非篤論之旨麗色本余情所棄伐國不問仁人此言從何而至公子曰歲晚農休時間務隙山火已燎野霜初白聊效殺于冬秋乃從禽于草澤蜀地五丁齊國二子氣動山漂汗揮雨起渥窪流赬蘭池照血躡飛影于未形赴奔星于欲滅革車隱隱轂騎闐闐鼓誤喧而振地丞徒駭而聒天割玉之刀飲石之箭罝羅布其一目罟網周及三面犬號驤螭鷹名奔電暫離已合忽隱仍見赴迥起危衝林跋援草隨足起山從眼轉跨躡岡㵎電舉陵陸鳥不及飛獸不遑伏既前轥而後赴亦左排而右蹴跖實駭而自救騰虛亂而相撲視灑血之丹地見飛毛之暗目傍窮劫剞勢極搜求文皮坐裂膬尾生抽手羈鐵頂足批銅頭象折牙而陵遽貊拉齒而夷由擒高樓之度索走大樹之神牛雁聞弦而跕墮猿抱木而啾啾笑楚王之雲夢恥漢帝之中流此武材之矯猛豈能從我而畋遊先生曰馳騁傷仁好殺非勇幸廣內之豐樂何禽荒之足重公子曰踆烏始照宮槐遽而欲舒顧兔才滿庭英紛而就落譬光影于飛浮比生靈于栖託擾擾摩肩轔轔方駕立怵迫于毀譽獨殷勤于用舍嗟向有而今無歎後榮而前謝清歌雅舞暫同于夢寐廣廈高堂俄成于幻化若夫洗精服食慕道遊仙尋玉塵于萬里守金龜于千年三戶可度九轉難傳飛騰水陸咀噣靈玄若乃壁上真辭枕中祕要彈壓神鬼吐納靈妙既變醜以成妍亦反老而為少虬駕夭矯而出沒霓裳颯沓而容與接鵠馭于後乘追鳳簫于前侶雨散漫以霑服雲霏微而襲宇瞰芝闕以窈窕見玉臺之相拒蓋排煙而漸滅旌拖風而未舉值解佩于江濱逢弄珠于漢緒薄遊玄圃弭節太華列神童于羽帳侍玉女于仙車㵎采兮危實苑拔兮回花聽弱水之晨浪望崑山之夕霞窮北辰而比壽指中嶽以為家此神仙之恍惚豈從我而蠲邪先生曰捕影之言莫測繫風之論難盡未嘗留意于死生豈復稍論于椿菌公子曰洙泗遺文鄒魯餘烈其道未遠其風不絶方領圓冠金口木舌談章句之遠旨搆紛綸之雅說陳五禮明六詩貫穿微妙辨析毫釐既待問以重席亦覃思而下幃醞藉愷悌和樂緝熙生徒肅肅賓友師師並接衽以聞道俱援手而受辭心絶內戰事無外欲橫經者比肩擁帚者繼足醜申韓之法令陋桓文之風俗六郡溱其衣冠五陵窮其軌躅信斯文其若水實斯人之如玉若夫珠璣産于蚌蛤圭璧出于山淵未有玉不瑩而為寶人無學而稱賢蓋持身之管籥進德之舟船響如鐘而待叩明似鏡而常懸此見重于經術寧降志于吾賢先生曰誠此言之甚美比斯道之為曠恥見嘲于腐儒豈求珍于席上公子曰我大梁之啓基方邃古而無匹先天定始比殷周而餘裕揖讓受終考唐虞而不失道德有序憲章咸秩六府孔修百司盡畢搜求儒雅招拾遺逸旰食思治雖聞之于昔談昧旦臨朝乃見乎茲日蕩蕩薰風泱泱大興道含弘而廣被澤汪濊而傍闡采輿人之片言納匹夫之小善事在微而畢照然無幽而不顯若夫下車布德伐罪弔民風無偃稼雨不破塵覩勝殘于朞月成俗于浹辰含群生兮如海養萬類其猶春鄉無豕食之祿野靡狼顧之民樵者目金而知恥耕夫襄畔以成仁何大庭之足競豈栗陸之能鄰壁水道庠序之風石渠啓圭璋之盛奇士輻湊而聘足異人閒出而效命大小之獄無冤民翾飛之物無夭姓故能睦之以九世齊之以七政坦坦恢恢巍巍赫赫政德洽于霜風教義窮于足迹望雲氣而款關候海水而重譯所謂府不輟貢史無虛帛天瑞磊砢而相尋地符氛氳而不少收六穗于征賦玩九莖于池沼三足應感而來儀一角知時而自擾映景星于初月聆鳳音于將曉若乃亭毒不疵合天地而並施陶鈞日月與造化而齊功故非言辭之可具盡筆札之所能窮懷真獨往之夫奔走而從事滅迹藏名之士顛倒而向風二漢有同于兒戲魏晉無礙于胸中言未畢先生攝衣而起曰子前所說似玉卮之無當徒費辭而難領譬由背日而視秋毫郤行而求鄢郢一聞皇王之盛則豁然神悟而理攄志無時而可卷邦有道而宜舒敢以淺智請從後車文苑英華三百五十二銘巖巖我君崇墉增仞內通神明出符大順火炎崑岡神嶽崩潰蘭艾同燼玉石俱碎哲人遭命哀有餘慨藝文類聚五十在任昉為齊竟陵王臨會稽郡教未甘露寺鐵鑊天監十八年太歲乙亥十二月丙午朔十日乙卯皇帝親造鐵鑊於解脫佛殿前滿貯甘泉種以荷蕖供養十方一切諸佛以佛神力遍至十方盡虛空界窮未來際令地獄苦鑊變為七珍寶池地獄沸湯化為八功德水一切四生解脫衆苦如蓮花在泥清淨無染同得安樂到涅槃城斯鑊之用本給烹鮮八珍興染五味生纏我皇淨照慈被無邊法喜禪悅何取腥羶爰造斯器回成勝緣如含碧水生發紅蓮道場供養永永無邊張邦基墨莊漫録云京口北固山甘露寺有二大鐵鑊梁天監中鑄石井匡題字梁天監十五年太歲丙申皇帝愍商之渴乏詔茅山道士永若作亭井十五口拓本
