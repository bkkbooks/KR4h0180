body:
  text: 沈約擬風賦若夫搖玉樹響金扉拂九層之羽蓋轉八鳳之珠旂時卷瑤臺翠蓋乍動佚女輕衣此蓋羽客之仙風也藝文類聚一麗人賦有客弱冠未仕締交戚里馳騖王室遨遊許史歸而稱曰狹斜才女銅街麗人亭亭似月嬿婉如春凝情待價思尚衣巾芳踰散麝色茂開蓮陸離羽珮雜錯花鈿響羅衣而不進隱明燈而未前中步襜而一息順長廊而迴歸池翻荷而納影風動竹而吹衣薄暮延佇宵分乃至出闇入光含羞隱媚垂羅曳錦鳴瑤動翠來脫薄妝去留餘膩霑妝委露理鬢清渠落花入領微風動裾藝文類聚十八傷美人賦信美顏其如玉咀清哇而度曲思佳人而未來望餘光而躑躅拂螭雲之高帳陳九枝之華燭虛翡翠之珠被空合歡之芳褥言歡愛之可永庶羅袂之空裁曾未申其巧笑忽淪軀於夜臺伊芳春之仲節夜猶長而未遽悵徙倚而不眠往徘徊於故處藝文類聚三十四愍塗賦結榜窮渚思臨長嶼情依舊越身經故楚彼長路之多端伊客心之無緒懽因情而易失悲由心而難拒此江海之信遼知余思之方阻日掩長浦風掃聯葭疊雲凝憤廣水騰華聽奔沸於洲嶼望掩曖乎煙沙依雲邊以知國極鳥道以瞻家免悽愴於羈離亦殷勤於行路歎余塗之屢蹇奚前芳之可慕藝文類聚二十七憫國賦余生平之無立徒跅弛以自閑處圍城之惵惵得無用於行間對僚友而不怡咸悄顏而相顧畏高衝之北擬壯激矢之南度駭潛師之夜過驚躍馬之晨呼矛森森而密豎旗落落而疎布時難紛其未已歲功迫其將徂育素蟣於玄冑垂葆髮於縵胡藝文類聚五十九郊居賦惟至人之非己固物我而兼忘自中智以下愚咸得性以為場獸因窟而獲騁鳥先巢而後翔陳巷窮而業泰嬰居湫而德昌僑棲仁於東里鳳晦跡於西堂伊吾人之褊志無經世之大方思依林而羽戢願託水而鱗藏固無情於輪奐非有欲於康莊披東郊之寥廓入蓬藋之荒茫既從豎而橫構亦風除而雨攘昔西漢之標季余播遷之云始違利建於海昏創惟桑於江汜同河濟之重世踰班生之十紀或辭祿而反耕或彈冠而來仕逮有晉之隆安集艱虞於天步世交爭而波流民失時而狼顧延亂麻於井邑曝如莽於衢路大地曠而靡容旻天遠而誰訴伊皇祖之弱辰逢時艱之孔棘違危邦而窘驚訪安土而移即肇胥宇於朱方掩閒庭而晏息值龍顏之鬱起乃憑風而矯翼指皇邑而南轅駕脩衢以騁力遷華扉而來啟張高衡而徙植傍逸陌之脩平面淮流之清直芳塵浸而悠遠世道忽其窊隆緜四代於茲日盈百祀於微躬嗟敝廬之難保若霣籜之從風或誅茅而翦棘或既西而復東乍容身於白社亦寄孥於伯通迹平生之耿介實有心於獨往思幽人而軫念望東皋而長想本忘情於徇物徒羈紲於天壤應屢歎於牽絲陸興言於世網事滔滔而未合志悁悁而無爽路將殫而彌峭情薄暮而踰廣抱寸心其如蘭何斯願之浩蕩詠歸歟而躑跼眷巖阿而抵掌逢時君之喪德何凶昏之孔熾乃戰牧所未陳實升陑所不記彼黎元之喋喋將垂獸而為餌瞻穹昊而無歸雖非牢而被胾始歎絲而未覩終逌組而後值尋貽愛乎上天固非民其莫甚授冥符於井翼實靈命之所稟當降監之初辰值積惡之云稔寍方割於下墊廓重氛於上墋躬靡暇於朝食常求衣於夜枕既牢籠於媯夏又驅馳乎軒頊德無遠而不被明無微而不燭鼓玄澤於大荒播仁風於遐俗闢終古而遐念信王猷其如玉值銜圖之盛世遇興聖之嘉期謝中涓於初日叨光佐於此時闕投石之猛志無飛矢之麗辭排陽鳥而命邑方河山而啟基翼儲光於三善長王職於百司兢鄙夫之易失懼寵祿之難持伊前世之貴仕罕紆情於丘窟譬叢華於楚趙每驕奢以相越築甲館於銅駞竝高門於北闕闢重扃於華閫豈蓬蒿所能沒敖傳嗣於墝壤何安身於窮地味先哲而為言固余心之所嗜不慕權於城市豈邀名於屠肆詠希微以考室幸風霜之可庇爾乃傍窮野抵荒郊編霜菼葺寒茅構棲噪之所集築町疃之所交因犯檐而刊樹由妨基而翦巢決渟洿之汀濙塞井甃之淪坳藝芳枳於北渠樹脩楊於南浦遷甕牖於蘭室同肩牆於華堵織宿楚以成門籍外扉而為戶既取陰於庭樾又因籬於芳杜開閣室以遠臨闢高軒而旁覩漸沼沚於霤垂周塍陌於堂下其水草則蘋萍芡芰菁藻蒹菰石衣海髮黃荇綠蒲動紅荷於輕浪覆碧葉於澄湖飡嘉實而卻老振羽服於清都其陸卉則紫鼈綠葹天蓍山韭雁齒麋舌牛脣彘首布濩南池之陽爛漫北樓之後或幕渚而芘地或縈窗而窺牖若乃園宅殊製田圃異區李衡則橘林千樹石崇則雜果萬株並豪情之所侈非儉志之所娛欲令紛披蓊鬱吐綠攢朱羅窗映戶接霤承隅開丹房以四照舒翠葉而九衢抽紅英於紫蔕銜素蕊於青跗其林鳥則翻泊頡頏遺音下上楚雀多名流嚶雜響或班尾而綺翼或綠衿而絳顙好葉隱而枝藏乍間關而來往其水禽則大鴻小雁天狗澤虞秋鷖寒䳵脩鷁短鳧曳參差之弱藻戲瀺灂之輕軀翅抨流而起沫翼鼓浪而成珠其魚則赤鯉青魴纖鯈鉅鱯碧鱗朱尾脩顱偃頟小則戲渚成文大則噴流揚白不興羨於江海聊相忘於余宅其竹則東南獨秀九府擅奇不遷植於淇水豈分根於樂池秋蜩吟葉寒雀噪枝來風南軒之下負雪北堂之垂訪往塗之軫跡觀先識之情偽每誅空而索有皆指難以為易不自已而求足竝尤物以興累亦昔士之所迷而今余之所避也原農皇之攸始討厥播之云初肇變腥以粒食乃人命之所儲尋井田之往記考阡陌於前書顏簞食而樂在鄭高廩而空虛頃四百而不足畝五十而有餘撫幽衷而跼念幸取給於庭廬緯東菑之故耜浸北畝之新渠無褰爨於曉蓐不抱惄於朝蔬排外物以齊遣獨為累之在余安事千斯之積不羨汶陽之墟臨巽維而騁目即堆冢而流眄雖茲山之培塿乃文靖之所宴驅四牡之低昂響繁笳之清囀羅方員而綺錯窮海陸而兼薦奚一權之足偉委千金其如線試撫臆而為言豈斯風之可扇將通人之遠旨非庸情之所見聊遷情而徙睇識方阜於歸津帶脩汀於桂渚肇舉鍤於彊秦路縈吳而款越塗被海而通閩懷三島以長念伊故鄉之可珍實褰期於晚歲非失步於芳春何東川之濔濔獨流涕於吾人謬參賢於昔代亟徒遊於茲所侍綵旄而齊轡陪龍舟而遵渚或列席而賦詩或班觴而宴語繐帷一朝冥漠西陵忽其葱楚望商飆而永歎每樂愷於斯觀始則鍾石鏘鈜終以魚龍瀾漫或升降有序或浮白無笇貴則丙魏蕭曹親則梁武周旦莫不共霜霧而歇滅與風雲而消散眺孫后之墓田尋雄霸之遺武實接漢之後王信開吳之英主指衡岳而作鎮包江漢而為宇徒徵言於石椁遂延災於金縷忽蕪穢而不脩同原陵之膴膴寍知螻蟻之與狐兔無論樵芻之與牧豎睇東巘以流目心悽愴而不怡蓋昔儲之舊苑實博望之餘基脩林則表以桂樹列草則冠以芳芝風臺累翼月榭重栭千櫨捷嶪百栱相持皁轅林駕蘭枻水嬉踰三齡而事往忽二紀以歷茲咸夷漫以蕩滌非古今之異時回余眸於艮域覿高館於茲嶺雖混成以無跡實遺訓之可秉始湌霞而吐霧終陵虛而倒景駕雌蜺之連卷泛天江之悠永指咸池而一息望瑤臺而高騁匪爽言以自姱冀神方之可請惟鍾巖之隱鬱表皇都而作峻蓋望秩之所宗含風雲而吐潤其為狀也則巍峨崇崒喬枝拂日嶢嶷岧嵉墜石堆星岑崟峍屼或坳或平盤堅枕臥詭狀殊形孤嶝橫插洞穴斜經千丈萬仞三襲九成亙繞州邑款跨郊坰素煙晚帶白霧晨縈近循則一巖異色遠望則百嶺俱青觀二代之塋兆覩摧殘之餘隧成顛沛於虐豎康斂衿於虛器穆恭己於巖廊簡遊情於玄肆烈窮飲以致災安忘懷而受祟何宗祖之奇傑威橫天而陵地惟聖文之纘武殆隆平之可至余世德之所君仰遺封而掩淚神寢匪一靈館相距席布騂駒堂流桂醑降紫皇於天闕延二妃於湘渚浮蘭煙於桂棟召巫陽於南楚揚玉桴握椒糈怳臨風以浩唱折瓊茅而延佇敬惟空路邈遠神蹤遐闊念甚驚飆生猶聚沫歸妙軫於一乘啟玄扉於三達欲息心以遣累必違人而後豁或結橑於巖根或開櫺於木末室闇蘿蔦檐梢松栝既得理於兼謝固忘懷於饑渴或攀枝獨遠或陵雲高蹈因葺茨以結名猶觀空以表號得忘己於茲日豈期心於來報天假余以大德荷茲賜之無疆受老夫之嘉稱班燕禮於上庠無希驥之秀質乏如珪之令望邀昔恩於舊主重匪服於今皇仰休老之盛則請微軀於夕陽勞蒙司而獲謝猶奉職於春坊時言歸於陋宇聊暇日以翱翔棲余志於淨國歸余心於道場獸依墀而莫駭魚牣沼而不綱旋迷塗於去轍篤後念於徂光晚樹開花初英落蕊或異林而分丹青乍因風而雜紅紫紫蓮夜發紅荷曉舒輕風微動芬芳襲余風騷屑於園樹月籠連於池竹蔓長柯於簷桂發黃華於庭菊冰懸埳而帶坻雪縈松而被野鴨屯飛而不散雁高翔而欲下竝時物之可懷雖外來而非假實情性之所留滯亦志之而不能捨也傷余情之頹暮罹憂患其相溢悲異軫而同歸懽殊方而竝失時復託情魚鳥歸閑蓬蓽旁闕吳娃前無趙瑟以斯終老於焉消日惟以天地之恩不報書事之官靡述徒重於高門之地不載於良史之筆長太息其何言羌愧心之非一梁書沈約傳又見藝文類聚六十四有刪節愍衰草賦愍衰草衰草無容色憔悴荒逕中寒荄不可識昔時兮春日昔日兮春風含華兮佩實垂綠兮散紅氛氳鳷鵲右照耀望仙東送歸顧慕泣淇水嘉客淹留懷上宮巖陬兮海岸冰多兮霰積爛熳兮客根攢幽兮寓隙布綿密于寒皋吐纖疎于危石既惆悵於君子倍傷心于行役露高枝於初旦霜江天于始夕凋芳卉之九衢霣靈茅之三脊風急崤道難秋至客衣單既傷檐下菊復悲池上蘭飄落逐風盡方知歲早寒流螢暗明燭雁聲斷纔續萎絕長信宮蕪穢丹墀曲霜奪莖上紫風銷葉中綠山巒兮青薇水折兮平葦秋鴻兮疎引寒鳥兮聚飛逕荒寒草合草長荒逕微園庭日蕪沒霜露日沾衣願逐晨征鳥薄暮共西歸玉臺新詠箋注九詩紀七十四又類聚八十一引色識風散積石脊難單寒燭續綠飛微衣十七韻高松賦鬱彼高松栖根得地託北園於上邸依平臺而養翠若夫蟠株聳榦之懿含星漏月之奇經千霜而得拱仰百仞而方枝朝吐輕煙薄霧夜宿迷鳥羈雌露雖滋而不潤風未動而先知既梢雲於清漢亦倒景於華池輕陰蒙密喬柯布濩葉斷禽蹤枝通猨路聽騷騷於既曉望隱隱於將暮曖平湖而漾青綠拂增綺而籠丹素於時風急壟首寒浮塞天流蓬不息明月孤懸檀欒之竹可詠鄒枚之客存焉清都之念方遠姑射之想悠然擢柔情於蕙圃涌寶思於珠泉豈徒為善之小樂離繳之短篇若此而已乎藝文類聚八十八桐賦龍門之桐遠望青葱專巖擅嶺或孤或叢枝封暮雪葉映晝虹抗蘭橑以栖龍拂雕窗而團露喧密葉於鳳晨宿高枝於鸞暮合影陽崖摽峰東陸俯結玄陰仰成翠屋乍髣髴於行雨時徘徊於丹轂遶齊綵於碧林豈慚光於若木藝文類聚八十八天淵水鳥應詔賦天淵池鳥集水漣漪單汎姿容與群飛時合離將騫復斂翮迴首望驚雌飄薄出孤嶼未曾宿蘭渚飛飛忽云倦相鳴集地籞可憐九層樓光景水上浮本來暫止息遇此遂淹留若夫旅浴清深朋翻迴曠翠鬣紫纓之飾丹冕綠襟之狀過波兮湛澹隨風兮迴漾竦臆兮開萍蹙水兮興浪藝文類聚九十反舌賦咨玄造之大德播含靈於無小有反舌之微禽亦班名於庶鳥乏嘉容之可翫因繁聲以自表其聲也驚詭噂噆縈紆離亂駢浮迴合喦危瑣散或發曲無漸或收音云半既含意於將曉亦流妍於始旦雜沓逶迤噭跳參差攢嬌動葉促囀縈枝分宮析徵萬矩千規因風起哢曳響生奇對芳辰於此月屬今余之遵暮倦城守之諠疲愛田郊之閒素眷春物而懷之聞好音於庭樹藝文類聚九十二
