body:
  text: 江淹建平王讓右將軍荊州刺史表茂寵迺臨炫奪彝典巡恩鏡飾攪情震慮中謝臣聞該秩詔序匪賢莫能孚其職端維裂陝非功無或濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭戴筆函荷出內至乃曳組河縣蔑馴羽之化鳴環京轂謝批鱗之政聲績兩無風化雙缺而龜紐未剔璽書頻降復改冊湘區分瑞衡服競無賈琮交部之廉終乏郭伋并壤之信固以誼沓民明湫隘身諷不悟皇靈再煇河海重渥遂踰恒采妄賁異等荊門務要方城任積水交沅澧山通岷峨襟帶百縣縈抱七州上德懋勳堪居斯地寧臣膠固所宜膺荷是以燋薄魂色驚迫心影謹刷睿情置露弱志伏願陛下停旒弛琪暫炤瑣曲則鑄才式弘練物惟遠王度既清蒙識以泰不勝慚懅屏營之情本集建平王慶明帝疾和禮上表臣聞慶動至玄則昌衢敦序教孚上雲則紫㝢交泰故祁寒溽暑無以變其和沴火凝陰不能徙其氣伏惟陛下至德遠稜實天縱聖仁鑄蒼岳道括寰海故丹陵之君款金泥而謝賢媯墟之后眷龍圖而慚德頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉欞違和金幌輟念百祠未遑四嶽匪處吉蠲為慶神御方休瑞廣文齡祥深武日具惟涵教倡愉兼薦臣班戚奉慈實自慶舞不勝悅豫之情本集建平王慶安城王拜封表麗采繩河映萼璿圃淑問夙孚令儀早晣撰告候辰昭膺輝序國維富禮皇塗凝衛具生屬慶懷識戴躍臣涵悅楚邊魂馳關闕不任下情本集建平王之南徐州刺史辭闕表臣過承寵靈閔默假日徒抱皇慈無充橫草而品第迺崇軒服逾峻顧茲靦躬彌覯荒昧今便奉官外甸卷迹徐山託慕宸嚴載惟感戀哀疾不獲詣闕不任窮鯁之情本集蕭驃騎讓封第二表臣某言寫瀝愚丹已續前表猥降前詔未垂鏡恕一省驚慚再悸魂府靜躬自察啟居匪地中謝臣聞日薄星迴昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄言限神極無失況世道恒淪人彝剽奪數滿必沿虛飾小故辭大臣才非古賢任鈞左戚祚開山河兼金疊組爵侈常班寵溢前達以榮以渥且慚且靦雖嘉銘鼎之恭更懼循墻之速矧乃三司業貴上將地崇總錄務廣河汾寄深珪㝢方啟劍衛增肅既驚朝野足震城邑殷周富士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前世之雄規車旗勿濫中葉之英軌況鴻誥鬱集懋冊頓萃諒非虛薄輕所膺符今殷夏既聲封國式固故天地燀燿日月更煇陛下停若鏡之明流如雲之愛方求士於板巖宜思賢於屠肆而私臣以闈廟寵臣以帷鼎位兼文武職總內外非所以發夢渭濱儲精河藪鐫金刻石既不可詮輿歌里頌其謂臣何仰緣大道方行蒼祇宅氣威靈所燭九功咸詠寧於庸臣獨隔恩耀誓守愚衷重扣雲日如蒙恩宥實生之幸不任慊款之至本集藝文類聚四十七第三表臣某言臣再抽慊請辭偽理屈側守圭漏伏望衷鑑而宸緯嚴祕愫悰徒懸優獎之降非復常旨肅奉驚懅曛曉如失中謝臣炤冊訪古誦史稽昔以為敷道之寄管物成務總錄之重匡績毗風莫不下協河岳上踵光緯先王所以長世後睿所以字氓讚金圖之要輔樞曆之機者也臣本瑣姿不慕聞達昔值英世頻遘時來感激光私未能自返烏可超乘厚任妄據高圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景已滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未屬鞬櫜之分文不藹樽俎之間德非時秀道乖物宗虛飾疲伍空貽上位則天變彰於飛流地眚見于震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬已遠豈唯敗錦傷經毀鼎覆餗而已哉自非西京上績東都名勳河右群賢江左諸彥寧有誣叨天爵以為己功者也昔南楚偏君鄢郢小政執珪柱國尚不輕授況車軌共文四溟同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如綠伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可疋夫之諒則國步永清陛下永無謬悞不任憂駭之情本集蕭驃騎上頓表臣某言伏見明詔鑾輿便親御六師臣又謬總群帥竊聞金火告燿昏明代卷雲電溉湊經綸相襲所以草昧縣㝢昭晣區宙況乃逆徒阻兵器掩西服雖蟻眾鼠竊勢必褫散然尋仞難貸原煙易滅臣受筭內楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚慨交心十百常憤今便嚴率所統剋此月二十六日出次戎郊故已望江源以軫歎想荊山而增厲矣進止之宜更聽敕旨不任悚企匪寧之心本集蕭驃騎謝被侍中慰勞表臣某言即日侍中祕書監臣戢至奉宣詔旨慰勞便受轂中帷練甲外壘旍麾蔽景輿徒競氣人懷秋嚴士蓄霜斷晦魂已掩氛豎未懸稽鉞佇威寢興震慨今王人臨郊皇華降庭煇燿望實將激威武戴鶡之夫迎光蹀恩投石之師攀炤竦惠楚纊越醪方茲慚潤臣忝屬閫私彌抱渥洽不任下情本集蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毀禮滅緯外陵南畿內奰西夏稟血涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其會如林仰綴宗稷之靈俯輯士民之效故嚴效敕裁交妖鋒折首凱期既屆樂飲在晨斯乃紫曆方永蒼氓同慶臣備符寵私時深抃舞不任踴躍之情本集蕭驃騎解嚴輸黃鉞表臣某言逆沴電熾凶妖霧舒志夫禋天情已類社故乃馳羽江郊騖燧山甸雖藏智審其黥戮涵識判其奔沮然兵扈難輕義險宜備故膺寵無辭奉鉞不謙今元凶既殪醜徒自紊祲靄方卷郢氛已廓樂琯登肆禮衣曳朝不宜復假殊服取缺彝則輒上還王府永戢祕館本集蕭驃騎讓太尉增封第三表臣某言以鉉司崇貴袞位淵嚴非德非功無忝無濫故誓魂肆請舒衷仰謁不能曲流慈炤遂乃徒洽恩獎周覽未交靈爽以懼中謝臣歷古沿圖循遠訪繪未嘗不麗選台衡妙簡槐采者也魯鄭之賢戚曹蕭之勳彥吳鄧之盛功王鍾之素業孔明之居蜀茂弘之在晉皆僉曰伊人是以處無懦色臣官逢昌世運漸時明頻煩紫渥綢繆璿命身薄施厚感厲愈深遂員負機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦寇兆載弭姦萌致虹沴阻於上京蜺妖扇於下國寔賴藩伯鞠旅侯甸入守攙槍旬始煙祛霧卷故皇道威稜之由神緯昭昌之效臣豈有探敻察幽之智攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慚夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賓中原久蕪神州方翳思樂盛猷願厲聲頌將陪雲驂以北守扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠德血祈旦亮慊志夕滿雖蹈疪戾猶深抃躍本集蕭驃騎讓太尉增封表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絕朱紱方臻金鉉未宥魄慮再馳詵然改席臣局志久戰淺概已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓璧緯列寵縣榮故乃俯酌瑤陛迹聯盈缺道協興降上睿所以僉舉前英所以詳能今若第隨私貴爵與私富紊蕩邦經斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古烈妖風孽火將炎天地幸郊甸或靜江山以閟文軒華劍既榮既峻侯封桂食又盈又滿祿高誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂明愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情本集蕭驃騎讓油幢表臣某言奉詔賜車一乘竊以國容方穆旗章式序朝禮永清儀服咸貫故象革鞬鑣尚炯明圖朱箱玄蓋猶炤漢篆皆旌羽勿差功庸匪濫臣忝爵山重蒙榮海深襲恩祗冊已慚初筮浮祿素位方疚心路鑒古以惕巡世罔然不宜假文丹幰空飾皁轖仰思至道俯恤物僣伏願聖遠特停華渥書愚上請追深累懼不任下情本集蕭太尉上便宜表臣公言臣聞經邦緯治去華為急體國字民循素乃安聖誥遺風具騰丹冊賢言末流備宣青史何嘗不翦削浮奢銷遺文繪然後頌音載興澤洽式廣楚駕百馬民雜國凋秦脩萬騎教亡業墜刻桷丹楹禮有常序朱轓皂蓋古無濫秩縹衣綸綬漢置前制奇服怪物周設常刑皆節俗約訓反樸還風肅正黎心釐一民志故禮奢寧儉宣尼之高風以義止利孟軻之宏規若乃文彩利劍道鑒其元彫蟲篆刻世炤其淺雖儒墨異學名法各治至於遵本捨末其概一也故荀韓之立典管晏之制書賈陸之鴻筆嚴徐之博辭食貨興志鹽鐵生論莫不異說而同儉乖議而共治然世淪物起道缺事遷蓋源起西秦波被東漢一魏不變二晉未革所從來者遠矣洎高祖武皇帝業高縣㝢化格區宙菲躬謙度方追重華納麓之勤約情撝操乃取文命卑宮之義去金錦之巧無帷帳之飾唯脩遠圖綏國之術祈勸力耕濟世之規是以政平刑偃紫階斯廓太祖文皇帝恭己明臺之上聽政衢室之下九官咸靜萬績惟凝亦復務抑華詡思裁奓太輿馬翠翟之麗尠登乎外禁瑤碧綺組之玩罕設於內宮故大德立而五路謐鴻名建而四民寧者也自頃政教日替敦教月虧誰惟歷稔亦曰淹紀至乃帝臺傾海外之寶王城盡天下之祕象席珠履一躡而即收鏤琴綵瑟再撫而已損褧衣隨塵而罷羅袂從風而棄百民染其聲奢萬姓被其馳蕩故闤闠之里富者竊梁楚之乘伎巧之家豪者襲王公之服於是有文靡虛麗驕邪不典之器精纖空飾妙蠱非常之玩農夫勤耨不充浮侮伎之資蠶女務織無給點刻之費將恐去實就華未知所屆背源從流不識其止求國富兵強寧可得乎今江南所宅正漢魏兩州之地戶口所檢裁文景三郡之民舊齊故魯鞠為茂草全趙盛魏豺狼所嗥陛下方欲鳴鑾中土朝服濟河不改斯術則未見其可也臣謬屬大任竊同憂泰日晏宵分實忘饑寢苗治其莠職此為先輒具條便宜可以安邦利民者事事如右率以聞見謹簡聖聽若其咸允謹請敕付外施行本集讓太傅揚州牧表崇絕之寵降自白日殊甚之禮墜於青雲祗畏驗盛若奪魂鑒巡席無容當軒改色中謝臣聞天地之大德曰生聖人之大寶曰位將以啟廓靈緯崇樹神紀百司備列貴賤之分既炳九官咸贊升降之際可明故皇極不爽國步斯泰雖金媯各政姬華異治未有革序變倫而能流英發耀者也臣才慚右賢功愧上烈平趙夷魏之氣無宣於國書濟河登山之威未亮於左史既罕龍韜金匱之效又乏楹間帷中之績衛主寧謂提橫流匡危不足生細民故小節時顯於艱難大勳無紀乎廊廟而乘軺服冕荷蕭張之賞開城裂域受曹鄧之爵不能翊教緝政釐濟氓隱贊邦弘化飾整朝輝是以德少寵多輿人立規才薄位厚處士興議故玉燭未調道治猶鬱者臣之為媿也不悟陛下復停日月之華凝煙露之潤擢臣瑣姿鑒臣陋誠前恩未曠後寵已襲上公祕鉞聲振都鄙文劍彫舄禮殊軒殿深襃之逮方今為絕大賚之降比古為超臣亦何功當處斯忝伏願道邈先帝理鏡眾寂被氣順方涵生獲慶特輟策書時停鴻冊則人歌僉平物抱至歡本集蕭重讓揚州表臣公言臣以功狹賞峻世誥所讟才弱寵隆道經所講故寫魂誓膽庶留天曯圖驕慮滿獲守私吝不能青蘋引風陽燧要景復降綸冊徽采兼明影迹交戰水煙相薄中謝竊聞周夏異章玄素各禮儒道二宗名墨兩教咸以馭俗為急僉以得人為寶於是尊官上品乃貽玉振之賢鴻等懋列為取金聲之彥或有濟世夷難之略煇燿內氓導江疏山之勤纏結中㝢深德衍溢大功振驚然後超居國右鬱處朝端故九職惟宣六典式序丹青所以傳其藹磬琯所以揚其音也臣才蔽識淺非集譽於鄉曲榮降寵臻乃假翼於皇極遂事等話言之寄任鈞符負圖之重職總表裏地聯機務位班昔良知闕前脩居官不聞其風處秩焉見其政寰域之治未緝街縣之訟方興繒販之士無薦管庫之家寂寞四維不闡五教罕聞安可以底慎財賦交正庶士者也今輟和毗道仄身贊業尚據晦橈獲蔽璇圖況異禮更飾襃命復崇名超列辟爵擬群后上仁居之猶涵慚德臣實空儒伊何以勝既誣人文將黷玄緯凌歷飛流之眚懼失正和晦裂蜺霧之災且濫庶物臣是以寤寐永歎憂國慮私者也伏聞陛下裁天賦品制地平施使曠世之典不遂臻於末躬迥代之軌無頓被於茲日素心丹魄皦然靡疚矣不任憂迫之情本集後讓太傅揚州牧表臣公言臣再辭非謙重讓靡飾實以爵高中世歷古所難寵冠上冶緜代誰易詳圖辨箴如鏡如水撿崖覽志匪彫匪文魂祈夢請駐心挂氣陛下猶降以璽書之榮被以丹碧之采頓然變容一慮九逝中謝臣以為寒暑繇乎平分晦明驗乎天道咎譽起於微薄得吝生於小疵故銓衡既陳錯髮之異必縣銅墨咸設分撮之殊已傾聖哲不能爽鬼神莫由避況臣鄙概早盈陋才久溢第超庶后禮絕群班仰贊東序之賓平參南宮之政窮盈極滿於斯為甚鑒茲降替淵冰非譬所以坐洞房而不悟下輕帷而嘆息也古之馭教當有道焉量能而受賞撰智而錫位深乃裂組遠故分珪前人以為稱首昔質以為美詠自非上德橫乎天地高績格于區宇烈譽馥於一時茂名鬱乎當世者豈有降今日而莫先哉臣爰蒙殊寄六稔遂交及荷總任二燿忽周未能塞謗生民獲免僮訟何盛勳之足題詎深烈之可銘乎而因委忝濫踰溢倫等朱軒躍馬光出電入貂冠紫綬寵藹霞炤臣聞闔宗奉國猶非報殉方將身侍鑾華雪齊魯之侵地手執羈勒騖燕趙之遠郊然後追迹范張濯纓汾射臣之志也華爵盛典非所敢寧伏炤古巡將流聖察無使匹概血誠不諒於璿扆宏芬英猷遂蕪於里聽豈伊庸臣獨家其庇亦曰海隅咸被其利焉本集
