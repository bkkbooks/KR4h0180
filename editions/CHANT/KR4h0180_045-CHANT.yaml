body:
  text: 謝朏與王儉書夫所貴天下之士者何其上則閟景山壑淩氣風霞次則投緡捨築鬱為上佐次則服秦楚而辭其功振燕魏而逃其賞凡此數輩皆英懿之士也自茲已降參差萬緒或跡著明晦或才兼默語若桓譚之褰俗馮衍之忤時北海之凝峭中散之峻絕率以方寸之情喪不訾之德蓋無取焉若相如之愛奇任偉長之淹粹弘遠樂廣融通裴楷夷淡彼四賢者並純神絕景徇物傷意其慕之而未可以言但心之所諳咫尺千里志之所符滄洲曖然揣而論之寔山河之不肖者也蓺文類聚二十六遺弟𤅢書可力飲此勿豫人事梁書謝朏傳隆昌元年為吳興太守時明帝謀入嗣位弟𤅢時為吏部尚書朏至郡致𤅢數斛酒遺書荅釋法雲書難范縝神滅論辱告惠示敕荅臣下審神滅論竊聞語曰萬物紛糺則懸諸天象立言淆舛則折乎聖理昭昭自古事蔚在茲伏尋叡訓垂文義深陶鑄稱象匪臻希微孰識論幽至極盡性窮神愍斯六蔽哀此四執黜小言之亂道拯經行於夷路旨肆而隱義宛而彰博約載弘廣大悉備一晉半偈顯茲悟拔慧曰心水蕩此塵迷俾宗奧有歸教思攸在異端自杜誣善知息凝繫表於繩初導禪流於苦海豈伊含孕三藏冠冕七籍而已哉弟子幸邀至運側承格誘沐泳歡擊奉以書紳謝舉和南宏明集十外弟廬陵王長史褚向墓誌銘弘治推華子嵩慚重酒歸月下風清琴上梁書褚翔傳荅釋法雲書難范縝神滅論至理虛寂冥晦難辨言有似無言無實有妙於老談精於釋教辭炳金書文稽玉牒者由來尚矣主上道括宇宙明並日月隱顯之機必照有無之要巳覽遂垂以明論詶折臣下導誘既深訓義方洽凡在有心孰不慶幸蒙示天製謹加讀誦垢吝雲消時兼懽抃法師果深昔緣因會今法離五慾而入八解去三界而就一乘復得預聞德音彌足欣讚惠告沾及戢佩寔深韋叡和南宏明集十荅釋法雲書難范縝神滅論岫和南伏見詔旨所荅臣下審神滅論叡照淵深動鑒機初敷引外典弘茲內教發蒙啟滯訓誘未悟方使四海稟仰十方讚抃異見杜口道俗同欣謹加習誦寤寐書紳惠以逮示深承眷憶范岫和南宏明集十荅釋法雲書難范縝神滅論茂和南辱告伏見敕旨荅神滅論頂戴欣懽不及抃舞神理悠曠雖非建言所極列聖遺文炳然昭著莫不撫枉虔襟式遵彝典豈可妄陳虛矯厚誣前誥謂來緣之不期棄享薦之至禮迷路茫茫歸塗靡薄苦空一到有悔無追主上含明體聖妙窮真假發義照辭舟航淪溺豈惟天人讚仰信亦諸佛迴光弟子夙昔棲心本憑淨土數延休幸預逢昌世方當積累來因永陶慈誘藻悅之誠非止今日未獲祗敘常深翹眷比故循詣此白無伸王茂和南宏明集十荅釋法雲書難范縝神滅論辱告伏覽敕旨神不滅義睿思機深天情雲發標理明例渙若冰消指事造言赫如日照用啟蒙愚載移瞽蔽凡厥含識莫不挹佩謹以書紳奉之沒齒弟子王瑩和南宏明集十丹陽琅邪二郡斷蒐捕議不殺之禮誠如王述所議然聖人為教亦與俗推移即之事迹恐不宜偏斷若二郡獨有此禁更似外道謂不殺戒皆有界域因時之宜敬同議郎江貺議廣宏明集二十六敘梁武斷殺絕宗廟犧牲事荅湘東王書下官自奉違南浦卷迹東郊望日臨風瞻言佇立仰尋惠渥陪奉遊宴漾桂棹於清池席落英於會岨蘭香兼御羽觴競集側聽餘論沐浴玄流濤波之辯懸河不足譬春藻之辭麗文無以匹莫不相顧動容服心勝口不覺春日為遙更謂修夜為促嘉會難常摶雲易遠言念如昨忽焉素秋恩光不遺善謔遠降因事罷歸豈云栖匪商官理就一廛田家作苦實符清誨本乏金羈之飾無假玉璧為資徒以老使形疏疾令心阻沈滯床簟彌歷七旬夢幻俄頃憂傷在念竟知無益思自祛遣尋理滌意即以任命為膏酥攬鏡照形翻以支離代萱樹故得仰慕徽猷永言前哲鬼谷深栖接興高舉遯名屠肆發迹關市其人緬邈餘流可想若令亡者有知寍不縈悲玄壤恨隔芳塵如其逝者可作必當昭被光景懽同遊豫使夫一介老圃得簉虛心末席去日巳疏來侍未孱連劍飛鳧擬非其類懷私茂德竊用涕零梁書謝幾卿傳擬招隱士修竹苞生兮山之岑繽紛葳蕤兮下交陰木籠藂兮巍峨川澤泱漭兮雲霧多悲猨鳴噪兮嘯儔侶攀折芳條兮聊停佇夫君兮不還蕙華兮彫殘歲晏兮憂未開草蟲鳴兮淒淒蕭兮森兮玄澗深悵徬徨兮沈吟紛紛兮菴薆窮巖穴兮熊窟幽林杳冥兮吁可畏嶔崟兮嶮嶬岌峨兮傾欹飛泉兮激沬散漫兮淋漓弱蘿兮修葛亙蔓兮長枝綠林兮被崖隨風兮紛披猛獸兮封狐眈眈兮視余扶藤兮直上巖巖兮嶷嶷霏霏兮敷敷赤豹兮文貍攀騰兮相追思慕公子兮心遲遲寒風厲兮鴟梟吟鳥悲鳴兮離其群公子去兮誰與親行露厭浥兮似中人文苑英華三百五十八以國子博士讓裴子野表伏見前冠軍府錄事參軍河東裴子野年四十字幾原幼稟至人之行長厲國士之風居喪有禮毀瘠幾滅免憂之外蔬水不進栖遲下位身賤名微而性不憛憛情無汲汲是以有識嗟推州閭歎服且家傳素業世習儒史苑囿經藉遊息文蓺著宋略二十卷彌綸首尾勒成一代屬辭比事有足觀者且章句洽悉訓故可傳脫置之膠庠以弘獎後進庶一夔之辯可尋三豕之疑無謬矣伏惟皇家淳耀多士盈庭官人邁乎有媯棫樸越於姬氏苟片善宜錄無論厚薄一介可求不由等級臣歷觀古今人君欽賢好善未有聖朝孜孜若是之至也敢緣斯義輕陳愚瞽乞以臣斯忝回授子野如此則賢否之宜各全其所訊之物議誰曰不允臣與子野雖未嘗銜杯訪之邑里差非虛謬不勝慺慺微見冒昧陳聞伏願陛下哀憐悾款鑒其愚實干犯之諐乞垂赦宥梁書裴子野傳與王僕射書君侯匡輔聖朝中夏無虞既盡美矣又盡善矣唐堯非不隆也門有謗木虞舜非不盛也庭懸諫鼓周公之才也樂聞譏諫故明君賢宰不憚諤諤之言布衣窮賤之人咸得獻其狂瞽先王所以有而勿亡得而勿夫功傳不朽名至今者用此道也藝文類聚二十三神滅論或問子云神滅何以知其滅也荅曰神即形也形即神也是以形存則神存形謝則神滅也門曰形者無知之稱神者有知之名知與無知即事有異神之與形理不容一形神相即非所聞也荅曰形者神之質神者形之用是則形稱其質神言其用形之與神不得相異也問曰神故非用不得為異其義安在荅曰名殊而體一也問曰名既己殊體何得一荅曰神之於質猶利之於刀形之於用猶刀之於利利之名非刀也刀之名非利也然而捨利無刀捨刀無利未聞刀沒而利存豈容形亡而神在問曰刀之與利或如來說形之與神其義不然何以言之木之質無知也人之質有知也人既有如木之質而有異木之知豈非木有一人有二邪荅曰異哉言乎人若有如木之質以為形又有異木之知以為神則可如來論也今人之質質有知也木之質質無知也人之質非木質也木之質非人質也安有如木之質而復有異木之知哉問曰人之質所以異木質者以其有知耳人而無知與木何異荅曰人無無知之質猶木無有知之形問曰死者之形骸豈非無知之質邪荅曰是無人質問曰若然者人果有如木之質而有異木之知矣荅曰死者如木而無異木之知生者有異木之知而無如木之質也問曰死者之骨骼非生之形骸邪荅曰生形之非死形死形之非生形區巳革矣安有生人之形骸而有死人之骨骼哉問曰若生者之形骸非死者之骨骼非死者之骨骼則應不由生者之形骸不由生者之形骸則此骨骼從何而至此邪荅曰是生者之形骸變為死者之骨骼也問曰生者之形骸雖變為死者之骨骼豈不從生而有死則知死體猶生體也荅曰如因榮木變為枯木枯木之質寍是榮木之體問曰榮體變為枯體枯體即是榮體絲體變為縷體縷體即是絲體有何別焉荅曰若枯即是榮榮即是枯應榮時凋零枯時結實也又榮木不應變為枯木以榮即枯無所復變也榮枯是一何不先枯後榮要先榮後枯何也絲縷之義亦同此破問曰生形之謝便應豁然都盡何故方愛死形綿歷未已邪荅曰生滅之體要有其次故也夫欻而生者必欻而滅漸而生者必漸而滅欻而生者飄驟是也漸而生者動植是也有欻有漸物之理也問曰形即是神者手等亦是邪荅曰皆是神之分也問曰若皆是神之分神既能慮手等亦應能慮也荅曰手等亦應能有痛癢之知而無是非之慮問曰慮為一為異荅曰知即是慮淺則為知深則為慮問曰若爾應有二乎荅曰人體惟一神何得二問曰若不得二安有痛癢之知復有是非之慮荅曰如手足雖異總為一人是非痛癢雖復有異亦總為一神矣問曰是非之慮不關手足當關何處荅曰是非之意心器所主問曰心器是五藏之心非邪荅曰是也問曰五藏有何殊別而心獨有是非之慮乎荅曰七竅亦復何殊而司用不均問曰慮思無方何以是心器所主荅曰五藏各有所司無有能慮者是以心為慮本問曰何不寄在眼等分中荅曰若慮可寄於眼分何故不寄於耳分邪問曰慮體無本故可寄之於眼分眼目有本不假寄於佗分也荅曰眼何故有本而慮無本苟無本於我形而可徧寄於異地亦可張甲之情寄王乙之軀李丙之性託趙丁之體然乎哉不然也問曰聖人形猶凡人之形而有凡聖之殊故知形神異矣荅曰不然金之精者能昭穢者不能昭有能昭之精金寍有不昭之穢質又豈有聖人之神而寄凡人之器亦無凡人之神而託聖人之體是以八采重瞳勛華之容龍顏馬口軒皞之狀形表之異也比干之心七竅列角伯約之膽其大若拳此心器之殊也是知聖人定分每絕常區非惟道革群生乃亦形超萬有凡聖均體所未敢安問曰子云聖人之形必異於凡者敢問陽貨類仲尼項籍似大舜舜項孔陽智革形同其故何邪荅曰珉似五而非玉雞類鳳而非鳳物誠有之人故宜爾項陽貌似而非實似心器不均雖貌無益問曰凡聖之殊形器不一可也貞極理無有二而丘旦殊姿湯文異狀神不侔色於此益明矣荅曰聖同於心器形不必同也猶馬殊毛而齊逸玉異色而均美是以晉棘荊和等價連城驊騮盜驪俱致千里問曰形神不二既聞之矣形謝神滅理固宜然敢問經云為之宗廟以鬼饗之何謂也荅曰聖人之教然也所以弭孝子之心而厲偷薄之意神而明之此之謂矣問曰伯有被甲彭生豕見墳素著其事寍是設教而已邪荅曰妖怪茫茫或存或亡彊死者眾不皆為鬼彭生伯有何獨能然乍為人豕未必齊鄭之公子也問曰易稱故知鬼神之情狀與天地相似而不違又曰載鬼一車其義云何荅曰有禽焉有獸焉飛走之別也有人焉有鬼焉幽明之別也人滅而為鬼鬼滅而為人則未之知也問曰知此神滅有何利用邪荅曰浮屠害政桑門蠹俗風驚霧起馳蕩不休吾哀其弊思拯其溺夫竭財以赴僧破產以趨佛而不恤親戚不憐窮匱者何良由厚我之情深濟物之意淺是以圭撮涉於貧友𠫤情動於顏色千鍾委於富僧歡意暢於容髮豈不以僧有多稌之期友無遺秉之報務施闕於周急歸德必於在已又或以茫昧之言懼以阿鼻之苦誘以虛誕之辭欣以兜率之樂故捨逢掖襲橫衣廢俎豆列缾鉢家家棄其親愛人人絕其嗣續致使兵挫於行閒吏空於官府粟罄於墮遊貨殫於泥木所以姦宄弗勝頌聲尚擁惟此之故其流莫已其病無限若陶甄稟於自然森羅均於獨化忽焉自有怳爾而無來也不禦去也不追乘夫天理各安其性小人甘其壟畝君子保其恬素耕而食食不可窮也蠶而衣衣不可盡也下有餘以奉其上上無為以待其下可以全生可以匡國可以霸君用此道也梁書儒林范縝傳荅曹思文難神滅論難曰形非即神也神非即形也是合而為用者也而合非即也荅曰若合而為用者明不合則無用如蛩駏相資廢一則不可此乃是滅神之精據而非存神之雅決子意本欲請戰而定為我援兵邪難曰昔趙𥳑子疾五日不知人秦穆公七日乃寤並神遊於帝所帝賜之鈞天廣樂此形留而神逝者乎荅曰趙𥳑子之上賓秦穆之遊上帝既云耳聽鈞天居然口嘗百味亦可身安廣廈目悅玄黃或復披文繡之衣控如龍之轡故知神之須待既不殊人四肢七竅每與形等隻翼不可以適遠故不比不飛神無所闕何故憑形以自立難曰若如論旨形滅則神滅者斯形之與神應如影饗之必俱也然形既病焉則神亦病也何以形不知人神獨遊帝所荅曰若如來意便是形病而神不病也今傷之則痛是形痛而神不痛也惱之則憂是形憂而神不憂也憂慮痛廢形已得之如此何用勞神於無事邪曹以為生則合而為用則痛廢同也死則形留而神遊則故遊帝與形不同也難曰其寐也魂交故神遊於蝴蝶即形與神分也其覺也形開蘧蘧然周也即形與神合也荅曰此難可謂窮辯未可謂窮理也子謂神遊蝴蝶是真作飛蟲邪若然者或夢為牛則負人轅輈或夢為馬則入人跨下明旦應有死牛死馬而無其物何也又腸繞閶門此人即死豈有遺其肝肺而可以生哉又日月麗天廣輪千里無容下從匹婦近入懷神夢幻虛假有自來矣一旦實之良足偉也明結想霄坐周天海神昏於內妄見異物豈莊生實亂南國趙𥳑真登閶闔邪外弟蕭琛亦以夢為文句甚悉想就取視也難曰延陵窆子而言曰骨肉歸復于土而魂氣無不之也斯即形亡而神不亡也荅曰人之生也資氣於天稟形於地是以形銷於下氣滅於上氣滅於上故言無不之無不之者不測之辭耳豈必其有神與知邪難曰今論所云皆情言也而非聖旨請舉經記以證聖人之教孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝若形神俱滅復誰配天乎復誰配帝乎荅曰若均是聖達本自無教教之所設實在黔首黔首之情常貴生而賤死死而有靈則長果敬之心死而無知則生慢易之意聖人知其若此故廟祧壇墠以篤其誠心肆筵授几以全其罔已尊祖以窮郊夭之敬嚴父以配明堂之享且忠信之人寄心有地強梁之子茲焉是懼所以聲教昭於上風俗淳於下用此道也故經云為之宗廟以鬼享之言用鬼神之道致茲孝享也春秋祭祀以時書之明厲其追遠不可朝死夕亡也子貢問死而有知仲尼云吾欲言死而有知則孝子輕生以殉死吾欲言死而無知則不孝之子棄而不葬子路問事鬼神夫子云未能事人焉能事鬼適言以鬼享之何故不許其事邪死而有知輕生以殉是也何故不明言其有而作此悠漫以荅邪研求其義死而無知亦已審矣宗廟郊社皆聖人之教迹彝倫之道不可得而廢耳難曰且無神而為有神宣尼曰天可欺乎今稷無神矣而以稷配斯是周旦其欺天乎既其欺天又其欺人斯是聖人之教以欺妄以欺妄為教何達孝子之心厲偷薄之意哉若曰夫聖人者顯仁藏用窮神盡變故曰聖達節而賢守節也寍可求之蹄筌局以言教夫欺者謂傷化敗俗導人非道耳苟可以安上治民移風易俗三光明於上黔黎悅於下何欺妄之有乎請問湯放桀武伐紂是殺君非邪而孟子云聞誅獨夫紂未聞弒君也子不責聖人於弒之迹而勤勤於郊稷之妄乎郊丘明堂乃是儒家之淵府也而非形神之滯義當如此何邪難曰樂以迎來哀以送往云云荅曰此義未通而自釋不復費辭於無用禮記有斯言多矣近寫此條小恨未周邪宏明集為柳司空讓尚書令初表陛下繼明南面傷垂顯錄增榮益觀豈側身限而露不廣海塵不增山微物知止敢忘自退誠以懷音感遇久妨彝序尸祿昧寵取蹈風歌中寐軫心方飡凝慮寍可冒釐綜之重負學製之談將玷朝徽匪伊身議蓺文類聚四十八第二表臣聞聖人在上愚智無以息隱天下有道方圓歸其能是如以駑蹇之才不致問於千里瓦礫之質佇待價於十城伏願陛下矜臣負乘之尢照臣匪飾之情迹言觀用允授上才斂會流恩曲蠲下第則雲序斯平彝章載穆蓺文類聚四十八除始興郡表臣被沐恩靈棲息榮幸貶貌兢視挺襟軫慮徒誓蠡管之誠終沈熒爝之用不悟懸景麗天通涇潤下月緒未交鎔光再鑠修鞠慚疑驩不及抃且地鄰舊越甸分故楚厥壤惟腴寔邦斯大將何以再宣王猷陶奉惠渥蓺文類聚五十荅釋法雲書難范縝神滅論弟子孝才和南辱告逮示敕旨荅臣下審神滅論竊以彭生豕立名現齊公云伯纓垂事高漢史且斬籌為喻義在必存神之不滅法俗同貫欲滅其神內外成失所謂管闚窮極寍辨西東蠡度滄溟安知髣髴天旨弘深慇懃於妙象聖情隱惻流連於饗祭豈直經教增隆實使蒙愚悟道眷逮所覃曲垂頒及銘茲訓誘方溢寸心弟子范孝才和南宏明集十謝示璧表非郊禋有日禮天之寶肯降學校且興圓水之符已集絳玉玄珪未足云璧蓺文類聚八十四
