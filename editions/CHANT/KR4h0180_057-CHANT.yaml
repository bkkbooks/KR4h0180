body:
  text: 劉峻送橘啟南中橙甘青鳥所食始霜之旦采之風味照座劈之香霧噀人皮薄而味珍脈不黏膚食不留滓甘踰萍實冷亞冰壺可以熏神可以芼鮮可以漬蜜氈鄉之果寍有此邪橘錄荅郭峙書聞君子舊矣但人非豕鹿轉加蓬逝波駭雨散動間山川故無由交羽觴薦雜佩睨浮雲以搔首臨清風而浩歌變燧迴星亦云勞止藝文類聚三十重答劉秣陵沼書劉侯既重有斯難值余有天倫之戚竟未之致也尋而此君長逝化為異物緒言餘論蘊而莫傳或有自其家得而示余者余悲其音徽未沫而其人已亡青簡尚新而宿草將列泫然不知涕之無從也雖隙駟不留尺波電謝而秋菊春蘭英華靡絕故存其梗概更酬其旨若使墨翟之言無爽宣室之談有徵冀東平之樹望咸陽而西靡蓋山之泉聞絃歌而赴節但懸劍空壟有恨如何文選四十三梁書劉峻傳藝文類聚三十四與宋玉山元思書驅馬金張之館飛蓋許史之廬習匡鼎之說詩騁揚雲之雕篆賓徒波湧輿輪靡息當是時也樂可言哉然靜思夫君愀焉軫歎何則方鑿圓枘鉏鋙難從翔鳥遊魚蹉跎不狎是以賈生懷琬琰而挫翮馮子握璵璠而鎩羽天誕英逸獨擅民秀心貞筠箭德潤珪璋信人水鏡一性之鎔範而荊南雅曲高音鮮和河西名驥滅沒誰賞故若先生者進有三難退有三樂竊觀先生未能鴻翔鸞起騰霞躋漢將由囿空桑麻田無負郭俛眉翕肩以斯故爾今賢弟賓從抗鱗奮翼或衣繡江塘或鳴騶洛渚連騎方驅擊鍾乃食萼跗若是吾子復何憂哉唯當纂兩仲之微迹襲二疏之風流生與漁父同僖死葬要離墓側金石可碎聲華無寂斯道坦坦先生幸其勗與藝文類聚三十七荅劉之遴借類苑書九冬有隙三餘暇時多遊書圃代樹萱蘇若夫采亹亹於緗紈閱微言於殘竹嗢飫膏液咀嚼英華不知地之為輿天之為蓋靡測迴塘莫辨輿馬烏足以言乎是用周流墳素詳觀圖諜搦管聯冊纂茲英奇蛩蛩之謀止於善草周周之計利在銜翼故鳩集斯文蓋自綴其漏耳豈冀藏山之石播於士大夫哉藝文類聚五十八與諸弟書任既假以吹噓各登清貫任云亡未幾子姪漂流溝渠洽等視之悠然不相存贍平原劉峻疾其苟且乃廣朱公叔絕交論焉文選五十五廣絕交論注與何炯書稱劉訏劉歊訏超超越俗如天半朱霞歊矯矯出塵如雲中白鶴皆儉歲之粱稷寒年之纖纊南史四十九劉訏傳族祖孝標與書稱之與舉法師書聞諸行李高談徽德逖聽風聲心飛魂竦無異蘄仙之望石髓太陰之思龍燭蒼星昏昊涼雲送秋道勝則肥固應頤攝衣裳虹蜺帷幕霄露餌黃菊之落蕊酌清㵎之毖流旦候歸雁晨鳧暮聽羈雌獨鶴神彯彯爾蓋象蕭史之騎鳴鳳列子之御長風雖荊卿旁若無人孝然堅臥冰雪沈沈隱隱何以尚之哉至於馳騖經囿翱翔書圃極龍宮之妙典殫石室之鴻記道生伏其天真曼倩謝其辨物若乃習是童子措志雕蟲藻思內流英華外發葳蕤秋竹照曜春松爵頌息明珠之譽長門濫黃金之賞盛矣美矣煥其麗乎昔旅浙河嘗觀組繢不覺紙爇筆焚魂魄斯盡自茲厥後兩絕珪璧意睠睠於菁華腸迴迴於九折夫日御停照不踰隙穴海若濆湧莫限隈嵎以玉抵鵲幸傳餘寶冀閱清徽用瘳眩疾然越民非鬻冠之所齊國豈奏韶之地望與其進無貽責焉釋藏輕九廣宏明集二十四辯命論并序主上嘗與諸名賢言及管輅歎其有奇才而位不達時有在赤墀之下豫聞斯議歸以告余余謂士之窮通無非命也故謹述天旨因言其致云臣觀管輅天才英偉珪璋特秀實海內之名傑豈日者卜祝之流乎而官止少府丞年終四十八天之報施何其寡與然則高才而無貴仕饕餮而居大位自古所歎焉獨公明而已哉故性命之道窮通之數夭閼紛綸莫知其辯仲任蔽其源子長闡其惑至於鶡冠甕牖必以懸天有期鼎貴高門則曰唯人所召譊譊讙咋異端斯起蕭遠論其本而不暢其流子玄語其流而未詳其本嘗試言之曰夫通生萬物則謂之道生而無主謂之自然自然者物見其然不知所以然同焉皆得不知所以得鼓動陶鑄而不為功庶類混成而非其力生之無亭毒之心死之豈虔劉之志墜之淵泉非其怒升之霄漢非其悅蕩乎大乎萬寶以之化確乎純乎一化而不易化而不易則謂之命命也者自天之命也定於冥兆終然不變鬼神莫能預聖哲不能謀觸山之力無以抗倒日之誠弗能感短則不可緩之於寸陰長則不可急之於箭漏至德未能踰上智所不免是以放勛之世浩浩襄陵天乙之時焦金流石文公𨆫其尾宣尼絕其糧顏回敗其叢蘭冉耕歌其芣苡夷叔斃淑媛之言子輿困臧倉之訴聖賢且猶若此而況庸庸者乎至乃伍員浮尸於江流三閭沈骸於湘渚賈大夫沮志於長沙馮都尉皓髮於郎署君山鴻漸鎩羽儀於高雲敬通鳳起摧迅翮於風穴此豈才不足而行有遺哉近世有沛國劉瓛瓛弟璡並一時之秀士也瓛則關西孔子通涉六經循循善誘服膺儒行璡則志烈秋霜心貞崑玉亭亭高竦不雜風塵皆毓德於衡門並馳聲於天地而官有微於侍郎位不登於執戟相次殂落宗祀無饗因斯兩賢以言古則昔之玉質金相英髦秀達皆擯斥於當年韞奇才而莫用候草木以共彫與麋鹿而同死膏塗平原骨填川谷湮滅而無聞者豈可勝道哉此則宰衡之與皁隸容彭之與殤子猗頓之與黔婁陽文之與敦洽咸得之於自然不假道於才智故曰死生有命富貴在天其斯之謂矣然命體周流變化非一或先號後笑或始吉終凶或不召自來或因人以濟交錯糾紛迴還倚伏非可以一理徵非可以一途驗而其道密微寂寥忽慌無形可以見無聲可以聞必御物以效靈亦憑人而成象譬天王之冕旒任百官以司職而惑者覩湯武之龍躍謂龕亂在神功聞孔墨之挺生謂英睿擅奇響視彭韓之豹變謂鷙猛致人爵見張桓之朱紱謂明經拾青紫豈知有力者運之而趨乎故言而非命有六蔽焉爾請陳其梗概夫靡顏膩理哆噅顣額形之異也朝秀晨終龜鵠千歲年之殊也聞言如響智昏菽麥神之辨也固知三者定乎造化榮辱之境獨曰由人是知二五而未識於十其蔽一也龍犀日角帝王之表河目龜文公侯之相撫鏡知其將刑壓紐顯其膺錄星虹樞電昭聖德之符夜哭聚雲鬱興王之瑞皆兆發於前期渙汗於後葉若謂驅貔虎奮尺劍入紫微升帝道則未達窅冥之情未測神明之數其蔽二也空桑之里變成洪川歷陽之都化為魚鼈楚師屠漢卒睢河鯁其流秦人坑趙士沸聲若雷震火炎崑嶽礫石與琬琰俱焚嚴霜夜零蕭艾與芝蘭共盡雖游夏之英才伊顏之殆庶焉能抗之哉其蔽三也或曰明月之珠不能無纇夏后之璜不能無攷故亭伯死於縣長相如卒於園令才非不傑也主非不明也而碎結綠之鴻輝殘懸黎之夜色抑尺之量有短哉若然者主父偃公孫弘對策不升第歷說而不入牧豕淄原見棄州部設令忽如過隙溘死霜露其為詬恥豈崔馬之流乎及至開東閤列五鼎電照風行聲馳海外寍前愚而後智先非而終是將榮悴有定數天命有至極而謬生妍蚩其蔽四也夫虎嘯風馳龍興雲屬故重華立而元凱升辛受生而飛廉進然則天下善人少惡人多闇主眾明君寡而薰蕕不同器梟鸞不接翼是使渾敦檮杌踵武於雲臺之上仲容庭堅耕耘於巖石之下橫謂廢興在我無繫於天其蔽五也彼戎狄者人面獸心宴安鴆毒以誅殺為道德以蒸報為仁義雖大風立於青丘鑿齒奮於華野比於狼戾曾何足喻自金行不競天地版蕩左帶沸脣乘閒電發遂覆瀍洛傾五都居先王之桑梓竊名號於中縣與三皇競其萌黎五帝角其區宇種落繁熾充仞神州嗚呼福善禍淫徒虛言耳豈非否泰相傾盈縮遞運而汨之以人其蔽六也然所謂命者死生焉貴賤焉貧富焉治亂焉禍福焉此十者天之所賦也愚智善惡此四者人之所行也夫神非舜禹心異朱均才絓中庸在於所習是以素絲無恆玄黃代起鮑魚芳蘭入而自變故季路學於仲尼厲風霜之節楚穆謀於潘崇成殺逆之禍而商臣之惡盛業光於後嗣仲由之善不能息其結纓斯則邪正由於人吉凶在乎命或以鬼神害盈皇天輔德故宋公一言法星三徙殷帝自翦千里來雲若使善惡無徵未洽斯義且于公高門以待封嚴母掃墓以望喪此君子所以自強不息也如使仁而無報奚為修善立名乎斯徑廷之辭也夫聖人之言顯而晦微而婉幽遠而難聞河漢而不測或立教以進庸怠或言命以窮性靈積善餘慶立教也鳳鳥不至言命也今以其片言辯其要趣何異乎夕死之類而論春秋之變哉且荊昭德音丹雲不卷周宣祈雨珪璧斯罄于叟種德不逮勛華之高延年殘獷未甚東陵之酷為善一為惡均而禍福異其流廢興殊其迹蕩蕩上帝豈如是乎詩云風雨如晦雞鳴不已故善人為善焉有息哉夫食稻粱進芻豢衣狐貉襲冰紈觀窈眇之奇儛聽雲和之琴瑟此生人之所急非有求而為也修道德習仁義敦孝悌立忠貞漸禮樂之腴潤蹈先王之盛則此君子之所急非有求而為也然則君子居正體道樂天知命明其無可奈何識其不由智力逝而不召來而不距生而不喜死而不慼瑤臺夏屋不能悅其神土室編蓬未足憂其慮不充詘於富貴不遑遑於所欲豈有史公董相不遇之文乎文選五十四梁書劉峻傳藝文類聚二十一廣絕交論客問主人曰朱公叔絕交論為是乎為非乎主人曰客奚此之問客曰夫草蟲鳴則阜螽躍雕虎嘯而清風起故絪縕相感霧涌雲蒸嚶鳴相召星流電激是以王陽登則貢公喜罕生逝而國子悲且心同琴瑟言鬱郁於蘭茝道叶膠漆志婉孌於壎箎聖賢以此鏤金版而鐫盤盂書玉牒而刻鐘鼎若乃匠人輟成風之妙巧伯子息流波之雅引范張款款於下泉尹班陶陶於永夕駱驛縱橫煙霏雨散巧厤所不知心計莫能測而朱益州汨彝敘粵謨訓捶直切絕交游比黔首以鷹鸇媲人靈於豺虎蒙有猜焉請辨其惑主人听然而笑曰客所謂撫絃徽音未達燥濕變響張羅沮澤不覩鴻雁雲飛蓋聖人握金鏡闡風烈龍驤蠖屈從道汙隆日月聯璧贊亹亹之弘致雲飛電薄顯棣華之微旨若五音之變化濟九成之妙曲此朱生得玄珠於赤水謨神睿而為言至夫組織仁義琢磨道德驩其愉樂恤其陵夷寄通靈臺之下遺迹江湖之上風雨急而不輟其音霜雪零而不渝其色斯則賢達之素交歷萬古而一遇逮叔世民譌狙詐飆起溪谷不能踰其險鬼神無以究其變競毛羽之輕趨錐刀之末於是素交盡利交興天下蚩蚩鳥驚雷駭然利交同源派流則異較言其略有五術焉若其寵鈞董石權壓梁竇雕刻百工鑪捶萬物吐漱興雲雨呼噏下霜露九域聳其風塵四海疊其燻灼靡不望影星奔藉響川騖雞人始唱鶴蓋成陰高門旦開流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓殉荊卿湛七族是曰勢交其流一也富埒陶白貲巨程羅山擅銅陵家藏金穴出平原而聯騎居里閈而鳴鍾則有窮巷之賓繩樞之士冀宵燭之末光邀潤屋之微澤魚貫鳧躍颯沓鱗萃分雁鶩之稻粱霑玉斝之餘瀝銜恩遇進款誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫宴喜西都郭有道人倫東國公卿貴其籍甚搢紳羨其登仙加以顩頤蹙頞涕唾流沫騁黃馬之劇談縱碧雞之雄辯敘溫郁則寒谷成暄論嚴苦則春叢零葉飛沈出其顧指榮辱定其一言於是有弱冠王孫綺紈公子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附騏驥之旄端軼歸鴻於碣石是曰談交其流三也陽舒陰慘生民大情憂合驩離品物恆性故魚以泉涸而喣沫鳥因將死而鳴哀同病相憐綴河上之悲曲恐懼寘懷昭谷風之盛典斯則斷金由於湫隘刎頸起於苫蓋是以伍員濯溉於宰嚭張王撫翼於陳相是曰窮交其流四也馳騖之俗澆薄之倫無不操權衡秉纖纊衡所以揣其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顏冉龍翰鳳雛曾史蘭薰雪白舒向金玉淵海卿雲黼黻河漢視若游塵遇同土梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之蒐慝驩兜之掩義南荊之跋扈東陵之巨猾皆為匍匐逶迤折枝舐痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所游必非夷惠之室苞苴所入實行張霍之家謀而後動毫芒寡忒是曰量交其流五也凡斯五交義同賈鬻故桓譚譬之於闤闠林回喻之於甘醴夫寒暑遞進盛衰相襲或前榮而後悴或始富而終貧或初存而末亡或古約而今泰循環翻覆迅若波瀾此則殉利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知矣而翟公方規規然勒門以箴客何所見之晚乎因此五交是生三釁敗德殄義禽獸相若一釁也難固易攜讎訟所聚二釁也名陷饕餮貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絕有旨哉有旨哉近世有樂安任昉海內髦傑早綰銀黃夙昭民譽遒文麗藻方駕曹王英跱俊邁聯橫許郭類田文之愛客同鄭莊之好賢見一善則盱衡扼腕遇一才則揚眉抵掌雌黃出其脣吻朱紫由其月旦於是冠蓋輻湊衣裳雲合輜軿擊轊坐客恆滿蹈其閫閾若升闕里之堂入其隩隅謂登龍門之阪至於顧盼增其倍價翦拂使其長鳴彯組雲臺者摩肩趨走丹墀者疊迹莫不締恩狎結綢繆想莊惠之清塵庶羊左之徽烈及冥目東粵歸骸洛浦繐帳猶懸門罕漬酒之彥墳未宿草野絕動輪之賓藐爾諸孤朝不謀夕流離大海之南寄命嶂癘之地自昔把臂之英金蘭之友曾無羊舌下泣之仁寍慕郈成分宅之德嗚呼世路險巇一至於此太行孟門豈云嶄絕是以耿介之士疾其若斯裂裳裹足棄之長騖獨立高山之頂歡與麋鹿同群皦皦然絕其雰濁誠恥之也誠畏之也文選五十五南史五十九藝文類聚二十一東陽金華山棲志夫鳥居山上層巢木末魚潛淵下窟穴泥沙豈好異哉蓋性自然也故有忽白璧而樂垂綸負玉鼎而要卿相行藏紛糾顯晦踳駁無異火炎水流圓動方息斯則廟堂之與江海蓬戶之與金閨並然其所然悅其所悅烏足毛羽瘡痏在其間哉予生自原野善畏難狎心駭雲臺朱屋望絕高蓋青組且霑濡霧露彌願閒逸每思濯清瀨息椒丘寤寐永懷其來尚矣蚓專噬壤民欲天從爰洎二毛得居巖穴所居東陽郡金華山東陽實會稽西部是生竹箭山川秀麗皋澤坱鬱若其群峰疊起則接漢連霞喬林布濩則春青冬綠迴溪映流則十仞洞底膚寸雲合必千里雨散信卓犖爽塏神居奧宅是以帝鴻遊斯鑄鼎雨師寄此乘烟故㵎勒赤松之名山貽縉雲之號近代江治中奮迅泥滓王徵士高拔風塵龍盤鳳棲咸萃茲地良由碧湍素石可致幽人者哉金華山古馬鞍山也蘊靈藏聖列名仙諜左元放稱此山云可免洪水五兵可合神丹九轉金華之首有紫巖山山色紅紫因以為稱靡迤坡陀下屬深渚巑岏嶾嶙上虧日月登自山麓漸高漸峻壟路迫隘魚貫而升路側有絕澗閘閜庨豁俯窺木杪焦原石邑匪獨危懸至山將半便有廣澤大川皋陸隱賑予之葺宇實在斯焉所居三面迥山周繞有象郛郭南則平野蕭條目極通望東西帶二澗四時飛流泉清瀾微霔滴瀝生響白波跳沫洶涌成音並漕瀆通引交渠綺錯懸溜瀉於軒甍激湍迴於階砌供帳無綆汲盥漱息瓶盆楓櫨椅櫪之樹梓柏桂樟之木分形異色千族萬種結朱實包綠裹扤白蔕抽紫莖橚矗苯䔿捎風鳴籟垂條櫩戶布葉房櫳中谷澗濱華蕊攢列至於青春緩謝萍生泉動則有都梁含馥懷香送芬長樂負霜宜男泫露芙蕖紅華照水皋蘇縹葉從風憑軒永眺蠲憂亡疾丘阿陵曲眾藥灌叢地髓抗莖山筋抽節金鹽重於素璧玉豉貴於明珠可以養性消痾還年駐色不藉崔文黃散勿用負局紫丸翱翱群鳳風胎雨鷇綠翼紅毛素纓翠鬣肅肅毛羽關關好音皆馴狎園池旅食雞鶩若乃䲰日伺辰響類鐘鼓鳴蚿候曙聲像琴瑟玄猨薄霧清囀飛㹳乘煙永吟嘈囋嘹亮悅心娛耳諒所以跨躡管籥韜軼笙簧宅東起招提寺背巖面壑層軒引景邃宇臨崖博敞間虛納祥生白左瞻右睇仁智所居故碩德名僧振錫雲萃調心七覺詆訶五塵郁烈戒香浴滋定水至於熏鑪夜爇法鼓旦聞予則跕屣摳衣躬行頂禮詢道哲人欽和至教每聞此河紛梗彼岸永寂熙熙然若登春臺而出宇宙唯善是樂豈伊徒言寺東南有道觀亭亭崖側下望雲雨蕙樓榭隱映林篁飛觀列軒玲瓏煙霧日止卻粒之氓歲集神仙之客餌星髓吸流霞將乃雲衣霓裳乘龍馭鶴觀下有石井聳峙中澗雕琢刻削頗類人工躍流𤄓瀉渀湧泱咽電擊雷吼駭目驚魂寺觀之前皆植修竹檀欒蕭瑟被陵緣阜竹外則有良田區畛通接山泉膏液鬱潤肥腴鄭白決漳莫之能擬致紅粟流溢鳧雁充厭春鱉旨擅碧雞冬蕈味珍霜鵽縠巾取於丘嶺短褐出自中園𦺦蔣逼側於池湖菅蒯駢填於原隰養給之資生生所用無不阜實藩籬充牣崖巘歲始年季農隙時閒濁醪初䍤清醥新熟則田家野老提壺共至班荊林下陳鐏置酌酒酣耳熱屢舞諠呶盛論箱庾高談穀稼嗢噱謳歌舉盃相抗人生樂耳此歡豈訾若夫蠶而衣耕而食日出而作日入而息晚食當肉無事為貴不求於世不忤於物莫辨榮辱匪知毀譽浩蕩天地之間心無怵惕之警豈與嵇生齒劍楊子墜閣較其優劣者哉釋藏輕九廣弘明集二十七又略見藝文類聚三十六相經序夫命之與相猶聲之與響聲動乎幾響窮乎應雖壽夭參差賢愚不一其間大較可得聞矣若乃生而神睿弱而能言八彩光眉四瞳麗目斯實天姿之特達聖人之符表洎乎日角月偃之奇龍樓虎踞之美地靜鎮於城纏天關運於掌策金槌玉枕磊落相望伏犀起蓋隱轔交映井宅既兼食匱已實抑亦帝王卿相之明效也及其深目長頸頹顏慼齃虵行鷙立豭喙鳥咮筋不束體血不華色手無春荑之柔髮有寒蓬之悴或先吉而後凶或少長乎窮乏不其悲歟至如姬公凝負圖之容孔父眇棲遑之迹豐本知其有後黃中明其可貴其間或躍馬膳珍或飛而食肉或皁隸晚侯或初形未正銅巖無以飽生玉饌終乎餓死因斯以觀何事非命藝文類聚七十五自序黌中濟濟皆升堂亦有愚者解衣裳南史四十九峻字孝標平原人也生於秣陵縣朞月歸故鄉八歲遇桑梓顛覆身充僕圉齊永明四年二月逃還京師後為崔豫州刑嶽參軍梁天監中詔峻東掌石渠閣以病乞骸骨隱東陽金華山余自比馮敬通而有同之者三異之者四何則敬通雄才冠世志剛金石余雖不及之而節亮慷慨此一同也敬通值中興明君而終不試用余逢命世英主亦擯斥當年此二同也敬通有忌妻至於身操井臼余有悍室亦令家道轗軻此三同也敬通當更始之世手握兵符躍馬食肉余自少迄長戚戚無歡此一異也敬通有一子仲文官成名立余禍同伯道永無血胤此二異也敬通膂力方剛老而益壯余有犬馬之疾溘死無時此三異也敬通雖芝殘蕙焚終填溝壑而為名賢所慕其風流郁烈芬芳久而彌盛余聲塵寂漠世不吾知魂魄一去將同秋草此四異也所以自力為敘遺之好事云梁書劉峻傳革終論死生之事聖人罕言之矣孔子曰精氣為物遊魂為變知鬼神之情狀與天地相似而不違其言約其旨妙其事隱其意深未可以臆斷難得而精覈聊肆狂瞽請試言之夫形慮合而為生魂質離而稱死合則起動離則休寂當其動也人皆知其神及其寂也物莫測其所趣皆知則不言而義顯莫測則逾辯而理微是以勳華曠而莫陳姬孔抑而不說前達往賢互生異見季札云骨肉歸於土魂氣無不之莊周云生為淫役死為休息尋此二說如或相反何者氣無不之神有也死為休息神無也原憲云夏后氏用明器示民無知也殷人用祭器示人有知也周人兼用之示民疑也攷之記籍驗之前志有無之辯不可歷言若稽諸內教判乎釋部則諸子之言可尋三代之禮無越何者神為生本形為生具死者神離此具而即非彼具也雖死者不可復反而精靈遞變未嘗滅絕當其離此之日識用廓然故夏后明器示其弗反即彼之時魂靈知滅故殷人祭器顯其猶存不存則合乎莊周猶存則同乎季札各得一隅無傷厥義設其實也則亦無故周人有兼用之禮尼父發遊魂之唱不其然乎若廢偏攜之論探中途之旨則不仁不智之譏於是乎可息夫形也者無知之質也神也者有知之性也有知不獨存依無知以自立故形之於神逆旅之館耳及其死也神去此而適彼也神已去此館何用存速朽得理也神已適彼祭何所祭祭則失理而姬孔之教不然者其有以乎蓋禮樂之興出於澆薄俎豆綴兆生於俗弊施靈筵陳棺槨設饋奠建丘隴蓋欲令孝子有追思之地耳夫何補於已遷之神乎故上古衣之以薪棄之中野可謂尊盧赫胥皇雄炎帝蹈於失理哉是以子羽沈川漢伯方壙文楚黃壤士安麻索此四子者得理也忘教也若從四子而遊則平生之志得矣然積習生常難卒改革一朝肆志儻不見從今欲翦截煩厚務存儉易進不裸尸退異常俗不傷存者之念有合至人之道孔子云斂首足形還葬而無椁斯亦貧者之禮也余何陋焉且張奐止用幅巾王肅唯盥手足范冉殮畢便葬奚珍無設筵几文度故舟為椁子廉牛車載柩叔起誡絕墳隴康成使無卜吉此數公者尚或如之況於吾人而當華泰今欲髣髴景行以為軌則儻合中庸之道庶免徒費之譏氣絕不須復魄盥洗而斂以一千錢市治棺單故裙衫衣巾枕履此外送往之具棺中常物及餘閣之祭一不得有所施世多信李彭之言可謂惑矣余以孔釋為師差無此惑斂訖載以露車歸於舊山隨得一地地足為埳埳足容棺不須塼甓不勞封樹勿設祭饗勿置几筵無用茅君之虛座伯夷之杅水其蒸嘗繼嗣言象所絕事止余身無傷世教家人長幼內外姻戚凡厥友朋爰及寓所咸願成余之志幸勿奪之梁書劉歊傳
