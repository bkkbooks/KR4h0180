body:
  text: 周興嗣白鶴羽扇賦銜明珠以報德訪在陰而陽止既來集於衛軒亦傾舞於吳市駢瑤翦雪盈華寫潔通脊似介點首如翳縈吹動髮環涼入衣悽兮若秋之暮懍兮如雲之飛蓺文類聚六十九皇子為慈母服議宋朝五服制皇子服訓養母禮依庶母慈己宜從小功之制按曾子問云子游曰喪慈母禮歟孔子曰非禮也古者男子外有傅內有慈母君命所使教子也何服之有鄭玄注云此指謂國君之子也若國君之子不服則王者之子不服可知又喪服經云君子子為庶母慈已者傳曰君子子者貴人子也鄭玄引內則三母止施於卿大夫以此而推則慈母之服上不在五等之嗣下不逮三士之息倘其服者止卿大夫尋諸侯之子尚無此服況乃施之皇子謂宜依禮刊除以反前代之惑梁書司馬筠傳迎氣不用牲議昆蟲未蟄不以火田鳩化為鷹罻羅方設仲春之月祀不用牲止珪璧皮幣斯又事神之道可以不殺明矣況今祀天豈容尚此請夏初迎氣祭不用牲隋書禮儀志二天監七年尚書左丞司馬筠議帝從之參議尚書齋祭服禮記玉藻云諸侯玄冕以祭裨冕以朝雜記又云大夫冕而祭於公弁而祭於己今之尚書上異公侯下非卿士止有朝衣本無冕服但既預齋祭不容同於在朝宜依太常及博士諸齋官例著皁衣絳襈中單竹葉冠若不親奉則不須入廟隋書禮儀志六天監九年司馬筠等參議帝從之量代脯脩議大餅代大脯餘悉用蔬菜隋書禮儀志二天監十六年十月左丞司馬筠等參議荅釋法雲書難范縝神滅論辱告并垂示敕荅臣下審神滅義伏讀周流式歌且舞夫識慮沈隱精靈幽妙近步無以追凡情不能測外聖知其若此所以抑而不談故涉孔父其尚昏經姬公其未曙而碌碌之徒忘理信目錐畫管窺異見鋒起苟徇離賢之名遂迷霜露之實愚惑到此深可矜傷我皇道貫幽顯明踰日月窮天地之極以盡始終之奧忌蕕紫之妨薰朱惡雉珉之亂鳳玉爰發聖衷降茲雅義信之以光揚妙覺拯厥沈泥近照性靈之極遠明孝德之本實使異學翦其邪心四方篤其羨慕謬以多幸預奉陶均沐澤飲和有兼慶躍流通曲被佩荷彌深司馬筠呈弘明集十荅釋法雲書難范縝神滅論辱告惠示敕所荅臣下神滅論夫指歸無二宗致本一續故不斷釋訓之弘規入室容聲孔經之深旨中外兩聖影響相符雖理在固然而疑執相半伏奉淵旨照若發蒙顧會玄趣窮神知寂測情盡狀天地相似千載闕疑從春冰而俱泮一世顛倒與浮雲而俱開祗誦環徊永用懸解存及之顧良以悲戢弟子柳惲頓首白弘明集十荅釋法雲書難范縝神滅論孝經云生則親安心祭則鬼饗之樂記云明則有禮樂幽則有鬼神詩云肅雍和鳴先祖是聽周官宗伯職云樂九變人鬼可得而禮祭義云入戶愾然必有聞乎其歎息之聲尚書云若示三王有太子之責左傳云鯀神化為黃能伯有為妖彭生豕見弟子生此百年早聞三世驗以眾經求諸故實神鬼之證既布中國之書菩提之果又表西方之學聖教相符性靈無泯致言或異其揆惟一但以聖人之化因物通惑抑引從急與奪隨機非會不言言必成務非時不感感惟濟物而參差業報取捨之塗遂分往還緣集淪悟之情相舛狎其小識晦茲大旨滯親聞見莫辯幽微此榆枋所以笑九萬赤縣所以駭大千故其宜也若斯之倫遂復構穿鑿駕危辯鼓偽言煽非學是謂異端故宣尼之所害也我皇繼三五而臨萬機紹七百以御六辯勳格無稱道還淳粹經天緯地之德左日右月之明皇王之所未曉群聖之所不備億兆之所宜通將來之所必至莫不鬯其玄波而達其幽致者也伏覽神論該冠真俗三才載朗九服移心跂行蠢蠕猶知舞蹈況在生靈誰不撫節弟子少缺下帷尤蔽名理既符夙志竊深踴躍至如百家恢怪所述良多搜神靈鬼顯驗非一且般若之書本明斯義既魔從所排趣無兼引自非格言孰能取正略說七條皆承經典譬猶秋毫之憑五嶽觸氏之附六軍敢瀝微塵秪增悚忓弟子庾黔婁和南弘明集十荅敕問雩祭燔柴敕問凡求陰陽應各從其類今雩祭燔柴以火祈水意以為疑懋荅曰雩祭燔柴經無其文良由先儒不思故也按周宣雲漢之詩曰上下奠瘞靡神不宗毛注云上祭天下祭地奠其幣瘞其物以此而言為旱而祭天地並有瘞埋之文不見有燔柴之說若以祭五帝必應燔柴者今明堂之禮又無其事且禮又云埋少牢以祭時時之功是五帝此又是不用柴之證矣昔雩壇在南方正陽位有乖求神而己移於東實柴之禮猶未革請停用柴其牲牢等物悉從坎瘞以符周室雲漢之說梁書許懋傳封禪議臣案舜幸岱宗是為巡狩而鄭引孝經鉤命決云封於太山考績柴燎禪乎梁甫刻石紀號此緯書之曲說非正經之通義也依白虎通云封者言附廣也禪者言成功相傳也若以禪授為義則禹不應傳啟至桀十七世也湯又不應傳外景至紂三十七世也又禮記云三皇禪奕奕謂盛德也五帝禪亭亭特立獨起於身也三王禪梁甫連延不絕父沒子繼也若謂禪奕奕為盛德者古義以伏羲神農黃帝是為三皇伏羲封太山禪云云黃帝封太山禪亭亭皆不禪奕奕而云盛德則無所寄矣若謂五帝禪亭亭特立獨起於身者顓頊封泰山禪云云帝嚳封泰山禪云云堯封太山禪云云舜封太山禪云云亦不禪亭亭若合黃帝以為五帝者少昊即黃帝子又非獨立之義矣若謂三王禪梁甫連延不絕父沒子繼者禹封太山禪云云周成王封太山禪社首舊書如此異乎禮說皆道聽所得失其本文假使三王皆封太山禪梁甫者是為封太山則有傳世之義禪梁甫則有揖讓之懷或欲禪位或欲傳子義既矛盾理必不然又七十二君夷吾所記此中世數裁可得二十餘主伏羲神農女媧大庭柏皇中央栗陸驪連赫胥尊盧混沌昊英有巢朱襄葛天陰康無懷黃帝少昊顓頊高辛堯舜禹湯文武中閒乃有共工霸有九州非帝之數云何得有七十二君封禪之事且燧人以前至周之世未有君臣人心淳樸不應金泥玉檢升中刻石燧人伏羲神農三皇結繩而治書契未作未應有鐫文告成且無懷氏伏羲後弟十六主云何得在伏羲前封太山禪云云夷吾又曰惟受命之君然後得封禪周成王非受命君云何而得封太山禪社首神農與炎帝是一主而云神農封太山禪云云炎帝封太山禪云云分為二人妄亦甚矣若是聖主不須封禪若是凡主不應封禪當時齊桓欲行此事管仲知其不可故舉怪物以屈之也秦始皇登太山中坂風雨暴至休松樹下封為五大夫而事不遂漢武帝宗信方士廣召儒生皮弁縉紳射牛行事獨與霍嬗俱上既而子侯暴卒厥足用傷至魏明使高堂隆撰其禮儀聞隆沒歎息曰天下欲成吾事高生捨我亡也晉武太始中欲封禪乃至太康議猶不定竟不果行孫皓遣兼司空董朝兼太常周處至陽羨封禪國山此朝君子有何功德不思古道而欲封禪皆是主好名於上臣阿旨於下也夫封禪者不出正經惟左傳說禹會諸侯於塗山執玉帛者萬國亦不謂為封禪鄭玄有參柴之風不能推尋正經專信緯候之書斯為謬矣蓋禮云因天事天因地事地因名山升中於天因吉土享帝於郊燔柴岱宗即因山之謂矣故曲禮云天子祭天地是也又祈穀一報穀一禮乃不顯祈報地推文則有樂記云大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地百物不失者天生之地養之故知地亦有祈報是則一年三郊天三祭地周官有員丘方澤者總為三事郊祭天地故小宗伯云兆五帝於四郊此即月令迎氣之郊也舜典有歲二月東巡狩至於岱宗夏南秋西冬北五年一周若為封禪何其數也此為九郊亦皆正義至如大旅於南郊者非常祭也大宗伯國有大故則旅上帝月令云仲春玄鳥至祀於高禖亦非常祭故詩云克禋克祀以弗無子并有雩禱亦非常祭禮云雩禜水旱也是為合郊天地有三特郊天有九非常祀又有三孝經云宗祀文王於明堂以配上帝雩祭與明堂雖是祭天而不在郊是為天祀有十六地祭有三惟大禘祀不在此數大傳云王者禘其祖之所自出以其祖配之異於常祭以故云大於時祭案繫辭云易之為書也廣大悉備有天道焉有地道焉有人道焉兼三才而兩之故六六者非他三才之道也乾彖云大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成此則應六年一祭坤元亦爾誠敬之道盡此而備至於封禪非所敢聞梁書許懋傳時有請封會稽禪國山者懋以為不可因建議駁明堂儀注禮云大裘而冕祀昊天上帝亦如之良由天神尊遠須貴誠質今泛祭五帝理不容文梁書許懋傳時祭東城廟議初祭是四時常祭首月既不可移易宜依前剋日於東廟致齋隋書禮儀志二中興二年四月梁武即皇帝位祠部郎謝廣又議帝從之郊祀一獻議宗祧三獻義兼臣下上天之禮主在帝王約理申義一獻為允隋書禮儀志一天監七年帝以一獻為質三獻則文事天之道理不應然詔下詳議博士陸瑋明山賓禮官司馬褧以為云云自是天地之祭皆一獻郊祀服章議祭天猶存埽地之質而服章獨取黼黻為文於義不可今南郊神座皆用苮席此獨莞類未盡質素之理宜以稾秸為下籍蒲越為上席又司服云王祀昊天服大裘明諸臣禮不得同自魏以來皆用袞服今請依古更制大裘隋書禮儀志一天監七年又議尋大裘之制唯鄭玄注司服云大裘羔裘也既無所出未可為據案六冕之服皆玄上纁下今宜以玄繒為之其制式如裘其裳以纁皆無文繡冕則無旒同上薦朱异表竊見錢唐朱异年時尚少德備老成在獨無散逸之想處闇有對賓之色器宇弘深神表峰峻金山萬丈緣陟未登玉海千尋窺映不測加以珪璋新琢錦組初構觸響鏗鏘值采便發觀其信行非惟十室所稀若使負重遙途必有千里之用梁書朱异傳郊不應祼議表記天子親耕潔盛秬鬯以事上帝蓋明堂之祼耳郊不應祼隋書禮儀志一天監三年博士明山賓議帝從之省牲牽牲讚牲議案郊廟省牲日則廩犧令牽牲太祝令讚牲祭之日則太尉牲郊特牲云社者神地之道國主社稷義實為重今公卿貴臣親執盛禮而令微吏牽牲頗為輕末且司農省牲又非其義太常禮官實當斯職禮祭社稷無親事牽之文謂宜以太常省牲廩犧令牽牲太祝令讚牲隋書禮儀志二天監四年明山賓議又見通典四十五二郊同日議伏尋制旨周以建子祀天五月祭地殷以建丑祀天六月祭地夏以建寅祀天七月祭地自頃代以來南北二郊同用夏正隋書禮儀志一天監五年明山賓稱云云詔更詳議又議二儀並尊三朝慶始同以此日二郊為允并請迎五帝於郊皆以始祖配饗及郊廟受福唯皇帝再拜明上靈降祚臣下不敢同也同上詔竝依議祼用雞彝牛彝議尊彝之制祭圖惟有三樽一曰象樽周樽也二曰山罍夏樽也三曰著樽殷樽也徒有彝名竟無其器直酌象樽之酒以為珪瓚之實竊尋祼重於獻不容共樽宜循彝器以備大典案禮器有六彝春祠夏礿祼用雞彝鳥彝王以珪瓚初祼后以璋瓚亞祼故春夏兩祭俱用二彝今古禮殊無復亞祼止循其二春夏雞彝秋冬牛彝庶禮物備也隋書禮儀志二天監五年明山賓議又議臣愚管不奉明詔則終年乖舛案鳥彝是南方之物則主火位木生於火宜以鳥彝春夏兼用同上帝曰雞是金禽亦主巽位但金火相伏用之通夏於義為疑山賓云云帝從之迎氣服大裘議周官祀昊天以大裘祀五帝亦如之頃代郊祀之服皆用袞冕是以前奏迎氣祀五帝亦服袞冕愚謂迎氣祀五帝亦宜用大裘禮俱一獻隋書禮儀志二天監八年明山賓議帝從之荅釋法雲書難范縝神滅論辱告惠示敕旨荅臣下審神滅論源深趣遠豈鹿兔所測隨類得解或亦各欣其所見奉以周旋不勝舞躍法師學冠一時道叶千載起予之寄允在明德想弘宣妙旨無復遺蘊邪弟子業謝專經智非通議豈能仰述淵猷讚揚風教論者限以視聽豈達曠遠目覩百年心惑三世謂形魄既亡神魂俱滅斯則既違釋典復乖孔教矣焉可與言至道語妙理者哉夫明則有禮樂幽則有鬼神是以孔宣垂範以知死酬問周文立教以多才代終詩稱三后在天書云祖考來格且濠上英華著方生之論柱下叡哲稱其鬼不神為薪而火傳交臂而生謝此皆陳之載籍彰彰甚明者也夫緣假故有滅業造故無常是以五陰合成終同煙盡四微虛構會均火滅竊謂神明之道非業非緣非業非緣故雖遷不滅能緣能業故苦樂殊報此能仁之妙唱縉紳之所抑也雖教有殊途理還一致今棄周孔之正文背釋氏之真說未知以此將欲何歸正法住世尚有斷常之說況像法末流而無異端之論有神不滅乃三聖同風雖典籍著明多歷年所通儒碩學竝未能值皇上智周空有照極神源爰發聖衷親染神翰弘獎至教啟悟重昏令夫學者永袪疑惑眷逮不遺使得預餐風訓沐浴頂戴良兼欣戢明山賓和南弘明集十改奏三夏議禮王入奏王夏大祭祀與朝會其用樂一也而漢制皇帝在廟奏永至樂朝會之日別有皇夏二樂有異於禮為乖宜除永至還用皇夏又禮尸出入奏肆夏賓入大門奏肆夏則所設唯在人神其與迎牲之樂不可濫也宋季失禮頓虧舊則神入廟門遂奏昭夏乃以牲牢之樂用接祖考之靈斯皆前代之深疵當今所宜改也隋書音樂志上天監初周捨議以為元會受玉議案周禮冢宰大朝覲贊玉幣尚書古之冢宰頃王者不親撫玉則不復須冢宰贊助尋尚書主客曹郎既冢辛隸職今元日五等奠玉既竟請以主客郎受鄭玄注覲禮云既受之後出付玉人於外漢時少府職主珪璧請主客受玉付少府掌隋書禮儀志四天監六年詔元日受五等贄圭璧並量付所司周捨云云又見通典七十金輅議金輅為齊車本不關於祭祀通典六十四天監七年帝據周禮玉輅以祀金輅以賓今祀乘金輅詔下詳議周捨謂云云袞服議詔旨以王者袞服宜畫鳳皇以示差降按禮有虞氏皇而祭深衣而養老鄭玄所言皇則是畫鳳皇羽也又按禮所稱雜服皆以衣定名猶加袞冕則是袞衣而冕明有虞言皇者是衣名非冕明矣畫鳳之旨事實灼然隋書禮儀志六天監七年周捨議制可又見通典六十一安成始興二王為慈母服議賀彥先稱慈母之子不服慈母之黨婦又不從夫而服慈姑小功服無從故也庾蔚之云非徒子不從母而服其黨孫又不從父而服其慈母由斯而言慈祖母無服明矣尋門內之哀不容自同於常按父之祥禫子並受弔今二王諸子宜以成服日單衣一日為位受弔梁書司馬筠傳天監七年安成太妃陳氏薨安成王季始興王憺並以慈母表解職舍人周捨議又南史七十一又議禮云縞冠玄武子姓之冠則世子衣服宜異於常可著細布衣絹為領帶三年不聽樂又禮及春秋庶母不世祭蓋謂無王命者耳吳太妃既朝命所加得用安成禮秩則當祔廟五世親盡乃毀陳太妃命數之重雖則不異慈孫既不從服廟食理無傳祀子祭孫止是會經文梁書司馬筠傳又南史七十一釋奠會議釋奠仍會既惟大禮請依東宮元會太子著絳紗襮樂用軒懸預升殿坐者皆服朱衣隋書禮儀志四天監八年皇太子釋奠周捨議丹陽琅邪二郡斷蒐捕議禮云君子遠庖廚血氣不身翦見生不忍其死聞聲不食其肉此皆即目興仁非關及遠三軀之禮向我者舍背我者射廣弘明集二十六鼎銘天下寍康異方同軌九牧作貢百司咸理範金鑄器戒鎮階戺波圓月鏡傳之無已蓺文類聚七十三東宮樂議既於崇正殿宴會太子臨座其事重宜依禮會奏金石軒懸之樂通典一百四十七天監六年仁威府長史司馬褧議荅釋法雲書難范縝神滅論辱告惠示敕難滅性論竊以洪波慈被道冠眾靈智照淵凝理絕群古七禪八慧之辨三空四諦之微故以煥乎載籍炳於通誥也所以優陀云喻如百首齊音同讚妙覺尚不能言萬分之一矣夫業生則報起因往而果來雖義微而事著亦理幽而證顯自近可以知遠尋邇可以探遐譬如日月懸天無假離朱之目鳴鐘在耳不勞子期之聽而議者自昏迷途難曉荀徇所懷坐顛坑穽伏覽皇上令旨理妙辭縟致極鉤深究至寂而更闡啟幽途而還晰雖復列聖齊鑣群經聯奧靈山金口禪冰玉舌終不能舍此以求通違茲而得正信哉澡江漢之波塵滓以滌導德齊禮還風反化法俗兼通於是乎在付此言展方盡述讚弟子司馬褧呈弘明集十
