body:
  text: 元帝即位改元詔夫樹之以君司牧黔首帝堯之心豈貴黃屋誠弗獲已而臨蒞之朕皇祖太祖文皇帝積德岐梁化行江漢道映在田具瞻司屬皇考高祖武皇帝明並日月功格區宇應天從民惟睿作聖太宗簡文皇帝地侔啟誦方符文景羯寇憑凌時難孔棘朕大拯橫流克復宗社群公卿士百辟庶僚咸以皇靈睠命歸運斯及天命不可以久淹宸極不可以久曠粵若前載憲章令範畏天之威算隆寶厤用集神器于予一人昔虞夏商周年無嘉號漢魏晉宋因循以久朕雖云撥亂且非創業思得上繫宗祧下惠億兆可改太清六年為承聖元年逋租宿責並許弘貸孝子義孫可悉賜爵長徒鎖士特加原宥禁錮奪勞一皆曠蕩梁書元帝紀手詔封宗懍昔扶柳開國止曰故人西鄉胙土本由賓客況事涉勳庸而無爵賞尚書侍郎宗懍亟有帷幄之謀誠深股肱之寄從我于邁多歷歲時可封信安縣侯邑一千戶周書宗懍傳勸農詔食乃民天農為治本垂之千載貽諸百王莫不敬授民時躬耕帝藉是以稼穡為寶周頌嘉其樂章禾麥不成魯史書其方冊秦人有農力之科漢氏開屯田之利頃歲屯否多難薦臻干戈不戢我則未暇廣田之令無聞於郡國載師之職有陋於官方今元惡殄殲海內方一其大庇黔首庶拯橫流一廛曠務勞心日昃一夫廢業舄鹵無遺國富刑清家給民足其力田之身在所蠲免外即宣勒稱朕意焉梁書元帝紀將歸建鄴先遣軍東下詔夫爰始居亳不廢先王之都受命於周無改舊邦之頌頃戎旃既息關柝無警去魯興歎有感宵分過沛殞涕實勞夕寐仍以瀟湘作亂庸蜀阻兵命將授律指期克定今八表乂清四郊無壘宜從青蓋之典言歸白水之鄉江湘委輸方船連舳巴峽舟艦精甲百萬先次建鄴行實京師然後六軍遄征九旂揚旆拜謁塋陵修復宗社主者詳依舊典以時宣勒梁書元帝紀贈謚杜崱詔崱京兆舊姓元凱苗裔家傳學業世載忠貞自驅傳江渚政號廉能推轂淺源實聞清靜奄致殞喪惻愴於懷可贈車騎將軍加鼓吹一部諡曰武梁書杜崱傳加王僧辯太尉車騎大將軍詔贊俊遂賢稱于秦典自上安下聞之漢制所以仰協台曜俯佐弘圖使持節侍中司徒尚書令都督揚南徐東揚三州諸軍事鎮衛將軍揚州刺史永寍郡開國公僧辯器宇凝深風格詳遠行為士則言表身文學貫九流武該七略頃歲征討自西徂東師不疲勞民無怨讟王業艱難實兼夷險宜其燮此中台膺茲上將寄之經野匡我朝猷加太尉車騎大將軍餘悉如故梁書王僧辯傳追謚王僉詔賢而不伐曰恭謚恭子梁書王份附傳敕杜龕卿年時尚少習讀未晚顏晃文學之士使相毗佐造次之閒必宜諮稟陳書顏晃傳承聖初杜龕為吳興太守元帝使晃管其書翰仍敕龕手敕報王僧辯孔沈二士今且借公陳書孔奐傳手敕報顏之儀枚乘二葉俱得游梁應貞兩世竝稱文學我求才子鯁慰良深周書顏之儀傳之儀獻神州頌辭致雅贍元帝手敕報別敕王僧辯黑泰背盟忽便舉斧國家猛將多在下流荊陝之眾悉非勁勇公宜率貔虎星夜就路倍道兼行赴倒懸也梁書王僧辯傳荅南平王恪等令數鍾陽九時惟百六鯨鯢未翦寤寐痛心周粵天官秦稱相國東至於海西至於河南次朱鳶北漸玄塞率茲小宰弘斯大德將何用繼蹤曲阜擬跡桓文終建一匡肅其五拜雖義屬隨時事無虛紀傳稱皆讓象著鳴謙瞻言前典再懷哽恧梁書元帝紀與諸藩令令即日青鳧朽貫紅粟盈倉據有全楚奄荒南服舳艫萬計鐵馬千群一九之土可封函谷半紙之翰能下聊城而不以富貴為榮不以妻孥為念瀝血叩心枕戈嘗膽其何故哉政欲掃蕩長虵誅鋤封豕本非經略三夏包羅二別而中流未附必鯁王師弗見勤王之勳且有親尋之辱興言思此載勞寤寐政當浮舟水次秣馬江陵靜聽郢藩若為消息脫能前驅入討同盟勤王陝服景從差為未晚如其驅率市人泝流西入凡我腹心人百其勇判當待彼先舉然後從事兵非我始幸各逡巡其間小小應接非今所議文館詞林荅王僧辯等勸進令孤以不德天降之災枕戈飲膽扣心泣血風樹之酷萬始不追霜露之哀百憂總萃甫聞伯升之禍彌切仲謀之悲若封豕既殲長虵即戮方欲追延陵之逸軌繼子臧之高讓豈資秋亭之壇安事繁陽之石侯景項籍也蕭棟殷辛也赤泉未賞劉邦尚曰漢王白旗弗懸周發猶稱太子飛龍之位敦謂可躋附鳳之徒既聞來議群公卿士其諭孤之志無忽梁書元帝紀又荅省示復具一二孤聞天生蒸民而樹之以君所以對揚天休司牧黔首攝提合雒以前栗陸驪連之外書契不傳未得稱也自阪泉彰其武功丹陵表其文德有人民焉有社稷焉或歌謠所歸或惟天所相孤遭家多難大恥未雪國賊則蚩尤弗翦同姓則有扈不賓臥而思之坐以待旦何以應寶厤何以嗣龍圖庶一戎既定罪人斯得祀夏配天方申來議也梁書元帝紀下斷勸進表奏令大壯乘乾明夷垂翼璿度亟移玉律屢徙四岳頻遣勸進九棘比者表聞譙沛未復塋陵永遠于居于處寤寐疚懷何心何顏撫茲歸運自今表奏所由並斷若有啟疏可寫此令施行梁書元帝紀耕種令軍國多虞戎旃未靜青領雖熾黔首宜安時惟星鳥表年祥於東秩春紀宿龍歌歲取於南畯況三農務業尚看夭桃敷水四人有令猶及落杏飛花化俗移風常在所急勸耕且戰彌須自許豈直燕垂寒谷積黍自溫寍可墮此玄苗坐湌紅粒不植鷰頷空候蟬鳴可悉深耕穊種安堵復業無棄民力並分地利班勒州郡咸使遵承梁書元帝紀又荅王僧辯等勸進令省表復具一二群公卿士億兆夷人咸以皇天睠命歸運所屬用集寶位於予一人文叔金吾之官事均往願孟德征西之位且符前說今淮海長鯨雖云授首襄陽短狐未全革面太平玉燭爾乃議之梁書元帝紀解嚴令軍容不入國國容不入軍雖子產獻捷戎服從事亞夫弗拜義止將兵今凶醜殲夷逆徒殄潰九有既截四海乂安漢官威儀方陳盛禮衛多君子寄是式瞻便可解嚴以時宣勒梁書元帝紀赦令君子赦過著在周經聖人解網聞之湯令自獫狁孔熾長虵荐食赤縣阽危黔黎塗炭終宵不寐志在雪恥元惡稽誅本屬侯景王偉是其心膂周石珍負背恩義今並烹諸鼎鑊肆之市朝但比屯邅寇擾為歲已積衣冠舊貴被逼偷生猛士勳豪和光苟免凡諸惡侶諒非一族今特闡以王澤削以刑書自太清六年五月二十日昧爽以前咸使惟新梁書元帝紀召學生教閣下昔楚王好詩沛王傳易猶且傳之不巧以為盛事況吾親承天旨聞禮聞詩方欲化行南國被於西楚蓺文類聚三十八下荊州辟韓懷明等教處士河東韓懷明南平韓望南郡庾承先河東郭黁並脫落風塵高蹈其事兩韓之孝友純深庾郭之形骸枯槁或橡飯菁羹惟日不足或葭牆艾席樂在其中昔伯武貞堅就仕河內史雲孤劭屈志陳留豈曰場苗實惟攻玉可加引辟并遣喻意既同魏侯致禮之請庶無辟疆三緘之歎下上忠臣傳表資父事君寔曰嚴敬求忠出孝義兼臣子是以冬溫夏凊盡事親之節進思將美懷出奉之義羲軒改物殷周受命三能十亂九棘五臣靡不夙夜在公忠為令德若使縉雲得姓之子姬昌魯衛之臣是知理合君親孝忠一體性與率由因心致極臣連華霄漢憑暉日月三握再吐夙奉紫庭之慈春詩秋禮早蒙丹扆之訓宣帝襃德麟閣畫充國之形顯宗念功雲臺圖仲華之象蓺文類聚二十初學記十七下請於州立學校表臣聞公宮之南四術四教司樂成均六詩六律韶濩既舞羽籥之道行焉黨塾茲備離經之志辯焉故不升嵩霍豈識乾行之峻不臨溟渤安知地載之厚洎乎秦焚金篆周亡玉鏡群言爭亂諸子相騰書則夏侯歐陽易則神輸道訓詩乃齊魯毛韓傳稱鄒左張夾禮有曲臺王史之異樂有龍德趙定之殊伏惟陛下撫五辰而建五長播九德而導九州容成為厤興景雲之瑞伶倫吹律應黃鍾之琯撥亂反正經武也制禮作樂緯文也若非六經庖廚百家異饌三墳為瑚璉五典為笙簧豈能暴以秋暘紆就望之景濯以江漢播垂天之澤蓺文類聚三十八薦顧協表臣聞貢玉之士歸之潤山論珠之人出於枯岸是以芻蕘之言擇於廊廟者也臣府兼記室參軍吳郡顧協行稱鄉閭學兼文武服膺道素雅量邃遠安貧守靜奉公抗直傍闕知己志不自營年方六十室無妻子臣欲言於官人申其屈滯協必苦執貞退立志難奪可謂東南之遺寶矣伏惟陛下未明求衣思賢如渴爰發明詔各舉所知臣識非許郭雖無知人之鑒若守固無言懼貽蔽賢之咎昔孔愉表韓績之才庾亮薦翟湯之德臣雖未齒二臣協實無慚兩士梁書顧協傳薦鮑幾表臣聞思皇多士仄陋所以明揚疇咨熙載髦俊所以並作斯固殷殿初基拾龍淵之寶虞祠始構獻鳳管之玉旌蒲出魯賁帛歸齊頌聲既興盛業斯在伏惟陛下則天緯地乘正馭才沙汰八風澄明六合叶龜登夢之客日賁於丘園韋轂投釣之臣相望於魏闕故已物無遺寶振鷺有充庭之謳白駒罕空谷之詠洋洋濟濟無得而稱者焉臣誠識愧知才職非選舉竊以進賢上賞蔽賢顯戮敢緣斯義用舉所知伏見鮑幾門庭雍睦立身貞退博涉文史頗閑刀筆忠公抗直出宰廉平雅志弘深安貧專靜解巾入仕三十餘年自游臣府一紀於茲前宰東邑實有二魯之風近處南臺欲尊兩鮑之則伏揆天嚴已當簡在脫蒙顯居良局登以清貫將齊毛玠古人之服實同吳隱酌水之廉昔丁隈牧州陳顧翟之好禮徐靖為郡薦袁渙之篤學桓範驅傳先舉管寍朱則剖符亦稱董直臣才非往哲識愧前修輕陳聽覽伏待斧鉞蓺文類聚五十三遷荊州輸江州節表周有掌節之職漢有符節之令所以子孫慷慨忠肅勤王無絕終古有高前載臣自擁旄鶴塞執茲龍節幸逢銀山自溢玉燭調年雖免茂弘之譏竟微辛毗之勇蓺文類聚六十八高祖武皇帝謚議臣聞翼善傳聖曰堯仁聖盛明曰舜受禪成功曰禹除虐去殘曰湯謚者行之跡號者功之表雖賤不誄貴卑不誄尊而彰乎名者盛德之嘉號也被於物者治定之實錄也斯所以聲明煥乎鍾石昭晰備於絃管者焉伏惟天縱欽明惟睿作聖功超三五聲踰七十仰之彌高就之彌遠載潛載躍乃武乃文先是木運告終群后改屬乾維罔搆地紐如崩祧祀阽危公卿旰食九牧有淪胥之悲八表興橫流之歎乃凝威黑水表瑞丹陵雲合景從表裏禔福受終文祖允恭克讓知黔首不可以無歸蒼生不可以無主降汾陽之遠志不得已而臨之於是類帝禋宗革命創制禘郊式展殷薦斯潔臨茲大寶化與和氣俱宣扇此王風政與秋霜並肅言懸日月功格區宇不以紫宸為貴不以黃屋為尊政謐刑措民殷國阜虹旌式卷堡燧載清胥象相因環楛無曠天衢亨泰王道升平南海候風東溟奉貢膏露凝枝慶雲觸石山開蒼璧地出玄珪驃騎把鉞則休屠款塞太尉抗旌則名王蹶角聲教所漸浹靈虵之都威令所行通燭龍之外開庠建序布濩於成均正俗移風氛氳於司樂虛納十亂引諒直之規廣闢四門弘招賢之德青衿知擊壤之性黃髮恣鼓腹之歡加以鑽味微言研精至道文終所牧之典史倚所讀之書無輟萬機日且千遍馳郁郁之聲表乾乾之德允所謂皇哉君哉日用而不知者矣方且告成岱嶽鏤升中之玉簡昭事梁甫祕社首之金繩而文王明夷事侔往冊黃帝橋山痛深前典萬有淪傷三辰掩曜人祇軫慕山海含悲慟切陟方哀深遏密煩冤荼毒貫切心髓風樹不靜陟岵何期思所以欽若九功仰稽七德蓺文類聚十四馳檄告四方夫剝極生災乃及龍戰師貞終吉方制獖豕豈不以侵陽蕩薄源之者亂階定龕艱難成之者忠義故羿澆滅於前莽卓誅於後是故使桓文之勳復興於周代溫陶之績彌盛於金行粵若梁興五十餘載平壹㝢內德惠悠長仁育蒼生義征不服左伊右瀍咸皆仰化濁涇清渭靡不向風建翠鳳之旗則六龍驤首擊靈鼉之鼓則百神警肅風牧方邵之賢衛霍辛趙之將羽林黃頭之士虎賁緹騎之夫叱咤則風雲興起鼓動則嵩華倒拔自桐柏以北孤竹以南碣石之前流沙之後延頸舉踵交臂屈膝胡人不敢牧馬秦士不敢彎弓叶和萬邦平章百姓十堯九舜曷足云也賊臣侯景匈奴叛臣鳴鏑餘噍懸瓠空城本非國寶壽春畿要賞不踰月開海陵之倉賑常平之米檄九府之費錫三官之錢冒于貨賄不知紀極敢興逆亂梗我王畿賊臣正德阻兵安忍日者結怨江羋遠適單于簡牘屢彰彭生之魂未弭聚斂無度景卿之誚已及為虎傅翼遠相招致虔劉我生民離散我兄弟我是以董率皋貔躬擐甲冑霜戈照日則晨離奪暉龍騎蔽野則平原掩色信與江水同流氣與寒風俱憤凶醜畏威委命下吏乞活淮肥苟存徐兗渙汗既行絲綸爰被我是以班師凱歸休牛息馬賊猶不悛遂復矢流王屋兵躔象魏總章之觀非復聽訟之堂甘泉之宮永乖避暑之地坐召憲司臥制朝宰矯託天命偽作符書重增賦斂肆意裒剝生者逃竄死者暴尸道路以目庶僚鉗口刑戮失衷爵賞由心老弱波流士女塗炭臧獲之人五宗及賞搢紳之士三族見誅穀粟騰踴自相吞噬惵惵黔首路有銜索之哀蠢蠢黎民家有桓山之泣偃師南望無復儲胥露寒河陽北臨或有穹廬氈帳南山之竹未足言其愆西山之兔不足書其罪外監陳瑩之至伏承先帝登遐宮車晏駕奉諱驚號五內摧裂州冤本毒無地容身景阻饑既甚民且狼顧遂侵軼我彭蠡憑凌我郢邑竊據我江夏掩襲我巴丘我是以義勇爭先忠貞盡力斬馘凶渠不可稱算沙同赤岸水若絳河任約泥首於安南化仁面縛於漢口子仙乞活於鄢郢希榮敗績於柴桑侯景奔竄十鼠爭穴郭默清夷晉熙附義計窮力屈反殺後主畢原酆郇並離禍患凡蔣邢茅皆伏鈇鑕是可忍也孰不可容幕府據有上流實惟分陜投袂荷戈志在畢命昔周依晉鄭漢有虛牟彼惟末屬猶能如此況聯華日月天下不賤為臣為子兼國兼家者哉咸以義旗既建宜須總一共推幕府實用主盟粵以不佞謬董連率遠惟國艱不遑寍處中權後勁龔行天罰提戈蒙險隕越以之天馬千群長戟百萬驅賁獲之士資智勇之力大楚踰荊山淺原度彭蠡舳艫汎水以掎其南輜軿委輸以衝其北華夷百濮贏糧影從雷震風駭直指建業按劍而叱江水為之倒流抽戈而揮皎日為之退舍方駕長驅百道俱入夷山殄谷充原蔽野挾輈曳牛之侶拔距磔石之夫騎則逐日追風弓則吟猿落鴈捧崑崙而壓卵傾渤海而灌熒如駟馬之載鴻毛若奔牛之觸魯縞以此眾戰誰能禦之脫復蜂蠆若毒獸窮則鬭謂山蓋高則四郊多壘謂地蓋遠則三千弗違如彼怒蛙譬諸鼷鼠豈費萬鈞無勞百溢加以日臨黃道兵起絳宮三門既啟五將咸發舉整整之旗掃亭亭之氣故以臨機密運非賊所解奉義而誅何罪不服今遣使持節大都督征東將軍開府儀同三司江州刺史尚書令長寍縣開國侯王僧辯率眾十萬直掃金陵鳴鼓聒天摐金振地朱旗夕建如赤城之霞起戈船夜動若滄海之奔流計其同惡不盈一旅君子在野小人比周何校滅耳匪朝伊夕舂長狄之喉繫郅支之頸今司寇明罰質鈇所誅止侯景而已黎元何辜一無所問諸君或世樹忠貞身荷寵爵羽儀鼎族書勳王府俛眉猾豎無由自效豈不下慚泉壤上愧皇天失忠與義難以自立想誠南風迺睠西顧因變立功轉禍為福有能縛侯景及送首者封萬戶開國公絹布五萬匹有能率動義眾以應官軍保全城邑不為賊用上賞方伯下賞剖符並裂山河以紆青紫昔由余入秦禮同卿佐日磾降漢且珥金貂必有其才何䘏無位若執迷不反拒逆王師大軍一臨刑茲罔赦孟諸焚燎芝艾俱盡宣房河決玉石同沈信賞之科有如皎日黜陟之制事均白水檄布遠近咸使知聞梁書元帝紀又略見蓺文類聚五十八慶南郊啟大裘而冕陶匏以質黃鍾既奏雲門斯舞樂諧六變歌陳九德感天動神式展誠敬蓺文類聚三十八慶東耕啟伏惟陛下敬授民時造幄籍圃漢之元鳳未足捧羈晉之太始非堪扶轂但承明侍從即事未由周南留滯伏深戀仰蓺文類聚三十九謝敕賜第啟竊以漢錫五倫寔云清吏魏寵衛臻用旌庸直未如靈光輪奐雎陽爽塏北連城闕有似甄侯之舍東望市鄽榮深豫章之圃昔狼望未平冠軍辭宅馬池猶隔雍丘讓邸臣慚霍曹遠志但識君命無違再思庸陋九殞非荅蓺文類聚六十四初學記二十四為東宮薦石門侯啟切以鳳鳴朝陽必資藍田之寶龍門點額亦俟堂溪之珍是以紫玉見稱黃金為貴文傳夢鳥學重靈蛇點漆凝脂事逾衛玠渾金璞玉才匹山濤昔翟湯隱逸見稱庾亮陳平器局被薦無知以人廢言誠增竦讋進賢上賞伏待慈照蓺文類聚五十三謝東宮賜白牙鏤管筆啟春坊漆管曲降深恩北宮象牙猥蒙霑逮雕鐫精巧似遼東之仙物圖寫奇麗笑蜀郡之儒生故知嵇賦非工王銘未善昔伯喈致贈讒屬友人葛龔所酬止聞通識豈若遠降鴻慈曲覃庸陋方覺瑠璃無讜隨珠過侈但有羨卜商無因則削徒懷曹植恆願執鞭蓺文類聚五十八謝東宮賚貂蟬啟挹婁之毳曲降鴻恩麗水之珍復蒙殊獎東平紫貂之賜非聞暖頟中山黃金之錫豈曰附蟬坐變仲尼之容增暉允南之貌蓺文類聚六十七謝東宮賜麈尾錦帔團扇等啟楊雄口訥本貴談端田蚡貌寢終於麗飾始興之扇方斯非擬鄴中之錦匹此為輕方願弘此仁風既動承華之氣服茲懷袖復比文若之香蓺文類聚六十九謝東宮賚寶枕啟泰山之藥既使延齡長生之枕能令益壽黃金可化豈直劉向之書陽燧含火方得葛洪之說況復重安玳瑁獨勝瑰材方松非匹稱榴未擬蓺文類聚七十謝敕賜縟啟昔漢后賜貂魏君送縟未有玄兔來王黃龍作貢便覺肅慎非遙挹婁無遠蓺文類聚七十謝東宮賚花釵啟茝亂九衢花含四照田文之珥慚於寶葉王粲之詠恧此乘蓮九官之璫豈直黃香之賦三珠之釵敢高崔瑗之說況以麗玉澄暉遠過玳瑁之飾精金曜首高踐翡翠之名蓺文類聚七十上東宮古跡啟師宜八分之巧元常三體之妙史籀李斯之篆梁鴻曹喜之書莫不總萃桂宮盈滿甲館竊以鸞驚之勢既聞之於索靖鷹跱之巧又顯之於蔡邕是以遊霧重雲傳敬禮之法鳥頡魚頏表揚泉之賦頗好六文多慚三禮尚方大篆既其牢落柱下方書何曾髣髴空慕河間之聚書竟微東平之獻表齊攸尺牘顧已缺然北海楷隸終成難擬蓺文類聚七十四謝上畫蒙敕襃賞啟臣簿領餘暇竊愛丹青雲臺之像終微髣髴宣室之圖更難議擬成蠅罕術畫馬疏工人非世將恩深晉帝之賞跡愧景山寵踰魏皇之詔藝文類聚卷七十四謝東宮賚陸探微畫啟工踰畫馬巧邁圖龍試映玉池即看魚動還傍金屏復疑蠅集史遷暫覩懸識留侯之貌漢帝一瞻便見王嬙之像蓺文類聚七十四謝東宮賜彈棊局啟繹本慚遊蓺彌愧拂巾鳳峙鷹揚信難議擬鳥跂星懸曾何髣髴蓮花未易玉屑不工緣邊之法庶遵細柳之陣徘徊之勢方希明月之樓子桓有錫聞於遂古季緒蒙賜即事可傳蓺文類聚七十四上穀充軍糧啟臣聞金城千仞必資守粟革車千乘其在饋實願武車綏旌列飛鴻之行陳奉辭受賑揜摰獸於貙虎賈逵渠水雖曰難蹤梁習勸農竊知自勉蓺文類聚八十五為江夏王安豐謝東宮賚錦啟舒將並石堪來暮雨縈持結纜剩可蕩舟秦川書字妙能八體鄴縣登高真堪九日宋姬贈馬未足為榮馮媛乘車方茲非寵藝文類聚八十五謝東宮賚辟邪子錦白褊等啟江波可濯豈藉成都之水登高為豔取映鳳皇之文至如鮮潔齊紈聲高趙縠色方藍浦光譬靈山試以照花含銀燭之狀將持比月亂含璧之暉蓺文類聚八十五謝東宮賚瓜啟金縈始薦瓊蕊載珍味奪蔗漿甘踰石蜜蓺文類聚八十七為妾弘夜姝謝東宮賚合心花釵啟未得投壺先應含笑不因鸞鳳自能歌舞夜姝昔往陽臺雖逢四照曾遊澧浦慣識九衢未有仍伐爵釵還勝翠羽飾以南金裝茲麗玉修靡夫人本分章華之裏中山孺子獨荷春宮之恩有志當熊無期投閣蓺文類聚八十八謝晉安王賜馬啟繹武媿仲都遂蒙大驪之錫儒謝春卿空頒名馬之賚故以取方驎友自匹龍媒不待景公婉如齊畫無勞馬援翻等漢銅豈有滅沒黑龍連翩白馬錢文見重津名取貴相彼騏驥猶深戀主矧伊伏櫪彌結懷恩蓺文類聚九十三謝東宮賚蒸栗牛啟色似祕府之書毛類陳王之玉騂角未奇瑩蹄非貴蓺文類聚九十四謝賚車螯蛤蜊啟車螯味高食部名陳物志蛤蜊聲重前論見珍若士並東海波臣西王母藥雀文始化燕羽猶在體潤珠胎形隨月減蓺文類聚九十七謝賜功德淨饌一頭啟瑤器自滿金鼎流味漿含都蔗味資石蜜北戶錄注又謝賚功德食一頭啟天廚淨饌菴羅法果北戶錄注謝敕送齊王瑞像還啟臣聞非晦非明法身凝寂有感有見渴仰赴幾伏惟陛下百姓為心宜觀種覺十方皆見普照王畿將使化行南國乃睠西顧江水安流大川利涉鮮雲靉靆暫掩晨離甘雨霏微猶藏宿霧高明可仰與天花而俱落清梵騰空雜塤篪以相韻頂禮最勝敬謁法王瞻彼堵牆不足為喻立處針鋒弗云易擬臣身持靜戒心抃法流接足道周膜拜路左得未曾有喜躍充遍蓺文類聚七十七
