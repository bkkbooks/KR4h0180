body:
  text: 王僧孺太常敬子任府君傳恥一物之不知惜寸陰之徒靡下帷閉戶投斧懸梁雖玄晏書淫文勝經溢康成之忽忘所往公叔之顛墜硎岸無以異也若夫天才卓爾動稱絕妙辭賦極其清深筆記尤盡典實若聞金石似注河海少孺速而未工長卿工而未速孟堅辭不逮理平子意不及文孔璋傷於健仲宣病於弱其有集論尚書窮文質之敏駐馬停信極亹亹之功莫尚於斯焉君職等曹張聲高左陸時乃高闢雪宮廣開雲殿秋窗春戶冬燠夏清九醞斯浮百羞竝薦雲銷月朗聿茲遊客朋來旅見辭人才子辯圃學林莫不含毫咀思爭高競敏乃整袂端襟翰飛紙落豪人貴仕先達後進莫不心服貌慚神氣將盡顧余不敏廁夫君子之末可稱冥契是為神交二三君子唯以從游日暮亭號昭仁庶子雲咫尺康成斯在借此嘉言將無絕乎千載藝文類聚四十九從子永寍令謙誄余之從子謙字幼光以昭陽紀歲蕤賓旅月啟足閩隅暄日泉岫是殲才子實喪俊民若其孝親睦友故非天墮地出異才絕學如有鬼告神授玉懷瑕而可指桂含蠹其取傷孰與九德彰於造次百行動為表徵吐論含亮宣赴鍾琯標心用己懸符矩彠惠響棲道清心可鏡和而靡屈𥳑而周爽邃若凝雲潔如止水無慚座右不愧屋漏蒼苔繞路素塵滿席蕭索庭戶靡事鮮明沈淪典籍將絕弔賀室如夏甫狀等安期所累清塵唯不能忘懷藝而已斯美宜久宜長而驥騄之步中行鸞鷟之翅未矯一歸寥廓長反虛無雖東隅再暝鉗丙之御無及北顧相望隸首之數不盡而恆化非常人所不免況風雲萬里閒此山川客思故鄉次房之念何極輕棺反蜀允南之思可知而魂兮眇眇扁舟靡靡生人之望已冥死歸之期又阻痛心傷目豈伊一事無以少寄辛傷故復誄之云爾昭昭洪冑映策光書違嬴避項從衛遷徐基忠踐孝抱約懷虛有顯而默匪屈伊舒如茲邴魏譬彼董疏入登高闕出啟精廬瞻星畫野望閫推車履仁不匱蹈道有餘九世盛矣七葉光諸往弼睿主來傅英儲峨峨三祖羅室並居前瞻紫闕傍望白渠高軒霞被四馬龍櫨溫溫司武皎皎祕書義高松竹價重璠璵元昆世父重規疊矩容與學丘徘徊詞府青紫已拾大夫斯取盛藩往相名畿來撫暉光不已驚生之子稷稷萬尋昂昂千里實鳳靡雜真龍非似均情蘧甯得意莊李室有虛白門無囂滓遺心沮勸忘懷慍喜貧靡斯攝富其無恥險而不峭方而能理德有潤身學斯為己逸羽難集孤峰易峙南邁瑤琨西踰杞梓人亦有言名為實使譽傾邦國價騫州里崇蘭自芳玨玉自光汪汪巨壑曖曖重牆靡造靡請不迎不將久而愈敬狎而愈莊即無矯資此有循常默非蓄短顯弗用長豈伊墜岸如彼懸梁唯學已聚待問則強偏在三篋兼下五行亦稅其巾于彼王吏如龍宮楚有斯內侍蘊此上才安茲下位儲扉始闢傅府初開爾其戾止辟彼昔才從斯𥳑帝仍此追陪何以自茲翰飛傍佐戎列來攝儒衣儒衣濟濟訪對斯歸是義罔惑唯禮無違悠悠越障決決閩海薄言銅墨蒲密斯在孰云識吏政均舊宰循猛是兼絃韋無怠補袍方服治情莫改增貲匪課歸民自倍十郡為則百城斯採化日未逢政稱異等斯痛斯傷喪善殲良妖同武擔疾甚清漳闔棺陋邑掩櫬蕪鄉嗚呼哀哉眇眇輕艫悠漫長塗風生閶闔日去崑吾空歸故國寍識舊都水鳴秋鶴岸集寒烏寒不夜哭惟獨呱呱茫茫大瑰杳杳玄虛嗚呼哀哉伊吾與爾大別唯名肥泉猶接瓜瓞未輕義雖子道思實友生歡憂共日險泰均情如菊有芬如蘭有薰別唯慕類居實有群盡日持論遙夜披文慚漬羲老祖述淵雲唯昏及旦自旭徂曛人道實難譬彼徂湍驅車崤嶝執手河干三川縈薄七嶺悠漫自茲不見心譬迴瀾歲佇會面日望音翰歡無一緒悲有萬端濛陰遽戢扶景易殘即斯大暮為此一棺山足難曉壟首易寒秋蟲相叫暮羽來摶宿草行沒宰樹方攢昭塗長已大夜斯安孰知冥默徒此汍瀾嗚呼哀哉文苑英華八百四十二豫州墓誌自姬發系因魏傳緒留路在趙名賢世襲相秦將漢英雄係踵忘寵辱無慍喜靡矜夸慎嗜欲其行軍用武勳合奇正乃治邊御眾威裕兼行常懍懍然以中原為己任或欲十萬而橫行乍思五千而深入剋反舊京飲馬函渭然後高臥閒帷晤言空谷思魯連之辭賞慕田疇之高躅而火傳川逝長塗已迫雖景鍾良史有功必書刻板鏤石宜兼不朽銘曰高勳藹藹長旌高斾入作爪牙出司襟帶民謠不息王言有會功為上等正稱九最日隆寵秩方登遠大羲轡難留濛水易收祕丘玄戶杳杳悠悠藝文類聚五十棲玄寺雲法師碑銘眇眇大家茫茫真樸多淪愛有莫辯塵濁猗歟息心言高理邈居之匪絢得之靡學刻情幾種厲想玄覺且說且定以披以握來遵北渚至依西岳西岳峨峨北渚迴波庭棲弱羽簷挂輕蘿甘麤衣惡棄厚安薄滅意囂湫寄心寥廓藝文類聚七十六中寺碑夫玉律追天故躔次之期不變緹室候景則發斂之氣罔踰是以忘言種覺絕累於後心寄像聲形啟機於前教兼真假之雙燭均空有而兩忘蘊三明而過十地圓萬行而包四等道周百億化起大千獎導群有滋濡萬類是用發廣大心吐微妙理將同商主取喻醫王開方便門示真實相固以濯之慈水銷以慧刀永言六趣用均一子中寺者晉太元五年會稽王司馬道子之所立也斜出旗亭事非湫隘傍超璧水望異狹斜天監十五年上座僧慈等更揆日締架赫然霞立信以填金可埒引繩斯擬寫妙金樓模麗瓊閣岧嶢偃蹇故三休而可至䆗窱周流方中宿而斯盡萬楹百拱合沓相持繡梲玉題分光爭映燭龍夭矯將舉復宛威鳳鏗鏘如鳴更戢旁攀鏤檻斜登鈿砌煜爚金鋪玲瓏綺欂無風自響不拂而淨耽耽肅肅信息心之勝地穆穆愔愔固忘想之嘉所銘曰玄黃雖弭權輿未測生滅相輪成壞不極篋虵爭赴藤鼠無息情塵莫捨心火方赫是用三明寔開五力湛寂無方示現多所踟躕吉樹殷勤禪渚斯道誰匡蒸哉我王施踰寶鉢供等檀床蕭宮改構梵宇方壯階飛瑞采地起泥香日流閃爍風度清鏘道踰厥極固與天長藝文類聚七十八武帝祭禹廟文惟帝稟圖上昊貽則下民五聲窮聽四乘兼往輕璧惜景既捨冠履愛人忘我不顧胼胝下車以泣事深罪己憑舟靡懼義存拯物盛業方來遺神如在愛被昆蟲理有好生之德事安菲素固無厚味之求是用黍稷非馨蘋蘩以薦克誠斯饗憑心可荅藝文類聚三十八禮佛唱導發願文夫至覺玄湛本絕聲言玅慮虛通固略筌象雖事絕百非而有來斯應理亡四句故無感不燭皇上道照機前思超繫表凝神汾水則心謝寰中屈道軒丘則形勞宇內斯乃法忍降迹示現閻浮之境大權住地俯應娑婆之域故欲洗拔萬有度脫群生濯淨水於寶池蔭高枝於道樹折伏攝受之仁遇緣而咸拯苦言軟語之德有感而斯唱日用不知利益莫限眾等相與增到奉逮至尊五體歸命敬禮云云仰願皇帝陛下至道與四時竝運玄風與八埏共廣反淳源於三古捨澆波於九代至治已覩於今日大道復屬於此時虎豹蹈而不驚虺蛇蹍而莫噬埋金抵玉毀契焚文嘉禾生醴泉出金車玉馬自相暉曜玄鶴丹鳳飛鳴來往光景之所照燭舟車之所驅汎莫不屈膝係頸迴首革音入侍槀街迎拜渭水與天地而長久等金石而逾固中岳可轉長河有清而我聖皇愈溫愈晬不言而化行無為而教肅夫道備監撫望表元良察遠知微貫宗勾極不勞斧藻無待審諭況復靜悟空有同觀真俗能行能說既信既持眾等齊誠奉逮儲君殿下歸命敬禮云云仰願皇太子殿下厚德體於蒼莽廣載侔於磻礡前星照曜東離煥炳淑聞自遠和氣熏天異才爭入端人竝至玉體怡清金聲妙越夫茂實英聲道周德廣秉珪襲袞之貴坐槐憩棠之尊猶應共惜東暾俱吝西崦悟蕉蘆之非實知鏡月之虛衒信秉電之不留驗畫水之隨合惟宜照之智炬灌以寶瀾增此睿根成斯妙植又各增到奉逮太尉等諸王殿下歸命敬禮云云仰願諸王既明且哲聲跨於河楚令聞令望道均於旦奭德貫右戚義藹周親作鉉則與二曜相終臨岳則與四維等固若彭涓之遐永譬松筠之貞悅夫天枝峻密帝葉英芬莫不玉震蘭搖金鏘桂縟覩寸文而驗錦觀一毛而測鳳竝能才高銅爵詞富雲臺彬彬亹亹超超灼灼以斯勝善奉逮諸王殿下歸命敬禮云云仰願諸王殿下穆穆與清風竝扇英英將白雲共朗永鍾清祉長享元吉出牧則聲高民上入朝則譽光物右德重山王智超海藏鏗鏘麗於珠樹皎鏡光於玉田夫道流雲幄德感椒闈必以前藉勝因宿稟嘉數況重霑法雨更披慧日雖異姜后解珥請罪於周王不待樊姬捨肉有激於荊后而遵恭儉去嗜欲𢬵彫璣撤靡麗了心不滯正見無疑眾等齊誠奉為六宮眷屬歸命敬禮云云願六宮眷屬業華姬日聲麗媯辰震彩鐫圖傳芳詩史位齊寶印行等月光具六神通得四無礙夫稟閒明之德懷深妙於心豈非修習有本故能依止無倦義興等諸公主忘斯華重甘此翹到竝宿世之所記別故現前所以信了影響至真寤寐玄極人各增到仰為諸公主歸命敬禮云云願諸公主日增智性彌長慧根四攝四依已遵已蹈七善七定靡退靡輟盛此王姬光茲帝女長享湯沐與河山而同固永服緹綺貫寒暑而無窮夫三相雷奔八苦電激或方火宅乍擬駃河故以尺波寸景大力所不能駐月御日車雄才莫之能遏其閒飲苦餐毒抱痛銜悲身口為十使所由意思乃八疵之主眾等相與彼我齊到懺悔業纏無始已來至於今日所為十惡自作教他見善不讚聞惡隨喜焚林涸澤走犬揚鷹窮鄭衛之響極甘旨之味戲笑為惡倏忽成非侮慢形像陵踐塔寺不敬方等毀離和合自定權衡棄他斗斛愧心負理昧主欺親雖七尺非他方寸在我而能性其情在人未易恣此心口眾罪所集各運丹懇五體自投歸命敬禮云云願現前眾等身口清淨行願具足消三障業朗三達智五眼六通得意自在釋藏肥九廣宏明集十五懺悔禮佛文夫有非自有有取所以有無非自無無著所以無故有取之惑興倏成萬累無著之念起一超九劫是知道之所貴空有兼忘行之所重真假雙照稟氣含靈莫聞斯本肖形賦影靡測由來故發茲識窟猶綿蒙其莫辨導此愚相尚窈冥而未悟茫茫有同暗海幽幽實在危城業風縈薄三有長騖惑水邅迴二死相屬以苦捨苦從暗入暗尋本不離色心即事莫非生滅是用抱此纏蓋輪迴生死恣其六愛興其八邪或狙詐而克昌乍仁義而溘死或才均智等此賤彼豪或共日竝時人升我墜唯言報施寂寥不知因對皎徹曩緣今果過現殖成有如符契不謬毫髮而欲以促生運其長術浮命迴其冥數當知剎那交謝瞬息不留東榑纔吐西崦已仄譬閱川之駛流若栖葉之輕露偽城易弛毒樹自攻若非假實兩明真俗俱辨豈能寫誠迴向刻意修習不退不沒愈堅愈固南平大王殿下含辰象之正氣畜海嶽之淳靈宿侍八恆早遊七覺藉妙因於永劫招勝果於茲地若真金之愈鎣美玉之載琢是用未積已散不藏而捨故今式招靈指仰屈神儀建此齊肅譬茲關楗盛來緇素濟濟洋洋名香遍室寶華覆地高梵宛轉寍止震木遏雲清桴遙奕非直騰魚御馬仰願四部至誠五體歸命東方云云願大王殿下五畏內遣十力外扶百福莊嚴萬祉周集愕夢無忤其慮甘寢有恬其神更闢寶衢愈興慧業夫玄極凝淡非學者所窺妙本難思豈行人能測是以十地云覩有羅縠之疑三乘稱見懷狂羊之惑自非鑒窮機覺照極冥虛窮理盡性體元含一安能濟世仁壽拯物阽危道包碧海聲高赤縣昔堯曜唯在即世舜黑不兼來果四巡疲於禹迹六事倦於湯身竝域中之勤勞方內之成益豈有度元元於苦海拔冗冗於畏途運神刀震法吼究香城之妙理窮金河之奧說慧高龍樹智出馬鳴必欲洗濯臣民獎導緇白天覆地養水產陸生咸降慈悲悉蒙平等奉為皇帝陛下儲君太子歸命敬禮云云仰願皇帝陛下景祚與七政相齊皇基與二曜均永地平天成樂和禮洽玉燭道正𣱦氳無爽條風祥雨膏潤相屬卻馬偃伯鑄戟銷戈南泊北臨西被東漸灑甘雨布慧雲唯繩可結在冠已盡唐哉皇哉為導為首又願皇太子殿下睿業清暉與貞明而竝燭粹範溫儀從嵩霍而俱峻聲出姬誦道越漢莊永沐智水長照慧日上妙居身至仁在己自雙樹八枝潛光匿曜寶城不闢慧扇方掩而聖后騖法輪於長路棹寶舟於遙壑道浹人祇福隆祧墠肅事園寢虔奉宗祏藉斯妙果奉逮七廟聖靈歸命敬禮云云仰願聖明累聖僾然如在騰神淨國總駕天宮託化金蕖遨遊寶殿夫誠心內惻則至覺如在形力外殫則法身咫步眾等相與增到為諸王兄弟妃主戚屬歸命敬禮云云願諸王殿下裂壤盛於諸姬磐石過於隆漢德高魯衛義重間平論道則百辟依風作翰則群黎仰化弘闡至教紹隆季像第內少長竝膺此多福若百華之春麗譬萬實之秋成信解堅深翹向無怠夫小乘志劣事唯一己大士意均乃包六趣今日檀主信等明珠無勞傍鏡質同珽玉不待外光常欲物我均心怨親等觀眾等各歸誠為二十八天四王釋梵人閒貧病地獄辛楚敬禮尊儀靈像菩提寶塔云云大乘奧藏妙法深經大身無邊身大力無量力四向四果八賢八聖願六氣𣱦氳四序熙穆至治光萬宇玄化洞九幽襲介披鱗溼生卵化八苦六窮三塗五道俱蒙惠利竝識遵依刀林輟刃劍樹摧鋒迷域開道直指四衢闇室生明大啟三曜俱向道場同登種覺釋藏肥九廣宏明集十五初夜文夫遠自無始至於有身生死輪騖塵轢莫之比明暗遞來薪火不能譬逝水非駛千月難保蓼蟲習苦桂蠹喜甘大睡劇於據梧長昏甚於枕麴義非他召事實己招曾不知稟此形骸所由而至將斯心識竟欲何歸唯以勢位相高爭驕華於一旦車徒自盛競馳騖於當年莫不恃其雄心壯齒紅顏緇髮口恣肥醲身安輕靡繁絃促柱極滔湮而不厭玉床象席窮靡曼而無已謂悲泉若木出沒曾不關人蹲烏顧兔升落常自在彼殊不知命均脆草身為苦器何異犬羊之趣屠肆麋鹿之入膳廚秋蛾拂燄而不疑春蠶縈絲而靡悟未辨先對不識因習及其一觸畏途孟門非險轘裂肢解方斯不臻其痛斷趾鑿肩比茲未極其苦輪迴起伏杳杳悠悠是以天中之天降悲提引壅夏河之長瀉撲秋原之猛燎或同商主乍等醫王形遍三千教傳百億或恣其神力或寂諸梵境言則三塗離苦笑則四生受樂乃應病投機解紛說理制之日夜稱為八關以八正鑰為法關楗斯實出世之妙津在家之雄行眾等相與運誠奉逮南平王殿下歸命敬禮云云仰願大王殿下睿業清暉與南嶽而相固貞心峻節等東溟而共廣萬累烟消百災霧滅巧幻所不惑彊魔莫能嬈逐慘舒而適體隨暄涼而得性自稟儀天之氣永固繕衛之道得六神通力具四無礙智夫日在昆吾則慮繁事擾景落濛氾則神靜志怡璧月珠星含華相照輕雲薄霧朗然自戢鳴鐘浮響光燈吐輝法幢卷舒拂高軒而徐薄名香郁馥出重檐而輕轉金表含映珠柱洞色況復天尊端嶷威光四照煥發青蓮容與珂雪覺祇衛之咫尺若林園之斯在大招離垢之賓廣集應真之侶清梵含吐一唱三嘆密義抑揚連環不輟南平王體得機之敏資入神之微抱德含和經仁緯義善無細而不窮累有輕而必捨受同虛籥照如懸鏡忘魯衛之尊高略柎萼之華重建希有之勝席臨難遇之法場相與五體歸命敬禮云云仰願大王殿下入不二門登一相道德階不動智超遠行洋溢惠聲與八風而共遠優游玉體等六律而相調餐雪山之良藥挹露城之甘味袞服瓛珪與四時而永久朱輪緹幟貫千祀而常然釋藏肥九廣宏明集十五荅釋法雲書難范縝神滅論辱告惠示敕旨荅臣下審神滅論甚哉理之大也斯寍寸管之所見言性之可聞而隨類儻遇怡然蒙釋奉戴周旋以次以誦法師德邁當今聲標萬古知十之談每會起予之富必酬想闡弘聖旨煥然雲消邪弟子學慚聚螢識非通見何能仰贊洪輝宣猷妙範者歟但論者執一惑之情循一往之轍固不可以語大方焉知致遠恐必泥哉夫幽明之理皎然不差固果相起義無獨立形滅自可以草木為籌神明常隨緣而在所以左氏有彭生豕見尚書則祖考來格禮云若樂九變人鬼可得禮矣結草之報豈其遂滅元規所夢何得無神神明不滅著之金石丘尼所說彌有多據若文雖五千詩乃三百得其理者自可一言而以蔽故不復煩求廣證夫三聖雖有明教百家常置弘理而尚使狂𥳑斐然成章攻乎屢作今皇明體照幽寂識周內外以前聖之久遠感異端之妄興霈然爰發乃垂眷翰使闡提一悟遂獲果通閻浮執惑豁然洗滯況復縉紳之士為益固其弘哉弟子餐道無紀法師許其一簣遂能班逮神藻使得預沐清風項戴懽舞無以自譬戢銘兼深彌其多矣弟子王僧恕頓首和南宏明集十郊壇從祀啟五祀位在北郊圜丘不宜重設故曰五行之氣天地俱有故皆從祀通典四十二梁武帝即位四年風伯雨師即箕畢也而今南郊祀箕畢復祭風伯雨師恐乖祀典同上
