body:
  text: 王僧孺賦體雜沓兮翠旌容與兮龍駕新桐兮始華乳雀兮初化思治兮終朝求人兮反夜竟大德之未詶何飛光之徒舍藝文類聚五十六至南海郡求士教是以文舉下車寤夢於根雉長孫入境明發於龍丘此境三閩奧壤百越舊都漢開吳別分星畫部風序泱泱衣簪斯盛其川岳所產豈直明珠大貝桂蠹翠羽而已哉孝實人經則有羅威唐頌學惟業本又聞陳元士燮至於高尚獨往相望於𡸷巖懷仁抱義繼蹤於前史藝文類聚五十三謝厤表竊以龍馭不爽靡見侵薄鳳職是司曾無昃朓璧聯珠燦輪映階平義實明時事惟均政固以先天候其餘始執杓驗其平分九瀛仰化萬㝢依朔藝文類聚五為韋雍州致仕表一旦攀附遂無涯限排雲矯漢飛捧待翼陸離蟬組照灼潘旗受脤推轂執珪奉酎變狹室於高門改小冠於侯服況復還周紐其六印歸齊列其五鼎常懼輪輕載積基薄墉高器覆卮傾人指鬼瞰老與年并疾隨衰及途遙齒截漏迫鐘鳴高舂之景一斜不周之風忽至菌蟪夕陰倏駛無幾堇蕣朝采飄零已及仰朱闕而掩涕向濛谷而自悲豈復式瞻拱默仰接鐘鼓儻帷蓋未親東岳稍駐擊壤鼓腹其賜猶多藝文類聚十八為臨川王讓太尉表臣聞一疋以長望千里而成累空輸易騁觸三尺而不登苟曰違方難用適遠安車駟馬望高闕而朝至繡服緹麾轥康衢而暮返行瞻畫虎居對蒼龍陛下海涵春育日鏡雲伸追大道之無私惜微臣之宜極藝文類聚四十六為南平王讓儀同表臣聞石瓠難剖用謝缾罍瘣木云疵事乖丹雘逢聖徼天一朝賞至非能聲均河楚譽埒梁陳故以神夢紫霄心飛丹掖品同儀比媿鉉莫殊藝文類聚四十七吏部郎表臣生輕飛籜品細疏壤寂寞州閭取淪窐竇不自求於善管寍許人以能官從班隨牒自安疏遠豈望翰飛終知跡滯一逢浸漉幾聞昭晉假拙為心變奇成偶寍為天覆地長復與雨露相滋秋成春發必如暄寒無爽自變泥塗多超嵩鄧屢考固其比越在累誠於可聞方愧朱紫永懵鈞衡固惟許李終非王畢取其清尚同所經企求之碎密寍可庶幾藝文類聚四十八為南平王妃拜改封表拜妾為南平王妃奉命震慚有灼丹寸妾瞻絲望帨且或多慚鏡史觀圖是焉知愧以茲眇薄有儷蕃儀紃組不聞饘酏蓋闕不悟玄造曲被徽渥愈臻改服遞名事華品貴恩深外邸榮照下庭豈期輶弱所能勝荷藝文類聚五十一奉辭南康王府牋下官不能避溺山隅而正冠李下既貽疵辱方致徽繩解籙收簪且歸初服竊以董生偉器止相驕王賈子上才爰傅卑主下官生年有值謬仰清塵假翼西雍竊步東閤多慚袨服取亂長裾高榻相望直居坐右長階如畫獨在僚端借其從容之詞假以寬和之色恩禮遠過申白榮望多廁應徐厚德難逢小人易說方謂離腸隕首不足以報一言露膽披誠何能以酬屢顧寍謂罻羅裁舉微禽先落閶闔始吹細草仍墜一辭九畹方去五雲縱天網是漏聖恩可恃亦復孰寄心骸何施眉目方當橫潭亂海就魚鼈而為群披榛捫樹從虺虵而相伍豈復仰聽金聲式瞻玉色顧步高軒悲如霰委踟躕下席淚若綆縻梁書王僧孺傳為蕭監利求入學啟竊以矯首伺飛不如修弋踠足念遠莫若驅鑣故樸斲成於丹雘篠簜資於栝羽敢因莩末有志庠均為山資於一簣學海漸其微流藝文類聚三十八除吏部郎啟自一遇休明多逢渥澤出斯溝壤置之霄漢清塗華轍叨廁累仍顯職名階俄來倏至而智效必其無取尤怠忽焉已彰不意涵養更滋霶霈愈此始職樞華紛體恆選知非腆族必待俊民何言賤劣所或叨假循涯測限生所不勝瞻恩奉德死何能報藝文類聚四十八謝齊竟陵王使撰眾書啟伏惟陛下銅爵始成早摛從后之句柏梁初構首屬驂駕之辭楚史所受曾不云述沛獻斯陳良未足採徒以願託後車以望西園之客攝齊下坐有糅南皮之遊謬服同於魯儒竊吹等乎齊樂藝文類聚五十五謝賜于陀利所獻檳榔啟竊以文軌一覃充仞斯及入侍請朔航海梯山獻琛奉貢充庖盈府故其取題左賦多述瑜書萍實非甘荔葩慚美藝文類聚八十七荅釋法雲書難范縝神滅論辱告惠示并主上所荅群臣仰諮神滅論伏覽尋環載深鑽奉發蒙啟蔽朗若披雲竊以事蘊難形非聖莫闡理寂區位在愚成惑若非神超繫表思越機前豈能燭此微言若開金石洞茲玅境曾靡榛蹊喻之以必薦示之以如在使夫持論者不終泥於遙轍專謬者無永沈於惑海預奉淵謨孰不懽肅裁此酬白不申擊舞王僧孺呈宏明集十與何炯書近別之後將隔暄寒思子為勞未能忘弭昔李叟入秦梁生適越猶懷悵恨且或吟謠況岐路之日將離嚴網辭無可憐罪有不測蓋畫地刻木昔人所惡叢棘既累於何可聞所以握手戀戀離別珍重弟愛同鄒季淫淫承睫吾猶復抗手分背羞學婦人素鍾肇節金飆戒序起居無恙動靜履宜子雲筆札元瑜書記信用既然可樂為甚且使目明能祛首疾甚善甚善吾無昔人之才而有其病癲眩屢動消渴頻增委化任期故不復呼醫飲藥但恨一旦離大辱蹈明科去皎皎而非自汙抱鬱結而無誰告丁年蓄積與此銷亡徒竊高價厚名橫叨公器人爵智能無所報筋力未之酬所以悲至撫膺泣盡而繼之以血顧惟不肖文質無所底蓋困於衣食迫於飢寒依隱易農所志不過鍾庾久為尺板斗食之吏以從皁衣黑綬之役非有奇才絕學雄略高謨吐一言可以匡俗振民動一議可以固邦興國全璧歸趙飛矢救燕偃息藩魏甘臥安郢腦日逐髓月支擁十萬而橫行提五千而深入將能執圭裂壤功勒景鍾錦繡為衣朱丹被轂斯大丈夫之志非吾曹之所能及已直以章句小才蟲篆末藝含吐緗縹之上翩躚罇俎之側委曲同之鍼縷繁碎譬之米鹽孰致顯榮何能至到加性疏澀拙於進取未嘗去來許史遨遊梁竇俛首脅肩先意承旨是以三葉靡遘不與運并十年未徙孰非能薄及除舊布新清晷方旦抱樂銜圖訟謳有主而猶限一吏於岑石隔千里於泉亭不得奉板中涓預衣裳之會提戈後勁廁龍豹之謀及其投劾歸來恩均舊隸升文石登玉陛一見而降顏色再覩而接話言非藉左右之容無勞群公之助又非同席共研之夙逢笥餌卮酒之早識一旦陪武帳仰文陛備聃佚之柱下充嚴朱之席上入班九棘出專千里據操撮之雄官參人倫之顯職雖古之爵人不次取士無名未有躡景追風奔驟之若此者也蓋基薄牆高塗遙力躓傾蹶必然顛匐可俟竟以福過災生人指鬼瞰將均宥器有驗傾卮是以不能早從曲影遂乃取疑邪徑故司隸懍懍思得應弦譬縣廚之獸如離繳之鳥將充庖鼎以餌鷹鸇雖事異鑽皮文非刺骨猶復因茲舌杪成此筆端上可以投畀北方次可以論輸左校變為丹赭充彼舂薪幸聖主留善貸之德紆好生之施解網祝禽下車泣罪愍茲奊詬憐其觳觫加肉朽胔布葉枯株輟薪止火得不銷爛所謂還魂斗極追氣泰山止復除名為民幅巾家巷此五十年之後人君之賜焉木石感陰陽犬馬識厚薄員首方足孰不戴天而竊自有悲者蓋士無賢不肖在朝見嫉女無美惡入宮見妒家貧無苞苴可以事朋類惡其鄉原恥彼戚施何以從人何以徇物外無奔走之友內乏強近之親是以構市之徒隨相媒櫱及一朝捐棄以快怨者之心吁可悲矣蓋先貴後賤古富今貧季倫所以發此哀音雍門所以和其悲曲又迫以嚴秋殺氣萬物多悲長夜展轉百憂俱至況復霜銷草色風搖樹影寒蟲夕叫合輕重而同悲秋葉晚傷離黃紫而俱墜蜘蛛絡幕熠燿爭飛故無車轍馬聲何聞鳴雞吠犬俛眉事妻子舉手謝賓遊方與飛走為鄰永用蓬蒿自沒愾其長息忽不覺生之為重素無一廛之田而有數口之累豈曰匏而不食方當長為傭保糊口寄身溘死溝渠以實螻蟻悲夫豈復得與二三士友抗首接膝履足差肩摛綺縠之清文談希夷之道德唯吳馮之遇夏馥范式之值孔嵩愍其留賃憐此行乞耳儻不以垢累時存寸札則雖先犬馬猶松喬焉去矣何生高樹芳烈裁書代面筆淚俱下梁書王僧孺傳僧孺免官久之不調交人廬江何炯猶為王府記室乃致書於炯以見其意藝文類聚二十六作何遜荅江琰書猥惠嘉音用蠲疾首發函伸紙朗若披雲等嶰谷之清音比洞庭之高曲辭則美矣而擬其非倫譬享海鳥以醇醪嘉膳棲林狖以崇楹曾拱苟非其實立有驚怖況復以一離訴棄賓實漼然豈復能使一笥可輕八廚斯引且登清漢乍棄黃汙望影析支爭塗再楫其或蹲林臥石籍卉班荊不過田畯野老漁父樵客酌醴焚枯嗚嗚相勞羹藜含糗果然滿腹寍有幡旗貴客車馬大賓獻書盡先賢之德作頌罄前皇之美豈不俯拾青紫坐享大夫況復詠高梧而賦修竹背清淮而遊長苑留東閣以從容登石室而高視豈與夫身沒名隕同年而共毀譽哉藝文類聚二十六與陳居士書雲波遙敻燕越數千行雲鬱術征禽難使用隔巾車未能搦札引領南望悵矣心飛幸因劣薄懷章貴壤依然谷口覺子真之咫尺靜睇巖灘信子陵之非遠麓林以入虛白之室用披蓬蒿之徑稟紛綸之高諭承希微之妙旨虛往實歸用祛塵惑藝文類聚三十七論任昉過於董生揚子昉樂人之樂憂人之憂虛往實歸忘貧去吝行可以厲風俗義可以厚人倫能使貪夫不取懦夫有立南史五十九任昉傳臨海伏府君集序袁粲領袖一時儀形物右聲逾裴樂譽出王劉士有懷道蘊義望塵而趨者或三年而未識乍四旬而一見與君道合神遇投分披衿敷文研理匪晨伊暮至於神經怪諜綠笥丹筒金版玉箱錦文緹帙並藏諸靈府祕於瑤臺而君莫不徧探冥賾具閱局檢常以前賢往學亟與聖違賈馬盧鄭非無紕越荀郭何王彌多踳謬二義可辨未值高卿之疑九事非難不逢五叔之問其詩賦銘誄所作尤多藝文類聚五十五詹事徐府君集序君稟靈川岳懸精辰象早照珪璋夙表岐嶷孝睦天稟友愛冥深故以事顯家庭聲著同族年十八見召為國子生曳裾持卷寔華庠璧有均閉戶靡因餘竈每攝齊函丈左右屬目蓄以鄰幾之性加以入神之資聞一知二師逸功倍遊魏闕而不殊江海入朝廷而靡異山林未嘗投刺權門驅車戚里遨遊梁董去來賈郭時春秋猶少人爵未崇而清風嘉譽震灼朝野非直俯致貴仕故可坐享通侯而緤馬懸車閉門高枕聊為詭遇識此行藏及皇運聿興重氛載廓君藏器待時合猶符契陵扶搖而高騖排閶闔而容與故位隨德顯任與事隆重以姿儀端潤趨眄淹華寶佩鳴風豊貂映日從容帷扆綽有餘輝自綢繆軒陛十有餘載溫樹靡荅露事不詶省中之言無漏席下之迹不疑故以主聖臣賢應同廛璽以石投水如鱗縱壑行稱表綴言成模楷猶復忘彼豐愉安茲素薄衣同屢補食等三杯車服不事鮮明室宇畏其彫奐九德無遺百行備舉至於專心六典精賾必深汎遊群籍菁華無棄搦札含毫必弘靡麗摛綺縠之思鬱風霞之情質不傷文麗而有體藝文類聚五十五慧印三昧及濟方等學二經序讚夫六書相因懸日月而無改二字一吐更天地而靡渝雖書不盡言言非書不闡言不盡意意非言不稱是以締聽善思承茲利喜俯首屈足恭此受持若讀若誦已說今說一音一偈莫匪舟梁一讚一稱動成輪軌況夫五力方圓四攝無怠開方便門示真實相流方等之妙說得菩提之至因沐此寶池照茲法炬香雲靡靡慧露傍流出伽邪之妙城發娑羅之寶樹建安殿下含章基性育德成體惠聲溢於秋水美義光於冬日事高祖丘兔圃名出前意後蒼損己利人忘我濟物傍通兼善無礙無私若空谷之必應如洪鐘之虛受匡法弘道以善為樂重以植顯因於永劫襲妙果於茲生託意紹隆用心依止妙達空有深辯權實而玉體不安有虧涼暑行仁莫顯楚君日見其瘳施德靡言漢相方饗其樂桂葉龜腦固風寒之易銷荔葩鸞骨更騰飛之可孱況復慧身方漸善根宿樹無勞湔腸澣胃不待望色察聲有廣州南海郡民何規以歲次協洽月旅黃鐘天監之十四年十月二十三日采藥於豫章胡翼山幸非放子逐臣乃類尋仙招隱登峰十所里屑若有來將循曲陌先限清㵎或如止水乍有潔流方從揭厲且就褰攬未濟之閒忽不自覺見澗之西隅有一長者語規勿渡規於時即留其人面色正青徒跣捨屨年可八九十面已皺斂鬚長五六寸髭半於鬚耳過於眉眉皆下被眉之長毛長二三寸隨風相靡脣色甚赤語響而清毛爪正黃指毛亦長二三寸著赭布帔下有赭布泥洹僧手捉書一卷遙投與規規則奉持望禮三拜語規可以此經與建安王兼言王之姓字此經若至宜作三七日宿齋若不曉齋法可問下林寺副公副法師者戒苦精苦恬憺無為遺嗜欲等豪賤蔬藿自充禪寂無怠此長者言畢便去行十餘步間忽不覩規開卷敬視名為慧行三昧經經旨以至極法身無相為體理出百非義踰名相寂同法相妙等真如言其慧冥此理有若恆印心照凝寂故以三昧為名後又有濟諸方等學經此下又題云天竺薩和鞞日僧迦與海虎王經旨以流通至教軌法有體所以誡示大士化物方法言若濟諸蒼氓宜弘方等之教方等者大乘之通名究竟之弘旨其軸題云燉煌菩薩沙門支法護所出竺法首筆受共為一卷寫以流通軸用淳漆書甚緊潔點製可觀究尋義趣或微或顯稱在羅閱山著陀鄰尼行無來無去非住非止斯蓋鷲嶽鶴林之別記寶殿孤園之後述不殊玉檢靡異寶函理出希微辭深鉤致是唯正說曾匪異端雖王遵之得四十二章安清之出百六十品無以惑異大王沐浴持奉擎跪鑽習多寫廣述闡揚玄旨孰匪醫王即斯藥樹不待眼瞬無勞苦口捨茲六術屏此十巫昔或授編書於圯上受揣術於谷裏乍有寓言且或假夢未有因應炳發若此其至焉受命下才式旍上道敢因滓賤率此顓蒙其辭曰雷音震響錄簡青編匪言曷教非迹靡傳是資妙象實寄幽筌照之慧燭濟以寶船懇哉至矣在應斯圓覆其靉靆浸此熙漣救焚援溺去蓋銷纏灼灼應韓英英河楚松孤桂鬱鸞棲鵬舉照野光朝潤山枯渚濫源茲永覆簣已多鬱為藩榦擢此天柯寄誠梵表託好禪河接足能仁心直妙覺用遺滯染是祛塵濁靡向非真何背非俗一忘受想將捐味觸無德不詶有感必召吐彼神訣示我玄要既蠲既已留華及少等此北恆均之東耀釋藏跡七
