body:
  text: 吳均八公山賦峻極之山蓄聖表仙南參差而望越北邐迤而懷燕爾其盤桓基固含陽藏霧絕壁嶮巇層巖迴互桂皎月而常團雲望空而自布袖以華閬帶以潛淮文星亂石藻日流階若夫神基巨鎮而卓犖荊河箕風畢雨育嶺生峨高岑直兮蔽景修坂出兮架天似迎雲而就日若從漢而迴山露泫葉而原淨花照磯而岫鮮促嶂萬尋平崖億絕上被紫而煙生傍帶花而來雪維英王兮好仙會八公兮小山駕飛龍兮翩翩高馳翔兮沖天藝文類聚七吳城賦古樹荒煙幾百千年云是吳王所築越王所遷東有鑄劍殘水西有舞鶴故廛縈具區之廣澤帶姑蘇之遠山僕本蓄怨千悲億恨況復荊棘蕭森叢蘿彌蔓亭梧百尺皆歷地而生枝階筠萬丈或至杪而無葉不見春荷夏槿唯聞秋蟬冬蝶木魅晨走山鬼夜驚不知九州四海乃復有此吳城藝文類聚六十三初學記二十四筆格賦幽山之桂樹恆縈風而抱霧葉委鬱而陸離根縱橫而盤互爾其負霜含液枝翠心赤翦其匡條為此筆格下趺則岩岩方爽似華山之孤生上管則員員峻逸若九疑之爭出長對坐而銜煙永臨窗而儲筆藝文類聚五十八碎珠賦寶月生焉越浦隋川標魏之美擅楚之賢既登席而趨麗亦綴履而升妍豈銜恩以赴時獨佩皎而騰天瀛淮激電甘海震雷明珠碎矣于川之隈視員流而失轉見折水之亡迴謝驪宮之瑞飾粉靈蚌之神胎若有人兮聲芒昧芳徽斷兮明珠碎明珠碎兮愴何宣珠之形兮不復全撫陸離之瓊佩弔幽翳之金筵豈照車與璿燭但黃塵及寒煙聊歌曰玉山之津兮已濡幽蘭之草兮亦舒又聞珩璧之獨照不見掌上之明珠已矣哉若使青雲之可尚當與碎珠而同棲初學記二十七又略見藝文類聚八十四橘賦增枝之木既稱英於綠地金衣之果亦委體於玉盤見雲夢之千樹笑江陵之十蘭葉葉之雲共琉璃而並碧枝枝之日與金輪而共丹若乃秋夜初露長郊欲素風齎寒而北來雁銜霜而南渡方散藻於年深遂凝貞於冬暮藝文類聚八十六揚州建安王讓加司徒表臣聞玄黃之馬事絕於銜鑣蟠朽之材飾乖於丹漆何則千里之志已窮萬乘之器無取遠物近身於焉在譬藝文類聚四十七與施從事書故鄣縣東三十五里有青山絕壁干天孤峰入漢綠嶂百重青川萬轉歸飛之鳥千翼競來企水之猨百臂相接秋露為霜春蘿被逕風雨如晦雞鳴不已信足蕩累頤物悟衷散賞藝文類聚七與朱元思書風煙俱淨天山共色從流飄蕩任意東西自富陽至桐廬一百許里奇山異水天下獨絕水皆漂碧千丈見底游魚細石直視無礙急喘甚箭猛浪若奔夾峰高山皆生寒樹負勢競上互相軒邈爭高直指千百成峰泉水激石泠泠作響好鳥相鳴嚶嚶成韻蟬則千轉不窮猨則百叫無絕鳶飛戾天者望峰息心經綸世務者窺谷忘反橫柯上蔽在晝猶昏疏條交映有時見日藝文類聚七與顧章書僕去月謝病還覓薜蘿梅溪之西有石門山者森壁爭霞孤峰限日幽岫含雲深溪蓄翠蟬吟鶴唳水響猿啼英英相雜綿綿成韻既素重幽居遂葺宇其上幸富菊華偏饒竹實山谷所資於斯已辦仁智所樂豈徒語哉藝文類聚八檄江神責周穆王璧昔穆王南巡自郢徂閩遺我文璧僉曰此津貫緯百紀荐歷千春念茲文璧故問水濱江漢勖之自求多益反我名瑞躍此華璧則富有漢川世為江伯如有負穢心迷懷釁情戚藏玉泥中匿珪魚腹使公孫躡波而長呼子羽濟川而怒目佽飛舞劍而東臨菑丘躍馬而南逐打素蛤而為粉碎紫貝其如粥又有川人勇俊處乎閩濮水居百里泥行萬宿右睨而河傾左咤而海覆乃把昆吾之銅純鉤之鐵被魚鱗之衣赴螺蚌之穴引澍東隅移燋北島使蓬萊之根鬱而生塵瀛洲之足淨而可掃按驪龍取其頷下之珠搦鯨魚拔其眼中之寶皇恩所被繁枯潤涸威之所加窮河絕漠願子三思反此明玉藝文類聚八十四食移月光離畢風氣入箕細雨如網細柳如絲離隔東西之怨眺望山川之阻企龍門而不見覽桂枝而延佇此乃方寸之恆情羌難得而覼縷也亦有鮑叔分財華歆讓位乃相知於平生實忘懷於寤寐雞有呼群之德鹿有食草之美在微物其尚然況仁義之君子哉今足下居則廣廈高堂連闥洞房綺窗半卷屏風角張指天地如一指安知故人之可傷一死一生乃知交情一貴一賤交情乃見謂古昔之恆談在今日而方見嗚呼如何忘我實多輒欲彈琴縱酒於首陽之阿君有廚中腐肉而僕不厭糟糠君有雁鶩之食而余不得一嘗願以小人之腹為君子之腸何如哉今欲君之餘江皋綠葹之筍洞庭紫鬣之魚昆山龍胎之脯玄圃鳳足之葅千里蓴羹萬丈名膾氣馨若蘭色美如艾扶南甘蔗一丈三節白日炙便銷清風吹即折安定之梨皮薄味厚一歲三花一枚二升凡厥上味惟君能施君若不施成君深累於神為不祥於人為愆義藝文類聚七十二餅說宋公至長安得姚泓時故太官丞程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲靜燮燮曉風淒淒夜冷臣當此景唯能說餅公曰善季乃稱曰安定噎鳩之麥洛陽董德之磨河東長若之蔥隴西舐背之犢枹罕赤髓之羊張掖北門之鼓然以銀屑煎以金銚洞庭負霜之橘仇池連蒂之椒調以濟北之鹽剉以新豐之雞細如華山之玉屑白如梁甫之銀泥既聞香而口悶亦見色而心迷公曰善藝文類聚七十二御覽八百六十連珠蓋聞豔麗居身而以娥媚入妬貞華炤物而以絕等見猜是以班姬辭寵非無妖冶之色揚子守玄豈乏炫曜之才藝文類聚五十七文苑英華七百七十一蓋聞義夫投節未必識君烈士赴危非期要利是以墨子縈帶不蒙肉食之謀申胥泣血非有執珪之位同上文心雕龍序夫文心者言為文之用心也昔涓子琴心王孫巧心心哉美矣夫故用之焉古來文章以雕縟成體豈取騶奭群言雕龍也夫宇宙緜邈黎獻紛雜拔萃出類智術而已歲月飄忽惟靈不居騰聲飛實制作而已夫肖貌天地稟性五才擬耳目於日月方聲氣乎風雷其超出萬物亦已靈矣形甚草木之脆名踰金石之堅是以君子處世樹德建言豈好辯哉不得已也予齒在踰立嘗夜夢執丹漆之禮器隨仲尼而南行旦而寤迺怡然而喜曰大哉聖人之難見也迺小子之垂夢歟自生人以來未有如夫子者也敷讚聖旨莫若注經而馬鄭諸儒弘之已精就有深解未足立家唯文章之用實經典枝條五禮資之以成六典因之致用君臣所以炳煥軍國所以昭明詳其本源莫非經典而去聖久遠文體解散辭人愛奇言貴浮詭飾羽尚畫文繡鞶帨離本彌甚將遂訛濫蓋周書論辭貴乎體要尼父陳訓惡乎異端辭訓之異宜體於要於是搦筆和墨乃始論文詳觀近代之論文者多矣至如魏文述典陳思序書應瑒文論陸機文賦仲洽流別弘範翰林各照隅隙鮮觀衢路或臧否當時之才或銓品前修之文或汛舉雅俗之旨或撮題篇章之意魏典密而不周陳書辯而無當應論華而疏略陸賦巧而碎亂流別精而少功翰林淺而寡要又君山公幹之徒吉甫士龍之輩汛議文意往往閒出並未能振葉以尋根觀瀾而索源不述先哲之誥無益後生之慮蓋文心之作也本乎道師乎聖體乎經酌乎緯變乎騷文之樞紐亦云極矣若乃論文敘筆則囿別區分原始以表末釋名以章義選文以定篇敷理以舉統上篇以上綱領明矣至於割情析表籠圈條貫摛神性圖風勢苞會通閱聲字崇贊於時序襃貶於才略怊悵於知音耿介於程器長懷序志以馭群篇下篇以下毛目顯矣位理定名彰乎大易之數其為文用四十九篇而已夫銓敘一文為易彌綸群言為難雖復輕采毛髮深極骨髓或有曲意密源似近而遠辭所不載亦不勝數矣及其品評成文有同乎舊談者非雷同也勢自不可異也有異乎前論者非苟異也理自不可同也同之與異不屑古今擘肌分理唯務折衷案轡文雅之場而環絡藻繪之府亦幾乎備矣但言不盡意聖人所難識在缾管何能矩矱茫茫往代既洗予聞眇眇來世儻塵彼觀梁書劉勰傳又略見南史七十二御覽六百一滅惑論或造三破論者義證庸近辭體鄙拙雖至理定於深識而流言惑於淺情委巷陋說誠不足辨又恐野聽將謂信然聊擇其可採略標雅致三破論云道家之教妙在精思得一而無死入聖佛家之化妙在三昧神通無生可冀詺死為泥洹未見學死而不得死者也滅惑論曰二教真偽煥然易辨夫佛法練神道教練形形氣必終礙於一垣之裏神識無窮再撫六合之外明者資於無窮教以勝慧闇者戀其必終誑以仙術極於餌藥慧業始於觀禪禪練真識故精妙而泥洹可冀藥駐偽器故精思而翻騰無期若迺棄妙寶藏遺智養身據理尋之其偽可知假使形翻無際神暗鳶飛戾天寍免為鳥夫泥洹妙果道惟常住學死之談豈析理哉二破論云若言太子是教主主不落髮而使人髡頭主不棄妻而使人斷種實可笑哉明知佛教是滅惡之術也伏聞君子之德身體髮膚受之父母不敢毀傷孝之始也滅惑論曰太子棄妻落髮事顯於經而反白為黑不亦罔乎夫佛家之孝所苞蓋遠理由乎心無繫於髮若愛髮棄心何取於孝昔泰伯虞仲斷髮文身夫子兩稱至德中權以俗內之賢宜修世禮斷髮讓國聖哲美談況般若之教業勝中權菩提之果理妙克讓者哉理妙克讓故捨髮取道業勝中權故棄迹求心準以兩賢無闕於孝鑒以聖境夫何怪乎第一破曰入國而破國者誑言說偽興造無費苦剋百姓使國空民窮不助國生人滅損況人不蠶而衣不田而食國滅人絕由此為失日用捐廢無纖毫之益五災之害不復過此滅惑論曰大乘圓極窮理盡妙故明二諦以遣有辨三空以標無四等弘其勝心六度振其苦業誑言之訕豈傷日月夫塔寺之興闡揚靈教功立一時而道被千載昔禹會諸侯玉帛萬國至於戰伐存者七君更始政阜民戶殷盛赤眉兵亂千里無煙國滅人絕寍此之由京索之時石穀十萬景武之世積粟紅腐非秦末多沙門而漢初無佛法也驗古準今何損於政第二破曰入家而破家使父子殊事兄弟異法遺棄二親孝道頓絕憂娛各異歌哭不同骨血生讎服屬永棄悖化犯順無昊天之報五逆不孝不復過此滅惑論曰夫孝理至極道俗同貫雖內外迹殊而神用一揆若命綴俗因本修教於儒禮運稟道果固弘孝於梵業是以諮親出家法華明其義聽而後學維摩標其例豈忘本哉有由然也彼皆照悟神理而鑑燭人世過駟馬於格言逝川傷於上哲故知瞬息盡養無濟幽靈學道拔親則冥苦永滅審妙感之無差辨勝果之可必所以輕重相摧去彼取此若乃服制所施事由追遠禮雖因心抑亦沿世昔三皇至治堯舜所慕死則衣之以薪葬之中野封樹弗修苴斬無紀豈可謂三皇教民棄於孝乎爰及五帝服制煥然未聞堯舜執禮追責三皇三皇無責何獨疑佛佛之無服理由拔苦三皇廢喪事沿淳樸淳樸不疑而拔苦見尤所謂朝三暮四而喜怒交設者也明知聖人之教觸感圓通三皇以淳樸無服五帝以沿情制喪釋迦拔苦故棄俗反真檢迹異略而玄化同歸第三破曰入身而破身人生之體一有毀傷之疾二有髡頭之苦三有不孝之逆四有絕種之罪五有亡體從誡惟學不孝何故言哉誡令不跪父母便競從之兒先作沙彌其母後作阿尼則跪其兒不禮之教中國絕之何可得從滅惑論曰夫棲形稟識理定前業入道居俗事繫因果是以釋迦出世化洽天人御國統家並證道跡未聞世界普同出家良由緣感不二故名教有二縉紳沙門所以殊也但始拔塵域理由戒定妻者受累髮者形飾受累傷神形飾乖道所以澄神滅愛修道棄飾理出常均教必翻俗若乃不跪父母道尊故也父母禮之尊道故也禮新冠見母其母拜之喜其備德故屈尊禮卑也介冑之士見君不拜重其秉武故尊不加也緇弁輕冠本無神道介冑凶器非有至德然事應加恭則以母拜子勢宜停敬則臣不跪君禮典世教周孔所制論其變通不由一軌況佛道之尊標出三界神教妙本群玫玄宗以此加人實尊冠冑冠冑及禮古今不疑佛道加敬將欲何怪三破論云佛舊經本云浮屠羅什改為佛徒知其源惡故也所以詺為浮屠胡人凶惡故老子云化其始不欲傷其形故髡其頭名為浮屠況屠割也至僧禕後改為佛圖本舊經云喪門喪門由死滅之門云其法無生之教名曰喪門至羅什又改為桑門僧禕改為沙門沙門由沙汰之法不足可稱滅惑論曰漢明之世佛經始過故漢譯言音字未正浮音似佛桑音似沙聲之誤也以屠為圖字之誤也羅什語通華戎識兼音義改正三豕固其宜矣五經世典學不因譯而馬鄭注說音字互改是以昭穆不祀謬師資於周頌允塞宴安乖聖德於堯典至教之深寍在兩字得意忘言莊周所領以文害志孟軻所譏不原大理惟字是求宋人申束豈復過此三破論曰有此三破之法不施中國本正西域何言之哉胡人無義剛強無禮不異禽獸不信虛無老子入關故作形像之教化之又云胡人粗獷欲斷其惡種故令男不娶妻女不嫁夫一國伏法自然滅盡滅惑論曰栠樹晦跡形像代興固已理精無始而道被無窮者矣案李叟出關運當周季世閉賢隱故往而忘歸接輿避世猶滅其迹況適外域孰見其蹤於是姦猾祭酒造化胡之經理拙辭鄙厮隸所傳尋西胡怯弱北狄凶熾若老子滅惡棄德用刑何愛凶狄而反滅弱胡遂令玁狁橫行毒流萬世豺狼當道而狐狸是誅淪湑為酷覆載無聞商鞅之法未至此虐伯陽之道豈其然哉且未服則設像無施信順則孥戮可息既佛教矣方加極刑一言失道眾偽可見東野之語其如理何三破論曰蓋聞三皇五帝三王之徒何以學道並感應而未聞佛教為是九皇忽之為是佛教未出若是佛教未出則為邪偽不復云云滅惑論曰神化變通教體匪一靈應感會隱現無際若緣在妙化則菩薩弘其道化在粗緣則聖帝演其德夫聖帝菩薩隨感現應殊教合契未始非佛固知三皇以來感滅而名隱漢明之教緣應而像現矣若乃三皇德化五帝仁教此之謂道似非太上羲農敷治未聞奏章堯舜緝政寍肯書符湯武抒暴豈當餌丹五經典籍不齒天師而求授聖帝豈不悲哉三破論曰道以氣為宗名為得一尋中原人士莫不奉道今中國有奉佛者必是羌胡之種若言非邪何以奉佛滅惑論曰至道宗極理歸乎一妙法真境本固無二佛之至也則空玄無形而萬象並應寂滅無心而玄智彌照幽數潛會莫見其極冥功日用靡識其然但言萬象既生假名遂立梵言菩提漢語曰道其顯跡也則金容以表聖應俗則王宮以現生拔愚以四禪為始進慧以十地為階總龍鬼而均誘涵蠢動而等慈權教無方不以道俗乖應妙化無外豈以華戎阻情是以一音演法殊譯共解一乘敷教異經同歸經典由權故孔釋教殊而道契解同由妙故梵漢語隔而化通但感有精粗故教分道俗地有東西故國限內外其彌綸神化陶鑄群生無異也故能拯拔六趣總攝大千道惟至極法惟最尊然至道雖一岐路生迷九十六種俱號為道聽名則邪正莫辨驗法則真偽自分案道家立法厥品有三上標老子次述神仙下襲張陵太上為宗尋柱史嘉遯實為大賢著書論道貴在無為理歸靜一化本虛柔然而三世弗紀慧業靡聞斯乃導俗之良書非出世之妙經也若乃神仙小道名為五通福極生天體盡飛騰神通而未免有漏壽遠而不能無終功非餌藥德沿業修於是愚狡方士偽託遂滋張陵米賊述記昇天葛玄野豎著傳仙公愚斯惑矣智可罔與今祖述李叟則教失如彼憲章神仙則體劣如此上中為妙猶不足算況效陵魯醮事章符設教五斗欲拯三界以蚊負山庸詎勝乎標名大道而教甚於俗舉號太上而法窮下愚何故知邪貪壽忌夭含識所同故肉芝石華譎以翻騰好色觸情世所莫異故黃書御女誑稱地仙肌革盈虛群生共愛故寶惜洟涶以灌靈根避災若病民之恆患故斬縛魑魅以快愚情憑威恃武俗之舊風故利兵鉤騎以動淺心至於消災淫術厭勝奸方理穢詞辱非可筆傳事合氓庶故比屋歸宗是以張角李弘毒流漢季盧悚孫恩亂盈晉末餘波所被實蕃有徒爵非通侯而輕立民戶瑞無虎竹而濫求租稅麋費產業蟲惑士女運迍則蠍國世平則蠹民傷政萌亂豈與佛同且夫涅槃大品寍比玄妙上清金容妙相何羨鬼室空屋降伏天魔不慕幻邪之詐淨修戒行豈同畢劵之醜積弘誓於方寸孰與藏宮將於丹田響洪鐘於梵音豈若鳴天鼓於脣齒校以形跡精麤已懸覈以至理真偽豈隱若以麤笑精以偽謗真是瞽對離朱曰我明也弘明集八剡縣石城寺彌勒石像碑銘夫道源虛寂冥機通其感神理幽深玄德司其契是以四海將寍先入感鳳之寶九河方導已致應龍之書況種智圓照等覺徧知揚萬化於大千摛億形於法界其靈起攝誘之權影現戲遊之力可勝言者哉自優曇發華而金姿誕應娑羅變葉而塔像代興月喻論其跡隱鏡象譬其常照律師應法似流宣化如渴揚舲游水馳錫禹山於是捫虛梯漢構立棧道狀奇肱之飛車類似叟之懸閣體高圖範冠采虹蜺推鑿響於霞上剖石灑於雲表信命世之壯觀曠代之鴻作也青艧與丹粟競采白金共紫銑爭輝梵王四鶴徘徊而不去帝釋千馬躑躅而忘歸蓺文類聚七十六為鄱陽嗣王初讓雍州表臣聞大邦維屏既慚宗子之詩思樂泮宮有缺僖公之頌特以周興九伯錫壤參虛漢啟二河分珪舊楚自私家慶總集微躬雍部襟帶跨制數州西拒嶢關北跨鄧塞雖復呼韓來朝槀街納質二虜尋戈四郊無警猶當王戎雅識羊祜尚義臣退求諸己無或宴安進思盡忠幾乎私竭初學記十東宮禮絕傍親議案張鏡撰東宮儀記稱三朝發哀者踰月不舉樂鼓吹寢奏服限亦然尋傍絕之義義在去服服雖可奪情豈無悲鐃歌輟奏良亦為此既有悲情宜稱兼慕卒哭之後依常舉樂稱悲竟此理例相符謂猶應稱兼慕請至卒哭梁書昭明太子傳南史五十三送瑞鼎詣相國梁公啟生木遊火之禽夾階紀朔之華白環銀瓮之迹素雉金船之瑞自天有祚不為定於郟鄏虛其所止非獨在於汾陰藝文類聚九十九謝為東宮奉經啟皇太子四術夙知三善非學猶復旁求儒雅應物稽疑業光夏校德茂周序諸侯宋魯於焉觀則參陪盛禮莫匪國華臣雖職典經圖而同官不一推擇而舉尚多髦俊寵光曲被獨在選中他日朝聞猶甘夕死況茲恩重彌見生輕藝文類聚五十五初學記二十一求豫北伐啟或以臣素無飛將之目未從嫖姚之伍言易行難收功理絕然桓沖稱謝安無將略文靖公遂破苻堅山濤謂羊祜不強建成侯卒平孫皓微臣之譬兩賢誠無等級小虜之方二寇勢踰枯朽藝文類聚五十九謝西中郎諮議啟臣不能銜珠避顛傾柯衛足以茲疏倖與物多忤兼逢匿怨之友遂居司隸之官交構是非用成萋斐日月昭回俯明枉直獄書每御輒鑒蔣濟之冤炙髮見明非關陳正之辯遂漏斯密網免彼嚴棘得使還同士伍比屋唐民生死骨肉豈侔其施臣誠無識敦不戴天疏遠畝隴絕望高闕而降其接引優以旨喻於臣微物足為榮隕況剛條落葉忽沾雲露周行所寘復齒盛流但雕朽杇糞徒成延獎捕影繫風終無效荅梁書劉孝綽傳謝東宮啟臣聞之先聖以眾惡之必察焉眾好之必察焉豈非孤特則積毀所歸比周則積譽斯信知好惡之閒必待明鑒故晏嬰再為阿宰而前毀後譽後譽出於阿意前毀由於直道是以一犬所噬旨酒貿其甘酸一手所搖嘉樹變其生死又鄒陽有言士無賢愚入朝見嫉至若臧文之下展季靳尚之放靈均絳侯之排賈生平津之陷主父自茲厥後其徒實繁曲筆短辭不暇殫述寸管所窺常由切齒殿下誨道觀書俯同好學前載枉直備該神覽臣昔因立侍親承緒言飄風貝錦譬彼讒慝聖旨殷勤深以為歎臣資愚履直不能杜漸防微曾未幾何逢訧罹難雖吹毛洗垢在朝而同嗟而嚴文峻法肆姦其必奏不顧賣友志欲要君自非上帝運超己之光昭陵陽之虐舞文虛謗不取信於宸明在縲嬰纏幸得蠲於庸暗裁下免黜之書仍頒朝會之旨小人未識通方縶馬懸車息絕朝覲方願滅影銷聲遂移林谷不悟天聽罔已造次必彰不以距違見疵復使引籍雲陛降寬和之色垂布帛之言形之千載所蒙已厚況乃恩等特召榮同起家望古自惟彌覺多忝但未渝丹石永藏輪軌相彼工言構茲媒諓且款冬而生已凋柯葉空延德澤無謝陽春梁書劉孝綽傳謝安成王賚祭孤石廟胙肉啟味過瀹鳳珍越屠龍故使屏翳收風馮夷淨浪神居鷁首獨汎安流民幸同附得徵遘迕復等受釐預頒純嘏恩靈所降信次委積報生以死竊聞斯義藝文類聚七十二謝晉安王餉米酒等啟傳詔李孟孫宣教旨垂賜米酒瓜筍葅脯酢茗八種氣苾新城味芳雲松江潭抽節邁昌荇之珍壃埸擢翹越葺精之美羞非純束野麕裛似雪之驢鮓異陶瓶河鯉操如瓊之粲茗同食祭酢類望甘免千里宿舂省三月種聚小人懷惠大懿難忘茶經謝給藥啟一物之微遂留膏肓名醫上藥爰自城府雖巫咸視診岐伯下鍼松子玉漿衛卿雲液比妙眾珍實云多愧藝文類聚八十一謝越布啟比納方綃既輕且麗珍邁龍水妙越島夷藝文類聚八十五荅湘東王書伏承自辭皇邑爰至荊臺未勞刺舉且摛高麗近雖預觀尺錦而不覩金玉昔臨淄詞賦悉與楊修未殫寶笥顧慚先哲渚宮舊俗朝衣多故李固之薦二賢徐璆之奏五郡威懷之道兼而有之當欲使金石流功恥用翰墨垂迹雖乖知二偶達聖心爰自退居素里卻埽窮閈比楊倫之不出譬張摯之杜門昔趙卿窮愁肆言得失漢臣鬱志廣敘盛衰彼此一時擬其非匹竊以文豹何辜以文為罪由此而談又何容易故韜翰吮墨多歷寒暑既闕子幼南山之歌又微敬通渭水之賦無以自同獻笑少酬襃誘且才乖體物不擬作於玄根事殊宿諾寍貽懼於朱亥顧己反躬載懷累息但瞻言漢廣邈若天涯區區一心分宵九逝殿下降情白屋存問相尋食椹懷音矧伊人矣梁書劉孝綽傳又略見藝文類聚五十八與弟書方弘游典墳寤歌林㵎覽興衰於千載觀榮落於四時歲時紀要荅雲法師書孝綽和南辱誨垂示敕旨所荅劉太僕思效啟義窮深遠語兼巧便伏聞希有身心踴躍昔戈盾夾車備不虞於周后兵旗引駕防未然於漢君斯皆執心黃屋瑞無紺馬事極寰㝢之中理隔天人之外皇上自茲善覺降迹閻浮以住地之心行則天之化故能慈導三有仁濟萬物猶以法藥未周寶船不倦解劍卻蓋躬詣道場瑞花承足人觀雕輦之盛金輪啟路物覩重英之飾顯實開權事均祇鷲本無四畏寍慮五怨思效遂膚引梁丘隨劍之說日殫觸瑟之辭何異迴龍象於兔徑注江海於牛迹聖旨慇懃曲相誘喻豈直淨一人之垢衣將以破群生之暗室弟子世傳正見幼覩真言但惑網所縈塵勞自結微因宿植仰逢法教親陪寶座預餐香鉢復得俱聽一音共聞八解庶因小葉受潤大雲猥蒙開示深自慶幸不勝歡喜略附陳誠劉孝綽和南釋藏策五廣弘明集二十八上昭明太子集序臣竊觀大易重明之象著焉抑又聞之匕鬯之義存焉故書有孟侯之名記表元良之德歷選前古以洎夏周可得而稱啟誦而已雖徹聖挺賢光乎二代高文精義闃爾無聞漢之顯宗晉之肅祖昔自春宮益好儒術或專經止於區易或持論窮於貞假子桓雖摛藻銅省集講肅成事在藩儲理非皇貳未有正位少陽多才多蓺者也粵我大梁之二十一載盛德備乎東朝若乃有縱自天惟睿作聖顯仁立孝行於四海如珪如璋不因琢磨之義為臣為子寍待觀喻之言惟性道難聞而文章可見故俯同志學用晦生知以弦誦之餘辰總鄒魯之儒墨徧綈緗於七閣彈竹素於九流地居上嗣實副元首皇帝垂拱巖廊委咸庶績時非從守事或監撫雖一日二日攝覽萬機猶臨書幌而不休對欹案而忘怠況復延納侍講討論經紀去聖滋遠愈生穿鑿枝分葉散殊路偆馳靈臺辟雍之疑禋宗祭社之繆明章申老之議通顏理王之說量覈然否剖析同異察言抗論窮理盡微於時淹中稷下之生金華石渠之士莫不過衢樽而挹多少見斗極而曉西東與夫盡春卿之道贊仲尼之宅非賈誼於蘇林問蕭佇何於棗據區區前史不亦恧歟加以學貫總持辨同無硋五時密教見猶鏡象一乘玅旨觀若掌珠及在布金之園處如龍之眾開示有空顯揚權實是以徧動六地普雨四花豈直得解瓔須提舍鉢瓶沙騰曇言德梵志依風而已哉若夫天文以爛然為美人文以煥乎為貴是以隆儒雅之大成遊雕蟲之小道握牘持筆思若有神曾不斯須風飛雷起至於宴遊西園祖道清洛三百載賦該極連篇七言致擬見諸文學博逸興詠並命從遊書令視草銘非潤色七窮煒燁之說表極遠大之才皆喻不備體詞不掩義因宜適變曲盡文情竊以屬文之體鮮能周備長卿徒善既累為遲少孺雖疾俳優而已子淵淫靡若女工之蠹子雲侈靡異詩人之則孔璋詞賦曹祖勸其修今伯喈答贈摯虞知其頗古孟堅之頌尚有似贊之譏士衡之碑猶聞類賦之貶深乎文者兼而善之能使典而不埜遠而不放麗而不淫約而不儉獨擅眾美斯文在斯假使王朗報箋卞蘭獻頌猶不足以揄揚著述稱贊才章況在庸才曾何仿彿然承華肇建濫齒時髦居陪出從逝將二紀譬彼登山徒仰峻極同夫觀海莫際波瀾但職官書記預聞盛藻歌詠不足敢忘編次謹為一帙十卷第目如左日升松茂與天地而偕長壯思英詞隨歲月而增廣如其後錄以俟賢臣司空安成康王碑銘昔者重華文命並冑高陽之苗豐邑舂陵俱纂帝堯之緒而虞夏革運姚姒之姓已分高光再興大漢之名無改如我皇家梁齊代建異文叔之紹開起自王族非伯禹之更姓公則本枝別榦誕自河嶽五百之期實膺命世卜商有問是謂色難承志望顏在公斯易至如文琰之對食餘幼權之言爵里衛子之朗月映山杜生之凝脂點漆惟公具美歷駕前修峨峨焉非嶽陵之所至浩浩焉總江漢而為長故能擊水三千摶風九萬排天闕而俯眡掩浮雲而上征皇帝甄名挺聖河洛有徵握衡含樞奄一時夏利建藩屏固葉深根郕霍酆郇方周啟祚封公為安成王食邑二千戶允同衛叔賜寶器於商郊殊異唐侯戲桐珪於汾水乃拜公為平西將軍荊州刺史楚之對齊屈完引城池之固荊之比宋墨翟陳輦路之殊品金作貢不異淮海珠璣犀象又無求於晉國況以雲夢九百之宏侈章華三休之巨麗公禦煩以寡居高而降執沖虛之道無矜滿之情其為政也莊敬足以範物慈惠足以庇民剛毅足以威暴清貞足以勵俗天監十七年薨春秋四十有五凡我庶民竊親高義況復祗承帝命來仕王家兔園晚春叨從者之賜高唐暮天而奉作賦之私常懼慶雲之惠不酬而搖落奄至豈謂輕塵之效莫展而峻極先穨思所以立言貞石貽厥長世銘曰昔在文韶五賢二聖漢藩魏屏微風不競於赫我梁德符姬姓康王康叔異時同盛爰自妙年令問不已一孝一悌實光行始義府文場詞人髦士波瀾莫際牆仞難窺用茲先覺導此後知德大心小居高志卑再握不倦三吐忘疲飛龍在天肇基宛瀆地猶小胏民同世復皇情睠正屬難推轂允矣宗英移藩改牧誰謂路永江漢已浮彼蒼不惠遽反成周川迴泝軸塗引歸旒藝文類聚四十七栖隱寺碑開方便門示真實相置甘露室遵甘露津苦語軟言隨方弘訓俯心降迹逐物重輕中枝小葉各隨業根愍其四流五結有來而不散八慢九邪一淪而莫曉如彼醫王等之藥樹去聖茲遠思聖茲深誠敬所先是歸龕廟自妙法東注寶化西漸公卿貴士賢哲偉人莫不嚴事招提歸仰慧覺欲使法燈永傳勝因長久銘曰給孤焚蕩善勝崩淪堂堂宗匠克紹慧因地雖舊域其宇惟新召棠且思羊碑猶泣況我仁祠義喻生立遺愛伊何形于南邑亦有庶民經始攸急珠殿連雲金層輝景衢交達巷門臨樹屏五居推妙三空愧靜銘施柱側記法窟前孰云千載餘迹方傳敢宣重說敬勤雕鐫芬域未滅斯文在旃藝文類聚七十七
