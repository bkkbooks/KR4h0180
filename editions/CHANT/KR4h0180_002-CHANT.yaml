body:
  text: 武帝降省齊世王侯封爵詔興運升降前代舊章齊世王侯封爵悉皆降省其有效著艱難者別有後命惟宋汝陰王不在除例梁書武帝紀中降封豫章王元琳詔襃隆往代義炳彝則朕當此樂推思引前典豫章王元琳故巴陵王昭冑子同齊氏宗國高武嫡胤宜祚井邑以傳世祀降新淦縣侯五百戶南齊書豫章王嶷傳降封王儉為南昌侯詔庭堅世祀靡輟於宗周樂毅錫壤乃昭於洪漢齊故太尉南昌公含章履道草昧興齊謨明翊贊同符在昔雖子房之蔚為帝師文若之隆比王佐無以尚也朕膺厤受圖惟新寶命莘莘玉帛升降有典永言前代敬惟徽烈匪直懋勳義兼懷樹可降封南昌縣公為侯食邑千戶梁書太宗王皇后傳追贈張弘籍詔亡舅齊鎮西參軍素風雅猷夙肩名輩降年不永早世潛輝朕少離苦辛情地彌切雖宅相克成輅車靡贈興言永往觸目慟心可追贈廷尉卿梁書太祖張皇后傳放還罪口詔大運肇升嘉慶惟始劫賊餘口沒在臺府者悉可蠲放諸流徙之家並聽還本梁書武帝紀中放遣宮女詔宋氏以來並恣淫侈傾宮之富遂盈數千推算五都愁窮四海並嬰罹冤橫拘逼不一撫絃命管良家不被蠲織室繡房幽戹猶見役弊國傷和莫斯為甚凡後宮樂府西解暴室諸如此例一皆放遣若衰老不能自存官給廩食梁書武帝紀中分遣內侍省方詔觀風省俗哲后弘規狩岳巡方明王盛軌所以重華在上五品聿修文命肇基四載斯履故能物色幽微耳目屠釣致王業於緝熙被淳風於遐邇朕以寡薄昧於治方藉代終之運當符命之重取監前古懍若馭朽思所以振民育德去殺勝殘解網更張置之仁壽而明慚照遠智不周物兼以歲之不易未遑卜征興言夕惕無忘鑒寐可分遣內侍周省四方觀政聽謠訪賢舉滯其有田野不闢獄訟無章忘公徇私侵漁是務者悉隨事以聞若懷寶迷邦蘊奇待價蓄響藏真不求聞達並依名騰奏罔或遺隱使輶軒所屆如朕親覽焉梁書武帝紀中定贖刑條格詔金作贖刑有聞自昔入縑以免施於中代民悅法行莫尚乎此永言叔世偷薄成風嬰諐入罪厥塗匪一斷弊之書日纏於聽覽鉗釱之刑歲積於牢犴死者不可復生刑者無因自返由此而望滋實庸可致乎朕夕惕思治念崇政術斟酌前王擇其令典有可以憲章邦國罔不由之釋愧心於四海昭情素於萬物俗偽日久禁網彌繁漢文四百邈焉已遠雖省事清心無忘日用而委銜廢策事未獲從可依周漢舊典有罪入贖外詳為條格以時奏聞梁書武帝紀中又略見南史六置謗木肺石圅詔商俗甫移遺風尚熾下不上達由來遠矣升中馭索增其懍然可於公車府謗木肺石傍各置一圅若肉食莫言山阿欲有橫議投謗木圅若從我江漢功在可策犀兕徒弊龍蛇方縣次身才高妙擯壓莫通懷傅呂之術抱屈賈之歎其理有皦然受困包匭夫大政侵小豪門陵賤四民已窮九重莫達若欲自申並可投肺石圅梁書武帝紀中平議治綱詔禮闈文閣宜率舊章貴賤既位各有差等俯仰拜伏以明王度濟濟洋洋具贍斯在頃因多難治綱弛落官非積及榮由幸至六軍尸四品之職青紫治白簿之勞振衣朝伍長揖卿相趨步廣闥並驅丞郎遂冠履倒錯珪甑莫辨靜言疚懷思返流弊且翫法惰官動成逋弛罰以常科終未懲革夫檟楚申威蓋代斷趾笞捶有令如或可從外詳共平議務盡厥理梁書武帝紀中以兄子伯游為會稽太守詔兄子伯游雖年識未弘意尚粗可浙東奧區宜須撫莅可督會稽東陽新安永嘉臨海五郡諸軍事輔國將軍會稽太守梁書永陽王伯游傳追封蕭穎冑詔念功惟德歷代所同追遠懷人彌與事篤齊故侍中丞相尚書令穎冑風格峻遠器宇淵邵清猷盛業問望斯歸締構義始肇基王迹契闊屯夷載形心事朕膺天改命光宅區宇望岱瞻河永言增慟可封巴東郡開國公食邑三千戶本官如故南齊書蕭穎冑傳又見梁書蕭穎達傳贈諡蕭穎冑等詔齊故侍中丞相尚書令穎冑葬送有期前代所加殊禮依晉王導齊豫章王故事可悉給諡曰獻武南齊書蕭穎冑傳與何點手詔昔因多暇得訪逸軌坐修竹臨清池忘今語古何其樂也蹔別丘園十有四載人事艱阻亦何可言自應運在天每思相見密邇物色勞甚山阿嚴光排九重踐九等談天人敘故舊有所不臣何傷於高文先以皮弁謁子桓伯況以縠綃見文叔求之往策不無前例今賜卿鹿皮巾等後數日望能入也梁書何點傳加范述曾禮秩詔中散大夫范述曾昔在齊世忠直奉主往莅永嘉治身廉約宜加禮秩以厲清操可太中大夫賜絹二十匹梁書范述曾傳下詔徵何點前徵士何點高尚其道志安容膝脫落形骸棲志窅冥朕日昃思治尚想前哲況親得同時而不與為政喉脣任切必俟邦良誠望惠然屈居獻替可徵為侍中梁書何點傳案何點傳此下有復詔資給何點藝文類聚以為沈約作下釋保誌詔誌公迹拘塵垢神遊冥寂水火不能燋濡蛇虎不能侵懼語其佛理則聲聞以上談其隱淪則遁仙高者豈得以俗士常情空相拘制何其鄙狹一至於此自今行道來往隨意出入勿得復禁高僧傳十許風聞奏事詔成務弘風肅厲內外實由設官分職互相懲糾而頃壹拘常式見失方奏多容違惰莫肯執咎憲綱日弛漸以為俗今端右可以風聞奏事依元熙舊制梁書武帝紀中許曹郎奏事詔自禮闈陵替歷茲永久郎署備員無取職事糠粃文案貴尚虛閒空有趨墀之名了無握蘭之實曹郎可依昔奏事隋書百官上贈諡張弘策詔亡從舅衛尉慮發所忽殞身祅豎其情理清貞器識淹濟自藩升朝契闊夷阻加外氏凋衰饗嘗屢絕興感渭陽情寄斯在方賴忠勳翼宣寡薄報效無徵永言增慟可贈散騎常侍車騎將軍給鼓吹一部諡曰愍梁書張弘策傳詔任昉聊為七夕詩五韻殊未近詠歌卿雖訥於言而辯於才可即制付使者文選任彥昇奉荅敕示七夕詩啟注引任昉集定梁律詔律令不一實難去弊殺傷有法昏墨有刑此蓋常科易為條例至如三男一妻懸首造獄事非慮內法出恆鈞前王之律後主之令因循創附良各有以若遊辭費句無取於實錄者宜悉除之求文指歸可適變者載一家為本用眾家以附景丁俱有則去丁以存景若景丁二事注釋不同則二家兼載咸使百司議其可不取其可安以為標例宜云某等如干人同議以此為長則定以為梁律留尚書比部悉使備文若班下州部止撮機要可無二門侮法之弊隋書刑法志訪百寮古樂詔夫聲音之道與政通矣所以移風易俗明貴辨賤而韶濩之稱空傳咸英之實靡託魏晉以來陵替滋甚遂使雅鄭混淆鍾石斯謬天人缺九變之節朝醼失四懸之儀歷年永久將墮於地朕昧旦坐朝思求厥旨而舊事匪存未獲釐正寤寐有懷所為歎息卿等學術通明可陳其所見隋書音樂志上武帝思弘古樂天監元年遂下詔訪百寮又見初學記十五荅何佟之等請修五禮詔禮壞樂缺故國異家殊實宜以時修定以為永準但頃之修撰以情取人不以學進其掌知者以貴總一不以稽古所以歷年不就有名無實此既經國所先外可議其人人定即便撰次梁書徐勉傳敕諸州月一訊獄詔三訊五聽著自聖典哀矜折獄義重前誥蓋所以明慎用刑深戒疑枉成功致治罔不由茲朕自藩部常躬訊錄求理得情洪細必盡末運弛網斯政又闕牢犴沈壅申訴靡從朕屬當期運君臨億兆雖復齋居宣室留心聽斷而九牧遐荒無因臨覽深懼懷冤就鞫匪唯一方可申敕諸州月一臨訊博詢擇善務在確實梁書武帝紀中贈范雲詔追遠興悼常情所篤況問望斯在事深朝寄者乎故散騎常侍尚書右僕射霄城侯雲器範貞正思懷經遠爰初立志素履有聞脫巾來仕清績仍著燮務登朝具瞻惟允綢繆翊贊義𥳑朕心雖勤非負靮而舊同論講方騁遠塗永毗庶政奄致喪殞傷悼於懷宜加命秩式備徽典可追贈侍中衛將軍僕射侯如故并給鼓吹一部梁書范雲傳下扶南王詔扶南王憍陳如闍邪跋摩介居海表世纂南服厥誠遠著重譯獻賝宜蒙酬納班以榮號可安南將軍扶南王梁書海南諸國傳荅袁昂詔朕遺射鉤卿無自外梁書袁昂傳遣使巡行詔昔哲王之宰世也每歲卜征躬事巡省民俗政刑罔不必逮末代風凋久曠茲典雖欲肆遠忘勞究臨幽仄而居今行古事未易從所以日晏踟躕情同再撫總總九州遠近民庶或川路幽遐或貧羸老疾懷冤抱理莫由自申所以東海匹婦致災邦國西土孤魂登樓請訴念此於懷中夜太息可分將命巡行州部其有深冤鉅害抑鬱無歸聽詣使者依源自列庶以矜隱之念昭被四方逖聽遠聞事均親覽梁書武帝紀中贈蔡道恭詔持節都督司州諸軍事平北將軍司州刺史漢壽縣開國伯道恭器幹詳審才志通烈王業肇構致力陜西受任邊垂效彰所莅寇賊憑陵竭誠守禦奇謀閒出捷書日至不幸抱疾奄至殞喪遺略所固得移氣朔自非徇國忘己忠果並至何能身沒守存窮而後屈言念傷悼特兼常懷追榮加等抑有恆數可贈鎮西將軍使持節都督刺史伯如故并尋購喪櫬隨宜資給梁書蔡道恭傳除贖罪科詔設教因時淳薄異政刑以世革輕重殊風昔商俗未移民散久矣嬰網陷辟日夜相尋若悉加正法則赭衣塞路並申弘宥則難用為國故使有罪入贖以全元元之命今遐邇知禁圄犴稍虛率斯以往庶幾刑措金作權典宜在蠲息可除贖罪之科梁書武帝紀中給賻何點詔新除侍中何點棲遲衡泌白首不渝奄至殞喪倍懷傷惻可給第一品材一具賻錢二萬布五十匹喪事所須內監經理梁書何點傳選侍郎詔尚書郎在職清能或人才高妙者為侍郎梁書到沆傳齋日去廟二百步斷哭詔六門之內士庶甚多四時蒸嘗俱斷其哭若有死者棺器須來既許其大而不許其細也到齋日宜去廟二百步斷哭隋書禮儀志二何佟之議到齋日六門斷哭詔云云定選格詔今九流常選年未三十不通一經不得解褐若有才同甘顏勿限年次梁書武帝紀中又見南史六停止宮人觀禮詔夫禋郊饗帝至敬攸在致誠盡愨猶懼有違而往代多令宮人縱觀茲禮幃宮廣設輜軿耀路非所以仰虔蒼昊昭感上靈屬車之閒見譏前世便可自今停止梁書武帝紀中置五經博士詔二漢登賢莫非經術服膺雅道名立行成魏晉浮蕩儒教淪歇風節罔樹抑此之由朕日昃罷朝思聞俊異收士得人實惟醻獎可置五經博士各一人廣開館宇招內後進梁書儒林傳序北伐詔門下周文薄伐實寍邊患漢武命師允恢王略蕞爾犬羊陵縱日久宋氏云衰乘釁逞暴海岱彭鄒翦焉淪覆雖每存拯定雄圖弗舉齊末糾紛復肆姦毒宛葉淮肥仍離內侮偽酋惡稔天誅自降凶渠嗣虐險慝彌流殘鉏親黨咀噬黔庶繁役絲興毒賦雲起司冀餘華中州舊族綴足宛頸載離塗炭延首南雲思沾王澤鼎運啟基大業草創蠢彼戎心仍窺疆埸虔劉我郡侵擾我徐方小豎道遷乘隙背誕凶醜貪愚復相苞納前以叛臣難長彼此齊患推心忖物庶必闇同故有移書較陳往旨而方加擁蔽曾無反報同惡相濟市賈非匹告舍既違難以義獎非威非力制勝莫從加以醜數云亡幽顯咸應訛謠表徵災沴備兆殄滅之期皎如日月左伊右瀍實殷霜露鴟梟是宅非謂天道一星已周實為冥數取亂之機事協茲日頃時和歲稔政平人豫華戎內款表疏相屬便宜廣命群帥赫然大舉總一車書混同禹迹具位泉猷等戎卒七萬先定壽春某等武旅五萬揚旌漅峴既清潁汝臨瀍㵎某等鐵騎二萬超影絕群出自大徐傍趣鞏洛某等組甲四萬霜鋒曜日發自淮汭直指金墉某等率羽林趫勇五萬某等率二兗剽猛熊羆十萬同濟彭泗經汴入河某等海𦨴萬舳徑掩臨淄某等輕銳五萬風偃齊岱拂茲鉅野汎彼孟津某等勒司郢之師驍果六萬步出義陽橫轥熊耳某等率三州武毅劍客八萬入自曾陽傳檄崤陜暨中嶽而解鞍指浮橋而一息並敕某等連旌五萬水陸齊邁具位泉藻帥徒七萬雲飛靈關北通棧路澄廓隴右凡此將帥啟塗載路魚麗後軍駱驛繼軌經啟中原括囊九服伐罪弔人於是乎在大眾外臨宜有總一自非密親英譽風略兼遠無以專任閫外授律群師臨川王宏可權進督南北兗徐青冀豫司霍八州都督北討諸軍事命將出車咸有副貳具位恢可暫輟端右參贊戎機舟徒雷駭熊武百萬投石拔距之力折關扛鼎之威岳動川移風馳電邁鐵馬方原戈船千里百道并驅同會洛邑戡翦逋醜馘掃鯨鯢被仁風於兩周撫遺黎於趙魏將令溥天之下於斯大同偃伯靈臺何遠之有元恪若能率其徒屬輿櫬軍門者中軍府以時將送當待以列侯之禮文館詞林六百六十二均選詔在昔周漢取士方國頃代凋訛幽仄罕被人孤地絕用隔聽覽士操淪胥因茲靡勸豈其岳瀆縱靈偏有厚薄實由知與不知用與不用耳朕以菲德君此兆民而兼明廣照屈於堂戶飛耳長目不及四方永言愧懷無忘旦夕凡諸郡國舊族邦內無在朝位者選官搜括使郡有一人梁書武帝紀中遣官錄囚詔朕昧旦齋居惟刑是恤三辟五聽寢興載懷故陳肺石於都街增官司於詔獄殷懃親覽小大以情而明慎未洽囹圄尚擁永言納隍在予興愧凡犴獄之所可遣法官近侍遞錄囚徒如有枉滯以時奏聞梁書武帝紀中祝史罪己詔夫有天下者義非為己凶荒疾癘兵革水火有一於此責歸元首今祝史請禱繼諸不善以朕身當之永使災害不及萬姓俾茲下民稍蒙寍息不得為朕祈福以增其過特班遠邇咸令遵奉梁書武帝紀中革選詔在昔晉初仰惟盛化常侍侍中並奏帷幄員外常侍特為清顯陸始名公之胤位居納言曲蒙優禮方有斯授可分門下二局委散騎常侍尚書案奏分曹入集書通直常侍本為顯爵員外之選宜參舊準人數依正員格隋書百官志上元會應南面詔頃代以來元日朝畢次會群臣則移就西壁下東向坐求之古義王者讌萬國唯應南面何更居東面隋書禮儀志四又見通典七十議元會受贄詔元日受五等贄珪璧並量所付司隋書禮儀志四又見通典七十立學詔建國君民立教為首不學將落嘉植靡由朕肇基明命光宅區宇雖耕耘雅業傍闡蓺文而成器未廣志本猶闕非所以鎔範貴遊納諸軌度思欲式敦讓齒自家刑國今聲訓所漸戎夏同風宜大啟庠斅博延冑子務彼十倫弘此三德使陶鈞遠被微言載表梁書武帝紀中又見儒林傳序僅異二語張溥本重出營建象闕詔昔晉氏青蓋南移日不暇給而兩觀莫築懸法無所今禮盛化光役務𥳑便可營建象闕以表舊章文選石闕銘注引劉璠梁典將有事太廟詔禮云齋日不樂今親奉始出宮振作鼓吹外可詳議隋書音樂志上通典一百四十二下高驪王高雲詔高驪王樂浪郡公雲乃誠款著貢驛相尋宜隆秩命式弘朝典可撫東大將軍開府儀同三司持節常侍都督王並如故梁書東夷高句驪傳開山澤常禁詔芻牧必往姬文垂則雉兔有刑姜宣致貶藪澤山林毓材是出斧斤之用比屋所資而頃世相承並加封固豈所謂與民同利惠茲黔首凡公家諸屯戍見封熂者可悉開常禁梁書武帝紀中詔詳定郊祀冕服禮王者祀昊天上帝則大裘而冕祀五帝亦如之又云莞席之安而蒲越槀秸之用斯皆至敬無文貴誠重質今郊用陶匏與古不異而大裘蒲秸獨不復存其於質敬恐有未盡且一獻為質其劍佩之飾及公卿所著冕服可共詳定隋書禮儀志六贈諡鄭紹叔詔追往念功前王所篤在誠惟舊異代同規通直散騎常侍右衛將軍東興縣開國侯紹叔立身清正奉上忠恪契闊藩朝情績顯著爰及義始實立茂勳作牧疆境效彰所莅方申任寄協贊心膂奄至殞喪傷痛於懷宜加優典隆茲寵命可贈散騎常侍護軍將軍給鼓吹一部東園祕器朝服一具衣一襲凶事所須隨由資給諡曰忠梁書鄭紹叔傳置陵令詔陵監之名不出前誥且宗廟憲章既備典禮園寢職司禮不容易諸王陵先立監者改為令唐書官品志敘錄寒儒詔學以從政殷勤往哲祿在其中抑亦前事朕思闡治綱每敦儒術軾閭闢館造次以之故負袟成風甲科閒出方當置諸周行飾以青紫其有能通一經始末無倦者策實之後選官可量加敘錄雖復牛監羊肆寒品後門並隨才試吏勿有遺隔梁書武帝紀中報阮研言王敬胤遺命詔敬胤令其息崇素氣絕便沐浴藉以二蘆䉬鑿地周身歸葬忠侯此達生之格言賢夫玉匣石椁遠矣然子於父命亦有所從有所不從今崇素若信遺意土周淺薄屬辟不施一朝見侵狐鼠戮屍已甚父可以訓子子亦不可行之外內易棺此自奉親之情藉土而葬亦通人之意宜兩捨兩取以達父子之志棺周於身土周於椁去其牲奠斂以時服一可以申情二可以稱家禮教無違生死無辱此故當為安也南史四十九劉歊傳令皇太子王侯之子入學詔王子從學著自禮經貴遊咸在實惟前誥所以式廣義方克隆教道今成均大啟元良齒讓自斯以降並宜隸業皇太子及王侯之子年在從師者可令入學梁書武帝紀中下林邑王范天凱詔林邑王范天凱介在海表乃心款至遠修職貢良有可嘉宜班爵號被以榮澤可持節督緣海諸軍事威南將軍林邑王梁書海南諸國傳使內外官各陳損益詔朕達聽思治無忘日昃而百司群務其途不一隨時適用各有攸宜若非總會眾言無以備茲親覽自今臺閣省府州郡鎮戍應有職僚之所時共集議各陳損益具以奏聞梁書武帝紀中妙簡都令史詔尚書五都職參政要非但總領眾局亦乃方軌二丞頃雖求才未臻妙𥳑可革用士流每盡時彥庶同持領秉此群目隋書百官志上
