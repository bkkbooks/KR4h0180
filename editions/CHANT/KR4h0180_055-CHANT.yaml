body:
  text: 鍾岏食生物議䱇之就脯驟於屈伸蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之奇礦殼外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖廚永為口實南齊傳周顒書上齊明帝書諫親細務古者明君揆才頒政量能授職三公坐而論道九卿作而成務天子可恭己南面而已南史七十二鍾嶸傳上言軍宮永元肇亂坐弄天爵勳非即戎官以賄就揮一金而取九列寄片札以招六校騎都塞市郎將填街服既纓組尚為臧獲之事職雖黃散猶躬胥徒之役名實淆紊茲焉莫甚臣愚謂永元諸軍官是素族士人自有清貫而因斯受爵一宜削除以懲僥競若吏姓寒人聽極其門品不當因軍遂濫清級若僑雜傖楚應在綏撫正宜嚴斷祿力直乞虛號而已謹竭愚忠不恤眾口梁書鍾嶸傳又南史鍾嶸傳少末二句詩品序氣之動物物之感人故搖蕩性情形諸舞詠欲以照燭三才輝麗萬有靈祇待之以致饗幽微藉之以昭告動天地感鬼神莫近於詩昔南風之辭卿雲之頌厥義敻矣夏歌曰鬱陶乎予心楚謠云名余曰正則雖詩體未全然略是五言之濫觴也逮漢李陵始著五言之目古詩眇邈人代難詳推其文體固是炎漢之制非衰周之唱也自王楊枚馬之徒辭賦兢爽而吟詠靡間從李都尉訖班婕好將百年間有婦人焉一人而已詩人之風頓已缺喪東京二百載中惟有班固詠史質木無文致降及建安曹公父子篤好斯文平原兄弟鬱為文棟劉楨王粲為其羽翼次有攀龍託鳳自致於屬車者蓋將百計彬彬之盛大備於時矣爾後陵遲衰微訖於有晉太康中三張二陸兩潘一左勃爾復興踵武前王風流未沫亦文章之中興也永嘉時貴黃老尚虛談於時篇什理過其辭淡乎寡味爰及江表微波尚傳孫綽許詢桓庾諸公皆平典似道德論建安之風盡矣先是郭景純用俊上之才創變其體劉越石仗清剛之氣贊成厥美然彼眾我寡未能動俗逮義熙中謝益壽斐然繼作元嘉初有謝靈運才高辭盛富豔難蹤固已含跨劉郭淩轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顏延年為輔此皆五言之冠冕文辭之命世夫四言文約意廣取效風騷便可多得每苦文煩而意少故世罕習焉五言居文辭之要是眾作之有滋味者也故云會於流俗豈不以指事遣形窮情寫物最為詳切者邪故詩有六義焉一曰興二曰賦三曰比文已盡而意有餘興也因物喻志比也直書其事寓言寓物賦也弘斯三義酌而用之幹之以風力潤之以丹采使味之者無極聞之者動心是詩之至也若專用比興則患在意深意深則辭躓若但用賦體則患在意浮意浮則文散嬉成流移文無止泊有蕪漫之累矣若夫春風春鳥秋月秋蟬夏雲暑雨冬月祁寒斯四候之感諸詩者也嘉會寄詩以親離群託詩以怨至於楚臣去境漢妾辭宮或骨橫朔野或魂逐飛蓬或負戈外戌或殺氣雄邊塞客衣單霜閨淚盡又士有解珮出朝一去忘反女有揚蛾入寵再盼傾國凡斯種種感蕩心靈非陳詩何以展其義非長歌何以釋其情故曰詩可以群可以怨使窮賤安幽居靡悶莫尚於詩矣故辭人作者罔不愛好今之士俗斯風熾矣裁能勝衣甫就小學必甘心而馳鶩焉於是庸音雜體各為家法至於膏腴子弟恥文不逮終朝點綴分夜呻吟獨觀謂為警策眾視終淪平鈍次有輕蕩之徒笑曹劉為古拙謂鮑照羲皇上人謝朓今古獨步而師鮑照終不及日中市朝滿學謝朓劣得黃鳥度青枝徒自棄於高聽無涉於文流矣嶸觀王公搢紳之士每博論之餘何嘗不以詩為口實隨其嗜欲商搉不同淄澠並汛朱紫相奪諠譁競起準的無依近彭城劉士章俊賞之士疾其淆亂欲為當世詩品口陳標榜其文未遂嶸感而作焉昔九品論人七略裁士校以賓實誠多未值至若詩之為技較爾可知以類推之殆同博弈方今皇帝資生知之上才體沈鬱之幽思文麗日月學究天人昔在貴遊已為稱首況八絃既掩風靡雲蒸抱玉者連肩握珠者踵武固以睨漢魏而弗顧吞晉宋於胸中諒非農歌轅議敢致流別嶸之今錄庶周遊於閭里均之於談笑耳梁書鍾榮傳詩品上古詩其體源出於國風陸機所擬十四首文溫以麗意悲而遠驚心動魄可謂幾乎一字千金其外去者日以疏四十五首雖哀怨頗為總雜舊疑是建安中曹王所製客從遠方來橘柚垂華實亦為警絕矣人代冥滅而清音獨遠悲夫漢都尉李陵詩其源出於楚辭文多悽愴怨者之流陵名家子有殊才生命不諧聲頹身喪使陵不遭辛苦其文亦何能至此漢婕妤班姬詩其源出於李陵團扇短章辭旨清捷怨深文綺得匹婦之致侏儒一節可以知其工矣魏陳思王植詩其源出於國風骨氣奇高詞彩華茂情兼雅怨體被文質粲溢今古卓爾不群嗟夫陳思之於文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有琴笙女工之有黼黻俾爾懷鉛吮墨者抱篇章而景慕映餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣魏文學劉楨詩其源出於古詩仗氣愛奇動多振絕真骨淩霜高風跨俗但氣過其文雕潤恨少然自陳思以下楨稱獨步魏侍中王粲詩其源出於李陵發愀愴之詞文秀而質羸在曹劉間別構一體方陳思不足比魏文有餘晉步兵阮籍詩其源出於小雅無雕蟲之功而詠懷之作可以陶性靈發幽思言在耳目之外情寄八荒之表洋洋乎會於風雅使人忘其鄙近自致遠大頗多感慨之詞厥旨淵放歸趣難求顏延之註解怯言其志晉平原相陸機詩其源出於陳思才高辭贍舉體華美氣少於公幹文劣於仲宣尚規矩不貴綺錯有傷直致之奇然其咀嚼英華厭飫膏澤文章之淵泉也張公歎其大才信矣晉黃門郎潘岳詩其源出於仲宣翰林歎其翩翩然如翔禽之有羽毛衣服之有綃縠猶淺於陸機謝混云潘詩爛若舒錦無處不佳陸文如披沙𥳑金往往見寶嶸謂益壽輕華故以潘勝翰林篤論故歎陸為深余常言陸才如海潘才如江晉黃門郎張協詩其源出於王粲文體華淨少病累又巧構形似之言雄於潘岳靡於太沖風流調達實曠代之高手詞彩蔥蒨音韻鏗鏘使人味之亹亹不倦晉記室左思詩其源出於公幹文典以怨頗為精切得諷諭之致雖野於陸機而深於潘岳謝康樂常言左太沖詩潘安仁詩古今難比宋臨川太守謝靈運詩其源出於陳思雜有景陽之體故尚巧似而逸蕩過之頗以繁蕪為累嶸謂若人興多才高博寓目輒書內無乏思外無遺物其繁富宜哉然名章迥句處處間起麗典新聲絡繹奔會譬猶青松之拔灌木白玉之映塵沙未足貶其高潔也初錢塘杜明師夜夢東南有人來入其館是夕即靈運生於會稽旬日而謝玄亡其家以子孫難得送靈運於杜治養之十五方還都故名客兒詩品中一品之中略以世代為先後不以優劣為詮次又其人既往其文克定今所寓言不錄存者夫屬詞比事乃為通談若乃經國文符應資博古撰德駁奏宜窮往烈至乎吟詠情性亦何貴於用事思君如流水既是即目高臺多悲風亦惟所見清晨登隴首羌無故實明月照積雪詎出經史觀古今勝語多非補假皆由直尋顏延謝莊尤無繁密於時化之故大明泰始中文章殆同書抄近任昉王元長等辭不貴奇競須新事爾來作者寖以成俗逐句無虛語語無虛字拘攣補衲蠹文已甚但自然英旨罕值其人詞既失高則宜加事義雖謝天才且表學問亦一理乎陸機文賦通而無貶李充翰林疏而不切王微鴻寶密而無裁顏延論文精而難曉摯虞文志詳而博贍頗曰知言觀斯數家皆就談文體而不顯優劣至於謝客集詩逢詩輒取張騭文士逢文即書諸英志錄並義在文曾無品弟嶸令所錄止乎五言雖然網羅今古詞文殆集輕欲辨彰清濁掎拓病利凡百二十人預此宗流者便稱才子至斯三品升降差非定制方申變裁請寄知者爾漢上計秦嘉嘉妻徐淑詩夫妻事既可傷文亦悽怨為五言者不過數家而婦人居二徐淑敘別之作亞於團扇矣魏文帝詩其源出於李陵頗有仲宣之體則新奇百許篇率皆鄙直如偶語惟西北有浮靈十餘首殊美贍可翫始見其工夫不然可以銓衡群彥對揚厥弟者邪晉中散嵇康詩頗似魏文過為峻切訐直露才傷淵雅之致然託諭清遠良有鑒裁亦未失高流矣晉司空張華詩其源出於王粲其體華豔興託不奇巧用文字務為妍冶雖名高曩代而亮疏之士猶恨其兒女情多風雲氣少謝康樂云張公雖復千篇猶一體耳今置之中品疑弱處之下科恨少在季孟之間矣魏尚書何晏晉馮翊守孫楚晉著作王讚晉王司徒掾張翰晉中書令潘尼詩平叔鴻雁之篇風規見矣子荊零雨之外正長朔風之後雖有累札良亦無聞季膺黃華之唱正叔緣繁之良雖不具美而文彩高麗並得虬龍片甲鳳凰一毛事同駁聖宜居中品魏侍中應璩詩祖襲魏文善為古語指事殷勤雅意深得詩人激刺之旨至於濟濟今日所華靡可諷味焉晉清河守陸雲晉侍中石崇晉襄城太守曹攄晉朗陵公何劭清河之方平原殆如陳思之匹白馬於其哲昆故稱二陸季倫顏遠並有英篇篤而論之朗陵為最晉太尉劉琨晉中郎劉湛詩其源出於王粲善為悽戾之詞自有清拔之氣琨既體良才又罹厄運故善敘喪亂多感恨之辭中郎仰之微不逮者矣晉弘農太守郭璞詩憲章潘岳文體相輝彪炳可翫始變永嘉平淡之體故稱中興第一翰林以為詩首但遊仙之作辭多慷慨乖遠玄宗而云柰何虎豹姿又云戢翼棲榛梗乃是坎壈詠懷非列仙之趣也晉吏部郎袁宏詩彥伯詠史雖文體未遒而鮮明緊健去凡俗遠矣晉處士郭泰機晉常侍顧愷之宋謝世基宋參軍顧邁宋參軍戴凱詩泰機寒女之製孤怨宜恨長康能以二韻答四首之美世基橫海顧邁鴻飛戴凱人實貧羸而才章富健觀此五子文雖不多氣調警拔吾許其進則鮑照江淹未足逮止越居中品僉曰宜哉宋徵士陶潛詩其源出於應璩又協左思風力文體省靜殆無長語篤意真古辭興惋愜每觀其文想其人德世歎其質直至如歡言酌春酒日暮天無雲風華清靡豈直為田家語邪古今隱逸詩人之宗也宋光祿大夫顏延之詩其源出於陸機尚巧似體裁綺密情喻淵深動無虛散一句一字皆致意焉又喜用古事彌見拘束雖乖秀逸是經綸文雅才雅才減若人則蹈於困躓矣湯惠休曰謝詩如芙蓉出水顏如錯彩鏤金顏終身病之宋豫章太守謝瞻宋僕射謝混宋太尉袁淑宋徵君王微宋征虜將軍王僧達詩其源出於張華才力苦弱故務其清淺殊得風流媚趣課其實錄則豫章僕射宜分庭抗禮徵君太尉可託乘後車征虜卓卓殆欲度驊騮前宋法曹參軍謝惠連詩小謝才思富捷恨其蘭玉夙凋故長轡未騁秋懷擣衣之作雖復靈運銳思亦何以加焉又工為綺麗歌謠風人第一謝氏家錄云康樂每對惠連輒得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即成池塘生春草故常云此語有神助非吾語也宋參軍鮑照詩其源出於二張善製形狀寫物之詞得景陽之諔詭含茂先之靡嫚骨節強於謝混驅邁疾於顏延總四家而擅美跨兩代而孤出嗟其才秀人微故取湮堂代然貴尚巧似不避危仄頗傷清雅之調故言險俗者多以附照齊吏部謝朓詩其源出於謝混微傷細密頗在不倫一章之中自有玉石然奇章秀句往往警遒足使叔源失步明遠變色善自發詩端而末篇多躓此意銳而才弱也至篇後進士子之所嗟慕朓極與余論詩感激頓挫過其文齊光祿江淹詩文通詩體總雜善於摹擬筋力於王微成就於謝朓初淹罷宣城郡遂宿野寺夢一美丈夫自稱郭璞謂淹曰吾有筆在卿處多年矣可以見還淹探懷中得五色筆以授之爾後為詩不復成語故世傳江淹才盡梁衛將軍范雲梁中書郎丘遲詩范詩清便宛轉如流風迴雪丘詩點綴映媚似落花依草故當淺於江淹而秀於任昉梁太常任昉詩彥昇少年為詩不工故世稱沈詩任筆昉深恨之晚節愛好既篤又亦遒變若銓事理拓體淵雅得國士之風故擢中品但昉既博物動輒用事所以詩不得奇少年士子效其如此弊矣梁左光祿沈約詩觀休文眾製五言最優詊其文體察其餘論固知憲章鮑明遠也所以不閑於經綸而長於清怨永明相王愛文王元長等皆宗附之約於時謝朓未遒江淹才盡范雲名級故微故約稱獨步雖文不至其工麗亦一時之選也見重閭里誦詠成音嶸謂約所著既多今翦除涇雜收其精要允為中品之第矣故當詞密於范意淺於江也詩品下昔曹劉殆文章之聖陸謝為體貳之才銳精研思千百年中而不聞宮商之便四聲之論或為前達偶然不見豈其然乎嘗試言之古曰詩頌皆被之金竹故非調五音無以諧會若置酒高堂上明月照高樓為韻之首故三祖之詞文或不工而韻入歌唱此重音韻之義也與世之言宮商異矣今既不備管絃亦何取於聲律邪齊有王元長者嘗謂余云宮商與二儀俱生自古詞人不知之惟顏憲子乃云律呂音調而其實大謬惟見范曄謝莊乃識之耳常欲進知音論未就王元長創其首謝朓沈約揚其波三賢或貴公子孫幼有文辨於是士流景慕務為精密襞積細微專相淩架故使文多拘忌傷其真美余謂文製本須諷讀不可蹇礙但令清濁通流口吻調利斯為足矣至平上去入則余病未能蜂腰鶴膝閭里已具陳思贈弟仲宣七哀公幹思友阮籍詠懷子卿雙鳧叔夜雙鸞茂先寒夕平叔衣單安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純詠仙王微風月謝客山泉叔源離宴鮑照戍邊太沖詠史顏延入洛陶公詠貧之製惠連擣衣之作斯皆五言之警策者也所謂篇章之珠澤文彩之鄧林漢令史班固漢孝廉酈炎漢上計趙壹詩孟堅才流而老於掌故觀其詠史有感歎之詞文勝託詠靈芝懷寄不淺元叔散憤蘭蕙指斥囊錢苦言切句良亦勤矣斯人也而有斯困悲夫魏武帝魏明帝曹公古直甚有悲涼之句叡不如丕亦稱三祖魏白馬王彪魏文學徐幹白馬與陳思答贈偉長與公幹往復雖曰以莛扣鐘亦能閑雅矣魏倉曹屬阮瑀晉頓丘太守歐陽建晉文學應璩晉中書令稽含晉河南太守阮侃晉侍中稽紹晉黃門棗據元瑜下闕右七君詩並平典不失古體大檢似而二嵇微優矣晉中書張載晉司隸傅玄晉太僕傅咸侍中繆襲散騎常侍夏侯湛孟陽詩乃遠慚厥弟而近超兩傅長虞父子繁富可嘉孝沖雖曰後進見重安仁熙伯挽歌唯以造哀爾晉驃騎王濟晉征南將軍杜預晉廷尉孫綽晉徵士許詢永嘉以來清虛在俗王武子輩詩貴道家之言爰洎江表玄風尚備真長仲祖桓庾諸公猶相襲世稱孫許彌善恬淡之詞晉徵士戴逵晉東陽太守殷仲文晉宋之際殆無詩乎義熙中以謝益壽殷仲文為華綺之冠殷不競矣宋尚書令傅亮季友文余常忽而不察今沈特進撰詩載其數首亦復平矣宋記室何長瑜羊曜璠宋詹事范曄詩乃不稱其才亦為鮮舉矣宋孝武帝宋南平王鑠宋建平王宏孝武詩彫文織綵過為精密為二藩希慕見稱輕巧矣宋光祿謝莊希逸詩氣候清雅不逮於王袁然興屬閑長良無鄙促也宋御史蘇寶生宋中書令史陵修之宋典祠令任曇緒宋越騎戴法興蘇陵任戴並著篇章亦為搢紳之所嗟詠人非文才是愈甚可嘉焉宋監典事區惠恭惠恭本胡人為顏師伯幹顏為詩筆輒偷定之後造獨樂賦語侵給主被斥及大將軍修北第差充作長時謝惠連兼記室參軍惠恭時往共安陵嘲調末作雙枕詩以示謝謝曰君誠能恐人未重且可以為謝法曹造大將軍見之賞歎以錦二端賜謝謝辭曰此詩公作長所製請以錦賜之齊惠休上人齊道猷上人齊釋寶月惠休淫靡情過其才世遂匹之鮑照恐商周矣羊曜璠云是顏公忌照之文故立休鮑之論庾白二胡亦有清句行路難是東陽柴廓所造寶月嘗憩其家會廓亡因竊而有之郭子齎手本出都欲訟此事乃厚賂止之齊高帝齊征北將軍張永齊太尉王文憲齊高帝詩詞藻意深無所云少張景云雖謝文體頗有古意至如王師文憲既經國遠圖或忽是雕蟲齊黃門謝超宗齊尋陽太守丘靈鞠齊給事中郎劉祥齊司徒長史檀超齊正員郎鐘憲齊諸暨令顏則齊秀才顧則心詩檀謝七君並祖襲顏延欣欣不倦得士大夫之雅致乎余從祖正員常云大明泰始中鮑休美文殊以動俗惟此諸人傅顏陸體用固執不如顏諧諸暨最荷家聲齊參軍毛伯成齊朝請吳邁遠齊朝請許瑤之詩伯成文不全佳亦多悵惆吳善於風人答贈許長於短句詠物湯遠休謂遠云吾語可為汝詩父以訪謝光祿云不然爾湯可為庶況齊鮑令暉齊韓蘭英令暉歌詩往往嶄絕清巧擬古尢勝惟百願淫矣照常答孝武云臣妹才自亞於左芬臣才不及太沖爾蘭英綺密甚有名篇又善談笑齊武謂韓云借使二媛生於上葉則玉階之賦紈素之辭末詎多也齊司徒長史張融齊詹事孔稚珪思光紆緩放縱有乖文體然亦捷疾豐饒差不局促德璋生於封谿而文為雕飾青於監矣齊寍朔將軍王融齊中庶子劉繒元長士章並有盛才詞美英淨至於五言之作幾乎尺有所短譬應變將略非武侯所長未足以貶臥龍齊僕射江祐詩猗猗清潤弟祀明靡可懷齊記室王屮齊綏遠太守卞彬齊端溪令卞錄王屮二卞詩並愛奇嶄絕慕袁彥伯之風雖不弘綽而文體剿淨去平美遠矣齊諸暨令袁嘏詩平平耳多自謂能常語徐太尉云我詩有生氣須人捉著不爾便飛去齊雍州刺史張欣泰梁中書郎范縝詩欣泰子真並希古勝文鄙薄俗製賞心流亮不失雅宗梁秀才陸厥觀厥文緯具識丈夫之情狀自製未優非言之失也梁常侍虞羲梁建陽令江洪子陽詩奇句清拔謝朓常嗟頌之洪雖無多亦自能迥出梁步兵鮑行卿梁晉陵令孫察行鄉少年甚擅風謠之美察最幽微而感賞至到耳
