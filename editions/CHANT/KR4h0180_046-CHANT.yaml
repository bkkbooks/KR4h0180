body:
  text: 陶弘景雲上之仙風賦縹緲遙裔亘碧海而颺朝霞凌青煙而溥天際出龍門而激水度葱關以飛雪於是漢區動御月軌驚文浮虛入景登空汎雲一舉萬里曾不浹辰此列子有待之風也若乃緜括宇宙包絡天維周流八極迴還四時氣值節而動律位涉巽而離箕徒見去來之緒莫測終始之期此太虛無為之風也蓺文類聚七十八水仙賦淼漫八海汯汨九河中天起浪分地瀉波東卷長桑日窟西斡龍築月阿迺者潼關不壅石門已開導江出漢浮濟達淮障渠水府包山洞臺娥英之所游往琴馮是焉去來或窮髮送鵬咸池浴日隨雲濯金漿之汧追霞採建木之實弄珠於淵客之庭卷綃乎鮫人之室此真敻矣至於碧巖無霧綠水不風飛軒紖鳳游𨊻駕鴻上朝紫殿還覲青宮進麾八老顧拂四童拊洞陰之磬張玄圃之璈酌丹穴之酹薦麟洲之肴安期奉棗王母送桃錦旌麗日羽衣拂霄又其英矣及秋水方至層濤架山各巡封隩來賚王言選奇於河侯之府出寶於驪龍之川夜光燭月洪貝充轅亦其瓌矣若夫層城瑤館縉雲瓊閣黃帝所以觴百神也塗山石帳天后翠幙夏禹所以集群臣也岷嶓交錯上貫井絡穹漢硱磳橫帶玉繩浸湯泉於桂渚涌沸壑於金陵崩沙轉石驚湍走沫絕壁飛流萬丈懸瀨奔激芒碭之間馳騖壺口之外逮乎璇綱運極九六數翻用謀西漢受事龍門小周姒後初會媯前平陰鉅鹿再化為淵清河渤海三成桑田撫二儀以惻愴眺萬兆以流連僉自安於蝣晷編無羨於鵠年皆松下之一物又奚足以語仙嗟乎循有生之造物固莫靈於在人寧不踵武於象帝入妙門而自賓苟淪形而無曉與螻蟻而為塵亦有先覺之秀獨往之英窺若士於蒙穀求呂梁於石城從務光於砥柱索龍威於洞庭迎九玄於金闕謁三素於玉清更天地而彌固終逍遙以長生道藏尊字號陶隱居集蓺文類聚七十八授陸敬游十賚文隱居先生遣總事弟子戴垣秉策執簡膝授前學弟子吳郡陸敬游建連石之邑為栖靜處士策文曰咨爾敬游昔我紆紱帝闈侍笏梁席雖迹混教途而心標逸境芝田之想無忘曉夜濠潁之志歲月已深至德有鄰風雲相會爾之來也爰移兩春於是褫帶青墀掛冠朱闕攜手東驅創居茲嶺脈潤通水徙石開基登崖斲榦越壟負卉筋力盡於登築氣血疲乎趨走肌色憔悴不以暴露為苦心魂空慊寍顧饑寒之獘棟宇既立載罹霜暑于時七稔經始甫訖今日之安爾有勤焉君子不獨居其榮仁人必與物同泰是用邑爾長阿北阪積金山連石之鄉方七十步澗水屬焉茂爾嘉業永為華陽上賓爾其莅之爾以誠愨為性恬澹為情質直居本沈重樹志不邀世才高謝時俗權謀詭譎非意所欲今故賚爾為栖靜處士可謂因德立號克終斯美爾基架館境營劃援域堂壇宏敞樓路通嚴官私行止竝有栖憩繕築之勞莫匪爾力今故賚爾四霤飛軒廂廊側屋可以安身靜臥顯祗遐福爾奉上惟勤接下以惠稼穡艱難備嘗勞苦貨殖之宜允贍糧服手足胼胝未獲告休櫛風沐雨於焉尤切今故賚爾蒼頭一人厥名多益可以傳代薪水省息劬劇爾族惟舊緒身乃邦聞道雖一貫事望宜分今故賚爾鋼鐵如意可以揮對賓僚即名立事爾崇教惟善法無偏執器服表用爰寄玩習今故賚爾笻竹錫杖可以振動三界精祗憚響爾期誠玄契遐想靈風至懷所詣因心則通今故賚爾香鑪一枚熏陸副之可以騰煙紫閣昭感上司爾澡形潔藏肴糧既去宣導松朮實資芳醑今故賚爾杯盤一具可以夕挹桂漿朝承菊露爾敬事經誥遵尚楷模翰墨之用於是乎在今故賚爾大硯一面紙筆副之可以臨文寫字對真受言爾真心內固清行外彰滌蕩紛穢表裏雪霜今故賚爾鍮石澡灌手巾為副可以登齋朝拜出入盥漱今賚爾十事事準前史可對揚嘉策循言求理無或驕惰以騫斯旨援筆申懷敢告處士本集解官表臣聞堯風沖天潁陽振飲河之談漢德括地商陰峻餐芝之氣臣棲遲早日簪帶久年仕豈留榮學非待祿恒思懸纓象闕孤耕壟下席月澗門橫琴雲際始奉中恩得遂丘壑今便滅影桂庭神交松友一出東關故鄉就望睠然興念臨波瀉淚臣舟棹已遄無緣躬詣不任攀戀之誠謹奉表以聞本集與梁武帝論書第一啟奉旨左右中書復稍有能者惟周喜贊夫以含心之荄實伺夾鍾吐氣今既自上體妙為下理用成工每惟申鍾王論於天下進藝方興所恨臣沈朽不能鑽仰高深自懷歎慕前奉神筆三紙并今為五非但字字注目乃畫畫抽心日覺遒媚轉不可說以讎昔歲不復相類正此即為楷式何復多尋鍾王臣心本自敬重今者彌增愛服俯仰悅豫不能以不啟適復蒙給二卷伏覽標帖皆如聖旨既不顯垂允少留不敢久停已就摹者一段未畢不赴今信紙卷先已經有兼多他雜無所復取亦請伺俱了日奉送兼此諸書是篇章體臣今不辨復得脩習惟願細書如樂毅論太師箴例依倣以寫經傳永存冥顯中精要而已與梁武帝論書第二啟樂毅論愚心近甚疑是摹而不敢輕言今旨以為非真竊自信頗涉有悟箴詠吟贊過為淪弱許靜素段遂蒙永給仰銘矜獎益無以喻如此書雖不在法例而致用理均背間細楷兼復兩玩先於都下偶得飛白一卷云是逸少好跡臣不嘗別見無以能辨惟覺勢力驚絕謹以上呈於臣非用脫可充閣願仍以奉上臣昔於馬澄處見逸少正書目錄一卷澄云右軍勸進洛神賦諸書十餘首皆作今體惟急就章二篇古法緊細近脫憶此語當是零落已不復存澄又云帖註出裝者皆擬賚諸王及朝士臣近見三卷首帖亦謂已久分本不敢議此正復希於三卷中一二條更得預出裝之例耳天旨遂復頓給先卷下情益深悚息近初見卷題云二十三四已欣其多今者賜書第至二百七十惋訝無已天府如海非一缾所汲良用息心前後都已蒙見大小五卷於野拙之分寔以過幸若非殊恩豈可觖望愚固本博涉而不能精昔患無書可看乃願作主書令史晚愛隸法又羨典掌之人嘗言人生數紀之內識解不能周流天壤惟充恣五欲實可愧恥每以為得作才鬼亦當勝於頑仙至今猶然使欲翻之自無射以後國政方殷山心歉默不敢復以虛閒塵觸謹於此題事遂成煩黷伏願聖慈照錄誠慊與梁武帝論書第三啟第一卷中有雜跡謹疏注如別恐未允愚衷并竊所摹者亦以上呈近十餘日精慮悚悸無寧涉事遂至淹替不宜復待填畢餘條竝非用唯叔夜威輦二篇是經書體式追以單郭為恨伏按卷上第數甚為不少前旨惟有四卷此似是宋元嘉中撰集當由自後多致散失逸少有名之迹不過數首黃庭勸進像贊洛神此等不審猶得存不第二十三卷今見有十二條在別紙按此卷是右軍書者惟有八條前樂毅論書乃極勁利而非甚用意故頗有壞字太師箴大雅吟用意甚至而更成小拘束乃是書扇頭屏風好體其餘五片無的可稱臣濤言一紙給事黃門一紙治廉瀝一紙後又治瀝狸骨方一紙右四條非右軍書第二十四卷今見有二十一條在按此卷是右軍書者唯有十一條皆非甚合迹兼多漫抹於摹處難復委曲前黃初三年一紙繆襲告墓文一紙抱懷幽痛一紙五月十一日一紙尚想黃綺一紙遂結滯一紙不復展一紙便復改月一紙五月十五日繇白一紙治效方一紙右十條非右軍書伏恐未垂許以區別今謹上如別比方即可知王珉張翼張澄謝安書公家應有與梁武帝論書第四啟伏覽書前意雖止二六而規矩必周後書不出二百亦襃貶大備一言以蔽便書情極頓使元常老骨更蒙榮造子敬懦肌不沈泉夜唯逸少得進退其間則玉科顯然可觀若非聖證品析恐愛附近習之風永遂淪迷矣伯英既稱草聖元常亦自隸絕論旨所謂殆同一機神寶曠世莫繼斯理既明諸畫虎之徒當自就輟筆反古歸真方弘盛世愚管見預聞喜佩無屆比世皆尚子敬書元常繼以齊代名實脫略海內非唯不復知有元常於逸少亦然非排棄所可黜涅而不淄不過數族今奉此論自舞自蹈未足逞泄願以所摹竊示洪遠思曠此二人皆是均思者必當贊仰踴躍有盈半之益臣與洪遠雖不相識從子翊以學往來因之有會但既在閣恐或已應聞知摹者所裝字大小不甚均調郭看乃尚可恐筆意大殊此篇方傳千載故宜令跡隨矣所奉三旨伏循字跡大覺勁密竊恐既以言發意意則應言而心隨意運手與筆會故益得諧稱下情歡仰寶奉愈至世論咸云江東無復鍾跡常以歎息皆佇望中原廓清太丘之碑可就摹採今論旨云真跡雖少可得而推是猶有存者不審可復幾字既無出見理冒願得工人摹填數行脫蒙見賜寔為過幸又逸少學鍾勢巧形密勝於自運不審此例復有幾紙來旨以黃庭像贊等諸文可更有出給理自運之迹今不復希請學鍾妙仰惟殊恩與梁武帝論書第五啟逸少自吳興以前諸書猶未稱凡厥好迹皆是向會稽時永和十許年中者從失郡告靈不仕以後略不復自書皆使此一人世中不能別見其緩異呼為末年書逸少亡後子敬年十七八全倣此人書故遂成與之相似今聖旨標顯足使眾識頓悟於逸少無末年之譏阮研近聞有一人學研書遂不復可別臣比郭摹所得雖麤寫字形而無復其用筆跡勢不審前後諸卷一兩條謹密者可得在出裝之例復蒙垂給至年末間否此澤自天直以啟審非敢必覬並法書要錄進周氏冥通記啟弘景啟去十月將末忽有周氏事既在齋禁無由即得啟聞今謹撰事跡凡四卷如別上呈但某覆障疑網不早信悟追自悼咎分貽刻責淵文以具陳述伏願宥以闇惰謹啟本集與從兄書仕宦期四十左右作尚書郎即抽簪高邁今三十六方作奉朝請頭顱可知不如早去本集與親友書疇昔之意不願處人閒年登四十畢志山藪今已三十六矣時不我借知幾其神乎毋為自苦也本集荅謝中書書山川之美古來共談高峰入雲清流見底兩岸石壁五色交輝青林翠竹四時俱備曉霧將歇猿鳥亂鳴夕日欲頹沈鱗競躍實是欲界之仙都自康樂以來未復有能與其奇者蓺文類聚三十七荅虞中書書栖六翮於荊枝望綺雲於青漢者有日于茲矣而春華來被草石開鮮辭動情端志交衿曲信知鄰德之談無虛往牘夫子雖迹纏朱閣而心期岱嶺豈但散髮乎高岫似將飛霜於絕谷良為欽哉野人幸得託形崇阜息影長林每對月流歎臨風軫慨徒事累可豁而髮容難待自非齊生死於一致者能不心熱者乎舉世悠悠孰云同此倘遇知己相與共憂朅來虞公茲焉可邁何為栖栖空勞鼓缶迨及暇日有事還童不亦皎潔當年而無忸前脩也蓺文類聚三十七荅趙英才書子架學區中飛才甸外不肯掃門覓仕復懶彈鋏求通故偃蹇園巷從容郊邑昔所謂傲賓者此其是乎巖下鄙人守一介之志非敢蔑榮嗤俗自致雲霞蓋任性靈而直往保無用以得閒壟薪井汲樂有餘歡切松煮朮此外何務然亦以天地棟宇萬物同於一化死生善惡未之能聞蓺文類聚三十七荅朝士訪仙佛兩法體相書初梁諸朝士大夫問曰嘗竊觀仙書輒嗟欣忘倦徒羨其文莫測其理尋七尺之體既同稟太始俱服五常以何因緣獨超青雲而獘金石者乎先生領袖玄門學窮仙苑必有以竭其川岸請略聞雅說隱居荅曰至哉嘉訊豈蒙生所辯雖然試言之若直推竹柏之匹桐柳者此本性有殊非今日所論若引庖刀湯稼從養溉之功者此又止其所從終無永固之期夫得仙者竝有異乎此但斯族復有數種今且談其正體凡質象所結不過形神形神合時則是人是物形神若離則是靈是鬼其非離非合佛法所攝亦離亦合仙道所依今問以何能而致此仙是鑄煉之事極感變之理通也當埏埴以為器之時是土而異於土雖燥未燒遇濕猶壞燒而未熟不久尚毀火力既足表裏堅固河山可盡此形無滅假令為仙者以藥石煉其形以精靈瑩其神以和氣濯其質以善德解其纏眾法共通無礙無滯欲合則乘雲駕龍欲離則尸解化質不離不合則或存或亡於是各隨所業脩道進業漸階無窮教功令滿亦畢竟寂滅矣蓺文類聚七十八荅玄中寺釋曇巒書去月耳聞音聲茲辰眼受文字將由頂禮歲積故使真應來儀正爾整拂藤蒲具陳花水端襟歛思佇聆警錫也續高僧傳山誌倦世情之易撓迺杖策而尋山既沿幽以達峻寔窮阻而備艱渺游心其未已方際夕乎雲根欣夫得志者忘形遺形者神存於是散髮解帶盤旋巖上心容曠朗氣宇調暢玄雖遠其必存累無大而不忘害馬之獘既去解牛之刀乃王物我之情雖均因以濟吾之所尚也若夫飛聲西岳邀利東陵楚湘之潔吳江之矜輕死重氣名貴於身迷真晦道余所弗承襲衣縫掖端委章甫徘徊廊廟趨翔庭宇傳氏百王流芳世緒負德叨榮吾未敢許爾乃荊門晝掩蓬戶夜開室迷夏草徑惑春苔庭虛月映琴響風哀夕鳥依簷暮獸爭來時復歷近壟尋遠巒坐盤石望平原日負嶂以共隱月披雲而出山風下松而含曲泉瀠石而生文草𧆑𧆑以拂露鹿飆飆而來群捫虛蘿以入谷傍洪潭而比清照石壁以端色攀桂枝而齊貞亟扈蘭而佩蕙及春鴂之未鳴且含懷以屏氣待蕙風而舒情乃乘興而遂往遵巖路以遠游佇天維而標思憋怳忽而莫求眺回江之淼漫眩疊嶂之相稠日斜雲而色黛風過水而安流觸嶔巖而起巘值闊達而成洲石孤聳而獨絕岸懸天而似浮緣磴道其過半魂渺渺而無憂悟伯昏之倜宕躡千仞而神休遂乃凌巖峭至松門背通林面長源右聯山而無際左憑海而齊天竹泫泫以垂露柳依依而迎蟬鷗雙雙而赴水鷺軒軒而歸田赴水兮汎濫歸田兮翱翔此漭濫之足樂意斯齡之不長悼菌蟪之危促羨靈椿兮未央雖鵬鷃之異類託逍遙乎一方願敷衽以遠訴思扣朝而陳辭至赤城兮一憩遇王子而宿之仰彭狷兮弗遠必長年兮可期及榆光之未暮將尋山而採芝去採芝兮入深澗深澗幽兮路窈窕窈窕路兮終無曙深澗深兮未曾曉高松上兮亟停雲低蘿下兮屢迷鳥鳥迷蘿兮繽繽雲停松兮紛紛停雲游兮安泊離鳥棲兮索群嗟群泊其無所思參差而誰聞既窮目以無閡問漁人以前路指示余以蓬萊曰果爾以尋山之志館爾以招仙之臺就瀛水以通懷謂萬感其已會亦千念而必諧竟莫知其所躋反無形於寂寞長超忽乎塵埃道藏尊字陶隱居集蓺文類聚三十六
