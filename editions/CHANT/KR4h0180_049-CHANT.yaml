body:
  text: 何佟之上言改正三夏案周禮王出入則奏王夏尸出入則奏肆夏牲出入則奏昭夏今樂府之夏唯變王夏為皇夏蓋緣奏漢以來稱皇故也而齊氏仍宋儀注迎神奏昭夏皇帝出入奏永至牲出入更奏引牲之樂其為舛謬莫斯之甚請下禮局改正隋書音樂志上天監初北中郎司馬何佟之上言亥日藉田議少牢饋食禮云孝孫其來日丁亥用薦歲事于皇祖伯某注云丁未必亥也直舉一日以言之耳禘太廟禮日用丁亥若不丁亥則用己亥辛亥苟有亥可也鄭又云必用丁巳者取其令名自丁寍自變改皆為謹敬如此丁亥自是祭祀之日不專施於先農漢文用此日耕藉祠先農故後王相承用之非有別義南齊書禮志上永明三年助教何佟之議社稷位向議案禮記郊特牲社祭土而主陰氣也君南向於北墉下荅陰之義也鄭玄云荅猶對也北墉社內北墻也王肅云陰氣北向故君南向以荅之荅之為言是相對之稱知古祭社北向設位齋宮南向明矣近代相承帝社南向太社及稷竝東向而齋官位在帝社壇北西向於神背後行禮又名稷為稷社甚乘禮意未及知失在何時原此理當未久竊以皇齋改物禮樂惟新中國之神莫貴於社若遂仍前謬懼虧盛典謂二社語其義則殊論其神則一位竝宜北向稷若北向則成相背稷是百穀之總神非陰氣之主宜依先東向齋官立社壇東北南向立東為上諸執事西向立南為上稷依社無兼稱今若欲尊崇正可名為太稷耳豈得謂為稷社邪臘祠太社日近案奏事御改定儀注南齊書禮志上永明十一年兼祠部郎何佟之議又見通典四十五釋治禮學士難社稷位向議來難引君南向荅陽臣北向荅君敢問荅之為言為是相對為是相背相背則社位南向君亦南向可如來議郊特牲云臣之北向荅君復是君背臣今言君南臣北向相稱荅則君南不得稱荅矣記何得云祭社君南向以荅陰邪社果同向則君亦宜西向何故在社南向在郊西向邪解則不然記云君之南向荅陽此明朝會之時盛陽在南故君南向對之猶聖人南面而聽向明而治之義耳寍是祈祀天地之日乎知祭社北向君荅故南向祀天南向君荅宜北向矣今皇帝黑瓚階東西向者斯蓋始入之別位兆接對之時也案記云社所以神地之道也又云社祭土而主陰氣又云不用命戮干社孔安國云社主陰陰主殺傳曰日蝕伐鼓于社杜預云責群陰也社主陰氣之盛故北向設位以本其義耳餘祀雖亦地祇之貴而不主此義故位向不同不得見餘陰祀不北向便謂社應南向也案周禮祭社南向君求幽宜北向而記云君南向荅陰之義求幽之論不乖歟魏權漢社社稷同營共門稷壇在社壇北非古制後移宮南自當如靜此言乃是顯漢社失周法見漢世舊事爾時祭社南向未審出何史籍就如議者靜所言是祭社位南向仍漢舊法漢又襲周成規因而不改者則社稷三座竝應南向今何改帝社南向泰社及稷竝東向邪南齊書禮志上明堂配饗議周之文武尚推后稷以配天謂文皇宜推世祖以配帝雖事施於尊祖亦義章於嚴父焉南齊書禮志上隆昌元年祠部郎何佟之議戎服會哀議羔裘玄冠不以弔理不容以兵服臨喪宋泰始二年孝武大祥之日于時百寮入臨皆於宮門變戎服著衣帢入臨畢出外還襲戎衣南齊書禮志上海陵王薨百官會哀時纂嚴朝議疑戎服臨會祠部郎何佟之議喪未終不樂議昔舜受終文祖義非胤堯及放勛徂落遏密三祀近代晉康帝繼成帝于時亦不作樂懷帝永嘉元年惠帝喪制未終于時何充議云古帝王相承雖世及有異而輕重同禮南齊書禮志下建武二年朝會時世祖遏密未終朝議疑作樂不祠部郎何佟之議泄哀儀議春秋之旨臣子繼君親雖恩義有殊而其禮則一所以敦資敬之情篤方喪之義主上雖仰嗣高皇嘗經北面世祖方今聖厤御宇垂訓無窮在三之恩理不容替竊謂世祖祥忌至尊宜弔服升殿群臣同致哀感事畢百官詣宣德宮拜表仍致哀陵園以引追遠之慕南齊書禮志下建武二年祠部郎何佟之議奏南北郊牲色議案周禮大宗伯以蒼璧禮天黃琮禮地鄭玄又云皆有牲幣各放其器之色知禮天圓丘用玄犢禮地方澤用黃牲矣牧人云凡陽祀用騂牲陰祀用黝牲鄭玄云騂赤黝黑也陽祀祭天南郊及宗廟陰祀祭地北郊及社稷祭法云燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢鄭云地陰祀用黝牲與天俱用犢故連言之耳知此祭天地即南北郊矣今南北兩郊同用玄牲又明堂宗廟社稷俱用赤有違昔典又鄭玄云祭五帝於明堂勾芒等配食自晉以來并圜丘於南郊是以郊壇列五帝勾芒等今明堂祀五精更闕五神之位北郊祭地祇而設重黎之坐二三乖舛懼虧盛則南齊書禮志上建武二年祠部郎何佟之奏釋劉繪難南北郊牲色議周禮以天地為大祀四望為次祀山川為小祀周人尚赤自四望以上牲色各以其方者以共祀大宜從本也山川以下牲色不見者以其祀小從所尚也則論禮二說豈不合符南齊書禮志上雩祭依明堂議周禮司巫云若國大旱則帥巫而舞雩鄭玄云雩旱祭也天子於上帝諸侯以下於上公之神又女巫云旱暵則舞雩鄭玄云使女巫舞旱祭崇陰也鄭眾云求雨以女巫禮記月令云命有司為民祈祀山川百原乃大雩帝用盛樂乃命百縣雩祀百辟卿士有益於民者以祈穀實鄭玄云陽氣盛而恆旱山川百原能興雲致雨者也眾水所出為百原必先祭其本雩吁嗟求雨之祭也雩帝謂為壇南郊之旁祭五精之帝配以先帝也自鞉鞞至柷敔為盛樂他雩用歌舞而已百辟卿士古者上公以下謂勾龍后稷之類也春秋傳曰龍見而雩止當以四月王肅云大雩求雨之祭也傳曰龍見而雩謂四月也若五月六月大旱亦用雩禮於五月著雩義也晉永和中中丞啟雩制在國之南為壇祈上帝百辟舞童八列六十四人歌雲漢詩皆以孟夏得雨報太牢于時博士議舊有壇漢魏各自討尋月令云命有司祈祀山川百原乃大雩又云乃命百縣雩祀百辟卿士則大雩所祭唯應祭五精之帝而已勾芒等五神既是五帝之佐依鄭玄說宜配食於庭也鄭玄云雩壇在南郊壇之旁而不辨東西尋地道尊右雩壇方郊壇為輕理應在左宜於郊壇之東營域之外築壇既祭五帝謂壇宜員尋雩壇高廣禮傳無明文案覲禮設方明之祀為壇高四尺用珪璋等六玉禮天地四方之神王者率諸侯親禮為所以教尊尊也雩祭五帝粗可依放謂今築壇宜崇四尺其廣輸仍以四為度徑四丈周員十二丈而四階也設五帝之位各以其方如在明堂之儀皇齊以世祖配五精於明堂今亦宜配饗於雩壇矣古者孟春郊祀祈嘉穀孟夏雩祭祈甘雨二祭雖殊而所為者一禮唯有冬至報天初無得雨賽帝今雖闕冬至之祭而南郊兼祈報之禮理不容別有賽荅之事也禮祀帝於郊則所尚省費周祭靈威仰若后稷各用一牲今祀五帝世祖亦宜各用一犢斯外悉如南郊之禮也武皇遏密未終自可不奏盛樂至於旱祭舞雩蓋是吁嗟之義既非存歡樂謂此不涉嫌其餘祝史稱辭仰祈靈澤而已禮舞雩乃使無闕今之女巫竝不習歌舞方就教試恐不應速依晉朝之議使童子或時取舍之宜也司馬彪禮儀志云雩祀著皁衣蓋是崇陰之義今祭服皆緇差無所革其所歌之詩及諸供須輒勒主者申攝備辨南齊書禮志上建武二年旱有司議雩祭依明堂祠部郎何佟之議景懿后遷登新廟車服議周禮王之六服大裘為上袞冕次之五車玉輅為上金輅次之皇后六服褘衣為上褕翟次之首飾有三副為上編次之五車重翟為上厭翟次之上公有大裘玉輅而上公夫人有副及褘衣是以祭統云夫人副褘立于東房也又鄭云皇后六服唯上公夫人亦有褘衣詩云翟茀以巿鄭以翟茀為厭翟侯伯夫人入廟所乘今上公夫人副褘既同則重翟或不殊矣況景皇懿后禮崇九命且晉朝太妃服章之禮同於太后宋代皇太妃唯無五十旗為異其外侍官則有侍中散騎常侍黃門侍郎散騎侍郎各二人分從前後部同於王者內職則有女尚書女長御各二人棨引同於太后又魏朝之晉王晉之宋王竝置百官擬於天朝至於晉文王終猶稱薨而太上皇稱崩則是禮加於王矣故前議景皇后悉依近代皇太妃之儀則侍衛陪乘竝不得異后乘重翟亦謂非疑也尋齊初移廟宣皇神主乘金輅皇帝親奉亦乘金輅先往行禮畢仍從神主至新廟今所宜依准也南齊書禮志上建武二年有司奏景懿皇后遷登新廟車服之儀祠部郎何佟之議朝日夕月議蓋聞聖帝明王之治天下也莫不尊奉天地崇敬日月故冬至祀天於員丘夏至祭地於方澤春分朝日秋分朝月所以訓民事君之道化下嚴上之義也故禮云王者必父天母地兄日姊月周禮典瑞云王搢大圭執鎮圭藻藉五采五就以朝日馬融云天子以春分朝日秋分夕月覲禮天子出拜日於東門之外慮植云朝日以立春之日也鄭玄云端當為冕朝日春分之時也禮記朝事議云天子冕而執鎮圭尺有二寸率諸侯朝日於東郊所以教尊尊也故鄭知此端為冕也禮記保傅云三代之禮天子春朝朝日秋暮夕月所以明有敬也而不明所用之定辰馬鄭云用二分之時盧植云用立春之日佟之以為日者太陽之精月者太陰之精春分陽氣方永秋分陰氣向長天地至尊用其始故祭以二至日月禮次天地故朝以二分差有理據則融玄之言得其義矣漢世則朝朝日暮夕月魏文帝詔曰覲禮天子拜日東門之外反禮方明朝事議曰天子冕而執鎮圭率諸侯朝日於東郊以此言之蓋諸侯朝天子祀方明因率朝日也漢改周法群公無四朝之事故不復朝於東郊得禮之變矣然旦夕常於殿下東向拜日其禮太煩今採周春分之禮損漢日拜之儀又無諸侯之事無所出東郊今正殿即亦朝會行禮之庭也宜常以春分於正殿之庭拜日其夕月文不分明其議奏魏祕書監辥靖論云舊事朝日以春分夕日以秋分案周禮朝日無常日鄭玄云用二分故遂施行秋分之夕月多東潛而西向拜之背實遠矣謂朝日宜用仲春之朔夕月宜用仲秋之朔淳于睿駮之引禮記云祭日於東祭月於西以端其位周禮秋分夕月竝行於上世西向拜月雖如背實亦猶月在天而祭之於坎不復言背月也佟之案禮器云為朝夕必放於日月鄭玄云日出東方月出西方又云大明生於東月生於西此陰陽之分夫婦之位也鄭玄云大明日也知朝日東向夕月西向斯蓋各本其位之所在耳猶如天子東西遊幸朝堂之官及拜官者猶北向朝拜寍得以背實為疑邪佟之謂魏世所行善得與奪之衷晉初棄員丘方澤於兩郊二至輟禮至於二分之朝致替無義江左草創舊章多闕宋氏因循未能反古竊惟皇齊應天御極典教惟新謂宜使盛典行之盛代以春分朝於殿庭之西東向而拜日秋分夕於殿庭之東西向而拜月此即所謂必放日月以端其位之義也使四方觀化者莫不欣欣而頌義旒藻之飾蓋本天之至質也朝日不得同昊天至質之禮故玄冕三旒也近代祀天著袞十二旒極文章之義則是古今禮之變也禮天朝日既服宜有異頃世天子小會著絳紗袍通天金博山冠斯即今朝服之次袞冕者也竊謂宜依此拜日月甚得差降之宜也佟之任非禮局輕奏大典寔為侵官伏追慚震南齊書禮志上永元元年步兵校尉何佟之讓又見通典四十四明堂配饗又議案祭法有虞氏禘黃帝而郊嚳祖顓頊而宗堯周人禘嚳而郊稷祖文王而宗武王鄭玄云禘郊祖宗謂祭祀以配食也禘謂祀昊天於圜丘也祭上帝於南郊曰祭祀五帝五神於明堂曰祖宗郊祭一帝而明堂祭五帝小德配寡大德配眾王肅云祖宗是廟不毀之名果如肅言殷有三祖三宗竝應不毀何故止稱湯契且王者之後存焉舜寍立堯頊之廟傳世祀之乎漢文以高祖配泰畤至武帝立明堂復以高祖配食一人西配有乖聖典自漢明以來未能反者故明堂無兼配之祀竊謂先皇帝列二帝於文祖尊新廟為高宗竝世祖而泛配以申聖主嚴父之義先皇於武皇倫則第為季義則經為臣設配饗之坐應在世祖之下竝列俱西向南齊書禮志上永元二年佟之又建議又釋王摛難明堂配饗議孝經是周公居攝時禮祭法是成王反位後所行故孝經以文王為宗祭法以文王為祖又孝莫大於嚴父配天則周公其人也尋此旨寍施成王乎若孝經所說審是成王所行則為嚴祖何得云嚴父邪且思文是周公祀后稷配天之樂歌我將是祀文王配明德之樂歌若如摛議則此二篇皆應在復子明辟之後請問周公祀后稷文王為何所歌又國語云周人禘嚳郊稷祖文王宗武王韋昭云周公時以文王為宗其後更以文王為祖武王為宗尋文王以文治而為祖武王以武定而為宗欲明文亦有大德武亦有大功故鄭注祭法云祖宗通言耳是以詩云昊天有成命二后受之注云二后文王武王也且明堂之祀有單有合故鄭云四時迎氣於郊祭一帝還於明堂因祭一帝則以文王配明一賓不容兩主也享五帝於明堂則泛配文武泛之為言無的之辭其禮既盛故祖宗竝配南齊書禮志上永元二年佟之建議與王摛不同佟之又議毀墓服議改葬服緦見柩不可無服故也此止侵墳土不及於椁可依新宮火災三日哭服而已隋書禮儀志三天監元年齊臨川獻王所生妾謝墓被發不至埏門蕭子晉傳重禮官何佟之議又見通典一百二齋日六門斷哭議案禮國門在皋門外今之籬門是也今古殊制若禁凶服不得入籬門為大遠宜以六門為斷隋書禮儀志二天監三年都令史王景之列自江左以來郊廟祭祀帝巳入齊百姓尚哭以為乖禮佟之等議祭服除絳絝議公卿以下祭服裏有中衣即今之中單也案後漢輿服志明帝永平二年初詔有司採周官禮記尚書乘輿服從歐陽說公卿以下服從大小夏侯說祭服絳緣領袖為中衣絳絝襪示其赤心奉神今中衣絳緣足有所明無俟於絝既非聖法請不可施隋書禮儀志六天監三年何佟之議遂依議除之又見通典六十一禘祫及功議禘於首夏物皆未成故為小祫於秋冬萬物皆成其禮尤大司勳列功臣有六皆祭於大蒸知祫尤大乃及之也近代禘祫並不及功臣有乖典制宜改隋書禮儀志二天監三年尚書左丞何佟之議詔從之又見通典五十郊祭議今之郊祭是報昔歲之功而祈今年之福故取歲首上辛不拘立春之先後周冬至於圓丘大報天也夏正又郊以祈農事故有啟蟄之說自晉太始二年并圓丘方澤同於二郊是知今之郊禋禮兼祈報不得限以一途也隋書禮儀志一天監三年左丞吳操之啟稱傳云啟蟄而郊郊應立春之後尚書左丞何佟之議郊壇器席議案禮祭器弊則埋之今一用便埋費而乖典隋書禮儀志一天監三年有司以為祀竟器席相承還庫請依典燒埋之佟之等議又見通典四十二省牲牽牲割牲議案禮未祭一日大宗伯省牲鑊祭日之晨君親牽牲麗碑後代有冒暗之防而人主猶必親奉故有夕牲之禮頃代人君不復躬牽相承丹陽尹牽牲於古無取宜依以未祭一日之暮太常省牲視鑊祭日之晨使太尉牽牲出入也少牢饋食殺牲於廟門外今儀注詣廚烹牲謂宜依舊隋書禮儀志二天監四年何佟之議帝可其奏郊不宜祼啟案鬯者盛以六彝覆以畫幕備其文飾施之宗廟今南北二郊儀注有祼既乖尚質謂宜革變隋書禮儀志一通典四十二天監三年郊祀欑題啟周禮天曰神地曰祇今天不稱神地不稱祇天欑題宜曰皇天座地欑宜曰后地座又南郊明堂用沈香取本天之質陽所宜也北郊用上和香以地於人親宜力雜馥隋書禮儀志一天監四年佟之云帝竝從之通典四十二作啟
