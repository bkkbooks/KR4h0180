body:
  text: 劉緩照鏡賦夜籌已歇曉鐘將絕窗外明來帷前影滅荊王欲起侍妾應還前齋上幔內閣除關開屏易疊捲簾難攀握頭斂髻釵子縈鬟階邊就水盤中光映訝宿粉之猶調笑殘黃之不正欲開奩而更飾乃當窗而取鏡臺本王官氏姓溫背後銘文宜子孫四面迴風若流水句欄𠥕匝似城闉分明似無礙影前彌可愛近來顏色不須紅即時好眉猶約黛世閒好鏡自無多唯聞一箇比姮娥曾經玉女照屢被仙人磨光明粉可憐論時不假著法用自應須夏天金薄漠秋日寶茱萸銀纏辟鬼呪翠厄護身符空處宜應描非是畏釵梳蓺文類聚七十奏請用祖沖之甲子元厤臣先在晉已來世居此職仰尋黃帝至今十二代厤元不同周天斗分疏密亦異當代用之各垂一法宋大明中臣先人攷古法以為正厤垂之于後事皆符驗不可改張隋書律厤志中天監三年下詔定厤祖𣈶奏奏改厤宜在來正史官今所用何承天厤稍與天乖緯緒參差不可承案被詔付靈臺與新厤對課疏密前期百日竝又再申始自去冬終於今朔得失之效竝已月別啟聞夫七曜運行理數深妙一失其源則歲積彌爽所上脫可施用宜在來正隋書律厤志中天監八年十一月𣈶奏渾天論自古論天者多矣而群氏紛紜互相非毀竊覽同異稽之典經仰觀辰極傍矚四維覩日月之升降察五星之見伏校之以儀象覈之以晷漏則渾天之理信而有徵輒遺眾說附渾儀云考靈曜先儒求得天地相去十七萬八千五百里以晷景驗之失于過多既不顯求之術而虛設其數蓋誇誕之辭非聖人之旨也學者多因其說而未之革豈不知尋其理歟抑未能求其數故也王蕃所攷較之前說不啻減半雖非揆格所知而求之以理誠未能遙趣其實蓋近密乎輒因王蕃天高數以求冬至春秋分日高及南戴日下去地中數法令表高八尺與冬至景長一丈三尺各自乘并而開方除之為法天高乘表高為實實如法而一得四萬二千六百五十八里有奇即冬至日高也以天高乘冬至景長為實實如法得六萬九千三百二十里有奇即冬至南戴日下去地中數也求春秋分數法令表高及春秋分景長五尺三寸九分各自乘并而開方除之為法因冬至日高實而以法除之得六萬七千五百二里有奇即春秋分日高也以天高乘春秋分景長為實實如法而一得四萬五千四百七十九里有奇即春秋分南戴日下去地中數也南戴日下所謂丹穴也推北極里數法夜于地中表南傅地遙望北辰紐星之末令與表端參合以人目去表數及表高各自乘并而開方除之為法天高乘表高數為實實如法而一即北極細星高數也天高乘人目去表為實實如法即去北戴極下之數也北戴斗極為空桐日去赤道表裏二十四度遠寒近暑而中和二分之日去天頂三十六度日去地中冬夏春秋辰昏晝夜皆同度也而有寒暑者地氣上騰天氣下降故遠日下寒近日下暑非有遠近也猶火居上雖遠而炎在旁雖近而微視日在旁而太居上而小者仰矚為難平觀為易也由視有夷險非遠近之效也今懸珠于百仞之上或置之于百仞之前從而觀之則大小殊形先儒弗斯取驗用繁翰墨夷途頓轡雄辭折辨不亦迂哉今大寒在冬至後二氣者寒積而不消也大暑在夏至後二氣者暑積而未歇也寒暑均和乃在春秋分後二氣者寒暑積而不平也譬之火始入室而未甚溫弗事加薪久而愈熾既移遷之猶有餘熱也月行有中道有陰道有陽道如姜岌說周髀云日徑千二百五十里蓋天乖謬已詳前識無足采焉以渾象言之失于過大矣張衡日月共徑當天周七百三十六分之一地廣二百三十二分之一案此而論天周分母圓周率也地廣分母圓徑率也以八約之得周率九十二徑率二十九其率傷于周多徑少衡之疏也衡以日月之徑居一度之半又言八極之維既非攷定日月之徑又不明其理飾辭華說不足窮覈者也望日月法立于地中以人目屬徑寸之營而望日月令日月大滿管孔及定管長以管徑乘天高管長除之即日月徑也月陰精也其形圓其質稟日之光而見其體日光不照則謂之魄故月望之月日月相望人居其閒盡觀其質故形圓也二弦二月日照其側人觀其旁故半魄半明也晦朔之月日照其表人在其裏故形不見舊說曰月行九道斯蓋未究月行之變而假為其說謹案著作郎張東對三道九行曰案漢天文志日有三道月有九行者謂日月行黃道為得其正或行黃道外或行黃道內內外及正行因名三道故曰房有四表三道日月經房星南門即為旱經房星北門為水日有三道者但內外差及正行之道也月有九行謂青道二出于黃道東赤道二出于黃道南白道二出于黃道西黑道二出于黃道北故鄭玄注月令立春春分日行青道月為之佐立夏夏至日行赤道月為之佐立秋秋分日行白道月為之佐立冬冬至日行黑道月為之佐故月之九行非為黃道外別有九道交橫繹絡貫于纏舍但為日月既為動物不能不小有盈縮或行黃道內外又案日月以立春合宿在營室即北方之星色當言黑春分宿日在奎奎為西方之宿色當言白而鄭玄言立春春分日行青道蓋以歲起于春春在于東東方色青故起青號南西及北三方準此故知日月共有三道實無九行但以因八節之差順四時之色曲為立名故月行言九直舉其實故日道稱三三道九行其義一也則云日之三道躔于二十八宿月之九行經于八節宿隋書天文志上開元占經一姜岌此言非也星猶月稟日之光然後乃見若星在日裏則應盈魄今既不然故知星在日表而常明也案星體自有光曜非由稟日始明今星宿有時食月在魄中分明質見則是星行亦在月裏不專在表又姜岌承二燭為喻理亦迂迴非實驗也開元占經一推地中法先驗昏旦定刻漏分辰次乃立儀表于準平之地名日南表漏刻上水居日之中更立一表于南表影末名曰中表夜依中表以望北極樞而立北表今參相直三表皆以懸準定乃觀三表直者其立表之地即當子午之正三表曲者地偏僻每觀中表以知所偏中表在西則立表處在地中之西當更向東求地中若中表在東則立表處在地中之東也當更向西求地中取三表直者為地中之正又以春秋二分之日旦始出東方半體乃立表于中表之東名曰東表令東表與日及中表參相直是日之夕日入西方半體又立表于中表之西名曰西表亦從中表西望西表及日參相直乃觀三表直者即地南北之中也若中表差近南則所測之地在卯酉之南中表差在北則所測之地在卯酉之北進退南北求三表直正東西者則其地處中居卯酉之正也隋書天文志上祖𣈶錯綜經注以推地中其法云云定天論日一千六百七十里周天六十萬二百二十一里徑率求之得十九萬四千一百六十四里即天東西南北相去之數也求之得九萬七千六百里即春秋分日天去地之數也夏至日天去地上八萬一千三百九十四里冬至之日為天去地上十萬六千二十里也開元占經一應制旨推日行度數臣履等謹奉依敕旨案推厤法表景長短之差日行南北之道旁攷經記近較目前莫不事事符合昭然可見謹略條度如左日道圓周三百六十度分為十二辰辰三十度半春秋分出卯入酉冬至則出辰入申夏至則出寅入戌春秋分日出卯左右十五度冬至日出卯南去卯中二十四度則是侵辰九度夏至日出卯北去卯中二十四度則是侵寅九度春秋分日入酉左右亦各十五度當天之北五十五度北去黑山頂三十六度夏至日在天南十二度春秋分日在天南三十六度冬至日中日在天南五十度冬至日中日去金剛南三十度開元占經一斷景慈證母事啟案子之事親有隱無犯直躬證父仲尼為非景慈素無防閑之道死有明目之據陷親極刑傷和損俗凡乞鞫不審降罪一等豈得避五歲之刑忽死母之命景慈宜加罪辟隋書刑法志去天監三年八月建康女子任提女坐誘口當死其子景慈對鞫辭云母實行此是時法官虞僧虯啟稱云云又見通典一百六十七奏彈伏𣈶臣聞失忠與信一心之道已虧貌是情非兩觀之誅宜及未有陵犯名教要冒君親而可緯俗經邦者也風聞豫章內史伏𣈶去歲啟假以迎妹喪為解因停會稽不去入東之始貨宅賣車以此而推則是本無還意𣈶歷典二邦少免貪濁此自為政之本豈得稱功常謂人才品望居何遠之右而遠以清公見擢名位轉隆𣈶深誹怨形於辭色興居歎咤寤寐失圖天高聽卑無私不照去年十二月二十一日詔曰國子博士領長水校尉伏𣈶為政廉平宜加將養勿使恚望致虧士風可豫章內史豈有人臣奉如此之詔而不亡魂破膽歸罪有司擢髮抽腸少自論謝而循奉慠然了無異色𣈶識見所到足達此旨而冒寵不辭𠫤斯苟得故以士流解體行路沸騰辨跡求心無一可恕竊以𣈶踉蹡落魄三十餘年皇運勃興咸與維始除舊布新濯之江漢一紀之閒三世隆顯曾不能少懷感激仰荅萬分反覆拙謀成茲巧罪不忠不敬于斯已及請以𣈶大不敬論以事詳法應棄市刑輒收所近獄洗結以法從事如法所稱𣈶即主臣謹案豫章內史臣伏𣈶含疵表行藉悖成心語嘿一違資敬兼盡幸屬昌時擢以不次溪壑可盈志欲無滿要君東走豈曰止足之歸負志解巾異乎激處之致甘此脂膏孰非荼苦佩茲龜紀豈殊縲緤宜明風憲肅正簡書臣等參議請以見事免𣈶所居官凡諸位任一皆削除梁書伏𣈶傳陶隱居井欄記先生丹陽陶仕齊奉朝請壬申歲來山棲身高靜自號隱居同來弟子吳郡陸敬游其次楊王吳戴陳許諸生供奉階宇湖孰潘邏及遠近宗稟不可具記悠悠歷代詎勿識焉梁天監三年八月十五日錢塘陳宣懋記景定建康志魏通和好議高澄既新得志何事須和必是設閒故令貞陽遣使令侯景自疑當以貞陽易景景心不安必圖禍亂若許通好政是墮其計中且彭城去歲喪師渦陽復新敗退今便就和益示國家之弱和不可許南史傅琰傳太清二年檄凡諸部曲平使招攜投赴戎行前後行集霜戈電戟無非武庫之兵龍甲犀渠皆是雲臺之仗御覽二百九十九引三國典略肅明王僧辯書案肅明未審所謂必有脫誤據語意當是移檄文與貞陽侯淵明啟自秦兵寇陜臣便營赴援纔及下船荊城陷沒即遣劉周入國具表丹誠左右勳豪初並同契周既多時不還人情疑阻比冊降中使復遣諸處詢謀物論參差未甚決定始得侯瑱信示西寇權景宣書令以真跡上呈觀視將帥恣欲同泰若一朝仰違大國臣不辭灰粉悲梁祚永絕中興伏願陛下便事濟江仰藉皇齊之威憑陛下至聖之略樹君以長雪報可期社稷再輝死且非𠫤請押別使曹沖馳表齊都續啟事以聞伏遲拜奉在促梁書王僧辯傳重與貞陽侯啟員外常侍姜暠還奉敕伏具動止大齊仁義之風曲被鄰國䘏災救難申此大猷皇家枝戚莫不榮荷江東冠冕俱知憑賴今歃不忘信信實由衷謹遣臣第七息顯顯所生劉并弟子世珍往彼充質仍遣左民尚書周弘正至歷陽奉迎艫舳浮江俟一龍之渡清宮丹陛候六傳之入萬國傾心同榮晉文之反三善克宣方流宋昌之議國祚既隆社稷有奉則群臣竭節報厚施于大齊戮力展愚效忠誠于陛下今遣吏部尚書王通奉啟以聞梁書王僧辯傳荅許亨省告承有朝授良為德舉卿操尚惇深文蓺該洽學優而官自致青紫況久羈駿足將成頓轡匡輔虛闇期寄實深既欣遊處用忘勞屈而枳棘栖鵷常以增歎夕郎之選雖為清顯位以才升差自無愧且卿始云知命方騁慶衢未有執戟之疲便深夜行之慨循復來翰殊用憮然古人相思千里命駕素心不昧寍限城闉存顧之深荒慚無已陳書許亨傳亨為太尉王僧辯從事中郎晉安王承制授給事黃門侍郎亨奉牋辭府僧辯荅在梁遺魏公卿百寮書魏室不造姦豎擅朝社稷阽危綴旒非譬元叉險慝狼戾人倫不齒屬籍疏遠素無聞望特以太后姻婭早蒙寵擢曾不懷音公行反噬肆茲悖逆人神同憤自頃境土所傳皆云叉狼心蠆毒藉權位而曰滋含忍諂詐與日月而彌甚無君之心非復一日篡逼之事旦暮必行抑又聞之夫名以出信信以制義山川隱疾且猶不以名成師兆亂巨君不臣求之史籍有自來矣元叉大名夜叉弟羅實名羅剎夜叉羅剎此鬼食人非遇黑風事同飄墮嗚呼魏境離此二災惡木盜泉不息不飲勝名梟稱不入不為況昆季此名表能噬物日露久矣始信斯言況乃母后幽辱繼主蒙塵釋位揮戈言謀王室不在今日何謂人臣諸賢或奕世載德或將相繼踵或受任累朝或職居機要或姻戚匪他或忠義是秉俛眉逆手見制凶威臣節未申徒有勤悴又聞自義專政億兆離德重以歲時災厲年年水旱牛馬殪踣桑柘焦枯饑饉相仍菜色滿道妖災告譴人皆歎息瀍澗西北羌戎陸梁泗汴左右戍漕流離加以剖散忠賢殲殄宗室哀彼本邦一朝橫漬今既率師將除君側區區之懷庶令冠屨得所大憝同必誅之戮魏祀無忽諸之非魏書元叉傳法僧反叛後樹遺公卿百寮書上孝明帝告急表臣忝守遐方變生慮表賊眾侜張所在彊盛統內城戍悉已陷沒近州之民亦皆擾叛唯獨州治僅存而已亡滅之期非旦則夕臣自思忖必是死人但恐不得謝罪闕庭既忝宗枝累辱不淺若死為鬼永曠天顏九泉之下實深重恨今募使閒行偷路奔告若臺軍速至猶希全保哭送使者不知所言魏書元法僧傳法僧為益州刺史合境皆反上表
