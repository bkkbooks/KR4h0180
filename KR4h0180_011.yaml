body:
  text: 簡文帝誡當陽公大心書汝年時尚幼所闕者學可久可大其唯學歟所以孔丘言吾嘗終日不食終夜不寢以思無益不如學也若使牆面而立沐猴而冠吾所不取立身之道與文章異立身先須謹重文章且須放蕩藝文類聚二十三與魏東荊州刺史李志書卿門世奕葉中州舊族自金天失馭帝鼎南遷衣冠播越不及俱邁豈可屈志羶戎久淪胡壤今皇師外掃天鉞四臨海蕩電飛雲蒸雨合所摧所剋是卿之具聞也且偽國沸騰四方幅裂主虐臣姦牝雞亂政若能早識事機翻歸有道豈直圖形長樂刻像鐘鼎時事易差相思勉勵但明月暗投昔人為誡鄰藩贈藥有可虛懷密驛輕郵側望歸簡藝文類聚二十五答徐摛書山濤有言東宮養德而已但今與古殊時有監撫之務竟不能黜邪進善少助國章獻可替不仰裨聖政以此慚惶無忘夕惕驅馳五嶺在戎十年險阻艱難備更之矣觀夫全軀具臣刀筆小吏未嘗識山川之形勢介胄之勤勞細民之疾苦風俗之嗜好高閣之間可來高門之地徒重玉饌羅前黃金在握浞訾栗斯容與自喜亦復言軒羲以來一人而已使人見此良足長歎藝文類聚二十六與劉孝綽書執別灞滻嗣音阻闊合璧不停旋灰屢徙玉霜夜下旅雁晨飛想涼燠得宜時候無爽既官寺務煩簿領殷湊等張釋之條理同于公之明察雕龍之才本傳靈蛇之譽自高頗得暇逸於篇章從容於文諷頃擁旄西邁載離寒暑曉河未落拂桂棹而先征夕鳥歸林懸孤帆而未息足使邊心憤薄鄉思邅回但離闊已久載勞寤寐佇聞還驛以慰相思藝文類聚三十與蕭臨川書零雨送秋輕寒迎節江楓曉落林葉初黃登舟已積殊足勞止解維金闕定在何日八區內侍厭直御史之廬九棘外府且息官曹之務應分竹南川剖符千里但黑水初旋未申十千之飲桂宮既啓復乖雙闕之宴文雅縱橫即事分阻清夜西園眇然未剋想征艫而結歎望挂席而霑襟若使弘農書疏脫還鄴下河南口占儻歸鄉里必遲青泥之封且覯朱明之詩白雲在天蒼波無極瞻之歧路眷慨良深愛護波潮敬勗光彩藝文類聚三十答安吉公主餉胡子書方言異俗極有可觀山高水遠宛在其邈不使去來執轡媲彼青衣正當出入燒香還依丹轂豈直王濟女奴獨有羅袴方使樂府行胡羞論歌舞垂賚新奇伏增荷抃藝文類聚三十五答張纘謝示集書綱少好文章於今二十五載矣竊嘗論之日月參辰火龍黼黻尚且著於玄象章乎人事而況文辭可止詠歌可輟乎不為壯夫楊雄實小言破道非謂君子曹植亦小辨破言論之科刑罪在不赦至如春庭落景轉蕙承風秋雨且晴簷梧初下浮雲生野明月入樓時命親賓乍動嚴駕車渠屢酌鸚鵡驟傾伊昔三邊久留四戰胡霧連天征旗拂日時聞塢笛遙聽塞笳或鄉思悽然或雄心憤薄是以沈吟短翰補綴庸音寓目寫心因事而作藝文類聚五十八初學記二十一答新渝侯和詩書垂示三首風雲吐於行間珠玉生於字裏跨躡曹左含超潘陸雙鬢向光風流已絶九梁插花步搖為古高樓懷怨結眉表色長門下泣破粉成痕復有影裏細腰令與真類鏡中好面還將畫等此皆性情卓絶新致英奇故知吹簫入秦方識來鳳之巧鳴瑟向趙始覩駐雲之曲手持口誦喜荷交并也藝文類聚五十八答湘東王慶州牧書雖心慕子文申威涿郡意存士雅慷慨臨江而不能遂封狼居之山永空幕南之地逐北聊城追奔瀚海必欲卷綬避賢辭病收迹藝文類聚五十九答湘東王上王羲之書書試筆成文臨池染墨疏密俱巧真草皆得似望城扉如瞻星石不營雲飛之散何待曲辱之丹方當奉彼筐中置之帳裏乍楷桐鉤時懸欹案戢意之深良不能已藝文類聚七十四與湘東王書吾輩亦無所遊賞止事披閲性既好文時復短詠雖是庸音不能閣筆有慚伎癢更同故態比見京師文體懦鈍殊常競學浮疏爭為闡緩玄冬修夜思所不得既殊比興正背風騷若夫六典三禮所施則有地吉凶嘉賓用之則有所未聞吟詠情性反擬內則之篇操筆寫志更摹酒誥之作遲遲春日翻學歸藏湛湛江水遂同大傳吾既拙於為文不敢輕有掎托但以當世之作歷方古之才人遠則楊馬曹王近則潘陸顏謝而觀其遣辭用心了不相似若以今文為是則古文為非若昔賢可稱則今體宜棄俱為盍各則未之敢許又時有效謝康樂裴鴻臚文者亦頗有惑焉何者謝客吐言天拔出於自然時有不拘是其糟粕裴氏乃是良史之才了無篇什之美是為學謝則不屆其精華但得其冗長師裴則蔑絶其所長惟得其所短謝故巧不可階裴亦質不宜慕故胸馳臆斷之侶好名忘實之類方分肉於仁獸逞卻克於邯鄲入鮑忘臭效尤致禍決羽謝生豈三千之可及伏膺裴氏懼兩唐之不傳故玉徽金銑反為拙目所嗤巴人下里更合郢中之聽陽春高而不和妙聲絶而不尋竟不精討錙銖核量文質有異巧心終愧妍手是以握瑜懷玉之士瞻鄭邦而知退章甫翠履之人望閩鄉而歎息詩既若此筆又如之徒以煙墨不言受其驅染紙札無情任其搖襞甚矣哉文之橫流一至於此至如近世謝朓沈約之詩任昉陸倕之筆斯實文章之冠冕述作之楷模張士簡之賦周升逸之辨亦成佳手難可復遇文章未墜必有英絶領袖之者非弟而誰每欲論之無可與語思吾子建一共商榷辨茲清濁使如涇渭論茲月旦類彼汝南朱丹既定雌黃有別使夫懷鼠知慚濫竽自恥譬斯袁紹畏見子將同彼盜牛遙羞王烈相思不見我勞如何梁書庾肩吾傳又略見藝文類聚七十七答湘東王書暮春美景風雲韶麗蘭葉堪把沂川可浴弟召南寡訟時綴甘棠之陰冀州為政暫止褰襜之務唐景薦大言之賦安太述連環之辨盡遊玩之美致足樂邪吾春初臥疾極成委斃雖西山白鹿懼不能愈子預赤丸尚憂未振高臥六安每思扁鵲之問靜然四屋念絶修都之香豈望文殊之來獨思吳客之辨屬以皇上慈被率土甘露聿宣鳴銀鼓於寶坊轉金輪於香地法雷警夢慧日暉朝道俗輻湊遠邇畢集聽衆白黑日可兩三萬獨以疾障致隔聞道豈止楊僕有關外之傷周南起留滯之恨第十三日始侍法筵所以君長近還未堪執筆敬祖前邁裁欲勝衣每自念此愍然失慮江之遠矣寤寐相思每得弟書輕疴遣疾尋別有信此無所伸廣宏明集十六又二十八上藝文類聚七十五又十八日晚於華林閣外省中得弟九月一日書甚慰懸想秋節淒清比如常也州事多少無足疲勞濠梁之氣不異恆日差盡怡悅時有樂事遊士文賓比得談賞終宴追隨何如近日注漢功夫轉有次第思見此書有甚飢惄吾蒙受菩薩禁戒簉預大士此十二日便於東城私懺十七日旦早入寶雲壁門照日銅龍吐霧紅泉含影青蓮吐芳法侶成群金山滿坐身心快樂得未曾有昨旦平等寺法會中後無礙受持天儀臨席晬容親證拜伏雖多疲勞頓遣剃頂之時此心特至心口自謀併欲翦落無疑馬援遣蝨之談不辭應氏赤壺之諷僧璡典議不異昔日竟日問璡殊均子路探鉤取名名曰因理皇情印可今便奉行昨晡後方還所住徐摛庾吾羌恆日夕鏡遠在直時來左右但不得倜儻殊異盤桓之時稍習節文欲避酒泉之職尹王相去既爾彌伸款對臨汝侯比多屬疾來宮小稀其間信使差得其簡曄兼詹事暕為洗馬時伸話言數語論辨句之侯東撫復成離闊衡山九嶷尋應引邁臨岐有歎望水興嗟但吾自至都已來意志忽恍雖開口而笑不得真樂不復飲酒垂二十旬次公醒狂自成無理知耆艾數信述吾經過適憶途遵江夏路出西浮日月易來已涉秋暮而韋述有長沮之斃必笑之災術異葛仙形均荀序弟復資其糧餼特為經營轉禍為福事均北叟分別已來每增慨憶歎因月積想逐時旋每有西郵事同撫䏶相見之期未知何日瞻言玉嶺靜對金關懷勞之深未常弭歇善自保惜及此不多綱疏廣宏明集二十七上答蕭子雲上飛白書屏風書得所送飛白書縑屏風十牒冠六書而獨美超二篆而擅奇乍寫星區時圖鳥翅非觀觸石已覺雲飛豈待金璫便覩蟬翼間諸衣帛前哲未巧懸彼帳中昔賢掩色藝文類聚六十九答定襄侯餉臥簟書筠篁多品篠簜雜名校色比奇獨此為貴自含蒼紫似久暴於柯亭乍舒黝素若屢霑於湖水三伏餘炎九折成用便可旅食南館高臥北窗藝文類聚六十九答南平嗣王餉舞簟書濯龍之木文罽飾壇淮南之臺紫羅為薦未若五離九折出桃枝之翠筍綺爛霞舒制雲母之修竹南湘點淚喻此未奇東宮赤花擬之非妙藝文類聚六十九答書知康司馬卓以水淺未時發漢源冬涸理當有訜遄舟有及具意綱答淳化閣帖一與廣信侯書綱白闊絶音旨每用延結風嚴寒徑願比怡和伏承淨名法席親承金口辭珍鹿苑理愜鷲山微密祕藏於斯既隆莊嚴道場自茲彌闡豈止心燈夜炳亦乃意蕊晨飛況兄慧思弘明本長內教今陪十善之車開八正之路流般若之水洗意識之塵以此春翹方為秋實綱每憶華林勝集亦叨末位終朝竟夜沐浴妙言至於席罷日餘退休旁俯窺百尺金池動月玉樹含風當於此時足稱法樂今卷帷之部乘傳一隅聞慧雨滂流喜躍充遍徒挹懸河無由承稟空無所有不瑩情靈緣癡有愛自嗟難拔兼下車已來義言蓋少舊憶已盡新解未餐既慚口誦復非心辨永謝瀉瓶終慚染㲲是則慈雲既擁智海亦深影末波餘希時灑拂但暌違轉積興言盈臉願加敬納言不宣意謹白廣宏明集十六又二十一藝文類聚七十七又王白仰承比往開善聽講涅槃縱賞山中遊心人外青松白露處處可悅奇峰怪石極目忘歸加以法水晨流天華夜落往而忘反有會昔言王牽物從務無由獨往仰此高蹤寸心如結謹白廣宏明集二十一與慧琰法師書五翳消空韶光表節百華異色結綵成春道體何如恆清宜也對玩清虛既在風雲之表遊心入理羞多定慧之樂弟子俗務紛糾勞倦特深眷然北嶺欽賢已積會遇之期庶必可僝有緣之儔事等飢渴佇望來儀一日三歲想思弘利益理當無爽指遺此信無述寸襟綱和南廣宏明集十六又二十八上又旦來雨氣殊有初寒攝衛已久轉得其力雖他方法界略息化緣祇洹之裏恆有悟對眷佇之深無時不積久因倩師頻述方寸不知巧笑之僧頗為津及不耳前昨已來徵事義聚龍象畢同應供皆集慧炬開心甘露入頂聞之善謔特盡歡怡想味之懷轉復無極昔幼年經聞制旨受道日淺北面未深雖異禪那事同華水今改西下特蓄本心訪理質疑屬在明德不謂般若留難現疾未瘳問津無地歎恨何已伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣惑赤花之舍追往年之宿眷述即日之寸心此事必期冀非爽指遣茲承問佇有還書綱和南廣宏明集十六又二十八上弔道澄法師亡書省啓承尊師昨夜涅槃甚深悲怛法師志業淹明道風淳素戒珠瑩淨福翼該圓加以識見冥通心解遠察記落雨而必然稱黑牛而匪謬服膺者無遠近蒙益者兼道俗弟子自言旋京輦便伸結緣豈謂一息不追奄至乎此然勝業本深智刀久利必應遊神寶地騰迹淨天但語其乳池啓殯香棺入室不了空心於何不慟但如來降生之迹因此而入泥洹正當其生住滅靡有定相先聖後賢何其形響推校因緣未始有例上人等並在三歲積始終稟道宜應共相策勉弘遵舊業使道場無斷利益不墜所襚物輒如法供養奈何奈何廣宏明集二十四勸醫論勸醫曰天地之中唯人最靈人之所重莫過於命雖修短有分夭壽懸天然而寒暑反常嗜欲乖節故瘧寒痟首致斃不同伐性爛腸摧年匪一拯斯之要實在良方故祗域醫王明於釋典如大師乃以醫王為號以如來能煩惱病祗能治四大乖為故亦有騷人之詠彭城秦國之稱和緩季梁之遇盧氏虢子之值越人爰至九市飛仙長生妙道猶變六一於金液改三七於銀丸蓄玉字之精研紫書之奧桃膠何是北斗靡遁其刑金漿非遠明珠還恥其價能使業門之下鼓響獨聞雍祝之傍簫聲猶在周禮疾醫掌萬民之疾凡民之有病者分而治之歲終則各書其所治而入於醫師知其愈與不愈以為後法之戒也至如研精玄理考核儒宗盡日清談終夜講習始學則負墟尚諛積功則為師乃著日就月將方稱碩學專經之後猶須劇談網羅愈廣鉤深理見厭飫不寤惟日不足又若為詩則多須見意或古或今或雅或俗皆須寓目詳其去取然後麗辭方吐逸韻乃生豈有秉筆不訊而能善詩塞兌不談而能善義楊子雲言讀賦千首則能為賦況醫之為道九部之診甚精百藥之品難究察色辨聲其功甚祕秋辛夏苦幾微難識而比之術者未嘗稽合曾無討論多以少壯之時涉獵方疏略知甘草為甜桂心為辣便是宴馭自足經方泯棄同庾敳之讀莊子異孔丘之好周易然而疾者求我又不能盡意攻治假使不能為地自可即為己益所以然者若無隔貴賤精加消息以前驗後自可解之日知所亡坐成妙術而又告以不能也治疾者衆必以孟浪酬塞惡之者多愛之者鮮是則日處百方月為千治未嘗不輕其藥性任其死生淳華之功於何而得及其愛深親屬情切支肌患起膏肓痾興府俞雖欲盡其治功思無所出何以故然本不素習卒難改變故也胡麻鹿藿止救頭痛之病麥麴芎藭反救河魚之疾思不出位事局轅下醫者忘志於玄都揚己名於緑帙其可得乎術道困窮於斯實至誠當善思此意更興其美非直傳名於後亦是功德甚深比夫脫一鴿於權衡活萬魚於池水不可同日而論焉文苑英華七百五十又見初學記二十有刪節七勵藏名外臣體道好異遁迹埋影剗心人事任性於蓼水之側放心於自得之場情苞六合德貫九方巖栖谷飲絶際濠梁於是寂鏡公子聞而往説乃飛車翠蓋翔駕絳螭丹旌鳳轉碧幔雲移映玉軑之綺靡照銀車之陸離經九嶠之敻阻歷五曲之巑危路入閬風道經通谷橋塗泱漭路林蕭肅石磴穹窿松關重復羊腸望斷邃路迂餘攀林稅駕乃遇藏名之所居其居則蘚苔沒砌幄葉斜林千峰杳頂萬仞懸深南危碧流北障芳林左縈重陸右背高岑煙霞罩日石澗籠陰聲音百籟響弄千禽寂鏡公子曰蓋聞智者不懷道沒志遺俗埋名迷邦碎寶卻粒辭榮今欲説子以默語之術寧欲聞乎藏名曰僕雖幽栖遠紆名德寧忘潔己以受至言公子曰夫怡情託體實寄間宮跨危樓於枍詣挂日景於迎風玩靈華於仙掌度窈窕於飛虹金枝照曜玉壁玲瓏文窗洞右飛閣陵東桂柱通光雄梁亙日璧鏡鈕懸抽荷并出中宿錦筵長廊周密青錢碧影金墀玉律冬閨溫煦夏室含霜圖以珍怪畫以禎祥瓊茅秋花緑蕙春香植宜男於粉閣樹君子於椒房回風煙於璇題垂珠璣於玉箱文魚水宿錦鳥雲翔乃登陟遊踐望遠通疏擢素藕於石鏡搴蔓草於康衢若荊山之琢玉似隨水之弄珠若斯宮之間麗子能與我而共居外臣曰僕遊心蓬葦未暇斯處公子曰夫靚妝嚴服託體必嘉五絲擅美獨璽稱華組帷粲綵緹含葩丹墀聚葉縷檻飛花至如稷下縫掖泗上章甫雉緝霜鮮秦絲園縷鳳色龍分鴛文鵠聚雕紛瑤席綺飾瓊珮齊都滑石南海玳瑁散似綴珠離如並繢蜘蛛弄巧越女調樞夏則桃笙竹席冬則青管金鬚溫麗瓊臺密華承寢當戶之縠大文之錦華蒲萄之綺衾麗芬若之丹枕金蘇翠幄玉案象床子能從我樂此芬芳外臣曰帶索披裘自得山性雕章麗服未敢攸同公子曰五飪調神三芝輔性用康仁壽以弘貞正乃使有伊之徒調嘗鼎味九州珍雜八方蘴貴名廉天地之聲殽竭山海之味蟬鳴秋稻燕頷玉精離紅之膾勺藥之羹蒙山擅重灌水傳聲桂蠹石瓊龍胎鳳肺四膳八珍五肉七菜纍似縠雜切均鮮繪色若紫蘭紛如紅綷若乃越梅變實楚醴方添陳晨鳧之美味薦巂燕之肥甜洗以三危之露水調以大夏之香鹽霜薤沸烈露葵繁舒芳菰之菜白霜之茹澄瓊漿之素色雜金筍之甘葅素醥浮氣酃醪凝清獻三爵之踰雅等千日之芳醴酌玉斗之英麗照銀杯之輕蟣此亦天下之美味子能從我而享之乎外臣曰藜藿可膳薇蕨堪餐五味口爽寧假玉盤公子曰若夫鈞臺之樂葛天之歌飛七盤之妙節動六變之清和緑綺麗琴丹山寶瑟縷器倕雕孤枝伶律奏白雪之楚緩陳亭席之吳疾躍鳥追飛潛魚伴出將使漸離擊築雍門鼓琴鳴繞梁之妙響發愁戶之清音至如五陵金穴六郡豪家遠流歌於東夏出祕舞於京華金鈿設翠步搖藏花遙同暮雨逼似朝霞髮鬢如點纖腰成削玉齒笑容紅妝綽約疾趨巧步霧袖芬披舒蛾眉之窈窕委弱骨之逶迤載金翠之婉嬋珥瑤璫之陸離芬芳於梧春之苑灼爍於長州之中於時斜光西委薄霧舒紅隋珠照影羅衣從風觀者方堤覩者盈淇令二燕之綴翼使八鶴之增悲明君為之飲泣西施為之解眉於是蘭閨寂晚曲韻相和對輕風之落景望明月以清歌歌曰酣醑半兮樂既陳長歌促節綺羅人拂鏡弄影情未極回簪轉笑思自親此亦聲音之盡妙子能從我而聽之乎外臣曰淫聲亂耳未足入聽方追山壑永弄林泉公子曰夫心遊百氏理奧六經樞機性道陰陽窅冥昭玉牒於年史覽石記而照情若夫鄒枚上客揚馬俊人揮金入趙易服歸秦賣舌彈劍買義追仁商榷萬古弋釣陶甄池中水黑席上稱珠判二氣之氛氳辨六爻之終始鳥變龍工鳳書雲紀辭弘八索辨崇三耳至如范雎折脅豫讓拉齒禮竭中心報深國士碎玉爭城藏圖解劍見碣石之金堤望楚都之揚塹美陳平之反間揖子房之智謀想秦君之傳器仁漢后之解裘此亦天下之奧籍德性之林圃子能同覽悅目以齊此心外臣於是色動清顏頓解高意曰僕雖野陋頗悅帶經但負薪多疾未甘斯説公子曰夫氛氳構象純雜不同共工折柱雖播英風自古而然曾何足道但吹沙役寇仰自犧年吐霧藏妖聞之堯日至於今者昌運天啓握曆寶年風猷駕層漢道德漏重泉至如玄蹄外境紫舌頑人悖而無禮不沫皇仁於是騰三泉之窅漫戴五旗之飄揚引玉車於西隴鳴金鼓於北邙拭龍泉之雄劍瑩魏國之寶刀銛踰巨闕利擬豪曹至如牽鉤壯氣斗膽豪心緣腰白玉帶珮黃金酬恩報死剋遠長岑騕裊白燕耀躍青離五玉察善十相無遺連腰錦帶半足塵飛標威於鴈門之境振旅於龍突之鄉若乃驚沙絶岸苦霧綿長秋河曉碧落蕙山黃紅顏素改玄鬢斑霜征夫抵掌而飲膳壯士憤氣而沸腸回雲鳥之密陳背卻月而相望旗才轉而漂杵鋒未至而驂傷前鋒紛其易幟後騎決其沙囊何湯雪之能比豈拾塵之可方於是呼韓頓顙龜茲銜璧羊牽既袒熊山已積九截同文八極齊軌帝曰念功班茅賜履青紫如拾賞歸詔美此亦天下之壯績子能從我而效之乎外臣曰葛伯不祀雖聞湯誥野叟力弱未敢振衣公子曰堯舜垂拱煥彼前聞今惟聖曆萬代一君璧儀照氣玉井珠分德合天地道方華勳滄海碧徹黃河黛文愛人育德澤等春雲宣尼茂典周姬禮容黃裳進士清襟俊童邦知改俗國化移風賣藥無藏名之老河泗無洗耳之翁德星夜映慶雲晝色異草雙條靈禽比翼狐尾既九茅脊復三金船漾寶銀甕呈甘康歌壤笑悅禮樞談隆周謝德盛漢知慚慈照無生化湛靈覺散漓弘淳拯澆敦朴國被仁壽家欣教學三明鑒道六度弘風出塵照苦入冥觀空善識無盡因性必通天不愛寶地無隱瑞百神受職三苗奉義石策紫泥繩金玉刺或託諷梁甫權臥德而龍盤或織箔渭濱恥藏名而鳳跂於是露點飴蜜溜泓澄於玉掌雲垂五采覆旖旎於仙樓漾醴泉於浪井拂垂楊於御溝或聯七葉一姓五侯外臣於是觀色內動神貌外移忽正山巾而言曰蓋聞幽居獨善見機往聖儻不遺矇叟亦願順來命文苑英華三百五十一
