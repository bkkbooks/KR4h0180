body:
  text: 陳慶之攻滎陽宣喻士衆吾至此以來屠城略地實為不少君等殺人父兄略人子女又為無算天穆之衆並是仇讎我等才有七千虜衆三十餘萬今日之事義不圖存吾以虜騎不可爭力平原及未盡至前須平其城壘諸君無假狐疑自貽屠膾梁書陳慶之傳陳兵事啓採石急須重鎮王質水軍輕弱恐慮不濟梁書陳慶之傳田飲引卜田宇兮京之陽面清洛兮背修邙屬風林之蕭瑟值寒野之蒼茫鵬紛紛而聚散鴻冥冥而遠翔酒沈兮俱發雲沸兮波揚豈味薄于東魯鄙密甜于南湘于是客有不速朋自遠方臨清池而滌器闢山牖而飛觴促膝兮道故久要兮不忘間談希夷之理或賦連翩之章藝文類聚七十二為武帝草張纘為尚書僕射詔纘外氏英華朝中領袖司空以後名冠范陽可尚書僕射梁書張纘傳又見南史五十六以為朱異草詔祀明堂議祀明堂改服大裘又以貴質不應三獻禮云朝踐用大樽鄭玄云大樽瓦也有虞氏瓦樽此皆是宗廟猶以質素況在明堂理不容象樽也郊祀貴質器用陶匏宗廟貴文誠宜雕俎明堂之禮于郊為文比廟為質請改器用純漆庶合文質之衷舊儀鬯灌求神初獻清酒次醴終醁禮畢太祝取俎上祭肉當御前以受俎五帝天神不可求之于地二郊主祭無受肉之禮請停三獻灌鬯及授俎之法止于一獻清酒舊用太牢案郊用繭栗詩云配文王于明堂有維牛維羊良由周監二代其義貴文明堂方郊未為極質故特用三牲今斟酌百王義存通典蔬果之薦雖符周禮而性牢之用宜遵夏殷請自今明堂牲用特牛通典四十四四望議望是不即之名豈容局于星海拘于嶽瀆隋書禮儀志一天監六年議者以為北郊有嶽鎮海瀆之座而又有四望之座疑為煩重儀曹郎朱異議雩祭燔柴議案周宣雲漢之詩毛注有瘞埋之文不見有燔柴之説若以五帝必柴今明堂又無其事隋書禮儀志二天監十年儀曹郎朱異議更議復四望鄭衆云四望謂日月星海鄭玄云謂五嶽四鎮四瀆尋二鄭之説互有不同竊以望是不即之名凡厥遙祭皆有斯目豈容局干星漢拘于海瀆請命司天有關水旱之義爰有四海名山大川能興雲致雨一皆備祭隋書禮儀志二天監十一年帝曰四望之事頃來遂絶宜更議復朱異議封陽侯不應殤服議禮年雖未及成人已有爵命者則不為殤封陽侯年雖中殤已有拜封不應殤服隋書禮儀志三天監十四年舍人朱異議又見通典八十二廟祀加一鈃羹議二廟祀相承止有一鈃羹蓋祭祀之禮應有兩羹相承止于一鈃即禮為乖請加熬油蓴羹一鈃隋書禮儀志二天監十六年十月舍人朱異議元法僧內屬議自王師北討剋獲相繼徐州地轉削弱咸願歸罪法僧法僧懼禍之至其降必非偽也梁書朱異傳請改郊祀儀注禮大裘而冕祭昊天上帝五帝亦如之良由天神高遠義須誠質今從泛祭五帝禮不容文齊儀初獻樽彝明堂貴質不應三獻又不應象樽禮云朝踐用太樽鄭云太樽瓦也記又云有虞氏瓦樽此皆在廟所用猶以質素況在明堂禮不容象今請改用瓦樽庶合文質之衷宗廟貴文故庶羞百品天義尊遠則須簡約今儀注所薦與廟不異即理徵事如為未允請自今明堂有膳準二郊但帝之為名本主生育成歲之功實為顯著非如昊天義絶言象雖曰同郊復應微異若水土之品蔬果之屬猶宜以薦止用梨棗橘栗四種之果薑蒲葵韭四種之葅粳稻黍粱四種之米自此以外郊所無者請並從省除隋書禮儀志一天監十年儀曹郎朱異以為云云明堂既泛祭五帝不容的有先後東階而升宜先春帝請改從青帝始明堂籩豆等器皆以雕飾尋郊祀貴質改用陶匏宗廟貴文誠宜雕俎明堂之禮既方郊為文則不容陶匏比廟為質又不應雕俎斟酌二途須存厥衷請改用純漆舊儀明堂祀五帝先酌鬱鬯灌地求神及初獻清酒次酃終醁禮畢太祝取俎上黍肉當御前以授請依郊儀止一獻清酒且五帝天神不可求之于地二郊之祭並無黍肉之禮並請停灌及授俎法舊明堂皆用太牢案記云郊用特牲又云天地之牛角繭栗五帝既曰天神理無三牲之祭而毛詩我將篇云祀文王于明堂有維羊維牛之説良由周監二代其義貴文明堂方郊未為極質故特用三牲止為一代之制今斟酌百王義存通典蔬果之屬雖符周禮而牲牢之用宜遵夏殷請自今明堂止用特牛既合質文之中又見貴誠之義隋書禮儀志一奏劾劉孝綽攜少姝於華省棄老母於下宅梁書劉孝綽傳周弘正補太學博士議周郎年未弱冠便自講一經雖曰諸生實堪師表無俟策試陳書周弘正傳博士到洽議鈔集議祭六宗論虞書曰肆類于上帝禋于六宗望于山川伏生馬融曰萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏禋于六宗此之謂也歐陽和伯夏侯建曰六宗上不謂天下不謂地旁不謂四方在六者之間助陰陽變化者也孔安國曰精意以享謂之禋宗尊也所尊祭其祀有六埋少牢于太昭祭時也相近于坎壇祭寒暑也王官祭日也夜明祭月也幽禜祭星也雩禜祭水旱也禋于六宗此之謂也孔叢曰宰我問六宗于夫子夫子答如安國之説臣昭以此解若果是夫子所説則後儒無復紛然文秉案劉歆曰六宗謂水火雷風川澤也賈逵曰六宗謂日宗月宗星宗岱宗海宗河宗也鄭玄曰六宗星辰司中司命風伯雨師也星五緯也辰謂日月所會十二次也司中司命文昌第五第四星也風伯箕也雨師畢也晉武帝初司馬紹統表駮之曰臣以為帝在于類則禋者非天山川屬望則海岱非宗宗猶包山則望何秩焉伏與歆逵失其義也六合之間非制典所及六宗之數非一位之名陰陽之説又非義也并五緯以為一分文昌以為二箕畢既屬于辰風師雨師復特為位玄之失也安國案祭法為宗而除其天地于上遺其四方于下取其中以為六宗四時寒暑日月衆星并水旱所宗者八非但六也傳曰山川之神則水旱厲疫之災于是乎禜之日月星辰之神則雪霜風雨之不時于是乎禜之又曰龍見而雩如此禜者祀日月星辰山川之名雩者周人四月祭天求雨之稱也雪霜之災非夫禜之所禳雩祭之禮非正月之所祈周人之後説有虞之典故于學者未盡喻也且類于上帝即禮天也望于山川禜所及也案周禮云昊天上帝日月星辰司中司命風師雨師社稷五祀五嶽山林川澤四方百物又曰兆五帝于四郊四類四望亦如之無六宗之兆祭法云祭天祭地祭時祭寒暑日月星祭水旱祭四方及山林川谷丘陵能出雲為風雨見怪物皆是有天下者祭百神非此族也不在祀典復無六宗之文明六宗所禋即祭法之所及周禮之所祀即虞書之所宗不宜特復立六宗之祀也春官大宗伯之職掌玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方天宗日月星辰寒暑之屬也地宗社稷五祀之屬也四方之宗者四時五帝之屬也如此則群神咸秩而無廢百禮遍修而不瀆于理為通幽川秀才張髦又上疏曰禋于六宗禮祖考所尊者六也何以考之周禮及禮記王制天子將出類于上帝宜于社造于禰巡狩四方覲諸侯歸格于祖禰用特堯典亦曰肆類于上帝禋于六宗望于山川遍于群神班瑞于群后肆覲東后叶時月正日同律度量衡巡狩一歲以周爾及歸格于藝祖用特臣以尚書與禮王制同事一義符契相合禋于六宗正謂祀祖考宗廟也文祖之廟六宗即三昭三穆也若如十家之説既各異義上下違背且沒乎祖之禮考之禮考之祀典尊卑失序若但類于上帝不禋祖禰而行去時不告歸何以格以此推之較然可知也禮記曰考政必本于天殽以降命命降于社之謂殽地降于祖廟之謂仁義降于山川之謂興作降于五祀之謂制度又曰祭帝于郊所以定天位也祀社于國所以列地利也祭祖于廟所以本仁也山川所以儐鬼神也五祀所以本事也又曰禮行于郊而百神受職焉禮行于社而百貨可極焉禮行于祖廟而孝慈服焉禮行于五祀而正法則焉故自郊社祖廟五祀義之修而禮之藏也凡此皆孔子所以祖迷堯舜紀三代之教著在祀典首尾相證皆先天地次祖宗而後山川群神耳故禮祭法曰七代之所更變者禘郊宗祖明舜受終文祖之廟察璇璣考七政審己天命之定遂上郊廟當義合堯典則周公其人也郊祀后稷以配天宗祀文王于明堂以配上帝是以四海之內各以其職來祭者也居其位攝其事郊天地供群神之禮巡狩天下而遺其祖宗恐非有虞之志也五嶽視三公四瀆視諸侯皆以案先儒之説而以水旱風雨先五嶽四瀆從祖考而次上帝錯于肆類而亂祀典臣以十一家皆非也太學博士吳商以為禋之言煙也三祭皆積柴而實牲體焉以升煙而報陽非祭宗廟之名也鄭所以不從諸儒之説者將欲據周禮禋祀皆天神也日月星辰司中司命風師雨師凡八而日月并從郊故其餘為六宗也以書禋于六宗與周禮事相符故據以為説也且文昌雖有大體而星名異其日不同故隨事祭之而言文昌七星不得遍祭其第四第五此為周禮復不知文昌之體而又妾引為司中司命箕畢二星既不係于辰且同是隨事而祭之例又無嫌于所係者范寧注虞書曰考觀衆議各有説難鄭氏證據最詳是以附之案六宗衆議未知孰是虞喜別論云地有五色太社象之總五為一則成六六為地數推案經句闕無地祭則祭地臣昭曰六宗紛紜衆釋互起竟無全通亦難偏折歷辨碩儒終未挺正康成見宗是多附焉盍各爾志宣尼所許顯其一説亦何傷乎竊以為祭祀之敬莫大天地虞典首載彌久彌盛此宜學者各盡所求臣昭謂虞喜以祭地近得其實而分彼五色合五為六又不通禋更成疑昧尋虞書所稱肆類于上帝是祭天天不言天而日上帝帝是天神之極舉帝則天神斯盡日月星辰從可知也禋于六宗是實祭地地不言地而曰六宗宗是地數之中舉中足以該數社稷等祀從可知也天稱神上地表數中仰觀俯察所以為異宗者崇尊之稱斯亦盡敬之謂也禋也者埋祭之言也實瘞埋之異稱非周禋之祭也夫置字涉神必以今之示今之示即古之神所以社稷諸字莫不以神為體虞書不同祀名斯隔周禮改煙音形兩異虞書改土正元祭義此焉非疑以為可了豈六置宗便為傍祭乎風俗通曰周禮以為槱燎祀司中司命文昌上六星也槱者積薪燔柴也今民猶祠司命耳刻木長尺二寸為人像行者置篋中居者別作小居齊地大尊重之汝南諸郡亦多有者皆祠以豬率以春秋之月後漢志祭祀中注難晉劉世明論久喪不葬服喪無二孤廟無二主受弔之禮唯喪主拜稽顙餘人喪踊而已諸言喪主唯謂一人不斥衆子世明固云若尸柩無所葬者則為後者與衆子同除矣通典一百三注補續漢書八志序臣昭曰昔司馬遷作史記爰建八書班固因廣是曰十志天人經緯帝政紘維區分源奧開廊著述創藏山之祕寶肇刊石之遐貫誠有繁于春秋亦自敏于改作至乎永平執簡東觀紀傳雖顯書志未聞推檢舊記先有地理張衡欲存炳發未有成功靈憲精遠天文已煥自蔡雍大弘鳴條實多紹宣協妙元卓律曆以詳承洽伯始禮儀克舉郊廟社稷祭祀該明輪騑冠章車服瞻列于是應譙纘其業董巴襲其軌司馬續書總為八志律曆之篇仍乎洪雍所構車服之本即依董蔡所立儀祀得于往制百官就乎故簿並籍據前修以濟一家者也王教之要國典之源粲然略備可得而知矣既接繼班書通其流貫體裁淵深雖難踰等序致膚約有傷懸越後之名史弗能罷意叔駿之書是謂十典矜緩殺青竟亦不成二子平業俱稱麗富華轍亂亡典則偕泯雅言邃義于是俱絶沈松因循尤解功創時改見句非更搜求加藝文以矯前棄流書品採自近録初平永嘉圖籍焚喪塵消煙滅焉識其限借南晉之新虛為東漢之故實是以學者亦無取焉范曄後漢良誠跨衆氏序或未周志遂全闕國史鴻曠須寄勤間天才富博猶俟改具若草昧厥始無相憑據窮其身世少能已畢遷有承考之言固深資父之力太初以前班用馬史十志所因實多往制升入校部出二十載續志昭表以助其間成父述者夫何易哉況曄思雜風塵心撓成毀弗克員就豈以茲乎夫辭潤婉贍可得起改核求見事必應寫襲故序例所論備精與奪及語八志頗褒其美雖出拔前群歸相沿也又尋本書當作禮樂志其天文五行百官車服為名則同此外諸篇不著紀傳律曆郡國必依往式曄遺書自序應遍作諸志前漢有者悉欲備製卷中發論以正得失書雖未明其大旨也曾臺雲搆所缺過乎榱桷為山霞高不終踰乎一逵鬱絶斯作吁可痛哉徒懷纘緝理慚鉤遠乃借舊志以補之狹見寡陋匪同博遠及其所值微得論列分為三十卷以合范史求于齊工孰曰文類比茲闕恨庶賢乎已昔褚先生補子長之削少馬氏接孟堅之未畢相成之義古有之矣引彼先志又何猜焉而歲代逾邈立言湮散義存廣求一隅未覿兼鍾律之妙素揖校讎參曆算之微有慚證辨星候祕阻圖緯藏嚴是須甄明每用疑略時或有見頗邀傍遇非覽正部事乖詳密今令行禁止此書外絶其有疏漏諒不足誚明汪文盛刊本
