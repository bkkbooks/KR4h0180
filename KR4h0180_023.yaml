body:
  text: 蕭子範家園三月三日賦春亦暮止田家上巳時將磔於九門節方郊於七里扇習習之和風照遲遲之華晷飛玄翮之土燕奪丹胸之山雉聊潔新而濯故式東流之前軌居免上漏樹非榛栗既無擇於爽塏曾不訪於凶吉右瞻則青溪千仞北覩則龍盤秀出與歲月而荒茫同林藪之蕪密歡茲嘉月悅此時良庭散花蕊傍插筠篁灑玄醪於沼沚浮絳棗於泱泱觀翠綸之出沒戲青舸之低昂藝文類聚四初學記四建安城門峽賦原夫城門之所都乃設險於閩區艱難過於身勢襟要甚於飛狐長湍一流而沸涌層山兩判而盤紆對巘雙分干霄帶雲怪石隨波而隱見枯槎橫出而不群顧瞻左右重巒接阜其間如礪其絶如斗千乘馳輪匹夫可守巃嵩呀呷蹙浪楊華雁門飲羽西施浣沙瓌詭豐隆質狀不同班黃糅采玄紫潛通水奔湍其如電聲疾烈其如風樹低柯而翠鬱潭隱日而青空藝文類聚六直坊賦余以天監六年為洗馬十七年復直中舍之坊感恩懷舊悽然而作歲惟奄茂清明送風承恩從官自府遊宮信吾生之多幸達六合之大同何坊禁之寥闃對長庭之蕪永門幽幽而重閉室愔愔而內靜應曉刻而坐朝聽鳴鐘而自警雖生風於蟭螟終罕曜於陽景頗留連於九思恆殷勤於三省於時也春果餘英夏條垂實殿穹窿而起陰槐連拳而負日傍高墉之邐迤觀層扉之鬱律寫學宮於洛都摹畫堂於漢室臺榭千名仙靈間出藝文類聚六十二傷往賦彼蘭菊之芳茂及蕖槿之榮色終於邑乎繁霜俱飄颻於路側引輕華之微珍猶見嗟於有識況獨立之妍媛信盈盈而挺直去倡家而來儀承君子之宴息摧麗容而思進豈蛾眉之肯抑詠美媵而自針歌忠妾而為式痛妖姿之不留惜華年之中夭冀羆祥之永慶忽從飆而先摽魂一逝而莫追夕有長而無曉惟君侯之惆悵覽遺物而霑巾帷半垂而將下尚仿像而疑真懷方士之良術顯有憑而致神藝文類聚三十四求撰昭明太子集表臣聞姬旦云亡播禮樂於百代宣尼既歿傳雅頌於千祀夏啓之風載傳樂野周晉之迹止在洛濱入侍四公西京見美長壽一察東漢流名魏擊之悟篋衣事關戰國孫登之愛田苗義屬偏霸各稱小善靡擅雕蟲子桓雖詩賦可嘉矩範頓闕貽譏良史取誚前載備而為論發奧允歸自少陽潛位震方滅采神儀長往銅龍毀構音顏緬邈舟壑遷移若乃緣情體物繁絃縟錦縱橫豔思籠蓋辭林積練纍素盈車滿笈金石有銷斯文方遠既異陳王之躬撰又非當陽之自集臣蟬翼輕身未從塵露而班輸嚴駕永輟騑驂戀主懷茲伏深涕慕冒乞銓次遺藻勒成卷軸藝文類聚十六為兄宗正讓都官尚書表納言之授皇命所由五星懸暉差池紫宮之曲百官根本聯曹建禮之內孔蔡該博垂芳於兩京陳鍾合才比肩於魏世逖望前英俯循庸薄義無尸素禮絶祗奉藝文類聚四十八初學記十一為蔡令樽讓吳郡表今吳奧區地迫都輦譬彼西京則扶風馮翊方之洛下則潁川河內自非時雨之政解繩之才寧可奉共理之言承河潤之旨鄧攸廉白乃著不留之歌賀劭沈靜猶致題門之責藝文類聚五十到臨賀王信威府箋上藩首佐於茲再忝河南雌伏自此重升以老少異時盛衰殊日雖佩恩寵還羞年鬢梁書蕭子範傳七誘幽遁公子不遊義路不入禮門人主焉得為臣公侯難以為客有暴勢大夫驅美澤之車策千里之馬乃至公子之所居大夫曰收苗山之鋌採邪溪之銅既云時吉亦曰天中金英內曜銀精外通均如屈楊之舒彩粲若芙蓉之始紅七星布而成列五色變而無窮寶兼千萬聲重二都邁茲巨闕超彼鹿盧呈形嶭燭表質風胡大夫曰王饌方丈蕙肴果器法磬吳章妙窮伊摯若乃豹胎之貴鳳印之珍常山之果醴水之鱗大夫曰訪幼女於蔡邑選佳人於趙都或拾翠於神渚或採桑於城隅見者忘鋤而留矚行者下簷而踟蹰女乃歌曰井上李兮隨風摽垂翠帷兮夜難曉獨處廓兮心悄悄懷素縷之雙針願因之於三鳥大夫曰若乃帝思啓土命將朔方守邊鄙而擁角節集兵旅而馳牙璋或埋輪於絶域或縶馬於遐疆功格宇宙威振蠻荒大夫曰逸態之赤兔駿足之驪駒龍文重於漢廄魚目貴於西都若乃似鹿之體如龍之姿韁以紫縷繫以素絲大夫曰冬軒陽木夏伐殷材剞劂之功咸至鉤繩之妙並來擬天文而特建象地戶而高開麗前修之金屋陋曩日之璜臺若乃緹錦遍室丹青被土白珠之簾水精之柱綺井鏤而重葩華桷煥而相距文石之井珊瑚之樹紫復峻而連天青綺高而干霧大夫曰自五氣初運二靈始分蛇身之帝牛首之君焉足道哉若乃聖皇之馭國得附枝而居位陋重華之聰明茂放勳之文思通犀文角之獻相繼於天府金鶯銀鳥之錫不絶於史書當此之時子能佩玉而侍乎公子竦然曰前靡靡之數説皆非鄙性之所娛如今之善誘請就列於康衢藝文類聚五十七冠子針是月惟令敬擇良辰式遵士典咨筮于賓嘉字爰錫醮酒方陳禮莊爾質德成爾身永變童心長移悼齒朱錦辭髮青絇在履丹石為操冰泉厲己務簡朋匹由蘇遊止在我尚謙推物盡美面諂退言弗納于耳直弦矢辭斯為良士藝文類聚四十御覽五百四十御講摩訶般若經序庖犧乃神八象所以成列周文克聖六虛所以廣陳蓋導俗之偏典非通方之大訓至如漢明自講局以儒術簡文談疏復謝專經猶靈若之觀井甃雲夢之在胸中也皇帝體至道而揚盛烈亶聰明而作元后十地斯在俯應人王八福是生允歸世主玄覽無際眇塵劫之初寂照所通該六合之外屈此無為示同有學檀忍兼修禪慧雙舉超國城而大捨既等王宮之時量珍寶於四天又同轉輪之日輕之若鴻毛去之如脫屣故以道駕皇王事高方册若非蘊生知之上德蓄機神於懷抱洞比三明齊功二智孰能與於此者哉金字靡歌般若波羅密經者蓋法部之為尊乃圓聖之極教開宗以無相明本發軫與究竟同流奧義雲霏深文海富前世學人鮮能堪受皇上愛重大乘遨遊法藏道同意合眷懷總持親動王言妙踰綸紱導明心之遠筌標空解之奇趣乃摛以翠縑刻為金篆衆具寶飾品窮無價芝英讓巧金碧相輝雖榮光之翊河圖方此非瑞青玉為仙簡於焉已劣皇太子乘萬機之暇日藉聽朝之間覽譬彼薰風願聞弘説殷勤奏請然後獲從以中大通七年犬歲癸丑二月已未朔二十六日甲申輿駕出大通門幸同泰寺發講設道俗無遮大會萬騎龍趨干乘雷動天樂九成梵音四合震震填填塵霧連天以造於道場而建乎福田也既而龍袞輟御法服尊臨殿華紫紺座延高廣上界莫之擬新學不能升天容有穆降詔音旨弘捷疾之辨騁無畏之辭炙輠無窮連環自解恣所請問渙然冰釋滯義同遣疑網皆除亦猶懸鏡之不藏衢樽之俟酌加以長筵亙陛冠冕千群充堂溢霤僧侶山積對別殿而重肩環高廊而接坐錐立不容荊刺無地承法雨之通潤悅甘露而忘歸如百川之赴巨海類衆星之仰日月自皇太子王侯已下侍中司空袁昂等六百九十八人其僧正慧令等義學僧鎮座一千人晝則同心聽受夜則更述制意其餘僧尼及優婆塞優婆夷衆男冠道士女冠道士白衣居士波斯國使于闐國使北館歸化人講肆所班供帳所設三十一萬九千六百四十二人又二宮武衛宿直之身植葆戈駐金甲並蒙講饌別錫泉府復數萬人不在聽衆之例外國道人沙呵耶奢年將百歲在檀特山中坐禪聞中國應有大講故自遠而至機感先通咫尺萬里言語不達重譯乃宣三藏之解聖情懸照又波斯國使王安拘越荒服遠夷列參近座膜拜露頂欣受未聞多種出家聞義為貴即有四人同時落髮先是寶志法師者神通不測靈迹甚多自有別傳天監元年上始光有天下有留心禮樂未遑汾陽之寄法師以其年九月自持一麈尾扇及鐵錫杖奉上而口無所言亦未取其意于今三十餘年矣其扇柄繫以小繩常所綰楔指迹之處宛然具存至是御乃鳴錫升堂執扇講説故知震大千而吼法者抑有冥符是時歲云芳春每夕雨注法鼓晨鳴輒便清朗時過兩旬日盈三七陽和協度雲景禎祥至解講之晨四衆雲集懺禮才畢而正殿十方大像忽放光明起自毫間遍於屯字左右靈相炳發金儀炫耀俄而左邊十方菩薩像續復放光起右腋下達于肩上聖御躬自虔禮大衆咸所觀矚故知現此面門證明義旨若夫多聞弟子內聖垂風右史記言實惟帝則乃命近臣纂録時事凡厥咨諏罔不備舉或通釋已遠而疑審方來或宗致未聞而啓請先至其追審者皆是本習所懷或隔日異辰義成先後或雖伸往復終是一問聖旨並隨方酬接如響應聲萬物為心事見乎此後之學者宜曉斯趣上弘法歲久凡諸學僧遠近同集並會京師而僧家之學師習相守唯信口説專仗耳功鮮能尋究經文依求之義上每為之通解神彩意得已在言先裁引文句便至數十精詳朗贍莫能追領舊學諸僧黯如撤燭弛氣結舌無人不然萬衆仰觀一時心喜諸如此事非翰墨所能述又外國諸僧所論義者不必開所立之義直是素有心疑止來求決或發偈誦然後咨疑或請問既罷讚歎發願或語畢還坐衆俱不識或咨竟乃去莫知所在容服非常凡聖難測是講也東儲始啓止蒙七日諸僧鑽仰欲罷不能重復伸請更蒙二七而請益之衆顒顒不已上以國務久擁不允所祈將欲解座皇帝捨財遍施錢絹銀錫杖等物二百一種直一千九十六萬皇太子奉親玉經格七寶經函等仍供養經又施僧錢絹直三百四十三萬六宮所捨二百七十萬上親臨億兆躬自菲薄司服所職饔人所掌若非朝廷典章止是奉身之費則太宮一日將十萬生衣歲出千金上並不取別自營給服粗浣衣器同土簋日一蔬膳過中不餐寒暑被襲莫非大布所居便殿不能方丈昔之幄座今為下床傍無侍衛顧無玩物左右唯經書卷軸所對但見香罏錫杖昧旦坐朝日旰乃息夜尋法寶明發不寐所利唯人所約唯己誠起居之恆事禁中之實録又宮人常格年給數千萬悉從停省無所為留雖漢文衣不至地光武穀數十斛方之蔑如矣所造寺塔及諸齋會不藉子來之民不同大酺之禮皆是採山澤之地利為如法之淨財量入為出資無外取一役之勞計限傭賚故能構製等於天宮設飯同於香積國朝大禮莫過三元三元所設衆止數萬隔歲預營僅而後舉監督紛糾以為巨費至於此會出自淨財遠近百姓願為邑節欣欣請受爭取福分不待號令不須課率黍稷馨香如期即至數十萬衆饗之不盡所以知是皇上化力之所到百姓善根之有成至如軍國恆度府庫常畜固以天下為公器則秋毫無所侵也初上造十三種無盡藏有放生布施二科此藏利益巳為無限而每月齋會復於諸寺施財施食又別敕至到張文休日往屠肆食切鼎俎即時救贖濟免億數以此為常文休者先為運吏輒散運米與貧民應入大辟上愍其一分惻然不許非唯赦其重辜乃加以至到之目既非馮暖之市義又無汲黯之請罪人微宥重過於昔時文休既荷嘉貸未嘗暫怠日中或不得食而足不得息周遍京邑行步如飛擊鼓揚幡負擔馳逐家禽野獸殫四生之品無不放捨焉是時朝臣至于民庶並各隨喜又錢一千一百一十四萬上區其心迹列有十條或捨財同今法事者或捨財以供養者或捨財行慈悲者或捨財乞誦經者或捨財入節供者或捨財入放生者或捨財入布施者或捨身施大衆者或燒指供養三寶者或聞講啓求出家者昔如來化導獲悟不同故法眼無生根性非一上並與其人同發大願別見願文小臣陪侍講筵謹立今序廣弘明集十九自序余為邵陵王友忝還京師遠思前比即楚之唐宋梁之嚴鄒追尋平生頗好辭藻雖在名無成求心己足若乃登高目極臨水送歸風動春朝月明秋夜早雁初鶯開花落葉有來斯應每不能己也前世賈傅崔馬邯鄲繆路之徒並以文章顯所以屢上歌頌自比古人天監十六年始預九日朝宴稠人廣坐獨受旨云今雲物甚美鄉得不斐然賦詩詩既成又降帝旨曰可謂才子余退謂人曰一顧之恩非望而至遂方賈誼何如哉未易當也每有製作特寡思功須其自來不以力構少來所為詩賦則鴻序一作體兼衆製文備多方頗為好事所傳故虛聲易遠梁書蕭子顯傳歲暮直廬賦日躔女度歲華云暮衡輕炭燥權重泉涸藏玄武於太陰蟄螣蛇於高霧日臨圭而易落晷中杙而南傃凝寒氣於廣庭洞層陰於端庫風餮切而晚作雲滄浪而晦景霰的皪於彤庭霙葳蕤於丹屏韜罘罳之飛棟沒屠蘇之高影始飄舞於圓池終停華於方井藝文類聚三初學記三玄圃園講賦曰天監之十七屬儲德之方宣惟玉帛之光盛信昌符之在焉於是上照天下漏泉輪囷之氣吐煙日月之景揚員乃聖武之龍飛載為家於天下思承規於景數遂長發而明社若重光於有周似二英於皇夏方前星而列曜播洪鐘於胤雅去茲永福來即東朝文物是紀聲明是昭發玄章於粉繢靡青緌於翠翹鑾納那而垂藻笳和鳴以承簫載錫其光令聞令望察情幄帳護齒虞庠性與天道言為圭璋詩史遙集禮易翱翔義華洛水文麗清漳昔七覺之吐華高人天而為長道西被乎日用法東流而未朗故授神莂於文昌寄寶船於明兩異昔談而同世亦干年而影響聞填填之注雷見慧雲之初爽真如之軌既接發揮之功已躡開金泥剖玉牒削蒸栗之簡採羅樹之葉石室靈篇南宮神篋所以一音不已而待規重矩疊者矣惟至人之講道必山林之間曠彼奈園與杏壇深淨名與素王模清遊之浩漾擬樂賢之隆壯睿情杳然是焉供帳乃高談玄圃之苑張樂宣猷之上觀夫雲圃要妙總禁林之叫窱稟輦道之三星躔離宮之六曜寫溟浚沼方華作峭其山則峛崺貏豸硱磳誳詭坂墀巀辥夏含霜雪下則溪壑泓澄虹螮降升上則青霄丹氣雲霞鬱蒸金華琳碧銀燭碝石藻玉摛白丹瑕流赤周以玉樹灌叢紫桂香楓篔簹含人桃枝育蟲妙草的皪靈果垂葼長卿寒翠簡子秋紅崖戴雲而吐雨木鳴條而起風中有蘭渚華池淥流濎濘激水推移彌望杳溟倒飛閣之嵯峨漾釣臺而浮迥張翠帳於鴻船泛羽旒於雀艇鳥則杉雞繡質木容錦章戴勝吐綬鸀鶺鷗香璧龜紫鱉鸊鷉鴛鴦風鳴日思高廣浮長內則錢荇菱華菡萏散葩硉矹巨石濻沱碧砂離篩比目纍綺紅蝦漂青綸之蓑折蕩碧組之鬖髿銅龜受水之而獨涌石鯨吐浪而載華所以藉園籞之壯觀將髣像於毗耶於是清宮廣闢宿設宵張華燈熠嚁火樹散芒斂閃六尺籠叢九光穎若流金之出沙嶼粲若列宿之動天潢朝曭朗而戒旦雲依霏而卷簇輕輦西園齊宮北郁文衛濟濟僧徒肅肅法鼓朗而震音衆香馝而流馥亦有百獸旻旻雲車九層芝駕四鹿吳姬楚豔胡笳燕築常從名倡戲馬踏鞠巡少陽渡紫復繞崇賢瞰承祿揚散華之飄颻響清梵於林木燈王歸而贈筵香積來而獻熟似衆聖之乘空若能仁之在目既而俄軒有睟肆筵授几高殿肅而神嚴微言欣而奏理煥嘉語於丹青得親承於音旨智周物而為心情研幾而盡諦言超超而出象理亹亹而踰繫類炙兩娛心之談未足云晉儲真假之理豈能逮史臣乃載筆撰功請事其職賦金相玉式世既聞甘露之言民已登仁壽之域矣將奉瑤宮之陪雲樓之軾福穰穰委如山長莫長永無極廣弘明集二十九上請改郊廟樂辭啓伏惟聖敬率由尊嚴郊廟得西鄰之心知孔子之迹載革牢俎德通神明黍稷蘋藻竭誠嚴配經國制度方懸日月垂訓百王於是乎在臣比兼職齊官見伶人所歌猶用未革牲前曲圜丘視燎尚言式備牲牷北郊諴雅亦奏牲云孔備清廟登歌而稱我牲以潔三朝食舉猶詠朱尾碧鱗聲被鼓鐘未符盛制臣職司儒訓意以為疑未審應改定樂辭以不梁書蕭子雲傳答敕改撰郊廟樂辭殷薦朝饗樂以雅名理應正採五經聖人成教而漢來此製不全用經典約之所撰彌復淺雜臣前所易約十曲惟知性牷既革宜改歌辭而猶承例不嫌流俗乖體既奉令旨始得發矇臣夙本庸滯昭然忽朗謹依成旨悉改約制惟用五經為本其次爾雅周易尚書大戴禮即是經誥之流愚意亦取兼用臣又尋唐虞諸書殷頌周雅稱美是一而復各述時事大梁革服偃武修文制禮作樂義高三正而約撰歌辭惟浸稱聖德之美了不序皇朝制作事雅頌前例於體為違伏以聖旨所定樂論鍾律緯緒文思深微命世一出方懸日月不刊之典禮樂之教致治所成謹一二採綴各隨事顯義以明制作之美覃思纍日今始克就謹以上呈梁書蕭子雲傳答敕論書臣昔不能拔賞隨世所貴規摹子敬多歷年所年二十六著晉史至二王列傳欲作論草隸法言不盡意遂不能成略指論飛白一勢而已十許年來始見敕旨論書一卷商略筆勢洞徹字體又以逸少之不及元常猶子敬之不及逸少自此研思方悟隸式始變子敬全範元常逮爾以來自覺功進梁書蕭子雲傳
