body:
  text: 江淹赤虹賦并序東南嶠外爰有九石之山乃紅壁十里青崿百仞苔滑臨水石險帶溪自非巫咸采藥群帝上下者皆斂意焉於時夏蓮始舒春蓀未歇肅舲波渚緩拽汀潭正逢巖崖相照雨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄奕江湄僕追而察之實雨日陰陽之氣信可觀也又憶昔登爐峰上手接白雲今行九石下親弄絳霓二奇難再感而作賦曰迤邐崎礒兮大極之連山鰅鱅虎豹兮玉虺騰軒孟夏茵蒀兮荷葉承蓮悵何意之容與兮冀暫緩此憂年失世上之異人遲山中之虛迹掇仙草於危峰鐫神丹於崩石視鱣岫之吐翕看黿梁之交積於是紫油上河絳氣下漢白日無餘碧雲卷半殘雨蕭索光烟艷爛水學金波石似瓊岸錯龜鱗之崚崚繞蛟色之漫漫俄而赤霓電出蚴虬神驤曖昧以變依俙不常非虛非實乍陰乍光赩赫山頂照燎水陽雖圖緯之有載曠世識而未逢既咨嗟而躑躅聊周流而從容想番禺之廣野意丹山之喬峰稟傅說之一星乘夏后之兩龍彼靈物之詎幾象火滅而山紅餘形可覽殘色未去耀萎蕤而在草映青蔥而結樹昏青苔於丹渚曖朱草於石路霞晃朗而下飛日通籠而上度俯形命之窘局哀時俗之不固定赤舄之易遺乃鼎湖之可慕既以為朱鬐白毳之駕方瞳一角之人帝臺北荒之際弇山西海之濱流沙之野析木之津雲或怪綵煙或異鱗必雜虹霓之氣陰陽之神焉本集藝文類聚二初學記二四時賦北客長欷深壁寂思空床連流圭窬淹滯網絲蔽戶青苔繞梁春華虛艷秋月徒光臨飛鳥而魂絶視浮雲而意長測代序而饒感知四時之足傷若乃旭日始暖蕙草可織園桃紅點流水碧色思舊都兮心斷憐故人兮無極至若炎雲峰起芳樹未移澤蘭生坂朱荷出池憶上國之綺樹想金陵之蕙枝若夫秋風一至白露團團明月生波螢火迎寒眷庭中之梧桐念機上之羅紈至於冬陰北邊永夜不曉平蕪際海千里飛鳥何嘗不夢帝城之阡陌憶故都之臺沼是以軫琴情動戛瑟涕落逐長夜而心殞隨白日而形削故秦人秦聲楚音楚奏聞歌更泣見悲已疚實由魂氣愴斷外物非救參四時而皆難況僕人之末陋也本集藝文類聚三引夏秋冬三條江上之山賦潺湲澒溶兮楚水而吳江刻劃嶄崒兮雲山而碧峰挂青蘿兮萬仞豎丹石兮百重嵯峨兮巖崿如斫兮如削嶢嶷兮尖出巖岍兮空鑿波潮兮吐納𡸷峰兮積沓鰅鱅兮赤尾黿鼉兮匼匝見紅草之交生眺碧樹之四合草自然而千花樹無情而百色嗟世道之異茲牽憂恚而來逼懷爐炭於片景抱絲緒於一息每意遠而生短恆輪平而路仄信懸天兮窈昧豈繫命於才力既群龍之咸疑焉衆狀之所極俗逐事而變化心應物而回旋既欻翕其未悟亦緯繣而已遷伊人壽兮幾何譬流星之殞天悵日暮兮吾有念臨江上之斷山雖不敏而無操願從蘭芬與玉堅亂曰折芙蓉兮蔽日冀以蕩夫憂心不共愛此氣質何獨嗟乎景沉本集藝文類聚七初學記五井賦穿重壤之千仞兮搆玉甃之百節營之不日既汲既泄御覽百八十九麗色賦楚臣既放魂往江南弟子曰玉釋珮解驂濛濛淥水裊裊青衫乃召巫史茲憂何止史曰臣野膠學蔽理臣之所知獨有麗色之說耳夫絶代獨立者信東方之佳人既翠眉而瑤質亦盧瞳而頳脣鍱金花於珠履颯綺袂與錦紳色練練而欲奪光炎炎其若神非氣象之可譬奚影響而能陳故仙藻靈艷金華玉儀其始見也若紅蓮映池其少進也如綵雲出崖五光徘徊十色陸離寶過珊瑚同樹價直瓊草共枝雖玉堂春姬石室素女張烟霧於海際耀光景於河渚乘天梁而皓蕩叫帝閽而延佇猶比之無色方之非侶於是雕臺繡戶當衢橫術椒庭承月碧幌延日架虬柱之嚴麗亘虹梁之峻密錦幔垂而杳寂桂煙起而清溢女乃耀邯鄲之屣步媚趙北之鳴瑟若夫紅華舒春黃鳥飛時紺蕙初嫩頳蘭始滋不攬蘅帶無倚桂旗摘芳拾蕊含詠吐辭笑月出於陳歌感蔓草於鄭詩故氣炎日永離明火中槿榮任露蓮花勝風後簷丹葵前軒碧桐笙歌畹右琴儛池東嗟楚王之心悅怨漢女之情空至乃西陸始秋白道月弦金波照戶玉露曖天網絲挂墻綵螢繞梁氣已濕兮曉未半星雖流兮夜何央憶雜珮兮且一欷念錦衾兮以九傷及沍陰凋時冰泉凝節軒疊厚霜庭澄積雪鳥封魚斂河凝海結紫帷鉿匝翠屏環合麝密周彰燈爐重沓恥新臺之青樓想上宮之邃閣若乃水照景而見底煙尋風而無極霧出吳而綺章雲堆趙而碧色霧辭楚而容裔風去燕而悽惻莫不輟鏡徙倚攬琴心息於是帳必藍田之寶席必蒲陶之文館圖明月室畫浮雲春蠶度網綺地應紡秋梭鳴機織為褧衣象奩瓊盤神瀝仙丹雕柱綵瑟九華六出翠蕤羽叉緑秀金枝故言必入媚動必應規有光有豔如合如離氣柔色靡神凝骨奇經秦歷趙既無其雙尋楚訪蔡不觀其容亦可駐髮還質驂星馭龍蠲憂忘死保其家邦蓋天下之至麗孰能預於此哉宋大夫耀影汰迹縈魂灑魄賞以雙珠賜以合璧拂巫蕩祝永為上客本集藝文類聚十八待罪江南思北歸賦伊小人之薄伎奉君子而輸力接河漢之雄才攬日月之英色絶雲氣而厲響負青天而撫翼德被命而不渝恩潤身而無極何規矩之守任信愚陋而不肖愧金碧之琳琅慚丹雘之照曜樊天網而自離徒夜分而誰弔遭大道之隆盛雖草木而勿履誤銜造於遠國出顛沛之願始去三輔之臺殿辭五都之城市惟江南兮丘墟遙萬里兮長蕪帶封狐兮比景連雄虺兮蒼梧當青春而離散方仲冬而遂徂寒蒹葭於余馬傷霧露於農夫跨金峰與翠巒涉桂水與碧湍雲清泠而多緒風蕭條而無端猿之吟兮日光迥狖之啼兮月色寒究烟霞之繚繞具林石之巑岏於是臨虹霓以築室鑿山楹以為柱上皓皓以臨月下淫淫而愁雨奔水潦於遠谷汨木石於深嶼鷹隼戰而櫓巢黿鼉怖而穴處若季冬之嚴月風搖木而騷屑玄雲合而為凍黃烟起而成雪虎踡局而斂步蛟躨跜而失穴至江蘺兮始秀或杜衡兮初滋桂含香兮作葉藕生蓮兮吐絲俯金波兮百丈見碧沙兮來往霧葐蒀兮半出雲雜錯兮飛上石照爛兮各色峰近遠兮異象及回風之搖蕙天潭潭而下露木蕭梢而可哀草林離而欲暮夜燈光之寥迥歷隱憂而不去心湯湯而誰告魄寂寂而何語情枯槁而不反神翻覆而亡據夫以雄才不世之主猶儲精於沛鄉奇略獨出之君尚婉戀於樊陽潘去洛而掩涕陸出吳而增傷況北州之賤士為炎土之流人共魍魎而相偶與蠨蛸而為鄰秋露下兮點劍舄青苔生兮綴衣巾步庭廡兮多蒿棘顧左右兮絶親賓憂而填骨思兮亂神願歸靈於上國雖坎軻而不惜身本集藝文類聚二十七恨賦試望平原蔓草縈骨拱木斂魂人生到此天道寧論於是僕本恨人心驚不已直念古者伏恨而死假如秦帝按劍諸侯西馳削平天下同文共規華山為城紫淵為池雄圖既溢武力未畢方架黿鼉以為梁巡海右以送日一旦魂斷宮車晚出若乃趙王既虜遷於房陵薄暮心動昧旦神興別豔姬與美女喪金輿及玉乘置酒欲飲悲來填膺千秋萬歲為恨難勝至如李君降北名辱身冤拔劍擊柱弔影慚魂情往上郡心存鴈門裂帛繫書誓還漢恩朝露溘至握手何言若夫明妃去時仰天太息紫臺稍遠關山無極搖風忽起白日西匿隴鴈少飛代雲寡色望君王兮何期終蕪絶兮異域至乃敬通見抵罷歸田里閉關卻掃塞門不仕左對孺人顧弄稚子脫略公卿跌宕文史齎志沒地長懷無已及夫中散下獄神氣激揚濁醪夕引素琴晨張秋日蕭索浮雲無光鬱青霞之奇意入修夜之不暘或有孤臣危涕孽子墜心遷客海上流戍隴陰此人但聞悲風䫻起泣下霑襟亦復含酸茹歎銷落湮沉若乃騎疊迹車屯軌黃塵匝地歌吹四起無不煙斷火絶閉骨泉裏已矣哉春草暮兮秋風驚秋風罷兮春草生綺羅畢兮池館盡琴瑟滅兮丘壟平自古皆有死莫不飲恨而吞聲文選別賦黯然銷魂者唯別而已矣況秦吳兮絶國復燕宋兮千里或春苔兮始生乍秋風兮暫起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而奇色舟凝滯於水濱車逶迤於山側棹容與而詎前馬寒鳴而不息掩金觴而誰御橫玉柱而沾軾居人愁臥恍若有亡日下壁而沉彩月上軒而飛光見紅蘭之受露望青楸之罹霜巡層楹而空掩撫錦幕以虛涼知離夢之躑躅意別魂之飛揚故別雖一緒事乃萬族至若龍馬銀鞍朱軒繡軸帳飲東都送客金谷琴羽張兮簫鼓陳燕趙歌兮傷美人珠與玉兮艷暮秋羅與綺兮嬌上春驚駟馬之仰秣聳淵魚之赤鱗造攜分手而銜涕各寂寞而傷神乃有劍客慚恩少年報士韓國趙廁吳宮燕市割慈忍愛離邦去里瀝泣共訣抆血相視驅征馬而不顧見行塵之時起方銜感於一劍非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和負羽從軍遼水無極鴈山參雲閨中風暖陌上草薰日出天而耀景露下地而騰文鏡朱塵之照爛襲青氣之烟熅攀桃李兮不忍別送愛子兮沾羅裙至如一赴絶國詎相見期視喬木兮故里訣北梁兮永辭顧左右兮魄動視親賓兮淚滋可班荊兮增恨唯樽酒兮敘悲值秋鴈兮飛日當白露兮下時怨復怨兮遠山曲去復去兮長河湄又若君居淄右妾家河陽同瓊珮之晨照共金爐之夕香君結綬兮千里惜瑤草之徒芳慚幽宮之琴瑟晦高臺之流黃春閨閟此青苔色秋帳含茲明月光夏簟青兮晝不暮冬釭凝兮夜何長織錦曲兮泣已盡回文詩兮影獨傷儻有華陰上士服食還仙術既妙而猶學道已寂而未傳守丹竈而不顧鍊金鼎而方堅駕鶴上漢驂鸞騰天暫遊萬里少別千年惟世間兮重別謝主人兮依然下有芍藥之詩佳人之歌桑中衛女上宮陳娥春草碧色春水淥波送君南浦傷如之何至乃秋露如珠秋月如圭明月白露光陰往來與子之別思心徘徊是以別方不定別理千名有別必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙嚴樂之筆精金閨之諸彥蘭臺之群英賦有凌雲之稱辨有雕龍之聲詎能摹暫離之狀寫永訣之情者乎文選藝文類聚三十去故鄉賦日色暮兮隱吳山之丘墟北風析兮絳花落流水散兮翠𧏤疏愛桂枝而不見悵浮雲而離居乃凌大壑越滄淵沄沄積崚水橫斷山窮陰匝海平蕪帶天於是泣故關之已盡傷故國之無際出汀州而解冠入漵浦而捐袂聽蒹葭之蕭瑟知霜露之流滯對江皋而自憂弔海濱而傷歲撫尺書而無悅倚樽酒而不持去室宇而遠客遵蘆葦以為期情嬋娟而未罷愁爛漫而方滋切趙瑟以橫涕吟燕笳而坐悲少歌曰芳洲之草行欲暮桂水之波不可渡絶世獨立兮報君子之一顧是時霜翦蕙兮風摧芷平原晚兮黃雲起寧歸骨於松柏不買名於城市若濟河無梁兮沉此心於千里重曰江南之杜蘅兮色以陳願使黃鵠兮報佳人橫羽觴而淹望撫玉琴兮何親瞻層山而蔽日流餘涕以沾巾恐高臺之易晏與螻蟻而為塵本集藝文類聚三十哀千里賦蕭蕭江陰兮荊山之岑北繞琅琊碣石南馳九疑桂林山則異嶺奇峰橫嶼帶江雜樹億尺紅霞萬重水則遠天相逼浮雲共色沄沄無底溶溶不測其中險如孟門豁若長河參差巨石縱橫龜鼉若乃夏后未鑿秦皇未闢嶄岩生岸迤𨓦成迹馳湍走浪漂沙擊石伊孟冬之初立出首夏以歸來自出國而辭友永懷慕而抱哀魂終朝以三奪心一夜而九摧徒望悲其何及銘此恨於黃埃於時鴻鴈既鳴秋光亦窮水黯黯兮蓮葉動山蒼蒼兮樹色紅思雲車兮沅北望霓裳兮澧東惜重華之已沒念芳草之坐空既而悄愴成憂憫默自憐信規行之未曠知矩步之已難雖河北之爽塏猶橘柚之不遷及年歲之未晏願匡坐於霸山本集泣賦秋日之光流兮以傷霧離披而殺草風清泠而繞堂視左右而不臑具衣冠而自涼默而登高谷坐景山倚桐柏對石泉直視百里處處秋烟闃寂以思情緒留連江之永矣蓮欲紅南有喬木葉以窮心蒙蒙兮恍惚魄漫漫兮西東詠河兗之故俗眷徐楊之遺風眷徐楊兮阻關梁詠河兗兮路未央道尺折而寸斷魂十逝而九傷欷潺湲兮沫袖泣嗚唈兮染裳若夫景公齊山荊卿燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視鏡終古而若斯況余輩情之所使哉本集御覽四百八十八倡婦自悲賦并序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮乃為辭焉粵自趙東來舞漢宮瑤序金陳桂枝嬌風素壁翠樓明月徒秋歌聲忽散傷人復愁君王更衣露色未晞侍青鑾以雲聳夾丹輦以霞飛願南山之無隙指壽陵以同歸俄而緑衣坐奪白華臥進屑骨不憐擅金誰吝九重已關高門自蕪青苔積兮銀閣澀網羅生兮玉梯虛度九冬而廓處遙十秋以分居傷營魂之已盡畏松柏之無餘歸故鄉之末光實夫君之晚滋去柏梁以掩袂出桂苑而斂眉視朱殿以再暮撫嬪華而一疑於是怨帝關之遂岨悵平原之何極霜繞衣而葭冷風飄輪而景昃御思趙而不顧馬懷燕而未息泣遠山之異峰望浮雲之雜色若使明鏡前兮碎孤鴈之錦翼乃為詩曰曲臺歌未徙黃壤哭已親玉玦歸無色羅衣會成塵驕才雄力君何怨徒念薄命之苦辛本集藝文類聚三十二知己賦并序陳國之華者故吏部郎殷孚其人也博而能通學無不覽雅賞文章尤愛奇逸雖志隱巖石而名動京師矣才多深見氣有遠度雖安期千里不能尚焉始於北府相值傾蓋無已僕乃得罪嶠外遐路窈然始還舊都會君尋卒故為茲賦以寄深哀順祗效寶瀆靈會昌時雨種祉山雲降祥承瑤葉之餘曖系金枝之末光聳孤韻以風邁騫逸氣以烟翔故學不常師而心鏡群籍理不啓問而情照諸密採圖辨緯遊機訪曆潛志百氏沈神六經冥析義象該洽性靈儒不隱迹墨無遁形既含道潤亦發才華采耀秋月文麗冬霞有體有艷光國光家識包上仁義兼高行如彼清波可挹可鏡又象沖室惟清惟淨氣擬北海情方中散風流未輟盛名猶纂英馳芬激譽流聲滿我筠心而松性君金采而玉相伊邂逅之未遇爰契闊於朱方丹瓊譬而非寶緑蘭比而無芳每賞矜其如契貴懷允而不忘亟閒席兮惆悵屢緩帶而從容論十代兮興毀訪五都兮異同談天理之開基辨人道之始終罄龍圖及鳳書傾蒼冊與篆字儲西國之闕文採東京之逸記閲歆向之舊旨闡鍾王之新意對楚漢之贍墨覽魏晉之鴻策校遠近之真假削古今之名實每齊韻而等徑輒同懷而共術吐情志而深賞忘年齒而隆眷擬余才兮前華比余文兮後彥余結袂於山石君憑神於寒霰何遠期之未從痛戢景其如電堂酒兮一塵暮燈兮萬春黛草兮永祕朱丹兮何晨聞瑤質兮可變知余采兮一奪唯華名與芳暉兮爭日月而無沫本集傷友人賦并序僕之神交者嘗有陳郡之袁炳焉有逸才有妙賞博學多聞明敏而識奇異僕以為天下絶倫黯與秋草同折今不復見才矣既而陳書有念橫瑟無從雖乏張范通靈之感庶同嵇向篤徒之哀乃為辭曰泫然沾衣兮悲袁友之英秀系神緒而作氏胤靈枝而啓胄轢四代而式昌洎十葉而克茂友人之生川岫降明峻調迥韻惠志聰情倜儻遠度寂寥靈素文攀淵卿史類遷固譬如冬雪既潔將似秋月至徹乃上代而少雙故叔世而曠絶弔蕙若之暫芳慟琬琰之永闕余既好於斯友乃神交於一顧邈疇年之繾綣窈生平之遊遇既遊遇兮可尋乃協好兮契心懷愛重於素璧結分珍於黃金識一代而笑淺訪古人而求深故高術而共徑豈異袖而同襟爾挂情於霜柏我發意於冬桂攬千品之消散鏡百侯之衰替帶荊玉而爭光握隨珠而比麗披圖兮照籍抽經兮閲史共檢兮洛書同析兮河紀既思遊兮百說亦窮精兮萬里愛詩文之綺發賞賦艷兮錦起罄古今之寶賮殫竹素之琛奇信朝日之徒昃屬夜星之空移覽秋實於西苑摘春華於東池蚤同歲於上京未滿年於下國爾湘水兮深沉我前山兮眇默惟音華與書酒伊楚越兮南北余結誼兮梁門復從官兮朱藩何人遙而困阻而天道之匪存凋碧玉之神樹銷紫芝之靈根承遠書於江澨結深痛於爾魂魂綿昧其若絶泣縈盈其若結吝妙賞之不留悼知音之已逝金雖重而見鑄桂徒芳而被折百年一盡兮貴揚蕤於後烈本集藝文類聚三十四傷愛子賦有序江艽字胤卿僕之第二子也生而神俊必為美器惜哉遘閔涉歲而卒悲至躑躅乃為此文惟秋色之皓皓心結縎兮悲起曾憫憐之慘悽痛掌珠之愛子形惸惸而外施心切切而內圮日月可銷兮悼不滅金石可鑠兮念何已緬吾祖之赫羲帝高陽之玄胄惜衰宗之淪沒恐余人之弗構覬三靈之降福佇弱子之擢秀酷奈何兮胤卿那逢天兮不祐爾誕質於青春攝提貞乎孟陬謂比方於右列望齊英於前修遰高行之美迹弘盛業之清猷白露奄被此百草爾同凋於梧楸憶朱明之在節顧岐嶷之可貴睨爐帳而多怊瞻戶牖而有慰奚在今之寂寞失音容之髣佛姊目中而下泣兄嗟季而飲淚感木石而變哀激左右而隕欷奪懷袖之深愛爾母氏之麗人屑丹泣於下壤傃殷憂於上旻視往端而劈栗踐遺緒而苦辛就深悼而誰弭歸末命兮何陳我過幸於時私爰守官於江潯悲薄暮而增甚思曛黃而不禁月接日而為光霞合雲而成陰霧籠籠而帶樹月蒼蒼而架林嗟奈何兮弱子我百艱兮是尋驗纖帶之夜緩察葆鬢之朝侵惟人生之在世恆歡寡而戚饒雖十紀之空名豈百齡之能要迅朱光之映夜湛白露之凝朝指茲譬而取免排此理以自銷然則生之樂兮親與愛內與外兮長與稚傷弱子之冥冥獨幽泉兮而永閟余無愆於蒼祇亦何怨於厚地信釋氏之靈果歸三世之遠致願同升於淨剎與塵習兮永棄本集釋藏策人廣宏明集二十九下學梁王兔園賦并序或重古輕今者僕曰何為其然哉無知音則已矣聊為古賦以奮枚叔之製焉碧山倚巘崎兮象海水碣石朝日晨霞兮赩紅壁仰望泬寥兮數千尺𥓪𥕋嵺𥔍汨淈成岫谽呀而窟竇硣碻礐確紫蕪丹駮苔點綺縟若斷若續如此者百有十處奔水激集瀴溟潔渠潏湟吐吸跳波走浪濺沫而相及㵿漾長驚澆灌遠注無時息焉青樹玉葉彌望成林亦有輪囷磊硊一枝百頃萬葉共陰縹草丹蘅江離蔓荊酷郁交布原滿隰平於是金塘湎演緑竹被坂繚繞青翠近而復遠白砂如積雪者焉碧石如圓玦者焉水鳥駕鵝鸀鳿雛鴈上飛衡陽下宿沅漢十十五五忽合而復散乃有綺雲之館頳霞之臺其樂足以棄國釋位遺死忘歸也若夫墨翟商瞿之倫學兼師術才參道真方駕連軫于沼之濱乃射宿餌魴前繳鷫鷞青黏黃粱臛鱉胾羹臑㹠柘漿窮嬉極娛雲翱兮煙翔超然左覽蒼梧右睨鄧林崩石梧岸崱屴藏陰逮至山頂丹壁四平靈木夾道神草列生俯瞰太一下視流星既投冠而棄劍亦扤魄而蕩靈於是大夫之徒稱詩而歸春陽始映朱華未希卒逢邯鄲之女蕙色玉質命知其麗攢連映日綺裳下見錦衣上出雖復守禮令人意失遂謠曰碧玉作碗銀為盤一刻一鏤化雙鸞乃報歌曰美人不見紫錦衾黃泉應至何所禁妃因別曰見上客兮心歷亂送短詩兮懷長歎中人望兮蠶既飢躞蹀暮兮思夜半本集藝文類聚六十五初學記二十四橫吹賦并序驃騎公以劍卒十萬禦荊人於外郊鐵馬煩而人聳色綵旄耀而士銜威軍容有橫吹僕感而為之賦云北陰之竹兮百尺而不見日石硿礲而成象山沓合而為一雲徑徑而孤去風時時而寒出木斂柯而攢抏草騫葉而蕭瑟故左崎嶬右硱磳樹岩崿水泓澄鎮雄蛟及雌虺䫻獨鴟與單鷹白山皓赤山赩匝流沙經西極原陸窈灌莽深人聲絶馬迹沉寂然四顧增欷纍吟雖欲止而不能禁此竹方可為器乃出天下之英音於是帶以珉色扣以瓊文潤如沉水華若浮雲赤綬紫駮星含露分其聲也則鞅鬱有意摧萃不群超遙衝山崎曲抱津綿羃順序周流銜呂故西骨秦氣悲憾如懟北質燕聲酸極無已斷絶百意繚繞萬情吟黃烟及白草泣虜軍與漢兵於是海外之雲處處而秋色河中之鴈一一而學飛素野黯以風暮金天赩以霜威衣袂動兮霧入冠弓刀徑兮馬毛寒五方軍兮出不及雜色騎兮往來還旃如雲兮幟如星山可動兮石可銘功一堅兮迹不奪魂既英兮鬼亦靈奏此吹兮有曲和歌盡而淚續重一命而若烟知半氣之如燭美人戀而嬋媛壯夫去而躑躅故感魂傷情獲賞彌倍妙器奇製見貴歷代所以韻起西國響流東都浮江繞泗歷楚傳吳故函夏以為寶飾京關以為戎儲至于貝胄象弭之威織文魚服之容堇山錫刃耶溪銅鋒皆陸斷犀象水斬蛟龍載雲旗之逶迤扈屯騎之溶溶啾寥亮於前衡嘒陸離於後陳視眄眩而或近聽嘹嘈而遠震奏白登之二曲起關山之一引吐哀也則瓊瑕失綵銜樂也則鉛堊生潤採菱謝而自罷緑水慚而不進代能識此聲者長滅淫而何吝本集
