body:
  text: 𥳑文帝大法頌并序皇帝以湛然法身不捨本誓神力示現降應茲土龍顏日角參漏重瞳衡表連珠文為玉斗自納麓開基天地之德已布封唐啓跡日月之照先明百揆之序方舜九河之導均禹尚弘事殷之禮且屈在田之則自五昴朝飛告赤文之瑞其雨七日受緑色之符神器有歸鼎運斯集焦門厭棄德之君鮪水發白旄之陳然後受皇天之眷命當四海之樂推豈假祀蚩尤於沛庭託河冰於王霸於時鳳鳳裂序蒼蒼舛度乃選五石以補之坤軸傾斜積冰發坼乃緯九藪而正之陰兔兩重陽烏三足乃定王業以暉之攝提乖方孟陬失紀乃置清臺而辨之維冠冕於已頽綴珩珮於既毀自憑玉几握天鏡履璿璣而端拱居巖廊而淵默於今三十有二載也是以天德一於上地數二於下復朗參辰不易日月兩曜如合璧五精如連珠禋宗類昊虔丘禮澤敬行五祀功被百神川嶽呈祥風煙效祉青雲干呂黃氣出翼聽隃山之威鳳製大夏之貞筠陽管叶春雌鍾應律上林之課匪疏相府之占無謬奏六英於若水張咸池於洞庭秉翟動和天之樂建華宣易俗之奏協律有渢渢之序典樂致雍雍之節詩書乃陳緗縹斯備蒲輪受伏生之誦科斗薦魯宅之文蒸栗殺青玉牒石記填委廣內暉煥麒麟置台命袞法河依嶽建職樹司區雲祥火高山容與赤黻邐迤色麗文翬章妍織鳥諫鼓高懸芻言不棄肺石通惋書謗橋板草名指佞便辟去朝獸稱觸罪姦回放黜是以龍翔鳳集河溓海夷露下若飴泉浮如醴桂薪不斧而丹甑自熟玉皋詎率而銀甕斯滿河光似羃樹彩成車氛氳四照暉麗五色神明磊落徵祥布濩金鱗鐵面貢碧砮之賝航海梯山奉白環之使戴日戴斗靡不來王太平太蒙無思不服方叔邵虎之臣均鼙應鼓之將秉龍虎之祕韜握朱玄之異略受脤於廟堂之上揚威於關塞之下出玉門而直指度金城而奏策蕩雜種之殘妖匡中原之塗炭北臨地脈西出天渠昆夷罷患夙沙自服獲犬戎之鹿懸密須之鼓槀街有受纓之虜渃水觀受降之首四表無塵六合共貫皇德隆矣太平之風浹乎無外矣天子內韜無生之至慧外應體乾之弘跡將欲改權教示實道遣方便之說導化城之迷乃端扆神居吁而言曰若夫眇夢華胥怡然姑射服齊宮於玄扈想至治於汾陽輕九鼎於褰裳視萬乘如脫屣斯蓋示至公之要道未臻於出世也至於藏金玉於川岫棄琴瑟乎大壑卑宮菲食茨堂土階彤車非巧鹿裘靡飾斯蓋示物以儉亦未階於出世也解網放禽穿泉掩胔起泣辜之澤行扇暍之慈推溝之念有如不足納隍之心無忘宿寤蓋所以示物以為仁亦未階乎出世也紫府青丘陘山漳水敦河上之道文悅岐伯之章句甘泉啓太一之壇嵩山置奉高之邑碣石刻羡門之誓不其作交門之歌斯蓋止愛久齡事存諸己篤而為論彌有未弘雖獲巃嵷之禪終墮長生之難徒階三清之樂不祛八倒之境豈若然智慧之炬照生死之暗出五陰之聚升六度之舟浮衆得之海踐不至之岸於是莊嚴國界建立道場廣行利益開闡佛事驅彼衆生同躋仁壽引茲具縛俱入大乘九有傾心十方草靡如憑津濟咸賴歸依曄乎若朝日之開衆華霈乎若農夫之遇膏雨功德之翼已圓智慧之門必備以為般若經者方等大法峻極靡際深邃無底籠萬善乎無相兆九垓而無邊譬猶枝川派別入大海而同味衆芳雜彩到須彌而一色空空不著如如俱會不合不散無去無來種覺可生允茲佛母群典弗逮是號經王乃欲震一音雨法雨示五眼引重昏昭陽紀歲玄枵次星夾鍾應乎仲春甲申在乎吉日將幸同泰大轉法輪茲寺者我皇之所建立改大理之署成伽藍之所化鐵繩為金沼變鐵網為香城照神光於熱沙起清涼於炎火千櫨巀孽百栱穹窿紅壁玄梁華榱玉砌三階齊列四注周流上玉翼而捫天飛銀楹而蔽景虹拖蜿垂承甍繞𣠚蓮抽井倒冒宇臨窗彤彤寶塔既等法華之座峨峨長表更同意樂之國下鑿白銀之塹傍暉金薄之甎高門洞啓不因銅馬之飾寶殿霞開無假鳳皇之瑞金輪燭日妙臨淄之地下層臺纍駕邁宛委之空飛夏宇凝霜溫室含暖雕樓之內蠖動而響生洞扉之裏鷦歸而氣激幢號摩尼幡懸金縷盤徑十丈鈴圍四斛舒七寶之交枝流八功之淨水地芝候月天華逆風法鼓夜鳴聲中聞法瓊枝旦動葉裏成音妙德陽之宮麗未央之閫故銅櫩三丈追嗤井幹玉樓十二遙恥神仙譬彼清涼之臺同符蘭臺之寺忉利照園之東帝釋天城之北故以辛壬癸甲綿蠻霮䨴吁哉其不可狀鏘鏘旰旰瓌譎雜錯邈乎其不可名於是璧日揚精景雲麗色薰風徐動淵露微垂後距屯威前茅警列武校星連鴻鐘吐響運天宮之法駕啓天路之威神百靈扶持千乘雷動六虬齊軫七斗垂暉雲罕乘空鉤陳翼駕超光躡景日被天回金蓋玉輿豹服鼉鼓驖驪沃若天馬半漢緑弓黃弩象飾魚文佽飛案節不勞斬蛟之劍虎賁韜羽豈假鳴烏之射湛湛奕奕轔轔赫赫出乎大通之門天子降雕輦之貴行接足之禮頂拜金山歸依月面如聞萬歲之聲若觀六變之動於是乃披如來之衣登獅子之座均百慮之紛總愍三請之殷勤啓真慧之深宗明度彼之弘教二諦現空有之津二智包權實之底大乘豁其靡礙道心究其歸涯因果之攝不運而行真俗莫求弗動斯到不以二法會乎中道盡佛淵海入佛法藏極修妬之妙典研龍宮之祕法宣娑婆之奧旨闡衆聖之微言正水既沾邪難自息慧日普照毒霜竝消除黑暗於四生遣無明於三界巍巍乎若彌樓之在巨海穆穆乎譬衆星之繞圓月於時天龍八部側塞空界積衣成座散華至膝三千化穢土之質火宅有離苦之期惡道蒙休泥犂普息詵詵學侶濟濟名僧皆樂說如辨才智慧如身子踰乎青目黑齒高彼廣膝赤髭咸符寫瓶之思竝沾染㲲之施如金復冶似玉更雕聞所未聞得未曾得鬱搖動色請益無倦百司俱列簪履相趨豐豹焜煌華綬苒蒻謂舍衛之集大林之講無以過也將令一一佛性逢了因而俱出一一佛土咸遣二而除三比夫歌南風尚黃老臨辟雍講孔宅么麼安足而語哉距於三月甲辰法席圓滿如來放大光明現希有事雄雄吐色珠火非儔曈曈上映丹紫競發榮河恥其祥潤汾陰陋其暉影掩入殿之紫雲奪鴻門之妙氣昔法華初唱毫照普臨般若聿宣通身盡笑王城之瑞千載更逢豈非聖主同諸佛身降茲妙相等諸佛力若符契焉猶秉淵默之謙虛弘懍焉之至誡為而不宰推而勿居以百姓之心為心非關諸己荷負無倦攝受四生皇太子臣綱視膳東廂親承大法以為西巡東狩讚頌以興柴山望祀詠歌斯作況頂開而受露鞠躬而聞道敢述盛德之形容以為頌曰玉牒悠敻青史綿長道沿五勝風殊百王商丘命瑱姬水開璜河澄待聖海謐期皇方天譬地功歸有梁垂拱南面克己巖廊權輿教義製造衣裳九韶革響六樂改張儀鳳婉婉擊石鏘鏘廣修璧水洞啓膠庠輕軺徵聘旌帛搜揚蘭臺且富廣內斯藏藝香蘭馥緑字摛章文功既被武跡斯彰題雕臆鏤舌紫支黃南街請質北闕來王飛旌集翰勒跡書狼銀車引附黑節招荒文同海截化普龍鄉西踰月窟東漸扶桑卑宮類禹解網如湯衢室納異明臺引良善旌弗卷諫鼓其鏜萬符集祉百神啓祥黑丹吐潤朱草舒芳珠懷鏡像星含喜光液池下鶴高梧集凰赤熊旦繞素雉朝翔觀玉伯友訪道西王遊經建木巡指盛唐終非運出豈曰津梁我有無礙共向圓常玉鑾徐動金輪曉莊紫虬翼軑緑驥騰驤虎文駐蹕龍驂啓行闌干玉馬照曜天狼玄旄映日翠鳳晞陽前飛格澤後擁陸梁風移霆掃參差焜煌峨峨寶座郁郁名香法徒學侶塵沙堵牆慈雲吐澤法雨垂涼三密不限四辨難量猶茲海寶譬彼山王慧流總被藥木開芒佛日出世同遣惑霜帝釋歌詠幽祇讚揚空華競下天琴自張山含影色地入毫光非煙繞氣陸藕開房澤普三界恩均八方巍巍堂堂為舟為航伊臣稽首萬壽無疆廣宏明集二十藝文類聚七十六菩提樹頌并序竊以因緣假有衆生之滯根法本不然至人之妙理是以三界六趣繞業障而自迷八解十智導歸宗而虛豁是以能仁大師隨緣布道愍焰宅之既焚傷欲流之永騖託白淨之宮照黃金之色居茲三惑示畫篋之非真出彼四門驚浮雲之易滅於是佛日啓法雷震設漸教降權迹三寶現世一道知歸大接群蒼救茲未度法雨法水之潤等世界於無邊智燈智炬之光同虛空於莫限物因難量化緣將息林開白樹日映青枝悲哉六識沈淪八苦不有大聖誰拯慧橋皇帝體乾元之睿德合天地之純誠照玉鏡之神握太平之運吞虞孕夏罩漢籠周御六氣而子蒼生扇二儀而布亭毒緯樂經禮偃武修文秋荼不設廢九律之嚴科春雨愛生解三驅之密網固以咸池之靈自失汾水之德知慚少陽懋善於元真蕃臣燮和於槐袞八凱三座九棘四科之士內宣王事運策橫行專城推轂之將外守封疆一同文軌萬方共貫穿胸鏤臆之酋短身長臂之師南越鑠石北極天沙東邁日枝西踰月紀莫不梯峰挂迥越繩度之山航海跨深泛浮毛之浪奉方入貢進忠請職獻同心之鳥貢比肩之獸爾乃嘉祥競發寶瑞咸委靈芝潏露月萃郊園義鳳仁虎日聞郡國如珠如璧既照燭於中畿若雲非雲亦徘徊於宮雉於是驅黎民於仁壽濟動植於幽隍歲樂民殷家給戶足班白不提挈童稚有謳歌從善如流應風猶草開農務本鑄刃銷鋒紅粒盈箱青蚨委貫上照天下漏泉天既成矣地既平矣天子乃均一子愍四先示正行之因標出要之路廣設道場大弘妙法涅槃寶棹接惑衆於背流慈悲光明照群迷於未曉法輪遍乎大千清涼被於小葉故天人舞鳳去照園而讚善菩薩飛象越香土而來儀五百寶蓋騰光自合十千纓絡縣空下墜龕室莊嚴國界殊特製三時之殿聳四柱之臺雖漢后望神之宮軒轅待仙之觀曾何足擬髣佛寶雲儀形等覺於是想成道之初建菩提之樹四海呈珍百工薦巧雕金縷碧綴鏡懸珠製似雪山形同飛蓋四匝垂陰五面益物名高滿月德踰普覆竝豔千光之樹連英五色之華璧日垂彩玉蒂生烟微風徐動寶枝成樂儼然妙色蔭此曲枝顯若金山尊如聚月信女百味之初諸天四鉢之狀散漫祥草連翩青雀伏吐電之魔卻擔山之鬼奇姿瓌質不可勝言此實生善之妙緣進行之深福當今盛美曩代未聞方應照德不窮懸諸日月巍巍永樂萬萬斯年敢作頌曰綿史載觀靈篇眇鏡寶冊葳蕤帝圖掩映鳥紀稱祥龍書表慶九州布德五絃作詠蒸哉至矣有梁啓聖功覆終古業高受命金輪降道玉衡齊政無思不服有德斯盛一乘運出五眼清淨稟識康歌昆蟲得性舜廚靈蓮堯庭神莢豈如道樹覆潤弘浹靡密垂光芬芳委疊時動百華乍開千葉現彼法身圖茲瑞牒海度六舟城安四攝惠澤四播淳風普叶休明智境清朗法泉百神嗟仰千佛稱傳榮光動照玉燭調年菩提永立波若長宣穆穆明后萬壽如天廣宏明集十五連珠吾聞有古富而今貧可稱多而賑寡是以度索數下獨有衰神松柏橋南空餘白社廣宏明集三十上吾聞言可覆也仁能育物是以欲輕其禮有德必昌兵踐於義無思不服御覽五百九十引三國典略梁簡文為侯景所幽作連珠云云又見廣宏明集三十上吾聞道行則五福俱湊運閉則六極所鍾是以麟出而悲豈唯孔子途窮則慟寧止嗣宗御覽廣宏明集同上行雨山銘巖畔途遠阿曲路深猶云息馭尚且抽琴茲峰獨擅嶔崎千變卻繞畫房前臨寶殿玉岫開華紫水回斜溪間聚葉澗裏縈沙月映成水人來當花藤結如帷磧起成基藝香馥徑石鏡臨墀藝文類聚七明月山銘迢遞峰長威紆嶽聚既正書門兼同天柱非競小山寧論大庾豈學土龍詎須石鼓緅色斜臨霞文橫豎藝文類聚七書案銘刻香鏤彩纖銀卷足照色黃金回花青玉漆華映紫畫製舒緑性廣知平文雕非曲廁質錦帷承芳綺縟敬客禮賢恭思儼束披古通今察姦理俗仁義可安忠貞自燭鑒矣勒銘知微敬勖藝文類聚六十九御覽七百十錫杖銘妙節嘉光遊聖振灼排空霧轉騰雲鳳躍永異玉神長踰金錯藝文類聚六十九紗扇銘風發曜光空月照霜藝文類聚六十九鏡銘金精玉英冰輝沼清高堂懸影仁壽摛聲雲開月見水淨珠明藝文類聚七十釋迦文佛像銘至矣調御行備智周滿月為面青蓮在眸心珠可瑩智流方溥永變身田長無沙鹵藝文類聚七十七引二條今合録之彌陀佛像銘玉蓮水開銀花樹落惟聖降神拯彼沈漠維衛佛像銘灼灼金容巍巍滿月永被人天常留花窟式佛像銘影生千葉花成四柱塔象單留龕童雙舞迦葉佛像銘慧雨自垂仁風永扇照曜白毫半容月面惡因有滅善燈無變竝藝文類聚七十七梁安寺釋迦文佛像銘帝為知仰皆規面象敬模螺髮式圖輪掌信根有五覺枝云七仰福靈祇上生兜率藝文類聚七十七秀林山銘并序神山本名秀林山或稱辰山在華亭西北二十餘里列九峰第四僻左一方雖非巨麗未經標品而自古神仙往往託跡實震旦之靈阜也余以機暇結駕游衍覽茲佳勝眷焉有懷乃作銘曰閣號天井山稱地維碧雞金馬越瀆梁池懷靈蘊德孕寶含奇此亦仙岫英名遠摛昔有鷲窟不燒淨土邁彼高蹤構茲法宇引葉成帷即樹為柱石砌危橫崖階斜豎白巘途遠丹源路深長林萬頃偉木千尋竹裏看博松閒聽琴捐氛蕩纍散賞娛襟梁大寶元年歲次庚午春三月十五日題寫文苑英華大愛敬寺剎下銘夫波若真空導大生於假域涅槃有岸引未度於無邊應此十千現茲權實隨方攝受孰能弘濟皇帝照盡神原心凝寂境深慈降跡下答蚳蝝握鏡斷鼇經綸世祖故能天地貞觀日月重光業曠四弘功侔十力惠雲旦聚浸澤灑於遐外法炬夜明揚光燭於梵頂因心孝愛道契神明昭事誠享曰隆哀敬金車答瑞追德慶於虞年甘露登祀比嘉祥於漢日既而理局遙圖事稽終典思所以功超域外道邁寰中廣樹大緣增隆勝善事等淨名齊方便於圓極跡均妙掌襲兩寶於冥因乃於鍾山竹澗奉為皇考太祖文皇帝造大愛敬寺焉惟茲神嶽勢負龍形均太華之四成狀彭門之雙起曲㵎推移激水精之浪清風窈蕩散雲母之竹顯帶皇邑標地德之慶雲彌望帝躔矚神居之敞麗昔雁泉之願真如所騭鷲形之嶽大聖攸居創此伽藍同符往跡以普通三年歲次壬寅二月癸亥朔八日庚午建七層靈塔百旬既聳千龕乃設漸山啓基踰於禁𥦝國土金剎長表邁於意樂世界珠幡轉曜寶鈴韻響聞聲者入道見形者除纍仙衣梵帶去雁塔而來遊天香風笙辭鶴城而下集靈祇叶贊有識歸依四將五龍翹勤翼衛八臂三目頂帶護持雖復劫盡恆沙衣消巨石儼如常住妙相長存作銘曰朕哉睿聖至矣炎精功昭鳳紀德契雲名冥符七覺爰極四生儀形懋典道駿有聲皇心閔睇理篤天誠八萬神搆二四雲并懸梁浮柱沓起飛楹日輪下蓋承露上擎玉函蘊色珠髮韜明花窟炎聚石影光輕天下欽仰幽顯贊成法舟斯濟惠海方清淨界無毀金地永貞文苑英華七百八十五草堂傳汝南周顒昔經在蜀以蜀草堂寺林壑可懷乃於鍾嶺雷次宗學館立寺因名草堂亦號山茨文選北山移文注司徒始興忠武王誄皇源地闡帝業天維於穆忠武光國之基爰自弱齡英明播越玉潤冰鮮山靜雲發帝曰爾諧僉議彼屬推轂兩江建旗三蜀將旋上國戀結四民三鱣表服二鹿隨輪方變正袞永範時規天弗報善哲人其萎響哀挽於北邙去承明而不入望參差之流影聽潺湲之雨泣藝文類聚四十七大同哀辭并序大同字仁洽豫之第十九子也生於仲秋殞於冬末悲夫潛慟結於心愁眉慘於外夕坐於是申旦當食以之不甘客有謂豫曰死生常也夭壽命也陳蕃所憩之家久傳紀録之歲華歆所聞之語已定北陵之期上聖所以忘情賢者所以達節將何戚焉豫對之曰觀其明眸豐下玉色和聲豈不登髫歲而擬觸藩及紈袴而知折李靈心摧於毫末慧識挫於趾步庶方悟於來途遂窮魂於短日豈不傷哉乃為辭曰含精鬱抑歎嗟何極云誰之悲悲豫弱息實天道之偏頗觀賦命之殊舛彼神蔡之靈長獲萬春之攸緬有蕣華之照灼寄一朝之浮命始夢熊而兆吉遂設弧而表慶驗天蘭之所受知地井之可映愛萱草之有徵欣赤茀之在詠信歎慰之未幾悼夭零之云及乃變樂而為悲遂改笑而成泣昔珠褓之交舒又金香之相襲藉綺茵於弱肌隱孩笑於羅帷今獨親於玄壤亦何痛其如之憶餘態而心楚想媚質而回腸藥尚殘而染地衣猶襞而在床卷金屏之四葉開銀函之九羊忽徘徊而想象曾何時而不傷於是風景暮鍾氣嚴晚候葉蔌蔌而走階水戔戔而鳴漏月半鏡而開河雲羅柱而下岫燈發焰而吐花火含光而成就金鹿之恨涕沾衣金瓠之哀還掩扉猶茲紫山明玉碎譬彼西都芳草腓終無逐流鳧船反何時復聞龍種歸文苑英華九百九十九又見藝文類聚三十四有刪節安成蕃王墓志銘許氏猶龍荀家鳴鶴豈如宗子分聯華萼對策雲臺觀書麟閣官美登朝文高入洛得意琴書忘言丘壑藝文類聚四十五徵君何先生墓志先生履玉燭之禎氣應大賢之一期實生而知機撫塵斯庶敬非習起孝乃因心聚徒教習學侶成群與沛國劉瓛汝南周顒為友陸璉賀瑒之徒更道北面永明中王文憲儉受詔撰禮未竟而卒屬在司徒文宣王王以讓先生因廣加刊緝故以含文燕居說六典五恩之義或齊侯所不鎮孟嘉所未知皆折茲大物成此良教小人道長每諷考槃之詩君子道消便執天山之筮乃毀車挂冠拂衣東嶺始居若耶來從秦望今上經綸天地權輿鼎業始徵為軍謀祭酒實允文若之舉且光彥先之選又徵特進右光祿大夫高尚其事確乎不拔玄纁徒往束帛虛歸而給白衣尚書祿固辭不受卒窆乎其山正衾在殯嗤鏤器與玉衣堯典入棺恥密章及書綬知與不知並懷惋愴咸以人亡素朴禮墜文章洙泗頽經扶風罷學關西疑聖之德自此長淪高松引風之氣於茲永息余昔在殊方亟枉翰迹欽風味道迄淹歲時既而位阻桂宮塗乖咫尺不獲擁經步至問春卿之痾徐輪三反入杜夷之舍痛祥雲之滅采悲列曜之晞暉追勒高卿乃為銘曰文範高世玄晏絶倫復有令德遠之與均誰與均此嗚呼哲人第五肥遁餘軌尚遵司空開學其風不泯傳茲孝敬曰悌且仁氣高瓊嶽心虛谷神括羽儒囿舟輿席珍既遊慧水兼引法輪談扇猶在鳴琴尚陳如何不憖德素長淪寂寥巖穴荒涼渭濱橋曰隻雞徐稱酹素余欽夫子風期夙著蓄思含毫傳芳寫譽沈礎雖貞玄泉無曙藝文類聚三十七華陽陶先生墓志銘維大同二年龍集景辰克明三月壬寅朔十二日癸丑巳時華陽洞陶先生蟬蛻於茅山朱陽館先生諱弘景字通明春秋八十有一屈伸如恆顏色不變有制贈以中散大夫諡曰貞白先生遣舍人主書監護喪事十四日巳時窆於雷平之山若夫真以歸空為美道以無形為貴不知悅生大德所以為生不知惡死谷神所以不死妙矣哉隱顯變化物莫能測既而岫開折石天墜玉棺銀書息簡流珠罷竈九節麗於空中千和焚於地下仙官有得朋之喜受學振臨谷之悲余昔在枌壤早逢圯上之術今簉元良屢稟浮丘之教握留符而惻愴思化杖而酸辛乃為銘曰無名曰道不死為仙亦有元放兼稱稚川遁形解化自昔同然猗歟夫子受籙歸玄梨傳苑吏書因賈船虎車照景霓拂淩烟餘花灼爍春㵎潺湲鬱鬱茅嶺悠悠洞天三仙白鶴何時復旋藝文類聚三十七戎昭將軍劉顯墓銘繁弱挺質空桑吐聲分器見重播樂傳名誰其均之美有髦士禮著幼年業明壯齒厭飫典墳研精名理一見弗忘過目則記若訪賈逵如問伯始穎脫斯出學優而仕議獄既佐藝蘭乃握搏鳳池水椎羊太學內參禁中外相藩嶽斜光已迫殞彼西浮百川到海還逐東流營營返魄泛泛虛舟白馬向郊丹旒背鞏野埃興伏山雲輕重呂掩書墳揚歸玄冢爾其戒行途窮士壟弱葛方施叢柯日拱隧柳荑春禽寒斂氄長空常暗陰泉獨湧祔彼故塋流芬相踵儀同徐勉墓志銘朱弓表瑞寶劍攸歸長瀾斯注瓜瓞含輝舉直斥僞校名責實朝有進賢野無遺逸違天即地歸幽去明空谷傳古哀風送旍藝文類聚四十七中書令臨汝靈侯墓志銘昔太祖時其惟宣武講道開天儀嵩作輔是曰邦茅藉規承矩如康嗣衛似禽居魯息轡巖隈塗窮夜臺靈檐永闃松路方開草茂故轍松插新枚月明泉暗暑往寒來藝文類聚四十八庶子王規墓志銘玉挺藍田珠潤隋水價重連城聲同垂棘偶應龍之籥影等威鳳之羽儀名理超於荀王博洽侔於終賈稍遷侍中佩玉璽於文昌珥金貂於武帳文雅與綺縠相宣逸氣並雲霞俱遠副君取敬杜夷時回晉儲之駕追嗟徐幹亦降魏兩之書爰發睿辭為銘云爾七略百家三藏九部成誦其心談天其口勝氣無儔高塵誰偶榮圭掩采靈劍摧鋒宋郊淪鼎洛水沈鐘玄扉不晝幽夜恆冬藝文類聚四十九太子舍人蕭特墓志銘威鳳五色朝陽千仞孫枝發響將雛流韻馥哉若蘭頌矣懷熊瑾既誕子恆乃歡胤銀鉤之巧重世遹雋況此臨池蟬輕露潤丹旐輕飛哀歌徐引壟水春帷山雲晚陳藝文類聚四十九同泰寺故功德正智寂師墓志銘峰頽木朽波逝江潭山川若此人何以堪亦生亦滅如壑如舟千齡俱盡萬古誰留惟茲大士才敏學優幼捐蹈火早去吞鉤法雷能響懸河必酬辨才可匹妙德難儔宋姬寺慧念法師墓志銘電逝生危舟沈道滅石拆亡儒星開殞哲是曰人龍亦號僧象慧氣素昭英賢夙上善渡愛河能褰欲網如彼高山法徒斯仰如彼澄波不測深廣甘露鼓山寺敬脫法師墓志銘岌岌緣假昏昏大夢六塵遠飛四流長控猗嗟大士慧舟法棟早擅人龍夙標威鳳善堂閒構燈王布席辨河流水辭峰積石寂寥兩樹悠漫三泉神明何託暗石空傳湘宮寺智蒨法師墓志銘嗟爾名德超然有暉五塵夙離三修允依戒珠靡缺忍鎧無違智燈含影慧駕馳騑若韜山金如苞海寶德邁西河聲踰東道伊時傾蓋於彼朱方不期而遇襄水之陽掩此方墳悠哉泉下鬱鬱翠微遼遼平野薪盡火滅歸真息假湘淨居寺法昂墓志銘篠簜含聳蘭蓀表質甘露已凝智泉斯溢頓轡中衢息棹修渚隙漏白駒藤緣黑鼠同志酸傷交朋哀楚藝文類聚七十七
