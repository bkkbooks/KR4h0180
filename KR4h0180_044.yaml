body:
  text: 任昉文章緣起序六經素有歌詩書誄針銘之類尚書帝庸作歌毛詩三百篇左傳叔向貽子産書魯哀公孔子誄孔悝鼎銘虞人針此等自秦漢以來聖君賢士沿著為文章名之始故因暇録之凡八十四題以新好事者之目云爾王文憲集序公諱儉字仲寶琅邪臨沂人也其先自秦至宋國史家牒詳焉晉中興以來六世名德海內冠冕古語云仁人之利天道運行故呂虔歸其佩刀郭璞誓以淮水若離翦之止殺吉駿之誠感蓋有助焉公之生也誕授命世體三才之茂踐得二之機信乃昴宿垂芒德精降祉有一於此蔚為帝師況乃淵角殊祥山庭異表望衢罕窺其術觀海莫際其瀾宏覽載籍博遊才義若乃金版玉匱之書海上名山之旨沈鬱淡雅之思離堅合異之談莫不揔制清衷遞為心極斯固通人之所包非虛明之絶境不可窮者其唯神用者乎然檢鏡所歸人倫以表雲屋天構匠者何工自咸洛不守憲章中輟賀生達禮之宗蔡公儒林之亞闕典未補大備茲日至若齒危髮秀之老含經味道之生莫不北面人宗自同資敬性託夷遠少屏塵雜自非可以弘獎風流增益標勝未嘗留心期歲而孤叔父司空簡穆公早所器異年始志學家門禮訓皆折衷於公孝友之性豈伊橋梓夷雅之體無待韋弦汝郁之幼挺淳至黃琬之早標聰察曾何足尚年六歲襲封豫寧侯拜日家人以公尚幼弗之先告既襲圭組對揚王命因便感咽若不自勝初宋明帝居蕃與公母武康公主素不協及即位有詔廢毀舊塋投棄棺柩公以死固請誓不遵奉表啓酸切義感人神太宗聞而悲之遂無以奪也初拜祕書郎遷太子舍人以選尚公主拜駙馬都尉元徽初遷祕書丞於是采公曾之中經刊弘度之四部依劉歆七略更撰七志蓋嘗賦詩云稷契匡虞夏伊呂翼商周自是始有應務之迹生民屬心矣時司徒袁粲有高世之度脫落塵俗見公弱齡便望風推服歎曰衣冠禮樂在是矣時粲位亞台司公年始弱冠年勢不侔公與之抗禮因贈粲詩要以歲暮之期申以止足之戒粲答詩曰老夫亦何寄之子照清襟服闋拜司徒右長史出為義興太守風化之美奏課為最還除給事黃門侍郎旬日遷尚書吏部郎參選昔毛玠之公清李重之識會兼之者公也俄遷侍中以愍侯始終之職固辭不拜補太尉右長史時聖武定業肇基王命寤寐風雲實資人傑是以宸居膺列宿之表圖緯著王佐之符俄遷左長史齊臺初建以公為尚書右僕射領吏部時年二十八宋末艱虞百王澆季禮紊舊宗樂傾恆軌自朝章國紀典彝備物奏議符策文辭表記素意所不蓄前古所未行皆取定俄頃神無滯用太祖受命以佐命之功封南昌縣開國公食邑二千戶建元二年遷尚書左僕射領選如故自策劭分司盧欽兼掌譽望所歸允集茲日尋表解選詔加侍中又授太子詹事侍中僕射如故固辭侍中改授散騎常侍餘如故太祖崩遺詔以公為侍中尚書令鎮國將軍永明元年進號衛將軍二年以本官領丹陽尹六輔殊風五方異俗公不謀聲訓而楚夏移情故能使解劍拜仇歸田息訟前郡尹溫太真劉真長或功銘鼎彝或德標素尚臭味風雲千載無爽親加弔祭表薦孤遺遠協神期用彰世祀時簡穆公薨以撫養之恩特深恆慕表求解職有詔不許國學初興華夷慕義經師人表允資望實復以本官領國子祭酒三年解丹陽尹領太子少傅餘悉如故挂服捐駒前良取則臥轍棄子後豫胥怨皇太子不矜天姿俯同人範師友之義穆若金蘭又領本州大中正頃之解職四年以本號開府儀同三司餘悉如故謙光愈遠大典未申六年又申前命七年固辭選任帝所重違詔加中書監猶參掌選事長輿追專車之恨公曾甘鳳池之失夫奔競之塗有自來矣以難知之性協易失之情必使無訟事深弘誘公提衡惟允一紀于茲拔奇取異興微繼絶望側階而容賢候景風而式典春秋三十有八七年五月三日薨于建康官舍皇朝軫慟儲鉉傷情有識銜悲行路掩泣豈直舂者不相工女寢機而已哉故以痛深衣冠悲纏教義豈非功深砥礪道邁舟航沒世遺愛古之益友追贈太尉侍中中書監如故給節加羽葆鼓吹增班劍六十人諡曰文憲禮也公在物斯厚居身以約玩好絶於耳目布素表於造次室無姬薑門多長者立言必雅未嘗顯其所長持論從容未嘗言人所短弘長風流許與氣類雖單門後進必加善誘勗以丹霄之價弘以青冥之期公銓品人倫各盡其用居厚者不矜其多處薄者不怨其少窮涯而反盈量知歸皇朝以治定制禮功成作樂思我民譽緝熙帝圖雖張曹爭論於漢朝荀摯競爽於晉世無以仰模淵旨取則後昆每荒服請罪遠夷慕義宣威授指實寄宏略理積則神無忤往事感則悅情斯來無是己之心事隔於容諂罕愛憎之情理絶於毀譽造理常若可干臨事每不可奪約己不以廉物弘量不以容非攻乎異端歸之正義公生自華宗世務簡隔至於軍國遠圖刑政大典既道在廊廟則理擅民宗若乃明練庶務鑒達治體懸然天得不謀成心求之載籍翰牘所未紀訊之遺老耳目所不接至若文案自環主者百數皆深文為吏積習成姦蓄筆削之刑懷輕重之意公乘理照物動必研機當時嗟服若有神道豈非希世之雋民瑚璉之宏器昉行無異操才無異能得奉名節迄將一紀一言之譽東陵侔於西山一眄之榮鄭朴踰於周寶士感知己懷此何極出入禮闈朝夕舊館瞻棟宇而興慕撫身名而悼恩公自幼及長述作不倦固以理窮言行事該軍國豈直雕章縟采而已哉若乃統體必善綴賞無地雖楚趙群才漢魏衆作曾何足云曾何足云昉嘗以筆札見知思以薄技效德是用綴緝遺文永貽世範為如干袟如干卷所撰古今集記今書七志為一家言不列于集集録如左文選四十六藝文類聚五十五王貴嬪哀策文遊衣戒節轜車命服永去椒華長辭嘉福笥緘遺組筵委塵鞠將命啓期實惟嘉數珮空響其何節姆下堂其誰傅殯宮既毀祖饋斯撤爰命史臣宣美來裔坤載既厚內德云助軒五有弘姬十斯豫誕咨邦淑選自良家爰登六列象服委蛇青絇丹繶辰文素紗肅雍婦職僉曰俞佳贊景望舒方娠明兩心前軌慶軒中增朗與括不愆朏魄無爽式陪璽觀有事蠶宮降輿訪道基我王風宣禮撤豆緝樂房中居貴能降在盈思沖仁者必壽彼蒼者穹如何不淑萬化齊終薦車告途殯穸既辨黼翣璀以陸離帷幌紛其舒卷出桂宮而北行經未央以西轉池紼顧而徐前服馬嘶而不踐霜霏微而初被野空籠而始雕促虞泉於薤露撫悲翁於短簫母以子貴義弘前哲申衰齊削以從疑革麻縓之輕殺達副君之夭至賦白華之無缺庶清廟之微微非壽原之未翳藝文類聚十五丞相長沙宣武王碑玉映藍田金鉉之望已集木秀鄧林輪轅之用先表值戎寇貪婪羈縻失道憑陵雉堞逼迫濠湟都護之威既弛副尉之策已謝斧松晨析易子朝餐乞師援絶飛書路阻公內定不戰之奇外騁必勝之略神功倏忽有同拾遺南下牧馬既寢折膠之術北遁燕然將空漠南之地加以廣平簡惠信賞必罰增資就賦夷歌成章藝文類聚四十五桓宣城碑君器量高濬神明披朗商略雅俗隱括真偽擢奇取異不軌常流固以準的當時擬議郭許矣處身立朝不峻功名俯仰顯默之際優遊可否之間迹卑而道不污身屈而志不屑矣銘曰於穆我后稟茲純爽虛豁高暢蕭條邁上風任外舒卓鑒內朗神栖沖慎形同俯仰將登槐棘宏振綱網令儀早徂德音永響藝文類聚五十撫軍桂陽王墓志銘於昭帝緒擅美前王緑圖丹紀金簡玉筐世載台鼎地居魯衛沛易且傳楚詩將説桐圭誰戲甘棠何憩藝文類聚四十五劉先生夫人墓志銘既稱萊婦亦曰鴻妻復有令德一與之齊實佐君子簪蒿杖藜欣欣負載在冀之畦居室有行亟聞義讓稟訓丹陽弘風丞相藉甚二門風流遠尚肇允才淑閫德斯諒蕪沒鄭鄉寂寥揚冢參差孔樹毫末成拱暫起荒埏長扃幽隴夫貴妻尊匪爵而重文選五十九祖太祖高皇帝父世祖武皇帝齊竟陵文宣王行狀南徐州南蘭陵郡蘭陵縣中都鄉中都里蕭公年三十五行狀公道亞生知照鄰幾庶孝始人倫忠為令德公實體之非毀譽所至天才博贍學綜該明至若曲臺之禮九師之易樂分龍趙詩析齊韓陳農所未究河間所未輯有一於此罔不兼綜者與昔沛獻訪對於雲臺東平齊聲於楊史淮南取貴於食時陳思見稱於七步方斯蔑如也初沈攸之跋扈上流稱亂陜服宋鎮西晉熙王南中郎邵陵王並鎮盆口世祖毗贊兩藩而任總西伐公時從在軍鎮西府版寧朔將軍軍主南中郎版補行參軍署法曹于時景燭雲火風馳羽檄謀出股肱任切書記遷左軍邵陵王主簿記室參軍既允焚林之求實兼儀形之寄刀筆不足宣功風體所以弘益除邵陵王友又為安南邵陵王長史東夏形勝關河重復選衆而舉敦悅斯在除使持節都督會稽東陽臨海永嘉新安五郡諸軍事輔國將軍會稽太守太祖受命廣樹藩屏公以高昭武穆惟戚惟賢封聞喜縣開國公食邑千戶又奏課連最進號冠軍將軍越人之巫覩正風而化俗篁竹之酋感義讓而失險邪叟忘其西昃龍丘狹其東皋會武穆皇后崩公星言奔波泣血千里水漿不入於口者至自禹穴逮衣裳外除心哀內疚禮屈於厭降事迫於權奪而茹戚肌膚沈痛創巨故知鐘鼓非樂云之本縗粗非隆殺之要改授征虜將軍丹陽尹良家入徙戚里內屬政非一軌俗備五方公內樹寬明外施簡惠神皋載穆轂下以清武皇帝嗣位進封竟陵郡王食邑加千戶復授使持節都督南徐兗二州諸軍事鎮北將軍南徐州刺史遷使持節侍中都督南兗徐北兗青冀五州諸軍事征北將軍南兗州刺史兗徐接壤素漸河潤未及下車仁聲先洽玉關靖柝北門寢扃朝旨以董司嶽牧敷興邦教方任雖重比此為輕徵護軍將軍兼司徒侍中如故又授車騎將軍兼司徒侍中如故即授司徒侍中又如故上穆三能下敷五典闢玄闈以闡化寢鳴鐘以體國翼亮孝治緝熙中教奪金恥訟蹊田自默不雕其朴用晦其明瞉化之有倫繄公是賴庠序肇興儀刑國胄師氏之選允師人範以本官領國子祭酒固辭不拜八座初啓以公補尚書令式是敷奏百揆時序夫國家之道互為公私君親之義遞為隱犯公二極一致愛敬同歸亮誠盡規謀猷弘遠矣又授使持節都督楊州諸軍事楊州刺史本官悉如故舊惟淮海今則神牧編戶殷阜萌俗繁滋不言之化若門到戶説矣頃之解尚書令改授中書監餘悉如故獻納樞機絲綸允緝武皇晏駕寄深負圖公仰惟國典俯遵遺託拊劈天倫踴絶于地居處之節復如居武穆之憂聖主嗣興地居旦奭有詔策授太傅領司徒餘悉如故坐而論道動以觀德地尊禮絶親賢莫二又詔加公入朝不趨讚拜不名劍履上殿蕭傅之賢曹馬之親兼之者公也復以申威重道增崇德統進督南徐州諸軍事餘悉如故並奏疏纍上身歿讓存天不憖遺梁嶽頽峻某年某月日薨春秋三十有五詔給溫明祕器斂以袞章備九命之禮遣大鴻臚監護喪事朝夕奠祭太官供給禮也故以慟極津門感充長樂豈徒舂人不相傾廛罷肆而已哉乃下詔曰褒崇庸德前王之令典追遠尊戚沿情之所隆故使持節都督楊州諸軍事中書監太傅領司徒楊州刺史竟陵王新除進督南徐州體睿履正神監淵邈道冠民宗具瞻惟允肇自弱齡孝友光備爰及贊契協升景業燮和台曜五教克宣敷奏朝端百揆惟穆寄重先顧任均負圖諒以齊徽二南同規往哲方憑保祐永翼雍熙天不憖遺奄見薨落哀慕抽割震動于厥心今先遠戒期龜謀襲吉茂崇嘉制式弘風猷可追崇假黃鉞侍中都督中外諸軍事太宰領大將軍揚州牧緑綟綬具九錫服命之禮使持節中書監王如故給九遊鑾輅黃屋左纛轀輬車前後部羽葆鼓吹挽歌二部虎賁班劍百人葬禮一依晉安平獻王孚故事公道識虛遠表裏融通淵然萬頃直上千仞僕妾不覩其喜慍近侍莫見其傾弛他人之善若己有之民之不臧公實貽恥誘接恂恂降以顏色方於事上好下規己而廉於殖財施人不倦帝子儲季令行禁止國網天憲置諸掌握未嘗鞠人於輕刑錮人於重議人有不及內恕諸己非意相干每為理屈任天下之重體生民之俊華袞與縕紵同歸山藻與蓬茨俱逸良田廣宅符仲長之言邙山洛水協應叟之志丘園東國錙銖軒冕乃依林構宇傍巖拓架清猿與壺人爭旦緹幕與素瀨交輝置之虛室人野何辨高人何點躡屩於鍾阿徵士劉虯獻書於衡嶽贈以古人之服弘以度外之禮屈以好士之風申其趨王之意乃知大春屈己於五王君大降節於憲后致之有由也其卉木之奇泉石之美公所製山居四時序言之已詳文皇帝養德東朝同符作者爰造九言實該百行導襟褵於未萌申炯戒於茲日非直旦暮千載故乃萬世一時也命公注解衛將軍王儉綴而序之山宇初搆超然獨往顧而言曰死者可歸誰與入室尚想前良俾若神對乃命畫工圖之軒牖既而緬屬賢英傍思才淑匹婦之操亦有取焉有客遊梁朝者從容而進曰未見好德愚竊惑焉即命刊削投杖不暇公以為出言自口驥騄不追聽受一謬差以千里所造針銘積成卷軸門階戶席寓物垂訓先是震于外寢匠者以為不祥將加治葺公曰此天譴也無所改修以記吾過且令戒懼不怠從諫如順流虛己若不足至於言窮藥石若味滋旨信必由中貌無外悅貴而好禮怡寄典墳雖牽以物役孜孜無怠乃撰四部要略淨住子並勒成一家懸諸日月弘洙泗之風闡迦維之化大漸彌留話言盈耳黜殯之請至誠懇惻豈古人所謂立言於世沒而不朽者歟易名之典請遵前烈謹狀文選六十藝文類聚四十五齊司空曲江公行狀公稟靈景宿擅氣中和一匱初登東嶽之功可監埏埴在器瑚璉之姿先表豈惟荊南有聖童之目襄城著孔甫之稱而已哉故以羽儀宗家冠蓋後進路叔之一日千里北海之稱美共治方斯蔑如也志學之年遍治經記登隆十載網羅百氏藻斫贍逸蔚為詞宗延賈誼而升堂攜相如而入室加以翰牘精辨發言有章持論從容辭無矜尚自河洛丘墟歷載二百俾我逢掖遂淪左衽晉宋所以遺恨祖宗是用顧懷公自荷方任志在剋復將欲使功遂之日身退有所爰乃卜宇金陵縈帶林壑用辭聊城之賞以為疏韓之館人謝運往遂輟遠圖藝文類聚四十七弔劉文範文余與先生雖年世相接而荊吳數千未嘗膝行下風稟承餘論豈直發憤當年固亦恨深終古然叔夜之敘黔婁韓卓之慕巨卿未必接光塵承風彩正復希向遠理長想千載然其人自高假使橫經擁帚日夜掃門曾不覩千仞之一咫萬頃之涓滴終於對面萬古莫能及門故以此弭千載之恨
