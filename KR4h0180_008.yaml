body:
  text: 簡文帝晚春賦待餘春於北閣藉高宴於南陂水篩空而照底風入樹而香枝嗟時序之回斡歎物候之推移望初篁之傍嶺愛新荷之發池石憑波而倒植林隱日而橫垂見遊魚之戲藻聽驚鳥之鳴雌樹臨流而影動岩薄暮而雲披既浪激而沙遊亦苔生而徑危初學記三秋興賦秋何興而不盡興何秋而不傷傷二情之本背更同來而匪方復有登山望別臨水送歸洞庭之葉初下塞外之草前衰攸征人與行子必承臉而沾衣紛吾間居有怡優遊多暇乃息書幌之勞以命北園之駕爾乃從玩池曲遷坐林間淹留而蔭丹岫徘徊而搴木蘭為興未已升彼懸崖臨風長想馮高俯窺察遊魚之息澗憐驚禽之換枝聽夜籤之響殿聞懸魚之扣扉將據梧於芳杜欲留連而不歸藝文類聚三臨秋賦火歇兮秋氣生風起兮秋潦清覽時興而自得聊飛轡而娛情遵二條之廣路背九仞之高城爾乃登長阪息余驥攬筆舒情沈吟屬思草色雜而香同樹影齊而花異遙峰迢遞縈沙斷絶雲出山而相似水含天而難別藝文類聚三海賦昔禹啓龍門群山既鑿高明澄氣而清浮厚載勢廣而盤礴坎德洊臻水源深博灌注百川控清引濁始乎濫觴委輸大壑測之渺而無際望之杳而綿漠鬱沸冥茫往來日月朏魄昏微乍明乍沒若夫長風鼓怒涌浪砰磕揚波於萬里之間漂沫於扶桑之外初學記六大壑賦渤海之東不知幾億大壑在焉其深無極悠悠既湊滔滔不息觀其浸受狀其吞匿歷詳衆水異導殊名江出濯錦漢吐珠瑛海逢時而不涌河遇聖而知清嗟乎使夫懷山之水積天漢之流駛彭潛與渭溼俱臻四瀆與九河同至余乃知巨壑之難滿尾閭之為異藝文類聚九圍城賦彼高冠及厚履並鼎食而乘肥升紫霄之丹地排玉殿之金扉陳謀謨之啓沃宣政刑之福威四郊以之多壘萬邦以之未綏問豺狼其何者訪虺蜴之為誰梁書朱異傳述羈賦奉明后之霑渥將遠述於荊楚歎雲霞之窅漫對江山之遙阻是時孟夏首節雄風吹甸晚解纜乎鄉津涕淫淫其若霰舟飄飄而轉遠顧帝都而裁見遠山碧暮水紅日既晏誰與同雲嵯峨而出岫江搖漾而生風奉璽言而遄邁改余玉於江隈遵陽塗而中正軫悲心其若頽引領京邑瞻望弗遠戀逐雲飛思隨蓬卷觀江水之寂寥願從流而東返藝文類聚二十七阻歸賦觀建國之皇王選能官於前古元帝慈而布教豈齊聖而作輔伊吾人之固陋宅璇漢而自通躡九枝而耀景總六翮而摶風屬玄玦之啓異逢玉弩之相驚頓天羅於八表騰雲驅於四溟發伏鱉之雄氣耀策馬之高星地邇朔埸疆鄰北極壟樹饒風胡天少色上月斜臨寒松遙直雲向山而欲斂雁疲飛而不息何愁緒之交加豈樹萱與折麻聞繁鉦之韻冰聽流風之入笳終知客遊之阻無解鄉路之賒藝文類聚二十七序愁賦情無所治志無所求不懷傷而忽恨無驚猜而自愁玩飛花之入戶看斜暉之度寮雖復玉觴浮碗趙瑟含嬌未足以祛斯耿耿息此長謠藝文類聚三十五悔賦并序夫機難預知知機者上智智以運己迷己者庸夫故易曰吉凶悔吝生乎動者也又曰悔吝者憂虞之象也傳云九德不愆作事無悔是以鄭國盜多太叔之恨表衛風義失宣公之刺彰無將詠興壟事書作季文再思而未可南容三復而不暇余以固陋之資慎履冰之誡竊服楚王之對每徵后稷之詩觸類而長乃為賦曰默默不怡恍若有遺四壁無寓三階寡趣月露澄曉風柳悲暮庭鶴雙舞簷烏獨赴林宗之巾憑南郭之几玄德之眊聊縈子安之嘯時起靜思悔吝鋪究前史弔古傷今驚憂嘆杞成敗之蹤得失之理莫不關此令終由乎謀始棄夸言於頓丘重前非於蘧子迹夫覆車之人豈止一途而已至如秦兼四海之尊握天下之富混一車書鞭笞宇宙胡亥之寄已危萬代之祀難構阿衡失責成之所趙高秉棟梁之授拒諫逞刑戮宰誅守矜上林之戲馬嘉長楊之射獸囁呫禁中之言欺侮山東之寇及其祠崇涇水作釁夷宮徒希與妻子伍下願與黔首同信殪絶於凶醜何前謀之不工至如下相項籍才氣過人拔山靡類扛鼎絶倫聲駕盛漢勢壓餘秦巨鹿有動天之卒轅門有屈膝之賓既刓有功之印亦疑奇計之臣唱雞鳴於垓下泣悲歌於美人抱烏江之獨愧分漢騎之餘身郭君失位徒馭而亡尚悲殘糗獨飲餘漿枕畚空臥伏軾懷傷魂飄原野骨餌豺狼楚王刻鶴播徙南地鐃管徒鳴才人空置豈輜車之足榮匪射獵之娛意幽泉斯即白日何冀寧喜納君恃功肆寵衛侯厭黷忠臣憤勇昏迷靡悟敗不旋踵商君被執李斯赴收身居闕下命厄秦囚追傷用法之斃還思不諫之尤亦何解於今酷終無追於昔謀伯卓跋扈豺目為輔弒君鴆子誅李害杜鬻恩販寵怨庶虐人蔽朝政之聰察害上書之烈臣榮昵子於阿尹肆貪濁之淫威樹姦黨於宮禁察人主之纖微卒其膏鈇潤鉞置纆逢徽壯武英逸才為時出陸離儒雅照爛文筆江東啓吞併之籌幽州著懷遠之術運鍾毀冕時屬傾顛鏑鳴水闊日黑山遷留卞之謀不決忠良之戮已纏台耀之災雖啓鷦鷯之賦徒然士衡文傑綽有餘裕氣含珠璧情蘊雲霧志闕沈隱心耽進趣倔茲猛衆臨此徑兵抗言孟玖肆此孤貞箋辭已切墨幔徒縈形殞河上心憶華亭若夫楊惲狂言灌夫失志卒其殞命埋軀傷形屬吏周君飲後裴子酣狂靳固紀瞻之妾眠臥季倫之房亦足以魂驚神爽悔結嫌彰已矣哉波瀾動兮昧前期庸夫蔽兮多自欺不遠而復幸無嗤建功立德有常基胸馳臆斷多失之前言往行可為師文苑英華九十一玄虛公子賦有玄虛之公子輕滅喧俗保此大愚居榮利而不染豈聲色之能拘回還四始出入三墳心溶溶於玄境意飄飄於白雲追寂圃而逍遙任文林而佚宕忘情於物我之表縱志於有無之上不為山而自高不為海而彌廣藝文類聚三十六舌賦奚茲先生問於何斯逸士曰夫三端所貴三寸著名故微言傳乎往記妙説表乎丹青魯談笑而軍卻王言詠而瑞隆陸有千金之富周為一説之功復有搆扇之端讒諛之迹豔紫淩朱飛黃妒白吾將欲廢便辟之交遠巧佞之友殄張儀之餘殲蘇秦之後粉虞卿之白璧碎漢王之玉斗然後浮偽可息淳風不朽藝文類聚十七舞賦酌蒲桃坐柘觀命妙舞徵清彈丱髮初笄參差俱集信身輕而叉重亦腰羸而帶急響玉砌而遲前度金扉而斜入似斷霞之昭彩若飛燕之相及既相看而綿視亦含姿而俱立於是徐鳴嬌節薄動輕金奏巴渝之麗曲唱碣石之清音扇才移而動步鞞輕宣而逐吟爾乃優遊容豫顧眄徘徊強紆顏而未笑乍雜怨而成猜或低昂而失侶乃歸飛而相拊或前異而始同乍初離而後赴不遲不疾若輕若重眄鼓微吟回巾自擁髮亂難持簪低易捧牽福恃恩懷嬌知寵藝文類聚四十三初學記十五箏賦江南之竹弄玉有鳴鳳之簫焉洞陰之石范女有遊仙之磬焉若夫排雲入漢之美含商觸徵之奇罷雍祠之麗響絶漢殿之容儀別有泗濱之梓聳幹孤峙負陰拂日停雪棲霜嶔崟岝崿玄嶺相望寄丹崖而茂采依青壁而懷芳奔電碭突而彌固嚴風掎拔而無傷途畏峰澀人群罕至乃命夔班翦而成器隆殺得宜修短合思矩制端平雕鎪綺媚既而春桑已舒暄風暗曖丹荑成葉翠陰如黛佳人採掇動容生態值使君而有辭逢秋胡而不對里閭既返伏食蠶飢五色之縿雖亂八熟之緒方治異東垂之野繭非山經之漚絲於是制絃擬月設柱方時若夫鏗鏘奏曲溫潤初鳴或徘徊而蘊藉或慷慨而逢迎若將連而類絶乍欲緩而頻驚陸離抑按磊落縱橫奇調間發美態孤生若將往而自返似欲息而復征聲習習而流韻時怦怦而不寧如浮波之遠騖若麗樹之爭榮譬雲龍之無蒂如笙鳳之有情學離鵾之弄響擬翔鴛之妙聲朱絃在手擊重還輕爾其曲也雅俗兼施諧雲門與四變雜六列與咸池王讚既工阮賦亦奇曹后聽之而歡宴謝相聞之而涕垂至若登山望別之心臨流送歸之目隴葉夜黃關雲曉伏覩獨雁之寒飛望交河之水縮聽鳴箏之弄響聞茲絃之一彈足使遊客戀國壯士衝冠若夫楚王怡蕩楊生娛志小國寡民督郵無事乃有燕餘麗妾方桃譬李本住南城經移北里納千金之重聘擅專房之宴私方美珥而不減擬甘橘而無嗤聞削成於斜領照玉緻於鉛脂度玲瓏之曲閣出翡翠之香帷腕凝紗薄珮重行遲爾乃促筵命妓銜觴置酒耳熱眼花之娛千金萬年之壽白日蹉跎時淹樂久玩飛花之度窗看春風之入柳命麗人於玉席陳寶器於紈羅撫鳴箏而動曲譬輕薄之經過黛眉如掃曼睇成波情長響怨意滿聲多奏相思而不見吟夜月而怨歌笑素彈之未工疑秦宮之詎和若夫釣竿復發蛺蝶初揮動玉匣之餘怨鳴陽烏之始飛逐東趨於鄭女和西舞於荊妃足使長廊之瓦虛墜梁上之塵染衣鱏魚遊而不沒白鶴至而忘歸於是乎餘音未盡新弄縈纏參差容與顧暮流連落橫叉於袖下斂垂衫於膝前乍含猜而移柱或斜倚而續絃照瓊環而俯捻度玉爪而徐牽見微嚬之有趣看巧笑之多妍抗長吟之靡曼雜新歌之可憐歌曰年年花色好足侍愛君傍影入著衣鏡裙含辟惡香鴛鴦七十二亂舞未成行故乃宋偉緑珠之好聲文君慎女之清角上掩面而不前言韜輝而恥學實獨立之麗人乃入神之佳樂文苑英華七十一又略見藝文類聚四十四初學記十六金錞賦并序舍弟西中郎致金錞一枚周禮云鼓人掌六鼓四金以節聲樂以和軍旅以金錞和鼓金鐲節鼓注曰錞錞于也圜如椎頭大上小下樂作鳴之與鼓相和淮南云兩軍相當鼓錞相望若古之禮器飾軍和樂者矣吾奇而賦之其詞曰有錞于之麗器實軍樂之兼珍伊前古以為美成名都之匠人採赤鋈於蜀壘求銅精於灌濱若夫鼓以陽爐營之陰炭是鐫是刻載輝載煥笑烏獲之奮槌踰嵇生之善鍛實規形之可悅以妙聲之遠聞譬洪鍾之虎鈕學章鼎之龍文至於簨虡先列金石俱諧八能效技六變程才觀雲龍之鬱郁望威鳳之徘徊沛縣留三日之飲平樂有十千之柸揮秦箏之慷慨代晉鼓之嘽啍皆能協宮和徵節往通來宣奏有序度曲可觀鄙金鋪之非德嗤商鼗之易殫應南斗之鳴瑟雜西漢之金丸若夫伏波出討二師遠征蒲昌對戰孤竹臨兵映似月之遙羽飛如鳧之去旌軍魚麗而齊上陳龍膝而俱行望烏雲之臨敵聞條風之入營壯士被犀良馬絡鐵野曠塵昏星流電掣日侵山而欲隱霧陵空而不滅望水色其如花覩奔沙之似雪咸聽響而先登普聞鳴而為節當此時也畫角恥吟胡笳不思刁斗暫捐金鉦虛置何資和之不營而吐聲之雄異制六師之進旅驚三軍之武志嗟吾弟之博物實愛奇之已深識且鑒於鳴石貺有踰於兼金如陳器於柏寢似出鼎於汾陰豈寶玦之為貴非瑚璉之可欽昔武都之一扇乃銘功以述心矧元常之五熟又刻篆以書音況茲贈之為美而古迹之可尋聊染翰而操筆終有愧於璆琳文苑英華七十一列燈賦何解凍之嘉月值蓂莢之盡開草含春而動色雲飛采而輕來南油俱滿西漆爭然蘇徵安息蠟出龍川斜暉交映倒影澄鮮九微間吐百枝交布聚類炎洲迹同大樹競紅蕊之晨舒蔑丹螢之昏騖蘭膏馥氣芬炷擎心寒生色淺露染光沈藝文類聚八十對燭賦雲母窗中合花氈茱萸幔裏鋪錦筵照夜明珠且莫取金羊燈火不須然下弦三更未有月中夜繁星徒依天於是搖同心之明燭施雕金之麗盤眠龍傍繞倒鳳雙安轉辟邪而取正推櫺窗而畏寬緑炬懷翠朱蠟含丹豹脂宜火牛膫耐寒銅芝抱帶復纏柯金藕相縈共吐荷視橫芒之昭曜見蜜淚之蹉跎漸覺流珠走熟視絳花多宵深色麗焰動風過夜久惟煩鋏天寒不畏蛾菖蒲傳酒座欲闌碧玉舞罷羅衣單影度臨長枕煙生向果盤回照金屏裏脈脈兩相看藝文類聚八十初學記二十五眼明囊賦並序俗之婦人八月旦多以錦翠珠寶為眼明囊因競淩晨取露以拭目聊為此賦爾乃裁茲金鏤製此妖飾緝濯錦之龍光翦輕羈之蟬翼雜花勝而成疏依步搖而相逼明金亂雜細寶交陳義同厭勝欣此節新擬椒花於歲首學夭桃於暮春藝文類聚七十梅花賦層城之宮靈苑之中奇木萬品庶草千叢光分影雜條繁幹通寒圭變節冬灰徙筒並皆枯悴色落摧風年歸氣新搖雲動塵梅花特早偏能識春或承陽而發金乍雜雪而被銀吐豔四照之林舒榮五衢之路既玉綴而珠離且冰懸而雹布葉嫩出而未成枝抽心而插故摽半落而飛空香隨風而遠度挂靡靡之遊絲雜霏霏之晨霧爭樓上之落粉奪機中之織素乍開花而傍巘或含影而臨池向玉階而結彩拂網戶而低枝七言表柏梁之詠三軍傳魏武之奇於是重閨佳麗貌婉心嫺憐早花之驚節訝春光之遣寒夾衣始薄羅袖初單折此芳花舉茲輕袖或插鬢而問人或殘枝而相授恨鬟前之大空嫌金鈿之轉舊顧影丹墀弄此嬌姿洞開春牖四卷羅帷春風吹梅畏落盡賤妾為此斂娥眉花色持相比恆愁恐失時藝文類聚八十六初學記二十八採蓮賦望江南兮清且空對荷花兮丹復紅臥蓮葉而覆水亂高房而出叢楚王暇日之歡麗人妖豔之質且棄垂釣之魚未論芳䓑之實唯欲回渡輕船共採新蓮傍斜山而屢轉乘橫流而不前於是素腕舉紅袖長回巧笑墮明璫荷稠刺密亟牽衣而綰裳人喧水濺惜虧朱而壞妝物色雖晚徘徊未反畏風多而榜危驚舟移而花遠歌曰常聞蕖可愛採擷欲為裙葉滑不留綖心忙無假薰千春誰與樂唯有妾隨君藝文類聚八十二修竹賦有㛹娟之茂篠寄江上而叢生玉潤桃枝之麗魚腸雲母之名日映花靡風動枝輕陳王歡舊小堂佇軸今餞故人亦賦修竹伊嘉賓之獨劭顧余躬而自恧藝文類聚八十九初學記二十八鴛鴦賦朝飛緑岸夕歸丹嶼顧落日而俱吟追清風而雙舉時排荇帶乍拂菱華始臨涯而作影遂蹙水而生花亦有佳麗自如神宜羞宜笑復宜嚬既是金閨新入寵復是蘭房得意人見茲禽之棲宿想君意之相親藝文類聚九十二鵁鶄賦飲三芝之淳露食六草之英芳似金沙之符采同錦質之報章紅毛覆臆翠鬣垂心浴波泳渚浮廣戲深臨高舞翮映淺弄音逐餘暉而顧景乘清吹而微吟藝文類聚九十二
