body:
  text: 芍藥賦蜀葵花賦惟茲奇草遷花西道淩金坂之威夷跨玉津之浩浩值油雲之廣臨屬光風之長掃仰椒屋而敷榮值蘭房而舒藻邁衆芳而秀出冠雜卉而當闈既扶疏而雲蔓亦灼爍而星微布濩交加蓊茸紛葩疏莖密葉翠萼丹華藝文類聚八十一為王儀同瑩初讓表執玉獻金卒先五等親冕迎軺光導百辟坐階遠大遂致隆滿自位升朝首職冠禮闈辭滿之願將際致仕之請方奏而思渥恩皆昭獎必被寵章爰降朝野驚矚是以安石歸禾固請元規終以致讓況臣才質空疏器量庸淺而可以妄參鉉席靦貌槐庭藝文類聚四十七為第六叔讓重除吏部尚書表臣聞剸犀截雁必俟昆吾之鋒逐日追風信資伯樂之駿未有驂駕蹇足而方騁遙塗采藝鉛刀而求其斷割伏惟則哲為體事艱歷代明別攸寄義重前王必使玉石薰蕕區別靡雜涇渭玄黃條流不爽自非伯豪之天下能稱仲子之時人歸德孝先之拔真抑偽巨源之黜惡舉善然後可以銓鏡流品平均衡石藝文類聚四十八為從兄讓侍中表至如元勳舊儒之胄積德纍仁之基九世七葉之華相韓事漢之貴不然則子駿之學洞古今平子之思侔造化仲宣之辨識無滯次仲之解經不窮然後可以喻旨公卿問對帷扆陪六尺之輿通四方之意求之微臣此塗頓隔藝文類聚四十八初學記十二御覽二百十九上太極殿千夫表四海為家義存威重萬國來朝事惟壯觀憲北辰之居所正南面之尊貴繡栭鏤檻延曜光輝虬柱虹梁杳冥雲霧非許鄴之敢倫豈雍豫之能擬且工徒樂業庶民自競一勞永逸不日而成信可以宴饗百神朝覲群后者矣臣過荷寵榮祿秩優潤謹率丹款上夫一千不足微申鳧躍伏深慚悚藝文類聚六十二答湘東王示忠臣傳箋竊以孝實天經忠為令德百行攸先一心靡忒昔淮南鴻烈事無的準沛王通論義止儒術東平獲譽良為片言臨淄見稱文辭小道孰若理冠君親義兼臣子謹當宣示遐邇光揚德音藝文類聚二十與諸兒書論家世集史傳稱安平崔氏及汝南應氏並纍世有文才所以范蔚宗云崔氏世擅雕龍然不過父子兩三世耳非有七葉之中名德重光爵位相繼人人有集如吾門世者也沈少傅約常語人云吾少好百家之言身為四代之史自開闢已來未有爵位蟬聯文才相繼如王氏之盛者也汝等仰觀堂構思各努力梁書王筠傳南史二十二與長沙王別書筠頓首頓首高秋淒爽體中何如願比勝納承入東禮拜用深傾仰昔藩后遨遊不無是事或龍舟水嬉或臨川送遠摐金飛旆泛此安流猶復見重良書以為盛德未有選日簡辰歸誠繫念尋法城之遊逗祇園之聚翹心讚歎無以譬説僕夙疾增瘵蹇廢蓬門不獲執離彌深傾悶願敬勗白書不次王筠頓首頓首廣弘明集二十八上與東陽盛法師書菩薩戒弟子王筠法名慧炬稽首和南問訊東陽盛法師弟子昔因多幸早蒙覲接歲月推流踰三十載欽慕風德獨盈懷抱間以山川無由禮敬司馬參軍仰述存眷曲垂訪憶既荷録舊之情兼佩殷勤之旨歡欣頂戴難為譬説仰承垂和履福享年九十有四嗤絳人之未高同殷宗之遐壽且耳長直已過頂齒剛會不先落延華駐彩怡神輔性自非宿殖善因何以招斯勝果尊年尚齒之誠懷德敦舊之款依風慕道之深欣羡景仰之至興居在念寤寐載懷弟子恨此樊籠迫茲纓鎖無由問道撫躬如失庶心期宴會咫尺江山道術相忘棄置形迹惟願敬勗保此期頤赤松朱髮復何足貴飛錫騰軀真在旦夕指陳丹款殊未伸畼儻惠一言豈不幸甚弟子筠稽首和南廣弘明集二十四與雲僧正書弟子孤子筠頓首稽首和南弟子釁結幽明備嬰荼蓼攀援崩踴肌髓糜潰尋繹煩冤肝腸寸斷號天叩地永隔精誠捨命捐軀終無補益思欲仰福廣為法事以伸罔極之痛少寄追慕之誠鑄像度僧仰遵法教建齋設會務依經典敷説大乘誘度群生其福不淺仰惟大正法師道心純淑至德凝深智包空有照通真俗多聞不窮機辨無硋一代師匠四海推崇弟子宿值善因早蒙親眷情同骨肉義等金蘭外書所謂冥契神交內典則為善友知識敬藉微緣敢陳大願來歲夏中欲仰請講説弘法之情既無彼此眷愛之深特希降屈公私道俗要請既多故預咨聞必願允遂豈圖一旦忽有斯白臨紙崩衄厝言無次弟子孤子王筠頓首稽首和南廣弘明集二十八上答釋法雲書筠和南辱告垂示上答臣下審神滅論竊聞僾然有見禮典之格言今則不滅法教之弘旨但妙相虛玄神功凝靜自非體道者豈能默領其宗不有知機者無由冥應其會聖主迹同萬機心遊七淨哀愍群生嫗煦庶物滌彼蓋纏勗以解慧袪其蒙惑躋之仁壽信大哉為君善于智度者也弟子世奉法言家傳道訓而學淺行疏封纍猶軫既得餐稟聖教預聞弘誘一音得解萬善可偕抃躍之情無以譬説弟子王筠和南弘明集十與瑗律師書筠和南至節過念哀慕深至情不可任寒凝道體何如想比清豫弟子羸勞每惡惙斃何理眷請勤御比日來敘遣白王筠和南淳化閣帖四雲陽記車箱阪下有黎園一頃樹數百株青翠繁密望如車蓋自序余少好鈔書老而彌篤雖偶見瞥觀皆即疏記後重省覽歡興彌深習與性成不覺筆倦自年十三四齊建武二年乙亥至梁大同六年四十六載矣幼年讀五經皆七八十遍愛左氏春秋吟諷常為口實廣略去取凡三過五鈔餘經及周官儀禮國語爾雅山海經本草並再鈔子史諸集皆一遍未嘗倩人假手並躬自鈔録大小百餘卷不足傳之好事蓋以備遺忘而已梁書王筠傳南史二十二昭明太子哀册文蜃輅俄軒龍驂局步羽翿前驅雲旗北御皇帝哀繼明之寢輝痛嗣德之殂芳御武帳而悽慟臨甲觀而增傷式稽令典載揚鴻烈詔撰德于旌旒永傳徽于舞綴其辭曰式載明兩實惟少陽既稱上嗣且曰元良儀天比峻儷景騰光奉祀延福守器傳芳睿哲膺期旦暮斯在外弘莊肅內含和愷識洞機深量苞瀛海立德不器至功弗宰寬綽居心溫恭成性循時孝友率由嚴敬咸有種德惠和齊聖三善遞宣萬國同慶軒緯掩精陰羲弛位纏哀在疚殷憂銜恤孺泣無時蔬饘不溢禫遵踰月哀號未畢實惟監撫亦嗣郊禋問安肅肅視膳恂恂金華玉璪玄駟班輪隆家幹國主祭安民光奉成務萬機是理矜慎庶獄勤恤關市誠存隱惻容無慍喜殷勤博施綢繆恩紀爰初敬業離經斷句奠爵崇師卑躬待傅寧資導習匪勞審諭博約是司時敏斯務辨究空微思探幾賾馳神圖緯研精爻畫沈吟典禮優遊方册饜飫膏腴含咀肴核括囊流略包舉藝文遍該緗素殫極丘墳勝帙充積儒墨區分瞻河闡訓望魯揚芬吟詠性靈豈惟薄伎屬詞婉約緣情綺靡字無點竄筆不停紙壯思泉流清章雲委總覽時才網羅英茂學窮優洽辭歸繁富或擅談叢或稱文囿四友推德七子慚秀望苑招賢華池愛客託乘同舟連輿接席摛文掞藻飛觴泛醳恩隆置醴賞逾賜璧徽風遐被盛業日新仁器非重德輶易遵澤流兆庶福降百神四方慕義天下歸仁雲物告徵祲沴褰象星霾恆耀山頽朽壤靈儀上賓德音長往具僚無蔭咨承安仰嗚呼哀哉皇情悼愍切心纏痛胤嗣長號跗萼增慟慕結親遊悲動氓衆憂若殄邦懼同折棟嗚呼哀哉首夏司開麥秋紀節容衛徒警菁華委絶書幌空張談筵罷設虛饋饛饛孤燈翳翳嗚呼哀哉簡辰請日筮合龜貞幽埏夙啓玄宮獻成武校齊列文物增明昔遊漳滏賓從無聲今歸郊郭徒御相驚嗚呼哀哉背絳闕以遠徂轥青門而徐轉指馳道而詎前望國都而不踐陵修阪之威夷遡平原之悠緬驥蹀足以酸嘶挽悽鏘而流泫嗚呼哀哉混哀音于簫籟變愁容于天日雖夏木之森陰返寒林之蕭瑟既將反而復疑如有求而遂失謂天地其無心遽永潛于容質嗚呼哀哉即玄宮之冥漠安神寢之清閟傳聲華于懋典觀德業于徽諡懸忠貞于日月播鴻名于天地惟小臣之紀言實含毫而無愧嗚呼哀哉梁書昭明太子傳藝文類聚十六問善寺碑妙門關鍵闢之者既難法海波瀾遊之者未易是以軒稱俊聖堯曰欽明韶濩有美善之風文武致時雍之業地平天成惟事即世移風易俗匪止今身至如訪道洞山乘風獨遠凝神汾水窅然自喪或宗仰黃老之淡景慕神仙之術斯蓋不度群生事局諸己篤而為論道有未弘薰風璚露散馥流甘璧月珠星聯華揚葉修幡繞于雲根和鈴響于天外玉池動而揚文寶樹搖而成樂銘曰亭亭切漢耿介淩煙層甍霞聳飛棟星懸藝文類聚七十六國師草堂寺智者約法師碑結宇山椒疏壤幽岫蓄雲泄雨靄映房櫳浴日涵星翻光池沼震居暇豫留思幽微研精經藏探求法寶香城實相之談金河常樂之説究竟微妙洞達幽玄掖庭為道心之宮華林搆重雲之殿師子之座高廣于燈王聽法之筵衆多于方丈開寶函之奧典闡金字之微言顯證一乘宣揚三慧辨才無閡遊戲神通莫不皆悟無生咸知妄想隨類得解俱會真如銘曰形在江湖心超祇鷲思協風雲量包宇宙軒瞰蒼波窗承翠嶺須枕煙露掔持光景藝文類聚七十六丹陽琅邪二郡斷搜捕議京邑翼翼四方所視民漸至化必被萬國今祈寒暑雨人尚無怨況去俗入真所以可悅謂斷之為是廣弘明集二十六論語義疏敘論語通曰論語者是孔子沒後七十弟子之門徒共所撰録也夫聖人應世事迹多端隨感而起故為教不一或負扆御衆服龍袞于廟堂之上或南面聚徒衣縫掖于黌校之中但聖師孔子符應頽周生魯長宋遊歷諸國以魯哀公十一年冬從衛反魯刪詩定禮于洙四之間門徒三千人達者七十有二但聖人雖異人者神明而同人者五情五情既同則朽沒之期亦等故歎發吾衰悲因逝水託夢兩楹寄歌穨壞至哀公十六年哲人其萎徂背之後過隙叵駐門人痛大山長毀梁木永摧隱几非昔離索行淚微言一絶景行莫書于是弟子僉陳往訓各記舊聞撰為此書成而實録上以尊仰聖師下則垂軌萬代既方為世典不可無名然名書之法必據體以立稱猶如以孝為體者則謂之孝經以莊敬為體者則謂之禮記然此書之體適會多途皆夫子平生應機作教事無常準或與時君抗厲或共弟子抑揚或自顯示物或混迹齊凡問同答異言近意深詩書互錯錝典誥相紛紜義既不定于一方名故難求乎諸類因題論語兩字以為此書之名也但先儒後學解釋不同凡通此論字大判有三途第一捨字制音呼之為倫一捨音依字而號曰論一云倫論二稱義無異也第一捨字從音為倫説者乃衆的可見者不出四家一云倫者次也言此書事義相生首末相次也二云倫者理也言此書之中蘊含萬理也三云倫者綸也言此書經綸今古也四云倫者輪也言此書義旨周備圓轉無窮如車之輪也第二捨音依字為論者言此書出自門徒必先詳論人人僉允然後乃記記必已論故曰論也第三云倫論無異者蓋是楚夏音殊南北語異耳南人呼倫事為論事北士呼論事為倫事音字雖不同而義趣猶一也侃案三途之説皆有道理但南北語異如何似未詳師説不取今亦捨之而從音依字二途并録以會成一義何者今字作論者明此書之出不專一人妙通深遠非論不畼而音作倫者明此書義含妙理經綸今古自首臻末輪環不窮依字則證事立文取音則據理為義義文兩立理事雙該圓通之教如或應示故蔡公為此書為圓通之喻云物有大而不普小而兼通者譬如巨鏡百尋所照必偏明珠一才鑒包六合以蔡公斯喻故言論語小而圓通有如明珠諸典大而偏用譬如巨鏡誠哉是言也語者論難答述之謂也毛詩傳云直言曰言論難曰語鄭注周禮云發端曰言答述為語今案此書既是論難答述之事宜以論為其名故名為論語也然此語是孔子在時所説而論是孔子沒後方論論在語後應曰語論而今不曰語論而云論語者其義有二一則恐後有穿鑿之嫌故以語在論下急標論在上示非率爾故也二則欲現此語非徒然之説萬代之繩準所以先論已以備有圓周之理理在于事前故以論居語先也又此書遭焚燼至漢時合壁所得及口以傳授遂有三本一曰古論二曰齊論三曰魯論既有三本而篇章亦異古論分堯曰下章子張問更為一篇合二十一篇篇次以鄉黨為第二篇雍也為第三篇內倒錯不可具説齊論題目與魯論大體不殊而長有問王知道二篇合二十二篇篇內亦徵有異魯論有二十篇即今日所講者是也尋當昔撰録之時豈有三本之別將是編簡缺落口傳不同耳故劉向別録云魯人所學謂之魯論齊人所學謂之齊論合壁所得謂之古論而古論為孔安國所注無其傳學者齊論為琅邪王卿等所學魯論為太子太傅夏侯勝及前將軍蕭望之少傅夏侯建等所學以此教授于侯王也晚有安昌侯張禹就建學魯論兼講齊説擇善而從之號曰張侯論為世所貴至漢順帝時有南郡太守扶風馬融字季長建安中大司農北海鄭玄字康成又就魯論篇章考齊驗古為之注解漢鴻臚卿吳郡苞咸字子良又有周氏不悉其名至魏司空潁川陳群字長文太常東海王肅字子雍博士敦煌周生烈皆為義説魏末吏部尚書南陽何晏字平叔因魯論集季長等七家又采古論孔注又自下己意即世所重者今日所講即是魯論為張侯所學何宴所集者也晉太保河東衛瓘字伯玉晉中書令蘭陵繆播字宣則晉廣陵太守高平欒肇字永初晉黃門郎潁川郭象字子玄晉司徒濟陽蔡謨字道明晉江夏太守陳國袁宏字叔度晉著作郎濟陽江淳字思俊晉撫軍長史蔡系字子叔晉中書郎江夏李充字宏度晉廷尉太原孫綽字興公晉散騎常侍陳留周瓌字道夷晉中書令潁陽范寧字武子晉中書令琅邪王珉字季瑛右十三家為江熙字太和所集侃今之講先通何集若江集中諸人有可采者亦附而申之其又別有通儒解釋于何集無好者亦引取為説以示廣聞也然論語之書包于五代二帝三王自堯至周凡一百四十人而孔子弟子不在其數孔子弟子有二十七人見于論語也而古史考則云三十人謂林放淡臺滅明陽虎亦是弟子數也論語義疏日本國本
