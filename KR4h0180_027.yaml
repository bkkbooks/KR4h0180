body:
  text: 沈約為六宮拜章蓬闈菲質嘉淑無算越自幽衡登軀宸漢奉日月之華侍巾屣之末何以廁鴛鸞之盛序奉屬車之清塵藝文類聚十五初學記十為晉安王謝南兗州章臣以萊孱幼無秀業依天宅照藉海憑瀾王爵早加藩麾夙樹進不能間詩西楚好禮北河退無以振采六條宣風萬里懷慚起懼載溢心顏而皇明輝燭照被彌遠遂乃徙旆淮區遷金濟服朱驂出邸青組臨方瞻惟徵寵俯仰忘厝初學記十又為安陸王謝荊州章臣託景宸區早延休寵身班帝穆爵首蕃圭好禮慚河敦詩愧楚懸旆出關徒違絳闕摐金入濟識謝戎麾而照臨彌廣復叨匪服紀南形勝任總上遊西緯岷邛北維崤陝六轡在手猶或稱難群牧稟威茲道孰易是以攄情陸白布款幄垂霄塗嚴遠事隔披照腆冒斯顏膺此謬荷祗奉兢懼罔知攸託初學記十謝賜新曆表竊惟觀斗辨日馭生為本審時分地稼政莫先何則勝殺無舛拘忌之理難忽珠璧有徵禮節之原攸序藝文類聚五到著作省表臣約言即日被召以本官兼今職臣藝不博古學謝專家乏懷鉛之志慚夢腸之術聯事乖善握蘭慚良謬勒斷蛇之符預刊冰河之業路遙難騁才弱未勝而神工曲造雕絢彌疊珥筆史觀記言文府趨奉載揚腆懵交顏初學記十二薦沈驎士義行表吳興沈驎士英風夙挺峻節早樹貞粹稟於天然綜博生乎篤習家世孤貧藜藿不給懷書而耕白首無倦挾琴採薪行歌不輟長兄早卒孤姪數四攝尩鞠稚吞苦推甘年踰七十業行無改元嘉以來聘召仍疊玉質踰潔霜操日嚴若使聞政王庭服道槐掖必能孚朝規於邊鄙播聖澤於荒垂南齊書沈驎士傳永明六年吏部郎沈淵中書郎沈約又表薦驎士義行薦劉粲表陛下則天開業冠帶要荒輶軒韋轂交軫於遐路捨築投竿相望於魏闕或以開坼未採管庫遺賢執戟忘疲倚輈不息藝文類聚五十三舉胡元秀表竊惟經邦御遠雖待大賢摧鋒犯鏑亦資小用伏見錢塘新戌主胡元秀早歲驅馳意幹強果矛盾之用氣淩百夫若置之六師之間處之一旅之上必能前奮獷敵卻沮強胡臣實弱懦不窺武節昧妄輕言伏懷悚懼初學記二十讓僕射表臣聞役壯休老上典所優晨行暮息事身恆分若夫玄黃未已非秋駕之衛筋力為用豈強飯之時養老杖鄉抑推前典服戎告謝親學匪任宿肉極其虛憊歲制防其不辜實所以蠲假衰疾收屏淪暮藝文類聚四十八謝封建昌侯表陛下投袂萬里拯厥塗炭臣雖心不吠堯而迹淪桀犬此則王業始基臣所不與徒荷日月之私竟無蒸燭之用天命玄鳥非止今日受命作周其來久矣雖復備數樂推與同謳頌而誠微弱草效闕纖塵遂班山河之誓叨佐命之賞亦何以慰悅帷帳酬報爪牙藝文類聚五十一謝母封建昌國太夫人表伏見詔書以臣母封為建昌國太夫人慶溢蓬門榮流素族恭荷屏營罔識攸置臣稟訓私閨志塗靡立勉以為義誠有由然輸力致身曾無萬一天慈罔已至德彌光探其私志降此洪澤榮親之至始自微臣率斯道也方流萬物草卉輕命固莫云酬藝文類聚五十一為長城公主謝表奉策書封妾為長城縣公主徽命降臨慚腆妄置妾膺靈稟氣育景璇閨弱志易淪柔德難樹雖復式修姆保莫敢或遑而肅雍不著穠華蓋闕不悟宸暉曲漸彝章夙賁籍此恩加遽延典策湯沐光啓珩緄昭被藝文類聚五十一為柳世隆讓封公表臣聞懸旌玉塞二師尚黜其功伐鼓炎州伏波猶懼其賞徒以兼委之施或難固辭抽心之情必無雙奪是故俯容青閣願還慈於裂壤竊步丹墀希收寵於開賦昔竄命窮雉難迫勢孤沈板未難負戶非切及顧溫凊之館懼結尊慈之懷纍葉喁喁舉門惴惴臣事逼君親理非外獎實賴朝謨謹肅宰略遐震奔鯨外剿臣何力焉幸得扶老攜弱重出幽堵還軸歸驂再踐鄉路豈可資國眚以邀其功因衆功而饗其報遂使甘霜受電之心有同於飾請皎日大河之志匪殊於貌謁藝文類聚五十一為柳世隆上銅表夫幣以周務貨以賑民阜國康治莫尚乎此周氏致平始於圜法漢世幾措資於貫朽名爐化金良工盡藝方將盈金中藏收功上苑南楚陋其方府西京鄙其部內藝文類聚八十四拜尚書令到都上表竊位之譏允當斯責王命私請有事相傾油雲湛露徒降旻昊之德弱縞輕蟬不載丘嶽之重登階望席恍焉失步藝文類聚四十八為太子謝初表臣實蒙稚溫文以闕不間三善之訓未習四學之儀雖問安內豎因心自發而視膳寢門未任再至乃降皇慈夙膺盛典二體宸極守器宗祧顧循幼志如臨冰壑藝文類聚十六初學記十為南郡王讓中軍表臣聞建侯茂則非賢罔樹分器鴻典惟懿實先而臣挹道未弘踐義多缺徒升國彝空襲宸寵光圭華組暗靄於關垂令采徽猷寂寥於甸表晨伸委帶夕軫臨顏皇衢肇啓鼎運始資魯衛兼啓義邈周年齊楚並建禮高漢日臣以末第聯輝上序祐履荊阿懷璽夢曲拊志惟熏佩握如搗初學記十為始興王讓儀同表徒塵翠渥方降紫泥以茲上令用隔下情況高擬萬石爰均八命室等天黃服加黼黻出則高陪千乘入則仰司百揆陛下道苞九舜明出十堯萬徽必理一物興念有紆玄鏡暫垂止水藝文類聚四十七為褚炫讓吏部尚書表竊惟玄素未辨必謬朱紫之察規矩或昧理喪方圓之功東西兩漢左雄孤絶於前南北二晉山濤莫嗣於後良由性藏於貌才隱乎心楚越無以況其迥殊山川未足方其險阻雖復挫暗為明免愚生智亦何以登奇收異離渭分涇藝文類聚四十八初學記十一讓五兵尚書表臣聞百舍之趙非宿舂所資千里之越豈一葦能泝何者裝輕適于路遠舟弱疲于濟深醜貌悴容不藉鑒于淄水駑足蹇步終取躓于鹽車藝文類聚四十八上宋書表臣約言臣聞大禹刊木迹炳虞書西伯勘黎功煥商典伏惟皇基積峻帝烈弘深樹德往朝立勳前代若不觀風唐世無以見帝媯之美自非覩亂秦餘何用知漢祖之業是以掌言未記爰動天情曲詔史官追述大典臣實庸妄文史多闕以茲不才對揚盛旨是用夕惕載懷忘其寢食者也臣約頓首死罪竊惟宋氏南面承曆統天雖世窮八主年減百載而兵車亟動國道屢屯垂文簡牘事數繁廣若夫英主啓基名臣建績拯世夷難之功配天光宅之運亦足以勒銘鐘鼎昭被方策及虐后暴朝前王罕二國釁家禍曠古未書又可以式規萬葉作鑒於後宋故著作郎何承天始撰宋書草立紀傳止於武帝功臣篇牘未廣其所撰志惟天文律曆自此以外悉委奉朝請山謙之謙之孝建初又被詔撰述尋值病亡仍使南臺侍御史蘇寶生續造諸傳元嘉名臣皆其所撰寶生被誅大明中又命著作郎徐爰踵成前作爰因何蘇所述勒為一史起自義熙之初訖於大明之末至於臧質魯爽王僧達諸傳又皆孝武所造自永光以來至於禪讓十餘年內闕而不續一代典文始末未舉且事屬當時多非實録又立傳之方取捨乖衷進由時旨退傍世情垂之方來難以取信臣今謹更創立製成新史始自義熙肇號終於升明三年桓玄譙縱盧循馬魯之徒身為晉賊非關後代吳隱謝混郗僧施義止前朝不宜濫入宋典劉毅何無忌魏詠之檀憑之孟昶諸葛長民志在興復情非造宋今並刊除歸之晉籍臣遠愧南董近謝遷固以閭閻小才述一代盛典屬辭比事望古慚良鞠躬局蹐靦汗亡厝本紀列傳繕寫已畢合七帙七十卷臣今謹奏呈所撰諸志須成續上謹條目録詣省拜表奉書以聞臣約誠惶誠恐頓首頓首死罪死罪宋書自序藝文類聚五十五注制旨連珠表竊聞連珠之作始自子雲放易象論動模經誥班固謂之命世桓談以為絶倫連珠者蓋謂辭句連續互相發明若珠之結排也雖復金鏕互騁玉軑並馳妍蚩優劣參差相間翔禽伏獸易以心威守株膠瑟難與適變水鏡芝蘭隨其所遇明珠燕石貴賤相懸藝文類聚五十七為柳兗州世隆上舊宮表舊宮蘊靈千古合祥百代萬祇相址八神警室事超齊甸義邁譙宮故能屬輦道於天階命帝闕於霄路實宜樹闕疏壤寫極上穹克播徽塵永光盛烈藝文類聚六十二上建闕表恭惟哲后舊章必修眇矚前王復古為貴伏惟陛下欣咨故實率由令典昔在有晉經創江左邦訓莫釐遠圖多缺萬雉之外兩觀弗興空指南峰懸法無所世歷三代年將二百非所以經世成務垂業後昆天德圓應憲章自遠詔匠人建茲象闕俯藉愛禮之心以申子來之願式表端闈儀刑萬國使觀風而至復聞正歲之典遐想之士少寄懷古之目藝文類聚六十二謝立皇太子賜絹表臣聞重離在天八紘之所共仰明兩作二萬國所以咸寧太子體岐弱載表睿沖茂典册既升休祚方遠率土含歡遐邇均抃天情載洽慶賜必周幣帛嘉貺猥班庸劣藝文類聚八十五致仕表徒以桑榆無幾時制行及不朝之禮忽在今辰使反身敝廬待終窮巷臣又聞之懸車散髮其來舊矣昔廣德請骸義在量力二疏知止懼貽後悔數年以來稍就盡竭氣力衰耗不自支持若蒙天地大恩造物洪施拯其隆滿之切救其害盈之災譬彼日昃假榮終朝踟蹰夕景少觀盛化宅壤歸泉自無云幾祈仁仰澤事止寸陰藝文類聚十八臨終遺表臣約言臣抱疾彌留迄今未化形神欲離月已十數窮楚極毒無言以喻平日健時不言若此據刀坐劍比此為輕仰惟深入法門厲茲苦節內矜外恕實本天懷伏願復留聖心重加推廣微臣臨塗無復遺恨雖慚也善庶等鳴哀謹啓廣弘明集三十上藝文類聚七十七上疏論選舉頃自漢代本無士庶之別自非仕宦不至京師罷公卿牧守並還鄉里小人瞻仰以成風俗且黌校棊布傳經授業學優而仕始自鄉邑本於小吏幹佐方至文學功曹積以歲月乃得察舉人才秀異始為公府所辟遷為牧守入作台司漢之得人於斯為盛今之士人並聚京邑其有守土不遷非直愚賤且當今士子繁多略以萬計常患官少才多無地以處秀才自別是一種任官非若漢代取人之例也假使秀才對五問可稱孝廉答一策能過此乃雕蟲小道非關理功得失以此求才徒虛語耳通典十六上言宜校勘譜籍晉咸和初蘇峻作亂版籍焚燒無餘此後起咸和三年以至于宋所書並皆詳實朱筆隱注紙連悉縫而尚書上省庫籍唯有宋元嘉中以來以為宜檢之日即事所須故也晉代舊籍並在下省左戶曹前廂謂之晉籍有東西二庫既不係尋檢主者不復經懷狗牽鼠齧雨溼沾爛解散於地又無扃滕此籍既並精詳實宜保惜位宦高卑皆可依按宋元嘉二十七年始以七條徵發既立此科苟有回避人姦互起偽狀巧籍歲月滋廣以至于齊患其不實于是東堂校籍置郎令史以掌之而簿籍于此大壞矣凡粗有衣食者莫不互相因依競行姦貨落除卑注更書新籍通官榮爵隨意高下以新換故不過用一萬許錢昨日卑微今日仕伍凡此姦巧並出愚下不辨年號不識官階或注義熙在寧康之前或以隆安在元興之後此時無此府此年無此國元興唯有三年而猥稱四年又詔書甲子不與長曆相應如此詭謬萬緒千端校籍諸郎亦所不覺不才令史更何可言且籍字既細難為眼力尋求巧偽莫知所在徒費日月未有實驗假令兄弟三人分為三籍卻一籍父祖官其二初不被卻同堂從祖以下固自不論諸如此例難可悉數或有應卻而不卻不須卻而卻所卻既多理無悉當懷冤抱屈非止百千投辭請訴充曹牣府既難領理交興人怨於是悉聽復注普停洗卻既蒙復注則莫不成官此蓋核籍不精之巨弊也臣謂宋齊二代士庶不分雜役減闕職由於此自元嘉以來籍多假偽景平以前既不係檢凡此諸籍得無巧換今雖遺落所存尚多宜有徵驗可得信實其永初景平籍宜移還上省竊以為晉籍所餘須加寶愛若不切心留意則還復散失矣不識胄胤非謂衣冠凡諸此流罕知其祖假稱高曾莫非巧偽質諸文籍姦事立露懲覆矯詐為益實弘又上省籍庫雖直郎題掌而盡日料校唯令史獨入籍既重寶不可專委群細若入庫檢籍之時直郎直都應共監視寫籍皆於郎都目前並加掌置私寫私換可以永絶事畢郎出仍自題名臣又以為巧偽既多並稱人士百役不及高臥私門致令公私闕乏是事不舉宜選史傳學士諳究流品者為左民郎左民尚書專共校勘所作卑姓雜譜以晉籍及宋永初景平籍在下省者對共讎校若譜注通籍有卑雜則條其巧謬下在所科罰通典三又南史五十九王僧孺傳奏彈王源給事黃門侍郎兼御史中丞吳興邑中正臣沈約稽首言臣聞齊大非偶著乎前誥辭霍不婚垂稱往烈若乃交二族之和辨伉合之義升降窳隆誠非一揆固宜本其門素不相奪倫使秦晉有匹涇渭無舛自宋氏失御禮教雕衰衣冠之族日失其序姻婭淪雜罔計廝庶販鬻祖曾以為賈道明目腆顏曾無愧畏若夫盛德之胤世業可懷欒郤之家前徽未遠既壯而室竊資莫非皂隸結褵以行箕帚咸失其所志士聞而傷心舊老為之歎息自宸曆御宇弘革典憲雖除舊布新而斯風未殄陛下所以負扆興言思清弊俗者也臣實儒品謬掌天憲雖埋輪之志無屈權右而狐鼠微物亦蠹大猷風聞東海王源嫁女與富陽滿氏源雖人品庸陋胄實參華曾祖雅位登八命祖少卿內侍帷幄父璿升采儲闈亦居清顯源頻叨諸府戎禁豫班通徹而託姻結好唯利是求玷辱流輩莫斯為甚源人身在遠輒攝媒人劉嗣之到臺辨問嗣之列稱吳郡滿璋之相承云是高平舊族寵奮胤胄家計溫足見託為息鸞覓婚王源見告窮盡即索璋之簿閥見璋之任王國侍郎鸞又為王慈吳郡正閣主簿源父子因共詳議判與為婚璋之下錢五萬以為聘禮源先喪婦又以所騁餘直納妾如其所列則與風聞符同竊尋璋之姓族士庶莫辨滿奮身殞西朝胤嗣殄沒武秋之後無聞東晉其為虛託不言自顯王滿連姻實駭物聽潘楊之睦有異於此且買妾納媵因騁為資施襟之費化充床第鄙情贅行造次以之糾慝繩違允茲簡裁源即主臣謹案南郡丞王源忝藉世資得參纓冕同人者貌異人者心以彼行媒同之抱布且非我族類往哲格言薰蕕不雜聞之前典豈有六卿之胄納女於管庫之人宋子河魴同穴於輿臺之鬼高門降衡雖自己作蔑祖辱親於事為甚此風弗翦其源遂開點世塵家將被比屋宜置以明科黜之流伍使已污之族永愧於昔辰方媾之黨革心於來日臣等參議請以見事免源所居官禁錮終身輒下禁止視事如故源官品應黃紙臣輒奉白簡以聞臣約誠惶誠恐云云文選四十奏彈祕書郎蕭遙昌謹按兼祕書郎臣蕭遙昌盛戚茂年升華祕館淑慎之迹未彰違惰之容已及宜置徽綱以肅朝風請以見事免遙昌所居官初學記十二奏彈太子中舍人王僧祐肆情運氣不顧朝典揚眉闊步直轡高驅南史二十一奏彈孔稚圭違制啓假事臣聞禁憲有章士子攸慎守官有典觸綱斯及蓋所以崇威闡法下肅上尊謹案廷尉會稽邑中正臣稚圭歷俸朝班頻登要近九棘之任理無休謁冒制干聞實虧恆典恩許雖降所制不關違犯之條猶合約黜且稚圭俯自內轄作士下闈通制明文日陳几案自踰規矩莫斯為甚臣等參議請以見事免稚圭所居官除中正官名輒下禁止初學記二十奏彈奉朝請王希聃違假謹案奉朝請臣王希聃幸齒朝班私敬蓋闕休請有期曾無遄及違弛之愆允膺裁糾臣等參議請以見事免所居官輒下禁止初學記二十奏彈御史孔橐題省壁悖慢事謹案奉朝請臺侍御史臣孔橐淺劣無聞謬列華省假攝去來士子常務況東皋賤品非藉豐資旬日暫勞豈云卑辱而肆此醜言題勒禁省比物連類非所宜稱黜之流伍實允朝憲臣等參議請以見事免橐所居官輒下禁止初學記二十四修竹彈甘蕉文長兼淇園貞幹臣修竹稽首臣聞芟荑蘊崇農夫之善法無使滋蔓翦惡之良圖未有蠹苗害稼不加窮伐者也切尋蘇臺前甘蕉一叢宿漸雲露荏苒歲月擢本盈尋垂蔭含丈階緣寵渥銓衡百卉而豫奪乖爽高下在心每叨天功以為己力風聞籍聽非復一塗猶謂愛憎異説所以挂乎嚴網今月某日有臺西階澤蘭萱草到園同訴自稱雖慚杞梓頗異蒿蓬陽景所臨由來無隔今月某日巫岫斂雲秦樓開照乾光弘普罔幽不矚而甘蕉攢莖布影獨見鄣蔽雖處臺隅遂同幽谷臣謂偏辭難信敢察以情登攝甘蕉左近杜若江蘺依源辨覆兩草各處異列同款既有證據羌非風聞切尋甘蕉出自藥草本無芬馥之香柯條之任非有松柏後雕之心蓋闕葵藿傾陽之識馮籍慶會稽絶倫等而得人之譽靡即稱平之聲寂寞遂使言樹之草忘憂之用莫施無絶之芳當門之弊斯在妨賢敗政孰過於此而不除戮憲章安用請以見事徙根翦葉斥出臺外庶懲彼將來謝此衆屈藝文類聚八十七
