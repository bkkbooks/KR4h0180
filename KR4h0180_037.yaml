body:
  text: 江淹蕭被侍中敦勸表臣公言即日侍中臣惠基給事黃門侍郎臣王僧珍至朱蓋乘雲玄軒肅霧墜高天之旨集微臣之軀神爽矍然斂影無地中謝臣初長血心未啓素概辭從意空言隨事盡不能降陛下一時之恩借俄頃之照遂枉近侍貂簪軾庭臣自亮無庸何以集此退咎慊誠悲枉垂光進戒朝訓虧茲盛序感慮躑躅縈結夢寐臣檢古少例巡今逾疑豈有妄叨天功虛竊上賞近謬國華坐取隆貴人見其過外惜皇猷內畏私眚昔西京鼎秩漢世權家丹墀網戶擊鍾連騎何嘗不以驕滿貽戾謙沖要福者哉臣不能遵煙洲而謝支伯迎雲山而揖許由激昂榮華之間沈潛印組之內光飾既超寵靈亦遠江左已來罕見其倫今位冠朝端通侯萬戶結象弭於前衝奏金管於後陳都野宗其榮盛視聽敬其炎貴臣一旦居之誰以為不忝者乎而陛下猶崇以異禮者是增臣之戾也況復肅延華勸實深窘迫伏願俯矜單志賜遂前請則世寢橫議臣蒙緩責本集蕭被尚書敦勸重讓表臣公言臣五寫丹翹宜蒙凝照一降王人遂無蠲察復遣尚書臣岱兼侍中臣奐等奉宣慈靈重賜勉誨鏡伏回環憫默失圖心魄交懅淵谷匪譬中謝臣自初被詔迄于今時載慚載疑以悚以厲豈非深懼鴻典永憂末躬故琴瑟徒鳴不傳廣樂之響燈燼空舉焉續景星之耀何則卓乎小者不足以任大守于蔽者不可以語通臣器乏淵源識暗機務倫濟夷險每憑璿曆之遠龕折氛霓輒資群才之效臣寧有採奇鑒隱之能網國提民之功乎不謂過延渥洽謬攀河漢榮宗蒀葐寵華暐映藉聲探議共知其幸況傅保之崇殷周特貴牧司之寄魏晉稱重上昭妙德次擬英勳有踰茲序鮮不紊裂今陛下方闢金門之聽調繡扆之政何得去禮廢雅近於臣始既無前章孰表後世臣才孤位峻待罪無日矣情哀理感事盡於斯伏願一運天景微見藿心則物不逃形臣何恨焉不勝燋憂狼狽之至本集蕭讓劍履殊禮表臣公言近仰局威靈辭移理奪故欲冒忝傳識必避殊禮不悟復凝令詔雕飾非常鏡睇未周金火交慮中謝臣聞寵以昭賢不濫才外之華榮以麗身豈謀分表之渥哲后所以僉授貞臣所以慎荷故行圭行玉尚無輕頒一爵一號猶宜詳品況劍舄升陛贊唱異儀殆為對越神體抗禮天極漢魏舊載唯斯稱重雖英袞簉朝賢武滿世蒙此典者乃曠古時降耳諒由功饒賞結名高器深金蟬緑綬未能藹其采瓊珮朱紱不足宣其榮方加以履殿優以勿趨雖至第為上公貴為皇王佇望茲禮猶邈如也臣何燀業得兼昔人且今所慮受以懼覆悔豈有及復聞殊旨增其憂迮抱此愚款以殯為請伏願天鑒順臣所守則雖歿九幽傳榮萬葉矣本集蕭拜太尉揚州牧表玄文既降雕牒增輝禮藹前英寵華昔典仰震威容俯慚陋識心魂戰栗若殞若殯中謝臣景能驗才無假外鏡撰己練志久測內涯故讓不飾迹辭非謙距寸亮尺素頻觸瑤纊丹情實理備塵珠冕而宸居寂阻九重嚴絶徒懷漢臣伏闕之誠競無魯人回日之感所以回懼鴻威後奔殊令者也既而永鑒隆魏緬思宏晉國之大政在功與位故治民紐亂不處輿臺之下去勳捨德寧班袞司之上咸以休對性業裁成器靈詎有移風變範剋耀倫序者乎臣績不照朝忠豈宣國名爵赫曦僶俯優忝陛下久超以異禮之榮越次殊常之秩雖寢寐矜戰曲垂哀亮而璽册沖正愈賜砥礪今便肅順天誥恭聞睿典審躬酌私必跋危撓將恐氓俗由此方擾軌訓以之交蕪臣豈不勉智罄忠也未知所以報奉淵聖輸感霄極取諸微躬長為慚荷本集蕭太傅謝追贈父祖表臣公言即日兼謁者僕射姓名奉宣詔書追贈臣亡祖某太常卿亡父某為散騎常侍特進左光祿大夫寵輝泉扃恩凝松石奉渥銘心祗光慟慮中謝臣行阻祗玄躬早荼棘如創之痛昃日不追終身之恤霜露彌戚雖慚曾輿喬木之敬實抱仲路華轂之哀自謬藉圭金空貽組紱爵侈於公祿盈於私何嘗不靜欷其結默慕交深不悟睿孝動天昭性曠古惠被遠紀澤演慶世丹請靡諒峻册愈凝大榮集身尚驚異施況寵洽山柏特振殊造銷骨瀝命猶不勝謝不任鯁泗荷珮之誠本集蕭太傅辭輿駕親幸表臣公言近以神輿將降昌啓丹辭重被還旨未垂闓允謙尊彌光褒優愈臨慚疚既積敢忘謙請臣乘幸藉私豈曰無僭攀霞鏡月非復常所此必讓德信在於茲但恩嚴交泊固守莫從免默恭典伊榮加戚寧容爰枉鸞駕式驚臣府訪心驗己諒以不夷求物校迹誓無此義且古今異飾紫青變禮取諸臣躬未覿其安伏願陛下賜止冕輅時停雲駕則俗踐知方臣蹈厚泰本集蕭讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華品騎第乘鸞蕤藹其飾所以炎耀仙都崇麗神境世教以之垂彩民聽以之流文故勒岫銘海之功鞞革寫其詠龕難夷邦之業簫管凝其聲朱鷺玄雲既錫上德華山芳樹以頒奇勳爰及台賢位高藩戚名沿恩照寵垂私賞皆為發吹後陳豈曰兼奏前軒茲典罕行此禮實曠臣竊服已弘叨光無限才局秩遠常銜炯耀安可二葆同整雙弄頓驚覽躬惕然特貽厚謬伏願明爍日月靡忘情鑒將停盛飾遂臣慊心則涵惠既饒恭錫多矣本集藝文類聚六十八謝開府辟召表臣公言近被詔旨賜令臣府自辟僚賢竊聞治以才為寶教以人為貴激風揚蕤實資山東之英凝華重馥良在關西之彥近以闡耀世經發麗朝序今州策郡聘茲禮尚堙台召鉉辟斯文亟曖豈非盛美難嗣故曠寂先芬者哉臣謬贊國機職宜冰鑒未能澄刑照藝薦品任官既乖覆業彌戚深寄仰屬皇心遙覃察政洞俗弘此懿典崇臣遠寵輒祗睿恩謹宣巖壑庶幽居之士蘿薜可卷奇武異文無絶於古蕭上銅鐘芝草衆瑞表臣公言臣聞象際懸通豈以明昧岨運幽崖遙鏡不以人靈異謀威書璧誥既信其綵緑鱗丹字彌驗其文是以業藹鴻經則煙露呈照精昭景緯則川嶽發華故寶鼎白雲瑞集軒世芝房赤鴈祥委漢年玄石鴻鐘遠炳晉室玉璧彝器近耀皇宗自大明乘規泰始疊矩朱鬐素毳之至史不絶書奇葉珍柯之獻府無虛月今懋曆啓圖靈基再固頃歲以來禎應四塞近獲豫州刺史劉懷珍解稱所統建寧郡建寧縣昌村民於萬山中採藥忽聞異響從石上得銅鐘一枚長二尺一寸遠像古鑄近乖今製又州界之內樹生連理二木隔澗縢枝相通越壑跨水合為一幹方之舊説彌復為貴宣城所統臨城縣山中獲草一株交柯攢莖紫蓋黃裏貞潤暐曄自然天華採掇歷時質色不變柄據有徵近獲吳興太守臣王奐云十一月二十九日解所統長城縣令臣張撝解稱其月二十五日甘露降縣東界下山之陰又東太守臣腦解所統武進令臣紀法宗云十一月十日解稱其月二十四日甘露降於彭山松樹至九日又降如初臣以祥緯雜沓星燭波連斯乃靈迹深覃睿衷敻感理應寫順祗無涵祕稽往徵古僉欣升泰瑤光日闡玉繩永休謹拜表遣兼長史參軍臣姓名奉銅鍾芝草以聞本集蕭讓太傅相國齊公十郡九錫表備九錫之禮非常之册分天而降冠古之典開河而出遙然以慚魂交象魏中謝臣聞日月權輿二儀所以剋靈君臣設極三統所以式固惟生與位謂之大寶辨諸文而尊卑既炳觀群龍而貴賤可正雖復殷因於夏王資於帝至乎建侯分職體國經野其揆一焉是以二周之始山河愈廣兩漢之初封賞彌盛然表東海者實牧野之日瞻魯邦者乃負圖之辰西都英相信命世之功關中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳盟會九合一匡猶慚其德斯禮也臣實鄙才靡識大體徒以忠貞為概而勞不足銘雖以丹素為誠而功無可勒豈有經天緯地之略探隱照寂之智哉抑亦何術以堪盛休是以覽雲際而懷古憑軒榥而未寧也伏惟陛下神華馭世理無不鏡賜臣待謗今職守其私滿則天下有道庶人不疑矣本集藝文類聚五十三第二表臣公言臣近厲心罄辭寫情畢議眇望神藻鑒見丹襟而帝閽以祕綸誥方明中庶卷容左右軫慮中謝臣以為麗天秉經君上之彝憲儀地執緯臣下之恆軌故皇極載凝庶士交慎昔者重黎勤官裁居炎冥之職羲叔能任方掌日月之序至乎御龍勤夏未聞冠俗之爵大彭翼商豈見超世之典以古先哲后如茲之慎賞也臣乃謬貽國寄志在靜難若夫野戰虹霓伏順者易為威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴其明恃險輿馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬揚蕤物同其幸焚惡去醜世共其庇實為仰憑俯順之效臣亦何力之有焉竊謂祿為十郡必俟禹迹之勤錫以九命乃須周公之美況呂梁不鑿而器重玄圭越裳未獻而賦擬千乘京關識其崇貴畿服知其忝冒鏡前修而慚形覿往德而聳慮畏崖之請取誓深水審量之祈呈照皎景伏願陛下遠牽雄範近覽英規憑霞停詔臨風輟恩豈伊愚臣方獨昌化具日遺氓咸蒙其賴矣本集藝文類聚五十三被百僚敦勸受表臣公言臣款誠素履頻載縑翰天飾高獎纍降史筆即日尚書臣某等至重宣詔旨猥辱百僚省睇未交心靈已悸中謝臣聞良宰謀朝不必借威貞臣衛主修己則足故驕滿之失取鏡函關謙側之美見照伊闕臣本庸人識無遠度藉開闢之辰遭攙搶之運姦回內奰則戮力瓊都諸侯放命則抗節瑤祀秉號仗義幸不辱威皆為冕旒遙鑒之明群士畫圖之助臣寧望伊摯叔且之爵呂牙申伯之賞哉方欲謝簪東都濯冠汾陽不悟盛禮華典復臻於茲靜默回環祗畏躑躅猶謂遇聰明之朝當時雍之世陛下詠堯風之化歌卿雲之詩日月華采萬方獲性疊慮仰祈必蒙題品而威嚴窈絶斯冀遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身為限本集蕭相國讓進爵為王第二表臣結慮歸請三辰未鏡傾魂仰視九天彌阻重炳徽策再晣光誥理晦情震若涉嚴淵中謝臣業不出世績未逮古謬藉明政陳力就列艱多智寡翊贊罔樹若乃洪範不修鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時禍提下亟防明之陋貽慚昔人杜險之蔽取愧前英故十萬之師無集稿街之邸千金之貴恆單白藏之府戈船發於江湖戎車出於石城然後雲徹席卷虔劉巨禍臣實恧焉不悟上賞亟降華爵必集雖延首紫扃翹意宸居執為守約之志既謝簡鑒避賢辭智之請終無開允故受任專征遠邇知寵肇封四履侯甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁蒙袞舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆總納儀形蓋出近古非三代之遠體也今復乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽疵戾戾本集藝文類聚五十一蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題於宗器聲靡記於彝典而超居上禮邈乘峻爵靜念隆替焦原非譬中謝臣以為衆官咸事帝謨所以式序群后剋讓王猷所以載穆況臣訪德語勤未洎伊稷之能藉靈懷寵以濫周邵之秩故駐魂仰請瀝意歸聞理竭素牒事罄丹史具徽太微備簡玉繩而才輶志淺隔景絶照朱輪之使日月亟紆金鑾之尊旦夕將拂巡情覽識豈伊寧處今便肅典內軒恭服外屏大夫有命古或無違王假有廟今臣為叨三省空懦震懅于心本集齊王謝冕旒諸法物表臣王言以軒冕雲蹕既非常之飾宮懸玉戚乃配天之禮故呈襟效慮必期蠲亮重被還旨芳訊愈越鏡伏殊私情影遠震中謝昔大啓營丘未備樹羽之賞光宅曲阜始兼龍旗之貴況道狹慶隆身薄器尊粉繡爭輝藻火競耀夫太常圖列星之采華蓋觀古人之情所以聳絶百縣崇隔萬宇鳳閣因此而神瓊都由茲而麗故愧功慚德違儀避榮誠不遙孚理無敻達遂貽嚴誥爰斷辭表驚栗遲回祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼本集藝文類聚六十七齊王讓禪表陛下遠規唐虞永揖之典近謨漢魏高樹之禮既覽金水昏明之數又協雲電隆替之徵激風太上扇采至公聞命驚爽心靈殞越中謝臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受曆總明司幽軒轅陟祚首出庶物顓頊登庸作為民紀雖五德迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之會豈伊虛薄所可遵擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非若人功愧遠聖獄訟不往謳歌寧歸河乏馬圖之寶天無乘龍之錫元首股肱誓不可異而曠乘之軌忽臻於茲慚慨憂灼罔識其際伏願陛下遺舜禹之心臣守巢由之節則道耀日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉本集藝文類聚十四拜正員外郎表臣邁鄉遠迹由學末徒不瑩雕龍之采寧照玄豹之飾自過被光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慚飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹奉役丹殿巡魄擎概榮渥不悟震離徹邃阿景洞幽復升官清閨列版嚴闥蕞識何算爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉青雘增光空質心懅末塵情慚洞戶佇首矯迹以銘以奏本集拜中書郎表榮鬱兩臨恩警交鏡悄然攬魂乃懼乃逝臣聞汝潁之金或揚采於四豪江淮之珠已馳光於七貴皆聲不妄美第豈虛立未有伎慚美輿蒙送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長睽圖史智罕效官志闋從政方遽求振風長憂凌雨不悟遭社鳴之世屬河清之會玄雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎掾此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故奇士端威異人罄折皆相望北闕待詔南宮而臣學無利博文有忮害乃彯裾頓屣伏黃扉之右曳纓轉笏居青璅之前訪德於姑射聞道於崆洞伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下秩愚臣方古悠然已泰內燭徘徊眇不識屆本集南郊明堂異日議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革南齊書禮志上永明二年驍騎將軍江淹議
