body:
  text: 武帝斷酒肉文四首弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官夫匡正佛法是黑衣人事乃非弟子白衣所急但經教亦云佛法寄囑人王是以弟子不得無言今日諸僧尼開意聽受勿生疑閉內懷忿異凡出家人所以異於外道者正以信因信果信經所明信是佛說經言行十惡者受於惡報行十善者受於善報此是經教大意如是若出家人猶嗜飲酒噉食魚肉是則為行同於外道而復不及何謂同於外道外道執斷常見無因無果無施無報今佛弟子酣酒嗜肉不畏罪因不畏苦果即是不信因不信果與無施無報者復何以異此事與外道見同而有不及外道是何外道各信其師師所言是弟子言是師所言非弟子言非涅槃經言迦葉我今日制諸弟子不得食一切肉而今出家人猶自噉肉戒律言飲酒犯波夜提猶自飲酒無所疑難此事違於師教一不及外道又外道雖復邪僻持牛狗戒既受戒已後必不犯今出家人既受戒已輕於毀犯是二不及外道又外道雖復五熱炙身投淵赴火窮諸苦行未必皆噉食衆生今出家人噉食魚肉是三不及外道又外道行其異學雖不當理各習師法無有覆藏今出家人噉食魚肉於所親者乃自和光於所疏者則有隱避如是為行四不及外道又外道各宗所執各重其法乃自高聲大唱云不如我道真於諸異人無所忌憚今出家人或復年時已長或復素為物宗噉食魚肉極自艱難或避弟子或避同學或避白衣或避寺官懷挾邪志崎嶇覆藏然後方得一過噉食如此為行五不及外道又復外道直情徑行能長己徒衆惡不能長異部惡今出家人噉食魚肉或為白衣弟子之所聞見內無慚愧方飾邪說云佛教為法本存遠因在於即日未皆悉斷以錢買肉非己自殺此亦非嫌白衣愚癡聞是僧說謂真實語便復信受自行不善增廣諸惡是則六不及外道又外道雖復非法說法法說非法各信經書死不違背今出家人噉食魚肉或云肉非己殺猶得自噉以錢買肉亦復非嫌如是說者是事不然涅槃經云一切肉悉斷及自死者自死者猶斷何況不自死者楞伽經云為利殺衆生以財網諸肉二業俱不善死墮叫呼獄何謂以財網肉陸設罝罘水設網罟此是以網網肉若於屠殺人閒以錢買肉此是以財網肉若令此人不以財網肉者習惡律儀捕害衆生此人為當專自供口亦復別有所擬若別有所擬向食肉者豈無殺分何得云我不殺生此是灼然違背經文是七不及外道又復外道同其法者和合異其法者苦治令行禁止莫不率從今出家人或為師長或為寺官自開酒禁噉食魚肉不復能得施其教戒裁欲發言他即譏刺云師向亦爾寺官亦爾心懷內熱默然低頭面赤汗出不復得言身既有瑕不能伏物便復摩何直爾止住所以在寺者乖違受道者放逸此是八不及外道又外道受人施與如己法受烏戒人受烏戒施受鹿戒人受鹿戒施烏戒人終不覆戒受鹿戒施鹿戒人終不覆戒受烏戒施今出家人云我能精進我能苦行一時覆相誑諸白衣出即飲酒開衆惡門入即噉肉集衆苦本此是九不及外道又外道雖復顛倒無如是衆事酒者是何臭氣水穀失其正性成此別氣衆生以罪業因緣故受此惡觸此非正真道法亦非甘露上味云何出家僧尼猶生耽嗜僧尼授白衣五戒令不飲酒令不妄語云何翻自飲酒違負約誓七衆戒八戒齊五篇七聚長短律儀於何科中而出此文其餘衆僧故復可可至學律者彌不宜爾且開放逸門集衆惡本若白衣人甘此狂藥出家人猶當訶止云某甲汝就我受五戒不應如是若非受戒者亦應云檀越酒是惡本酒是魔事檀越今日幸可不飲云何出家人而應自飲尼羅浮陀地獄身如段肉無有識知此是何人皆飲酒者出家僧尼豈可不深信經教自棄正法行於邪道長衆惡根造地獄苦習行如此豈不內愧猶服如來衣受人信施居處塔寺仰對尊像若飲酒食肉如是等事出家之人不及居家何故如是在家人雖飲酒噉肉無犯戒罪此一不及居家人在家人雖復飲酒噉肉各有丘窟終不以此仰觸尊像此是二不及居家人在家人雖復飲酒噉肉終不吐泄寺舍此是三不及居家人在家人雖復飲酒噉肉無有譏嫌出家人若飲酒噉肉使人輕賤佛法此是四不及居家人在家人雖復飲酒噉肉門行井竈各安其鬼出家人若飲酒噉肉臭氣薰蒸一切善神皆悉遠離一切衆魔皆悉歡喜此是五不及居家人在家人雖復飲酒噉肉自破財産不破他財出家人飲酒噉肉自破善法破他福田是則六不及居家人在家人雖復飲酒噉肉皆是自力所辦出家人若飲酒噉肉皆他信施是則七不及居家人在家人雖復飲酒噉肉是常業更非異事出家人若飲酒噉肉衆魔外道各得其便是則八不及居家人在家人雖復如此飲酒噉肉猶故不失世業大耽昏者此則不得出家人若飲酒噉肉若多若少皆斷佛種是則九不及居家人不及外道不及居家略出所以各有九事欲論過患條流甚多可以例推不復具言今日大德僧尼今日義學僧尼今日寺官宜自警戒嚴淨徒衆若其懈怠不遵佛教猶是梁國編戶一民弟子今日力能治制若猶不依佛法是諸僧官宜依法問京師頃年講大涅槃經法輪相續便是不斷至於聽受動有千計今日重令法雲法師為諸僧尼講四相品四中少分諸僧尼常聽涅槃經為當曾聞此說為當不聞若已曾聞不應遠背若未曾聞今宜憶持佛經中究竟說斷一切肉乃至自死者亦不許食何況非自死者諸僧尼出家名佛弟子云何不從師教經言食肉者斷大慈種何謂斷大慈種凡大慈者皆令一切衆生同得安樂若食肉者一切衆生皆為怨對同不安樂若食肉者是遠離聲聞法若食肉者是遠離辟支佛法若食肉者是遠離菩薩法若食肉者是遠離菩提道若食肉者是遠離佛果若食肉者是遠離大涅槃若食肉者障生六欲天何況涅槃果若食肉者是障四禪法若食肉者是障四空法若食肉者是障戒法若食肉者是障定法若食肉者是障慧法若食肉者是障信根若食肉者是障進根若食肉者是障念根若食肉者是障定根若食肉者是障慧根舉要為言障三十七道品若食肉者是障四真諦若食肉者是障十二因緣若食肉者是障六波羅密若食肉者是障四弘誓願若食肉者是障四攝法若食肉者是障四無量心若食肉者是障四無礙智若食肉者是障三三昧若食肉者是障八解脫若食肉者是障九次第定若食肉者是障六神通若食肉者是障百八三昧若食肉者是障一切三昧若食肉者是障海印三昧若食肉者是障首楞嚴三昧若食肉者是障金剛三昧若食肉者是障五眼若食肉者是障十力若食肉者是障四無所畏若食肉者是障十八不共法若食肉者是障一切種智若食肉者是障無上菩提何以故若食肉者障菩提心無有菩薩法以食肉故障不能得初地以食肉故障不能得二地乃至障不能得十地以無菩薩法無菩薩法故無四無量心無四無量心故無有大慈大悲以是因緣佛子不續所以經言食肉者斷大慈種諸出家人雖復不能行大慈大悲究竟菩薩行成就無上菩提何為不能忍此臭腥修聲聞辟支佛道鴟鴉嗜鼠蝍蛆甘螮以此而推何可嗜著至於豺犬野犴皆知嗜肉人最有知勝諸衆生近與此等同甘臭腥豈直常懷殺心斷大慈種凡食肉者自是可鄙諸大德僧諸解義者講涅槃經何可不殷勤此句令聽受者心得悟解又有一種愚癡之人云我止噉魚實不食肉亦應開示此處不殊水陸衆生同名為肉諸聽講者豈可不審諦受持如說修行凡食肉者如前說此皆是遠事未為近切諸大德僧尼當知噉食衆生者是魔行噉食衆生是地獄種噉食衆生是恐怖因噉食衆生是斷命因噉食衆生是自燒因噉食衆生是自煮因噉食衆生是自炮因噉食衆生是自炙因噉食衆生是自割因噉食衆生是自剝因噉食衆生是斷頭因噉食衆生是斷手因噉食衆生是斷足因噉食衆生是破腹因噉食衆生是破背因噉食衆生是刳腸因噉食衆生是碎髓因噉食衆生是抉目因噉食衆生是割鼻因噉食衆生是截耳因噉食衆生是貧窮因噉食衆生是下賤因噉食衆生是凍餓因噉食衆生是醜陋因噉食衆生是聾因噉食衆生是盲因噉食衆生是瘖因噉食衆生是啞因噉食衆生是跛因噉食衆生是蹇因噉食衆生是瘡因噉食衆生是瘍因噉食衆生是疥因噉食衆生是癬因噉食衆生是瘤因噉食衆生是癭因噉食衆生是瘑因噉食衆生是疵因噉食衆生是癰因噉食衆生是癤因噉食衆生是痔因噉食衆生是疽因噉食衆生是瘻因噉食衆生是癩因噉食衆生是致蚤因噉食衆生是致蝨因噉食衆生是致蚊因噉食衆生是致虻因噉食衆生是遭毒蟲因噉食衆生是遭惡獸因噉食衆生是病瘦因噉食衆生是寒熱因噉食衆生是頭痛因噉食衆生是心痛因噉食衆生是腹痛因噉食衆生是胸痛因噉食衆生是背痛因噉食衆生是手痛因噉食衆生是足痛因噉食衆生是髓痛因噉食衆生是腸痛因噉食衆生是筋縮因噉食衆生是胃反因噉食衆生是脈絶因噉食衆生是血流因噉食衆生是咽塞因噉食衆生是喉痛因噉食衆生是風病因噉食衆生是水病因噉食衆生是四大不調適因噉食衆生是五臟不調適因噉食衆生是六腑不調適因噉食衆生是癲因噉食衆生是狂因噉食衆生乃至是四百四病一切衆病因噉食衆生是熱因噉食衆生是惱因噉食衆生是受壓因噉食衆生是遭水因噉食衆生是遭火因噉食衆生是遭風因噉食衆生是遭偷因噉食衆生是遭劫因噉食衆生是遭賊因噉食衆生是鞭因噉食衆生是杖因噉食衆生是笞因噉食衆生是督因噉食衆生是罵因噉食衆生是辱因噉食衆生是繫因噉食衆生是縛因噉食衆生是幽因噉食衆生是閉因噉食衆生是生苦因噉食衆生是老苦因噉食衆生是病苦因噉食衆生是死苦因噉食衆生是怨憎會苦因噉食衆生是愛別離苦因噉食衆生是求不得苦因噉食衆生是五受陰苦因噉食衆生是行苦因噉食衆生是壞苦因噉食衆生是苦苦因噉食衆生是想地獄因噉食衆生是黑繩地獄因噉食衆生是衆合地獄因噉食衆生是叫喚地獄因噉食衆生是大叫喚地獄因噉食衆生是熱地獄因噉食衆生是大熱地獄因噉食衆生是阿鼻地獄因噉食衆生是八寒八熱地獄因乃至是八萬四千鬲子地獄因乃至是不可說不可說鬲子地獄因噉食衆生乃至是一切餓鬼因噉食衆生乃至是一切畜生因當知餓鬼有無量苦當知畜生有無量苦畜生暫生暫死為物所害生時有無量怖畏死時有無量怖畏此皆殺業因緣受如是果若欲具列殺果展轉不窮盡大地草木亦不能容受向來所說雖復多途舉要為言同一苦果但苦中自有輕重所以今日致衆苦果皆由殺業惱害衆生略舉一隅粗言少分諸大德僧尼諸義學僧尼諸寺三官復當應思一大事若使噉食衆生父衆生亦報噉食其父若噉食衆生母衆生亦報噉食其母若噉食衆生子衆生亦報噉食其子如是怨對報相噉食歷劫長夜無有窮已如經說有一女人五百世害狼兒狼兒亦五百世害其子又有女人五百世斷鬼命根鬼亦五百世斷其命根如此皆是經說不可不信其餘相報推例可知諸大德僧尼諸義學僧尼諸寺三官又有一大事當應信受從無始已來至於此生經歷六道備諸果報一切親緣遍一切處直以經生歷死神明隔障是諸眷屬不復相識今日衆生或經是父母或經是師長或經是兄弟或經是姊妹或經是兒孫或經是朋友而今日無有道眼不能分別還相噉食不自覺知噉食之時此物有靈即生忿恨還成怨對向者至親還成至怨如是之事豈可不思暫爭舌端一時少味永與宿親長為怨對可為痛心難以言說白衣居家未可適道出家學人被如來衣習菩薩行宜應深思諸大德僧尼諸義學僧尼諸寺三官又復當思一事凡噉食衆生是一切衆生惡知識是一切衆生怨家如是怨家遍滿六道若欲修行皆為障難一理中障難二事中障難何者是理中障難以業因緣自生障難令此行人愚癡無慧不知出要無有方便設值善知識不能信受設復信受不能習行此是理中障難事中障者此諸怨對或在惡鬼中或在毒獸中或在大力神中或在大力龍中或在魔中或在天中如是處處來作留難設令修行遇善知識深心信受適欲習行便復難起或引入邪道或惱令心亂修戒修定修慧修諸功德常不清淨常不滿足皆是舊怨起諸對障此是事中障難如是之事又宜深思但以一噉食衆生因緣能遠離一切佛法有如是種種過患貪毒亦如是瞋毒亦如是癡毒亦如是三毒等分皆同過患相與宜深自覺察善思方便廣弘明集二十六弟子蕭衍又復敬白諸大德僧尼諸義學僧尼諸寺三官北山蔣帝猶且去殺若以不殺祈願輒得上教若以殺生祈願輒不得教想今日大衆已應聞知弟子已勒諸廟祝及以百姓凡諸群祀若有祈報者皆不得薦生類各盡誠心止修蔬供蔣帝今日行菩薩道諸出家人云何反食衆生行諸魔行一日北山為蔣帝齊所以皆請菜食僧者正以幽靈悉能鑒見若不菜食僧作菜食往將恐蔣帝惡賤佛法怪望弟子是諸法師當見此意同上弟子蕭衍又敬白大德僧尼諸義學者一切寺三官弟子蕭衍於十方一切諸佛前於十方一切尊法前於十方一切聖僧前與諸僧尼共伸約誓今日僧衆還寺已後各各檢勒使依佛教若復有飲酒噉肉不如法者弟子當依王法治問諸僧尼若披如來衣不行如來行是假名僧與盜賊不異如是行者猶是弟子國中編戶一民今日以王力足相治問若為外司聽察所得若為寺家自相糾舉不問年時老少不問門徒多少弟子當令寺官集僧衆鳴犍捶捨戒還俗著在家服依涅槃經還俗策使唯最老舊者最多門徒者此二種人最宜先問何以故治一無行小僧不足以改革物心治如是一大僧足以驚動視聽推計名德大僧不應有此設令有此當依法治問其餘小僧故自忘言今日集會此是大事因緣非直一切諸佛在此非直一切尊法在此非直一切聖僧在此諸天亦應遍滿虛空諸仙亦應遍滿虛空護世四王亦應在此金剛蜜迹大辨天神功德天神韋馱天神毗紐天神摩醯首羅散脂大將地神堅牢迦毗羅王孔雀王封頭王富尼跋陀羅迦王阿修羅伽王摩尼跋陀羅伽王金毗羅王十方二十八部夜義叉神王一切持呪神王六方大護都使安國如是一切有大神足力有大威德力如是一切善神遍滿虛空五方龍王娑竭龍王阿耨龍王難陀龍王跋難陀龍王伊那滿龍王如是一切菩薩龍王亦應遍滿在此天龍夜叉乾闥婆王阿修羅王迦樓羅王緊那羅王摩睺羅伽王人非人等如是一切有大神足力有大威德力八部神王皆應在此今日土地山川房廟諸神亦應仄塞虛空如是幽顯莫不鑒觀唯無瑕者可以戮人唯自淨者可以淨人弟子今日唱言此事僧尼必當有不平色設令刳心擲地以示僧尼丏數片肉無以取信古人有言非知之難其在行之弟子蕭衍雖在居家不持禁戒今日當先自為誓以明本心弟子蕭衍從今已去至於道場若飲酒放逸起諸淫欲斯誑妄語噉食衆生乃至飲於乳蜜及以酥酪願一切有大力鬼神先當苦治蕭衍身然後將付地獄閻羅王與種種苦乃至衆生皆成佛盡弟子蕭衍猶在阿鼻地獄中僧尼若有飲酒噉魚肉者而不悔過一切大力鬼神亦應如此治問增廣善衆清淨佛道若未為幽司之所治問猶在世者弟子蕭衍當如法治問驅令還俗與居家衣隨時役使願今日二部僧尼各還本寺匡正佛法和合時衆皆令聽經法者如說修行不可復令斷大慈種使佛子不續若有犯法破戒者皆依僧制如法治問若有容受不相舉治者當反任罪又僧尼寺有事四天王迦毗羅神猶設鹿頭及羊肉等是事不可急宜禁斷若不禁斷寺官任咎亦同前科別宣意同上弟子蕭衍敬白諸大德僧尼諸義學僧尼諸寺三官向已粗陳魚肉障纍招致苦果今重復欲通白一言閻浮提壽云百二十至於世間罕聞其人遷變零落亦無宿少經言以一念頃有六十剎那生老無常謝不移時暫有諸根俄然衰滅三途等苦倏忽便及欲離地獄其事甚難戒德清淨猶懼不免況於毀犯安可免乎雖復長齊菜食不勤方便欲免苦報亦無是處何以故爾此生雖可不犯衆罪後報業強現無方便三途等苦不能遮止況復飲酒噉食衆生諸僧尼必信佛語宜自力勵若云菜食為難此是信心薄少若有信心宜應自強有決定心菜食何難菜蔬魚肉俱是一惑心若能安便是甘露上味心若不安便是臭穢下食所以涅槃經言受食之時令作子肉想如俱非惑豈須此法且置遠事止借近喻今已能蔬食者厭惡血腥其於不能蔬食者厭惡菜茹事等如此宜應自力回不善惑以為善惑就善惑中重為方便食菜子想以如是心便得決定凡不能離魚肉者皆云菜蔬冷令人虛乏魚肉溫於人補益作如是說皆是倒見今試復粗言其事不爾若久食菜人榮衛流通凡如此人法多患熱榮衛流通則能飲食以飲食故氣力充滿是則菜蔬不冷能有補益諸苦行人亦皆菜蔬多悉患熱類皆堅強神明清爽少於昏疲凡魚為生類皆多冷血腥為法增長百疾所以食魚肉者神明理當昏濁四體法皆沈重無論方招後報有三途苦即時四大交有不及此豈非惑者因心各有所執甘魚肉者便謂為溫為補此是倒見事不可信復有一種人食菜以為冷便復解素此是行者未得菜意菜與魚肉如水與火食菜才欲得力復噉魚肉魚肉腥臊能滅菜力所以惑者云菜為性冷凡數解素人進不得菜蔬之力退不得魚肉邪益法多羸冷少有堪能是諸僧尼復當知一事凡食魚肉是魔境界行於魔行心不決定多有留難內外衆魔共相嬈作所以行者思念魚肉酒是魔漿故不待言凡食魚肉嗜飲酒者善神遠離內無正氣如此等人法多衰惱復有一種人雖能菜食恃此憍慢多於瞋恚好生貪求如是之人亦墜魔界多於衰惱又有一種人外行似熟內心粗惡見人勝己常懷忿疾所行不善皆悉覆相如是等人亦行魔界雖復菜蔬亦多衰惱若心力決正蔬食若節如是等人多為善力所扶法多堪能有不直者宜應思覺勿以不決定心期決定人諸大德僧尼有行業已成者今日已去善相開導令未得者今去皆得若已習行願堅志力若未曾行願皆改革今日相與共為菩提種子勿怪弟子蕭衍向來所白廣弘明集二十六鍾律緯案律呂京馬鄭蔡至蕤賓並上生大呂而班固律曆志至蕤賓仍以次下生若從班義夾鍾唯長三寸七分有奇律若過促則夾鍾之聲成一調中呂復去調半是過於無調仲春孟夏正相長養其氣舒緩不容短促求聲索實班義為乖鄭玄又以陰陽六位次第相生若如玄義陰陽相逐生者止是升陽其降陽復將何寄就筮數而論乾主甲壬而左行坤主乙癸而右行故陰陽得有升降之義陰陽從行者真性也六位升降者象數也今鄭乃執象數以配真性故言比而理窮云九六相生了不釋十二氣所以相通鄭之不思亦已明矣案京房六十準依法推乃自無差但律呂所得或五或六此一不例也而分焉上生乃復遲內上生盛變盛變仍復上生分居此二不例也房妙盡陰陽其當有以若非深理難求便是傳者不習比敕詳求莫能辨正聊以餘日試推其旨參校舊器及古夾鍾玉律更制新尺以證分豪制為四器名之為通四器絃閒九尺臨嶽高一寸二分黃鍾之絃二百七十絲長九尺以次三分損益其一以生十二律之絃絲數及絃長各以律本所建之月五行生王終紿之音相次之理為其名義名之為通通施三絃傳推月氣悉無差舛即以夾鍾玉律命之則還相中又制為十二笛以寫通聲其夾鍾笛十二調以飲玉律又不差異山謙之記云殿前三鍾悉是周景王所鑄無射也遣樂官以今無射新笛飲不相中以夷則笛飲則聲韻合和端門外鍾亦案其銘題定皆夷則其西廂一鍾天監中移度東以今笛飲乃中南呂驗其鐫刻乃是太蔟則下今笛二調重敕太樂丞斯宣達令更推校鍾定有鑿處表裏皆然借訪舊識乃是宋泰始中使張永鑿之去銅既多故其調嘽下以推求鍾律便可得而見也宋武平中原使將軍陳傾致三鍾小大中各一則今之太極殿前二鍾端門外一鍾是也案西鍾銘則云清廟撞鍾秦無清廟此周制明矣又一銘云太蔟鍾徵則林鍾宮所施也京房推用似有由也檢題既無秦漢年代直云夷則太蔟則非秦漢明矣古人性質故作僮僕字則題而言彌驗非近且失驗聲改政則五音六律非可差舛工守其音儒執其文歷年永久隔而不通無論樂奏求之多缺假使具存亦不可用周頌漢歌各敘功德豈容復施後王以濫名實今率詳論以言所見並詔百司以求厥中祖沖之所傳銅尺其銘曰晉泰始十年中書考古器揆校今尺長四分半所校古法有七品一曰姑洗玉律二曰小呂玉律三曰西京銅望臬四曰金錯望臬五曰銅斛六曰古錢七曰建武銅尺姑洗微強西京望臬微弱其餘與此尺同此尺者勖新尺也今尺者杜夔尺也雷次宗何胤之二人作鍾律圖所載荀勖校量古尺文與此銘同主衣從上相承有周時銅尺一枚古玉律八枚檢主衣周尺東昏用為章信尺不復存玉律一口蕭餘定七枚夾鍾有昔題刻乃制為尺以相參驗取細毫中黍積次酬定今尺最為詳密長祖沖之尺校半分以新尺制為四器名為通又依新尺為笛以命古鍾案刻夷則以笛命飲和韻夷則定合宋武平中原送渾天儀土圭云是張衡所作驗渾儀銘題是光初四年鑄土圭是光初八年作並是劉曜所制非張衡也已上四條並見隋書律曆志上
