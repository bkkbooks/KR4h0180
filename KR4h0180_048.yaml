body:
  text: 王志答釋法雲書難范縝神滅論辱告伏覽敕答臣下神滅論旨高義博照若發蒙弟子夙奉釋教練服舊聞有自來矣非惟雷同遠大贊激天旨而已且垂答二解厭伏心靈藻燭聞見更不知何以闡揚玄猷光彰聖述且得罔象不溷於真內外無紛如之滯實懷嘉抃猥惠來示佩眷惟深王志和南宏明集十答釋法雲書難范縝神滅論辱告惠示敕答臣下審神滅論夫昊蒼玄默本絶言議性與天道固亦難聞而愛育之仁依方感動開誘之教沿事降設矜局蛙於井谷哀危蟪於寸陰思發神衷言微理鏡引據前經文約旨遠凝神杳翳一理能貫墳典紛綸一言以蔽顯列聖之潛旨決終古之滯惑存滅由斯而曉孝敬同茲同隆信足以警誡重昏儀範百代所謂聖謨揚揚嘉言孔章者也弟子既慚辨理彌懵知音遂得預聞道訓頒覿妙藻式抃下陳永佩聖則弟子王揖和南宏明集十答釋法雲書難范縝神滅論一日曲蒙宴私預聞范中書有神形偕滅之論斯人徑侹不近人情直以下才未能折五鹿之角耳辱告垂示聖旨徵引孝道發揚冥致謹當尋誦永祛蒙惑弟子王泰頓首和南宏明集十答釋法雲書難范縝神滅論惠示敕答臣下審神滅論竊以神一冥默歷聖未傳宣尼猶稱不言莊生空構其語求之方策歎昧交深謬覿今論天思淵發妙旨凝深至理既弘孝機兼極信足韜超萬古照燭來今弟子生屬昌辰預覯聖藻既冰渙於懷抱信曉惑於隨便凡厥靈知孰不鑽仰矧伊蒙蔽激抃實深王緝和南宏明集十答釋法雲書難范縝神滅論辱告伏見敕答臣下神滅論神之不滅經典明文即心語事皎然在理論有神滅實所駭歎天照淵凝妙旨周博折彼異端弘茲教範信可以朗悟冥塗棟梁千載矣伏覽歡戴竊深罔極比故詣展遲獲咨伸王珍國呈宏明集十答釋法雲書難范縝神滅論枉告井奉覽敕答臣下審神滅論聖旨玄照啓寤群蒙義顯幽徵理宣寂昧夫經述故身之義繫敘遊魂之談愚淺所辨詳已為非滅況復睿思弘遠盡理窮微引文證典渙然冰釋肉眼之人虔恭回向惑纍之衆悛改浮心發明既往訓導將來伏奉淵教欣蹈罔已王和南宏明集十答釋法雲書難范縝神滅論辱告伏見敕旨答臣下審神滅論聖思淵凝天理孤絶辨三世則釋義明舉二事則孝道暢塞鑽鑿之路杜異路之口足使魔堞永淪正峰長峻弟子伏膺至道預奉天則喜躍之心寧復恆準王彬緘頓首和南宏明集十答釋法雲書難范縝神滅論辱告伏見敕旨答臣下審神滅論夫形分涉粗或微隱難悟況識理精密豈庸見能曉所以斷常交騖一異競奔若中道居懷則欲流可反二邊滯意彼岸長乖神滅之論斯障實重仰賴聖主棟梁至教明詔爰發朗若披雲非直冥符訓典府弘孝義蓋妙達生源幽窮行本使執禮之性踐霜露而彌篤研神之議仰禪悅而增心皆當習忍慧途翻流惑海弟子早標素心未知津濟伏讀歡欣充遍身識猥惠存勗荷眷惟深嚴植之呈宏明集十郊宮議周禮王旅上帝張氈案以氈為床於幄中不聞郊所置宮宇也通典四十二齊永明元年外庠博士賀瑒議郊擅瓦屋議周禮王旅上帝張氈案設皇邸國有故而祭亦曰旅氈案以氈為床於幄中不聞郊所置宮宇南齊書禮志上建武二年太學博士賀瑒議宮人始入應奏樂議按禮賓入而懸興示易以敬也和易以敬宮人皆然謂不應有異愚以宮人始入便應奏樂通典一百四十七梁天監中掌賓禮賀瑒議上宮元會奏大壯武舞大觀文舞議按禮記云太子為樂也以賞諸侯之有功其治人勞者舞行綴遠其治人逸者舞行綴短觀其舞知其德以此而求諸侯舞時王之樂可知也況皇儲養德春宮式瞻攸屬謂宜備二舞以宣文武之德焉通典一百四十七天監中答釋法雲書難范縝神滅論辱告垂示敕答臣下審神滅論鑽仰反復誦味循環故知妙蘊機初事隔凡識神凝繫表義絶庸情皇上睿覽通幽性與天道所以機見英遠獨悟超深述三聖以導未曉標二事以洗偏惑或係孝之旨愈明因果之宗彌暢崛山粹典即此重彰洙水清教於茲再朗譬諸日月無得踰焉弟子雖冥頑多蔽謬奉格言研求妙趣猶知蹈舞法師宣揚至道光闡大猷猥惠未及益增銘荷弟子賀瑒呈宏明集十奏二郊及藉田宜御輦今南北二郊及藉田往還並宜御輦不復乘輅二郊請用素輦藉田往還乘常輦皆以侍中陪乘停大將軍及太僕梁書武帝紀下大同五年御史中丞參禮儀事賀琛奏條奏時務封事臣荷拔擢之恩曾不能效一職居獻納之任又不能薦一言竊聞慈父不愛無益之子明君不畜無益之臣臣所以當食廢飧中宵而歎息也輒言時事列之於後非謂謀猷寧云啓沃獨緘胸臆不語妻子辭無粉飾削稿則焚脫得聽覽試加省鑒如不允合亮其戇愚其一事曰今北邊稽服戈申解息政是生聚教訓之時而天下戶口滅落誠當今之急務雖是處雕流而關外彌甚郡不堪州之控總縣不堪郡之裒削更相呼擾莫得治其政術惟以應赴徵斂為事百姓不能堪命各事流移或依於大姓或聚於屯封蓋不獲已而竄亡非樂之也國家於關外賦稅蓋微乃至年常租課動致逋積而民失安居寧非牧守之過東境戶口空虛皆由使命繁數夫犬不夜吠故民得安居今大邦大縣舟舸銜命者非惟十數復窮幽之鄉極遠之邑亦皆必至每有一使屬所搔擾況復煩擾積理深為民害駑困邑宰則拱手聽其漁獵桀黠長吏又因之而為貪殘縱有廉平郡猶掣肘故邑宰懷印類無考績細民棄業流𤕠者多雖年降復業之詔屢下蠲賦之恩而終不得反其居也其二事曰聖主恤隱之心納隍之念聞之遐邇至於翾飛蠕動猶且度脫況在兆庶而州郡無恤民之志故天下顒顒惟注仰於一人誠所謂愛之如父母仰之如日月敬之如鬼神畏之如雷霆苟須應痛逗藥豈可不治之哉今天下宰守所以皆尚貪殘罕有廉白者良由風俗侈靡使之然也淫奢之斃其事多端粗舉二條言其尤者夫食方丈於前所甘一味今之燕喜相競誇豪積果如山嶽列肴同綺繡露臺之産不周一燕之資而賓主之間裁取滿腹未及下堂已同臭腐又歌姬儛女本有品制二八之錫良待和戎今言妓之夫無有等秩雖復庶賤微人皆盛姬薑務在貪污爭飾羅綺故為吏牧民者競為剝削雖致資巨億罷歸之日不支數年便已消散蓋由宴醑所費既破數家之産歌謠之具必俟千金之資所費事等丘山為歡止在俄頃乃更追恨向所取之少今所費之多如復傅翼增其搏噬一何悖哉其餘淫侈著之凡百習以成俗日見滋甚欲使人守廉隅吏尚清白安可得邪今誠宜嚴為禁制道之以節儉貶黜雕節糾奏浮華使衆皆知變其耳目改其好惡夫失節之嗟亦民所自患正恥不及群故勉強而為之苟力所不至還受其斃矣今若釐其風而正其失易於反掌夫論至治者必以淳素為先正雕流之弊莫有過儉朴者也其三事曰聖躬荷負蒼生以為任弘濟四海以為心不憚胼胝之勞不辭癯瘦之苦豈止日仄忘飢夜分廢寢至於百司莫不奏事上息奏下之嫌下無逼上之咎斯實道邁百王事超千載但斗筲之人藻梲之子既得伏奏帷扆便欲詭競求進不説國之大體不知當一官處一職貴使理其紊亂匡其不及心在明恕事乃平章但務吹毛求疵擘肌分理運挈瓶之智徼分外之求以深刻為能以繩逐為務迹雖似於奉公事更成其威福犯罪者多巧避滋甚曠官廢職長斃增姦實由於此今誠願責其公平之效黜其讒愚之心則下安上謐無徼幸之患矣四事曰自征伐北境帑藏空虛今天下無事而猶日不暇給者良有以也夫國敝則省其事而息其費事省則養民費息則財聚止五年之中尚於無事必能使國豐民阜若積以歲月斯乃范蠡滅吳之術管仲霸齊之由今應內省職掌各檢其所部凡京師治署邸肆應所為或十條宜省其五或三條宜除其一及國容戎備在昔應多在今宜少雖於後應多即事未須皆悉減省應四方屯傳邸治或舊有或無益或妨民有所宜除除之有所宜減減之凡厥興造凡厥費財有非急者有役民者又凡厥討召凡厥徵求雖關國計權其事宜皆須息費休民不息費則無以聚財不休民則無以聚力故蓄其財者所以大用之也息其民者所以大役之也若言小費不足害財則終年不息矣以小役不足妨民則終年不止矣擾其民而欲求生聚殷阜不可得矣耗其財而務賦斂繁興則姦詐盜竊彌生是斃不息而其民不可使也則難可以語富強而圖遠大矣自普通以來二十餘年刑役荐起民力雕流今魏氏和親疆場無警若不及於此時大息四民使之生聚減省國費令府庫蓄積一旦異境有虞關河可掃則國弊民疲安能振其遠略事至方圖知不及矣梁書賀琛傳駁皇太子大功之末可以冠子嫁女議令旨以大功之未可得冠子嫁女不得自冠自嫁推以記文竊猶致惑案嫁冠之禮本是父之所成無父之人乃可自冠故稱大功小功並以冠子嫁子為文非關惟得為子己身不得也小功之末既得自嫁娶而亦云冠子娶婦其義益明故先列二服每明冠子嫁子結於後句方顯自娶之義既明小功自娶即知大功自冠矣蓋是約言而見旨若謂緣父服大功子服小功小功服輕故得為子冠嫁大功服重故不得自嫁自冠者則小功之末非明父子服殊不應復云冠子嫁子也若謂小功之文言己可娶大功之文不言己冠故知身有大功不得自行嘉禮但得為子冠嫁竊謂有服不行嘉禮本為吉凶不可相干子雖小功之末可得行冠嫁猶應須父得為其嫁冠若父於大功之末可以冠子嫁子是於吉凶禮無礙吉凶禮無礙豈不得自冠自嫁若自冠自嫁於事有礙則冠子嫁子寧獨可通今許其冠子而塞其自冠是琛之所惑也又令旨推下殤小功不可娶婦則降服大功亦不得為子冠嫁伏尋此旨若謂降服大功不可冠子嫁子則降服小功亦不可自冠自娶是為凡厥降服大功小功皆不得冠娶矣記文應云降服則不可寧得惟稱下殤今不言降服的舉下殤實有其義夫出嫁出後或有再降出後之身於本姊妹降為大功若是大夫服士又以尊降則成小功其於冠嫁義無以異所以然者出嫁則有受我出後則有傳重並欲薄於此而厚於彼此服雖降彼服則隆昔實期親雖再降猶依小功之禮可冠可嫁若夫期降大功大功降為小功止是一等降殺有倫服未嫁冠故無有異惟下殤之服特明不娶之義者蓋緣以幼稚之故天喪情深既無受厚他姓又異傳重彼宗嫌其年稚服輕頓成殺略故特明不娶以示本重之恩是以凡厥降服冠嫁不殊惟在下殤乃明不娶其義若此則不得言大功之降服皆不可冠嫁也且記云下殤小功言下殤則不得通於中上語小功則不得兼於大功若實大小功降服皆下冠嫁上中二殤亦不嫁冠者記不得直云下殤小功則不可恐非文意此又琛之所疑也梁書賀琛傳又南史六十二書道增至得書深慰已熱卿何如吾甚勿勿始過嶠今便下水末因見卿為歎善自愛異日當至上京有有因道增行所具少字不具阮研頓首淳化閣帖四謝後軍臨川王參軍事啓恩降絶望之辰慶集冥心之日焰灰非喻荑枯未擬摳衣聚足顛狽不勝臣遍歷三墳備詳六典巡校賞罰之科洞檢生死之律莫不嚴五辟於明君之朝峻三章於聖人之世是以塗山始會致防風之誅酆邑方構有崇侯之伐未有緩憲於斫戮之人賒刑於耐罪之族出萬死入一生如臣者也推恩及罪在臣實大披心瀝血敢乞言之臣東國賤人學行何取既殊鳴鴈真木故無結綬彈冠徒藉羽儀易農就仕往年濫職守秩東隅仰屬龔行風驅電掩當其時也負鼎圖者日至執玉帛者相望獨在愚臣頓昏大義殉鴻毛之輕忘同德之重但三吳險薄五湖交通屢起田儋之變每懼殷通之禍空慕君魚保境遂失師悁抱器後至者斬臣甘斯戮明刑殉衆誰曰不然幸約法之弘承解網之宥猶當降等薪粲遂乃頓釋鉗赭斂骨吹魂還編黔庶濯疵蕩穢入楚遊陳天波既洗雲油遽沐古人有言非死之難處死之難臣之所荷曠古不書臣之死所未知何地梁書袁昂傳天監二年以為後軍臨川王參軍事昂奉啓謝答武帝書都史至辱誨承藉以衆論謂僕有勤王之舉兼蒙誚責獨無送款循復嚴旨若臨萬仞三吳內地非用兵之所況以偏隅一郡何能為役近奉敕以此境多虞見使安慰自承麾斾屆止莫不膝袒軍門惟僕一人敢後至者政以內揆庸素文武無施直是陳國賤男子耳雖欲獻心不增大師之勇置其愚默寧沮衆軍之威幸藉將軍含弘之大可得從容以禮竊以一餐微施尚復投殞況食人之祿而頓忘一旦非唯物議不可亦恐明公鄙之所以躊躇未遑薦璧遂以輕微爰降重命脤灼於心忘其所厝誠推理鑒猶懼威臨梁書袁昂傳昂為吳興太守永元末義師至京師州牧郡守皆望風降款昂獨拒境不受命高祖手書喻云云昂答又見南史二十六答服問書竊聞禮由恩斷服以情申故小功他邦加制一等同爨有緦明之典籍孤子夙以不天幼傾乾廕資敬未奉過庭莫承藐藐沖年未達朱紫從兄提養訓教示以義方每假其談價虛其聲譽得及人次實亦有由兼開拓房宇處以華曠同財共有恣其取足爾來三十餘年憐愛之至無異於己姊妹孤姪成就一時篤念之深在終彌固此恩此愛畢壞不追既情若同生而服為諸從言心即事實未忍安昔馬稜與弟毅同居毅亡稜為心服三年由也之不除喪亦緣情而致制雖識不及古誠懷感慕常願千秋之後從服期齊不圖門衰禍集一旦草土殘息復罹今酷尋惟慟絶彌劇彌深今以餘喘欲遂素志庶寄其罔慕之痛少申無已之情雖禮無明據乃事有先例率迷而至必欲行之君問理所歸謹以咨白臨紙號哽言不識次梁書袁昂傳昂從兄彖卒昂幼孤為彖所養乃制期服人有怪而問之者昂致書以喻之答釋法雲書難范縝神滅論辱告并伏見敕答臣下審神滅論奉讀循環頓醒昏縛夫識神冥漠其理難窮粵在庸愚豈能探索近取諸骸內尚日用不知況乎幽昧理歸惑解仰尋聖典既顯言不無但應宗教歸依其有就有談有猶未能盡性遂於不無論無斯可遠矣自非神解獨脫機鑒絶倫何能妙測不斷之言深悟相續之旨兼引喻二證方見神在皎然求之三世不滅之理彌著可謂鑽之彌堅仰之彌高者也方使衆惑塵開群迷反路伏誦無斁舞蹈不勝弟子袁昂和南宏明集十臨終敕諸子不得言上行狀及立志銘凡有所須悉皆停省吾釋褐從仕不期富貴但官序不失等倫衣食粗知榮辱以此闔棺無慚鄉里往忝吳興屬在昏明之際既暗於前覺無識於聖朝不知天命甘貽顯戮幸遇殊恩遂得全門戶自念負罪私門階榮望絶保存性命以為幸甚不謂叨竊寵靈一至於此常欲竭誠酬報申吾乃心所以朝廷每興師北伐吾輒啓求行誓之丹款實非矯言既庸懦無施皆不蒙許雖欲罄命其議莫從今日瞑目畢恨泉壤若魂而有知方期結草聖朝遵古知吾名品或有追遠之恩雖是經國恆典在吾無應致此脫有贈官慎勿祇奉梁書袁昂傳南史二十六古今書評王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆荒悅而舉體蹉跎殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞澀終不似真徐淮南書如南江士大夫徒好尚風軌終不免寒氣阮研書如貴胄失品次不能復排突英賢王儀同書如晉安帝非不處尊位而都無神思吳興書如新亭唱父一往見揚州人共語音態便出陶隱居書如吳興少兒形雖未成長而骨體甚駿快殷鈞書如高麗使人抗甚有意氣滋韻終不精味袁山松樹書如深山道士見人便欲退縮蕭子雲書如春初望山林花帶處不發如經論道人無絶不言崔子玉書如危峰阻日孤松一被有絶望之意師宜官書如雕羽未息嗣自逝韋誕書如虎威彪振劍拔弩張蔡雍書骨氣風遠爽爽為神鍾司徒書字十二種意外殊妙少實多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衛常書如插花美人舞笑鏡臺孟光録書如崩山絶崔人見可畏張芝篤奇鍾繇特絶逸少鼎能獻之冠世四英其頽洪芳不滅羊真孫草蕭行范篆各一時妙絶鍾繇書若飛鴻戲海舞鶴遊天行間希密實亦難過蕭思話書走墨連字勢屈強若龍跳淵門虎臥鳳闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹御覽七百四十八評書從漢末至梁有卅四人王僧虔書猶如揚州王謝家子弟縱復不端正奕奕皆有一種風氣王子敬書如河朔少年皆充悅舉體沓拖而不可耐羊欣書似婢作夫人不堪位置而舉止羞澀終不似真阮研書如貴胄失品次不復排突英賢王儀同書如晉安帝非不處尊位而都無神明殷均書如高麗人抗浪乃不有意氣而姿顏自足精味徐淮南書如南岡士大夫徒尚風軌然不寒乞陶隱居書如吳興小兒形狀未成長而骨體甚峭快吳拖書如新亭傖父一往似楊州人共語語便態出柳産書如深山道士見人便欲退縮曹喜書如經綸道士言不可強王右軍書字勢雄強如龍跳天門虎臥鳳閣故歷代寶之永以為訓蔡雍書骨氣洞達爽爽如有神力程曠平書如鴻鵠弄翅頡頏布置初雲之見白日蕭思話書如舞女低腰仙人嘯樹李鎮東書如芙蓉之出水文彩如鏤金桓玄書如快馬入陳隋人屈曲豈須文譜范懷均真書有分草書無功故知簡牘非易皇象書如韻音繞梁孤飛獨舞孔琳之書如散花空中流徽自得李巖之書如鏤金素月屈玉自照薄紹之書如龍遊在霄繾綣可愛秦獄吏程邈善大篆得罪始皇雲陽獄增減篆體志其名名其書自隸也扶風曹喜後漢人不知其官善篆及隸篆等少異李斯見重一時耶鍾司徒書字有十二種意外巧妙絶倫多奇崔子玉書如危峰阻日孤松單枝邯鄲淳書應規入矩方圓乃成師宜宮書如鵬翔未息翩翩而自逝梁鵠書如龍威虎震劍拔弩張張伯英書如武帝愛道憑虛欲仙衛恆書如插花舞女援鏡笑春索靖書如飄風忽舉鷙鳥乍飛鍾繇書如雲鶴遊天群鴻戲海行間茂密實亦難過耶淳化閣帖五
