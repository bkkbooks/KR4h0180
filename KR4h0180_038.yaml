body:
  text: 江淹詣建平王上書昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者以此也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加矜察下官本蓬戶桑樞之人布衣韋帶之士退不飾詩書以驚愚進不買名聲於天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賓備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顏色實佩荊卿黃金之賜竊感豫讓國士之分矣嘗欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之是以每一念來忽若有遺加以涉旬月迫季秋天光沉陰左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞君子之行矣其上則隱於簾肆之間臥於巖石之下次則結綬金馬之庭高議雲臺之上次則虜南越之君係單于之頸俱啓丹册並圖青史寧爭分寸之末競錐刀之利哉下官聞積毀銷金積讒磨骨遠則直生取疑於盜金近則伯魚被名於不義彼之二才猶或如是況在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至如下官當何言哉夫以魯連之智辭祿而不反接輿之賢行歌而忘歸子陵閉關於東越仲蔚杜門於西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯奇節之人燕趙悲歌之士乎方今聖歷欽明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義昭景飲醴而下官抱痛圓門含憤獄戶一物之微有足悲者仰惟大王少垂明白則梧丘之魂不愧於沉首鵠亭之鬼無恨於灰骨不任肝膽之切敬因執事以聞文選梁書江淹傳多末二語又南史五十九藝文類聚五十八建平王謝賜石硯等啓臣言奉敕賜石硯及法書五卷天旨又以臣書小進更使勤習敬閲籀篆側觀硯功張衛慚奇金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停煙墨永砥學玩仰結聖造伏銘私荷不任下情本集建平王謝玉環刀等啓奉敕賜玉環刀等五種珍器贐伏蒙猥降飾軼采朱跨影懸魄崑岡歸琛關山慚寶謹襲緹素以充握睇垂光既深銘佩更積不任下情本集建平王慶改號啓竊以皇衢永謐則玉曆惟禎國慶方夷則繩澤式茂故五鳳協年甘露應號況今道潤衍溢頌祉載繁嘉生蠲慶風雲瑞節既覯昭晨方鑄昌化延守一隅無以自屆不勝荒情本集建平王讓鎮南徐州刺史啓臣言臣誓惟殃釁頻瀉四折慊慊狂愚冀蒙哀弔而聖旨懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自幼稟分踰鼎貴秩高外州臣乏素能或所不任況在憂年必取黜辱特為開非常之恩借權製之義紊禮滅經實翦治本臣又能身祈命請一感天地躑躅表啓心容已靦猶疑大道之行墨縗不興孝治天下通喪獲遂陛下覆被仁明品物無漏豈於微臣獨不蠲鑒燋鯁在躬輒復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚魂識無主不勝殞越怵息之心本集蕭領軍讓司空并敦勸啓臣某言臣沿心之請丹識以傾詔旨沖挹便賜斷表伏聞當遣王人猥垂獎勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式瞻化曜昌輝連基政務事深崇替迹豫興衰故道富一時則風行明令才乏適權則山摧河泣既撓汨蒼祇將紊毀身國臣進退惟疑再三自顧實以陋情非忘寵極但畏軼超疲伍乃參鼎軸無德而貴豈敢偷存才怯任重物所不恕故弱識褊概頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而已哉將據致寇之悔取鑒於茲矣且皇華之命居上之鴻私鳳舉之招為下之殊榮國勳必書史不謬牘況臣連牧圉嶽董率職方既鑠近古垂耀中葉揆望揣實為泰已甚而乃復降朱輪之使方枉青册之勸寤寐悁灼諒無以任輒重素誠冒覬神照伏願皇靈特垂開愍賜停正台之職并免敦勸之使餘所榮忝誓不敢辭肅恭外屏祈回恩授則於臣慊款復為惠造不任憂戴匪惶之情本集蕭太尉子姪為領軍江州兗州豫州淮南黃門謝啓臣公言臣頻結崇寵亟延上爵休恩動俗烈榮振古鴻品清飾已藹金圖秀鼎號銘共茂瑤篆永言戚慮鑒寐殷心況乃秩洽朝門慶霑國珮弱息臣諱嶷映晃等文不昭典武不定功出內帷閫升降貂綬或振迹領候職贊禁錡或騰光江甸任鈞屏翼河兗衝要既濫北門之管淮豫險捍又謬西偏之寄兄子臣鸞忝守近畿嫡孫臣某載華省闥皆倏忽晷景頻煩升荷雖咸罄愚識恪居匪替豈足以少塞神渥裁酬皇眷囂黷一盈慚厲彌積談天之辨不能為臣陳辭雕龍之文無以為臣飾愧靜然肅念徘徊交集不任憂感沐浴之情本集被黜為吳興令辭箋詣建平王淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步修榥循高軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝於山東百姓亦已殊甚雖蓐螻蟻抵黃泉不足以塞惠而小人狼狽為鬼為蜮山淵所容衣劍不貸黥赭幽圄皆非報責仰遭大道之行草木勿踐輟鑊斂火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不戴天竊思伏皂九載齒録八年以春以秋且思且顧竟不能抑黑質揚赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由己作匪降自天猶沐造化餘靈宥以遐邑方蒙被霜露裹糧洲島鑿山楹為室永與黿鼉為群猶蹶者不忘起盲者不忘視況罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識答昔河濟荊吳必獲陪從京輔關轂長奉帷席德音在耳話言如昨淹乃梁昌自投東極晨鳥不飛遷骨何日一辭城濠旦夕就遠白雲在天山川間之眷然西顧涕下若屑本集到功曹參軍箋詣驃騎竟陵王竊惟明使君鉞下道耀神源德鑄靈極誕涵天聽資河照聖譽拂紘外芳激震中故衡梁孕秀璿機流品變瑤光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寶之文睇影而敻集青龍遺風之乘希光而遠至如民者蓋不足算所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏修短之術又慚啓塞之辨不能伏軾蹲衡驚燕趙之郊黃金橫帶馳淄澠之幣語默罕緒圓方靡樹謬以一氣之微邀百載之會躬奉英睿身蒙青雘故以潤厚纍璧恩重兼金不悟懸黎降景靈河瀉潤復獲執羈蘭陳迎笏桂序漏越之琴竊莊文之價缺齧之劍盜頃襄之名心羞秦媵志慮楚犢抱魄踊躍憂集如熏鐫感何日銘報焉期本集奏記詣南徐州新安王伏惟明公殿下列譽椒壁飛聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方斂影逃形匡坐編蓬之下遂遭煙露餘彩日月末光惟恩知泰變色薰心淹聞齊右既撫無待巴人之唱柏臺已搆寧俟不才之木淹幼乏鄉曲之譽長匱芹藻之德豈宜炫璞鄭氏獻鳳楚門哉願避職吏緩其召書本集到主簿日事詣右軍建平王淹乃庸人素非奇士既慚鄒魯儒生之德又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劍弋釣畎壑而身輕恩重猥奉末光枉白璧之惠降黑貂之私因茲感激未能自反負金羇於淮吳從後車於河楚竟不能曜丹雘騰英聲絶白雲負蒼梧至可知矣不謂咸池再暉瑤光重照開高天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一説之效齊王動色一劍之感趙王解衣孤心迥概有殞自天本集敕為朝賢答劉休範書昔媯道鼎昌干羽未能戢姬德昭宣長旌猶卷舒焚衣毀冕有自來矣皇宋靈武誕命聖道鬱宏三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黃旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟嶽降聖重耀函夏延禮璧臺訪道衢室平陽之后卷迹慚靈空同之君斂功謝德是以綵雲祥風之瑞布濩區中梯山棧火之俗款徼請吏跨商軼夏洗周滌漢道澤優衍猶不道封禪遐靈在天餘惠無泯主上文明金相穆然玉色履璧之禎獲圭之應著在紀歲仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡遠馭受話言必忠貞方肅之臣奉風聲必虔恭匪懈之士明時琴瑟鼎鉉之盛且被於寧世而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沭冠蓋於道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外關今朝無闕政頓構凌上之節室無嬖豎坐生莫大之舋鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁遠則吳楚見禽於一壁盤石之孽近則江荊面縛於小將此成敗蘭艾之鑒又亦君之所知也聞彼蟲飲鼠舞之異早見物徵河北隴上之謠已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黃頭駱驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天蓋世之略蕩海拔山之威任輔沛陳羽林鷁鵃露動龍驤精騎風驅然後六師雲起九軍星連霓旌外江虹艗中水金甲映平陸鐵馬照長原蹴南嶽而永慨瞰九派而懷恐伐罪弔民復驗於茲甫刑三千唯此為大僕才等不羈志瀝丹款故奏禍福行矣悵然袁褚劉蕭等疏本集報袁叔明書僕知之矣高皋為別執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去歲迫名茂才冬盡不獲有報引領於邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其奇者則以紫天為宇環海為池倮身大笑被髮行歌其次則堅坐崩岸僵臥深窟朝餐松屑夜誦仙經其下則辭榮城市退耕巖谷塞徑絶賓杜牆不出然者皆羞為西山之餓夫東國之黜臣而況其鄉黨乎或有社稷之士入而忘歸則爭論南宮之前衛主於邪伏身北闕之下納君於治至乃一説之奇驚畏左右一劍之功震栗鄰國夫能者唯橫議漢庭怒髮燕路且猶不數而況於鄰里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮遊學備聞士大夫言曰在國忠處家孝取與廉交友義故拂衣於梁齊之館抗手於楚趙之門且十年矣容貌不能動人智謀不足自遠竟慚君子之恩卒離飢寒之禍近親不言左右莫教涼秋陰陰獨立間館輕塵入戶飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子長為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俯首求衣斂眉寄食耳若十口之隸去於飢寒從疾舊里斥歸故鄉箕坐高視舉酒極望雖五侯交書群公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立於孤洲蒼葭變於河曲寂然淵視憂心辭矣獨念賢明蚤世英華殂落僕亦何人以堪久長一旦松柏被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也本集與交友論隱書淹者海濱窟穴弋釣為伍自度非奇力異才不足聞見於諸侯每承梁伯鸞臥於會稽之墅高伯達坐於華陰之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史曆巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋絃者有五一則體本疲緩臥不肯起二則人間應修酷懶作書三則賓客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞鶩之有毛不能得鸞鳳之光采矣況今年已三十白髮雜生長夜輾轉亂憂非一以溘至之命如星殞天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥默既信神農服食之言久固天竺道士之説守清淨煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須陰望在五畝之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峨嵋度流沙餐金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉本集雜體詩序夫楚謠漢風既非一骨魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宮角為音靡曼之態不極故娥眉詎同貌而俱動於魄芳草寧共氣而皆悅於魂不其然歟至於世之諸賢各滯所迷莫不論甘則忌辛好丹則非素豈所謂通方廣恕好遠兼愛者哉乃及公幹仲宣之論家有曲直安仁士衡之評人立矯抗況復殊於此者乎又貴遠賤近人之常情重耳輕目俗之恆蔽是以邯鄲託曲於李奇士季假論於嗣宗此其效也然五言之興諒非敻古但關西鄴下既以罕同河外江南頗為異法故玄黃經緯之辨金碧浮沉之殊僕以為亦各具美兼善而已今作三十首詩斆其文體雖不足品藻淵流庶亦無乖商攉云爾本集四文選三十一詩紀七十六又略見初學記二十一草木頌十五首并序僕一命之微遭萬代之幸不能鐫心礪骨以報所事擢翼驤首自致丹梯爰乃恭承嘉惠守職閩中且僕生人之樂久已盡矣所愛兩株樹十莖草之間耳今所鑿處前峻山以蔽日後幽晦以多阻飢猿搜索石瀨戔戔庭中有故池水常決雖無魚梁釣臺處處可坐而葉饒冬榮花有夏色茲赤縣之東南乎何其奇異也結莖吐秀數千餘類心所憐者十有五族焉各為一頌以寫勞魂本集金荊江南之山連障連天既抱紫霞亦漱絳煙金荊嘉樹涵露宅仙姱節詎及幽意誰傳本集藝文類聚八十九相思竦枝碧澗臥根石林日月斷色霧雨恆陰緑秀八照丹實四臨公子不至山客徒尋本集豫章伊南有材匪桂匪椒下貫金壤上籠赤霄盤薄廣結捎瑟曾喬七年乃識非曰終朝本集栟櫚異木之生疑竹疑草攢叢石徑森蓯山道煙岫相珍雲壑共寶不華不縟可避工巧本集藝文類聚八十九杉桐梓舊麗松栝稱奇焉如茲品獨秀青崖群木斂望雜草不窺長入煙氣永參鸞螭本集藝文類聚八十九柳木貴冬榮柳實寒色停黛峰頂𢮿翠石側碧葉菴藹頳柯翕赩方陋筠檟遠笑荊棘本集藝文類聚八十九楊梅寶跨荔枝芳軼木蘭懷蕊挺實涵英糅丹鏡日繡壑照霞綺巒為我羽翼委君玉盤本集藝文類聚八十七御覽九百七十二山桃惟園有實惟山有叢丹花擎露紫榮繞風引霧如電映煙成虹伊春之秀乃華之宗本集藝文類聚八十六山中石榴美木艷樹誰望誰待縹葉翠萼紅華絳采照烈泉石芬披山海奇麗不移霜雪不改本集藝文類聚八十六木蓮迸采泉壑騰光淵丘緗麗碧巘紅艷桂洲山人結侶靈俗共遊時至不採為子淹留本集石上菖蒲藥實靈品爰乃輔性卻痾衛福蠲邪養正縹色外妍金光內映草經所珍仙圖是詠本集藝文類聚八十一黃連黃連上草丹沙之次禦孽辟妖長靈久視驂龍行天馴鳳匝地鴻飛以儀順道則利本集藝文類聚八十九太觀本草七薯蕷華不可炫葉非足憐微根儻餌棄劍為仙黃金共鑄青雘爭妍君謂無妄我驗衡山本集藝文類聚八十一杜若山中杜若嘉爾翠質不奇不俗載華載實同銜夕露共烘朝日夷險無二沈冥如一本集藝文類聚八十一藿香桂以過烈麝以太芬摧阻天壽夭折人文詎及藿香微馥微薰攝靈百仞養氣青氛本集藝文類聚八十一作青雲
