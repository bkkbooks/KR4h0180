body:
  text: 後梁宣帝愍時賦并序于謹平梁之後闔城長幼被虜入關又失襄陽故地乃日悢不用尹德毅言以致于是又見邑居殘毀于戈日尋恥威略不振常懷憤懣乃著愍時賦以見其意詞曰嗟余命之殊薄實賦運之逢屯既殷憂而彌歲亦坎壈而相鄰晝營營而至晚夜耿耿而通晨望否極而反泰何杳杳而無津悲晉璽之遷趙痛漢鼎之移新無田范之明略愧夷齊之得仁遂胡顏而苟免謂小屈而或伸豈妖沴之無已何國步之長淪恨少生而怯弱本無志于爪牙謝兩章之雄勇恧二策之英華豈三石于鄠杜異五馬于琅邪直受性而好善類蓬生之在麻冀無咎而霑慶庶保靜而蠲邪何昊窮之不惠值上帝之紆奢神州鞫為茂草赤縣遶于長蛇徒仰天而太息空撫襟而咨嗟伊古人之有懷尚或感于知己況華萼聯于霄極寵渥流于無已或小善而必襃時片言而見美昔待罪于禹州歷三攷而見紀獲免戾于明時遂超隆于宗子始解印于稽山即驅傳千襄水彼南陽之舊國實天漢之嘉祉既川嶽之形勢復龍躍之基址此首賞之謬及謂維城之足恃值諸侯之攜貳遂留滯于楚川等句踐之絕望同重耳之終焉望南枝而灑泣或東顧而潺湲歸歟之情何極首丘之思邈然忽值魏師師入討于彼南荊既兵車之赫赫俄一鼓而淩城同寤生之舍許等小白之全邢伊社稷之不泯實有感于生靈伊吾人之固陋本漂泊于流萍忽沈滯于茲土復歲月而無成昔千乘之畿甸今七里而盤縈寡田邑而可賦闕丘井而求兵無河內之資峙同滎陽之未平夜騷騷而擊柝晝孑孑而揚旌烽連雲而迥照馬伏櫪而悲鳴既有懷于斯日亦焉得而云寍彼雲夢之舊都乃標奇于昔者驗往記以瞻今何名高而實寡寂寥井邑荒涼原野徒揄揚于宋玉空嗟咨于司馬南方卑而歎屈長沙溼而悲賈余國家之俟匡庶興周而祀夏忽縈憂于此屈豈年華之天假加以狗盜鼠竊蜂蠆狐狸群圉隸而為寇聚藏獲而成師窺臨津渚跋扈江湄屢征肈于殷歲頻戰起于軒時有扈興于夏典采芑著于周詩方叔振于蠻貊伯禽捷于淮夷在逋穢其能幾會斬馘而搴旗彼積惡之必稔豈天靈之可欺交川路之云擁理惆悵而未怡周書蕭詧傳文苑英華一百二十九遊七山寺賦此山川之寥廓時天高而氣靜路閒曠而清華地幽棲而特挺窮浙右之標絕極宇中之勝境承興序而陟涉聊盤桓而騰騁盡登臨之雅致悅諠囂之暫屏因茲連鑣結駟並幔方舟萬騎齊列千楫爭浮皆東南之俊異並禹穴之琳球差池集侶容與攜儔巷無服馬路寡遺輈窮周章而歷覽盡娛翫而遨遊爾乃傍林橫出輕舠上泝歷秦王之舊陌綠越地之昔路望塗山而斜繞逕南湖而迴渡連天台之華嶺引若耶之長注乍汛瀁而瞻望或陵峰而一顧于是歷樂休而南上升法華而望西有磕磕之奔澗復亹亹之長溪既皎潔而如鏡且見底而無泥途嶮峭而巉絕路登陟而始梯既攀藤而挽葛亦資伴而相提窮羊腸之詰屈極馬嶺之高低霧昏昏而漫漫風䫻䫻而淒淒瞻洪川其如帶望巨海其如珪執玉帛于茲地會諸侯而臥稽想疏柯之茂葉憶大骨之昏迷傳盛美于斯岳播遺範于氓黎既迺瞰往賢之舊跡美高尚之餘風踐逵莫之蕪沒撥蓁芿之彌蒙名岳峨而峙立峻谷杳而虛沖春林漂而皆碧秋沼淨其如空既連緜而相接兼隱軫而無窮信英奇之攸止實翔集之所崇傍高巒而建剎亦帶壟而成宮神靈更其肹蠁仙聖互其交通巖雰霏而起霧樹布濩而抽叢嘉卉生其前後善草植其西東瞻朱扉之赫奕望寶殿之玲瓏擬大林之精舍等重閣之講堂既爽塏之禪宇亦顯敝之華房跨曲澗而為室繞紆岊而修牆夕雲生于牕牖朝日照于簷梁諒隙曲而成麗蓋照景而生光流清梵之宛轉響桴磬之鏘鏘構造精密華麗無方清流四繞吐溜悠長邐迤闈閣峻絕階隍水碓侔于金谷飛樓似于建章其徒眾則乍遊乍處或賢或聖並有志于頭陀俱勤心于苦行競假寐而誦習咸夙興而虔敬識苦空之迅流惜朝陰之奔競潛深窟而學六通隱閒蕪而修八正或燒體而為功或灰身而入定熏名香之氛氳或飛錫而相映或振麈而高談或閒居而坐聽禪眾疑于漆木智士同于懸鏡既釋教之興華乃法輪之宣盛寺既憑山而構造山亦因寺而有七蓋靈瑞之所臻亦奇士之所出產龍劍之遺溪遊鹿機之餘術謝鳳來而容與鄭風反而蕭飋既清㵎之漣漪亦飛流之涌溢奇樹蓊而成林珍果榮而非一植山海之雙榴種丹盧之兩橘梅花皎而似霜黃柑壯其如日或曄曄而夏開也離離而冬實山多寶玩地出瓊珍金玉生其陽琰石出其陰神篢喦喦而獨立仙的皎皎而孤臨孰知歲之豐儉覩玄白而皆諶刻石記于嬴德披圖悟于禹心懸崖百仞擢榦千尋岧嶢兮闊達𡻭峗兮嶔崟樹修聳而巖峻泉流激而水深仰瞻增其隱隱側朓眺覩其沈沈眇然兮無際邈爾兮無邊遠山崔嵬而閒出近樹寵嵸而相牽巖將頹而未墮峰入漢而猶懸望蟬聯而蔽日視惝恍而連天有石帆之異狀擬瀑布之飛泉實逢巖而聚霧乃觸石而成煙既嵯峨而蔭映亦嶢屼而阡緜既遠控于江海兼近接于村田反瞰城邑傍眺市鄽稱神州之鎮嶺實天下之名川至若蓬萊遊于聖迹巫岫表于神仙衡陽聞于夏貢嵩岳重于周篇曾何比麗詎此同妍復有標奇神井萬載澄渟汲之不竭添之不盈雖頻撓而不濁徒屢攪而終清涉隆冬而溫燠經歊暑而泠泠異成都之飛火寍疏勒之表誠匹醴泉之蠲疾同淄水之鑒形亦有孤漂道士焦里夫人獨居味道寂絕朋賓餐霞永日靜坐千春衢無行跡路產荊榛既勤劬而向道亦蕭灑而忘塵或逍遙而諷詠或擁膝而長吟同董生之垂讖學梁子之明箴將松喬而共侶與嚴衛而相親其林藪彌密羽族爭歸猨連臂而下飲鳥比翼而群飛鴻鵠集而相映白鷴皛而生輝拂霜毛之奕奕鼓素翮之霏霏兼有奇禽猛獸偃息溪圻虎懷仁而不害熊隱木而生肥巨象數仞雄虵十圍麀鹿易附狎兔俱依同彭鏗之仙室異海鳥之知機藥卉叢生消痾駐老地出長齡墟多壽考似南山之溪谷匹并中之埋寶送劉五耆何殊四皓復有牛膝雞腸雀頭燕草甘菊辛夷苦參酸棗紫苑赤箭黃菁白藁天門地骨肉芝石腦神農是嘗仙經是造白兔服而通靈鹿皮餌而得道其果則有木瓜木棗楊桃楊梅朱橘冬茂黃葍秋開楂梨並壯柿柰爭瓌枳椇列植而為藪懸鉤觸草而徘徊林檎侔于萍實甘棠擬于帝臺紅梅蘡薁車李胡頹綠探冬獻紫芋秋來半夏成圃春就群裁枇杷梨豆椎栗兼該或炫炫之丹實或靡靡之青荄禦疾風而彌豔中嚴霜而不摧既蓊鬱之梧桐亦檀欒之修竹篠箭亂其形類筋桂異其品族映檐牖而交加繞房廊而郁毓抽葉陰于清泉結根攢于幽谷靈木之所自生瑞鳥之所棲宿實散賞之佳地信開心而醒目至如涼秋九月百卉飄零氣淒淒而恆勁風颯颯而常生秋蟬哂于南壟塞鳥吟于北庭蟋蟀哀嘶而遠聞狐猿叫嘯以騰聲鴻雁嗈嗈而夜響鵾雞啁哳而悲鳴增逸民之放曠動遊士之滯情咸有志于獨往俱棲心于濯纓信達人之良會蓋可伸其遊矚故孝先往而成真慶緒經而離俗憑怪石而為枕因滄浪而洗足蓋往賢之所同亦先儒之高學余宿昔之心期常有懷于遐邈屢徘徊于閬圃頻留連于名嶽念家國之隆恩緩獨往之遺躅欲抽簪而未從聊寄美于斯曲廣弘明集二十九上圍棋賦引如征鴻赴沼布若群鵲依枝類林麓之隱隱匹星漢之離離蜂起百塗從橫萬制或無厭而反失或先羸而後濟蓺文類聚七十四櫻桃賦推櫻桃之為桃先百果而含榮既離離而春就乍苒苒而冬迎異群龍之无首垂牢器之晚成鳥纔食而便墮雨薄灑而皆零未觀紅顏之實空有薦廟之名等橘柚于簷戶匹諸薦乎中庭異梧桐之棲鳳愧綠竹之恆貞豈復論其美惡且聳榦乎前櫺葉繁抽而掩日枝長弱而風生且得蔽乎羲赫實當暑之淒清初學記二十八臨雍州下教昔之善為政者不獨師所見藉聽眾賢則所聞自遠資鑒外物故在矚致明是以龐參恤民蓋訪言于高逸馬援居政每責成于掾史王沈爰君厚賞呂虔功有所由故能顯美政于當年流芳塵于後代吾以陋識來牧盛藩每慮德不被民政道或紊中宵拊枕對案忘飢思納良謨以匡弗逮雍州部內有不便乎民不利于政長吏貪殘戍將懦弱關市恣其裒刻豪猾多所苞藏竝密以名聞當加釐正若刺史治道之要弛張未允循酷乖理任用違才或愛狎邪佞或斥廢忠謇彌思啟告用袪未悟鹽梅舟楫允屬良規苦口惡石想勿余隱并廣示鄉閭知其款意周書蕭譽傳連珠常聞盈虛之道雖修平而必陂損益之由在至象而無蠲是以謂地之厚而東南缺唯天為大而西北懸常聞山有藏玉則卉草常榮林有猛獸則叢枝莫採是以漢儀重見皇王之跡有真周禮猶存龜蒙之田無改蓺文類聚五十七文苑英華七百七十一臨終上隋文帝表臣以庸闇曲荷天慈寵冠外藩思踰連山爰及子女尚主婚王每願躬擐甲冑身先士卒埽蕩逋寇上報明時而攝生乖舛遽罹痾疾屬纊在辰顧陰待謝長違聖世感戀鳴咽遺嗣孤藐特乞降慈伏願聖躬與山岳同固皇基等天日俱永臣雖九泉實無遺恨并獻所服金裝劍隋書蕭巋傳與釋智顗書遠欽高風未獲展侍憮然西顧以日易年承遊止玉泉創構坊宇名僧雲會問道遠集山林佳勝有助禪悅即事倏然風雲永歎涼暑珍嗇續附承修神足今還敢申訊謁信驛有會方願祗承蕭琮和南釋藏起字四號國清百錄四車賦鑄金磨玉之麗凝土剡木之奇體眾術而特妙未若作車而載馳爾其車也名稱合于星辰圓方象乎天地夏言以庸之服周曰聚焉之器制度不以陋移規矩不以飾異古今貴其同軌華夷獲其兼利爾其利也天子以郊祀田伐諸侯以朝騁會盟庶人以商農工賈夷狄以致蓄遷生爾其作也均輕重而攻材正陰陽而斲木既中正而合剖亦而勢而審曲候離婁之督繩須公輸而削墨布骸服之有定施瓜牙之不忒既涉用于牛馬亦受名于羊鹿爾其容也侔蓋樹之獨立似高雲之出囐獨映水也如舞鸞之對鏡眾行陛也若翔鴻之赴遠聽長響之轔轔望遙儀之婉婉信有美兮宜比興徒欲貌兮不能辨及其駕也堅珊瑚之駐引絕群之駭既絲靷之縈頭亦銅鉤而瑩角始向軛而龍轉就入轅而獸躍或鼽𪖐而鳴鼻或參差而動腳咆哮歇轉鬱快隕閣見輪陰之翻亂視帶影之飛泊及其乘也或方憂虐暑炎氣歊烈浮幰動以來風輕紗飛而去熱纖埃著而即墜煩氣衝而受歇或固陰沍寒祁嚴凜厲複帷下而前屏重檐垂而後蔽霜露侵而靡及風飆激而不戾或油雲雨霈中逵半恢宏宇宙而雷奔杼柚割而去衍被洪流染而自落散水湔而不霑初學記二十五鍾律議易以三百六十策當朞之日此律厤之數也淮南子云一律而生五音十二律而為六十音因而六之故三百六十音以當一歲之日律厤之數天地之道也此則自古而然矣重乃依淮南本數用京房之術求之得三百六十律各因月之本律以為一部以一部律數為母以一中氣所有日為子以母命子隨所多少各一律所建日辰分數也以之分配七音則建日冬至之聲黃鍾為宮太簇為商林鍾為徵南呂為羽姑洗為角應鍾為變宮蕤賓為變徵五音七聲于斯和備其次日建律皆依次類運行當日者各自為宮而商徵亦以次從以攷聲徵氣辨識時序萬類所宜各順其節自黃鍾終于壯進一百五十律皆三分損一以下生自依行終于億兆二百九律皆三分益一以上生唯安運一律為終不生其收皆取黃鍾之實十七萬七千一百四十七為本以九三為法各除其實得寸分及小分餘皆委之即各共律之長也修其部律則上生下生宮徵之次也今略其名次云隋書律厤志上說梁王詧臣聞人主之行與匹夫不同匹夫者飾小行競小廉目取名譽人主者定天下安社稷目成大功今魏虜貪惏罔顧弔民伐罪之義必欲肆其殘忍多所誅夷俘囚士庶竝為軍實然此等戚屬咸在江東念其充餌豺狼見拘異域痛心疾首何日能忘殿下方清宇宙紹茲鴻緒悠悠之人不可門到戶說其塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讎也誰與為國但魏之精銳盡萃于此犒師之禮非無故事若殿下為設享會因請于謹等為歡彼無我虞當相率而至預伏武士因而斃之分命果毅掩其營壘斬馘逋醜俾無遺噍江陵百姓撫而安之文武官寮隨即詮授既荷更生之惠孰不忻戴聖明魏人懾息未敢送死王僧辯之徒折𥳑可致然後朝服濟江入踐皇極纘堯復禹萬世一時晷刻之閒大功可立古人云天與不取反受其咎時至不行反受其殃願殿下恢弘遠略勿懷匹夫之行周書蕭詧傳初江陵平詧將尹德毅說詧云云不從既而闔城長幼被虜入關又失襄陽之地詧乃追悔䱉表臣䱉言伏見除書以臣為糝蒸將軍油蒸校尉臛州刺史脯腊如故者肅承明命灰身屏息臨憑鼎鑊俯仰兢懼臣聞高沙走姬非有意于綺羅白鮪女兒豈期心于珠翠臣美愧夏鱣味慚冬鯉常恐鮐腹之譏懼貽鱉巖之誚是以漱流河底枕石泥中不意高賞殊宏曲蒙釣拔遂得起昇綺席忝預玉盤爰廁玳筵猥煩象筋澤覃紫腴恩加黃腹方當名薑勸桂紆蘇佩欓輕瓢纔動則樞槊如雲濃斗嘗停則蘭膏成列婉轉綠齏之中逍遙朱脣之內銜恩噬澤九殞弗辭不任屏營之至謹到銅鐺門奉表以聞詔荅省表是公卿池沼縉紳披渠俊乂穿蒲入藻肥滑系彰正膺茲選無勞謝也太平廣記臣䱇言伏見除書以臣為粽熬將軍油蒸校尉臛州刺史脯腊如故肅承將命含灰屏息憑籠臨鼎載兢載惕臣美愧夏鱣味漸冬鯉常懷鮐服之誚每懼鱉巖之譏是以漱流湖底枕石泥中不意高賞殊私曲蒙鈞拔遂得超升綺席忝預玉盤遠廁玳筵猥頒象箸澤潭紫䐟恩加黃腹方當鳴姜動椒紆蘇佩欓輕軱纔動則樞盤如烟濃汁暫停則蘭肴成列宛轉綠齏之中逍遙朱唇之內銜恩噬澤九殞弗辭不任屏營之誠謹列銅鎗門奉表以聞詔荅曰省表具知卿池沼搢紳陂渠俊乂穿蒲入荇肥滑有聞允堪茲選無勞謝也酉陽雜俎作韋琳䱇表少廣記四語祭夫文維梁大同五年新婦謹薦少牢于徐府君之靈曰惟君德咸禮智才兼文雅學比由成辨同河瀉明經擢秀光朝振野調逸許中聲高洛下含潘度陸超鍾邁賈二儀既肇判合始分𥳑賢依德乃隸夫君外治徒舉內佐無聞幸移蓬性頗習蘭薰式傳琴瑟相酬典墳輔仁難驗神情易促雹碎春紅霜彫夏綠躬奉正衾親觀啟足一見無期百身何贖嗚呼哀哉生死雖殊情親猶一敢遵先好手調薑橘素俎空乾奠觴徒溢昔奉齊眉異于今日從軍暫別且思樓中薄游未反尚比飛蓬如當永訣永痛無窮百年何幾泉穴方同蓺文類聚三十八
