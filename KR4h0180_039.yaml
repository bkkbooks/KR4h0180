body:
  text: 江淹雲山讚四首并序壁上有雜畫皆作山水好勢仙者五六雲氣生焉悵然會意題為小讚云王太子子喬好輕舉不待煉銀丹控鶴去窈窕學鳳對巑岏山無一春草谷有千年蘭雲衣不躑躅龍駕何時還陰長生陰君惜靈骨圭璧詎為寶日夜名山側果得金丹道憂傷永不至光顏如碧草若度西海時致意三青鳥白雲紫煙世不覿赤鱗庖所捐白雲亦海外葐蒀起三山蕭瑟玉池上容裔帝臺前欲知青都裏乘此乃登天秦女青琴既曠世緑珠亦絶群猶不及秦女十五乘綵雲璧質人不見瓊光俗詎聞願使洛靈往為我道奇芬竝本集藝文類聚七十八銅劍讚并序永明初始造舊宮鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劍長尺五寸余既借看歎其古異客有謂余曰古時乃以銅為兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿既欲知輒具言之余案山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劍也越絶書曰赤墐之山破而出錫若邪之溪涸而出銅歐冶鑄以為純鉤之劍又汲冢中得一銅劍長三尺五及今所記干將者亦皆非鐵明古者以銅錫為兵器也周書稱穆王時征犬戎得昆吾之劍火浣布長尺有咫又有鍊銅赤刀割玉如泥焉又左傳僖公十八年鄭伯始朝於楚楚賜之金既而悔之盟曰無以鑄兵故以鑄三鐘杜預注云楚金利故也古者以銅為兵故禹貢云荊揚貢金三品余以為古者語質而難解今者語文而易了獨詩云元龜象齒其實象牙也書云厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐵赤金是銅黃金是金黃金可為寶赤金可為兵黑金可為器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問於張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅為柱質君可發而用之於是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎於荊山之下于昆吾氏之墟白若甘攙之地圖其山川奇怪以形于鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎既成定之國都桀有昏德鼎遷於商殷紂暴虐鼎遷於周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見於彭城二十七年始皇東遊大發徒出之而不能得焉後漢武帝賓禮百神于汾陰得大鼎時人以為九鼎其詳不可得而審也且荊軻刺秦王之日匕首擊銅柱銅柱火出則古者非直以銅為匕首亦以為殿柱也且始皇之世長狄十二見於臨洮身長三丈足跡六尺於是始皇斂天下之兵鑄而象之故西京賦云高門有閌列坐金狄是也又造阿房之宮其門悉用鎡石鎡石吸鐵以防外兵之入焉以此推之明知春秋迄於戰國戰國至於秦時攻爭紛亂兵革互興銅既不充給故以鐵足之鑄銅既難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年歲甚一歲漸染流遷遂成風俗所以鐵工比肩而銅工稍絶二漢之世逾見其微及漢建安二十四年魏文帝為太子時鑄三寶刀二匕首天下百鍊之精利而悉是鑄鐵不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絶余謂不復能鑄銅者正當不能使利如霜雪光如雲霞陸斬犀兜水斷蛟龍豈復不能鑄銅爐鋺燈耶然今太極殿前兩大銅鏡即周景王鑄也製作精巧獨絶晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余為吳興令鑿池又獲銅箭鏑數十枚時有人復於彼山中伐木得銅斧一口古銅鑄為兵豈為一據故備言其詳以發子之蒙矣古貴銅賤鐵非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳧之流扁諸之劍三盤郢魚腸之劍在焉秦始皇冢亦以銅槨水銀為江河關東賊發之至銅槨而取銅深大不可多得因此穴墓漢思王冢時奢侈皆生葬取愛幸奴婢蓄穀為銅窗以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然猶自大奢大富大盛或傾一國之財或竭一家之寶或爭為宏麗或競相高尚前漢奢於後漢魏時富於晉世中原既夷至於江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木稱兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法既絶亦有銅釘銅釘之體皆如今柘釘形也銅釘既滑多被發掘自義熙以來乃以柘代銅爰及明器之屬亦多減省必不得已乃用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設既由貧富之懸兼以避患之及耳故為此讚以明古今銅鐵之兵刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅為兵幾年天生五才實此為先既古既曩誰測誰傳紛綸百代事無不異況乃金鐵國之利器風胡專精歐冶妙思於昔則出於今則祕聞之釋經萬物淡薄在古必厚在今必惡徒侈徒異徒鏟徒削聊舉一概以明鴻略本集袁友人傳友人袁炳字叔明陳郡陽夏人其人天下之士幼有異才學無不覽文章俶儻清淡出一時任心觀書不為章句之學其篤行則信義惠和意罄如也常念蔭松柏詠詩書志氣跌宕不與俗人交俯眉暫仕歷國常侍員外郎府功曹臨湘令粟之入者悉散以贍親其為節也如此數百年未有此人焉至乃好妙賞文獨絶於世也又撰晉史奇功未遂不幸卒官春秋二十有八與余有青雲之交非直銜杯酒而已嗟乎斯才也斯命也天之報施善人何如哉何如哉本集無為論吾曾回向正覺歸依福田友人勸吾仕吾志不改故著無為論焉有奕葉公子者聯蟬七代冠冕組望多素紈黼衣繡裳負長劍而耿耿佩鳴玉而鏘鏘時遊稷下或客於梁聞英雄而豹變聽利害以龍驤乃動朱履而馳寶馬振玉勒而曜金羈之無為先生之門問曰先生智德光融嵩華無得以方其峻道義清遠溟海不足以喻其深無學不窺無事不達容儀閒靜言笑溫雅至如釋迦三藏之典李君道德之書宣尼六藝之文百氏兼該之術靡不詳其津要而採托沖玄煥乎若睹於鏡中炳乎若明於掌內余聞天地之大德曰生何以聚人曰財是故老聃以為柱史莊周以為園吏東方持戟而不倦尼父執鞭而不恥實萬古之師範一時之高士先生嘉遁卷迹養德不仕乃列子之所待非通天下之至理雖江海以為榮實縉紳之所鄙先生攸爾笑而應之曰富之與貴誰不欲哉乃運而不通也夫忠孝者國家之急務也申生伍員不得志也懷道抱德玄風之所尚揚雄東方其職未高也其大學者不過儒墨亦栖栖遑遑多有不遂也子所引之士者情雖欲之志不行也憂喜不移其情故可為道者也過此已往焉足言哉吾聞大人降迹廣樹慈悲破生死之樊籠登涅槃之彼岸闡三乘以誘物去一相以歸真有智者不見其去來有心者莫知其終始使得湛然常住永絶殊塗無變無遷長祛百慮恬然養神以安志為業故使自天祐之吉無不利舒卷隨取進退自然遁逸無悶幽居永貞亦何榮乎亦何鄙乎子其得之吾何失之塵內方外於是乎著公子恧然而有慚德逡巡而退本集廣宏明集二十九下齊太祖高皇帝誄日月鬱華風雲黯色傷動紫微悲匝璇極嗚呼哀哉粵夏四月辛卯將遷座于泰安陵龍鑾既整羽衛以陳深酸舊物掩咽故臣嗣皇帝永訣丹掖叫號青墀攀神光之一絶慟遠邇之何期弓劍有慕纂德寫辭僉曰若稽古聖璿圖靈鏡星樞發祥電光啓命誕惟弱齡惠志聰情如金如璧爰秀爰英於鑠冠歲騰華流藝允文允武克明克睿聿尚登學嚴道尊師宣散五禮優游六詩上炫舊滯旁鏡前疑才罄艷采筆盡麗辭在友斯悌于親伊孝儉泰共色夷阻一貌遊情協矩縱心蹈教鄉術式慕州閭是效業優登仕先哲攸懋矧乃寥廓淵規邃構官府天地舟輿宇宙龍靜鳳戢斂奇掩秀昔在帝劉王室放命狡焉僞誕晦朔陵正鋒車北軼爟火南盛太祖時乘爰茲發迹塞井滅勳夷竈龕敵賞鏤王圖功蕤帝冊乃厲中葉天未斂難兵百袁曹禍十楚漢吳地前崩越壤首亂街號耀盛火列金斷聚甲如陵獻俘為觀北楚倔強曾未屈膝雲屯被野魚麗亘日廟勇既消國圖方匱神冊天開雄略世出凶劍鱗沈醜戈羽逸隻騎不返踦輪無匹厥庸戾止雜珮委他榮鬱閶闔寵重山河皇彝有文朝采方藹頻煩金紐左右緹蓋毗戎肅禁參輦侍旆譽馥區中道薆氓外河濟國險淮泗邦塵要藩重設匪賢則親亦既推軷擁土庇民聲稜絶俗威贍殊鄰宋主陵遐紫殿遏密話言之詔貽在英粹寅亮大寶敷綸妙祕世識機鑒物宗淵懿無敻匪練靡奧不洎三階既馴五精惟至彭蠡九江地盡襟製亦有劉範衣纓是絶躍馬山岫泛舟河澨縞鏑星流紅旗電結鴆翼競扇豺牙爭礪禍纏紫禁兵交丹衛瑤祀若旍金扆如綴朝野傾儀咸歸上德實賴至公瀉家提國懷險實泰襄危必克機簉朝旦功定曛黑妙物更配具章重則深居撝外遙棲綿默高秩方臻元禮有序王曰念哉輝寵是與職褒宮閣任卷文武飾華麗貂縈金疊組宏猷溢俗曾芬冠古憬彼朱方亦惟宗秩陰圖食昴潛謀貫日征輪未誓偏旗銜律原燎既寂世囂伊謐爰崇爰貴以望以實鴈縣告靜象郡無虞杳鬱遠域清麗瓊都國填氓負朝委事虛實翳哲相嶽曜神居功美既損道富去益再紐契訓重匡禹迹方同范張濯纓汾射散簪山郊解珮松石頳霞拂朝蒼煙懵夕韻屬玄經恩流金液靈厭霸德少帝告釁滅慈滅養抵仁抵信枉獄炎爐淫刑霜刃刲忠翦義樊稚斫櫬惵惵萬氓曰怨曰震妖霓將崩災裂昊蒼況乃鼎國資滌資匡臨朝闡命遏昏立綱事綿毗漢義締翼商既綏地職亦懋天工權輿典緯俾作司空黼黻雕戈祐宇升庸徒賜先袞爰永渥沖實曰驃騎卷迹辭功寰㝢睦政畿甸綸風沈氏滔天勃逆舊楚氣蹂黃池志轢柏舉裂禮紊度毀經棄序黑騎黟山朱旗赬渚短兵相接長鎩為群皓如海岸矗似蒸雲合乃霧激離則霰分荊國既軼郢縣方焚袁劉二戾猋馳煒發聯謀制外儲兵襲內釁激瓊殿勢崩金闕志乘玄璽圖矯祕鉞鴻妖逝星高祲棄月惟時諸侯上脫下競圖服淆蕩實綴仁聖輝耀國靈導揚主命曾規近晣深謨遠鏡左輪朱赭表裏斯定七德飾歌九功綷詠乃陟上鉉寵文方輝誕錫有秩綵吹旌旗贊政瑤光翊教太微實曰太傅爰登相國緝氓以禮綜祗以德景福咸湊芳猷允塞羽泳式造紘縣是則金湯無險軌書攸同迥迥寵迹窈窈睿功寶圭黛壤俾王于東絢冊是敷懋物既崇設業設虡丹懸碧鏞於穆顯相黎元時雍冰州炎徼來獻其賝鴈海龍關亦柔好音梁黿棧鼉越險浮深遠戎皆覲上靈必臨山吐石青野降蜜露瑞芝麗草珍柯爛樹人崩俗締玄緯幽數眷此妙德跂我王度簉滯炎旻既變至公萎蕤媯華太祖受終大宋有順高撝萬邦容豫慶雲遊衍南風正服寶位圓光玉繩御繡懷古負黼夙興丘礙必靜淵漪咸澄勛扆有作黔牗其義矜卑廣慈合賤兼愛綴機剟賊輕章削罰迹去繁奓情歸素一軒靡龍刻楹無丹密越賤申椒楚輟靈橘陵寢起邑池藻誰縣遙館罕御離房空薦惇教路宮淹神正殿斟酌信義左右律禮瑩彼皇維燁茲國體胄業既樹璧流方啓漢求金岫吳寶銅塹寧若睿德讓駟卻劍實才為貴唯功是念火職咸允雲官亦熙既皋乃益匪稷伊夔無觖巡風寧俟辨詩玉燭調文玄英最節乘山呈瑞航海歸闕不曠景冊靡空歲月受緯機衡兼甄書史孫韓各辨莊墨異理昭政往藹洗鑠前軌逍遙星斗徙倚涼雲春飆方舞秋鴻初分式謠式詠載績載文邈哉我后淪泳賢聖罄品作號盡物歸政蒼黎汰歡玄靈刷慶永戩嘉祉方寅景命締詳有文䫻沛將掩理昧人詖道懸世險敻略遺圖忌華徇儉文暗陳几翌明告漸蜆鷸鬭食日月朏精矧在乘輿宇拆宙傾祲纏鸞掖悲赴紫扃去璇臺之照襲珠殯之冥嗚呼哀哉帷宮低景輦路巇光惻柏門之黯黯泣松帳之茫茫上宮劈而詔御咽群后慕而侍衛傷攢靈既儼遠日以筮鬱鬯既奠龍酹已撤素月夜橫翠煙曉結摐虛金而下欷吟空簫而增絶嗚呼哀哉於是颯天駕而從綺輿澀神行而撫文輦傍建春而南蹕徑宣陽而東踐尚葐蒀而未散乍眇默而不轉睇千乘之共啜盼萬騎之相泫嗟魏后之戀譙惻漢主之懷沛辭金陵之𦷁義降雲陽之杳藹風奇響而駐軒煙異色而低旆怨街邑之綵驂弔原野之縞蓋挽夫愴而征馬凝痛縈盈其如帶嗚呼哀哉復林油雲重山減日御房清凄神路冥謐昭徒肅纛幽祗竦蹕攀光灑慟臨泉澍泗璪座長嚴雕宮永閟寂帳寂兮寂已遠夜釭夜兮夜何邃嗚呼哀哉本集宋故尚書左丞孫緬墓志文光靈維周肇祀伊衛照分上代鏡華中世睿誕降明秀芳嗣烈學惟物範行實士節容與書林優遊史藝素巾峨冠朱紱纍轍來訪詩逸入詢禮缺麗名文質齊影儒哲慶履匪舒沴氣遽結殯帷兮既晦泉火兮已閉曖遺波於遙緒颯流馨於遠歲本集宋故安成王右常侍劉喬墓志文丹陽韞聖豐鄉降賢玉葉既積金徽方傳乃育伊人剋廣克宣騰芬中屬飛藻上年杳杳虛素永永沖關雲意霜柏瓊立冰堅家寶以瑩國才未甄參錯報善茫昧雲玄斂魂幽石委氣空山膚若流波身如絶煙芳菲一逝美懋徒鐫本集宋故銀青光祿大夫孫敻墓志文川祇效鏡嶽祥獻明碧葉獨秀瑤源自清幼炳器譽夙耀才名體兼遷雲學備儒史紫閣咸趨朱軒既履貴交慕塵素遊企軌騰藻上京振彩下國如彼緑蘭秉芬四塞欷人徑之不平歎天路之冥默貴夫君之為美播靈均與正則本集齊故御史中丞孫詵墓志文筠以霜藹蘭以風薰深哉若人實好斯文系緒承胄激花驚芬才基魏粲學參漢雲覽志上載洽鏡前聞騰名冠俗揚采絶群方協明世式贊睿君如何不淑天道離分敢雕窆石永晣幽墳本集齊故司徒右長史檀超墓志文惟金有詵惟玉有瑤君實淵哉行為世標高志灑落逸氣寂寥奧學內溢深文外昭嘉采籍譽登國振朝亦既有美筠傷蕙凋人邇運曠世促道遼永矣仁矣流芳無澆本集建平王太妃周氏行狀竊聞侯服之譽非黃冠能敷玉食之問寧皀衣所述諒畏褒虛美於君后被空名於鼎貴然有漢臣誄行晉史書德者亦云實而已焉伏見國太妃稟靈惟嶽集慶自遠世擅淮汝族冠疇代故以載曜聲書式炳縢牒矣太妃誕離明之正和涵雲露之中氣凝采齠歲賁章笄年若乃彤管女圖之學纂組綺縞之工升降處謙之儀柔靜居順之節莫不中道若性不嚴而成故譽滿闈閾聲聞軒殿以元嘉某年歸于故司徒宣簡王既而第高恆倫秩踰外品青軒華轂用光國輝素壁丹墀實隆家貴具惟姻娣靡不式贍而居尊以簡訓卑以弘躬謹蘭閨身撝椒第若衛娥之炯行樊嬴之英操方之蔑如也大明二年宣簡王薨太妃藉悲用禮撫孤用慈柔懿之德愈彰肅敬之問日被雖文伯之母言不踰閾莒相之主行存乎勤無以過也大明某年拜建平王太妃是時今王春秋方富德業未隆藉茲金響終能玉播故綺襦出宰弱冠升朝者亦太妃劬勞之訓也謂天蓋高降年不永以太豫元年二月三日薨于荊州之內寢凡厥遠邇以哀以歎今祖行有期泉穸無遠素旗望路綵旌思歸所以垂宣徽容髣佛金石者謹詳牒行狀具以申言本集藝文類聚十五蕭驃騎祭石頭戰亡文咸告忠貞之魂曰義惟行首雄實士節嗟爾驍驚稟才蹈烈守玉不渝懷冰可折氣彰靡旗情皎亂轍高墉摧堅巨醜挫鋭深痛克矜冤靈及雪隆恩殊悼臨爾以欷千秋同盡百齡一世魂而有知咸無遠邇嗚呼哀哉本集蕭太傅東耕呪文敬呪先穡曰攝提方春黍稷未華灼爍發雲昭耀開霞地煦景曖山艷水波側聞農政實惟民天競秬獻歲務畎上年有淹踈潤興雨導泉崇耕巡索均逸共勞命彼倌人稅于青皋羽旗銜蕤雄戟耀毫呈典緇耦獻禮翠壇宜民宜稼克降祈年願靈之降解珮停鑾神之行兮氣為軷神之坐兮煙為蓋使嘉穀與玄鬯永爭光而無沫哉本集自序淹字文通濟陽考城人幼傳家業六歲能屬詩十三而孤邈過庭之訓長遂博覽群書不事章句之學頗留精於文章所誦詠者蓋二十萬言而愛奇尚異深沉有遠識常慕司馬長卿梁伯鸞之徒然未能悉行也所與神遊者唯陳留袁叔明而已弱冠以五經授宋始安王劉子真略傳大義為南徐州新安王從事奉朝請始安之薨也建平王劉景素聞風而悅待以布衣之禮然少年嘗倜儻不俗或為世士所嫉遂誣淹以受金者將及抵罪乃上書見意而免焉尋舉南徐州桂陽王秀才對策上第轉巴陵王左常侍右軍建平王主簿賓待纍年雅以文章見遇而宋末多阻宗室有憂生之難王初欲羽檄徵天下兵以求一旦之幸淹嘗從容曉諫言人事之成敗每曰殿下不求宗廟之安如信左右之計則復見麋鹿霜棲露宿於姑蘇之臺矣終不以納而更疑焉及王移鎮朱方也又為鎮軍參事領東海郡丞於是王與不逞之徒日夜搆議淹知禍機之將發又賦詩十五首略明性命之理因以為諷王遂不悟乃憑怒而黜之為建安吳興令地在東南嶠外閩越之舊境也爰有碧水丹山珍木靈草皆淹平生所至愛不覺行路之遠矣山中無事與道書為偶乃悠然獨往或日夕忘歸放浪之際頗著文章自娛在邑三載朱方竟敗焉復還京師值世道已昏守志間居不交當軸之士俄皇帝始有大功於四海聞而訪召之為尚書駕部郎驃騎竟陵公參軍事當沈攸之起兵西楚也人懷危懼高帝嘗顧而問之曰天下紛紛若是君謂如何淹對曰昔項強而劉弱袁衆而曹寡羽號令諸侯竟受一劍之辱紹跨躡四州終為奔北之虜此所謂在德不在鼎公何疑焉帝曰聞此言者多矣其試為我言之淹曰公雄武有奇略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子而伐逆叛五勝也攸之志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也故豺狼十萬而終為我獲焉帝笑曰君談過矣是時軍書表記皆為草具逮東霸城府猶掌筆翰相府始置仍為記室參軍事及讓齊王九錫備物及諸文表皆淹為之受禪之後又為驃騎豫章王記室參軍鎮東武令參掌詔冊並典國史既非雅好辭不獲命尋遷正員散騎侍郎中書侍郎淹嘗云人生當適性為樂安能精意苦力求身後之名哉故自少及長未嘗著書惟集十卷謂如此足矣重以學不為人交不苟合又深信天竺緣果之文偏好老氏清淨之術仕所望不過諸卿二千石有耕織伏臘之資則隱矣常願幽居築宇絶棄人事苑以丹林池以緑水左倚郊甸右帶瀛澤青春爰謝則接武平皋素秋澄景則獨酌虛室侍姬三四趙女數人不則逍遙經紀彈琴詠詩朝露幾間忽忘老之將至淹之所學盡此而已矣本集又略見藝文類聚五十五
