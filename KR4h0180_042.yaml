body:
  text: 任昉為齊宣德皇后令西詔至帝憲章前代敬禪神器于梁明可臨軒遣使恭授璽紱未亡人便歸於別宮梁書武帝紀上南史六齊宣德皇后答梁王令承固茲謙揖未膺大典敬復雅旨良有憮然夫至寂難原言象所絶教思有律感通斯在所以異人者神明同人者用舍王誕茲上睿對越天行德冠二儀化周群動生民以來一人而已但達節弘道每濡跡於中庸神照惟幾不抑心於鑽仰范宣既讓其下取則況聖圖睿範歌思是歸廉約雖弘慶賞遂替誠賢者悅義長難進之風不肖者矜功沮竭力之效勸沮之間所差已遠王何得不暫紆雅尚允答天人使朕夜艾以安早朝有預今遣率茲百辟申薦誠款萬致一塗煩言可略藝文類聚十四宣德皇后敦勸梁王令宣德皇后敬問具位夫功在不賞故庸勳之典蓋闕施侔造物則謝德之途已寡也要不得不彊為之名使荃宰有寄公實天生德齊聖廣淵不改參辰而九星仰止不易日月而二儀貞觀在昔晦明隱鱗戢翼博通群籍而讓齒乎一卷之師劍氣淩雲而屈迹於萬夫之下辨折天口而似不能言文擅雕龍而成輒削稿爰在弱冠首應弓旌客游梁朝則聲華籍甚薦名宰府則延譽自高隆昌季年勤王始著建武惟新締構斯在功隆賞薄嘉庸莫疇一馬之田介山之志愈厲六百之秩大樹之號斯存及擁旄司部代馬不敢南牧推轂樊鄧胡塵罕嘗夕起惟彼狡僮窮凶極虐衣冠泯絶禮樂崩喪既而鞠旅誓衆言謀王室白羽一麾黃鳥底定甲既鱗下車亦瓦裂致天之屆拱揖群后豐功厚利無得而稱是以祥光總至休氣四塞五老游河飛星入昴元功茂勳若斯之盛而地狹乎四履勢卑乎九伯帝有恧焉輶軒萃止今遣某位某甲等率茲百辟人致其誠庶匪席之旨不遠而復文選三十六藝文類聚十四又重敦勸梁王令朕聞匹夫好仁義在磨踵君子行道達斯兼濟未有盡器窮神蘊徽章乎天植高奠中樽覩傾罍而弗極惟王德冠往初功無與二四時等契兩曜齊明擬度天行取則乾健而運距難季道極百王援義而起一戎大定羅山革草罔不率從用使商庭産𧀬周闕樹梓傾宮既散鹿臺靡蓄盛德大業巍巍若此日者事岐之號爰發帝言殊物備禮率由寡昧雖復雲竿載路清蹕啓行昭德報功未臻其極而高揖天休遠存克讓俾豫未亡興慚日昃今遣率茲百辟人致誠請庶有感睿心霈然降志藝文類聚十四為梁武帝集墳籍令令近災起柏梁遂延渠閣青編素𥳑一同煨燼緗囊綖袠蕩然無餘故以痛深秦末悲甚漢季求之天道昭然有徵豈不以昏嗣作孽禮樂崩壞及聖人有作更俟茲辰今雖百度草創日不暇給而下車所務非此孰先便宜選陳農之才採河間之闕懷鉛握素汗簡殺青依祕閣舊録速加繕寫便施行文館詞林六百九十五為梁武帝斷華侈令令夫在上化下草偃風從俗之澆淳恆由此作自永元失德書契未紀窮昏極悖焉可勝言既而璇室外構傾宮內積奇伎異服實所未見上慢下暴淫侈競馳國命朝權改移近習販官鬻爵賄貨公行竝甲第康衢漸臺廣夏長袖低昂等和戎之錫珍羞百品同伐冰之家愚人因之浸以成俗憍豔競爽夸麗相高至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜艾未反昧爽之朝期之清旭今聖明肇運厲精惟始雖曰纘戎殆同創革且淫費之後繼以興師巨橋鹿臺雕罄不一孤忝荷寵任務在澄清思所以仰贊皇朝大帛之旨俯厲微躬粗衰之義解而更張斫雕為朴自非可以奉粢盛修紱冕習禮樂之容繕甲兵之備此外衆費一皆禁絶御府中署量宜罷省掖廷備御妾之數大豫絶鄭衛之音仰度朝旨暗同此意其中有可以率先卿士準的庶萌菲食薄衣請自孤始加以群才竝軌九官咸事若能人務退食競存約己移風易俗庶期月有成昔毛玠在朝士大夫不敢靡衣愈食魏武歎曰孤之法不如毛尚書孤雖德謝往賢任重先達實望多士得其此心外可詳為條格以時施行文館詞林六百九十五天監三年策秀才文問秀才朕長驅樊鄧直指商郊因藉時來乘此曆運當扆永念猶懷慚德何者百王之弊齊季斯甚衣冠禮樂掃地無餘斫雕刓方經綸草昧採三王之禮冠履粗分因六代之樂宮判始辨而百度草創倉廩未實若終畝不稅則國用靡資百姓不足則惻隱深慮每時入芻槀歲課田租愀然疚懷如憐赤子今欲使朕無滿堂之念民有家給之饒漸登九年之畜稍去關市之賦子大夫當此三道利用賓王斯理何從佇聞良說問朕本自諸生弱齡有志閉戶自精開卷獨得九流七略頗常觀覽六藝百家庶非牆面雖一日萬幾早朝晏罷聽覽之暇三餘靡失上之化下草偃風從惟此虛寡弗能動俗昔紫衣賤服猶化齊風長纓鄙好且變鄒俗雖德慚往賢業優前事且夫搢紳道行祿利然也朕傾心駿骨非懼真龍輜軿青紫如拾地芥而惰游廢業十室而九鳴鳥蔑聞子襟不作弘獎之路斯既然矣猶其寂寞應有良規問朕立諫鼓設謗木於茲三年矣比雖輻湊闕下多非政要日伏青蒲罕能切直將齊季多諱風流遂往將謂朕空然慕古虛受弗弘然自君臨萬㝢介在民上何嘗以一言失旨轉徙朔方睚眥有違論輸左校而使直臣杜口忠讜路絶將恐弘長之道別有未周悉意以陳極言無隱文選三十六為齊竟陵王世子臨會稽郡教富室兼并前史共蠹大姓侵威往哲攸嫉而權豪之族擅割林池勢富之家專利山海至乃水稱峻藝文類聚五十吏部郎表郎官之重千金非譬爰在前世實光選造清通為首終遂弗居深識為度纍薦無獲承乏攝官顧知其望方今皇明御宇升長咸亨涇渭搢紳無謬衡石抑揚庶品亦自能官顧己循涯孰用祗荷唯知死所未識所報藝文類聚四十八為齊明帝讓宣城郡公第一表臣鸞言被臺司召以臣為侍中中書監驃騎大將軍開府儀同三司楊州刺史録尚書事封宣城郡開國公食邑三千戶加兵五千人臣本庸才智力淺短太祖高皇帝篤猶子之愛降家人之慈世祖武皇帝情等布衣寄深同氣武皇大漸實奉話言雖自見之明庸近所蔽愚夫一至偶識量己實不忍自固於綴衣之辰拒違於玉几之側遂荷顧託導揚末命雖嗣君棄常獲罪宣德王室不造職臣之由何者親則東牟任惟博陸徒懷子孟社稷之對何救昌邑爭臣之譏四海之議於何逃責且陵土未乾訓誓在耳家國之事一至於斯非臣之尤誰任其咎將何以肅拜高寢虔奉武園悼心失圖泣血待旦寧容復徼榮於家恥宴安於國危驃騎上將之元勳神州儀刑之列嶽尚書古稱司會中書實管王言且虛飾寵章委成禦侮臣知不愜物誰謂宜但命輕鴻毛責重山嶽存沒同歸毀譽一貫辭一官不減身纍增一職已黷朝經便當自同體國不為飾讓至於功均一匡賞同千室光宅近甸奄有全邦殞越為期不敢聞命亦願曲留降鑒即垂順許巨平之懇誠必固永昌之丹慊獲申乃知君臣之道綽有餘裕苟曰易昭敢守難奪故可庶心弘議酌己親物者矣不勝荷懼屏營之誠謹附某官某甲奉表以聞臣諱誠惶誠恐文選三十八梁書任昉傳藝文類聚五十一為范尚書讓吏部封侯第一表臣雲言被尚書召以臣為散騎常侍吏部尚書封霄城縣開國侯食邑千戶奉命震驚心顏無措臣雲頓首頓首死罪死罪臣素門凡流輪翮無取進謝中庸退慚狂狷固嘗鑽厲求學而一經不治篆刻為文而三冬靡就負書燕魏空殫菽粟躡蹻齊楚徒失貧賤既而分虎出守以囊被見嗤持斧作牧以薏苡興謗赭衣為虜見獄吏之尊除名為民知井臼之逸百年上壽既曰徒然如其誠說亦以過半亂離斯莫欲以安歸閉門荒郊再離寒暑兼以東皋數畝控帶朝夕關外一區悵望鍾阜雖室無趙女而門多好事祿微賜金而歡同娛老折芰燔枯此焉自足陛下應期萬世接統千祀三千景附八百不謀臣釁等離心功慚同德泥首在顏輿棺未毀締構草昧敢叨天功獄訟謳歌示民同志而隆器大名一朝總集顧己反躬何以臻此正當以接閈白水列宅舊豐忘捨講之尤存諸公之費俯拾青紫豈待明經臣雲頓首頓首死罪死罪夫銓衡之重關諸隆替遠惟則哲在帝猶難漢魏已降達識繼軌雅俗所歸惟稱許郭拔十得五尚曰比肩其餘得失未聞偶察童幼天機暫發顧無足算在魏則毛玠公方居晉則山濤識量以臣況之一何遼落齊季陵遲官方淆亂鴻都不綱西園成市金章有盈笥之談華貂深不足之歎草創惟始義存改作恭己南面責成斯在豈宜妄加寵私以乏王事附蟬之飾空成寵章求之公私授受交失近世侯者功緒參差或足食關中或成軍河內或制勝帷幄或門人加親或與時抑揚或隱若敵國或策定禁中或功成野戰或盛德如卓茂或師道如桓榮或四姓侍祠已無足紀五侯外戚且非舊章而臣之所附惟在恩澤既義異疇庸實榮乖儒者雖小人貪幸豈獨無心臣本自諸生家承素業門無富貴易農而仕乃祖玄平道風秀世爰在中興儀刑多士位裁元凱任止牧伯高祖少連夙秉高尚所富者義所乏者時薄宦東朝謝病下邑先志不忘愚臣是庶且去歲冬初國學之老博士耳今茲首夏將亞冢司雖千秋之一月九遷荀爽之十旬遠至方之微臣未為速達臣雖無識惟利是視至於虧名損實為國為身知其不可不敢妄冒陛下不棄菅蒯愛同絲麻儻平生之言猶在聽覽宿心素志無復二辭矜臣所乞特回寵命則彝章載穆微物知免臣今在假不容詣省不任荷懼之至謹奉表以聞臣雲誠惶以下文選三十八藝文類聚四十八初學記十二為蕭揚州薦士表臣王言臣聞求賢暫勞垂拱永逸方之疏壤取類導川伏惟陛下道隱旒纊信充符璽六飛同塵五讓高世白駒空谷振鷺在庭猶懼隱鱗卜祝藏器屠保物色關下委裘河上非取製於一狐諒求味於兼采五聲倦響九工是詢寢議廟堂借聽輿皂臣位任隆重義兼家邦實欲使名實不違徼幸路絶勢門上品猶當格以清談英俊下僚不可限以位貌竊見祕書丞琅邪臣王暕年二十一字思晦七葉重光海內冠冕神清氣茂允迪中和叔寶理遣之談彥輔名教之樂故以暉映先達領袖後進居無塵雜家有賜書辭賦清新屬言玄遠室邇人曠物疏道親養素丘園台階虛位庠序公朝萬夫傾望豈徒荀令可想李公不亡而已哉前晉安郡候官令東海王僧孺年三十五字僧孺理尚棲約思致恬敏既筆耕為養亦傭書成學至乃集螢映雪編蒲緝柳先言往行人物雅俗甘泉遺儀南宮故事畫地成圖抵掌可述豈直鼮鼠有必對之辨竹書無落𥳑之謬暕坐鎮雅俗弘益已多僧孺訪對不休質疑斯在並東序之祕寶瑚璉之茂器誠言以人廢而才實世資臨表悚戰猶懼未允不任下情云云文選三十八為褚咨議蓁讓代兄襲封表臣蓁言昨被司徒符仰稱詔旨許臣兄賁所請以臣襲封南康郡公臣門籍勳蔭光錫土宇臣賁世載承家允膺長德而深鑒止足脫屣千乘遂乃遠謬推恩近萃庸薄能以國讓弘義有歸匹夫難奪守以勿二昔武始迫家臣之策陵陽感鮑生之言張以誠請丁為理屈且先臣以大宗絶緒命臣出纂傍統稟承在昔理絶終天永惟情事觸目崩殞若使賁高延陵之風臣忘子臧之節是廢德舉豈曰能賢陛下察其丹款特賜停絶不然投身草澤苟遂愚誠耳不勝丹慊之至謹詣闕拜表以聞臣誠惶誠恐以下文選三十八一日被司徒符印稱詔旨許臣兄賁所請以臣紹封南康郡公臣世屬啓聖運偶時來尚德疇庸先錫土宇臣賁載世承家兄居長德而量己夙退內事園蔬以臣行達幽明早酷荼苦賁天倫契至友愛淳深非直引塉推溫故能逃迹讓位鞠育提養以及人次事死讓生尚均脫屣取信十室本若錙銖乃遠謬推恩近霑庸薄能以國讓弘義有歸匹夫難奪守以勿二昔武始迫家臣之策陵陽感鮑豫之言張以誠請丁為理屈且大宗絶緒命臣出纘傍統稟承在昔理絶終天永懷情事觸感崩裂伏惟陛下俯權孤門哀榮之重爰奪臣賁一至之輕察其丹款特賜停絶至公允穆微臣剋幸藝文類聚五十一又表近冒披款庶蒙哀亮奉被還詔未垂矜允伏讀周遑罔置心誠臣本凡劣身名不限標一善不足以驗風流存一讓不足以弘進止若乃富埒千駟貴有邦家二者之來不期而至中人猶其趑趄凡近固宜勉勖直以門緒有歸長德無二若使賁高延陵之風臣忘子臧之節是廢德舉豈曰能賢陛下留心孤門特深追遠故臣窮必呼天憑威咫尺賁嬰疾沈固公私廢禮逢不世之恩遂良己之志確然難奪有理存焉臣既承先旨出纘傍統受命有資反身何奉敘心感悼勉義迫躬臣賁息霽年將志學禮及趨拜且私門世適二三攸序若天眷無已必降殊私乞以臣霽奉膺圭社伏願陛下聖慈曲垂矜慎如蒙哀允施重含育藝文類聚五十一為范始興作求立太宰碑表臣雲言原夫存樹風猷沒著徽烈既絶故老之口必資不刊之書而藏諸名山則陵谷遷貿府之延閣則青編落𥳑然則配天之迹存乎泗水之上素王之道紀於沂川之側由是崇師之義擬迹於西河尊主之情致之於堯禹故精廬妄啓必窮鐫勒之盛君長一城亦盡刊刻之美況乎甄陶周召孕育伊顏故太宰竟陵文宣王臣某與存與亡則義刑社稷嚴天配帝則周公其人體國端朝出藩入守進思必告之道退無苟利之專五教以倫百揆時序若夫一言一行盛德之風琴書藝業述作之茂道非兼濟事止樂善亦無得而稱焉人之云亡忽移歲序鴟梟東徙松檟成行六府臣僚三藩士女人蓄油素家懷鉛筆瞻彼景山徒然望慕昔晉氏初禁立碑魏舒之亡亦從班列而阮略既泯故首冒嚴科為之者竟免刑戮致之者反蒙嘉歎至於道被如仁功參微管本宜在常均之外故太宰淵丞相嶷親賢並軌即為成規乞依二公前例賜許刊立寧容使長想九原樵蘇罔識其禁駐驆長陵輶軒不知所適臣里閭孤賤才無可甄值齊網之弘弛賓客之禁策名委質忽焉二紀慮先犬馬厚恩不答而敝帷毀蓋未蓐螻蟻珠襦玉匣遽飾幽泉陛下弘獎名教不隔微物使臣得駿奔南浦長號北陵既曲逢前施實仰覬後澤儻驗杜預山頂之言庶存馬駿必拜之感臨表悲懼言不自宣臣誠惶已下文選三十八為皇太子求一日一入朝表臣聞內豎告安姬昌怡色鳴雞戒旦周發冠履或以涼燠之候晨昏異宜膳羞之和鼎飪殊節一辰三朝稱情猶簡終日承顏在理斯愜且長壽之對撫循無已馳道未窮顧懷不輟豈直下動天性固亦上結慈衷自頃半旬乃朝遂為通制事踰信次義乖晨省一日萬幾不敢三塵御省每旦改宿特乞一至寢門藝文類聚十六為王思遠讓侍中表行則六尺之內陪接天光語則親璽申命誠信區宇獻可替否出納惟幾敷奏於金華之上進讓於玉堂之下金遷七貴之茂王粲三公之孫雖復仲蔚孤緒元卿末裔未有不階民譽妄承典私者也藝文類聚四十八初學記十二為蕭侍中拜襲封表詔書拜臣襲封竟陵郡王臣以凡庸素乏才植皇朝尚德詔爵惟賢遂復出修職貢入頒卿士但有道之守海外重扃蕃籬近甸無勞擊柝仰閲舊章俯增私感報國承家豈云萬一藝文類聚五十一為梁公請刊改律令表臣聞淳源既遠天討是因畫衣象服以致刑厝草纓艾韠民不能犯及淳德下衰運距澆季湯刑禹政不足禁姦九法三章無以息訟所以赭衣塞路圄犴成市凝脂已疏秋荼非苦姦吏為市生殺並用可為慟哭豈徒一緒夫肖貌天地稟靈川嶽受體愛敬髮膚為重流矢影風顧有憂色而當妄加刳斫金木為伍且夫刻木不對畫地不入畏避若是而動貽非命王道為虧良在於此法開二門為政之蠹生殺多緒誰其適從藝文類聚五十四
