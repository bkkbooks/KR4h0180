body:
  text: 侯景臣王偉為侯景降梁表臣聞股肱體合則四海和平上下猜二則封疆幅裂故周邵同德越常之貢來臻飛惡離心諸候所以背叛此蓋成敗之所由古今如畫一者也臣昔與魏丞相高王並肩戮力共平災釁扶危戴主匡弼社稷中興以後無役不從天平及此有事先出攻城每陷野戰必殄筋力消于鞍甲忠貞竭于寸心乘籍機運位階鼎輔宜應誓死罄節仰報時恩隕首流腸溘焉罔二何言翰墨一旦論此臣所恨義非死所壯士弗為臣不愛命但恐死之無益耳而丞相既遭疾患政出子澄澄天性險忌觸類猜𡞥諂諛迭進共相搆毀而部分未周纍信賜召不顧社稷之安危惟恐私門之不值甘言厚幣規滅忠梗其父若殞將何賜容懼讒畏戮拒而不返遂觀兵汝潁擁旆周韓乃與豫州刺史高成廣州刺史郎椿襄州刺史李密兗州刺史邢子才南兗州刺史石長宣齊州刺史許季良東豫州刺史丘元征洛州刺史朱渾願揚州刺史樂恂北荊州刺史梅季昌北楊州刺史元神和等皆河南牧伯大州帥長各陰結私圖剋相影會秣馬潛戈待時即發函谷以東瑕丘以西咸願歸誠聖朝息肩有道戮力同心死無二志惟有青徐數州僅須折簡一驛走來不勞經略且臣與高氏釁隙已成臨患賜徵前已不赴縱其平復終無合理黃河以南臣之所職易同反掌附化不難群臣顒仰聽臣而唱若齊宋一平徐事燕趙伏惟陛下天網宏開方同書軌聞茲寸款惟應霈然梁書侯景傳太清元年乃遣其行臺郎中丁和來上表請降為侯景抗表違盟臣聞書不盡言言不盡意然則意非言不宣言非筆不盡臣所以含憤蓄積不能默已者也竊惟陛下睿智在躬多才多藝昔因世季龍翔漢沔夷凶翦亂克雪家怨然後踵武前王光宅江表憲章文武祖述堯舜兼屬魏國淩遲外無勍敵故能西取華陵北封淮泗結好高氏輶軒相屬疆埸無虞十有餘載躬覽萬機劬勞治道刊正周孔之遺文訓釋真如之祕奧享年長久本枝盤石人君藝業莫之與京臣所以踊躍一隅望南風而歎息也豈圖名與實爽聞見不同臣自委質策名前後事迹從來表奏巳具之矣不勝憤悶復為陛下陳之陛下與高氏通和歲踰一紀舟車往復相望道路必將分災恤患且同休等戚寧可納臣一介之服貪臣汝潁之地便絶好河北檄詈高澄聘使未歸陷之獸口揚兵擊鼓侵逼彭宋夫敵國相伐聞喪則止匹夫之交託孤寄命豈有萬乘之主見利忘義若此者哉其失一也臣與高澄既有仇憾義不同國歸身有道陛下授以上將任以專征歌鐘女樂車服弓矢臣命不辭實思報效方欲挂旆嵩華縣旌冀趙劉夷蕩滌一匡宇內陛下朝服濟江告成東嶽使大梁與軒黃等盛臣與伊呂比功垂裕後昆流名竹帛此實生平之志也而陛下欲分其功不能賜任使臣擊河北欲自舉徐方遣庸懦之貞陽任驕貪之胡趙裁見旗鼓鳥散魚潰慕容紹宗乘勝席卷渦陽諸鎮靡不棄甲疾雷不及掩耳散地不可固全使臣狼狽失據妻子為戮斯實陛下負臣之深其失二也韋黯之守壽陽衆無一旅慕容凶鋭欲飲馬長江非臣退保淮南其勢未之可測既而逃遁邊境獲寧令臣作牧此州以為藩捍方欲收合餘燼勞來安集勵兵抹馬剋申後戰封韓山之尸雪渦陽之恥陛下喪其精魄無復守氣便信貞陽謬啓復請通和臣頻陳執疑閉不聽翻覆若此童子猶且羞之況在人君二三其德其失三也夫畏懦逗留軍有常法子玉小敗見誅于楚王恢失律受戮于漢貞陽精甲數萬器械山積慕容輕兵衆無百乘不能拒抗身受囚執以帝之猶子而面縛敵庭實宜絶其屬籍以釁征鼓陛下曾無追責憐其苟存欲以微臣規相貿易人君之法當如是哉其失四也懸瓠大藩古稱汝潁臣舉州內附羊鴉仁固不肯入既入之後無故棄之陛下曾無嫌責使還居北司鴉仁棄之既不為罪臣得之不以為功其失五也臣渦陽退衄非戰之罪實由陛下君臣相與見誤乃還壽春曾無悔色祗奉朝廷掩惡揚善鴉仁自知棄州切齒歎恨內懷慚懼遂啓臣欲反欲反當有形迹何所徵驗誣陷頓爾陛下曾無辨究默而信約豈有誣人莫大之罪而可並肩事主者乎其失六也趙伯超拔自無能任居方伯惟漁獵百姓多蓄士馬非欲為國立功直是自為富貴行貨權幸徼買聲名朱異之徒積受金貝遂使咸稱胡趙比昔關張誣掩天聽謂為真實韓山之役女妓自隨裁聞敵鼓與妾俱逝不待貞陽故隻輪莫返論其此罪應誅九族而納賄中人還處州任伯超無罪臣功何論賞罰無章何以為國其失七也臣御下素嚴無所侵物關市征稅咸悉停原壽陽之民頗懷優復裴之悌等助戍在彼憚臣檢制遂無故遁歸又啓臣欲反陛下不責違命離局方受其浸潤之譖處臣如此使何地自安其失八也臣雖才謝古人實頗更事撫民率衆自幼至長少來運動多無遺策及歸身有道罄竭忠規每有陳奏恆被抑遏朱異專斷軍旅周石珍總尸兵仗陸驗徐驎典司穀帛皆明言求貨非令不行境外虛實定計于舍人之省舉將出師責奏于主者之命臣無賄于巾故恆被抑拆其失九也鄱陽之鎮合肥與臣鄰接臣推以皇枝每相祇敬而嗣王庸怯虛見備御臣有使命必加彈射或聲言臣反或啓臣纖介招攜當須以禮忠烈何以堪于此哉其失十也其餘條目不可具陳進退惟谷頻有表疏言直辭強有忤龍鱗遂發嚴詔便見討襲重華純孝猶逃凶父之杖趙盾忠賢不討殺君之賊臣何親何罪而能坐受殲夷韓信雄桀亡項霸漢末為女子所烹方悔蒯通之説臣每覽書傳心常笑之豈容遵彼覆車而快陛下佞臣之手是以與晉陽之甲亂長江而直濟願得升赤墀踐文石陳枉直指畫臧否誅君側之惡臣清國朝之粃政然後還守藩翰以保忠節實臣之至願也梁書侯景傳為侯景上言將內逼高澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣行年四十有六未聞江左有佞邪之臣一旦入朝乃至囂讟寧堪粉骨投命讎門請乞江西一境授臣控督如其不許即領甲臨江上向閩越非唯朝廷自恥亦是三公旰食南史八十侯景傳又啓西岸信至高澄已得壽春鍾離便無處安足權借廣陵譙州須征得壽春鍾離即以奉還朝廷梁書侯景傳為侯景報齊文襄書蓋聞立身揚名者義也在躬所寶者生也苟事當其義則節士不愛其軀刑罰斯舛則君子實重其命昔微子發狂而去殷陳平懷智而背楚者良有以也僕卿曲布衣本乖藝用初逢天柱賜忝帷幄之謀晚遇永熙委以干戈之任出身為國綿歷二紀犯危履難豈避風霜遂得躬被袞衣口飧玉食富貴當年光榮身世何為一旦舉旌旆援桴鼓而北面相抗者何哉實以畏懼危亡恐招禍害捐軀非義名身兩滅故耳何者往年之暮尊王遘疾神不祐善祈禱莫瘳遂使嬖幸擅威權閽寺肆詭惑上下相猜心腹離二僕妻子在宅無事見圍段康之謀莫知所以盧潛入軍未審何故翼翼小心常懷戰栗有靦面目寧不自疑及回師長社希自陳狀簡書未達斧鉞已臨既旌旗相對咫尺不送飛書每奏兼申鄙情而群卒恃雄眇然不顧運戟推鋒專欲屠滅築圍堰水三板僅存舉目相看命懸晷刻不忍死亡出戰城下禽獸惡死人倫好生送地拘秦非樂為也僕實不辜桓莊何罪且尊王平昔見與比肩戮力同心共獎帝室雖復形勢參差寒暑小異丞相司徒雁行而已福祿官榮自是天爵勞而後受理不相干欲求吞炭何其謬也然竊人之財猶謂為盜祿去公室抑為不取今魏德雖衰天命未改祈恩私第何足關言賜示不能東封函谷受制于人當似教僕賢祭仲而褒季氏無主之國在禮未聞動而不法何以取訓竊以分財養幼事歸令終捨宅存孤誰云隙末復言僕衆不足以自強身危如纍卵然紂有億兆夷人卒降十亂桀之百剋終自無後潁川之戰即是殷監輕重由人非鼎在德苟德忠信雖弱必強殷夏啓聖處危何苦況今梁道雍熙招攜以禮被我獸文縻之好爵方欲苑五嶽而池四海掃夷穢以拯黎元東羈甌越西通汧隴吳楚剽徑帶甲千群秦兵冀馬控弦十萬兼僕所部義勇如林奮義取威不期而發大風一振枯幹必摧凝霜暫落秋蒂自殞此而為弱誰足稱強又見誣兩端受疑二國斟酌物情一何至此昔陳平背楚歸漢則王百里出虞入秦斯霸蓋昏明由主用捨在時奉禮而行神其庇也書稱士馬精新剋日齊舉誇張形勝指期蕩滅竊以寒飂白露節候乃同秋風揚塵馬首何異徒知北方之力爭未識西南之合從苟欲徇意於前途不覺坑穽在其側若云去危令歸正朔轉禍以脫網羅彼既嗤僕之愚迷此亦笑君之晦昧今已引二邦揚旌北討熊豹齊奮剋復中原荊襄廣潁已屬關右項城懸瓠亦奉南朝幸自取之何勞恩賜然權變不一理有萬途為君計者莫若割地兩和三分鼎峙燕衛晉趙足相奉祿齊曹宋魯悉歸大梁使僕得輸力南朝北敦姻好束帛交行戎車不動僕立當世之功君卒祖禰之業各保疆界躬享歲時百姓乂寧四民安堵孰若驅農夫于隴畝抗勍敵于三方避干戈于首首尾當鋒鏑于心腹縱太公為將不能獲存歸之高明何以剋濟復尋來書云僕妻子悉拘司寇以之見要庶其可反當是見疑褊心未識大趣何者昔王陵附漢母在不歸太上囚楚乞羹自若矧伊妻子而可介意脫謂誅之有益欲止不能殺之無損徒復坑戮家纍在君何關僕也而遵道所傳頗亦非謬但在縲紲恐不備盡故重陳辭更論款曲所望良圖時惠報旨然昔與盟主事等琴瑟讒人間之翻為讎敵撫弦搦矢不覺傷懷裂帛還書知何能述梁書侯景傳又見北齊書文襄紀有刪節北齊書云王尋覽書問誰為作或曰其行臺郎王偉王曰偉才如此何因不使我知為侯景遺臨賀王正德書今天子年尊姦臣亂國憲章錯謬政令顛倒以景觀之計日必敗況大王屬當儲二中被廢辱天下義士竊所痛心在景愚忠能無忿慨今四海業業歸心大王大王豈得顧此私情棄茲億兆景雖不武實思自奮願王允副蒼生鑒斯誠款梁書臨賀王正德傳傳檄荊州項羽重瞳尚有烏江之敗湘東一目寧為四海所歸南史八十王偉傳臺城陷矯詔日者姦臣擅命幾危社稷賴丞相英發入輔朕躬征鎮牧守可各復本任降蕭正德為侍中大司馬百官皆復其職梁書侯景傳加號宇宙大將軍矯詔蓋縣象在天四時取則于辰斗群生育地萬物仰照于大明是以垂拱當扆則八紘共輳負圖正位則九域同歸故乃雲名水號之君龍官人爵之后莫不啓符河洛封禪岱宗奔走四夷來朝萬國逖聽虞夏厥道彌新爰及商周未之或改逮幽厲不競戎馬生郊惠懷失御胡塵犯蹕遂使豺狼肆毒侵穴伊瀍獫狁孔熾巢栖咸洛自晉鼎東遷多歷年代周原不復歲實永久雖宋祖經略中息遠圖齊號和親空勞冠蓋我大梁膺符作帝出震登皇浹寓歸仁綿區飲化開疆闢土跨瀚海以揚鑣來庭入覲等塗山而比轍玄龜出洛白雉歸豐鳥塞同文胡天共軌不謂高澄跋扈虔劉魏邦扇動華夷不供王職遂乃狼顧北侵馬首南向值天厭昏偽醜徒數盡龍豹應期風雲會節相國漢王上德英姿蓋惟天授雄謨勇略出自懷抱珠魚表應辰昴叶暉剖析六韜錙銖四履騰文豹變鳳集虬翔奮翼來儀負圖而降爰初秉律實先啓行奉茲廟算克除獯醜直以鼎湖上征六龍晏駕干戈暫止九伐未申而惡稔貫盈元凶殞斃弟洋繼逆續長亂階異彼洋音同茲荐食偷竊偽號心希舉斧豐水君臣奉圖乞援關河百姓泣血請師咸願承奉國靈思覩王化朕以寡昧纂戎下武庶拯堯黎冀康禹迹且夫車服以庸名因事著周師克殷鷹揚創自尚父漢征戎狄明友實始度遼況乃神規睿算眇乎難測大功懋績事絶言象安可以習彼常名保茲守固相國可加宇宙大將軍都督六合諸軍事餘悉如故梁書侯景傳大寶元年十月景又矯詔云云以詔文呈太宗大驚曰將軍乃有宇宙之號乎廢立詔草先皇念神器之重思社稷之固越升非次遂主震方南史八遣使奉表楊州閻浮提震旦天子萬善莊嚴一切恭敬猶如天淨無雲明耀滿目天子身心清淨亦復如是道俗濟濟並蒙聖王光化濟度一切永作舟航臣聞之慶善我等至誠敬禮常勝天子足下稽首問訊今奉薄獻願垂哀受梁書海南諸國傳遣使奉表伏承聖主至德仁洽信重三寶佛法興顯衆僧殷集法事日盛威嚴整肅朝望國執慈愍蒼生八方六合莫不歸服化鄰諸天非可言喻不任慶善若暫奉見尊足謹奉送牙像及塔各二軀并獻火齊珠吉貝雜香藥等梁書海南諸國傳遣使奉表常勝天子陛下諸佛世尊常樂安樂六通三達為世間尊是名如來應供正覺遺形舍利造諸塔像莊嚴國土如須彌山邑居聚落次第羅滿城郭館宇如忉利天宮具足四兵能伏怨敵國土安樂無諸患難人民和善受化正法慶無不通猶處雪山流注雪水八味清淨百川洋溢周回屈曲順趨大海一切衆生咸得受用于諸國土殊勝第一是名震旦大梁揚郡天子仁廕四海德合天心雖人是天降生護世功德寶藏救世大悲為我尊生威儀具足是故至誠敬禮天子足下稽首問訊奉獻金芙蓉雜香藥等願垂納受梁書海南諸國傳遣使奉表大吉天子足下離淫怒癡哀愍衆生慈心無量端嚴相好身光明朗如水中月普照十方眉間白毫其白如雪其色照曜亦如月光諸天善神之所供養以垂正法寶梵行衆增莊嚴都邑城閣高峻如乾陀山樓觀羅列道途平正人民熾盛快樂安穩著種種衣猶如天服于一切國為極尊勝天主愍念群生民人安樂慈心深廣律議清淨正法化治供養三寶名稱宣揚布滿世界百姓樂見如月初生譬如梵王世界之主人天一切莫不歸依敬禮大吉天子足下猶如現前忝承先業慶嘉無量今遣使問訊大意欲白往復畏大海風波不達今奉薄獻願大家曲垂領納梁書海南諸國傳遣使奉表伏承聖王敬重三實興立塔寺校飾莊嚴周遍國土四衢平坦清淨無穢臺殿羅列狀若天宮壯麗微妙世無與等聖主出時四兵具足羽儀導從布滿左右都人士女麗服光飾市廛豐富充積珍寶王法清整無相侵奪學徒皆至三乘競集敷説正法雲布雨潤四海流通交會萬國長江眇漫清泠深廣有生咸資莫能消穢陰陽和畼災厲不作大梁揚都聖王無等臨覆上國有大慈悲子育萬民平等忍辱怨親無二加以周窮無所藏積靡不照燭如日之明無不受樂猶如淨月宰輔賢良群臣貞信盡忠奉上心無異想伏惟皇帝是我真佛臣是婆利國主今敬稽首禮聖王足下惟願大王知我此心此心久矣非適今也由海阻遠無緣自達今故遣使獻金席等表此丹誠梁書海南諸國傳遣使奉表伏聞彼國據江傍海山川周固衆妙悉備莊嚴國土猶如化城宮殿莊飾街巷平坦人民充滿歡娛安樂王出遊四兵隨從聖明仁愛不害衆生國中臣民循行正法大王仁聖化之以道慈悲群生無所遺棄常修淨戒式導不及無上法船沈溺以濟百官氓庶受樂無恐諸天護持萬神侍從天魔降服莫不歸仰王身端嚴如日初出仁澤普潤猶如大雲于彼震旦最為殊勝臣之所住國土首羅夫守護令國安樂王王相承未曾斷絶國中皆七寶形像衆妙莊嚴臣自修檢如化王法臣名屈多奕世王種惟願大王聖體和平今以此國群臣民庶山川珍重一切歸屬五體投地歸誠大王使人竺達多由來忠信是故今遣大王若有所須珍奇異物悉當奉送此之境土便是大王之國王之法令善道悉當承用願二國信使往來不絶此信返還願賜一使具宣聖命備敕所宜款至之誠望不空返所白如允願加采納今奉獻琉璃唾壺雜香吉貝等物梁書海南諸周國傳遣使奉表謹白大梁明主雖山海殊隔而音信時通伏承皇帝道德高遠覆載同于天地明照齊乎日月四海之表無有不從方國諸王莫不奉獻以表慕義之誠或泛海三年陸行千日畏威懷德無遠不至我先王以來唯以修德為本不嚴而治奉事正法道天下欣人為善慶若已身欲與大梁共弘三寶以度難化信還伏聽告敕今奉薄獻願垂納受梁書海南諸國傳大通元年後王伽葉伽羅訶梨邪遣使奉表
