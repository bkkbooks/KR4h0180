body:
  text: 沈約辯聖論聖人蓋人中之含明德盡照精粹凝玄者或三聖並時或千載寂蔑聖人遺情忘己常以兼濟為念若不登九五之位則其道不行非以黃屋玉璽為尊貴也文王造周而未集武王集之而未成周公雖無王祿而父兄二聖之烈不可以不終若不表示聖功制禮作樂則太平之業不著二聖之美不彰孔子當無錄之運值自晦之時而云河不出圖洛不出書吾已矣夫欲以聖德示天下垂來世當仲尼在世之時世人不言為聖人也伐樹削迹干七十君而不一值或以為東家丘或以為喪家犬若不高歎鳳鳥稱夢周公樂正雅頌各得其所則當世安知其聖人乎藝文類聚二十初學記十七七賢論嵇生是上智之人值無妄之日神才高傑故為世道所莫容風邈挺特蔭映於天下言理吐論一時所莫能參屬馬氏執國欲以智計傾皇祚誅鉏勝己靡或有遺玄伯太初之徒並出嵇生之流咸已就戮嵇審於此時非自免之運若登朝進仕映邁當時則受禍之速過於旋踵自非霓裳羽帶無用自全故始以餌朮黃精終於假塗託化阮公才器宏廣亦非衰世所容但容貌風神不及叔夜求免世難如為有塗若率其恆儀同物俯仰邁群獨秀亦不為二馬所安故毀行廢禮以穢其德崎嶇人世僅然後全仲容年齒不懸風力粗可慕李文風尚景而行之彼嵇阮二生志存保己既託其迹宜慢其形慢形之具非酒莫可故引滿終日陶瓦盡年酒之為用非可獨酌宜須朋侶然後成歡劉伶酒性既深子期又是飲客山王二公悅風而至相與莫逆把臂高林徒得其遊故於野澤銜杯舉樽之致寰中妙趣固冥然不睹矣自嵇阮之外山向五人止是風流器度不為世匠所駭且人本含情情性宜有所託慰悅當年蕭散懷抱非五人之與其誰與哉藝文類聚三十七晉書食貨志論人生所資曰食與貨貨以通幣食為人天是以九棘播於農皇十朋興於上代昔醇人未離情嗜疏寡奉生贍己事有異同一夫躬耕則餘餐委室匹婦務織則兼衣被體雖貿遷之道通用濟乏龜貝之益為功蓋輕而事有譌變姦弊大起昏作役苦故穡人去而從商商工事逸末業流而浸廣泉幣所通非復始造之意也於是競收罕至之珍遠蓄未名之貨明珠翠羽無足而馳彩罽文犀飛不待翼天下蕩蕩咸以棄本為事豐衍則同多稔之資饑凶又減田家之蓄錢雖盈尺且不療饑於堯年貝或如山信無救渴於湯代其為疪病亦已深矣固宜一罷錢貨專用穀帛使人知役生之路非此莫由夫千匹為貨事難於懷璧萬斛為市未易於越鄉斯可使末伎自禁遊食知反而年代推移人事興替或庫盈朽貫而高廩未充或家有藏鏹而良疇罕闢若事改一朝廢而莫用交易所寄朝夕無待雖致乎要術而非可卒行先宜削華止偽還醇返古抵璧幽峰捐珠清壑然後驅一代之人反耕桑之路使縑粟羨溢同於水火既而蕩滌圜法銷鑄無遺立制垂統永傳於後比屋稱仁豈伊唐代桓玄知其始而不覺其終孔琳之覩其末而不統其本豈慮開塞將一往之談可然乎前涼張軌太府參軍索輔言於軌曰古以金貝皮幣為貨息穀帛量度之秏二漢制五銖錢通易不滯晉太始中河西荒廢遂不用錢裂匹以為段數縑布既壞市易又難徒壞女工不任錢用弊之甚也今中州雖亂此方全安宜復五銖以濟通變之會軌納之立制准布用錢錢遂大行人賴其利通典八晉書選舉志九品論漢末喪亂魏武始創軍中倉卒權立九品蓋以論人才優劣非謂代族高卑因此相沿遂為成法自魏至晉莫之能改州都郡正以才品人而舉代人才升降蓋寡徒以憑籍代資用相淩駕都正俗士斟酌時宜品目少多隨事俯仰劉毅所云下品無高門上品無賤族也歲月遷譌斯風漸篤凡厥衣冠莫非二品自此以還遂成卑庶周漢之道以智役愚臺隸參差用成等級魏晉以來以貴役賤士庶之科較然有辨夫人君南面九重奧絕陪奉朝夕義隔卿士階闥之任宜有司存通典十六均聖論自天地權輿民生攸始遐哉眇邈無得而言焉無得而言因有可言之象至於太虛之空曠無始之杳茫豈唯言象莫窺良以心慮事絕及天地蕞爾來宅其中毫端之泛巨海方斯非譬然則有此天地以來猶一念也我之所久莫過軒羲而天地之在彼太虛猶軒羲之在彼天地齷齪之徒唯謂赫胥為遠何其瑣瑣為念之局邪世之有佛莫知其始前佛後佛其道不異法身湛然各有應感感之所召跨大千而咫尺緣苟未應雖踐跡而弗覩娑婆南界是曰閻浮葱嶺以西經塗密邇緣運未開自與理隔何以言之夏殷已前書傳簡寡周室受命經典備存象寄狄鞮隨方受職重譯入貢總括要荒而八蠻五狄莫不愚鄙文字靡識訓義不通咸納贄王府登樂清廟西國密塗厥路非遠雖葉書橫字華梵不同而深義妙理於焉自出唐虞三代不容未有事獨西限道未東流豈非區區中國緣應未啟求其會歸尋其要旨寍與四夷之樂同日而語乎非為姬公所遺蓋由斯法宜隱故也炎昊之世未火未粒肉食皮衣仁惻之事弗萌懷抱非肉非皮死亡立至雖復大聖殷勤思存救免而身命是資理難頓奪實宜導之以漸稍啟其源故燧人火化變腥為熟腥熟既變蓋佛教之萌兆也何者變腥為熟其事漸難積此漸難可以成著迄乎神農復垂汲引嘉穀肇播民用粒食歉腹充虛非肉可飽則全命減殺於事彌多自此已降矜護日廣春蒐免其懷孕夏苗取其害穀秋獮冬狩所害誠多頓去之難已備前說周孔二聖宗條稍廣見其生不忍其死聞其聲不食其肉草木斬伐有時麛卵不得妄犯漁不竭澤畋不燎原釣而不綱弋不射宿肉食蠶衣皆須耆齒牛羊犬豕無故不殺此則戒有五支又開其一也逮於酣醟于酒淫迷乎色詭妄於人攘濫自己外典所禁無待釋教四者犯人人為含靈之首一者害獸獸為生品之末上聖開宗宜有次第亦由佛戒殺人為業最重也內聖外聖義均理一而蔽理之徒封著外教以為烹羊豢豕理固宜然惑者又云若如釋氏之書咸有緣報之業則禹湯文武竝受刲刳周公孔子俱入鼎鑊是何迷於見道若斯之篤邪試尋斯證可以有悟矣廣弘明集五荅陶隱居難均聖論難云釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世閻浮有四則東國不容都無荅曰釋迦出世年月不可得知佛經既無年厤注記此法又未東流何以得知是周莊之時不過以春秋魯莊七年四月辛卯恆星不見為據三代年既不同不知外國用何厤法何因知魯莊之四月是外國之四月乎若外國用周正邪則四月辛卯長厤推是五日了非八日若用殷正邪周之四月殷之三月用夏正邪周之四月夏之二月都不與佛家四月八日同也若以魯之四月為證則日月參差不可為定若不以此為證則佛生年月無證可尋且釋迦初誕唯空中自明不云星辰不見也瑞相又有日月星辰停住不行又云明星出時墮地行七步初無星辰不見之語與春秋恆星不見意趣永乖若育王造塔是敬王之世閻浮有四此道已流東國者敬王以來至於六國記注繁密曾無一概育王立塔非敬王之時又分明也以此而推則釋迦之興不容在近周世公旦之情何得未有難云夫子自以華禮興教何宜乃說夷法故歎中國失禮求之四夷亦良有別意荅曰弘教次第前論已詳不復重辨難云四夷之樂裁出要荒之際投諸四裔亦密邇危羽之野禹跡所至不及河源越裳白雉尚稱重譯則天竺罽賓久與上國殊絕衰周已後時或有聞故鄒子以為赤縣於宇內止是九州中之一耳漢初長安乃有浮圖而經像眇昧張騫雖將命大夏甘英遠屆安息猶弗能宣譯風教必其發夢帝庭乃稍興顯此則似時有通礙非關運有起伏也荅曰本以西域路近而大法不被此蓋由緣應未發非謂其途為遠也其路既近而此法永不東流若非緣應未至何以致此及後東被皆由緣應宜發通礙各有其時前論已盡也難曰若必以緣應有會則昔之淳厚群生何辜今之澆薄群生何幸假使斯法本以救澆者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若秔糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐以時者蓋欲大明仁義之道于鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情顧乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以諮洗願具啟諸蔽荅曰民資肉食而火粒未啟便令不肉教豈得行前論言之已具不復重釋眾生緣果所遭各有期會當昔佛教未被是其惡業盛時後之聞法是其善業萌時善惡各有其時何關淳厚之與澆薄五支之戒各有輕重非殺戒偏重四支竝輕且五業雖異而互相發起犯人之戒人重故先出犯獸之戒獸輕故後被訓戒之道次第宜然周公孔子漸弘仁惻前論已詳請息重辨若必以釋教乖方域之理外此自一家之學所不敢言廣弘明集五究竟慈悲論釋氏之教義本慈悲慈悲之要全生為重恕己因心以身觀物欲使抱識懷知之類愛生忌死之群各遂厥宜得無遺失而俗迷日久淪惑難變革之一朝則疑怪莫啟設教立方每由漸致又以情嗜所深甘腴為甚嗜深於情尤難頓革是故開設三淨用伸權道及涅槃後說立言將謝則大明隱惻貽厥將來夫肉食蠶衣為方未異害命夭生事均理一瀹繭爛蛾非可忍之痛懸庖登俎豈偏重之業而去取異情開抑殊典尋波討源良有未達漁人獻鮪肉食同有其緣枲妾登絲蠶衣共頒其分假手之義未殊通閉之詳莫辯訪理求宗未知所適外典云五畝之宅樹之以桑則五十者可以衣帛矣雞豚犬彘勿失其時則七十者可以食肉矣然則五十九年已前所衣宜布矣六十九年已前所食宜蔬矣輕煖於身事既難遣甘滋於口又非易忘對而為言非有優劣宜枲麻果菜事等義同攘寒實腹曾無一異偏通繒纊當有別途請試言之夫聖道隆深非思不洽仁被群生理無偏漏拯麤去甚教義斯急繒衣肉食非已則通及晚說大典弘宣妙訓禁肉之旨載現於言黜繒之義斷可知矣而禁淨之始猶通蠶革蓋是敷說之儀各有次第亦猶闡提二義俱在一經兩說參差各隨教立若執前迷後則闡提無入善之途禁淨通蠶則含生無頓免之望難者又以闡提入道聞之後說蠶革宜禁曾無概理大聖弘旨義豈徒然夫常住密奧傳譯遐阻泥洹始度咸謂已窮中出河西方知未盡關中晚說厥義彌暢仰尋條流理非備足又案涅槃初說阿闍世王大迦葉阿難三部徒眾獨不來至既而二人竝來唯無迦葉迦葉佛大弟子不容不至而經無至文理非備盡昔涅槃未啟十數年間廬阜名僧已有蔬食者矣豈非乘心闇踐自與理合者哉且一朝裂帛可以終年烹牢待膳亙時引日然則一歲八蠶已驚其驟終朝未肉盡室驚嗟拯危濟苦先其所急敷說次序義實在斯外聖又云一人不耕必有受其饑者故一人躬稼亦有受其飽焉桑野漁川事雖非已炮肉裂繒咸受其分自涅槃東度三肉罷緣服膺至訓操概彌遠促命有殫長蔬靡惓秋禽夏卵比之如浮雲山毛海錯事同於腐鼠而繭衣纊服曾不懷疑此蓋慮窮於文字思迷於弘旨通方深信之客庶有鑒於斯理斯理一悟行迷克反斷蠶肉之因固蔬枲之業然則含生之類幾於免矣廣弘明集二十六形神論凡人一念之時七尺不復關所念之地凡人一念聖人則無念不盡聖人無已七尺本自若空以若空之七尺總無不盡之萬念故能與凡夫異也凡人一念忘彼七尺之時則目廢於視足廢於踐當其忘目忘足與夫無目無足亦何異哉凡人之暫無本實有無未轉瞬有已隨之念與形乖則暫忘念與心謝則復合念在七尺之一處則他處與異人同則與非我不異但凡人之暫無其無其無甚促聖人長無其無其無甚遠凡之與聖其路本同一念而暫忘則是凡品萬念而都忘則是大聖以此為言則形神幾乎惑人疑因果相主毫分不爽美惡之來皆有定業而六度所修咸資力致若修此力致復有前因因熟果成自相感召則力致之功不復得立六度所修幾於廢矣釋迦邁九劫勇猛所成勇猛之因定於無始本不資九安得稱劫余以為因果情照本是二物先有情照卻有因果情照既動而因果隨之未有情照因果何託因識二塗用合本異其本既異厥體不同情照別起於理非礙六度九劫差不足疑也廣弘明集二十二神不滅論含生之類識鑒相懸等級參差千累萬沓昆蟲則不逮飛禽飛禽則不逮犬馬昺明昭著不得謂之不然人品以上賢愚殊性不相窺涉不相曉解燕北越南未足云匹其愚者則不辨菽麥悖者則不知愛敬自斯已上性識漸弘班固九品曾未概其萬一何者賢之與愚蓋由知與不知也愚者所知則少賢者所知則多而萬物交加群方緬曠情性曉昧理趣深玄由其塗求其理既有曉昧之異遂成高下之差自此相傾品級彌峻窮其原本盡其宗極互相推仰應有所窮其路既窮無微不盡又不得謂不然也且五情各有分域耳目各有司存心運則形忘目用則耳廢何則情靈淺弱心慮雜擾一念而兼無由可至既不能兼紛糾遞襲一念未成他端互起互起眾端復同前矣不相兼之由由於淺惑惑淺為病病於滯有不淺不惑出於兼忘以此兼忘得此兼照始自凡夫至於正覺始惑於不惑不兼至能兼又不得謂不然也又昆蟲夭促含靈靡二或朝生夕殞或不識春秋自斯而進修短不一既有其短豈得無長虛用損年善攝增壽善而又善焉得無之又不得謂之不然也生既可夭則壽不可無夭夭既無矣則生不可極形神之別斯既然矣形既可養神寍獨異神妙形麤較然有辨養形可至不朽養神安得有窮養神不窮不生不滅始末相較豈無其人自凡及聖含靈義等但事有精麤故人有凡聖聖既長存在凡獨滅本同末異義不經通大聖貽訓豈欺我哉廣弘明集二十二難范縝神滅論來論云形即是神神即是形又云人體是一故神不得二若如雅論此二物不得相離則七竅百體無處非神矣七竅之用既異百體所營不一神亦隨事而應則其名亦應隨事而改神者對形之名而形中之形各有其用則應神中之神亦應各有其名矣今舉形則有四肢百體之異屈伸聽受之別各有其名各有其用言神唯有一名而用分百體此深所未了也若形與神對片不可差何則形之名多神之名寡也若如來論七尺之神神則無處非形形則無處非神矣刀則唯刃獨利非刃則不受利名故刀是舉體之稱利是一處之目刀之與利既不同矣形之與神豈可妄合邪又昔日之刀今鑄為劍劍利即是刀利而刀形非劍形於利之用弗改而質之形已移與夫前生為甲後生為丙夫人之道或異往識之神猶傳與夫劍之為刀刀之為劍有何異哉又一刀之質分為二刀形已分矣而各有其為利今取一牛之身而剖之為兩則飲齕之生即謝任重之為不分又何得以刀之與利譬形之與神邪來論謂刀之與利即形之有神刀則舉體是一利形則舉體是一神神用於體則有耳目手足之別手之用不為足用耳之用不為眼用而利之為用無所不可亦可斷蛟蛇亦可截鴻雁非一處偏可割東陵之瓜一處偏可割南山之竹若謂利之為用亦可得分則足可以執物眼可以聽聲矣若謂刀背亦有利兩邊亦有利但未鍛而銛之耳利若遍施四方則利體無處復立形方形直竝不得施利利之為用正存一邊毫毛處耳神之與形舉體若合又安得同乎刀若舉體是利神用隨體則分若使刀之與利其理若一則胛下亦可安眼背上亦可施鼻可乎不可也若以此譬為盡邪則不盡若謂本不盡邪則不可以為譬也若形即是神神即是形二者相資理無偏謝則神亡之日形亦應消而今有知之神亡無知之形在此則神本非形形本非神又不可得強令如一也若謂總百體之質謂之形總百體之用謂之神今百體各有其分則眼是眼形耳是耳形眼形非耳形耳形非眼形則神亦隨百體而分則眼有眼神耳有耳神耳神非眼神眼神非耳神也而偏枯之體其半已謝已謝之半事同木石譬彼僵尸永年不朽則此半之神亦應與此半同滅半神既滅半體猶存形神俱謝彌所駭惕若夫二負之尸經億載而不毀單開之體尚餘質於羅浮神形若合則此二士不應神滅而形存也來論又云欻而生者欻而滅者漸而生者漸而滅者請借子之衝以攻子之城漸而滅謂死者之形骸始乎無知而至於朽爛也若然則形之與神本為一物形既病矣神亦告病形既謝矣神亦云謝漸之為用應與形俱形以始亡末朽為漸神獨不得以始末為漸邪來論又云生者之形骸變為死者之骨骼案如來論生之神明生之形骸既化為骨骼矣則生之神明獨不隨形而化乎若附形而化則應與形同體若形骸即是骨骼則死之神明不得異生之神明矣向所謂死定自未死也若形骸非骨骼則生神化為死神生神化為死神即是三世安謂其不滅哉神若隨形形既無知矣形既無知神本無質無知便是神亡神亡而形在又不經通若形雖無知神尚有知形神既不得異則向之死形翻復非枯木矣廣弘明集二十二述僧設會論夫修營法事必有其理今世召請眾僧止設一會當由佛在世時常受人請以此擬像故也而佛昔在世佛與眾僧僧伽藍內本不自營其食具也至時持鉢往福眾生今之僧眾非唯持中者少乃有腆恣甘腴廚膳豐豪者今有加請召竝不得已而後來以滋腴之口進蔬䔩之具延頸慼頞固不能甘既非樂受不容設福非若在昔不得自營非資四輩身口無託者也此以求福不其反乎篤而論之其義不爾何者出家之人本資行乞戒律昺然無許自立廚帳并畜淨人者也今既取足寺內行乞事斷或有持鉢到門便呼為僧徒鄙事下劣既是眾所鄙恥莫復行乞悠悠後進求理者寡便謂乞食之業不可復行白淨王子轉輪之貴持鉢行詣以福施者豈不及千載之外凡庸沙門躬命僕豎自營口腹者乎今之請僧一會既可髣像行乞行乞受請二事不殊若以今不復行乞又不請召則行乞求法於此永冥此法既冥則僧非佛種佛種既離則三寶墜於地矣今之為會者宜追想在昔四十九年佛率比丘入城乞食威儀舉止動目應心以此求道道其焉適若以此運心則為會可矣廣弘明集二十四述僧中食論人所以不得道者由於心神昏惑心神所以昏惑由於外物擾之擾之大者其事有三一則勢利榮名二則妖妍靡曼三則甘旨肥濃榮名雖日用於心要無晷刻之累妖妍靡曼方之已深甘旨肥濃為累甚切萬事云云皆三者之枝葉耳聖人知不斷此三事求道無從可得不得不為之立法使簡而易從也若直云三事惑本竝宜禁絕而此三事是人情所甚惑念慮所難遣雖有禁約之旨事難卒從譬於方舟濟河豈不欲直至彼岸河流既急會無直濟之理不得不從流邪靡久而獲至非不願速事難故也禁此三事宜有其端何則食之於人不可頓息其於情性所累莫甚故推此晚食併置中前自中之後清虛無事因此無事念慮得簡在始未專在久自習於是束以八支紆以禁戒靡曼之欲無由得前榮名眾累稍隨事遣故云往古諸佛過中不餐此蓋是遣累之筌蹄適道之捷徑而或咸謂止於不食此乃迷於向方不知厥路者也廣弘明集二十四
