body:
  text: 劉潛歎別賦在羈旅兮為思每居常而不樂意難偕於駘蕩情易邀於隕穫愁非和而自來憂試排而不卻退求己以自省慨撫襟而太息位不俟於一進髮徒彰於二色名有似於務耕學無均於譬織在初歸之為慶庶因拙而自收保私庭之宴喜共昆弟而嬉遊校小文於搖筆比楷式於臨流止每歡於接膝行如喜於同輈忽一去而數千遂離居而別域阻同被於當寐乖共餐於終食唯憑遠望以代歸負相思其無力藝文類聚三十初學記十八為臨川王解司空表臣以庸薄謬竊隆重職班三事任揔六條衣袞坐槐既闕論道馳傳憩棠尤慚為政而俯司土地仰燮陰陽棟撓之譏已彰愆伏之咎爰著今水沴乃作旱魃為災山無薈蔚雲成煙火陛下曲私未垂策免臣職是當於何逃責乞降茲台步協此天人藝文類聚四十七御覽二百八為安成王讓江州表臣聞失晨之雞雖不忘於改旦敗駕之馬終取忸於銜鑣臣昔牧淮岱皇風咫尺一變至道易以為政而亂政莫理美錦徒傷豈可復宣六條闡化千里又臣聞六轡沃若不策玄黃之馬九成輪奐無求擁腫之材何則蹐局之路已窮梁棟之用斯闕並藝文類聚五十為南平王讓徐州表竊以淮岱務殷事乖坐嘯枌榆望重非可臥治臣綿頓枕席動移旬晦恆恐尺波易流寸陰難保寧可復冒此寵應茲恩榮藝文類聚五十為臨川王解揚州臣自馳傳斗牛作牧淮海政刑兩空璿璣六運既昧弛張之要尤慚大小之獄故以結詠濡翼取愧能官每一進思無忘退食誠復恩私可憑而彝倫難紊敢恃慈弘冒披心款乞解州任少弭素餐為鄱陽嗣王初讓雍州表臣大邦維屏既慚宗子之詩思樂泮宮有缺僖公之頌特以周開元伯錫壤參墟漢啓三倕分圭舊楚身私家慶總集微躬擁部襟帶跨制數州西距嶢關南踰鄧塞雖復呼韓來朝稿街納質二虜尋戈四郊無警猶如王戎雅識羊祜尚義臣求諸己無或宴安進思盡忠歸乎犯謁藝文類聚五十為李揚州舅讓表人心彼此盡為敵國金柝夜警和門晝閉加以淮水渺漫危同三坂懷山之勢已成為魚之期可見若使身死可以益國城沒足用報恩雖葬魚鱉其甘如薺政以朽耄無庸心負恩寄恥辱之甚非止老臣藝文類聚五十為晉安王讓丹陽尹表臣聞盈尺徑寸易取琢磨南箕北斗難為簸挹何則良工質美在器成珍假名責實涉求必殆藝文類聚五十為雍州柳津請留刺史晉安王表楚備寶臣秦兵不入齊多君子魏珠恥昭足使文公懼而側席孟軻歎而廢寢敢言借寇之願切望申耿之恩陛下昔在潛龍因茲或躍固以陋膴膴於周原包匆匆之佳氣昔次君出撫近駕班輪喬卿在政遙授袞服焉馮熊軾而督盜御龍章而行部無虧燮理有光司牧藝文類聚五十二為江僕射禮薦士表階下緝禮裁樂化俗移風當扆思治分宵夢相枯岸之珠既掄潤山之玉已薦伏見兼太學博士會稽賀瑒字德璉幼能斧藻長則琢磨結卷就賢擔簦來學鄉孰染其丹采朋友扣其洪鍾聲無愧於東筠材有踰乎西杞如使聯事宗伯握蘭建禮庶用得其才人知自勗臣鑒非止水職豫搜揚前竭謏聞先自鄉曲為江侍中薦士表臣聞天道不言資寒暑而成歲宸居垂拱寄守宰以宣風若夜魚不欺朝琴在奏則殘殺自去汾射可追伏見鎮北府水曹參軍濟陽江興字休恭立身貞白操業清廉頗涉書記彌間刀筆前攝縣沮漳無傷錦製巡行淮海不忝繡衣若處以百里之邑使導一鄉之賦必能治文無害迄用有成臣舉不避族非欲異姓居後知人為難實緣所悉而薦藝文類聚五十三為臨川王奉詔班師表臣自受服廟堂申威塞表既驅熊羆之衆兼稟帷幄之謀登濟河山夷滅趙魏將繫軹道之頸且屈渭橋之膝而玄陰屆節祁寒方始降此慈弘愍茲介胄使燕然之石願勒而不刊函谷之土將封而莫遂雖荷杕杜之恩終慚采薇之旨藝文類聚五十九為始興王上毛龜表臣聞嘉瑞五靈既著方策故名千載可得而傳是以玄蔡赤文來表軒黃之政神龜青純用顯姬公之德出自江安實荷謙夷之慶甲生毳羽寧非銷謫之徵實皇家之巨瑞庶民之休幸藝文類聚九十九彈賈執傅湛文梁大同中長兼御史中丞劉孝儀稽首言南康嗣王府行參軍知譜事賈執與前中書舍人傅湛在王座飲酒時上不安人從臺還聖體已和湛乃揚眉瞋目謂執曰卿念天子我不見闕出悖慢言語連及於上共執忿諍湛昔經殺牛誤父自殺近效殘貪賄賂狼藉特逢解網宥其餘命自被棄廢尤懷怨憤謗訕不遜謹按前兼通事舍人臣傅湛才薄駑蹇特荷抽擢自預左右頻蹈極刑押對鞠書纍逢闕過未聞報效反懷恚憤聖體不安臣下憂懼而湛敢生怨望輕肆慢辭醜爭及父心無愛敬戲語連上罪同悖逆未央馬瘦不覩廄令之忠甘泉道蕪遽見扶風之罪宜其徇乎東市尸彼轂門南康嗣王府參軍臣賈執始間湛語初無逐雀之心末因私忿遂顯懷鴆之逆雖迹似折姦意由肆憾惡慢於人自彰穢醜見辱父子已會季倫之辭爭及其父復入梁蚡之難是使王嬙悲於連纍黑要喜於得用太子舍人始興蕃王臣蕭毅幸因祉祚爵預藩屏而散金失所設醴乖人雍容之賓未遊於雕苑號怒之容日醉於雷池致使博徒跅弛慢醉盈路靦顏受辱會無發糾並恕伯厚之心俱鳴路粹之責臣等參議請以見事依法免毅所居官解執知譜事請議貶黜付之卿論不得廁預官流刺尚施行輒不禁止文苑英華六百四十九從弟喪上東宮啓亡從弟遵百行無點千里立志同氣三荊之友假寢十起之慈皆體之於自然行之如俯拾自碣宮陪宴釣臺從幸攀附鱗翼三十餘載茫昧與善一旦長辭劍匿光芒璧碎符采躬搖神筆親動妙思雖每想南皮書憶阮瑀行經北館歌悼子侯不足輩此深仁齊茲舊愛藝文類聚二十一為王儀同謝國姻啓即日主書王靜民宣敕安吉主降嬪臣第三息實臣素里庸族蓬衡賤品事隔伊緡之禮望絶下嫁之姬而聖慈猥洽皇姻曲建荊布陋飾已膺凡獎負薪微胤復降肅雍頻煩叨荷內外榮抃藝文類聚四十謝東宮賜五色藤筌蹄一枚啓炎州采藤麗窮綺縟謝女出門宮賜紋絹燭啓孝儀啓左右袁文成奉宣旨宜知臣私營發遣垂賜紋絹二十匹燭二十挺臣家本貧敝事多蹇闕桓室金縷本非所宜孟姬作具猶若未周殊澤曲臨珍華兼重制為美服雙綺易儔秉而不息三夜有待臣名品卑末事隔榮賜慈渥之墜實見因心小人微賤豈能勝報不忘初學記二十五除建康令謝啓所恐長安少年易為操彈渭城遊徼矜其獨勇清路道奴固知難懾輕綏飛駕且見為榮藝文類聚五十為晉安王謝東宮賜玉環刀啓苗鋒珍鋌利極鉤芒謹當擁以雄身藉而安體不令北海小雍孤擅穿滕之寄廬江佩刀獨表不欺之驗藝文類聚六十御覽三百四十六為王儀同謝宅啓昔晏嬰湫隘齊景營其爽塏孫歷無家晉武為之築館或功高千載德重一時故蒙考室之榮以降葺宇之澤並辭而處傳芳前載臣才愧昔人恩同往哲豈宜妄荷重增疵吝但胸奴未滅遽當輪奐之美環堵為室遂得歌哭於斯為武陵王謝賜第啓竊以南望朱鳥北距蒼龍右帶御溝左回青路畢晏嬰之湫隘同潘嶽之間居臣幼自宮掖長遊城府雖輪奐之美多門而館第之私未暇今輕舟將反高門遽錫遂葺家築室百堵皆興雲屋連甍一朝弘敞藝文類聚六十四謝晉安王賜銀裝絲帶啓雕鏤新奇織製精潔越中玉女不得關思上方名匠莫能議巧人情駭觀如見買臣之綬望貌移姿似逢子訓之術藝文類聚六十七謝始興王賜花紈簟啓麗兼桃象周洽昏明便覺夏室已寒冬裘可襲雖九日煎沙香粉猶棄三旬沸海團扇可捐藝文類聚六十九謝東宮賚酒啓異五齊之甘非九醞之法屬車未曾載油囊不得酤試儔仙樹葛玄泥首才比蒲桃孟他銜璧固知託之養性妙解怡神擬彼聖人羞得連類藝文類聚七十二謝晉安王賜宜城酒啓孝儀啓奉教垂賜宜城酒四器歲暮不聊在陰即慘於斯二理總萃一時少府鬭猴莫能致笑大夫落雉不足解顏忽值瓶瀉淑芳壺開玉液漢樽莫過殷杯未逢方平醉而遁仙羲和耽而廢職仰憑殊途便申私飲未矚罍恥已觀幘岸傾耳求音不聞霆擊澄神密眂豈覿山高愈疾消憂於斯已驗遺榮忽賤即事不欺酩酊之中猶知銘荷不任謹啓事初學記二十六謝晉安王賚蝦醬啓龍醬傳甘退成可陋蚳醢稱貴追覺失言上聖聞雷未之能覆嘉賓流啜羞無辭窶藝文類聚七十二御覽八百六十五謝鄱陽王賜鉢啓珍窮貨貢製極範金用貴寶樽文包龍鼎雕鏤海籍圖載山經閲衆靈於器中弄神姦於掌裏足令任后所欲遠慚漢世少君有覿遙荒齊寢藝文類聚七十三謝東宮賜城傍橘啓多置守民晉為厚秩坐入縑素漢譬封君固以俯匹穰橙俯連楚柚寧似魏瓜借清泉而得冷豈如蜀食待飴蜜而成甜重似倒影陽池垂華金堞信可珍若榴於式乾貴蒲萄於別館藝文類聚八十六謝晉安王賜甘啓便得削彼金衣咽茲玉液甘踰萍實冷亞冰壺立消煩䬼頓除酩酊追嗤齊相進不剖之實遠笑魏君逢裂牙之味藝文類聚八十六初學記二十八謝始興王賜奈啓酒泉之實稱於王賦瓜州之味記自張文亦有太沖嗟其夏成子建畼其寒熟潘園曜白孫井浮朱并見重於昔時而霑恩於茲日藝文類聚八十六為晉安王謝賜鵝鴨啓形類沈文經符陶記晉臣羞筮吳覡未占復有背如車蓋胸垂卻月口疑犀𣡩腳似魚懸出九芝之池去千金之沼藝文類聚九十一謝豫章王賜馬啓出自北冀來從東道儛越兩驂驅同八駿循坂且厲無復良樂之鳴長楸可走不假幽并之策藝文類聚九十三謝始興王賜車牛啓下官安於躡屩習以成性乘堅驅駿未可厝心慈渥無涯每垂獎飾無復難載之朋將申共弊之美濯龍望水未足儔光長門聽雷不能均響觀其毛角相合骨像應圖曳流水而生光騖高限其如接遂使上阜輟駕下澤是驅馮軾修途既獲坐馳之致馴豢廣庭方念載憂之勗藝文類聚九十四北使還與永豐侯蕭撝書足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屆氈鄉雜種覃化頗慕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易饜王程有限時及玉關射鹿胡奴乃共歸國刻龍漢節還持入塞馬銜苜蓿嘶立故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦碗未改朱顏略多自醉用此終日亦以自娛藝文類聚五十三初學記二十御覽七百七十九探物作豔體連珠妾聞洛妃高髻不姿於芳澤玄妻長髮無籍於金鈿故雲名由於自美蟬稱得於天然是以梁妻獨其妖豔衛姬專其可憐妾聞芳性深情雖欲忘而不歇薰芬動慮事逾久而更思是以津亭掩馥秖結秦婦之恨爵臺餘妬追生魏妾之悲藝文類聚五十七文苑英華七百七十一平等寺剎下銘香薪已燎花疊盡然頻果絶其軟言綿毫收其廣照紺鉢遺采託慕所依紅爪餘暉申悲是寄因使金表爭構玉剎競修豈止天界飾其四園龍宮陳其七寶樹似菴林峰疑鷲色孕吐仙霧涌瀨靈泉燕室緣雲精廬切漢制兼祕殿采美御房羲和假道於罘罳翔鸞回翼於飛棟建章厭勝未及雕礱甘泉避暑豈窮輪奐檻綴玫瑰階填粟玉絡以如意飾用沈檀火齊勝明燭銀揚采釋梵奪其身光日車貶其輪照辭曰惟茲寶塔妙迹可傳盤稱鄴境樓美湆川雙龍虛繞九鳳徒懸豈如神剎耿介淩煙珠含魄月幡垂淨天寶鐸夜響銀地朝鮮簷棲迥霧砌卷香蓮翻蠡下梵墜鶴歸仙恆沙擾擾世界綿綿踐茲勝影袪彼蓋纏藝文類聚七十七雍州金像寺無量壽佛像碑昔堯乃則天莫能名其聖丘才譬日無德稱其道況復欲宣五品將歎三法固使迦葉恥其無智龍樹羞其非辨猶聞獻蓋長者頌以七言無學比丘陳其百句至有九輩性生一身補處塵洗玉池神聞金葉樹聲繁會趙簡於是未聞地寶焜煌周穆之所不見昔者出城石轉還林現疾夢樹既沈梵花獨反猶有香杖疊衣紅爪紺髮可得崇以妙利顯用珍函彼彌陀感化殊攝日輪照曜月面從容毫散珠輝脣開異色似含微笑俱注目於瞻仰如出軟言咸傾耳於諦聽像復以其夕出住寺門始則映顯巖間猶對鷲山之禮末又徘徊閫外似救毗城之疾空中生樹豈曰難思火內披蓮未為多有銘曰奄有淨國寶應多祉葉産梵童花開釋子玉蓮交映銀荷遞起伊尹慚桑伯陽羞李藝文類聚七十六謝賚官紙啓臣與謝嘏俱慚棊聖臣之衝梯實愧魯般之巧嘏之城壘特無禽子之守攻弱侮亡其勞甚薄策勳行賞為渥過隆雖復鄴殿鳳銜漢朝魚網平準桃花中宮穀樹固以慚茲靡滑謝此鮮光藝文類聚五十八婚謝晉安王賜錢啓孝威問吉已通請期有日而賢夫之譽多愧張耳非壻之才偶同王粲眷言前事良以自羞曲降隆慈俯垂珍錫便使禽贄獲舉纁幣有資佩服寵靈殞越非報藝文類聚六十六謝敕賚畫屏風啓昔紀亮所隔唯珍雲母武秋所顧大寶琉璃豈若寫帝臺之基拂崑山之碧畫巧吳筆素踰魏賜馮商莫能賦李尢誰敢銘藝文類聚六十九謝賚錦被啓色豔蒲萄采踰聯璧鄂君慚繡楚侍羞珠雖復帝賜鶴綾客贈鴛綺高懸麗藻遠謝鮮明漢老悅其怪文魏馬驚其香氣藝文類聚七十御覽七百七謝東宮賜聖僧餘饌啓齊桓柏寢之器周穆軒宮之寶乳糜香飯素糗漿五杏七桃靈瓜仙棗莫不氣馥上天薰流下界石崇芳果金谷僅於萬株陳湯木滋杜陵幾于千樹猶自高謝珍奇多慚品族藝文類聚七十二謝東宮賜淨饌啓糜獻牛牧飯出龍宮千品甘露之食百花珍藥之果餅兼髓乳漿苞蔗奈雕盤流其滋旨寶器委其包香足使五世長者羞彼識味一角仙人恥其呪術微物多幸叨奉曲恩性命可捐殊私難答藝文類聚七十二謝東宮賚鹿脯等啓上林絶胡人之搏禁地無張京之犯而猶有班超之遊獵李廣之馳射遠歸於廚吏入貢於臘人形圖三事之車影入九仙之鏡藝文類聚七十二御覽八百六十二謝東宮賚炭啓洛城雪深不見海神之迹滹沱冰合無待王霸之覘聚而為嶽大壯黑山稱之以船將重牙獸爐生烽焰室滿紅光雉裘入而識奢鼠布焚而無污謝東宮賚藕啓色華玉樹味奪瓊漿根出楊池聞之僮約子為靈散得自莊篇楚后江萍秦公海棗凡厥水羞莫敢相輩藝文類聚八十二謝賜㮈啓孫井浮朱初學記二十八為皇太子謝敕賚功德馬啓伏惟忘我徇物屈己濟民該天地而大捨總日月而為施既脫𨋗於金輪又解驂於紺馬出余吾之水服騊駼之廄名高夏后之龍價倍田方之贖謹當秣以柏葉飴以丹棗加之玉鞍飾之金絡藝文類聚九十三謝賚熊白啓竊以館有射熊之名臺無走狗之號上林絶胡人之搏禁地無張京之犯而突出羽川來攀御檻光踰厚璧殆惑朱公之價色麗燭銀將堪穆王之寶藝文類聚九十五謝賚林檎書勇聞齊國止錫二桃遠至仙方裁蒙數棗豈如恩豐漢篋賜廣魏奩姹女數而僅通算郎計而方得生於玉井之側出自金膏之地上靈所貴下土希逢藝文類聚八十七謝南康王餉牛書雖復蜀守神牛秦公怒特穆王白角何氏瑩蹄無以逾其徑力邁其致遠直宿九重獲免疏步路休三徑且息徒行從祀甘泉方無假於丞相騎至清廟又永笑於博陽藝文類聚九十四正旦春雞贊寶雞陳倉祠光表神雄飛帝漢雌鳴霸秦排膺激怒礴翅張瞋電鞭失焰雷車折輪助摽魏教擅場齊珍名流晉戟歌傳漢臣竊脂善盜摶穀難馴緑鸚智淺蒼鷹害深兼姿五德歸于翰音藝文類聚九十一辟厭青牛畫贊泰山怒特吳渚神牛氣噓風噴精回電流詎牽和鞅不入裴鞦狡力難京肆怒橫行朗陵瑩角介葛瞻聲遁仙託稱妖寇馮名名震八區威陵五都蓄勇槽側息憤場隅仇覽獻豆滕嬰進芻雄兒楷式悍士規模曹興拂采徐邈成圖藝文類聚九十四
