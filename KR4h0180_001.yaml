body:
  text: 武帝孝思賦并序想緣情生情緣想起物類相感故其然也每讀孝子傳未嘗不終軸輟書悲恨拊心嗚咽年未髫齔內失所恃餘喘竛竮嬭媼相長齒過弱冠外失所怙限職荊蠻致闕晨昏江途遼敻家無指信髣髴行路先君體有不安晝則輟食夜則廢寢方寸煩亂容身無所便投刺解職以遵歸路于時齊隋郡王子隆鎮撫陜西頻煩信命令停一夕明當早出江津送別心慮迫切不獲承命止得小船望星就路夜冒風浪不遑寍處途次定陵船又損壞于時門賓周仲連為鵲頭戍主借得一舸奔波兼行屢經危險僅而獲濟及至戾止已無逮及五內屠裂肝心破碎便欲歸身山下畢志墳陵長兄哀愍未說獨行續有北問狡虜寇邊朝廷以先君遺愛結民咸思在昔故舊部曲猶有數千武慶宗將領留防彼鎮時便有旨使扞壽春王事靡盬辭不獲免刺史崔慧景志懷翻覆遠招逋逃多聚姦俠大猾凶醜莫不雲集至如彭盆韓元孫等不可稱數倍道電邁奄至淮淝凶徒疑駭相引離散臺軍主徐玄慶房伯玉等欲襲取慧景乃固禁之方得止息是歲齊明作相疑論未決密馳表疏勸徵慧景折𥳑而召必不違拒即重遣還以安其心姦渠既出緣邊無虞旬朔之閒慧景反鎮即便解甲以歸京師因爾驅馳不獲停息數鍾百六時會雲雷撥亂反正遂膺四海念子路見於孔丘曰由事二親之時常食藜藿之食為親負米百里之外親歿之後南遊於楚從車百乘積粟萬鍾累茵而坐列鼎而食願食藜藿之食為親負米不可復得每感斯言雖存若亡父母之恩云何可報慈如河海孝若涓塵今日為天下主而不及供養譬猶荒年而有七寶饑不可食寒不可衣永慕長號何解悲思乃於鍾山下建大愛敬寺於青溪側造大智度寺以表罔極之情達追遠之心不能遺蓼莪之哀復於宮內起至敬殿竭工匠之巧盡世俗之奇水石周流芳樹雜沓限以國事亦復不能得朝夕侍食唯有朔望親奉饋奠雖復薦珍羞而無所瞻仰內心崩潰如焚如灼情切於衷事形於言乃作孝思賦云爾感四氣之變易見萬物之化成受天和而異命稟地德而齊榮察蟭螟於蚊睫觀鵾鵬於北溟彼含識而異見同有色而殊形雖萬類之眾多獨在人而最靈禮義別於飛走言語異於鸚猩念過隙之儵忽悲逝川之不停踐霜露而悽愴懷燧穀而涕零掩此哀而不去亦靡日而弗思仲由念枯魚而永慕丘吾感風樹而長悲雖一志而捨生奉二親而何期思因情生情因思起導情源以流澍引思心而無已既懷憂以終身亦銜恤而沒齒常閒居以永念獨拊膺而自傷徒升岵而靡瞻空陟屺其何望涕縱橫以交流血沸涌而沾裳覽地義以自咎懼滅性之乖方仰太極以長懷乃告哀於昊蒼冀皇天之有感何報施之茫茫曉百碎於魏闕夜萬斷於中腸心與心而相續思與思而未央晨孤立而縈結夕獨處而徊徨氣塞哀其似噎念積心其若狂至如獻歲發暉春日載陽木散百華草列眾芳對樂時而無歡乃觸目而感傷朱明啟節白日朝臨木低甘果樹接清陰不娛悅於懷抱但罔極而纏心兼葭蒼蒼白露為霜涼氣入衣淒風動裳心無迫而自切情不觸而獨傷若乃寒冰已結寒條已折林飛黃落山積白雪旅雁鳴而哀哀朔風鼓而颲颲目觸事而破碎心隨感而斷絕無一息而緩念與四時而長切年揮忽而莫反時瞬睒其如電想慈顏之在昔哀不可而重見痛生育之靡荅顧報復而無片悲與恨其俱興涕雜血其如霰燕青春而差池鴻素秋而翱翔去來候於節物飛鳴應於陰陽何在我而不爾與二氣而乖張常茹酷而輪迴歷日夜而不忘既視丹而成綠亦見白而為黃擾性情以翻覆汩神慮而迷荒想鳴鶴而魂斷聽孤雛而心死慟終天而無怙號畢世而靡恃觀休屠之日磾豈教義之所及見甘泉之畫像每下拜而垂泣忽心動而不安遽入侍於帝室值何羅之作難乃捨之以投瑟超王臣之稱首冠誠勇而無匹士行己之多方見石他之有權身雖死而名揚乃忠孝而兩全顧丁蘭其何人家河內之野王時舞象而方及始成童而親亡刻木母以供事常朝夕而在傍劉鎮就養而不暇常遠汲而力寡苦節感於幽靈醴泉生於竈下顧長沙之臨湘有古初之道始時父歿而未葬遇鄰火之卒起乃伏棺而長號雨暴至而火死又何琦其亦然獨柩屋而全止至如王祥黃雀入帳隗通橫石特起盛彥之開母目邢渠之生父齒覽斯事而眾多亦難得而具紀靈蛇銜珠以酬德慈烏反哺以報親在蟲鳥其尚爾況三才之令人治本歸於三大生民窮於五孝置天地而德盈橫四海而不撓履斯道而不行吁孔門其何教釋藏策七廣弘明集二十九上又略見藝文類聚二十初學記十七賦體草迴風以照春木承雲以含化芳競飛於陽和花爭開於日夜樂萬類之得所豈此心之云舍欣分竹其厲精慚戎車之屢駕藝文類聚五十六淨業賦并序少愛山水有懷丘壑身羈俗羅不獲遂志舛獨往之行乖任縱之心因爾登庸以從王事屬時多故世路屯蹇有事戎旅略無寍歲上政昏虐下豎姦亂君子道消小人道長御刀應敕梅蟲兒茹法珍俞靈韻豐勇之如是等多輩誌公所謂亂戴頭者也誌公者是沙門寶誌形服不定示見無方于時群小疑其神異乃羈之華林外閤公亦怒而言曰亂戴頭亂戴頭各執權軸入出號令威福自由生殺在口忠良被屠馘之害功臣受無辜之誅服色齊同分頭各驅皆稱帝主人云尊極用其詭詐疑亂眾心出入盤遊無忘昏曉屏除京邑不脫日夜屬纊者絕氣道傍子不遑哭臨月者行產路側母不及抱百姓懍懍如崩厥角長沙宣武王有大功於國禮報無報酷害奄及至於弟姪亦罹其禍遂復遣桓神與杜伯符等六七輕使以至雍州就諸軍帥欲見謀害眾心不與故事無成後遣劉山陽灼然見取壯士貙虎器甲精銳君親無校便欲束身待戮此之橫暴出自群小畏壓溺三不弔況復姦豎乎若默然就死為天下笑俄而山陽至荊州為蕭穎冑所執即遣馬驛傳道至雍州乃赫然大號建牙豎旗四方同心如響應聲以齊永元二年正月發自襄陽義勇如雲舳艫翳漢竟陵太守曹景宗馬軍主殷昌等各領騎步夾岸迎候波浪逆流亦四十里至朕所乘舫乃止有雙白魚跳入䑽前義等孟津事符冥應雲動天行雷震風馳郢城剋定江州降款姑熟甲冑望風退散新亭李居士稽首歸降獨夫既除蒼生甦息便欲歸志園林任情草澤下逼民心上畏天命事不獲已遂膺大寶如臨深淵如履薄冰猶欲避位以俟能者若其遜讓必復魚潰非直身死名辱亦負累幽顯乃作賦曰日夜常思惟循環亦已窮終之或得離離之必不終負扆臨朝冕旒四海昧旦乾乾夕惕若厲朽索御六馬方此非譬世論者以朕方之湯武然朕不得以比湯武湯武亦不得以比朕湯武是聖人朕是凡人此不得以比湯武但湯武君臣義未絕而有南巢白旗之事朕君臣義已絕然後埽定獨夫為天下除患以是二途故不得相比朕布衣之時唯知禮義不知信向烹宰眾生以接賓客隨物肉食不識菜味及至南面富有天下遠方珍羞貢獻相繼海內異食莫不畢至方丈滿前百味盈俎乃方食輟筯對案流泣恨不得以及溫凊朝夕供養何心獨甘此膳因爾蔬食不噉魚肉雖自內行不使外知至於禮宴群臣餚膳案常菜食未習體過黃羸朝中班班始有知者謝朏孔彥穎等屢勸解素乃是忠至未達朕心朕又自念有天下本非宿志杜恕有云刳心擲地數片肉耳所賴明達君子亮其本心誰知我不貪天下唯當行人所不能行者令天下有以知我心復斷房室不與嬪侍同屋而處四十餘年矣於時四體小惡問上省師劉澄之姚菩提疾候所以劉澄之云澄之知是飲食過所致荅劉澄之云我是布衣甘肥恣口劉澄之云官昔日食那得及今日食姚菩提含笑搖頭云唯菩提知官房室過多所以致爾於時久不食魚肉亦斷房室以其智非和緩術無扁華默然不言不復詰問猶令為治劉澄之處酒姚菩提處丸服之病逾增甚以其無所知故不復服因爾有疾常自為方不服醫藥亦四十餘年矣本非精進既不食眾生無復殺害障既不御內無復欲惡障除此二障意識稍明內外經書讀便解悟從是已來始知歸向禮云人生而靜天之性也感物而動性之欲也有動則心垢有靜則心淨外動既止內心亦明始自覺悟患累無所由生也乃作淨業賦云爾觀人生之天性抱妙氣而清靜感外物以動欲心攀緣而成眚過恆發於外塵累必由於前境若空谷之應聲似遊形之有影懷貪心而不厭縱內意而自騁目隨色而變易眼逐貌而轉移觀五色之玄黃玩七寶之陸離著華麗之窈窕耽冶容之逶迤在寢興而不捨亦日夜而忘疲如英媒之在摘若駿馬之帶羈類白日之麗天乃歷年之不虧觀耳識之愛聲亦如飛鳥之歸林既流連於絲竹亦繁會於五音經昏明而不絕歷四時而相尋或亂情而惑慮或慆耳而堙心至如香氣馞起觸鼻發識婉娩追隨氤氳無極蘭麝夾飛如鳥二翼若渴飲毒如寒披棘舌之嗜味眾塵無有大苦鹹酸莫不甘口噉食眾生虐及飛走唯日不足長夜飲酒悖亂明行罔慮幽咎身之受觸以自安怡美目清揚巧笑蛾眉細腰纖手弱骨豐肌附身芳潔觸體如脂狂心迷惑倒想自欺至如意識攀緣亂念無邊靡懷善想皆起惡筌如是六塵同障善道方紫奪朱如風靡草抱惑而生與之偕老隨逐無明莫非煩惱輪迴火宅沈溺苦海長夜執固終不能改迍否相隨災異互起內懷邪信外縱淫祀排虛枉命蹠實橫死妄生神祐以招福祉前輪折軸後車覆軌殃國禍家亡身絕祀初不內訟責躬反己皇天無親唯與善人外清眼境內淨心塵不與不取不愛不嗔如玉有潤如竹有筠如芙蓉之在池若芳蘭之生春淤泥不能汙其體重昏不能覆其真霧露集而珠流光風動而生芬為善多而歲積明行動而日新常與德而相隨恆與道而為鄰見淨業之愛果以不殺而為因離欲惡而自修故無障於精神患累已除障礙亦淨如久澄水如新磨鏡外照多像內見眾病既除客塵又還自性三途長乖八難永滅止善既修行善無缺清淨一道無有異轍唯有哲人乃能披襟如石投水莫逆於心心清泠其若冰志皎潔其如雪在欲結其既除懷憂畏其亦滅與恩愛而長違顧生死而永別覽當今之逸少想後來之英童懷荊玉而未剖藏神器而存躬修聖行其不已信善積而無窮永劫揚其美名萬代流於清風豈伏強而稱勇乃道勝而為雄釋藏策七廣宏明集二十九上圍棊賦圍奩象天方局法地枰則廣羊文犀子則白瑤玄玉方目無斜直道不曲爾乃建將軍布將士列兩陣驅雙軌徘徊鶴翔差池燕起用忿兵而不顧亦憑河而必危癡無成術而好鬭非智者之所為運疑心而猶豫志無成而必虧今一棊之出手思九事而為防敵謀斷而計屈欲侵地而無方不失行而致寇不助彼而為強不讓他以增地不失子而云亡落重圍而計窮欲佻巧而行促劇疏勒之迍邅甚白登之困辱或龍化而超絕或神變而獨悟勿膠柱以調瑟專守株而待兔或有少棊已有活形失不為悴得不為榮若其苦戰未必能平用折雄威致損令名故城有所不攻地有所不爭東西馳走左右周章善有翻覆多致敗亡雖畜銳以將取必居謙以自牧譬猛獸之將擊亦俛耳而固伏若局勢已勝不宜過輕禍起於所忽功墜於垂成至如玉壺銀臺車廂井欄既見知於曩日亦在今之可觀或非劫非持兩懸兩生局有眾勢多不可名或方四聚五花六持七雖涉戲之近事亦臨局而應悉或取結角或營邊鄙或先點而亡或先撇而死故君子以之遊神先達以之安思盡有戲之要道窮情理之奧祕藝文類聚七十四制旨解釋天象金剛山自近天之南黑山則近天之北極準於金剛為偏而於南北為一心令上林館學士虞履及上林館倪徽仁劉乂道等具其度數開列於後開元占經一明堂制明堂準大戴禮九室八牖三十六戶以茅蓋屋上圓下方鄭玄據援神契亦云上圓下方又云八窗四達明堂之義本是祭五帝神九室之數未見其理若五堂而言雖當五帝之數向南則背叶光紀向北則背赤熛怒東向西向又亦如此於事殊未可安且明堂之祭五帝則是總義在郊之祭五帝則是別義宗祀所配復應有室若專配一室則是義非配五若皆配五則便成五位以理而言明堂本無有室又制若如鄭玄之義聽朔必在明堂於此則人神混淆莊敬之道有廢春秋云介居二大國之閒此言明堂左右个者謂所祀五帝堂之南又有小室亦號明堂分為三處聽朔既三處則有左右之義在營域之內明堂之外則有个名故曰明堂左右个也以此而言聽朔之處自在五帝堂之外人神有別差無相干隋書禮儀志一郊廟不宮懸制先儒皆以宗廟宜設宮懸案周官奏黃鍾歌大呂舞雲門以祀天神奏太簇歌應鍾舞咸池以祭地祇奏夷則歌小呂舞大濩以饗先妣奏無射歌夾鍾舞大武以享先祖虞書云戛擊鳴球搏拊琴瑟以詠祖考來格下管鼗鼓合止柷敔笙鏞以間周禮則分樂享祀虞書則止鳴兩懸求之於古無宮懸之文案所以不宮懸者事人禮縟事神禮𥳑禮器云天子之堂九尺而至敬不壇天子龍袞而至敬不文觀天下物無可以稱其德者則以少為貴郊特牲云宗廟之器可用也而不可便其利所以交於神也不可以同於所安樂之義也王肅初不分析此前數旨直言用天子之制若郊廟既均其制二神禮文復何以同今宜祀天地宗廟逐所應須便即設之則非宮非軒非判非特直以至敬所應施用耳通典一百四十七宗廟用迎送樂制禮云祭之日樂與哀半樂以迎來哀以送往尚書有高宗肜日之文詩著絲衣繹賓尸之作故儒者說言今日之祭明日又祭殷曰肜周以為繹肜繹之祭在乎門傍名以為祊此豈不以神靈不測於此庶或遇之殷人求陽周人求陰今既絕灌地之禮宜在求陽之義尸非神神非尸今可得言主非神神非主以不若爾主雖安於龕室神則無所不之送迎之樂彌會陰陽不測之理前儒之議如似可安今隨人所用通典一百四十七安成始興二王為慈母服制二王在遠諸子宜攝祭事梁書司馬筠傳議皇子為慈母服制禮言慈母凡有三條一則妾子之無母使妾之無子者養之命為母子服以三年喪服齊衰章所言慈母如母是也二則嫡妻之子無母使妾養之慈撫隆至雖均乎慈愛但嫡妻之子妾無為母之義而恩深事重故服以小功喪服小功章所以不直言慈母而云庶母慈己者明異於三年之慈母也其三則子非無母正是擇賤者視之義同師保而不無慈愛故亦有慈母之名師保既無其服則此慈母亦無服矣內則云擇於諸母與可者使為子師其次為慈母其次為保母此其明文此言擇諸母是擇人而為此三母非謂擇取兄弟之母也何以知之若是兄弟之母其先有子者則是長妾長妾之禮實有殊加何容次妾生子乃退成保母斯不可也又有多兄弟之人於義或可若始生之子便應三母俱闕邪由是推之內則所言諸母是謂三母非兄弟之母明矣子游所問自是師保之慈母非三年小功之慈母也故夫子得有此對豈非師保之慈母無服之證乎鄭玄不辨三慈混為訓釋引彼無服以注慈己後人致謬實此之由經言君子子者此雖起於大夫明大夫猶爾自斯以上彌應不異故傳云君子子者貴人之子也總言曰貴則無所不包經傳互文交相顯發則知慈加之義通乎大夫以上矣宋代此科不乖禮意便加除削良是所疑梁書司馬筠傳又南史司馬筠傳唱斷肉經竟制諸僧道諸小僧輩看經未徧互言無斷肉語今日此經言何所道所以唱此革屣文者本意乃不在此正為此三十三日法雲法師講涅槃斷肉事於時僧正慧超法寵法師難云若經文究竟斷一切肉乃至自死不得食者此則同尼乾斷皮革不得著革屣若開皮革得著革屣者亦應開食肉法雲法師乃已有通釋而二法師難意未了於時自仍通云若是聖人故自不著此物若中行人亦不著此著此皆是下行人所以不同尼乾者語有所舍若無麻紵之鄉亦有開皮革義論有麻紵處大慈者乃實應不著但此事與食肉不得頓同凡著一革屣經久不壞若食噉眾生就一食中便害無量身命況日日餐咀數若恆沙亦不可得用革屣以並斷肉於是諸僧乃無復往復恐諸小僧執以為疑方成巨弊所以唱此不受革屣文正欲釋一日所疑非關前制凡噉肉者是大罪障經文道昔與眾生經為父母親屬眾僧那不思此猶忍食噉眾生已不能投身餓虎割肉貿鷹云何反更噉他身分諸僧及領徒眾法師諸尼及領徒眾者各還本寺宣告諸小僧尼令知此意廣弘明集二十六
