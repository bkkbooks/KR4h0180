body:
  text: 陶弘景登真隱訣序昔在人間已鈔撰真經修字兩卷于時亦粗謂委密頃巖居務靜頗得恭潔試就遵用猶多闕略今更反覆研精表裏洞洽預是真學之理使了然無滯一字一句皆有字旨或論有以入無或據顯而知隱或推機而得宗或引彼以明此自非間練經書精涉道教者率然覽之猶觀海爾必須詳究委曲乃當曉其所以故道備七篇義同高品嘗聞古言非知之難其在行之意非學之難解學難也屢見有人得兩三卷書五六條事謂理盡紙上便入山修用動積歲月愈久愈昏此是未造門牆何由眄其帷席試略問粗處已自茫然皆答言經説止如此但謹依存行耳乃頗復開動端萌序導津流若直智尚許人脫能欣爾感悟詢訪是非至於愚迷矜固者便徑道君何以穿鑿異同評論聖文或有自執已見或云承師舊法永無啓發對揚之懷此例不少可為痛心夫經之為言徑也經者常也通也謂常通而無滯亦猶布帛之有經矣必須銓綜緯緒僅乃成功若機關疏越杼軸乖謬安能斐然成文真人立象垂訓本不為朦狡設言故每標通衢而恆略曲徑知可教之士自當觀其隅轍凡五經子史爰及賦頌尚歷代注釋猶不能辨況玄妙之祕途絶領之奇篇而可不探括沖隱窮思寂昧者乎既撰此真訣乃輟書而歎曰若使顧玄平在此乃當知我心理所得幾於天人之際往矣如何孰與言哉方將寄之於玄會耳本集真靈位業圖序夫仰鏡玄精覩景耀之巨細俯盼平區見巖海之崇深搜訪人綱究朝班之品序研綜天經測真靈之階業但名爵隱顯學號進退四宮之內疑似相參今正當比類經正讎校儀服埒其高卑區其宮域又有指目單位略説姓名或任同秩異業均迹別者如希林真人為太微右公而領九宮上相未委為北宴上清當下親相職邪諸如此類難可必證謂其並繼所領而從高域粗事事條辨略宣後章輒以淺識下生輕品上聖升降失序梯級乖本懼貽謫玄府絡咎冥司今所詮貫者實稟注之奧旨存向之要趣祈祝跪請宜委位序之尊卑對真接異必究所遇之輕重雖同號真人真品乃有數俱目仙人仙亦有等級千億若不精委條領略識宗源者猶如野夫出朝廷見朱衣必令史句驪入中國呼一切為參軍豈解士庶之貴賤辨爵號之異同乎本集本草序隱居先生在于茅山巖嶺之上以吐納餘暇頗遊意方技覽本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本經余以為信然昔神農氏之王天下也畫八卦以通鬼神之情造耕種以省殺生之斃宣藥療疾以拯夭傷之命此三道者歷衆聖而彌彰文王孔子彖象繫辭幽贊人天后稷伊尹播厥百穀惠被群生岐黃彭扁振揚輔導恩流含氣並歲踰三千民到于今賴之但軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至于桐雷乃著在於編簡此書應與素問同類但後多更修飾之爾秦皇所焚醫方卜術不預故猶得全録而遭漢獻遷徙晉懷奔迸文籍焚靡千百遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記又云有桐君採藥録説其花葉形色藥對四卷論其佐使相須魏晉以來吳晉李當之等更復損益或五百九十五或四百四十一或三百一十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有淺深今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百三十種精粗皆取無復遺落分別例條區畛物類兼注名時用土地所出及仙經道術所須并此序録合為七卷雖未足追踵前良蓋亦一家撰製吾去世之後可貽諸知音爾道藏尊字號陶隱居集藥總訣序上古神農作為本草凡著三百六十五種以配一歲歲有三百六十五日日生一草草治一病上應天文中應人道下法地理調和五味製成醪醴以備四氣為弗服欲其本立道生者也當生之時人心素朴嗜欲寡少設有微疾服之萬全自此之後世偽情澆智慮日生馳求無厭憂患不息故邪氣數侵病轉深痼雖服良藥不愈其後雷公桐君更增演本草二家藥對廣其主治繁其類族既世改情移生病日深或未有此病而遂設彼藥或一藥以治衆疾或百藥共愈一病欲以排邪還正為之原防故也而三家所列疾病互有盈縮或物異而名同或物同而名異或冷熱乖違甘苦背越採取殊法出處異所若此之流殆難按據尋其大歸神農之時未有文字至於黃帝書記乃興於是神農本草別為四經三家之説遞有損益豈非隨時適變殊途同歸者乎但本草之書歷代久遠既靡師受又無注訓傳寫之人遺誤相繼字義殘闕莫之是正方用有驗布舒合和本集肘後百一方序太歲庚辰隱居曰余宅身幽嶺迄將十載雖每植德施工多止一時之設可以傳芳遠裔者莫過於撰述見葛氏肘後救卒方殊足申一隅之思夫生民之所為大患莫急於疾疾而弗治猶救火而不以水也今輦掖左右藥師易尋郊郭之外已自難值況窮村迥陌遙山絶浦其間夭枉安可勝言方術之書卷帙徒煩拯濟殊寡欲就披覽回惑多端抱朴此製實為深益然尚有闕漏未盡其善輒更採集補闕凡一百一首以朱書甄別為肘後百一方於雜病單治略為周遍矣昔應璩為百一詩以針規心行今豫撰此蓋欲衛輔我躬且佛經云人用四大成身一大輒有一百一病是故身宜自想上自通人下逮衆庶莫不各加繕寫而究括之余又別撰效驗方五卷具論諸病證候因藥變通而並是大治非窮居所資若華軒鼎室亦宜修省耳葛氏序云可以施於貧家野居然亦不止如是今縉紳君子若常處間佚乃可披覽方書脫從祿外邑將命遐征或祗直禁闈晨宵閉隔或羈束戎陳城柵嚴阻忽驚急倉卒唯拱手相看曷若探之枕笥則可庸豎成醫故備論證候使曉然不滯一披條領無使過差也道藏尊字號陶隱居集藝文類聚七十五相經序相者蓋性命之著乎形骨吉凶之表乎氣貌亦猶事先謀而後動心先動而後應表裏相感莫知所以然且富貴壽夭各值其數董賢甫在弱冠便位過三公資半於國而裁出三十身摧家破馮唐袴穿郎署揚雄壁立高閣而並至白首或垂老玉食而官不過尉史或穎慧若神僅至髫齔或不辨菽麥更保黃耇此又明其偏有得也道藏尊字號陶隱居集難鎮軍沈約均聖論山民陶隱居仰咨論云前佛後佛其道不異周室受命象寄狄鞮隨方受職西國密邇厥路非遠唐虞三代不容未有事獨西限道未東流非為姬公所遺蓋由斯法宜隱燧人火粒變腥為熟蓋佛教之萌兆周孔二聖宗條稍廣見生不忍其死聞聲不食其肉草木斬伐有時麛卵不得妄犯又戒有五支四者犯人人為含靈之首一者害獸獸為生品之末內聖外聖義均理一咨曰謹按佛經一佛之興動踰纍劫未審前佛後佛相去宜幾釋迦之現近在莊王唐虞夏殷何必已有周公不言恐由未出非關宜隱育王造塔始敬王之世既閻浮有四則東國不容都無夫子以華禮興教何宜乃説夷法故歎中國失禮求之四夷亦良有別意且四夷之樂出要荒之際投諸四裔亦密邇危羽之野禹迹所之不及河源越裳白雉尚稱重譯則天竺罽賓久與上國殊絶衰周以後時或有聞故鄒子以為赤縣於宇內止是九州中之一耳漢初長安乃有浮屠而經像眇昧張騫雖將命大夏甘英遠屆安息猶不能宣譯風教闡揚斯法必其發夢帝庭乃稍就興顯此則似如時致通閡非關運有起伏也若必以緣應有會則昔之淳厚群生何辜今之澆薄群生何幸假使斯法本以救澆者夫為罪莫過於殺肉食之時殺孰甚焉而方俟火粒甫為教萌於大慈神力不有所躓乎若粳糧未播殺事難息未審前時過去諸佛復以何法為教此教之萌起在何佛兼四戒犯人為報乍輕一殺害獸受對更重首輕末重亦為未達夫立人之道曰仁與義周孔所云聞聲不食斬伐有時者蓋大明仁義之道於鳥獸草木尚曰其然況在乎人而可悖虐非謂內惕寡方意在緣報覩迹或似論情顧乖不審於內外兩聖其事可得是均以不此中參差難用頓悟謹備以咨洗願具啓諸蔽廣宏明集五樞域華陽頌十五首河篇徵往册孔記昭昔名三宿麗天秀兩金標地英質象宅無生乃有生有則還空靈構不待匠虛形自成功形位總神列三府分塗交五便陰暉迎夜晢晨精望曉懸標貫南峰秀玄鼎北嶺橫秦壁表裏玉沙津周回隱輪迹區別左帶柳汧水右浚陽谷川土懷北芒邑井冽鳳門泉迹號郭千峙留岸薑巴亘遠蹤靈廟或時饗別宅乃恆恭類附吳居非知地越冢詎隱遷樹蓋徒低蔭石竈未嘗煙物軌果林鬱餘奈蔬圃蔓遺辛熒芝可燭夜田泉嘗浣塵遊集降轡龜山客解駕青華童寢宴含真館高會蕭間宮才英清歌翔羽集長嘯歸雲翻孑絃有逸調空談無與言學稟標舍雷平下立靜連石陰上道已沖念飛華當軫心業運濟神既有在去留從所宜心迹何用顯冥途自相知挺契方隅遊瓊刃華陽棲隱居重離倘或似七元乃扶胥機萌號期行當滿亥數未終丁逮及承唐世將賓來聖庭誠期刊石玄窗上顯誠曲階門動靜願矜録不負保舉恩誠期本集茅山曲林館銘層嶺外峙邃宮內映仄穴旁通縈泉遠鏡尚德依仁祈生翊命且天且地若凡若聖連甍比棟各謂知道參差經術跌宕辭藻孰如曲林獨為徑好掩迹韜功守茲偕老藝文類聚七十八瘞鶴銘并序鶴壽不知其紀也壬辰歲得於華亭甲午歲化於朱方天其未遂吾翔寥廓耶奚奪我仙鶴之遽也乃裹以玄黃之幣藏乎茲山之下仙家無隱我故立石旌事篆銘不朽詞曰相此胎禽浮丘著經余欲無言爾也何明雷門去鼓華表留形義唯髣佛事亦微冥爾將何之解化西竹法里厥土惟寧後蕩洪流前固重扃左取曹國右割山陰爽塏勢掩華亭爰集真侶瘞爾作銘碑拓本又汪士鋐瘞鶴銘考吳太極左仙公葛公之碑道冠兩儀之先名絶萬世之始者固言語所不得辨稱謂所莫能筌焉云何以文字述今云何以金石傳古其遂休也則日月空照遂默也則生人長昏是故出關導以兩卷將升摛其五文令懷靈抱識之士知杳冥之有精焉自時厥後奕代間出雲篆龍章之牒炳發於林岫瓌辭麗氣之旨藻蔚於庭筵其可以垂軌範著謠誦者迄于茲辰昔在中葉甘左見駭於魏王象奉擅奇於吳主至如葛仙公之才英俊邁蓋見尤彰彰者矣公于時雖歷遊名嶽多居此嶺此嶺乃非洞府而跨據中川東視則連峰入海南眺則疊嶂切雲西臨江滸北旁郊邑斯潛顯之奧區出處之關津半尋石井日汲莫測其源三足白麂百齡不異其質精靈之所弗渝神祗之所司衛麻衣史宗之儔相繼棲託後有孫慰祖亦嗣居彌歲山陰潘洪字文盛少秉道性志力剛明前住餘姚四明隩國為立觀直上百里榛途險絶既術識有用為物情所懷天監七年郡邑豪舊遂相率輿出制不由乃以此山在五縣衝要舍而留止于茲十有五載將欲移憩壇上先有一空碑久已摧倒洪意以為蔭其樹者尚愛其枝況仙公真聖之遺蹤而可遂淪乎乃復建新碑於其所願勒名迹以永傳隱居不遠千里寓斯石而鐫之仙公姓葛諱玄字孝先丹陽句容都鄉吉陽里人也本屬琅耶後漢驃騎僮侯廬讓國於弟來居此土七代祖艾即驃騎之弟襲封僮侯祖短安平太守黃門郎從祖彌豫章等五郡太守父焉字德儒州主簿山陰令散騎常侍大尚書代載英哲族冠吳史公幼負奇操超絶倫黨神挺標峻精輝卓逸墳典不學而知道術才聞已了非復軌儀所範思識所該特以域之情理之外置之言象之表而已吳初左元放自洛而來授公白虎七變爐火九丹於是五通具足化遁無方孫權雖愛賞仙異而內懷猜害翻琰之徒皆被挫斥敬憚仙公動相咨稟公馳涉川嶽龍虎衛從長山蓋竹尤多去來天台蘭風是焉遊憩特還京邑視人如戲詭譎倜儻縱倒山河雖投鳧履墜叱羊石起蔑以加焉于時有人漂海隨風眇渀無垠忽值神島見人授書一函題曰寄葛公令歸吳達之由是舉代翕然號為仙公故抱朴著書亦云余從祖仙公乃抱朴三代從祖也俗中經傳所談云已被太極銓授居左仙公之位如真誥并葛氏舊譜則事有未符恐教迹參差適時立説猶如執戟侍陛豈謂三摘靈桃徒見接神役鬼安知止在散職一以權道推之無所復論其異同矣仙公赤烏七年太歲甲子八月十五日平旦升仙長往不返恆與郭聲子等相隨久當授任玄都祗秩天爵佐命四輔理察人祗瞻望舊鄉能無纍纍之嘆顧盻後學庶垂汲引之慈敢藉邦族末班仰述真仙遺則云爾銘曰九垓敻絶七度虛懸分空置境聚氣搆天物滋數後化超象前命隨形轉神寄業傳霜野於衰竹柏翠微泉墟共往彭羡獨歸生因事攝年以學祈如金在冶如布在機仙公圭警臨齠發穎襄童比迹項孺聯影濯質綺闈凝心黛嶺虎變已攄龍輈遂騁朅來台霍偃蹇蘭穹碧壇自肅玉水不窮巡芳沐道懷古測衷表茲峻碣永扇高風蘭風寓憩已勒豐碑此土舊居未鐫貞琰今之遠裔仰慕清塵敬思刊樹傳芳來葉本集許長史舊館壇碑悠哉曠矣宇宙之靈也固非言象所傳文迹可記然則後之人奚聞乎含吐萬有化育群生本其所由義歸冥昧至於形域區分性用殊品事限觀聽理窮數識者倘或可論山之高海之廣夫何故以其有容焉大天之內復有小天三十六所並拓寓地空亘塗水脈闢闈風岫通氣雲巘此山本號句曲其下是第八洞宮名曰金壇華陽之天周回一百五十里分置三府前漢元帝世有咸陽三茅君得道來掌此任故稱茅山具詳傳記至晉太和元年句容許長史在斯營宅厥迹猶存宋初長沙景王就其地之東起道士精舍梁天監十三年敕質此精舍立為朱陽館將遠符先徵定祥火曆於館西更築隱居住止十四年別創鬱岡齋室追玄洲之蹤十七年乃繕勒碑壇仰述真軌真人姓許諱穆世名謐字思玄本汝南平輿人後漢靈帝中平二年六世祖光字少張避許相諛俠乃來過江居丹陽句容都鄉之吉陽里後仕吳為光祿勳識宇亮拔奕葉才明祖尚字元甫有文章機見吳中書郎父副字仲先器度淹通風格清簡晉剡令寧朔將軍下邳太守西城侯長史副第五子也正生少知名簡文在藩為世表之交起家太學博士朝綱禮肆儒論所宗出為餘姚令勤恤民隱惠被鄰邑徵入凱闈納言帝側升平末除護軍長史本郡中正外督戎章內詮茂序遐邦肅律鄉采砥行太和中遷給事中散騎常侍蟬冕輝華事歸尚德簡文踐極方優國老倏值晏駕於焉告退專靜山廬以修上道君雖搢紱朝班諷議庠孰而心標象外志結霞門弟兄遠遊永和四年長遁不返君尚想幽奇歲月彌軫恆與揚君深神明之契興寧中衆真降揚備令宣諭龍書雲篆僉然遍該靈模奧旨于茲必究年涉懸車遵行愈篤太元元年解駕違世春秋七十有二子姪禮窆虛柩於懸西大墓京陵之蹤未遠飛劍之槨在焉謹按真誥君挺命所基緣業已久乃周武王世九宮上相長里薛公之弟也兼許肇遺功復應垂祉後胤故乘運托生因資成道玉札所授為上清真人爵登侯伯位編卿司理仙撫治佐聖牧民矣真傳未顯於世莫能具述長史第三子諱玉斧世名翽字道翔正生母陶威女先亡已得在洞府易遷宮中君清穎瑩潔特絶世倫郡舉上計掾不赴粃粳塵務研精上業即弘景玄中之真師也恆居此宅繕修經法揚君數相從就亟通真感太和五年於茲告逝時年三十真誥云後十六年當度東華為上相青童君之侍帝晨受書為上清仙官與谷希子並職帝晨之任比世侍中君長兄揆世名甽次兄虎牙世名聯並亦得道揆今有玄孫靈真在山敕立嗣真館以褒遠祖之德皇上乘弘誓本力來君此土燾育蒼祇範鑄群品導法開俗隨緣啓教以隱居積蘊三真經誥久栖華陽宜還舊宅供養修理乃敕工匠建茲堂構既仰祗帝則兼闡大猷東位青壇西表素塔壇塔之間通是基趾埋瓴掩瓦投鍤便值紫煙白霧纏為蔭蓋宅南一井即長史所穿井南大塘乃郭朝遺製源出田叟之泉路通薑巴之軌傍枕雷平前瞰下泊東際連岡北橫長嶺柳汧陽谷俱會西垂四域之內皆謂之金陵地肺者也長史所居尤為標勝方將駟雲虬而高騁驅奔鶴以追風望洪濤之浩汗眷故都以浸遠古人有言匪作奚傳敢刊石頌永屬來賢銘曰渾樞鶩氣方祇吐靈依性分境傳識賦形化通八宇功浹四溟巡迹電滅測體淵停旋區嶽立亘海雲舒摶風泳水跖實憑虛亦有幽匠開石架廬情高身遠天府地居縈巒巴曲畫壤肺浮五闈面啓九塗環周長隰旁嶺交汧比流乃稱龍伏實謂金丘昔在西漢三茅來賓爰暨東晉二許懷真裁基浚井栖道接神允膺輔聖錫茲侍宸參差年代絪縕名氏書誥具宣精華未彌甀甃將淪沉階已毀拱樹霜催修庭草委肇館華陽歲躔二紀永觀前猷聿遵洪軌帝曰懋哉爾焉斯止經之營之輪乎奐矣勝殿密響瀉瓶揚芬瑤宮碧簡絢采垂文璚函玉檢綺幕繡巾蘭釭列耀金爐揚熏桐柏雙教方諸兼學並證心清俱漏身濁離有離無且華且朴結號虛皇筌法正覺藥徵質瑩禪感慧通飛行欻恍捫景帶虹振苦排鄣還明返聰物言是力我見無功紛紜千古汗漫兩儀三相幻惑舟壑自移緣來則應不慮不為式題龜録人天鑒知本集又略見藝文類聚七十八茅山長沙館碑夫萬象森羅不離兩儀所育百法紛湊無越三教之境縉紱之士飾禮容於闈閣耿介之夫揚旌麾於門裔銘曰大哉乾元萬物資始皇王受命三才乃理惟聖感神惟神降祉德被歌鐘名昭圖史友于兄弟敬惟西宣言追茂實用表遺先敢循舊制有革雜章刊石弗朽奕代流芳藝文類聚七十八太平山日門館碑日門館者東霞啓暉開巖引燭以為名也先是吳郡杜徵君聲高兩代德貫四區教義宣流播乎數郡拓宇太平之東結架菁山之北爰以此處幽奇別就基構栖集有道多歷世年藝文類聚七十八請雨詞華陽隱居陶弘景道士周子良詞竊尋下民之命粒食為本農工所資在於潤澤頃亢旱積旬苗稼焦涸遠近嗷嗷瞻天雀息百姓祈請永無感降伏聞雨水之任有所司存願哀憫黔首霈垂霑渥呵風召雲膚寸而合使洪潦溢川水陸咸濟則白鵠之詠復興於今共伸至誠稽顙詞情謹詞天監十四年太歲乙未六月二十日詞詣句曲華陽洞天張理禁趙丞前本集遺令既沒不須沐浴不須施床止兩重席於地因所著舊衣上加生裓裙及臂衣靺冠法服左肘録鈴右肘藥鈴佩符絡左肘下繞腰穿環結於前叉符於髻上通以大袈裟覆衾蒙首足明器有車馬道人道士並在門中道人左道士右百日內夜常然燈旦常香火南史七十六陶弘景傳
