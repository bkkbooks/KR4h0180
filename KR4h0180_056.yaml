body:
  text: 劉之遴乞皇太子為劉顯志銘啓之遴嘗聞夷叔柳惠不逢仲尼一言則西山餓夫東國黜士名豈施於後世信哉生有七尺之形終為一棺之土不朽之事寄之題目懷珠抱玉有歿世而名不稱者可為長太息孰過於斯竊痛友人沛國劉顯韞櫝藝文研精覃奧聰明特達出類拔群闔棺郢都歸魂有日須鐫墓板之遴已略撰其事行今輒上呈伏願鴻慈降茲睿藻榮其枯胔以慰幽魂冒昧塵聞戰栗無地梁書劉顯傳與劉孝標書閒聞足下作類苑括綜百家馳騁千載彌綸天地纏絡萬品撮道略之英華搜群言之隱賾鉛摘既畢殺青已就義以類聚事以群分述征之妙楊班儔也擅此傅物何快如之雖復子野調聲寄知音於後世文信搆覽懸百金於當時居然無以相尚自非沈鬱淡雅之思安能閉志經年勒成若此吾嘗聞為之者勞觀之者逸足下已勞於精力宜令吾見異書藝文類聚五十八弔震法師亡書弟子劉之遴頓首和南泡電倏忽三相不停苦空無我五音寧住尊師僧正捨壽閻浮遷神妙樂雖乘此宿殖必登善地人情怛化銜疚悲摧念在三之重追慕哀慟纏綿永往理不可任奈何奈何僧正精理特拔經綸洽通蔬菲終身有為略盡枯槁當年儀形二衆豈直息心標領亦為人倫之傑弟子少長游遇數紀迄茲平生敬仰善友斯寄衰疾待盡不獲臨泄鯁慟之懷二三增楚扶力修唁迷猥不次弟子劉之遴頓首和南廣弘明集二十四與震法師兄李敬朏書生滅無常賢弟震法師奄同力士生處道識長往法言永絶惋怛抽摧不能已已年事未高德業方播疾恙甫爾謂無過憂遂至遷化道俗驚愕念孔懷之切天倫至慟永往之情不可居處奈何奈何法師義味該洽領袖黑衣識度愷悌藉甚當世昔在京師聖上眄接自還鄉國歷政禮重且講說利益既實弘多經始寺廟實廣福業襟抱豁然與物無忤所與遊款皆是時賢白黑歸美近遠欽敬豈止息心殄悴實亦人倫喪寶追懷歎愴何可弭歇并辱遺書及別物對增哽欷殿下自作為銘又教鮑記室為志序恐鮑相悉未能究盡已得面為鮑說諸事行及徽猷計必勒不朽事如今日志石為薦并呼師修之鐫刻亦當不久可就言增泫然投筆悽悶劉之遴頓首頓首廣弘明集二十四弔僧正京法師亡書八月二十日之遴和南法界空虛山木隤壞尊師大正遷神淨土凡夫賤纍嬰滯哀樂承此凶訃五內抽摧愛慟深至不能自已念追慕永往纏綿斷絶情在難居奈何奈何大正德冠一時道蔭四部訓導學徒紹隆像法年居僧首行為人師公私瞻敬遐邇宗仰若乃五時九部流通解說匹之前輩聯類往賢雖什肇融恆林安生遠豈能相尚頓悟雖出自生公弘宣後代徽言不絶實賴夫子重以愛語利益窮四攝之弘致檀忍知慧備六度之該明白黑歸依含識知庇舟航愚冥棟梁寺塔日用不知至德潛運何道長而世短功被而身歿映乎大海永墜須彌照彼高山長收朗日往矣奈何當復奈何法師幼而北面生小服膺迄乎耆邁恆在左右在三之重一旦傾殞哀痛之至當何可處弟子紈綺遊接五十餘年未隆知顧相期法侶至乎菩提不敢生慢未來難知現在長隔眷言生平永同萬古尋思惋愴倍不自勝末由唁執伸泄哀歎謹裁白書投筆哽猥弟子劉之遴頓首和南廣弘明二十四與印闍黎書大喜稽首和南大喜精誠無感奄丁禍罰舉號永往五內屠鱠自咎自悼萬歿何補慈母臨終正念不亂繫想諸佛及本師至乎壽盡凡夫念著母子恩深嬰此長別肝心破潰不能自任遺旨以三十兩上金奉別充道場功德九月二十八日奉塋安厝終始永畢不可復希長號懊惱無心苟存伏度聞問理垂哀愍所希運心救拔心使亡靈遊於淨土不圖此啓臨紙崩絶大喜和南廣弘明集二十八上具古本漢書異狀十事案古本漢書稱永平十六年五月二十一日已酉郎班固上而今本無上書年月日字又案古本敘傳號為中篇今本稱為敘傳又今本敘傳載班彪事行而古本云稚生彪自有傳又今本紀及表志列傳不相合為次而古本相合為次總成三十八卷又今本外戚在西域後古本外戚次帝紀下又今本高五子文三王景十三王武五子宣元六王雜在諸傳秩中古本諸王悉次外戚下在陳項傳前又今本韓彭英盧吳述云信惟餓隸布實黥徒越亦狗盜芮尹江湖雲起龍驤化為侯王古本述云淮陰毅毅杖劍周章邦之傑子實惟彭英化為侯王雲起龍驤又古本第三十七卷解音釋義以助雅詁而今本無此卷梁書劉之遴傳應皇太子令為劉顯著志銘繁弱挺質空桑吐聲分器見重播樂傳名誰其均之美有髦士禮著幼年業明壯齒厭飫典墳研精名理一見弗忘過目則記若訪賈逵如問伯始穎脫斯出學優而仕議獄既佐藝蘭乃握搏鳳池水推羊太學內參禁中外相藩嶽斜光己道殞彼西浮百川到海還逐東流營營返魄泛泛虛舟白馬向郊丹旒背鞏野埃興伏山雲輕重呂掩書墳揚歸玄冢爾其戒行途窮土壟弱葛方施叢柯日栱隧柳荑春禽寒斂氄長空常暗陰泉獨湧祔彼故塋流芬相踵梁書劉顯傳思賢賦豈顧問哉相然信死斯則結深念於撫翼跂雄飛而但起知我於財利之間何足多於鮑子目擊而道存至味其如水未見其人吾聞其理矣夫子長之託意甘執鞭於異世在慈明之慕義聊慚馭而追悅況至德之可師無兼裘以共弊有樂安之任子偉群才而稱傑備百行之高致該九流之洪藝諒可雜而非染迹每同而常別牆易入而難窺關無鍵而有閉思若神而泉涌翰如雲而積袂沈潛於懷抱之閒蕭散於天人之際日下愧其未雙關西慚於上哲紛吾既有此固陋荷君子之渥惠塵非府而分深葉未移而好結尋宿草之宴處歷三紀於茲日性有同於杞梓心獲變於丹漆文何屬而不辨理何疑而匪質問不休而鍾扣答無窮而座謐藝文類聚二十一還林賦爰自京師言歸舊嶺今風古轍每動寸衷因事而書不覺成卷非謂為文聊記行途所經云爾太皞弭節祝融聳駕炎鍾泛響青籥靜吹丘子稅轅畿路總舳川湄褫魂故嶺結夢舊墀揆身世而載懷鏡古今而興辭驗難停於揚轍昭易改於墨絲匪追舉而辨命豈適伊而問蓍擔簦無白璧之想負書靡黑豹之悲纜解山潮首顧京澨仰絳堞之紛回與素津之容裔荃橈往來芰蓋經過依俙子陵之釣髣佛滄浪之歌出入風霞游息雲露階伺禽飛窗高月度踟蹰七教徘徊五禮永翦帶於關上長緝巾乎林底藝文類聚二十七永嘉郡教貴郡控帶山海利兼水陸實東南之沃壤一都之巨會而曝背拘牛屢空於畎畝績麻治絲無聞於窐巷其有耕灌不修桑榆靡樹遨遊鄽里酣酺卒歲越伍乖鄰流宕忘返才異相如而四壁獨立高慚仲蔚而三徑沒人雖謝文翁之正俗庶幾龔遂之移風藝文類聚五十為王博士讓表臣聞撫臆可以言心量能則知所止是故矯親魯門簡業事亡雜吹齊雅分聲遽逝臣才行過污文質無廉疏達謝於谷杜浹洽乖夫劉揚非除部養之勤豈通掌固之業藝文類聚四十六為范尚書拜表昔滕公移晷於泗亭陳遂留歡於博進祿止一守官窮九列臣獲照秋陽取沃淮海發蒙去𠫤已若松喬匪富伊榮須臾至此賞參十亂躬越五水歷覽前載孰與為匹藝文類聚四十八為范衛軍讓梁臺侍中表是以懷鉛早歲不以隕穫纍心躡履晚年豈以充詘在念易農伊泰仕焉已幸遂復分竹九疑擁旄百越值天地中開神武再廓麻絲是蓄菅蒯靡遺今霸運肇基四海明目樞機規獻實在得人況處庸微何用膺荷藝文類聚四十八御覽二百十九為何尚書重讓侍中領驍騎表臣擢自散輩之中置彼周行之上既慚伯豪使天下慎選又乖平叔令內外得人且玉壺獨掌見榮昌期當尺可參必簡英俊藝文類聚四十八為柳僕射讓光祿表竊聞敬孫以規獻為職彝品常貴飛翠鳴玉升降禁門臣以痁疾豈伊或忝匪稱其服終朝三褫近取諸身皎日非喻臣之庸薄文塵物論假以克壯報效無階而嬰離沈痼日月滋甚聖朝留簪履之舊愍降帷蓋之餘矜榮不徒行事存寵渥藝文類聚四十九答舉秀才啓方今八友盈庭五承在幄七教畢修九功具舉猶乃物色關屠夢想巖釣故已天不愛寶野無遺賢輒仰宣皇猷俯罄愚蔽覘察衡閻詢事茅草如有片言入善一介可題謹聞絳闕恭奏青蒲藝文類聚五十三為范雲謝示毛龜啓玄甲應於姬渚青髯符於夏室翱翔卷耳之陰浮遊蓮葉之上藏采千載獻狀一朝斯誠陛下至德動天窮神為化故能寶瑞開圖珍祥映諜閒出蕃畿繼踵郊甸藝文類聚九十九與陳伯之書遲頓首陳將軍足下無恙幸甚幸甚將軍勇冠三軍才為世出棄燕雀之小志慕鴻鵠以高翔昔因機變化遭遇明主立功展事開國稱孤朱輪華轂擁旄萬里何其壯也如何一旦為奔亡之虜聞鳴鏑而股戰對穹廬以屈膝又何劣邪尋君去就之際非有他故直以不能內審諸己外受流言沈迷猖獗以至於此聖朝赦罪責功棄瑕録用推赤心於天下安反側於萬物將軍之所知不假僕一二談也朱鮪涉血於友于張繡剚刃於愛子漢主不以為疑魏君待之若舊況將軍無昔人之罪而勳重於當世夫迷塗知反往哲是與不遠而復先典攸高主上屈法申恩吞舟是漏將軍松柏不翦親戚安居高臺未傾愛妾尚在悠悠爾心亦何可言今功臣名將雁行有序佩紫懷黃讚帷幄之謀乘軺建節奉疆埸之任並刑馬作誓傳之子孫將軍獨靦顏借命驅馳氈裘之長寧不哀哉夫以慕容超之強身送東市姚泓之盛面縛西都故知霜露所均不育異類姬漢舊邦無取雜種北虜僭盜中原多歷年所惡積禍盈理至燋爛況僞㜸昏狡自相夷戮部落攜離酋豪猜二方當繫頸蠻邸懸首稿街而將軍魚游於沸鼎之中燕巢於飛幕之上不亦惑乎暮春三月江南草長雜花生樹群鶯亂飛見故國之旗鼓感平生於疇日撫絃登陴豈不愴悢所以廉公之思趙將吳子之泣西河人之情也將軍獨無情哉想早勵良規自求多福當今皇帝盛明天下安樂白環西獻楛矢東來夜郎滇池解辮請職朝鮮昌海蹶角受化唯北狄野心掘強沙塞之閒欲延歲月之命耳中軍臨川殿下明德茂親總茲戎重弔民洛汭伐罪秦中若遂不改方思僕言聊布往懷君其詳之丘遲頓首文選四十三梁書陳伯之傳南史六十一藝文類聚二十五硯銘壁明理宣跡平水圓藝文類聚五十八侍中吏部尚書何府君誄遠量夷雅淹姿英茂進德方新循名以舊分鑣先達爭驅俊秀匪直羽儀實惟領袖知人斯哲在帝之難僉謂往諧是謂能官園阿望幣釣嶼投竿金張之貴允茲七侍有美一人柔貂三珥服冕乘軒鳴玉飛翠不貪為寶貴而能貧唯靜是悅惟寂是珍履信茲從積善方慶如何斯德曾是知命彼高者天與人焉詠眇望周行式瞻林壑灑沃紛埃擯揚流俗言必玄遠神唯珠玉色恬喜慍心豈榮辱藝文類聚四十八致呂僧珍書昔阮彧顏延有二始之歎吾才不逮古人今為三始非其願也將如之何梁書裴邃傳邃左遷始安太守乃致書於呂僧珍移魏揚州剌史長孫稚魏始於馬頭置戍如聞復欲修白捺舊城若爾便稍相侵迫此亦須營歐陽設交境之備今板卒已集唯聽信還魏書揚播附傳梁豫州刺史裴邃治合肥規襲壽春已纂勒兵士而慮壽春疑覺遂謬移云答貞陽侯書之橫白足下定國等至枉雅誨具高氏致送之旨即彼行人遠到京城大慰應有成命但江山敻阻末奉朝廷報辭第下國之麟趾先朝所寄籍彼鄰好義深主祀自宜單車入境端委還朝而朱斾啓行戎旌望國江東士子未達高懷僕早預簪裾夙叨眷與弦矢既暌江淮成阻青黎裁封雖繼西鳥之辭白雪在天豈無北風之歎但變故紛紛忠貞宜顯寒松負雪誠愧節者之徒徑草疾風寧忘烈士之概齊師若反旆淮路退舍肥水彼之敬送止縉紳之徒此之奉迎則軒蓋而已伏聽朝旨遲申展敬之橫白文苑英華六百七十七答釋法雲書難范縝神滅論伏覽敕旨答臣下審神滅論聖照淵深句括真俗理超繫表義貫群識鑽奉神猷伏深舞蹈惠示銜戢存眷丘仲孚白弘明集十答釋法雲書難范縝神滅論辱告頒示敕旨垂答臣下番臣滅論竊聞摽機之旨非凡所窺符神之契惟仁是極故衆教裴徊理詣於惇善群經委曲事盡於開濟伏惟至尊先天製物體道裁化理絶言初思包象外攻塞異端闡道歸一萬有知宗人天仰式信滄海之舟梁玄霄之日月也神滅之論宜所未安何者前聖摛教抑引不同括而言之理實無二易云積善之家必有餘慶積不善之家必有餘殃孝經云生則親安之祭則鬼享之雖未顯論三世其旨已著薪盡火滅小乘權教妙有湛然究竟通說因情即理理實可依且慎終追遠民德歸厚禮有國有家歷代由之三才之寶不同降清神滅之為論妨政實多非聖人者無法非孝悌者無親二者俱違難以行於聖世矣弟子庸乏懵於至道濫蒙頒訪所據凡淺荷惕之誠追以無厝弟子馬元和和南弘明集十答釋法雲書難范縝神滅論辱告奉宣敕旨答咨神滅論夫神理玄妙良難該辨雖復前聖眷言後英猶惑睿旨爰釋皎若發蒙固以陵萬古而擅奇悟方來以不朽伏奉朝聞載深抃躍謹以書紳永祛迷滯蔡僔和南弘明集十
