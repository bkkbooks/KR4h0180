body:
  text: 陸倕感知己賦贈任昉夜申旦而不寐獨匡坐而怨咨命僕夫而夙駕指南館而為期學窮書府文究辭林既耳聞而存口又目見而登心似臨淄之借書類東武之飛翰軫工遲於長卿踰巧速於王粲固乃度平子而越孟堅何論孔璋而與公幹或欲涉其涯涘求其界畔則浩浩淃淃彪彪涆涆譬長鋏於鞘中若龍淵與蜀漢濟濟冠蓋祁祁雋逸有竊風以味道咸交臂以屈膝或望路以窺門空升堂而入室彼春蘭及秋菊尚無絶於衆芳矧重仁與襲義信遼遼兮未央言追意而不逮辭欲書而復忘竊仰高而希驥忽脂車而秣馬既一顧之我隆亦東壁之余假似延州之如舊同伯喈之倒屣附蒼蠅於驥尾託明鏡於朝光謂虛無而為有布籍甚於遊揚於是柔條颯其成徑白露變而為霜歲忽忽而遒盡憂與愛兮未忘聚落莖於虛室聽羈雀於枯楊忳鬱悒其誰語獨撫抱而增傷託異人以蠲憂類其文而愈疾索黃瓊之寄居造安仁之狹室車出門其已歡無論銜杯與促膝譬鄒子之吟松故未寒而能憟徒納壤以作高陋吞舟而為罔值墨子之愛兼逢太丘之道廣陪九萬以齊征激三千而同上識公沙於杵臼拔孝相於無名非夫人之為感孰云感於余情指北芒以作誓期鬱鬱於佳城藝文類聚三十一思田賦歲聿忽其云暮庭草颯以萎黃風飀飀以吹隙燈黯黯而無光獨展轉而不寐何增歎而自傷於是踟蹰徙倚顧景興懷魂煢煢以至曙綴豫想於田萊彼五畝其焉在乃爰洎乎江隈出郭門而東騖入漵浦而南回爾乃觀其水陸物産原隰形便林藪挺直丘陵帶面臨九曲之回江對千里之平甸風去蘋其已開日登桑而先見聽啁哳之寒雞弄差池之春燕臨場圃以築館對櫺軒而鑿池集遊泳於階下引朝派於堂垂瞻巨石之前卻玩激水之推移雜青莎之靃靡拂細柳之長枝感風燭與石火嗟民生其如寄苟有胸而無心必行難而言易幸少私而寡欲兼絶仁以棄智忽學步而學趾又追飛而厲翅瞻鹿囿而竊高仰疆臺而慕義歷四時於遊水馳三稔於申臂望歸流而載懷情鬱悒其何置藝文類聚三十六賦體奉欽明之睿后沐隆平之玄化參振鷺之充庭侍長徒之曾舍冀無恨於終南豫告成於芝駕雖就列而陳力終胡顏於長夜藝文類聚五十六將至潯陽郡教第五倫之臨會稽躬斬馬草鄧伯道之蒞吳郡自運家糧故能使吏作頌歌民胥興詠太守薄德謬叨龜組竊願巴祗暗坐接客思匹吳隱被絮對賓常藥自隨式瞻無遠單車入境竊所庶幾舊須發民治道及戍邏揄樵採諸如此類一皆省息又云太守家本諸生伏膺典記光武靈臺之籍較涉根基張華聚土之書略見庭戶貴郡圖載其具存方策校以山經參諸括象原野城寺宛在心目龍泉鶴嶺不易窮登所撰郡圖可勿親用公孫陛戟既似井蛙延壽執戈實同兒戲藝文類聚五十豫章王拜後赦教夫議獄緩死著在令圖疑罪惟輕聞諸雅誥是以虞經惻隱流涕冬決鍾意垂仁哀矜寒送吾以虛薄夙頒寵章光宅襟險奄有全粵非有沛獻矜嚴空紆青組東平智思徒舉赤帷思所以仰述皇猷導揚弘澤遵彼下車譬茲解網藝文類聚五十二授潯陽太守章鏤冰雕脂不見大龍之象課虛叩寂寧聞駕辨之音徒荷容蓋空班推擇不能使府庭生梓橫閣誦經俯睨朱輜仰瞻繒蓋漏上嚴辨伏軾多慚藝文類聚五十拜吏部郎表銓衡庶品歷選賓僚阮咸貞素屢薦未登陸亮忠心裁居殿職自非季重清識李毅恬正何以區分管庫式鑒胥吏藝文類聚四十八初學記十一御覽二百十六為豫章王慶太子出宮表臣聞周固本枝實資明兩漢啓磐石必係元良所以闡弘祚鼎光崇守器伏惟皇太子道契生知照均天縱不藉審諭之功無待溫文之輔而冬書秋記夙表睿資春誦夏絃幼彰神度雖復直門守令長壽察微魏贊多容漢稱寬博不足以連輝茂則匹景令圖甲觀惟新桂宮告始朱班徙次翠蓋移陰華裔式瞻人祇蹈舞藝文類聚十六為張纘謝兄尚書諡靖子表亡兄夙搆皇慈早邀靈慶立言著績未酬天寵門衰祚寡遽辭昌運拊心摧恨私懷罔極日月告時幽埏浸遠王人猥集佳册光臨榮溢里庭恩沈松檟藝文類聚四十為王光祿轉太常讓表昔者楚德方盛孫叔濯衣漢道克隆王陽結綬故拜命無辭受爵不讓況宗卿清重歷選所難漢晉以降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼之文雅深純華表之從容退默自此迄茲風流繼軌以臣況之曾無等級藝文類聚四十九初學記十二御覽二百二十八除詹事讓表中陽白水徒庇微軀送珥抱薪未聞成績陳席不棄故劍無遺遂宣時髦升降清顯尊官厚秩無因而至陋巷蓽門鬱成爽塏儲端華重實異恆司南章馬宮已擇儒雅竇嬰許商爰取姻戚自茲已降名器日隆歷選才賢若何叨越也藝文類聚四十九遷吏部郎啓臣器均濩落材同擁腫效非積山勤乖附地自叨榮秩列裁移氣序而坐延曲私遂被洪造自非割蚌識珠覩石知玉寧可以獲名理俗見操敦教藝文類聚四十八為張侍中謝啓陳力就列不能者止實欲強飯據鞍自窮心力濡足磨頂少報洪私徒課虛無空延鍾箭不悟爰降曲慈復叨清顯職司近切任掌總綸魏選異才漢求高德官次恪居鮮非民譽仰瞻內省無一可階藝文類聚四十八謝敕使行江州事啓封畛遐曠纏井奧實陸海神皋偏屬茲境兼以茂親明德維翰作鎮宣述條教匡贊盛猷自非問望兼弘寧可擢膺嘉舉藝文類聚五十為息纘謝敕賜朝服啓玄冕素帶出自禁財朱紱青緺降於皇府輝燭鄰黨震耀街衢姻族移聽朋儕改矚非臣璅弱所能陳報藝文類聚六十七與僕射徐勉書薦沈峻五經博士庾季達須換計公家必欲詳擇其人凡聖賢可講之書必以周官立義則周官一書實為群經源本此學不傳多歷年世北人孫詳蔣顯亦經聽習而音革楚夏故學徒不至惟助教沈峻特精此書比日時開講肆群儒劉巖沈宏沈熊之徒並執經下坐北面受業莫不歎服人無間言弟謂宜即用此人命其專此一學周而復始使聖人正典廢而更興纍世絶業傳於學者梁書沈峻傳南史七十一答釋法雲書難范縝神滅論辱告惠示至尊所答臣下審神滅論昔者異學爭途孟子抗周公之法小乘亂道龍樹陳釋迦之教於是楊墨之黨舌舉口張六師之徒轍亂旗靡言神滅者可謂學僻而堅南路求燕北轅首楚以斯適道千里而遙聖上愍其迷途爰奮天藻鉤深致遠盡化知神俾此困蒙均斯冰釋陳茲要道同彼月照弟子並以凡薄沾竊恩紀纓冕則天之朝餐捉稽古之論贊幸之誠獨知踊躍猥頒告逮謹用書紳陸倕呈弘明集十石闕銘昔在舜格文祖禹至神宗周變商俗湯黜夏政雖革命殊乎因襲揖讓異於干戈而晷緯冥合天人啓惎克明俊德大庇生民其揆一也在齊之季昏虐君臨威侮五行怠棄三正刑酷然炭暴踰膏柱民怨神怒衆叛親離蹐地無歸瞻烏靡託於是我皇帝拯之乃操斗極把鉤陳翼百神禔萬福龍飛黑水虎步西河雷動風驅天行地止命旅致屯雲之應登壇有降火之祥龜筮協從人祇響附穿胸露頂之豪箕坐椎髻之長莫不援旗請奮執鋭爭先夏首憑固庸岷負阻協彼離心抗茲同德帝赫斯怒秣馬訓兵嚴鼓未通凶渠泥首弘舸連軸巨檻接艫鐵馬千群朱旗萬里折簡而禽廬九傳檄以下湘羅兵不血刃士無遺鏃而樊鄧威懷巴黔底定於是流湯之黨握炭之徒守似籓籬戰同枯朽革車近次師營商牧華夷士女冠蓋相望扶老攜幼一旦雲集壼漿塞野簞食盈塗似夏民之附成湯殷士之窺周武安老懷少伐罪弔民農不遷業市無易賈八方入計四隩奉圖羽檄交馳軍書狎至一日二日非止萬機而尊嚴之度不愆於師旅淵默之容無改於行陳計如投水思若轉規策定帷幄謀成几案曾未浹辰獨夫授首乃焚其綺席棄彼寶衣歸琁臺之珠反諸侯之玉指麾而四海隆平下車而天下大定拯茲塗炭救此橫流功均天地明並日月於是仰叶三靈俯從億兆受昭華之玉納龍敘之圖類帝禋宗光有神器升中以祀群望攝袂而朝諸夏布教都畿班政方外謀協上策刑從中典南服緩耳西羈反舌劍騎穹廬之國同川共穴之人莫不屈膝交臂厥角稽顙鑿空萬里攘地千都幕南罷鄣河西無警於是治定功成邇安遠肅忘茲鹿駭息此狼顧乃正六樂治五禮改章程創法律置博士之職而著録之生若雲開集雅之館而款關之學如市興建庠序啓設郊丘一介之才必記無文之典咸秩於是天下學士靡然向風人識廉隅家知禮讓教臻侍子化洽期門區宇乂安方面靜息役休務簡歲阜民和歷代規謨前王典故莫不芟夷翦截允執厥中以為象闕之制其來已遠春秋設舊章之教經禮垂布憲之文戴記顯遊觀之言周史書樹闕之夢北荒明月西極流精海嶽黃金河庭紫貝蒼龍玄武之製銅雀鐵鳳之工或以聽窮省冤或以布化懸法或以表正王居或以光崇帝里晉氏浸弱宋歷威夷禮經舊典寂寥無記鴻規盛烈湮沒罕稱乃假天闕於牛頭託遠圖於博望有欺耳目無補憲章乃命審曲之官選明中之士陳圭置臬瞻星揆地興復表門草創華闕於是歲次天紀月旅太蔟皇帝御天下之七載也搆茲盛則興此崇麗方且趨以表敬觀而知法物覩雙碣之容人識百重之典作範垂訓赫矣壯乎爰命下臣式銘盤石其辭曰惟帝建國正位辨方周營洛涘漢啓岐梁居因業盛文以化光爰有象闕是惟舊章青蓋南洎黃旗東指懸法無聞藏書弗紀大人造物龍德休否建此百常興茲雙起偉哉偃蹇壯矣巍巍旁映重疊上連翠微布教方顯浹日初輝懸書有附委篋知歸鬱崛重軒穹隆反宇形聳飛棟勢超浮柱色法上圓製模下矩周望原隰俯臨煙雨前賓四會卻背九房北通二轍南湊五方暑來寒往地久天長神哉華觀永配無疆文選五十六新刻漏銘并序夫自天觀象昏旦之刻未分治曆明時盈縮之度無準挈壺命氏遠哉義用揆景測辰徼宮戒井守以水火分茲日夜而司曆亡官疇人廢業孟陬殄滅攝提無紀衛宏載傳呼之節較而未詳霍融敘分至之差詳而不密陸機之賦虛握靈珠孫綽之銘空擅崑玉弘度遺篇承天垂旨布在方册無彰器用譬彼春華同夫海棗寧可以軌物字民作範垂訓者乎且今之官漏出自會稽積水違方導流乖則六日無辨五夜不分歲躔閹茂月次姑洗皇帝有天下之五載也樂遷夏諺禮變商俗業類補天功均柱地河海夷晏風雲律呂坐朝晏罷每旦晨興屬傳漏之音聽雞人之響以為星火謬中金水違用時乖啓閉箭異錙銖爰命日官草創新器於是俯察旁羅登臺升庫則于地四參以天一建武遺蠹咸和餘舛金筒方圓之制飛流吐納之規變律改經一皆懲革天監六年太歲丁亥十月丁亥朔十六日壬寅漏成進御以考辰正晷測表候陰不謬圭撮無乖黍纍又可以校運算之暌合辨分天之邪正察四氣之盈虛課六曆之疏密永世貽則傳之無窮赫矣煥乎無得而稱也昔嘉量微物盤盂小器猶其昭德記功載在銘典況入神之制與造化合符成物之能與坤元等契勳倍楹席事百巾機寧可使多謝曾水有陋昆吾金字不傳銀事未勒者哉乃詔小臣為其銘曰一暑一寒有明有晦神道無迹天工罕代乃置挈壺是惟熙載氣均衡石晷正權概世道交喪禮術銷亡遽遷水火爭倒衣裳擊刀舛次聚木乖方爰究爰度時惟我皇方壺外次圓流內襲洪殺殊等高卑異級靈虬承注陰蟲吐吸倏往忽來鬼出神入微若抽繭逝如激電耳不輟音眼無留盼銅史司刻金徒抱箭履薄非兢臨深罔戰授受靡愆登降弗爽惟精惟一可法可象月不遁來日無藏往分以符契至猶影響合昏暮卷蓂莢晨生尚辨天意猶測地情況我神造通幽洞靈配皇等極為世作程文選五十六藝文類聚六十八蠡杯銘用邁羽杯珍逾渠碗實同蠡測形均撲滿伊我疲病獨居無伴所不比挹誰誚誰緩藝文類聚七十三志法師墓志銘法師自説姓朱名保志其生緣桑梓莫能知之齊故特進吳人張緒興皇寺僧釋法義並見法師於宋太始初出入鍾山往來都邑年可五六十歲未知其異也齊宋之交稍顯靈迹被髮徒跣負杖挾鏡或徵索酒肴或數日不食豫言未兆懸識他心一時之中分身四處天監十三年即化於華林門之佛堂先是忽移寺之金剛像出置戶外語僧衆云菩薩當去爾後旬日無疾而殞沈舟之痛有切皇心殯葬資須事豐供厚望方墳而隕涕瞻白帳而拊心爰詔有司式刊景行辭曰欲化毗城金粟降靈猗歟大士權迹帝京緒胄莫詳邑居罕見譬彼涌出猶如空現哀茲景像愍此風電將導舟梁假我方便形煩心寂外荒內辨觀往測來覩微知顯動足墟立發言風偃業窮難詔因謝弗援慧雲晝歇慈燈夜昏藝文類聚七十七天光寺碑法雲旦聚則浸潤被乎重沙慧日晨登則暉光燭於有頃皇帝乃把神珠握靈鏡擊天鼓撞地鐘驅日月之師勒星辰之陳九流外籍五明內典鳥策餘文龍宮遺教莫不神遊房奧迹遍門牆思洞希微言窮名象珉階凌虛瓊籬鬱起可使龍城愧飾雁塔慚珍日宇奪暉月宮掩麗昔者姬水壽丘載紀山川之目丹陵負夏僅傳鄉黨之名歌酒故邑賜覆窮乎身世塤篪舊里高會止於當年銘曰被物如露偃民猶草解髻傳珠抽衣受寶化違宅火功超河岸捨我神居興茲靈館八襲豐殿四柱高廊並陳金璧旁建玉箱縱橫雜樹間廁衆芳藝文類聚七十六釋奠祭孔子文於惟上德是曰聖真克明克俊知化窮神研幾善誘藏用顯仁利同道濟成俗教民道尊功倍德溥化光離經辨志濟濟洋洋藝文類聚三十八請雨賽蔣王文隆周祚胤鍾嶽降精聰明正直得一居貞無方無體不疾不行化馳九縣位冠百靈東掩屢愆西郊已戢偶龍矯首泥人鶴立神聽孔殷靈應揮霍倏覩翻伊俄聞倒洛樂周神畢恩洽酒闌靈談抗袖鬼笑投柈推茲且引於萬斯歡藝文類聚一百星賦漢武帝夜遊昆明之池顧謂司馬遷相如曰星之明麗矣考之於歌頌求之於經史龍尾著於虢童天漢表於周士既妖謠之體陋嗟怨剌之蚩鄙每鬱悒而未攄思命篇於二子於是司馬遷對曰臣代典天官緒由南正撿之圖籍傳之視聽臣聞連珠合璧曜靈之所起也春鳥秋虛曆數之所紀也應黃鍾而正位建玉衡以辨方五緯麗而周道四野分而畫疆至如下方爽德上元告變或守位而易所或淩光而掩炫故夫應若轉環信如合契俾明鏡與元龜宜敕身而炯戒長卿操箋染翰思溢情煩遷延奉筆繼響而言曰日隱於西月生於東重輪暗而時缺上枝棲而未融豈若帝車之獨運隨圓蓋而不窮帝乃歌曰白日沒兮明月移繁星曙兮情未疲初學記一星四御講般若經序夫理臻畢竟而照盡空寂入三門而了觀導五濁而超津譬茲烈炎遠衆邪而不觸如彼出日示一相以趨道自羅閲闡其玄言香域弘其妙説彌勒表字於圓光帝釋念善於明咒受持讀誦神力折於猛風恭敬尊重福利踰於寶塔蓋衆聖之圓極而萬法之本源也皇帝真智自己大慈應物送迎日月緯絡天地鎮三季之澆風緝五際之穨俗出臨衢室退事齋居非以黃屋為尊每以蒼生為念德遍區宇未足顯於至仁理絶名言更殷勤於密説昔慧燈隱耀法藏分流二乘踳駁五部乖謬訶黎狹劣徒仰黑月之光毗曇褊滯未見沈珠之寶自聖皇應期探盡幾妙決散群迷摧伏異學極天宮之浩博窮龍殿之祕深於是大發菩提深弘般若永斷煩惑同歸清淨潤甘露於群生轉法輪而不息上以天監十一年注釋大品自茲已來躬事講説重以所明三慧最為奧遠乃區出一品別立經卷亦由觀音力重特顯普門之章登住行深乃出華嚴之品故以撮舉機要昭悟新學者焉大僧正慧令蓋法門之上首亦總持之神足願等須提之問遂同迦葉之請乃啓請御講説斯經有詔許焉以大同七年三月十二日講金字般若波羅蜜三慧經於華林園之重雲殿華林園者蓋江左以來後庭遊晏之所也自晉迄齊年將二百世屬威夷主多奢替舞堂鍾肆等阿房之舊基酒池肉林同朝歌之故所自至人御宇屏棄聲色歸傾宮之美女共靈囿於庶人重以華園毀折悟一切之無常寶臺假合資十力而方固捨茲天苑爰建道場莊嚴法事招集僧侶肅肅神宇結翠巘之陰峨峨重閣臨丹雉之上廣博光明有邁菴羅之地身心安樂實符歡喜之園于時三春屆節萬物舒榮風日依遲不寒不暑瑞華寶樹照曜七重玉底金池淪漪八德洞啓高門雲集大衆趨法席以沸喧聽鳴鍾而寂靜皇太子智均悉達德邁曇摩捨三殿之俗娛延二座以問道宣城王及王侯宗室等亦咸發深心並修淨行熏戒香以調善服染衣而就列廕映蟬冕委蛇冠帶排金門登玉階者濟濟成群既而警蹕北趨棨戟東轉門揚清梵傍吐香煙被淨居之服升須彌之座八種妙聲法言無滯十方疏聽隨類得解甚深之義在挹注而難竭樂説之辨既往復而彌新至如宿學耆僧亟淪偏執專杖數論未了經文變小意以稱量仰天尊而發問於是操持慧刃解除疑網示之迷方歸以正轍莫不渙然冰釋欣然頂戴若蓮花之漸開譬月初而增長凡諸聽衆自皇太子王侯宗室外戚及尚書令何敬容百辟卿士虜使主崔長謙使副陽休之及外域雜使一千三百六十人皆路逾九驛途遙萬里仰皇化以載馳聞大華而躍踊頭面伸其盡禮讚歎從其下陳又別請義學僧一千人於同泰寺夜覆制義並名擅龍象智曉江河傳習譬於瀉瓶諷誦同於疾雨沙門釋法隆年將百歲學周三藏識洞八禪説法度人顯名於關塞之北聞中國應講摩訶般若經故自遠而至僧正慧令猶未啓講京師道俗亦不知御應講也至發講之日又有外國僧衆不可勝數並衆所不識同集法座故知放光遍照地神唱告豈勞馳象之使冥符信鼓之期會稽鄮縣阿育王寺釋法顯修習苦行志求慧解既等鬱多之思惟亦同波崙之懇到乃於講所自陳願力刺血灑地用表至誠昔剜體供養析骨書寫歸依正法匪吝身命以今望古信非虛説凡講二十三日自開講迄於解座日設遍供普施京師文武侍衛並加班賚上光宅天下四十餘年躬務儉約體安菲素常御小殿裁庇風雨所居幄座僅於容膝外絶三驅之禮內屏千鍾之宴膳夫所掌歲撤萬金掖庭之費年減巨億兼以博收地利同入珍於撓海盈息泉府譬無盡於龍金故能不勞人力無損國度財法兼施周流不竭是講也靈異雜沓不可思議一則宮中佛像悉放光明二則大地震動備諸踊沒三則夜必澍雨朝則晴霽淑氣妍華埃塵不起四則犍椎既鳴講筵將合重肩絓轂填溢四門而人馬調和不相驚擾五則所施法席上坐萬人而恆沙大衆更無迫迮六則四部曠遠咸聞妙説軒檻之外聽受益明七則淨供遍設廚匪宿辦妙食應時百味盈溢八則氛氳異香從風滿觸九則鏗鏘雅樂自然發響十則同聲讚善遍於虛空斯蓋先佛證見諸天應感超踊寶於昔靈邁雨華於往瑞是時率土藻抃含靈慶悅願預福田爭事喜捨上皆區其心迹為發大願竊以一句奉持尚生衆善二字經耳猶階勝報況廣運大乘遍揚正法等發慧根同趣妙果方當祕諸寶函傳彼金字亙萬劫以光明彌大千而利益盛矣哉信無得而稱也小臣預在講筵職參史載謹録時事以立今序廣弘明集二十二太伯碑夫至仁至德垂風垂化內修訓範外陶氓俗百年之教淳道載凝而百年既終遺愛斯軫莫不肅虔寢廟著名金石遺其後昆聿遵前典是以禹堂既毀增飾丹青堯碑載焚重覩刊勒太伯膺慶二儀協靈七曜志輕天下慈深萬物脫屣岐周克讓之風斯舉端委揚越衣冠之俗載成重以仲雍揚波延陵蹈節民習敦厚俗懷忠信憂深思遠千載遺風美哉洋洋致足觀也昔滄州遁迹箕山辭位志守幽優不越樽俎猶以稱首高節標名往代豈若吾君之子義結民心獄訟載歸謳歌屢請能舍玉輿之貴永襲皮冠之迹悠然獨往信無德而稱焉吾啓金車晉遷紫蓋實號帝鄉爰是天邑若乃忠人入國悽愴生悲殉義希風懦夫立志藝文類聚二十一奏彈張稷領軍張稷門無忠貞官必險達殺君害主業以為常南史三十一張稷傳答釋法雲書難范縝神滅論杲和南伏覽敕旨答臣下審神滅論夫從無住本在默阻思伏如來藏窅絶難言故使仲初建薪火之執宣遠廣然滅之難傳疑衆談踳淪曠稔宸聰天縱聖照生知了根墜藥隨方運便遂乃辨禮矯枉指孝示隅良由迷發俗學使俗以洗況道惑資外文即就外以明內任言出以出奇因所據理固以城塹三世負荷群生現在破暗當來摑網一牘之間于何不利片言之益豈可覼縷生因曩慶至德同時預奉餘論頂戴踊躍惠示不遺深抱篤念陸杲和南弘明集十答釋法雲書難范縝神滅論猥辱逮告伏見至尊答臣下審神滅論俯仰膜拜裴徊空首竊聞聖惟一揆唐虞未有前言知幾其神今日獨奉梁詔道載則萬有擠其淪迷德壽則九服揚其照筮方旨振民育德百神均其攝受勞民動物千古咸其折服法師智深決定受持之持僉允志洽通敏承神之神諧克陸煦和南弘明集十寒夜賦何四序之平分處修冬而多慮眷搖落兮遵盡悲荏苒其云除日晼晚而易潛夜悠長而難曙既而庭流皓月階被凝霜風吹衣而懍懍氣空積而蒼蒼襲重裘兮弗燠熾朱火兮無光門蕭條而晝閉夜寂寞兮無人疏三徑以負汲結二耦而為賓藝文類聚五遊華林園賦諒無庸於殿省且棲遲而不事譬籠鳥與池魚本山川而有思伊暇日而容與時遨遊以蕩志正殿則華光弘敞重臺則景陽秀出赫奕翬煥陰臨鬱律絶塵霧而上征尋雲霞而蔽日經增城而斜趣有空巃之石室在盛夏之方中曾匪風而自栗溪谷則沱潛派別峭峽則險難壁立積峻竇溜闌干草石苔蘚駮犖叢攢既而登望徒倚臨遠憑空廣觀逖聽靡有不通藝文類聚六十五臥疾賦旅聞禁以永久迫衰老而殷憂無筋力以為禮聊臥疾以來休是時凍雨灑塵涼陰滿室風索索而傍起雲霏霏而四密爾乃高歌莫和旨酒時傾洗然尚想何慮何營藝文類聚七十五喻虜檄文天生蒸民樹之以君所以對越三才司牧黔首蠲其苛慝除其患難肇自遂古以迄皇王經世字民咸由此作朕撥亂反正君臨億兆休牛放馬載戢干戈思與一世之民躋之仁壽之域昔者晉失其序天篤降喪而四夷交侵小雅盡缺宋之初載實有武功秦晉之墟頻梟僭偽末葉陵遲遂亡淮濟曠日長久莫能克復朕爰初創業思間寧靜保大定功未遑遠略而狡虜遊魂不式王命朕謂其君是惡其民何罪矜此塗炭用寢兵革今戎醜數亡自相吞噬重以亢旱彌年穀價騰踊丁壯死於軍旅婦女疲於轉輸虐政慘刑曾無懲改四方同集九服齊契譬猶翻東海以注螢灂倒崑崙以壓螻蟻其身縻爛豈假多力爾二周故老六輔大姓蒙恥俯首有自來矣濯身明目今也其時昔由余入秦禮以卿佐日磾降漢華貂七葉苟有其才豈無大位藝文類聚五十八案梁書裴子野傳普通七年王師北伐敕子野為喻魏文受詔立成雕蟲論宋明帝博好文章才思朗捷常讀書奏號稱七行俱下每有禎祥及幸宴集輒陳詩展義且以命朝臣其戎士武夫則託請不暇困於課限或買以應詔焉於是天下向風人自藻飾雕蟲之藝盛於時矣梁鴻臚卿裴子野論曰古者四始六藝總而為詩既形四方之氣且彰君子之志勸美懲惡王化本焉後之作者思存枝葉繁華蘊藻用以自通若悱惻芳芬楚騷為之祖靡漫容與相如和其音由是隨聲逐影之儔棄指歸而無執賦詩歌頌百帙五車蔡應等之俳優楊雄悔為童子聖人不作雅鄭誰分其五言為家則蘇李自出曹劉偉其風力潘陸固其枝葉爰及江左稱彼顏謝針繡鞶帨無取廟堂宋初迄于元嘉多為經史大明之代實好斯文高才逸韻頗謝前哲波流相尚滋有篤焉自是閭閻年少貴遊總角罔不擯落六藝吟詠情性學者以博依為急務謂章句為專魯淫文破典斐爾為功無被於管絃非止乎禮義深心主卉木遠致極風雲其興浮其志弱巧而不要隱而不深討其宗途亦有宋之風也若季子聆音則非興國鯉也趨室必有不敢荀卿有言亂代之徵文章匿而采斯豈近之乎文苑英華七百四十二通典十六作選舉論無序宋略總論宋高祖武皇帝以蓋代雄才起匹夫而并六合剋國得雋寄迹多於魏武功施天下盛德厚於晉宣懷荒伐叛之勞而夷邊蕩險之力百勝可得而論者矣政足行陳之間卻孫恩蟻聚之衆一朝奮臂掃桓玄盤石之宗方軌長驅則三齊無堅壘回戈內赴則五嶺靡餘妖命孫季高於巨海之上而番禺席卷擢朱齡石於百夫之下而庸蜀來王羌胡畏威交為表裏董率虎旅以事中原石門巨野之隘指麾開闢關頭霸上之曾莫藩籬虜其酋豪遷其重寶登未央而灑酒過長陸而下拜盛矣哉悠悠百年未之有也於是倒載干戈休兵水彤弓納肇有宋都蒂芥必除華夷莫拒然後請上帝步驟前零陵去之而莫猜心高祖受之而無愧色古之所謂義取天下者斯之謂乎若其提挈草創則魏何劉輔相總則穆之徐羡鎮惡道濟經其武傅亮謝晦緯其文長沙以冢弟共艱難武烈以清貞定南楚其他胥附奔走雲合霧集若榱椽之構大廈衆星之仰河漢或取之於民舉或得之於未名群才必逞智能咸效爵不妄加官無私謁晉末所以荒濟淆混阿黨容縱莫不驅掃革易與之更始君行卑菲而國不為陋民勤征戍而下無怨讟品令宥密賞罰端平遠無不懷邇無不附屬為郡縣者則南過交趾西包劍閣北劃黃河而繞東海七分天下而有其四自永初末歲天子負扆務懷以燕代為戎岐梁重梗將誓六師屠桑乾而境北地三事大夫願相謂曰待夫振旅凱入乘轅南反請具銀繩瓊檢告報東嶽既而洮弗興即年獻世營陽王狎于弗訓以敗輿太祖寬肅宣惠大臣光表超越二昆來應寶命沈明內斷不欲政由寧氏克滅權逼不使芒刺在躬親臨朝事率尊恭德斟酌先生之典強宣當時之宜吏久其職育孫長子民樂其生鮮陷刑辟仁厚之化既已播流率土欣欣無思不服每駕巡幸簫鼓聽聞百姓扶攜老幼想望儀刑愛之孜孜如日不足初徐傅伏誅繼求內相王弘處之而思降彭城欲之而弗違王華殷景仁以忠允熙帝載謝弘微王曇首以沈密贊樞機徐王僧綽以體國彰義信謝方明劉道生以治惠稱良能高簡則令明清貴則王舊文章則顏延之謝靈運有藻麗之巨才儒雅則裴荀何傅擅師表之高學剛亮骨鯁則袁粲蔡子度建言忠益則范泰何尚之宗室蕃翰帝弟帝子則江夏衡陽廬陵隋王建平臨川新喻或清令而審或文敏而洽皆博愛以禮士明靡以流譽十三四年為多士矣上亦蘊籍義文思弘儒府庠序建於國都四學聞乎家巷天子乃移蹕下輦以從之朿帛宴語以勸之士莫不敦悅詩書沐浴禮義淑慎規矩斐然向方其行修言道者然後登朝受職威儀輕佻者不齒於鄉閭公宮非儐羽不來庭私家非軒蓋不逾閾冠冕之流雍容如也於是文教既興武功亦著命將受律指日如期檀蕭薄伐則南登象浦劉裴爰整則西踐仇池良駒巨象充塞外廄奇琛瓌貨下逮百遼禽獸草木之瑞月有六七繩山諷海之譯歲且十餘江東以來有國有家豐功茂德未有如斯之盛者然值北虜方強周韓歲擾金墉虎牢代失其御二十七年偏師克復河南橫蹂強胡百萬之衆胸奴遂跨彭沛航淮浦設穹廬於瓜步請公主以和親于時精兵猛將嬰城而不敢鬭謀臣智士折撓而無可稱天子乃朝饗單于臨江高會於是起盡尸之役貸富室之財舳艫千里緣江而陳我守既嚴胡兵亦怠且大川所以限南北也疲老而退歸我追奔之師橐弓裹足係虜之民流離道路江淮以北蕭然矣重以含章巫蠱始自三逆合殿酷帝史籍未聞仲尼以為非一朝一夕之故其所由來者漸矣辨之不早辨也元嘉之禍其有以焉世祖率先九牧大雪冤恥身當曆數正位天居聰明絢達博聞強記威可以整法智足以勝姦君人之略幾將備矣一時之風流領袖則謝莊何偃王彧蔡興宗袁顗袁粲禦武名將則沈慶之柳元景宗敞之或潔清以秀雅或驍果以步類因以軌道廓之中方知向時之士若顏竣之經綸忠徑匪躬諒直雖晉之狐趙無以尚焉帝即位二三年間方逞其欲拒諫是已天下失望夫以世祖才明少以禮度自肅思皇武之節儉追太祖之寬恕則漢之文景宗何足云景和申之以淫虐太宗易之以昏縱師旅薦興邊鄙蹙迫人懷苟且朝無紀綱內寵方議共安外物已覩其敗已初世祖登遐委重於二載太宗晏駕亦託孤於王阮泄近之道同歸沖人之釁如一然宋祚未絶於永光更以宗王之見窘水德遂亡於後實由強臣之受辱且顧命群公從容自重畏懦伊霍之機綺靡唐虞之際於是蔚炳胥變明命就遷俯仰之間興衰易用矣周自平王東遷崎嶇河洛其後二十四世而赧始亡之漢自章和以降顛覆閹豎其後百有餘載而獻始禪之何則周漢靈長如彼難拔近代脆促若此易崩非天時亦人事也聞夫鴻荒者難為慮因事者易為力曹馬規模懸乎前載苟有斯會實啓英雄而況太宗為之驅除先顛其本根本根既蹙枝葉遂摧斯則始於人事也昔二代將亡殷辛夏癸相去數百年間異世而後出宋則景和元徽首尾不能十載而降虐過於二君斯則天之所棄篤於前王者也天意人事其微如是雖欲勿霣其可得乎若乃拯厥塗炭蒙逆取之辱者湯武之志也私鉏當路飾揖讓之名者近代之事也其應天從民道有優劣故宗廟社稷修短異數不然則何殊尤緬邈如斯之遠也夫山嶽崩穨必有朽壤之隙春秋迭代亦有去故之悲是以臨危亡而撫理運未有不扼腕流連者也近古之弊化薄俗行乎宋氏之成敗得失著乎行事從而言之載於篇矣繫敘非所以創業垂統而懷其舊俗遺風逮於賢人君子英聲餘論以附于茲子野曾祖宋中大夫西鄉侯以文帝之十二年受詔撰元嘉起居注二十六年重被詔續成何承天宋書其年終于位書則未遑述作齊興後數十年宋之新史既行於世也子野生乎泰始之季長於永明之年家有舊書聞見又接是以不用浮淺因宋之新史為宋略二十卷翦截繁文刪撮事要即其簡寡志以為名夫黜惡章善臧否與奪則以先達格言不有私也豈以勒成一家貽之好事蓋司典之後而不忘焉文苑英華七百五十四宋略泰始三叛論昔齊桓公矜于葵丘而九國叛曹公不禮張松而天下分一失豪釐其差遠矣太宗之初威令所被不滿百里卒有離心士無固色而能開誠心布款實莫不感恩服德致命效死故西摧北蕩宇內褰開既而六車獻捷方隅束手天子欲賈其餘威師出無名長淮以北倏忽為戎惜乎若以嚮之虛懷不驕不伐則三叛奚為而起哉高祖蟣蝨生甲胄經啓疆場後之子孫日蹙百里播穫堂構豈云易哉通鑑一百三十二又明帝誅諸弟論夫噬虎之獸知愛己子搏狸之鳥非護異巢太宗保字螟蛤剿拉同氣既迷在原之天屬未識父子之自然宋德告終非天廢也夫危亡之君未嘗不先棄本枝嫗煦旁孽推誠嬖狎疾惡父兄前乘覆車後來并轡借使仲叔有國猶不失配天而他人入室將七廟絶祀曾是莫懷甘心揃落晉武背文明之託而覆中州者賈后太祖棄初寧之誓而登合殿者元凶禍福無門奚其豫擇友于兄弟不亦安乎通鑑一百三十三宋略選舉論官人之難先王言之詳矣居家視其孝友鄉黨察其誠信出入觀其志義憂難取其志謀煩之以事以求其理臨之以利以察其廉周禮始於學校論之州里告諸六事而後貢於王庭其在漢家尚猶然也州郡積其功能然後為五府所辟五府舉其掾屬而升之於朝三公參其得失除署尚書奏之天子一人之身所閲者衆一賢之進其課也詳故能官得其才鮮有敗事魏晉易是而所失弘多夫厚貌深衷險如溪壑擇言觀行猶懼弗周況今萬品千群俄折乎一面庶僚百位專斷於一司於是囂風遂行不可止也已擊轂攘袂填彼寺臺求者干進以務必得加之以諂黷吏曹按閥閲而選舉不遑訪採於鄉邑父誨其子曰不索何獲兄勵其弟曰努力窺覦無復廉恥之風謹願之操官邪國敗而不可紀綱假使龍作納言舜居南面而治致平章不可必也況後之官人者哉孝武雖分曹為兩不能反之於周漢朝三暮四其病愈甚也通典十四通鑑一百二十八又書云貴貴為其近於君也天下無生而貴者是故德義可尊無擇負販苟非其人何取世族周衰禮壞政出臣下卿士大夫自相繼及非夫嗣嫡猶等家臣且徒步匹夫見禮侯伯軾閭擁篲無絶於時其四方豪勢之家門客千數卑身折節比食同袍雖相傾倚亦成風俗迄千二漢尊儒重道朝廷州里學行是先雖名公子孫還齊布衣之伍士庶雖分本無華素之隔自晉以來其流稍改草澤之士猶顯清塗降及季年專限閥閲自是三公之子傲九棘之家黃散之孫蔑令長之室轉相驕矜互爭銖兩所論必門戶所議莫賢能苟且之俗成傲慢之禍作非所以敦弘退讓厲德興化之道也通典十六通鑑一百二十八以謝靈運王僧達之才華輕躁使其生自寒素猶將覆折重以怙其庇廕召禍宜哉通鑑一百二十八宋略樂志敘先王作樂崇德以格神入通天下之至和節群生之流放天子之於士庶未曾去其樂而無非僻之心以及周道衰微呂失其序亂代先之以忿怒亡國從之以哀思優雜子女蕩目淫心充庭廣奏則以魚龍靡慢為環瑋會同饗覲則以吳趨楚舞為妖妍纖羅霧縠侈其衣疏金鏤玉砥其器在上班賜寵群臣從風靡而靡王侯將相歌伎填室鴻商富賈舞女成群競相夸大互有爭奪如恐不及莫為禁令傷風敗俗莫不在此通典一百四十一劉虬碑受川嶽之英靈有清明之淑性淡乎若深泉之靜皓乎若寒霜之潔千仞不足議其高萬頃不足疇其量在其幼也孝敬淳深貫乎幽顯盧乎墓所而暴獸去之墟里賴焉樵蘇無犯及其長也捧檄動容薄遊下邑甘露零於豐草蒲密致於時雍有以見賢人之行動天地感鬼神疾乎影響如斯之美者矣夫聲名藉甚群公側席鑿室林皋面流傍隴咫尺荊衡表裏巫夢樹蕙滋蘭蕪沒庭戶平疇翠瀲千里極目信物外之神區幽居之勝境昔許子將謂太丘道廣廣則不周仲舉性峻峻則少納峻而納廣而周君於二陳折其中矣其所修孔氏之學則儒者師之所明釋氏之教則淨行傳之所著文集則辭人録之銘曰滔滔江漢實紀南國篤生居士高明柔克峨峨其道巍巍其德曰仁曰義惟民惟則築室皇壤考槃郛郭坐臥山樊嘯歌林薄親致甘旨躬餐上藥優哉遊哉且以行樂九丘八索百家群史西河疑聖華陰成市悠哉荊夢逖矣江濆輜軿結轍羔雁成群監觀令範式如金玉君子徽猷誰其與屬疇咨故老遵揚實録藝文類聚三十七丹陽尹湘東王善政碑皇上建顯號垂鴻名廣大配乎天地光華象乎日月長駕遠撫橫逸乎都外策鏡區域充塞乎無垠上冠九陔旁濟八表制禮以告成功作樂以彰治定福應允臻祥慶符合六府孔修九官咸事於往歲也有司奏以湘東王為宣惠將軍丹陽尹既而下車為政振民育德循名責實舉無遺慮若夫據饋纍起求賢如不及卑身折節用人若由己玉帛旅於丘園辟書交乎塗路求餘論於故府想遺風於舊哲延儒生於東閣命文學於後車重門洞啓列筵廣置四民總至獄訟殷集王兼而治之綽有餘裕上弘有禮下悅其風虛往實歸人得所至由是百吏仰成具僚斂衽千里之間有懷必亮躬親勸課賦政授時辨相物宜務盡地利由是仍歲有秋餘糧棲畝是以縉紳先生愀然相顧遂造象魏拜而陳之有詔報曰纖介之善春秋必書吏民歸美難用抑絶於是二三君子歡得所奏乃擇工良匠追石名山撰德選辭興事篆刻俾萬代之下知斯文之在斯銘曰茫茫禹迹經啓萬方平秩肇定曰若我皇并包九域畫野分疆猗歟帝子日就月將疏爵分品奄有瀟湘君王光啓既表南國肇允神童翻飛上德道達玄微優遊翰墨行成師範文為麗則帝曰爾詣出康庶績勿替敬典大猷允迪我王顯允洵美且麗夙夜乾乾有隆無替光贊大朝庇民濟世京邑翼翼永承嘉惠藝文類聚五十二齊安樂寺律師智稱法師碑法師諱智稱河東聞喜人也俗姓裴氏挹汾澮之清源稟河山之秀質蓄靈因於上葉感慧性於閻浮直哉惟清爰初夙備溫良恭儉體以得之然而天韻真確含章隱曜沈漸人群莫能測其遠邇蓋由徑寸之華韜光濬壑盈尺之寶末剖聯城鑒觀者罔識其巨麗逖聽者弗得其鴻名羈束戎旅俯起阡陌年登三十始覽衆經退而歎曰百年倏忽功名為重名不常居功難與畢且吉凶悔吝孔書已驗變化起伏歷聖未稱安知崢嶸之外寥廓之表籠括幽顯大援無邊者哉彼有師焉吾知歸矣遂乃長揖五忍斂衽四依挫鋭解紛於是乎盡宋大明中益部有印禪師者苦節洞觀鬱為帝師上人聞風自託一面盡禮印公言歸庸蜀乃攜手同舟以宋太始元年出家於玉壘誠感人天信貫金石直心般若高步道場既而敬業承師就賢辨志遨遊九部馳騁三乘摩羅之所宣譯龍王之所韜祕雖且受持諷誦然未取以為宗嘗謂攝心者迹迹密則心檢弘道者行行察則道存安上治人莫先乎禮間邪遷善莫尚乎律可以驅車火宅翻飛苦海瞻三途而勿踐歷萬劫而不衰者其毗尼之謂歟乃簡棄枝葉積思根本頓轡洗心以為己任於是曳錫踽步千里遊學擁經持鉢百舍不休西望荊山南過澧浦周流華夏博采奇聞土木形骸琬琰心識靡高不仰無堅不攻寢之所安席不及暖思之所至食不遑餐入道三年從師四講教逸功倍而業盛經明每稱道不墜地人各有美宣尼之學何詎常師于時冥隱二上人先輩高流鳳鳴西楚多寶穎律師洽聞溫故翰起東都法師之在江陵也稟冥隱為周旋爰乃還京洛以穎以為益友皆權衡殿最言刈菁華捨稊稗而膳稻粱會鹽梅而成鼎飪其理鍊其旨深膚受末學莫能踵武以泰始六年初講十誦於震澤闡揚事相咫尺神道高談出雲漢精義入無間八萬威儀怡然理暢五部章句渙爾同波由是後進知宗先達改觀暉光令問於斯藉甚法師應不擇方行有餘力清言終日而事在其中立樓雲於具區營筵祚於建業令不待嚴房櫳肅靜役不加迅棟宇駢羅自方等來儀變梵為漢鴻才巨學連軸比肩法華維摩之崇往往間出涅槃成實之唱處處聚徒而律藏憲章於時最寡振裘持領允屬當仁若夫淵源浩汗故老之所回惑峻阻隱復前修之所解駕皆剖析毫釐粉散膠結鉤深致遠獨悟胸懷故能使反戶之南彎弓之北尋聲赴響萬里而至門人歲益經緯日新坐高堂而延四衆轉法輪而朝同業者二十有餘載君子謂此道於是乎中興絶慶弔屏流俗朱門華屋靡所經過齊竟陵文宣王顧輕千乘虛心八解嘗請法師講於邸寺既許以降德或謂宜修賓主法師笑而答曰我則未暇及正位函文始交涼燠時法筵廣置髦士如林主譽既馳客容多猛發題命篇疑難鋒出法師應變如響若不留聽囿辨者土崩負強者折角莫不遷延徙靡亡本失支觀聽之流稱為盛集法師性本剛克而能悅以待問發言盈庭曾無忤色虛己博約咸竭厥才依止疏附訓之如一少壯居家孝于惟友脫屣四攝愛著兩忘親黨書介封而不發內恕哀蹙抑而不臨常曰道俗異故優陀親承音旨寧習其言而忽其教煩惱煦濡蕭然頓遣約言示制學者傳述以為妙絶古今春秋七十有二齊永元三年遷神于建康縣之安樂寺僧尼殷赴若喪昆姊諒不言之信不召之感者云若夫居敬行簡喜慍不形於色知人善誘甄藻罔遺於時臨財廉取豫義明允方大處變不渝汪汪焉堂堂焉渤碣河華不能充其量蓋淨行之儀表息心之軌則歟弟子道進等感梁木之既摧慟德音之永閟俾陳信而有徵庶流芳而無愧廣弘明集三十二司空安城康王行狀降七緯之禎靈五行之正性圭璋博達清明在躬學無常師希風乎孔甫幾神殆庶諒亞迹乎顏生悅禮敦詩方昔人而有裕既明且哲體大雅而弗渝若乃慈明外朗淑德內潤夏侯玉樹之談衛玠璧人之目又授使持節郢川刺史公四居方嶽政刑克舉仁恕以懷君子刑憲以肅小人位煩以簡居難則易霈如時雨芬若蘭蓀所去見思所居稱治遘疾薨竟陵之石梵時年四十四皇上震天倫之悼庶僚懷人百之感詔贈司空常侍王如故禮也自巴濮以東郾鄧以北方舟連騎赴者如雲昔王薨及葬仁禽有踐境之識羊祜云亡市人有罷歸之慟若公恩結三楚亦異出一時之公幼無擇言長無擇行立功以庇物執德以居宗重以道性虛間居處沖約終日清靜如布素焉藝文類聚四十五
