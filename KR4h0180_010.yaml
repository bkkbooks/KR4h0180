body:
  text: 簡文帝上皇太子玄圃園講頌啓竊以舜韶始唱靈儀自舞陳律才暄風心競萼輕禽短葉尚識音光沐善歡心寧忘撫抃伏惟殿下體高玄賾養道春禁牢籠文圃漁獵義河注意龍宮研心寶印雲聚生什之材並命應王之匹探機析理怡然不倦朱華景月詎此忘罷屬素藏晚節玄英初氣霜竹浮陰風梧散葉從容雅論實會神衷綱經生多幸屬此休世躊蹰奉渥得備磐藩而黏蠅未拔迷象不羈寶沒醉衣珠沈勇額得聞勝善寧忘歌詠謹上玄圃園講頌一首文慚綺發思闕雕英徒懷舞蹈之心終愧清風之藻冒昧呈聞追深赧汗謹啓釋藏輕五廣宏明集二十謝東宮賜裘啓綱啓蒙賚豹裘一領降斯止謗垂茲信服物華雉毳名高燕羽綱才慚齊相受白狐之飾德謝漢蕃均黑貂之賜地卷朔風庭流花雪故以裾生惠氣袖起陽春荷澤知慚承恩興感不任下情謹啓事謝聞謹啓藝文類聚六十七初學記二十六謝東宮賜柿啓懸霜照采淩冬挺潤甘清玉露味重金液雖復安邑秋獻靈關晚實無以匹此嘉名方茲擅美藝文類聚八十六敘南康簡王薨上東宮啓方當逸足長衢克固藩屏而峰摧璧毀一朝云及綱兄弟各從王役東守西撫常願陪承甲館同奉畫堂預得西苑賦文北場旋食豈謂不幸獨隔昭世異林有悲飛鳴斯切伏惟殿下愛睦恩深常棣天篤北海云亡騎傳餘稿東平告盡驛問留書嗚呼此恨復在茲日藝文類聚二十一謝邵陵王禁錮啓臣綸習近宵人不能改過屢犯明憲三入刑科昔繆彤掩扉曹議著論布衣昆弟且相誡勗以臣居長終慚勸勵仰負慈嚴心顏戰讋藝文類聚五十四囚徒配役事啓伏以明慎三典寬簡八刑宸鑒每以垂心國誥是焉攸切臣比時奉敕旨權視京師雜事切見南北郊壇材官車府太官下省左裝等處並啓請四五歲以下輕囚助充使役自有刑均罪等愆目不異而甲付錢署乙配郊壇錢署三所於事為劇郊壇六處在役則優令聽獄官詳其可否舞文之路自此而生公平難遇其人流泉易啓其齒將恐玉科輕重全關墨綬金書去取更由丹筆愚謂宜詳立條制以為永準藝文類聚五十四又見隋書刑法志通典一百七十謝敕示苦旱詩啓伏以九年之水不傷堯政七載之旱無纍湯朝歲弘則公田已修農勤則我庾惟億今者亢陽以來為日未久將恐督郵不黜失在汝南之守曝胔未收無傷河南之尹而載勞興居仰發歌詠無愛圭璧有事山川菲飲食矣加之以撤膳焉中夜不寐加之以申旦焉此唐虞之所闕如軒頊之所不逮藝文類聚一百慶洛陽平啓自函洛榛曠獯獫荐食久絶正朔之風不覩輶軒之使乘此戰心負斯戎足每興燔燧之驚常勞守漳之民自非聖略弘宣天綱遐頓豈能使漢地盡收名王爭入方今九服大同萬邦齊軌亭塞寢兵關候罷柝臣誠兼家國倍深歡慶藝文類聚五十九疑禮啓謹案下殤之小功不行婚冠嫁三嘉之禮則降服之大功理不得有三嘉今行三嘉之禮竊有小疑隋書禮儀志三謝敕賚中庸講疏啓若覩玄圭如觀金版洽日九披流光照灼慶雲五色垂采氤氳天經地義之宗出忠入孝之道實立教之關鍵德行之指歸自非千年有聖得奉皇門無以識九經之倫稟二門之致竊以周發上聖問五行於箕子宣尼照極訪六儛於萇弘未有懸鏡獨曉仰均神鑒方知始畫八卦風羲有慚正名百物軒轅為陋藝文類聚五十五謝敕賚方諸劍等啓才發紫函雕奇溢目始開泥檢麗飾交陳已匹丹霞之暉乍比青雲之制身文自貴器用惟宜寒暑兼華左右相照藝文類聚六十初學記二十二御覽三百四十四謝敕賚善勝威勝刀啓冰鍔含彩雕琰表飾名均素質神號脫光五寶初成曹丕先荷其一二勝今造愚臣總被其恩錫韓非之書未足為比給博山之筆方此更輕藝文類聚六十初學記二十二御覽三百四十六謝敕賜玉珮啓臣綱言主衣裘智瑋奉宣敕旨垂賚臣玉珮一具藍田麗采槐水縷文飾以金闕之珠制以魯班之巧故以裾端照色影外生光恩發內府猥垂霑賜臣方溫謝德比振慚聲沐浴深慈欣荷交至不任藝文類聚六十七初學記二十六謝賚扇啓臣綱啓傳詔饒僧明奉宣敕旨垂賚細綾大文畫柳蟬山扇一柄文筠析縷香發海檀肅肅清風即令象簟非貴依依散彩便覺夏室含霜飲露青蜩應三伏之修景群飛黃雀送六月之南風蔽日垂陰薰澤慚采浮涼滌暑蘋末愧吹聖人造物之巧俯萃庸薄王府好玩之恩於茲下被頂戴曲私伏增欣躍謹奉啓事謝聞謹啓初學記二十五謝賚碧慮棋子屏風啓臣綱啓宣詔王佛慧奉宣敕旨垂賚碧慮棊子屏風二十牒極班馬之巧兼曹史之慮均天台之翠壁雜水華之嘉名使雲母之窗慚其麗色琉璃之扇愧其含影仰降聖慈曲垂霑逮喜逐恩來聰同鳳舞言因謝盡更類三緘不任銘荷之誠謹奉啓謝以聞謹啓藝文類聚六十九初學記二十五謝敕賚織竹火籠啓池水始浮庭雪向飛慈澤無涯時錫香被製此蘭枝雕斯罕節文華九折用美十爐藝文類聚七十謝敕賚益州天門冬啓逮自星橋見珍玉壘本草稱其輕身延壽實為上藥姬晉之重丹桂曹丕之愛落英一家恩錫竊幸往代藝文類聚八十一謝敕賚貂坐褥席啓東瀛美毳不著馬彪之儀北朔文茵豈問張敞所記陰炭既重寒井猶冰特降殊私溫華曲被雖狐白千金織成千種李頒漢被楊降曹氈不足以髣佛洪慈連類聖澤藝文類聚九十五謝敕賜長生米啓堯禾五尺未足稱珍漢苗九穗方斯非擬如隨瑞鹿若降神烏暮律向遊獻春方始食乃民天之貴粒有延齡之名藉此資身因斯養性藝文類聚七十二請幸重雲寺開講啓臣綱臣綸臣紀言臣聞紫宮麗天著明玄象軒臺在嶽逖聽良書是以道彌隆而禮愈縟德彌溥而事愈泰此蓋彰至治之尊牧生民之本也伏以大光嚴殿侔神垂則沖天開宇功深大壯事協文明儀辰建極切靈啓構照燭三光含超百堵咸謂心華所表復非良匠之力神通所現不藉子來而成實惟淨國固絶董落之禮高邁釋宮理無鹿鳴之宴竊惟妙勝之堂本師於茲佛吼摩尼之殿如來亦闡法音伏希躬降睟容施灑甘露油然慧雲霈然慈雨光斯盛業導彼蒼生履天居而説無相同真也建佛事而被率土化俗也同真化俗至矣哉一舉而二美顯豈不大乎與彼陘山之上仙巖之下西都鳳皇岐陽鸑鷟安足同日而語哉敢露丹愚伏待矜遂輕干聽覽流汗戰懾謹啓廣宏明集十九重請開講啓臣綱臣綸臣紀言一日輕敢上聞願垂法雨天鑒凝遠未蒙降遂預均藥木誠同器水徒美春華還憐秋藿伏惟陛下德冠受圖道隆言契四三六五不能喻十堯九舜無以方而秋風動條尚興未息之念一物失所猶起納隍之仁方留衢室之情未議石渠之講竊以神通所現一念萬機大權所行應時三密猶處禪寂影現十方一起道場已為八會豈與吹律之后均熊湘之勞鑄鼎之君切風雨之務伏願以平等慧行如來慈為度蒼生降希有事使朝滿一乘情皆十善智珠法炬人人並持四忍五明家家可望謹冒天威重以聞啓翹誠注仰伏希允遂使北冀無山豈自高於曩日南陽回景不獨隔於當今謹啓釋藏輕四廣宏明集十九三請開講啓臣綱臣綸臣紀言敢藉寵靈頻干聽覽再降神旨未垂臨燭伏以皇政廣覃天覆悠遠海河夷晏日月貞明洛水有稱蕃之胡稿街有歸命之虜春戈已戢秋塵不飛槐棘均多士之詩貂璫有得賢之頌聖德沖謙劬勞日昃猶以時多禹歎物未堯心百辟慚惶群司聳蕩臣等或三善靡聞或一官不效嗜鮑逢宰相之誚學儉得參軍之譏而自以結根天苑竊高前載是以匪懼塵黷復敢上聞伏願樂説大慈特垂矜許放光動地不以法妨俗隨機逗藥不以人廢言俾茲含生凡厥率土心花成樹共轉六塵鏡裏得珠俱開三障於其誠願孰不幸甚纍冒宸嚴倍增戰息謹啓廣宏明集十九請幸同泰寺開講啓臣綱言竊以真如無説非筌不悟極果不應注仰斯通故器有水緣方見圓曦之影藥含長性得墜慧雲之慈伏惟陛下玉鏡宸居金輪馭世應迹有為俯存利物不違本誓開導愚蒙驅十方於大乘運萬國於仁壽豈止冶斤田粟功侔造化疏江決河削成天下智高九舜明出十堯頻徙鑾蹕降甘露雨天人舞蹈含生利益是以背流知反迷岸識歸臣自叨預趨聞渴仰無厭一日冒陳丹款伏希復轉法輪未回聽卑之恩尚絶愚臣之願慺慺寸志重敢披祈伏願將降一音曲矜三請被微言於王舍集妙義於寶坊聖心等視蒼生猶如一子遂臣之請即是普被無邊如蒙允許衆望亦足兩肩荷負豈敢為喻不任下願謹啓事以聞廣宏明集十九謝上降為開講啓臣綱啓舍人徐儼奉宣敕旨無礙大慈不違本誓來歲正月開説三慧經伏奉中詔身心喜躍飢蒙玉膳比此未踰貧獲寶珠方斯非譬伏以元正慶流大裘禮畢慧雲續潤法雨仍垂出世洪恩與陽春而布澤俾茲含生隨藥木而增長歡同萬國福浹九圍豈直愚臣得未曾有謹宣今敕馳報綸紀具爾相趣無辭上謝謹啓廣宏明集十九謝重謝上降為開講啓臣綱啓丹願懇誠屢冒宸扆實希降甘露雨普被三千天聽孔邈未垂鑒遂旱苗傾潤豈比自憐暍鳥思林寧方渴仰近因大僧正慧令伏敢重祈降逮敕旨垂許來歲二月開金字波若經題殊特之恩曲應愚請稽拜恭聞不勝喜躍身心悅樂如觸慈光手足蹈舞義非餘習伏以香城妙説實仰神文潤方雲雨明踰日月能使迷途識正大夢均朝梵志懼來天魔遙禮提桓所聽而今得聞波崙所求希世復出其為利益深廣無邊九圍獲悟十方蒙曉雖復識起初流心窮後念方當共捐五蓋俱照一空巍巍蕩蕩難得為喻臣仍屈慧令續宣此典大乘普導實繇聖慈伏筆罄言寧宣戴荷不任下情謹啓事謝聞廣宏明集十九謝開講般若經啓臣綱言伏承輿駕臨同泰寺開金字般若波羅密經題照迷生之慧日導出世之長源百華同陰萬流歸海幽顯讚揚率土含潤臣身礙已來望舒盈闕甘露普被人天俱萃波若魔事獨在微躬馳係法輪私深剋責不任下情謹奉啓以聞謹啓並廣宏明集十九答同泰寺立剎啓竊以寶塔天飛神龕地踊豈惟昔代復見茲辰嘉彼百靈欣斯十善雖復紫煙旦聚比此未儔朱光夜上方今知陋藝文類聚七十七謝敕使監善覺寺起剎啓臣綱啓伏見敕旨使監作舍人王曇明材官將軍沈微御仗吳景等監看善覺寺起剎事爰奉聖恩曲降神力命斯執事修茲長表寶塔雲構無待喜園水精特建非差龍海大龜持泥未足為盛鶖鷺引繩方斯取埒仰瞻慈渥喜戴不勝俯循宿願私增涕噎不任銘荷謹奉啓謝聞謹啓廣宏明集十六謝謝御幸善覺寺看剎啓臣綱言即日輿駕幸善覺寺威神所被金表建立概泰清而特起接庫樓而上征既等湛然長均淨土方為佛事永利天人頂荷之誠臣百恆品不任下情謹奉啓事謝聞謹啓廣宏明集十六謝敕賚銅供造善覺寺塔露盤啓臣綱啓主書陳僧聰奉宣敕旨垂賚銅一萬三千斤供造善覺寺塔靈盤是稱𨙺陽之珍實亦昆吾之寶燥溼無變九布見奇寒暑得宜六律成用況復神龍負子光斯妙塔金鳥銜帶飾茲高表函谷恥其詠歌臨淄恧其祥應陽燧含景還譬日輪甘露入盤足稱天酒辭林本闕心辨又慚徒戴重恩終難陳謝不任銘荷之誠謹奉啓聞謹啓廣宏明集十六謝敕賚柏剎柱并銅萬斤啓臣綱啓傳詔呂文強奉宣敕旨賚臣柏剎柱一口銅一萬斤供起天中天寺九牧貢金千尋挺樹永曜梵輪方興寶塔夏羞神鼎晉恧相風使福被域中功禔無外臣以庸愚稟承勝善樂受遍心恩光動色銘荷之誠無詞啓謝不任頂戴謹奉啓謝聞謹啓廣宏明集十六謝敕賚錢并白檀香充法會啓臣綱啓傳詔奉宣敕旨以臣明法會垂賚錢二十萬白檀薰𦸐𥴈香各十斤黃紙詔書先開泉府青雲好氣次集桂宮貨重文龜芳踰麗草散金廡下止及軍吏積穀充家才班親族未若資此良田方開五蓋入茲法度長出四流假詞敬祖尚慚難述借辨君卿猶知非謝不任荷戴謹啓事以聞釋藏輕一廣宏明集十六謝敕賚苦行像并佛迹啓臣綱啓舍人顧𢈻奉宣敕旨以金銅苦行佛并佛迹供養具等賚使供養伏以六年道樹超出四魔千輻足輪德圓萬善故能聞見悟解逢遇祛塵天聽恩隆曲垂獎被謹修飾櫩宇齋潔身心翹仰慈光伏待昭降千唱四辨尚不宣心輕毫弱簡豈能陳謝不任下情謹啓事謝聞謹啓廣宏明集十六奉阿育王寺錢啓臣綱言臣聞八國同祈事高於法本七區皆蘊理備於湧泉故牙床白繖無因不覩金瓶寶函有緣斯出伏惟陛下懸天鏡於域中運大權於宇內三有均夢則臨之以慧日百藥同枯則潤之以慈雨動寂非己行住因物無能名矣臣何得而稱焉故以照光赤書賤前史之為瑞珥芝景玉嗤往代之為珍難遇者乃如來真形舍利照景寶瓶浮光德水如觀鉤鎖似見龍珠自非聖德威神無以值斯希有天人頂戴遐邇歸心伏聞阿育王寺方須莊嚴施用萬金檀豐十藏寶陳河府泉出水衡比丘持土大廈方搆羅漢引繩高塔將表不勝喜抃謹上錢一百萬雖誠等散華心荷不盡而微均滴瀝陋甚鄰空輕以塵聞伏啓悚汗謹啓釋藏輕一廣宏明集十六謝敕賜解講錢啓無勞磁石之火金貨猥臻非遊玉壘之川銅山可見舒王濟之埒猶覺有餘假劉實之繩穿而不盡慧輪究竟爰降曲私福田成滿仰繇慈被榮光獨照自均若木負恩知重竊譬蓬萊藝文類聚六十六謝賜錢啓殊澤隆厚造次被蒙重彼八銖珍斯九法赤仄成采出自水衡之藏紺文委貫忽積銅扇之裏謹長充放生用濟含識發弘誓願等供無邊效彼薄拘均茲流水方使怖鴿獲安窮魚永樂藝文類聚六十六謝賚納袈裟啓四首臣綱啓殿師吳苗奉宣敕旨垂賚鬱泥細納袈裟一緣分同妙葉界寫長塍拂石慚華裁金非重是曰新染厥惟田服方使幽貞芳杜恥緝芙蓉仙客排雲羞裳飛羽穢食凡軀無明暗識叨恩每重荷澤難勝不任銘戴之至謹奉啓事謝聞廣宏明集二十八上又臣綱啓蒙賚鬱泥納袈裟一緣荀針秦縷因製緝而成文魯縞齊紈藉馨漿而受彩初開篋笥便覩舍衛田疇不出戶庭坐視南山塍陌竊以三銖輕暖稱美服於淨居千金巨麗得受用於迦葉而湛恩特被萃此愚躬霜降授衣曲澤便及喜溢心崖如從空中所墜忽不自知更謂寶支所出采襮四色事非離世鉤蘭兩葉殊澤實隆不任荷戴之至謹啓事謝聞謹啓廣宏明集二十八上又臣綱啓宣傳左右俞景茂奉宣敕旨垂賚鬱泥真納九條袈裟一緣精同織縷巧均結毳邁彼良疇成斯妙服雖復貴比千金輕踰二兩無以匹此洪恩方斯殊賚臣臥疾纍旬未堪行踐不獲即被新染陪侍寶坊塵緣穢體愧荷相集不任慚悚之至謹啓事謝聞謹啓廣宏明集二十八上又蒙賚鬱金泥細衲袈裟一緣忍辱之鎧安施九種功德之衣慚愧八法北戶録注謝敕聽從舍利入殿禮拜啓臣綱啓舍人王景曜至奉宣敕旨曲垂逮問并聽臣隨從舍利入殿禮拜謹奉秋色照澄預表光瑞臣比身心得無障惱明陪扈寶函謹鞠躬恭到但不生羽翼無假神通身升淨土高排閶闔足踐蓮華方茲非喻行躡寶梯比斯未重誘導殊恩實回始望顧茲塵縛喜戴不勝謹啓廣宏明集卷十六藝文類聚七十七謝敕使入光嚴殿禮拜啓臣綱啓舍人王景曜奉宣敕旨曲垂勞問并使明入光嚴殿禮拜法身謹奉臣粗蒙恩造明守開恭到遂以勞屢升淨土風積水厚不足為喻微心悚躍上謝無辭不任下情謹啓事謝聞廣宏明集十六謝敕為建涅槃懺啓臣綱啓伏聞敕旨垂為臣於同泰寺瑞應殿建涅槃懺臣障雜多災身穢饒疾針艾湯液每黷天覽重蒙曲慈降斯大福冀慧雨微垂即滅身火梵風才起私得清涼無事非恩伏枕何答不任下情謹奉啓謝聞廣宏明集二十八下謝敕參迎佛啓臣綱啓主書周昂奉宣敕旨曲賚恩參臣即爾到建元寺奉候法身金山戾止王人勞問榮恩頻疊啓謝無辭不任下情謹啓事謝聞廣宏明集十六東宮上掘得慈覺寺鐘啓竊以白亭舊室絶顯禎祥之氣闕里故堂暫聞鐘石之響猶復存諸良史汗彼篆素豈如杏梁遺飾回成紺殿椒墀昔處仍構寶階啓彝鐘於殊里記靈文於福地雖魏廟出璽魯祠現璧固以推茲孝咸惡此禎契將郭令鄙其開金羊田陋其産玉豈宜季武庭樹愧韓起之譽蜀相宅基慚孝安之碣伏惟覽啓增思撫端深悲慟切視奩哀踰封篋藝文類聚七十七上菩提樹頌啓臣綱言臣聞擊轅小唱有慕風雅巴人淺曲實仰陽春是以葑葵細葉猶傾朝景爝火微光不能自息伏惟陛下至德欽明玄猷廣運乃神乃聖道跨軒媯正覺正真功符圓極常住為樂法喜為甘慈雨被於無垠睿化覃於幽顯故八風調四氣正天下定海外安弘龍窟之威紹鷲山之法無為不住實愍蒼生無相乃宣引歸真域製茲道樹顯此金容使誓願者結因頂禮者增福會途已一古今誰二伏以器表承露東阿薦銘瑞啓黃龍中山興頌臣雖不敏實有愚心謹上菩提樹頌一首學謝稽古思非沈鬱不足以光揚盛德髣佛一隅顧恧芻言伏紙慚震謹啓釋藏肥九廣宏明集十五
