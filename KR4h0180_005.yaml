body:
  text: 武帝荅皇太子請御講敕省啟欲須吾講具汝等意書云一日二日惟日萬機今復過之年耆根熟氣力衰秏荷此黼扆有踰重負日中或得一食或不得食周旦吐握未足為勞楚君旰食方今非切未明求衣聿來弗休晝勞夜思精華已竭數術多事未獲垂拱兼國務靡寄豈得坐談須道行民安乃當議耳越敕廣弘明集十九省重啟猶欲須吾講說具汝等所懷亦不異前荅緣邊未入國度多乏如是等事恆須經計其餘繁碎非可具言率土未寍菜食者眾兼款附相繼賞與未周怨望者多懷音者少漢世渾并賈誼亦且流慟魏室無虞楊阜猶云可悲況今爪牙腹心不貳之臣又論道帷幄之士四聰不開八達路擁王侯雖多維城靡寄晝厲夕惕如履霜刃以朽索馭六馬豈足為喻詩不云乎知我者謂我心憂不知我者謂我何求方今信非談日汝等必欲爾者自可令諸僧於重雲中講道義也越敕廣弘明集十九省汝等啟復具所懷汝等未達稼穡之艱難安知天下之負重庸主少君所以繼踵顛覆皆由安不思危況復未安者邪殷鑒不遠在於前代吾今所行雖異曩日但知講說不憂國事則與彼人異術同亡易言其亡繫于苞桑斯則乾乾夕惕僅而後免汝等思之一二具如前敕越敕廣弘明集十九荅晉安王請開講啟敕省啟具汝所懷法事既善豈不欣然吾內外眾緣憂勞紛總食息無暇廢事論道是所未遑汝所為未體國也越敕廣弘明集十九荅晉安王謝開講般若啟敕省啟具之為汝講金字般若波羅密經發題始竟四眾雲合華夷畢集連雨累日深慮廢事景物開明幽顯同慶實相之中本無去來身雖不到心靡不在善自調養慎勿牽勞尚有兩旬日數猶奢今雖不同後會未晚也吾始還臺不復多敕越敕廣弘明集十九敕荅皇太子所上大法頌皇帝問太子省表并見所製大法頌詞義兼美覽以欣然廣弘明集二十荅菩提樹頌手敕省啟覽所上菩提樹頌捃採致佳辭味清淨仰讚法王稱歎道樹意思口說乃至手書極得三業之善但所言國美皆非事實不無綺語過也越敕廣弘明集十五荅晉安王謝幸善覺寺啟敕汝所營建慈悲寶剎諸佛威神不營多功纔欲運力即便豎立幽顯欣仰我亦隨喜不得與汝同共瞻拜以此為恨耳越敕廣弘明集十六敕荅臣下神滅論位現致論要當有體欲談無佛應設賓主標其宗旨辨其短長來就佛理以屈佛理則有佛之義既躓神滅之論自行豈有不求他意妄作異端運其隔心鼓其騰口虛畫瘡痏空致詆訶篤時之蟲驚疑於往來滯甃之䵷河漢於遠大其故何也淪蒙怠而爭一息抱孤陋而守井榦豈知天地之長久溟海之壯闊孟軻有云人之所知不如人之所不知信哉觀三聖設教皆云不滅其文浩博難可具載止舉二事試以為言祭義云惟孝子為能饗親禮運云三日齊必見所祭若謂饗非所饗見非所見違經背親言語可息神滅之論朕所未詳弘明集十敕光祿大夫江蒨純臣孝子往往感應晉世顏含遂見冥中送藥近見智者知卿弟二息感夢云飲慧眼水慧眼則是五眼之一號若欲造寺可以慧眼為名梁書孝行江紑傳敕沈約撰佛記序去歲令虞闡等撰佛記并令作序序體不稱頻治改猶未盡致尋佛教因三假以寄法藉二諦以明理達相求宗不著會道論其旨歸似未至極乃不應以此相煩亦是一途善事可得為厝筆不以故指敕闡等結序未體又似小異廣弘明集十五敕荅沈約記序始得看今敕繕寫流布同上敕荅曹思文所難二條當別詳覽也弘明集九具一二縝既背經以起義乖理以致談滅聖難以聖責乖理難以理詰如此則言語之論略成可息弘明集九與周捨論斷肉敕五首法寵所言慚愧而食眾生此是經中所明羅剎婦女云我念汝我食汝法寵此心即是經之羅剎僧辯所道自死肉若如此說鴟鴉鳩鴿觸處不死那不見有一自死者麞鹿雉兔充滿野澤亦不曾見有一自死者而覓死肉其就屠殺家覓死魚必就罾網處若非殺生豈有死肉經言買肉與自殺此罪一等我本不自為正為諸僧尼作離苦因緣眾生所以不可殺生凡一眾生具八萬戶蟲經亦說有八十億萬戶蟲若斷一眾生命即是斷八萬戶蟲命自死眾生又不可食者前所附蟲雖已滅謝後所附蟲其數復眾若煮若炙此斷附蟲皆無以復命利舌端少味害無量眾生其中小者非肉眼能觀其中大者灼然共見滅慈悲心增長惡毒此實非沙門釋子所可應行眾僧食肉罪劇白衣白衣食肉乃不免地獄而止是一罪至於眾僧食肉既犯性罪又傷戒律以此為言有兩重罪若是學問眾僧食肉者此為惡業復倍於前所以如此既親達經教為人講說口稱慈悲心懷毒害非是不知知而故犯言行既違即成詭妄論學問人食肉則罪有三重所以貴於解義正為如說修行反復噉食魚肉侵酷生類作惡知識起眾怨對墜墮地獄疾於䂎矛善惡報應必也不亡凡出家人實宜深思聲聞受律儀戒本制身口七支一受之後乃至睡眠悶等律儀恆生念念得未曾有律儀所以爾者睡眠等非起惡心故不損不失乃至常生若起欲殺心於聲聞法雖不失身口戒而於戒有損非唯損不殺戒亦兼汙餘戒至於手挾齒齧動身口業則失身口戒爾時律儀無作即斷不續既失不殺戒亦損汙餘戒所以爾者旃陀羅人為屠肉時為何等人殺正為食肉者若食肉者即有殺分於不殺戒即成有缺若謂於善律儀受殺生分於不殺戒無所缺者是不善律儀人持八戒齋是惡律儀猶應相續若惡律儀人持八戒齋惡律儀不復相續者是知善律儀人受諸殺分是不殺戒即時便缺別解脫戒不復解脫惡律儀人無論持八戒齋但起一念善心惡律儀即斷若一念不斷多念亦應不斷若多念斷是知一念時斷善律儀人其事亦爾無論受諸殺分有少殺分不殺律儀即時亦斷菩薩人持心戒故自無有食眾生理若缺聲聞戒終不免地獄等苦廣弘明集二十六喻智藏敕求空自閒依空入慧高蹈養神實是勝樂不違三乘亦以隨喜惟別之際能無恨然岐路贈言古人所重猶勸法師行無礙心大悲為首方便利益隨時用舍不宜頓杜以隔礙心行菩薩道無有是處續高僧傳五敕荅釋明徹省疏增其憂耿人誰不病何以遽終過甚法師至性堅明道行純備往來淨土去留安養方除四魔理無五畏惟應正念諸佛不捨大願與般若相應直至種智發菩提心彼我相攝方結來緣敬如所及菩薩行業非千百年善思至理勿起亂想覽筆悽懣不復多云續高僧傳六敕荅僧正南㵎寺沙門慧超法寵法師造次舉動不逾律儀不俠性欲不事形勢慈仁愷悌雅有君子之風匡政寺廟信得其人矣續高僧傳五策永陽王母為國太妃維天監二年六月甲午朔十日癸卯皇帝遣宗室員外散騎侍郎兼散騎常侍蕭敬寶策命永陽王母王氏為國太妃曰於戲惟爾茂德內湛粹範外昭國序凝芬蕃庭仰訓是用式遵舊典載章徽服往欽哉肅茲休烈可不慎歟古刻叢鈔徐勉撰永陽王敬太妃墓誌銘諡始興王憺冊咨故侍中司徒驃騎將軍始興王夫忠為令德武謂止戈於以用之載在前志王有佐命之元勳利民之厚德契闊二紀始終不渝是用方軌往賢稽擇故訓鴻名美義允臻其極今遣兼大鴻臚程爽諡曰忠武魂而有靈歆茲顯號嗚呼哀哉梁書始興王憺傳璽書詰范縝亮少乏才能無聞時輩昔經冒入群英相與豈薄晚節諂事江祏為吏部末協附梅蟲兒茹法珍遂執昏政比屋罹禍盡家塗炭四海沸騰天下橫潰此誰之咎食亂君之祿不死於治世亮協固凶黨作威作福靡衣玉食女樂盈房勢危事逼自相吞噬建石首題啟靡請罪朕錄其白旗之來貰其既往之咎亮反覆不忠姦賄彰暴有何可論妄相談述具以狀對梁書王亮傳宣旨張綰為國之急惟在執憲直繩用人本不限升降晉宋之世周閔蔡廓並以侍中為之卿勿疑是左遷也梁書張綰傳宣旨太子進食毀不滅性聖人之制禮不勝喪比於不孝有我在那得自毀如此可即彊進飲食梁書昭明太子傳救司州下令軍中望麾而進聽鼓而動南史六入屯閱武堂下令皇家不造遘此昏凶禍挻動植虐被人鬼社廟之危蠢焉如綴吾身籍皇宗曲荷先顧受任邊疆推轂萬里眷言瞻烏痛心在目故率其尊主之情厲其忘生之志雖寶厤重升明命有紹而獨夫醜縱方煽京邑投袂援戈克弭多難虐政橫流為日既久同惡相濟諒非一族仰稟朝命任在專征思播皇澤被之率土凡厥負舋咸與惟新可大赦天下唯王咺之等四十一人不在赦例梁書武帝紀上夫樹以司牧非役物以養生視人如傷豈肆上以縱虐廢主棄常自絕宗廟窮凶極悖書契未有征賦不一苛酷滋章緹繡土木菽粟犬馬徵發閭左以充繕築流離寒暑繼以疫癘轉死溝渠曾莫救恤朽肉枯骸烏鳶是厭加以天災人火屢焚宮掖官府臺寺尺椽無遺悲甚黍離痛兼麥秀遂使億兆離心彊徼侵弱斯人何辜離此塗炭今明昏遞運大道公行思治之氓來蘇茲日猥以寡薄屬當大寵雖運距中興艱同草昧思闡皇休與之更始凡昏制謬賦淫刑濫役外可詳檢前源悉皆除蕩其主守散失諸所損耗精立科條咸從原例同上永元之季乾維落紐政實多門有殊衛文之代權移於下事等曹恭之時遂使閹尹有翁媼之稱高安有法堯之旨鬻獄販官錮山護澤開塞之機奏成小醜直道正義擁抑彌年懷冤抱理莫知誰訴姦吏因之筆削自己豈直賈生流涕許伯哭時而已哉今理運惟新政刑得所矯革流弊實在茲日可通檢尚書眾曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏同上義師臨陣致命及疾病死亡者並加葬斂收恤遺孤同上朱爵之捷逆徒送死者特許家人殯葬若無親屬或有貧苦二縣長尉即為埋掩建康城內不達天命自取淪滅亦同此科同上夫在上化下草偃風從世之澆淳恆由此作自永元失德書契未紀窮凶極悖焉可勝言既而璇室外構傾宮內積奇技異服殫所未見上慢下暴淫侈競馳國命朝權政移近習販官鬻爵賄貨公行並甲第康衢漸臺廣室長袖低昂等和戎之賜珍羞百品同伐冰之家愚人因之浸以成俗驕豔競爽夸麗相高至乃市井之家貂狐在御工商之子緹繡是襲日入之次夜分未反昧爽之朝期之清旦聖明肇運厲精惟始雖曰纘戎殆同創革且淫費之後繼以興師巨橋鹿臺凋罄不一孤忝荷大寵務在澄清思所以仰述皇朝大帛之旨俯厲微躬鹿裘之義解而更張斲雕為樸自非可以奉粢盛修紱冕習禮樂之容繕甲兵之備此外眾費一皆禁絕御府中署量宜罷省掖庭備御妾之數大予絕鄭衛之音其中有可以率先卿士准的甿庶菲食薄衣請自孤始加群才並軌九官咸事若能人務退食競存約己移風易俗庶朞月有成昔毛玠在朝士大夫不敢靡衣偷食魏武歎曰孤之法不如毛尚書孤雖德謝往賢任重先達實望多士得共此心外可詳為條格同上即梁王位赦令孤以虛昧任執國鈞雖夙夜勤止念在興治而育德振民邈然尚遠聖朝永言舊式隆此眷命侯伯盛典方軌前烈嘉錫隆被禮數昭崇徒守愿節終隔體諒群后百司重茲敦獎勉茲厚顏當此休祚望昆彭以長想欽桓文而歎息思弘政塗莫知津濟邦甸初啟藩宇惟新思覃嘉慶被之下國國內殊死以下今月十五日昧爽以前一皆原赦鰥寡孤獨不能自存者賜穀五斛府州所統亦同蠲蕩梁書武帝紀上立選簿表臣聞以言取士士飾其言以行取人人竭其行所謂才生於代窮達惟時而風流遂往馳騖成俗媒孼夸衒利盡錐刀遂使官人之門肩摩轂擊豈直暴蓋露冠不避寒暑遂乃戢屨杖策風雨必至良由鄉舉里選不師古始稱肉度骨遺之管庫加以山河梁畢闕輿徵之恩金張許史忘舊業之替吁可傷哉且夫譜諜訛誤詐偽多緒人物雅俗莫肯留心是以冒襲良家即成冠族妄修邊幅便為雅士負俗深累遽遭寵擢墓木已拱方被徽榮故前代選官皆立選簿應在貫魚自有銓次冑籍升降行能臧否或素定懷抱或得之輿論故得簡通賓客無俟埽門頃代陵夷九流乖失其有勇退忘進懷質抱真者選部或以未經朝謁難於進用或有晦善藏聲自埋衡蓽者又以名不素著絕其階緒必須畫刺投狀然後彈冠則是驅迫廉撝獎成澆競愚謂自今選曹宜精隱括依舊立簿使冠履無爽名實不違庶人識崖涘造請自息且聞中間立格甲族以二十登仕後門以過立試吏求之愚懷抑有未達何者設官分職惟才是務若八元立年居皂隸而見抑四凶弱冠處鼎族而宜甄是則世祿之富無意為善布衣之士肆心為惡豈所以弘獎風流希向後進此實巨蠹尢宜刊革不然將使周人有路傍之泣晉臣興漁獵之歎且俗長浮競人寡退情若限歲登朝必增年就宦故貌實昏童籍已踰立滓穢名教於斯為甚臣總司內外憂責是任朝政得失義不容隱伏願陛下垂聖淑之姿降聽覽之末則彝倫自穆憲章惟允梁書武帝紀上又略見南史六通典十四請徵謝朏何胤表夫窮則獨善達以兼濟雖出處之道其揆不同用捨惟時賢哲是蹈前新除侍中太子少傅朏前新除散騎常侍太子詹事都亭侯胤羽儀世冑徽猷冠冕道業德聲康濟雅俗昔居朝列素無宦情賓客𥳑通公卿罕預簪紱未褫而風塵擺落且文宗儒肆互居其長清規雅裁兼擅其美並達照深識預覩亂萌見庸質之如初知貽厥之無寄拂衣東山眇絕塵軌雖解組昌運實避昏時家膺鼎食而甘茲橡艾世襲青紫而安此懸鶉自澆風肇扇用南成俗淳流素軌餘烈頗存誰其激貪功歸有道康俗振民朝野一致雖在江海而勳同魏闕今泰運甫開賤貧為恥況乎久蘊瑚璉暫厭承明而可得求志海隅永追松子臣負荷殊重參贊萬機實賴群才共成棟幹思挹清源取鏡止水愚欲屈居僚首朝夕諮諏庶足以翼宣寡薄式是王度請並補臣府軍諮祭酒朏加後將軍梁書謝朏傳高祖平京邑進位相國表請朏胤孔傳舜典議孔序稱伏生誤合五篇皆文相承接所以致誤舜典首有曰若稽古伏生雖昏耄何容合之經典釋文敘錄齊明帝建武中吳興姚方興采馬王之注造孔傳舜典一篇云於大航頭買得上之梁武時為博士議云云遂不行用南郊明堂異日議孝經鄭玄注云上帝亦天別名如鄭旨帝與天亦言不殊近代同辰良亦有據魏太和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前准南齊書禮志上永明二年司徒西閤祭酒梁王議移檄京邑夫道不常夷時無永化險泰相沿晦明非一皆屯困而後亨資多難以啟聖故昌邑悖德孝宣聿興海西亂政簡文升厤並拓緒開基紹隆寶命理驗前經事昭往策獨夫擾亂天常毀棄君德姦回淫縱歲月滋甚挻虐於鬌翦之年植險於髫丱之日猜忌凶毒觸途而著暴戾昏荒與事而發自大行告漸喜容前見梓宮在殯靦無哀色懽娛遊宴有過平常奇服異衣更極誇麗至於選采妃嬪姊妹無別招侍巾櫛姑姪莫辨掖庭有裨販之名姬姜被干殳之服至乃形體宣露褻衣顛倒斬斮其閒以為懽笑騁肆淫放驅屏郊邑老弱波流士女塗炭行產盈路輿尸竟道母不及抱子不遑哭劫掠剽虜以日繼夜晝伏宵遊曾無休息淫酗醟肆酣歌壚邸寵恣愚豎亂惑妖孼梅蟲兒茹法珍臧獲厮小專制威柄誅翦忠良屠滅卿宰劉鎮軍舅氏之尊盡忠奉國江僕射外戚之重竭誠事上蕭領軍葭莩之宗志存柱石徐司空沈僕射搢紳冠冕人望攸歸或渭陽餘感或勳庸允穆或誠著艱難或劬勞王室並受遺託同參顧命送往事居俱竭心力宜其慶溢當年祚隆後裔而一朝齏粉孩稚無遺人神怨結行路嗟憤蕭令君忠公幹伐誠貫幽顯往年寇賊遊魂南鄭危逼拔刃飛泉孤城獨振及中流逆命憑陵京邑謀猷禁省指授群師剋翦鯨鯢清我王度崔慧景奇鋒迅駭兵交象魏武力喪魂義夫奪膽投名送款比屋交馳負糧景從愚智競赴復誓旅江甸奮不顧身獎厲義徒電掩彊敵剋殲大憝以固皇基功出桓文勳超伊呂而勞謙省己事昭心迹功遂身退不祈榮滿敦賞未聞禍酷遄及預稟精靈孰不冤痛而群孼放命蜂蠆懷毒乃遣劉山陽驅扇逋逃招逼亡命潛圖密構規見掩襲蕭右軍夏侯征虜忠斷夙舉義形於色奇謀宏振應手梟懸天道禍淫罪不容戮至於悖禮違教傷化虐人射天彈路比之猶善刳胎斮脛方之非酷盡㝢縣之竹未足紀其過窮山澤之兔不能書其罪自草昧以來圖牒所記昏君暴后未有若斯之甚者也既人神乏主宗稷阽危海內沸騰氓庶板蕩百姓懍懍如崩厥角蒼生喁喁投足無地幕府荷眷前朝義均休戚上懷委付之重下惟在原之痛豈可臥薪引火坐觀傾覆至尊體自高宗特鍾慈寵明並日月粹昭靈神祥啟元龜符驗當璧作鎮陜藩化流西夏謳歌攸奉萬有樂推右軍蕭穎冑征虜將軍夏侯詳並同心翼戴即宮舊楚三靈再朗九縣更新升平之運此焉復始康哉之盛在乎茲日然帝德雖彰區宇未定元惡未黜天邑猶梗仰稟宸規率前啟路即日遣冠軍竟陵內史曹景宗等二十軍主長槊五萬驥騄為群鶚視爭先龍驤並驅步出橫江直指朱雀長史冠軍將軍襄陽太守王茂等三十軍主戈船七萬乘流電激推鋒扼險斜趣白城南中郎諮議參軍軍主蕭偉等三十九軍主巨艦迅楫衝波噎水旗鼓八萬焱集石頭南中郎諮議參軍軍主蕭憺等四十二軍主熊羆之士甲楯十萬沿波馳艓掩據新亭益州刺史劉季連梁州刺史柳惔司州刺史王僧景魏興太守裴師仁上庸太守韋叡新城太守崔僧季並肅奉明詔龔行天罰蜀漢果銳沿流而下淮汝勁勇望波遄騖幕府總率貔貅驍勇百萬繕甲燕弧屯兵冀馬摐金沸地鳴鞞聒天霜鋒曜日朱旗絳㝢方舟千里駱驛係進蕭右軍訏謨上才兼資文武英略峻遠執鈞匡世擁荊南之眾督四方之師宣讚中權奉衛輿輦旍麾所指威稜無外龍驤虎步並集建業黜放愚狡均禮海昏廓清神甸埽定京宇譬猶崩泰山而壓蟻壤決懸河而注熛燼豈有不殄滅者哉今資斧所加止梅蟲兒茹法珍而已諸君咸世冑羽儀書勳王府皆俛眉姦黨受制凶威若能因變立功轉禍為福並誓河岳永紆青紫若執迷不悟距逆王師大眾一臨刑茲罔赦所謂火烈高原芝蘭同泯勉求多福無貽後悔賞罰之科有如白水梁書武帝紀上
