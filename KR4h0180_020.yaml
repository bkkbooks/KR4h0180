body:
  text: 昭明太子統錦帶書十二月啓某叩頭叩頭昔園公道勝漢盈屈節春卿經明漢莊北面況乃義兼乎此而顧揆不肖哉但經途千里眇焉莫因何嘗不夢姑胥而鬱陶想具區而杼軸心往形留於茲有年載矣方今朱明受謝清風戒寒想攝養得宜與時休適耽精義味玄理息囂塵玩泉石激揚碩學誘接後進志與秋天競高理與春泉爭溢樂可言乎豈與口厭芻豢耳聆絲竹之娛者同年而語哉方今泰階端平天下無事修日養夕差得從容鑽閲六經泛濫百氏研尋物理領略清言既以自慰且以自警而才力有限思力匪長熱疹惛憒多慚過目釋卷便忘是以蒙求之懷於茲彌軫聊遣典書陳顯宗申其蘊結想敬宜此豈盡意某叩頭藝文類聚三十七答晉安王書一首得五月二十八日疏并詩一首省覽周環慰同促膝汝本有天才加以愛好無忘所能日見其善首尾裁淨可為佳作吟玩反覆欲罷不能相如奏賦孔璋呈檄曹劉異代並號知音發嘆凌雲興言愈病嘗謂過差未以信然一見來章而樹諼忘痗方證昔談非為妄作炎涼始貿觸興自高覩物興情更向篇什昔梁王好士淮南禮賢遠致賓游廣招英俊非唯藉甚當時故亦傳聲不朽必能虛己自來慕義含毫屬意差有起豫攝養得宜與時無爽耳既責成有寄居多暇日殽核墳史漁獵詞林上下數千年間無人致足樂也知少行遊不動亦靜不出戶庭觸地丘壑天遊不能隱山林在目中冷泉石鏡一見何必勝於傳聞松塢杏林知之恐有逾吾就靜然終日披古為事泛觀六籍雜玩文史見孝友忠貞之跡覩治亂驕奢之事足以自慰足以自言人師益友森然在目嘉言誠至無俟旁求舉而行之念同乎此但清風朗月思我友于各事藩維未克棠棣興言屆此夢寐增勞善護風寒以慰懸想指復立此促遲還書某疏答湘東王求文集及詩苑英華書一首得疏知須詩苑英華及諸文製發函伸紙閲覽無輟雖事涉烏有義異擬倫而清新卓爾殊為佳作夫文典則纍野麗亦傷浮能麗而不浮典而不野文質彬彬有君子之致吾嘗欲為之但恨未逮耳觀汝諸文殊與意會至於此書彌見其美遠兼邃古傍概典墳學以聚益居焉可賞吾少好斯文迄茲無倦談經之暇斷務之餘陟龍樓而靜拱掩鶴關而高臥與其飽食終日寧遊思於文林或日因春陽其物韶麗樹花發鶯鳴和春泉生暄風至陶嘉月而嬉遊藉芳草而眺矚或朱炎受謝白藏紀時玉露夕流金風夕扇悟秋山之心登高而遠託或夏條可結倦於邑而屬詞冬雪千里覩紛霏而興詠密親離則手為心使昆弟晏則墨以硯露又愛賢之情與時而篤冀同市駿庶匪畏龍不子晉而事似洛濱之游多愧子桓而興同漳川之賞漾舟玄圃必集應阮之儔徐輪博望亦招龍淵之侶校核仁義源本山川旨酒盈罍嘉肴益俎曜靈既隱繼之以朗月高舂既夕申之以清夜並命連篇在茲彌博又往年因暇搜採英華上下數十年間未易詳悉猶有遺恨而其書已傳雖未為精核亦粗足諷覽集乃不工而並作多麗汝既須之皆遣送也某啓誡諭殷鈞手書知比諸德哀頓為過又所進殆無一溢甚以酸耿迥然一身宗奠是寄毀而滅性聖教所不許宜微自遣割俯存禮制饘粥果蔬少加勉彊憂懷既深指故有及并令繆道臻口具梁書殷鈞傳與張緬弟纘書賢兄學業該通蒞事明敏雖倚相之讀墳典郤縠之敦詩書惟今望古蔑以斯過自列宮朝二紀將及義惟僚屬情實親友文筵講席朝遊夕宴何曾不同茲勝賞共此言寄如何長謝奄然不追且年甫強仕方申才力摧苗落穎彌可傷惋念天倫素睦一旦相失如何可言言及增哽攬筆無次梁書張緬傳答雲法師請開講書某覽近示知欲見令道義夫釋教凝深至理淵粹一相之道杳然難測不二之門寂然無響自非深達玄宗精解妙義若斯之處豈易輕辨至於宣揚正教在乎利物耳弟子之於內義誠自好之樂之然鉤深致遠多所未悉為利之理蓋何足論諸僧並入法門遊道日廣至於法師彌不俟說云欲見參稟良所未喻想得此意不復多云某和南廣弘明集二十一又答重覽來示知猶欲令述義不辨為利具如前言甘露之開彌慚來說若止是略標義宗無為不爾但愧以魚目擬法師之夜光耳某和南廣弘明集二十一七契奚斯逸士肥遁棄榮蓮峰於焉剗跡灌水是用庇形口不悅於五味心不娛於八聲鄙巢父之稱哲笑蘇門之為英鵠蓋龍旗初不關意鳳吹鼉鼓終不屑情跨四海而擅美邁三古而振名居山林而不返終無慮而無營於是辨博君子詞若湧泉言踰卻秦之魯辨超稷下之田欲抑則大鵬垂翅欲抗則尺鷃沖天聞逸士之懷寶乃拂衣而造焉駕兩驂之如手乘輕車之若流爰自畿甸徑造山周傍瞻虹見俯眺雲浮鳴禽聒耳零霧蔽眸唯一壑之為阻無三徑之可求於是披榛陟路援蘿踐崿雖跋涉而不休覩逸士之所託其為居也寂焉而靡所聽瞑然而無所瞻三春蔓戶八桂攢簷蓽門鳥宿圭竇狐潛風來室搖露下窗霑實人跡之罕至逸士於此而獨淹君子曰蓋聞智士不希狷介仁者莫有迷邦傅說終受殷爵呂望遂啓齊封余敬吐誠而畢慮子能留志而見從乎逸士曰鄙人固陋自潛幽藪必枉話言敬聆金口君子曰若夫夾鍾之節春景依遲碧樹初蕊緑草含滋春臺之樂信矣熙熙於是百金之士萬鍾之家招搖隆富徵集豪華駕紫騮之馬乘青蓋之車出自高宇行無狹斜陶嘉月而結交遊藉芳辰而宴朋友望宜春以隨肩入長楊以攜手金盤薦美藉之珍玉杯沈縹清之酒義曰和神事非爽口於是娛樂未終留光將夕飛觴引滿奮袖舉白投轄安坐歡甚促席以會雕蟲之賓加有清談之客論同炙輠藻若陵雲戴憑不能高其說相如不能擅其文無玄不析無細不分搦𥳑玉振下筆蘭芬乃亦六郡未擬非直三蜀蔑聞屬虞泉氣晚朗月潛曜清卮未闌宵景方照奇舞遞作名謳斯召約綽妍姿嬋嫣宜笑綺縠風吹珠璣星耀齊竽揚參差之響趙瑟奏鏗鏘之妙茲亦遊宴之至娛子能偕此而為樂乎逸士曰輕蕩遊觀非豫所耽得性行樂從好山南君子曰輔性和神實惟至味非直方今見重乃亦自古攸貴不周之和調腸補胃雜以龍肝玃炙豹舌猩唇劉氏之醢范公之麟鶬出雲際鱘來江岷蒲菹芬馥古聖所珍其酒則蒼梧九醞中山千日取譬湛露擬之飴蜜百味交馳三雅閒出若其珍異則修筵斯溢千品萬類不可詳悉西母靈桃南楚萍實東陵之瓜北燕之栗湖畔之柿江陰之橘張掖白奈恆陽黃梨河東洗犬隴蜀蹲鴟並怡神甘口窮美極滋加以伊公調和易氏燔爨傳車渠之碗置青玉之案瑤俎既已麗奇雕盤復為美玩子能與豫而享之乎逸士曰甘膬腸腐五味口爽伊人素蓄無羡方丈君子曰千里之駒出自余吾伯樂所選伏波所模通肩合相平腹應圖激電比速躡景競驅騰黃弗敢擬駿赤兔莫與爭途異態蹥踡奇姿猗倚逸足驟反遊雲移駛形函遊華日不暇徙乃飾金羈之昭晰加以玉鞍之輝煥連乾麗靡輕蘇粲爛逸氣既為勝矚美飾重成壯觀蹄蹶紅塵膺流絳汗風起龍驤灰聲鳥散自古迄今人誰不玩逸士能就豫而乘之乎逸士曰遊逸輕佻策馬爭驅粵今樂靜豈能感娛君子曰光形飾體莫過鮮衣冠鵔鸃之長纓若曾雲之零霏琅玕珩珮言飾于背飄揚輕裾是用曜軀方空之綬弱紈之蕉暑才炎而已卻風未至而先搖既唯照麗兼以輕鏘似朝霞之發彩若夕景之舒光至夫杪秋既謝寒緒中人則輕狐稱美豐貂表珍斯乃赤也所以去魯孟嘗所以出秦步光之妙櫑具之華君子武備所用禦邪標以珠玉飾以蓮花其任則百冶精鋭利擬秋霜豈止在身為美服襲稱臧固乃龍躍於襄水見氣於南昌幽通神化其妙難詳將與逸士服之以相徉逸士曰紾絺避暑縕袍禦冬鮮麗綺靡未之或從君子曰實有喬桐抽葉青蔥結根善地擢幹華嵩栖鳳曾山之側藏龍平陵之東拂曖曃之高雲鼓梢殺之雄風苕亭萬仞實造天中乃使匠石運斤班輸琢錘製起玄修形踰緑綺與金石而鏗鏘共絲竹而曼靡托北方之佳人命高樓之杞氏閒以巴隴才僮邯鄲妙妓騁獸為之輟馳飛禽為之不徙加以荊和之飾照耀柘絲之絃激揚三聲吐韻四結流唱辭高薰奏響溢芝房竹來嶰谷律寫歸昌再鼓而玄鶴集九成而儀鳳翔初音魚踊餘妙繞梁何止田文慨慷劉靖心傷而已哉中山青曲若折而和揚美目以流眄啓玉齒而安歌歌曰陽阿奏兮激楚流望洛水兮有好仇縱輕櫂兮泛龍舟將與逸士陟彼華堂憩諸閎館玉宇明華文階燦爛璇題昭晰珠簾彪煥身託玳瑁之筵目寓瓊華之玩止以悅諸和性之樂豈非綺麗之觀哉逸士曰居茲四郭寧辨五音靡曼不極君子弗欽雖聞贍辭之鋭無會野人之心君子曰白藏肅殺天高野清玉樹始落金蕊初榮幕燕北反沙雁南征實秋收之美節將校獵以娛情使櫪無伏馬巷靡遺行執戈於芊眠之野彎弧於曠浪之陰養由輕盼則林摧鷙獸蒲且效技則虛下翔禽騰猿蹶其足虓虎不擇音掩兔轔鹿既蔑古之烏有填坑滿谷亦眇昔之上林至於輕繳才飛則連鴻解羽微纖始放則並鱗失波豈論玄泉之則寧願將遨之歌弭節言旋禽不可算周旋眺覽足為京觀子雖山栖其從此玩逸士曰解網垂仁殷王美則聞聲不食孔聖淑音害蠢類而為樂豈君子之用心君子曰蓋聞地美養禾君人愛士澤被無垠光照郊鄙蒲輪必鄒魯之儒宗紆青必洛陽之才子大漢愧得人之盛有周慚以寧之美萬國若翕從四海同使指刑措弗用囹圄斯虛既講禮於太學亦論詩於石渠戈有載戢史無絶書銅律應度玉燭調和黃髮擊壤青襟興歌元帥奇士庠序鴻生求禮儀之汲汲行仁義之明明隆采椽之義卻玳瑁之榮當朝有仁義之睦邊境無煙塵之驚信如四氣明並三光廚萐挺茂階蓂比芳瑞鹿摛素祥熊耀黃靈禽樂囿儀鳳栖堂太平之瑞寶鼎樂協之應玉羊丹烏表色玉露呈瀼野絲垂木嘉苗貫桑固以德苞子姒道邁虞唐六合寧泰四宇咸康不煩一戟東甌膜拜詎勞一卒西域獻琛鹿蠡稽顙以悛惡樓蘭面縛而革音吾皆去鼻飲之穴棄烏舉之深固以澤流無外恩被遐方福比嵩岱道則穹蒼豈有聞若斯之化而藏其皮冠哉逸士曰鄙人寡識守節山隅不聞智士之教將自潛以糜軀請伏道而從命願開志以滌慮文苑英華三百五十一陶淵明集序夫自衒自媒者士女之醜行不忮不求者明達之用心是以聖人韜光賢人遁世其故何也含德之至莫踰於道親己之切無重於身故道存而身安道亡而身害處百齡之內居一世之中倏忽比之白駒寄寓謂之逆旅宜乎與大塊而榮枯隨中和而任放豈能戚戚勞於憂畏汲汲役于人間齊謳趙女之娛八珍九鼎之食結駟連鑣之遊侈袂執圭之貴樂則樂矣憂亦隨之何倚伏之難量亦慶吊之相及智者賢人居之甚履薄冰愚夫貪士競之若泄尾閭玉之在山以見珍而招破蘭之生谷雖無人而猶芳故莊周垂釣於濠伯成躬耕於野或貨海東之藥草或紡江南之落毛譬彼鴛雛豈競鳶鴟之肉猶斯雜縣寧勞文仲之牲至如子常寧喜之倫蘇秦衛鞅之匹死之而不疑甘之而不悔主父偃言生不五鼎食死即五鼎烹卒如其言豈不痛哉又有楚子觀周受折於孫滿霍侯驂乘禍起于負芒叨餮之徒其流甚衆唐堯四海之主而有汾陽之心子晉天下之儲而有洛濱之志輕之若脫履視之若鴻毛而況於他乎是以聖人達士因以晦跡或懷玉而謁帝或披褐而負薪鼓楫清潭棄機漢曲情不在於衆事寄衆事以忘情者也有疑陶淵明之詩篇篇有酒吾觀其意不在酒亦寄為跡焉其文章不群詞采精拔跌蕩昭彰獨超衆類抑揚爽朗莫之與京橫素波而傍流干青雲而直上語時事則指而可想論懷抱則曠而且真加以貞志不休安道苦節不以躬耕為恥不以無財為病自非大賢篤志與道汙隆孰能如此乎余愛嗜其文不能釋手尚想其德恨不同時故更加搜求粗為區目白璧微瑕者惟在閒情一賦揚雄所謂勸百而諷一者卒無諷諫何必搖其筆端惜哉亡是可也并粗點定其傳編之于録嘗謂有能讀淵明之文者馳競之情遣鄙吝之意祛貪夫可以廉懦夫可以立豈止仁義可蹈亦乃爵祿可辭不勞復傍游太華遠求柱史此亦有助於風教爾宋本陶淵明集文選序式觀元始眇覿玄風冬穴夏巢之時茹毛飲血之世世質民淳斯文未作逮乎伏羲氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉易曰觀乎天文以察時變觀乎人文以化成天下文之時義遠矣哉若夫椎輪為大輅之始大輅寧有椎輪之質增冰為積水所成積水曾微增冰之凜何哉蓋踵其事而增華變其本而加厲物既有之文亦宜然隨時變改難可詳悉嘗試論之曰詩序云詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌至於今之作者異乎古昔古詩之體今則全取賦名荀宋表之於前賈馬繼之於末自茲以降源流實繁述邑居則有憑虛亡是之作戒畋遊則有長楊羽獵之制若其紀一事詠一物風雲草木之興魚蟲禽獸之流推而廣之不可勝載矣又楚人屈原含忠履潔君匪從流臣進逆耳深思遠慮遂放湘南耿介之意既傷抑鬱之懷靡訴臨淵有懷沙之志吟澤有憔悴之容騷人之文自茲而作詩者蓋志之所之也情動於中而形於言關睢麟趾正始之道著桑間濮上亡國之音表故風雅之道粲然可觀自炎漢中葉厥塗漸異退傅有在鄒之作降將著河梁之篇四言五言區以別矣又少則三字多則九言各體互興分鑣並驅頌者所以游揚德業褒贊成功吉甫有穆若之談季子有至矣之嘆舒布為詩既言如彼總成為頌又亦若斯次則針興於補闕戒出於弼匡論則析理精微銘則序事清潤美終則誄發圖象則讚興又詔誥教令之流表奏箋記之列書誓符檄之品弔祭悲哀之作答客指事之制三言八字之文篇辭引序碑碣志狀衆制鋒起源流間出譬陶匏異器並為入耳之娛黼黻不同俱為悅目之玩作者之致蓋云備矣余監撫餘間居多暇日歷觀文囿泛覽詞林未嘗不心遊目想移晷忘倦自姬漢以來眇焉悠邈時更七代數逾千祀詞人才子則名溢於縹囊飛文染翰則卷盈乎緗帙自非略其蕪穢集其清英蓋欲兼功太半難矣若夫姬公之籍孔父之書與日月俱懸鬼神爭奧孝敬之準式人倫之師友豈可重以芟夷加之剪截老莊之作管孟之流蓋以立意為宗不以能文為本今之所撰又以略諸若賢人之美詞忠臣之抗直謀夫之話辨士之端冰釋泉湧金相玉振所謂坐狙丘議稷下仲連之卻秦軍食其之下齊國留侯之發八難曲逆之吐六奇蓋乃事美一時語流千載概見墳籍旁出子史若斯之流又亦繁博雖傳之簡牘而事異篇章今之所集亦所不取至於紀事之史繫年之書所以褒貶是非紀別異同方之篇翰亦已不同若其讚論之綜緝詞采序述之錯比文華事出於沉思義歸乎翰藻故與夫篇什雜而集之遠自周室迄於聖代都為三十卷名曰文選云爾凡次文之體各以彙聚詩賦體既不一又以類分類分之中各以時代相次文選僧正并序大正以真俗兼解鬱為善歌璡師以行有餘力緣情繼響余自法席既闌便思和寂杼軸二年濡翰兩器大正今春復為同泰建講法輪將半此作方成所以物色不同序事或異光開鷲嶽金牒祕香城窮源絶有際離照歸無名若人聆至寂寄說表真冥能令梵志遣亦使群魔驚寶珠分水相須彌會色形學徒均染㲲遊士譬春英伊豫寡空智徒深愛怯情舒金起祗苑開筵慕肅成年鍾倏從變弦望驟舒盈今開火林聚淨土接承明掖影連高塔法鼓亂嚴更雷聲芳樹長月出地芝生已知法味樂復悅玄言情何因動飛轡暫使塵勞輕本集一詩紀六十六又類聚七十六引城名冥驚明更生清輕九韻爾雅制法則贊惟斯法則信如四時嚴此刑政刑輕罪疑霜威已振民不敢欺藝文類聚五十四弓矢讚弓用筋角矢製良工亦以觀德非止臨戎楊葉命中猿墮長空藝文類聚六十初學記二十二御覽三百五十蟬賦茲蟲清潔惟露是餐初學記三十陶淵明傳陶淵明字元亮或云潛字淵明潯陽柴桑人也曾祖侃晉大司馬淵明少有高趣博學善屬文穎脫不群任真自得嘗著五柳先生傳以自況曰先生不知何許人也亦不詳姓字宅邊有五柳樹因以為號焉間靜少言不慕榮利好讀書不求甚解每有會意欣然忘食性嗜酒而家貧不能恆得親舊知其如此或置酒招之造飲輒盡期在必醉既醉而退曾不吝情去留環堵蕭然不蔽風日短褐穿結簞瓢屢空晏如也嘗著文章自娛頗示己志忘懷得失以此自終時人謂之實録親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟往候之偃臥瘠餒有日矣道濟謂曰賢者處世天下無道則隱有道則至今子生文明之世奈何自苦如此對曰潛也何敢望賢志不及也道濟饋以粱肉麾而去之後為鎮軍建威參軍謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞之以為彭澤令不以家纍自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子也可善遇之公田悉令吏種秫曰吾常得醉於酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳歲終會郡遣督郵至縣吏請曰應束帶見之淵明歎曰我豈能為五斗米折腰向鄉里小兒即日解綬去職賦歸去來徵著作郎不就江州刺史王弘欲識之不能致也淵明嘗往廬山弘命淵明故人龐通之齎酒具於半道栗里之閒邀之淵明有腳疾使一門生二兒舁籃輿既至欣然便共飲酌俄頃弘至亦無忤也先是顏延之為劉抑後軍功曹在潯陽與淵明情款後為始安郡經過潯陽日造淵明飲焉每往必酣飲致醉弘欲邀延之坐彌日不得延之臨去留二萬錢與淵明淵明悉遣送酒家稍就取酒嘗九月九日出宅邊菊叢中坐久之滿手把菊忽值弘送酒至即便就酌醉而歸淵明不解音律而蓄無絃琴一張每酒適輒撫弄以寄其意貴賤造之者有酒輒設淵明若先醉便語客我醉欲眠卿可去其真率如此郡將常候之值其釀熟取頭上葛巾漉酒漉畢還復著之時周續之入廬山事釋惠遠彭城劉遺民亦遁迹匡山淵明又不應徵命謂之潯陽三隱後刺史檀韶苦請續之出州與學士祖企謝景夷三人共在城北講禮加以讎校所住公廨近於馬隊是故淵明示其詩云周生述孔業祖謝響然臻馬隊非講肆校書亦已勤其妻翟氏亦能安勤苦與其同志自以曾祖晉世宰輔恥復屈身後代自宋高祖王業漸隆不復肯仕元嘉四年將復徵命會卒時年六十三世號靖節先生宋本陶淵明集祭達磨大師文洪惟聖胄大師荷十力之智印乘六通而泛海運悲智於梵方拯顛危於華土釋藏綺
