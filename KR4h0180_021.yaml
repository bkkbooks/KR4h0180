body:
  text: 昭明太子統令旨解二諦義并問荅二諦理實深玄自非虛懷無以通其弘遠明道之方其由非一舉要論之不出境智或時以境明義或時以智顯行至於二諦即是就境明義若迷其方三有不絕若達其致萬累斯遣所言二諦者一是真諦一名俗諦真諦亦名第一義諦俗諦亦名世諦真諦俗諦以定體立名第一義諦世諦以褒貶立目若以次第言說應云一真諦二俗諦一與二合數則為三非直數過於二亦名有前後於義非便真既不因俗而有俗亦不由真而生正可得言一真一俗真者是實義即是平等更無異法能為雜間俗者即是集義此法得生浮偽起作第一義者就無生境中別立美名言此法最勝最妙無能及者世者以隔別為義生滅流動無有住相涅槃經言出世人所知名第一義諦世人所知名為世諦此即文證褒貶之理二諦立名差別不同真俗世等以一義說第一義諦以二義說正言此理德既第一義亦第一世既浮偽更無有義所以但立世名諦者以審實為義真諦審實是真俗諦審實是俗真諦離有離無俗諦即有即無即有即無斯是假名離有離無此為中道真是中道以不生為體俗既假名以生法為體南澗寺慧超咨曰浮偽起作名之為俗離於有無名之為真未審浮偽為當與真一體為當有異令旨荅曰世人所知生法為體出世人所知不生為體依人作論應如是說若論真即有是空俗指空為有依此義明不得別異又諮真俗既云一體未審真諦亦有起動為當起動自動不關真諦令旨又荅真諦寂然無起動相凡夫惑識自橫見起動又諮未審有起動而凡夫橫見無起動而凡夫橫見令旨又荅若有起動則不名橫見以無動而見動所以是橫又諮若法無起動則唯應一諦令旨又荅此理常寂此自一諦橫見起動復是一諦唯應有兩不得言一又諮為有橫見為無橫見令旨又荅依人為語有此橫見又諮若依人語故有橫見依法為談不應見動令旨又荅法乃無動不妨橫者自見其動丹陽尹晉安王蕭綱諮曰解旨依人為辨有生不生未審浮虛之與不生只是一體為當有異令旨荅曰凡情所見見其起動聖人所見見其不生依人為論乃是異體若語相即則不成異具如向釋不復多論又諮若真不異俗俗不異真豈得俗人所見生法為體聖人所見不生為體令旨荅即俗知真即真見俗就此為談自成無異約人辨見自有生不生殊又諮未審俗諦之體既云浮幻何得於真實之中見此浮幻令旨荅真實之體自無浮幻惑者橫構謂之為有無傷真實體自玄虛又諮聖人所見見不流動凡夫所見自見流動既流不流異愚謂不得為一令旨荅不謂流不流各是一體正言凡夫於不流之中橫見此流以是為論可得成一又諮真寂之體本自不流凡夫見流不離真體然則但有一真不成二諦令旨荅體恒相即理不得異但凡見浮虛聖覩真寂約彼凡聖可得立二諦名招提寺慧琰諮曰凡夫見俗以生法為體聖人見真以不生為體未審生與不生但見其異復依何義而得辨一令旨荅曰凡夫於無構有聖人即有辨無有無相即此談一體又諮未審此得談一一何所名令旨荅曰正以有不異無無不異有故名為一更無異名又諮若無不異有有不異無但見其一云何為二令旨荅凡夫見有聖人見無兩見既分所以成二又諮聖人見無無可稱諦凡夫見有何能稱諦令旨荅聖人見無在聖為諦凡夫審謂為有故於凡為諦栖玄寺曇宗諮曰聖人為見世諦為不見世諦令旨荅曰聖人知凡人見有世諦若論聖人不復見此又諮聖人既不見世諦云何以世諦教化眾生令旨荅聖人無惑自不見世諦無妨聖人知凡夫所見故曲隨物情說有二諦又諮聖人知凡見世諦即此凡夫不令旨荅此凡即是世諦聖人亦不見此凡又諮聖既不見凡焉知凡見世諦令旨荅聖雖自無凡亦能知有凡自謂為有故曲赴其情為說世諦司徒從事中郎王規諮曰未審真俗既不同豈得相即之義令旨荅聖人所得自見其無凡人所得自見其有見自不同無妨俗不出真外又諮未審既無異質而有二義為當義離於體為當即義即體令旨荅更不相出名為一體愚聖見殊自成異義又諮凡夫為但見俗亦得見真令旨荅止得見俗不得見真又諮體既相即寧不覩真令旨荅凡若見真不應覩俗覩俗既妄焉得見真靈根寺僧遷諮曰若第一以無過為義此是讚嘆之名真離於俗亦應是讚嘆之名令旨荅曰即此體真不得言嘆第一義諦既更立美名所以是嘆又諮無勝我者既得稱讚歎我體即真何故非嘆令旨荅無勝我者所以得稱讚歎我體即真亦是我真故非讚嘆又諮我無過者所以得稱讚嘆我是不偽何得非讚令旨荅不偽直是當體之名如人體義謂之解義正足稽其實體豈成讚嘆又諮此法無能出者焉能即是讚嘆令旨荅既云無出非讚如何羅平侯蕭正立諮曰未審俗諦是生法不令旨荅曰俗諦之體正是生法又諮俗既橫見何得有生令旨荅橫見為有所以有生又諮橫見為有實自無法實既無法說何為生令旨荅即此生法名為橫見亦即此橫見名為生法又諮若是橫見不應有生若必有生何名橫見令旨荅既云橫見實自無生但橫見為有有此橫生衡山侯蕭恭諮曰未審第一義諦既有義目何故世諦獨無義名令旨荅曰世既浮俗無義可辨又諮若無義可辨何以稱諦令旨荅凡俗審見故立諦名又諮若凡俗見有得受諦名亦應凡俗見有得安義字令旨荅凡俗審見故諦名可立浮俗無義何得強字為義又諮浮俗雖無實義不無浮俗之義既有此浮俗何得不受義名令旨荅正以浮俗故無義可辨若有義可辨何名浮俗中興寺僧懷諮曰令旨解言真不離俗俗不離真未審真是無相俗是有相有無相殊何得同體令旨荅曰相與無相此處不同但凡所見有即是聖所見無以此為論可得無別又諮既是一法云何得見為兩見既有兩豈是一法令旨荅理乃不兩隨物所見故得有兩又諮見既有兩豈不相違令旨荅法若實兩可得相違法實不兩人見自兩就此作論焉得相乖又諮人見有兩可說兩人理既是一豈得有兩令旨荅理雖不兩而約人成兩始興王第四男蕭映諮曰第一義諦其義第一德亦第一不令旨荅曰義既第一德亦第一又諮直言第一已包德義何得復加義字以致繁複令旨荅直言第一在義猶昧第一見義可得盡美又諮若加以義字可得盡美何不加以德字可得盡美令旨荅第一是德豈待復加但加義字則德義雙美又諮直稱第一足見其美偏加義字似有所局令旨答第一表德復加義字二美俱陳豈有所局吳平世子蕭勵諮曰通旨云第一義諦世諦褒貶立名真俗二諦定體立名尋真諦之理既妙絕言慮未審云何有定體之旨令旨荅曰談其無相無真不真寄名相說以真定體又諮若真諦無體今寄言辨體未審真諦無相何不寄言辨相令旨荅寄言辨體猶恐貶德若復寄言辨相則有累虛玄又諮真諦玄虛離於言說今既稱有真豈非寄言辨相令旨荅寄有此名名自是相無傷此理無相虛寂又諮未審此寄言辨體為是當理為不當理令旨荅無名而說名不合當理又諮若寄言辨名名不當理未審此寄將作何說令旨荅雖不當理為接引眾生須名相說宋熙寺慧令諮曰真諦以不生為體俗諦以生法為體而言不生即生生即不生為當體中相即為當義中相即令旨荅云體中相即義不相即又諮義既不即體云何即令旨荅凡見其有聖覩其無約見成異就體恒即又諮體既無兩何事須即令旨荅若體無別兩緣見有兩見既兩異須明體即又諮若如解旨果是就人明即令旨荅約人見為二二諦所以名生就人見明即此亦何妨始興王第五男蕭曄諮曰真諦稱真是實真不令旨荅曰得是實真又諮菩薩會真之時為忘俗忘真不令旨荅忘俗忘真故說會真又諮若忘俗忘真故說會真忘俗忘真何謂實真令旨荅若存俗存真何謂實真正由兩遣故謂實真又諮若忘俗忘真而是實真亦應忘真忘俗而是實俗令旨荅忘俗忘真所以見真忘真忘俗彌見非俗又諮菩薩會真既忘俗忘真今呼實真便成乖理令旨荅假呼實真終自忘真兩忘稱實何謂乖理興皇寺法宣諮曰義旨云俗諦是有是無故以生法為體未審有法有體可得稱生既是無法云何得有生義令旨荅俗諦有無相待而立既是相待故並得稱生又諮若有無兩法並稱為生生義既一則有無無異令旨荅俱是凡夫所見故生義得同是有是無焉得不異又諮若有無果別應有生不生令旨荅既相待立名故同一生義程鄉侯蕭祇諮曰未審第一之名是形待以不令旨荅正是形待又諮第一無相有何形待令旨荅既云第一豈得非待又諮第一是待既稱第一世諦待於第一何不名為第二若俗諦是待而不稱第二亦應真諦是待不名第一令旨荅若稱第一是待於義已足無假說俗第二方成相待又諮若世諦之名不稱第二則第一之稱無所形待令旨荅第一褒真既云相待世名是待直置可知光澤寺法雲諮曰聖人所知之境此是真諦未審能知之智為是真諦為是俗諦令旨荅曰能知是智所知是境智來冥境得言即真又諮有智之人為是真諦為是俗諦令旨荅若呼有智之人即是俗諦又諮未審俗諦之人何得有真諦之智令旨荅聖人能忘於俗所以得有真智又諮此人既冥無生亦應不得稱人令旨荅冥於無生不得言人寄名相說常自有人靈根寺慧令諮曰為於真諦中見有為俗諦中見有令旨荅曰於真諦中橫見有有又諮俗諦之有為實為虛令旨荅是虛妄之有又諮為當見妄為當見有令旨荅見於妄有又諮無名相中何得見有名相令旨荅於無名相見有名相所以妄有又諮於無名相妄見為有譬如火熱惑者言冷得就熱中有冷相不若於無相而有名相亦於火中應有此冷令旨荅火自常熱妄見有冷此自惑冷熱不嘗異湘宮寺慧興諮曰凡夫之惑為當但於真有迷於俗亦迷令旨荅曰於真見有此是迷真既見有俗不成迷俗又諮若使解俗便成解真若不解真豈得解俗令旨荅真理虛寂惑心不解雖不解真何妨解俗又諮此心不解真於真可是惑此心既解俗於惑應非惑令旨荅實而為語通自是惑辨俗森羅於俗中各解莊嚴寺僧旻諮曰世俗心中所得空解為是真解為是俗解令旨荅可名相似解又諮未審相似為真為俗令旨荅習觀無生不名俗解未見無生不名真解又諮若能照之智非真非俗亦應所照之境非真非俗若是非真非俗則有三諦令旨荅所照之境既即無生無生是真豈有三諦又諮若境即真境何不智即真智令旨荅未見無生故非真智何妨此智未真而習觀真境豈得以智未真智而使境非真境宣武寺法寵諮曰真諦不生不滅俗諦有生有滅真俗兩義得言有異談其法體只得是一未審體從於義亦得有二不令旨荅曰體亦不得合從於義又諮未審就凡聖兩見得言兩義亦就凡聖兩見得言兩體令旨荅理不相異所以云一就凡聖兩見得有二體之殊又諮若使凡者見有聖人見無便應凡夫但見世諦有聖人應見太虛無令旨荅太虛亦非聖人所見太虛得名由於相待既由待生並凡所見又諮凡夫所見空有得言是一不令旨荅就凡為語有實異無約聖作談無不異有建業寺僧愍諮曰俗人解俗為當解俗參差而言解俗為當見俗虛假而言解俗令旨荅只是見俗參差而言解俗又諮俗諦不但參差亦是虛妄何故解參差而不解虛妄令旨荅若使凡夫解虛妄即是解真不解虛妄所以名為解俗光澤寺敬脫諮曰未審聖人見真為當漸見為當頓見令旨荅漸見又諮無相虛懷一見此理萬相並寂未審何故見真得有由漸令旨荅曰自凡之聖解有淺深真自虛寂不妨見有由漸又諮未審一得無相並忘萬有為不悉忘令旨荅一得無相萬有悉忘又諮一得無相忘萬有者亦可一得虛懷窮彼真境不應漸見令旨荅如來會寂自是窮真淺行聖人恒自漸見又諮若見真有漸不可頓會亦應漸忘萬有不可頓忘令旨荅解有優劣故有漸見忘懷無偏故萬有並寂廣弘明集二十四令旨解法身義并問荅法身虛寂遠離有無之境獨脫因果之外不可以知知不可以識識豈是稱謂所能論辨將欲顯理不容嘿然故隨從言說致有法身之稱天竺云達磨舍利此土謂之法身若以當體則是自性之目若以言說則是相待立名法者軌則為旨身者有體之義軌則之體故曰法身略就言說粗陳其體是常住身是金鋼身重加研覈其則不爾若定是金鋼即為名相定是常住便成方所所謂常住本是寄名稱名金鋼本是譬說及談實體則性同無生故云佛身無為不墮諸法故涅槃經說如來之身非身是身無量無邊無有足跡無知無形畢竟清靜無知清靜而不可為無稱曰妙有而復非有離無離有所謂法身招提寺慧琰諮曰未審法身無相不應有體何得用體以釋身義令旨荅曰無名無相乃無體可論寄以名相不無妙體又諮若寄以名相不無妙體則寄以名相不成無相令旨荅既云寄以名相足明理實無相又諮若寄以名相而理實無相理既無相云何有體令旨荅寄言軌物何得無體又諮亦應寄言軌物非復無相令旨荅軌物義邊理非無相所言無相本談妙體又諮真實本來無相正應以此軌物何得隱斯真實強生言相令旨荅真實無相非近學所窺是故接諸庸淺必須寄以言相光澤寺法雲諮曰未審法身常住是萬行得否令旨荅曰名相道中萬行所得又諮既為萬行所得豈是無相若必無相豈為萬行所得令旨荅無名無相何曾有得寄以名相假言有得又諮實有萬行實得佛果安可以無相全無所得令旨荅問者住心謂實有萬行今謂萬行自空豈有實果可得又諮見有眾生修習萬行未審何故全謂為無令旨荅凡俗所見謂之為有理而檢之實無萬行又諮經說常住以為妙有如其假說何謂妙有令旨荅寄以名相故說妙有理絕名相何妙何有莊嚴寺僧旻諮曰未審法身絕相智不能知絕相絕知何得猶有身稱令旨荅曰無名無相曾有何身假名相說故曰法身又諮亦應假名相說是智所照何得不可以知知不可以識識令旨荅亦得寄名相慧眼所見又諮若慧眼能見則可以知知若知不能知則慧眼無見令旨荅慧眼無見亦無法可見又諮若云無見有何法身令旨荅理絕聞見實無法身又諮若無法身則無正覺正覺既有法身豈無令旨荅恒是寄言故有正覺正覺既在寄言法身何得定有宣武寺法寵諮曰未審法身之稱為正在妙體金姿丈六亦是法身令旨荅曰通而為論本跡皆是別而為語止在常住又諮若止在常住不應有身若通取丈六丈六何謂法身令旨荅常住既有妙體何得無身丈六亦能軌物故可通稱法身又諮若常住無累方稱法身丈六有累何謂法身令旨荅眾生注仰妄見丈六丈六非有有何實累又諮若丈六非有指何為身令旨荅隨物見有謂有應身又諮既曰應身何謂法身令旨荅通相為辨故兼本跡覈求實義不在金姿靈根寺慧令諮曰未審為以極智名曰法身為以全相故曰法身令旨荅無名無相是集藏法身圓極智慧是實智法身又諮無名無相則無身不身既有法身何謂無相令旨荅正以無相故曰法身又諮若以無相故曰法身則智慧名相非復法身令旨荅既是無相智慧豈非法身又諮如其有身何名無相若是無相何得有身令旨荅於無名相假說法身又諮若假說法身正存名相云何直指無相而謂法身令旨荅既於無相假立名相豈得異此無相而說法身靈味寺靜安諮曰未審法身乘應以不令旨荅法身無應又諮本以應化故稱法身若無應化何謂法身令旨答本以軌則之體名為法身應化之談非今所軌又諮若無應化云何可軌既為物軌豈無應化令旨荅眾生注仰蒙益故云能為物軌化緣已畢何所應化又諮若能益眾生便成應化若無應化何以益物令旨荅能生注仰軌則自成何勞至人俯應塵俗又諮既生注仰豈無應化若無應化注仰何益令旨荅正由世尊至極神妙特深但令注仰自然蒙祐若應而後益何謂至神不應而益故成窮美若必令實應與菩薩豈殊廣弘明集二十一
