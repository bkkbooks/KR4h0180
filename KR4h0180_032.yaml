body:
  text: 沈約冠子祝文蠲茲令日元服肇加成德既舉童心自化行之則至無謂道賖敦以秋實食以春華無恥下問乃致高車子孫千億廣樹厥家初學記十四御覽五百四十賽蔣山廟文我皇體天御宇望日表尊備樂變乎笙鏞鬱禮華於俎豆邇無不懷遠無不肅鳥革玄素之容草移丹緑之狀泉露改味日月重光仰惟大王年踰二百世兼四代揚玉桴布瑤席秦梁楚趙之巫把瓊茅而延佇燕衛宋鄭之音結流風而成曲九疑之乘蔽日三山之駕若雲藝文類聚七十九懺悔文弟子沈約稽首上白諸佛衆聖約自今生已前至於無始罪業參差固非詞象所算識昧往緣莫由證舉爰始成童有心嗜欲不識慈悲莫辨罪報以為毛群魪品事允庖廚無對之緣非惻隱所及晨銼暮爚亙月隨年嗛腹填虛非斯莫可兼曩昔蒙稚精靈靡達遨戲之間恣行夭暴蠢動飛沈罔非登俎儻相逢值橫加剿撲卻數追念種彙實蕃遠憶想間難或詳盡又暑月寢臥蚊虻噆膚忿之於心應之於手歲所殲殞略盈萬計手因怒運命因手傾為殺之道事無不足迄至於今猶未頓免又嘗竭水而漁躬事網罭牽驅士卒歡娛賞會若斯等輩衆夥非一黨隸賓遊愆眚交互或盜人園實或偷人芻豢弱性蒙心隨喜讚悅受分吞贓皎然不昧性愛墳典苟得忘廉取非其有卷將二百又綺語者衆源條繁廣假妄之愆雖免大過微觸細犯亦難備陳又追尋少年血氣方壯習纍所纏事難排豁淇水上宮誠無云幾分桃斷袖亦足稱多此實生死牢穽未易洗拔灌志慘舒性所同稟遷怒過嗔有時或然厲色嚴聲無日可免又言謔行止曾不尋研觸過斯發動淪無紀終朝紛擾薄暮不休來果昏頑將由此作前念甫謝後念復興尺波不息寸陰驟往愧悔攢心罔知云厝今於十方三世諸佛前見在衆僧大衆前誓心剋己追自悔責收遜前愆洗濯今慮校身諸失歸命天尊又尋七尺所本八微是構析而離之莫知其主雖造業者身身隨念滅而念念相生離續無已往所行惡造既由心行惡之時其心既染既染之心雖與念滅往之所染即成後緣若不本諸真諦以空滅有則染心之纍不卒可磨今者興此愧悔磨昔所染所染得除即空成性其性既空庶罪無所託布髮頂禮幽顯證成此念一成相續不斷日磨歲瑩生生不休迄至道場無復退轉又彼惡加我皆由我昔加人若不滅此重緣則來惡彌遘當今斷絶永息來緣道無不在有來斯應庶達今誠要之咸達廣弘明集二十八下千僧會願文弟子沈約上白十方諸佛十方諸大聖今日見前衆僧三界非有五陰皆無四倒十纏共相和合一切如電揮萬劫於俄頃丘井易淪終漂沈於苦岸迷塗邃遠溺喪忘歸區區七尺莫知其假耳目之外謂為空談靡依靡歸不信不受生靈一謝再得無期約所以撫心自惻臨踐非譬者也至聖凝寂無迹可尋緣應所感事惟拯物持鉢安行出彼祇樹不逾停午以福衆生芳塵餘法峨然未改約以往夏遘罹痾疾帝上哀矜深垂愍慮以月次徂暑日在丙寅仰會千僧於其私宅隆茲重施弗知所限既已奉祇洪德又思自罄家財一舉盈千力難私辦稍而後滿事或易充草堂約法師於所住山寺為營八集其一仰憑上定林寺祐法主今月二十九日第十會集百僧於所創田廬福不唐捐聞之經訓心路皎然又過於此凡有涓毫應證來業無巨無細咸歸聖主仰願十方共明此誓豈足少酬天眷蓋以微寄誠心云爾廣弘明集二十八上為文惠太子禮佛願疏維年月朔日弟子皇太子某稽首和南十方諸佛一切賢聖夫至理可祈必憑誠於正覺極妙有感乃歸仰於真如然後取證現前獲驗茲日去歲皇帝暫虧御膳小廢乾行四海震惶百司戰悚諱歷劫多幸夙世善緣忝生王家叨守儲嗣臣子心地倍用焦迫禁門旦啓欣問豎之安寢扉早闢訪膳夫之宰祇樹獨園伏膺下拜伽藍精舍繞足頂禮百神警衛萬福具臻曾不信宿聖躬和愈豈非三寶之弘慈十號之法力既而天從心欲誠願克果今於崇正殿奉還法會千僧仍留百僧八關行道又度二士同日出家惟願藉此功德奉資皇帝陛下壽與南山共久年將北極俱長道懋農軒德高堯舜上界八萬之劫可期下方七百之祚未擬元良之位長守膝下之歡上嗣之所永保懷袖之愛以茲法田奉中宮皇后殿下福履攸善無思不屆天母之德厚載不能加任姒之盛坤儀寧足匹末及諸王妃主宮掖嬪房未來因緣過去眷屬並同茲辰預此慈善又普為積苦餓鬼受辜畜生三途八難六道十惡水陸蠢動山藪翾飛溼生化生有想無想皆藉今日慈悲咸簉浣濯人天攝受幽顯證明庶憑衆力共相津濟謹疏廣弘明集二十八上為文惠太子解講疏皇太子以建元四年四月十五日集大乘望僧於玄圃園安居寶地禁苑皆充供具珍臺綺榭施佛及僧振玄音於六宵暢微言於永劫三達宣其妙果十住讚其祥緣踐二氣而業升離九旬而功就暨七月既望乃敬捨寶軀爰及輿冕自纓已降凡九十九物願以此力普被幽明帝室有嵩華之固蒼黔饗仁壽之福若有淪形苦海得隨理悟墜體翱塗不遠斯復十方三世咸證伊言茲誓或騫無取正覺釋藏輕四廣弘明集十九為齊竟陵王發講疏並頌大矣哉妙覺之為妙也無相非色空不可極而立言垂訓以汲引為方慈波慧水雖可溉而莫知其源者也靈篇寶籍遠探龍藏蓋無得而言焉至於義指天山之表文隱交河之外又非斷籌所能算也逮於祇樹菴園之妙吼四諦一乘之正説重譯而通中土莫不恆沙之一焉而詞源海廣理塗靈奧雖字流附響萬軫同起分條散葉離文析句未或暨其萬一也竟陵王殿下神超上地道冠生知樹寶業於冥津凝正解於沖念若夫方等之靈邃甘露之深玄莫有不遊其塗而啓其室也祕藏之被東國者靡不畢集皆繕以寶縑文以麗篆凝光瓊笥炫彩瑤縢思欲敷振微言昭感未悟乃以永明元年二月八日置講席於上邸集名僧於帝畿皆深辨真俗洞測名相分微靡滯臨疑若曉同集於邸內之法雲精廬演玄音於六宵啓法門於千載濟濟乎實曠代之盛事也自法王已降暨於聽僧條載如左以記其事焉乃作頌曰十號神寂三達空玄迹由聖隱教以慈宣氤氳緒法昭晰遺筌摽聲妙住騰華寶蓮文摛龍藏義溢中天惟王稟照道冠增璿星羅寶幄雲開梵筵思馳春馬理析秋蟬靈場絢彩正水興蓮乘茲上果永導芳緣廣弘明集十九為齊竟陵王解講疏夫憑形輝化必由委氣之途因方導理必同肖天之質是以表靈邃瑞誕聖王宮駐彩辰緯停華日月故能積慈成聖纍妙成空坦照路於道場拔迷根於苦岸弟子蕭子良滌慮煩襟棲情正業肅萃僧英敬敷慧典密藏奧文雲開雨散今魄首丹逵日弦上朔止步凝想空明屬念雖神迹稍緬而遺塵在茲乃飾筵藻殿張帷盛邸潔誠祗事建斯寶集蘭泉波涌芳靄雲回祕理探微玄貺悠邈宗條既舉窮功允就論堂卷坐義鼓停音乘此芳緣將升上住十方三世有證無爽廣弘明集十九又夫妙極衆象湛思必通理冠群方有感斯應自鸞音輟唱圓光寢輝委華之相不傳踊地之符已遠行言入道事難於造次一悟階空效隔於俄頃若非積毫成仞纍爝為明無以方軌慧門維舟法岸弟子是用夕惕載懷惟日不足者也故敬集名僧演敷奧籍振微起滯輪動雲回月殿含呂魄弦上日甘露既窮輟言寶座卷文罷席衣屣相趨仰惟先后稟靈娥德叶景軒度道載華嶽化洽汾陰早棄蘭宮夙違椒掖千乘不追萬鍾靡及終天之慕不續於短年欷報之誠思隆于永劫敬捨軀服以充供施藉此幽通控情妙覺仰願聖靈速登寶位越四天之表記十號之尊惟茲三世咸證于此敢誓丹衷庶符皎日廣弘明集十九為南郡王捨身疏弟子蕭王上白諸佛世尊道德僧衆夫色固無象觸必歸空三世若假八微終散雖復回天震地之威窮於寂滅齊冠楚組之麗靡救埃壤而嗜欲易繁每疚心術捨施難弘用迷假照弟子樹因曠劫嚮報茲生託景中璇聯華日彩玉組夙紆蕃麾早建蘭池紫燕之乘擾於外間黼帳翠帷之飾光於中寢徒以心源尚滯情路未昭識謝兼忘理慚獨悟不能叶調五氣綏御六神霜暑或愆風露時舛是以敷襟上寶栖誠妙覺敬捨肌膚之外凡百一十八種當令經衛夙理府絡時順萬祉雲翔百妖霧滌望北極而有恆瞻南山而同永又願宸居納祜則天均慶少陽介福儷日承休儲妃闡膺祥之符皇枝廣惟祺之祚敬飾崇甍嚴置寶幄仰延息心旁旅清信勗茲弘誓證其幽疑庶可以感降禎和招對靈應玄塗匪昧要之無爽廣弘明集二十八上捨身願疏優婆塞沈君敬白十方三世諸佛本師釋迦如來安養阿彌陀世尊云云一切衆聖今日道俗諸大賢德夫形非定質衆緣所聚四微不同風火亦異析而離之本非一物燕肝越膽未足為譬靜念求我無時可得而積此淪昏生生不已一念儻值曾未移時障習相蕩旋迷厥路橫指空呼名之為有豐己傷物日夜靡休蓄身外之財以充其欲攘非己之分用成其侈豈直溫肌啖腹若此而已哉至於積篋盈藏未嘗登體溢俎充庖既飫斯棄曾不知粟帛所從事非因己悠悠黔首同有其分離多共寡猶或未均我若有餘物何由足仁者之懷不應若此侵他之財世稱為盜盜之甚者孰過於斯幽顯推求無一或可君仰藉時來久乘休運玉粒晨炊華燭夜炳自此迄今歷年三十遂乃服冕榮國裂土承家潤盈身己慶流僕妾室非懸磬俸有兼金救寒止於重裘而笥委餘襲冬夜既蒙纍璽而櫝有贏衾自斯已上侈長非一雖等彼豪家其陋已甚方諸窶室所邁實多悟此非常事由諸佛有懷捨散宜光道場飢寒困苦為患乃切布滿州縣難悉經緣其當稱力因事一旦隨年頭目髓腦誠難輕慕虧己贍物未易頓行誓欲廣念深恩積微成著施路檀門冀或能踐以大梁天監之八年歲次玄枵日殷鳥度夾鍾紀月十八日在於新所創蔣陵皇宅請佛及僧髣佛祇樹息心上士凡一百人雖果謝菴園飯非香國而野粒山蔬可同屬饜兼捨身資服用百有一十七種微自損撤以奉現前衆僧夫室家患苦刀俎非切制除蕭散形質超然蠢彼群生咸有佛性不因翦削此路莫由緣業舛互世諦煩記變形改飾即事為難故開以八支導彼清信一日一夜同佛出家本弘外教事非僧法而世情乖舛同迷斯路招屈名僧置之虛室主人高臥取逸間堂呼為八關去之實遠雖有供施之緣而非斷漏之業約今謹自即朝至于明旦排遣俗纍一同善來分留上德勗成微志藉此輕因庶證來果功德之言非所敢及廣弘明集二十八上
