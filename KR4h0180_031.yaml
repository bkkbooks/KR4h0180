body:
  text: 沈約善館碑至道玄妙無迹可尋寄言立稱已乖宗極神宇靈房於義非取九仙緬邈等級參差或藏形洞府或棲志靈嶽達人獨往之事志非易立餐松飲澗之情理難輕樹止欲漸去喧囂稍離塵雜於是既加整葺營建堂宇北負崇嶽南枕修衢迥託人表雞犬相絶庭流松響戶接雲根指瓊樹而朝餐就瑤臺而夜息霓裳不反鳧舄忘歸朝九星謁群帝悠哉邈乎與天地相畢矣藝文類聚七十八桐柏山金庭館碑夫生靈為貴有識斯同道夭云及終天莫反故仙學之祕上聖攸尊啓玉笈之幽文貽金壇之妙訣駐景濛谷還光上枝吐吸煙霞變煉丹液出沒無方升降自己下棲洞室上賓群帝覩靈嶽之驟啓見蒼波之屢竭望玄洲而駿驅指蓬山而永騖芝蓋三重駕螭龍之蜿蜒雲車萬乘載旗旆之逶迤此蓋棲靈五嶽未暨夫三清者也若夫上玄奧遠言象斯絶金簡玉字之書玄霜絳雪之寶俗士所不能窺學徒不敢輕慕且禁誓嚴重志業艱劬自非天稟上才未易可擬自惟凡劣識鑒鮮方徒抱出俗之願而無致遠之力早尚幽棲屏棄情纍留愛巖壑託分魚鳥塗愈遠而靡倦年既老而不衰高宗明皇帝以上聖之德結宗玄之念忘其菲薄曲賜提引末自夏汭固乞還山權憩汝南縣境固非息心之地聖主纘曆復蒙縶維永泰元年方遂初願遂遠出天台定居茲嶺所憩之山實惟桐柏靈聖之下都五縣之餘地仰出星河上參倒景高崖萬沓邃澗千回因高建壇憑巖考室飾降神之宇置朝禮之地桐柏所在厥號金庭事昺靈圖因以名館聖上曲降幽情留信彌密置道士十人用祈嘉祉約以不才首膺斯任永棄人群竄景窮麓結懇志於玄都望霄容於雲路仰宣國靈介茲景福延吉祥於清廟納萬壽於神躬又願道無不懷澤無不至幽荒屈膝戎貊稽顙息鼓輟烽守在海外因此自勉兼遂微誠日久勤劬自強不已翹心屬念晚臥晨興餐正陽於停午念孔神於中夜採三芝而延佇飛九丹而宴息乘鳧輕舉留舄忘歸以茲丹款表之玄極無曰在上日鑒非遠銘石靈館以旌厥心其辭曰道無不在若存若亡於惟上學理妙群方用之日損言則非常倏焉靈化羽衣霓裳九重嶢屼三山璀璨日為車馬芝成宮觀虹旌拂月龍輈漸漢萬春方華千齡始旦伊余菲薄竊慕隱淪尋師講道結友問津東採震澤西遊漢濱依稀靈眷髣佛幽人帝明紹曆惟皇纂位屬心鼎湖脫屣神器降命凡底仰祈靈祕瞻彼高山興言覆簣啓基桐柏厥號金庭喬峰迥峭擘漢分星臨雲置墠駕嶽開櫺澗塗蹇産林祈葱青誰謂應遠神道微密慶集宮闈祥流罕畢其久如地其恆如日壽同南山與天無卒欒生變煉外示無功少君飛轉密與神通因資假力輕舉騰空庶憑嘉誘永濟微躬藝文類聚七十八法王寺碑昔周師集於孟津漢兵至於垓下翦商肇乎茲地殪楚由乎斯域慧雲匪由觸石法雨起乎悲心驅之仁壽度之彼岸濟方割於有頃撲既燎於無邊陸旗風靡水陳雲披縈山為堞失其九天之險負壑為隍曾無一葦之閡昏師反接撝牧泥首掬指則河舟尚虛委甲則熊嶺非峻乃按兵江漢誓衆商郊因斯而運斗樞自茲而廓天步業隆於夏功高代殷濟橫流而臣九服握乾綱而子萬姓眷言四海莫不來王此惟余宅寧止西顧臨朝夕之濬池帶長洲之茂苑藉離宮於漢舊因林光於秦餘回廓敞匝復殿重起連房極睇周堵如雲銘曰往劫將謝災難孔多炎炎烈火渺渺洪波聚為丘嶽散成江河俗緣浮詭真諦遐長匪因希向曷寄舟梁標功顯德事歸道場祁祁法衆同茲無我振錫經行祇林宴坐或期寂滅或念薪火惆悵三明徘徊四果藝文類聚七十六齊太尉王儉碑瞻旦奭而齊軫軼夔龍而長騖百辟翹首譬列宿之仰望舒千里結轍若派流之宗江漢及宋道盛運鼎命將改而瞻烏所集未知適歸公高臥間宇獨咤虛室眷龍顏以託夢詠日角以興言佇傅巖之下懷滋水之上慨深版蕩念在濡足霸君亦慮屬一匡情隆三顧卜匪熊羆唯人是與公深覩興廢妙識人英察榮光於河渚攀龍翼於雲漢傾方寸以奉國忘七尺以事君殊文共會異軫同歸堆案盈几充庭滿室隨方引應斷決如流辭不輟響紙無停筆精明外朗神彩傍映矖矚接其光景風雲溢乎帷席囂喧總至大薄相填齊鑣共軫竝而不雜銘曰悵公赫矣世載經綸四彼三傑六茲五臣德參世命道亞如仁屣步金門濯纓蘭疇激水上征培風鬱起藝文類聚四十六齊故安陸昭王碑公諱緬字景業南蘭陵人也稷契身佐唐虞有大功於天地商武姬文所以膺圖受籙蕭曹扶翼漢祖滅秦項以寧亂魏氏時乘於前皇齊握符於後靈源與積石爭流神基與極天比峻祖宣皇帝雄才盛烈名蓋當時考景皇帝含道居貞卷懷前代公含辰象之秀德體河嶽之上靈氣蘊風雲身負日月立行可模置言成範英華外發清明內昭天經地義之德因心必盡𥳑久遠大之方率由斯至挹其源者游泳而莫測懷其道者日用而不知昭昭若三辰之麗於天滔滔猶四瀆之紀於地六幽允洽一德無爽萬物仰之而彌高千里不言而斯應若夫彈冠出仕之日登庸蒞事之年軍麾命服之序監督方部之數斯固國史之所詳今可得略也水德方衰天命未改太祖龍躍俟時作鎮淮泗如仁夕惕之志中夜九回龕世拯亂之情獨用懷抱深圖密慮衆莫能窺公陪奉朝夕從容左右蓋同王子洛濱之歲實惟辟彊內侍之年起豫聖懷發言中旨始以文學遊梁俄而入掌綸誥蘭桂有芬清暉自遠帝出於震日衣青光方軌茅社俾侯安陸受瑞析圭遂荒雲野式掌儲命帝難其人公以宗室羽儀允膺嘉選協隆三善仰敷四德博望之苑載暉龍樓之門以峻獻替帷扆實掌喉脣奉待漏之書銜如絲之旨前暉後光非止恆受公以密戚上賢俄而奉職出納惟允劍璽增華伊昔帝唐九官咸事熊豹臨戭納言是司自此迄今其任無爽爰自近侍式贊權衡而皇情眷眷慮深求瘼姑蘇奧壤任切關河都會殷負提封百萬全趙之袨服叢臺方此為劣臨淄之揮汗成雨曾何足稱乃鴻騫舊吳作守東楚弘義讓以勖君子振平惠以字小人撫同上德綏用中典疑獄得情而弗喜宿訟兩讓而同歸雖春申之大啓封疆鄧攸之緝熙萌庶不能尚也夏首藩要任重推轂襟帶中流地殷江漢南接衡巫風雲之路千里西通鄾鄧水陸之塗三七是惟形勝閫外莫先建麾作牧明德攸在乃暴以秋陽威以夏日澤無不漸螻蟻之穴靡遺明無不察容光之微必照由近而被遠自己而及物惠與八風俱翔德與五才竝運遠無不懷邇無不肅邑居不聞夜吠之犬牧人不覩晨飲之羊譽表六條功最萬里還居近侍兼饗戎秩候府寄隆儲端任顯東西兩晉茲選特難羊琇願言而匪獲謝琰功高而後至升降二宮令績斯俟禁旅尊嚴主器彌固禹穴神皋地埒分陝江左已來常遞斯任東渚巨海南望秦稽淵藪胥萃雚蒲攸在貨殖之民千金比屋郛廛之內雲屋萬家刑政繁舛舊難詳一南山群盜未足云多渤海亂繩方斯易理公下車敷化風動神行誠恕既孚鉤距靡用不待赭汙之權而姦渠必翦無假里端之籍而惡子咸誅被以哀矜孚以信順南陽葦杖未足比其仁潁川時雨無以豐其澤公攬轡升車牧州典郡感達民祗非待朞月老安少懷塗歌里詠莫不歡若親戚芬若椒蘭麾旆每反行悲道泣攀車臥轍之戀爭塗忘遠去思一借之情愈久彌結方城漢池南顧莫重北指崤潼平塗不過七百西接嶢武關路曾不盈千蠻陬夷徼重山萬里小則俘民略畜大則攻城剽邑晉宋迄今有切民患烽鼓相望歲時不息椎埋穿掘之黨阡陌成群慠法侮吏之人曾莫禁禦纍藩咸受其斃歷政所不能裁加以戎羯窺窬伺我邊隙北風未起馬首便以南向塞草未衰嚴城於焉早閉永明八載疆埸大駭天子乃心北眷聽朝不怡揚旆漢南非公莫可於是驅馬原隰卷甲遄征威令首塗仁風載路軌躅清晏車徒不擾牛酒日至壺漿塞陌失義犬羊其來久矣徵賦嚴切唯利是求首鼠疆界災蠹彌廣公扇以廉風孚以誠德盡任棠置水之情弘郭伋待期之信金如粟而弗覩馬如羊而靡入雛雉必懷豚魚不爽由是傾巢舉落望德如歸椎髻髽首日拜門闕卉服滿塗夷歌成韻禮義既敷威刑具舉強民獷俗反志遷情風塵不起囹圄寂寞富商野次宿秉停菑蝝蝗弗起豺虎遠迹北狄懼威關塞謐靜偵諜不敢東窺駝馬不敢南牧方欲振策燕趙席卷秦代陪龍駕於伊洛侍紫蓋於咸陽而遘疾彌留欻焉大漸耕夫釋耒桑婦下機參請門衢竝走群望維永明九年夏五月三十日辛酉薨春秋三十有七城府颯然庶寮如霣男女老幼大臨街衢接響傳聲不踰時而達於四境夷群戎落幽遠必至望城拊膺震動郛邑竝求入奉靈櫬藩司抑而不許雖鄧訓致劈面之哀羊公深罷市之慕對而為言遠有慚德神駕東還號送踰境奉觴奠以望靈仰蒼天而自訴震響成雷盈塗咽水公臨危審正載貽話言楚囊之情惟幾而彌固衛魚之心身亡而意結二宮軫慟遐邇同哀追贈侍中領衛將軍給鼓吹一部諡曰昭侯時皇上納麓在辰登庸伊始允副朝端兼掌屯衛聞凶哀震感絶移時因遘沈痾綿留氣序世祖日夜憂懷備盡寬譬勉膳禁哭中使相望上雖外順皇旨內殷私痛獨居不御酒肉坐臥泣涕霑衣若此移年癯瘠改貌天倫之愛振古莫儔及俯膺天眷入纂絶業分命懿親台牧竝建對繁弱以流涕望曲阜而含悲改贈司徒因諡為郡王禮也惟公少而英明長而弘潤風標秀舉清暉映世學遍書部特善玄言鞶帨之麗篆籀之則窮六義於懷抱究八體於毫端奕思之微秋儲無以競巧取睽之妙流睇未足稱奇至公以奉上鳴謙以接下撫僚庶盡盛德之容交士林忘公侯之貴虛懷博約幽關洞開宴語談笑情瀾不竭譽滿天下德冠生民蓋百代之儀表千年之領袖曾不憖留梁摧奄及豈唯僑終蹇謝興謠輟相而已哉凡我僚舊均哀共戚怨天德之無厚痛棠陰之不留思所以克播遺塵敝之穹壤乃刊石圖徽寄情銘頌其辭曰天命玄鳥降而生商是開金運祚始玉筐三仁去國五曜入房亦白其馬侯服周王本枝派別因菜命氏涉徐而東義均梁徙自茲以降懷青拖紫崇基巖巖長瀾濔濔惟聖造物龍飛天步載鼎載革有除有布高皇赫矣仰膺乾顧景皇蒸哉實啓洪祚喬嶽峻峙命世興賢應期誕德絶後光前幾以成務覺在民先位非大寶爵乃上天爰始濯纓清猷浚發升降文陛逶迤魏闕惠露沾吳仁風扇越涉夏踰漢政成朞月用簡必從日新為盛在上哀矜臨下莊敬草木不夭昆蟲得性我有芳蘭民胥攸詠群夷蠢蠢巖別嶂分傾山盡落其從如雲挈妻荷子負戴成群回首請吏曾何足云昔聞天道仁罔不遂彼蒼如何興山止簣四牡方馳六龍頓轡斯民曷仰邦國殄瘁齊殞晏平行哭致禮趙徂昌國列邦揮涕況我君斯皇之介弟哀感徒庶慟興雲陛階毀留攢川泛歸軸競羞野奠爭攀去轂遵渚號追臨波望哭無絶終古惟蘭與菊塗由帝渚朱軒靡駕東首塋園即宮長夜逝川無待黃金難化鍾石徒刊芳猷永謝文選五十九藝文類聚四十五齊丞相豫章文憲王碑世載冠冕之暉家開配天之業洪源邁於委水雲峰冠於削成公自天攸縱非待河嶽道亞生知德備藏往摩赤霄而理翰望閶闔以上馳回風飆於襟袖宅山川於懷抱爰初弱冠藏器俟時康莊廣闢飾禮賢之館杞梓備收罄滋蘭之畹既駕朱驂又敷袞職升降軒陛率由孝敬謙以備物貴以在身再握勵己三吐忘倦公德惟民望位冠朝首儀表瑰雄風神秀傑每至三元首旦華裔在庭執玉端闈冠冕百辟外夷震聳猶單于之懼王商群后瞻慕若衆星之俯日月雖復以周公之親居周公之任道格皇天光被四海而小善靡失輶德必從譬由畎澮匪讓所以渺致江河土壤同歸故能鬱成嵩岱保翼三善弘正九伐銘彼太常懸諸日月銘曰大德風邁其美雲從事貴愈貶禮峻彌恭且有厚命車服以庸羽儀列辟冠冕群龍周實多祜漢有餘慶奕奕皇族於斯為盛公之綏之終和且敬是惟宗國庶邦作詠藝文類聚四十五比丘尼僧敬法師碑立言道往標情妙覺置想依空練心成學縕日悠長疏年緬邈風遷電改斯理莫違神有殊適形無異歸臨泉結慟有愴徂暉松飆轉蓋山雨披衣載刊貞軌永播餘徽藝文類聚七十六齊臨川王行狀公遵玄源於陵壑稟黃中之正氣其性逸其神凝端華表於弱齒弘貴著乎將立雲虛景曖嶽秀川渟蘭桂不踰其質圭璋未究其美幼而悅學業茂從師洽貫書場該緯文圃清暉祕譽燭野光朝藝文類聚四十五齊司空柳世隆行狀公稟靈華嶽幼挺圭璋清襟素履發乎齠丱及長風質洞遠儀止祥華動容合矩吐言被律時沈攸之狼據陝西氣陵物上而太祖登庸作宰天曆在躬攸之播封豕之情總全荊之力兕甲十萬鐵馬千群水陸長騖志窺皇邑公抗威川涘勇略紛紜顯晦有方出沒無緒攸之乃反旆亙圍親受矢石增櫓乘埤嚴衝駕雉雲輣俯闞地穴斜通半藏晚飧負戶晨汲公乃綏衆以武應敵以奇靈鋒電曜威策雲舉事切三版之危氣損九天之就殘寇外老逆黨內摧焚舟委甲掬指宵遁公風標秀徹器範弘潤茂乎辭彩雅善鼓琴摛純蔡之高芬纂鍾稽之妙曲雖嬰拂世務而素業無改臨姑蘇而想八桂登衡山而望九疑七紆邦組三臨蕩甸五職瑞扇一司百揆固可以齊衡八凱方駕五臣藝文類聚四十七齊禪林寺尼淨秀行狀比丘尼釋淨秀本姓梁氏安定烏氏人也其先出自少昊至伯翳佐禹治水賜姓嬴氏周孝王時封其十六世孫非子於秦其曾孫秦仲為宣王侯伯平王東遷封秦仲少子於梁是為梁伯漢景帝世梁林為太原太守徙居北地烏氏遂為郡人焉自時厥後昌胤阜世名德交暉蟬冕疊映漢元嘉元年梁景為尚書令少習韓詩為世通儒魏時梁爽為司徒左長史祕書監博極群書善談玄理晉太始中梁闡為涼雍二州刺史即尼之乃祖也闡孫撝晉范陽王虓驃騎參軍事漁陽太守遭永嘉蕩析淪於僞趙為祕書監征南長史後得還晉為散騎侍郎子疇字道度征虜司馬子粲之仕宋征虜府參軍事封龍川縣都亭侯尼即都亭侯之第四女也挺慧悟於曠劫體妙解於當年而性調和綽不與凡孩孺同數弱齡便神情峻徹非常童稚之伍行仁尚道洗志法門至年十歲慈念彌篤絶粉黛之容棄錦綺之玩誦經行道長齊蔬食年十二便求出家家人苦相禁抑皆莫之許於是心祈冥感專精一念乃屢獲昭祥亟降瑞相第四叔超獨為先覺開譬內外故雅操獲遂上天性聰睿幼而超群年至七歲自然持齊家中請僧行道聞讀大涅槃經不聽食肉於是即長蔬不噉二親覺知若得魚肉輒便棄去昔有外國普練道人出於京師往來梁舍便受五戒勤翹奉持未嘗違犯日夜恆以禮拜讀誦為業更無餘務及手能書常自寫經所有財物唯充功德之用不營俗好少欲入道父母為障遂推流歲月至年二十九方獲所志落髮青園服膺寺主上事師虔孝先意承旨盡身竭力猶懼弗及躬修三業夙夜匪懈僧使衆役每居其首精進劬勤觸事關涉有開井士馬先生者於青園見上即便記云此尼當生兜率天也又親於佛殿內坐禪同集三人忽聞空中有聲狀如牛吼二尼驚怖迷悶戰栗上惔然自若徐起下床歸房執燭檢聲所在旋至構欄二尼便聞殿上有人相語云各自避路某甲師還後又於禪房中坐伴類數人一尼鼾眠此尼於睡中見有一人頭屆於屋語云勿驚某甲師也此尼於是不敢復坐又以一時坐禪同伴一尼有小緣事暫欲下床見有一人扺掌止之曰莫撓某甲師於是閉氣徐出歎未曾有如此之事比類甚繁既不即記悉多漏忘不得具載性愛戒律進止俯仰必欲遵承於是現請曜律師講內自思惟但有直一千心中憂慮事不辦夜即夢見鴉鵲鴝鵒雀子各乘車車竝安軒車之大小還稱可鳥形同聲唱言我助某甲尼講去既寤歡喜知事當成及至就講乃得七十檀越設供果食皆精後復又請穎律師開律即發講日清淨罌水自然香如水園香氣深以為欣既而坐禪得定至夜中方起更無餘伴便自念言將不犯獨即咨律師律師答云無所犯也意中猶豫恐違失且見諸寺尼僧多有不如法乃喟然歎曰嗚呼鴻徽未遠靈緒稍隤自非引咎責躬豈能導物即自懺悔行摩那埵於是京師二部莫不咨嗟云如斯之人律行明白規矩應法尚爾思愆何況我等動靜多過而不慚愧者哉遂相率普懺無有孑遺又於南園就穎律師受戒即受戒日淨罌水香還復如前青園諸尼及以餘寺無不更受戒者律師於是亦次第詣寺敷弘戒品闡揚大教故憲軌遐流迄屆於今穎律師又令上約語諸寺尼有高床俗服者一切改易上奉旨制勒無不祗承律藏之興自茲更始後又就三藏法師受戒清淨水香復如前青園徒衆既廣所見不同師已遷背更無覲侍於是思別立住處可得外嚴聖則內窮宴默者以宋大明七年八月故黃修儀及南昌公主深崇三寶敬仰德行初置精舍上麻衣弗溫藿食忘饑躬執泥瓦盡勤夙夜以宋泰始三年明帝賜號曰禪林蓋性好閒靜冥感有徵矣而制龕造像無不畢備又寫集衆經皆令具足裝潢染成悉自然有娑羅伽龍王兄弟二人現迹彌日不滅知識往來竝親瞻覩招納同住十有餘人訓化獎率皆令禪誦每至奉請聖僧果食之上必有異迹又於一時虔請聖衆七日供養禮懺始訖攝心運想即見兩外國道人舉手共語一云呿羅一云毗呿羅所著袈裟色如桑椹之熟因即取泥以壞衣色如所見倣於是遠近尼僧竝相倣斆改服間色故得絶於五大之過道俗有分者也此後又請阿耨達池五百羅漢日日凡聖無遮大會已近二旬供設既豐復更請罽賓國五百羅漢足上為千及請凡僧還如前法始過一日見有一外國道人衆僧悉皆不識於是試相借問自云從罽賓國來又問來此幾時答云來此一年也衆僧覺異令人守門觀其動靜而食畢乃於宋林門出使人逐視見從宋林門去行十餘步奄便失之又嘗請聖僧浴器盛香湯及以雜物因而禮拜內外寂默即聞器桸杓作聲如用水法意謂或是有人出便共往看但見水杓自然搖動故知神異又曾夜中忽見滿屋光明正言已曉自起開戶見外猶暗即更閉戶還床復寢久久方乃明也又經違和極篤忽自見大光明遍於世界山河樹木浩然無礙欣爾獨笑傍人怪問具陳所見即能起行禮拜讀誦如常無異又於一時復違和亦甚危困忽舉兩手狀如捧物語傍人不解問言為何所捧答云見寶塔從地出意欲接之幡花伎樂無非所有於是疾恙豁然而除都無復患又復違和數日中亦殊綿惙恆多東向視合掌向空於一時中急索香火移時合掌即自說云見彌勒佛及與舍利佛目連等諸聖人亦自見諸弟子數甚無量滿虛空中須臾彌勒下生翅頭末城云有人持幡華伎樂及三臺來迎於此上幡華伎樂非世間比半天而住一臺已在半路一臺未至半路一臺未見但聞有而已爾時已作兩臺為此兆故即更作一臺也又云有兩樹寶華在邊人來近床語莫壞我華自此之後病即除損前後遇疾恆有瑞相或得涼風或得妙藥或聞異香病便即愈疾瘥之為理都以漸豁然而去如此其數不能備記又天監三年一夏違和於晝日眠中見虛空藏菩薩即自圍繞誦唄唄聲徹外眠覺所患即除又白日臥開眼見佛入房幡蓋滿屋語傍人令燒香了自不見上以天監五年六月十七日得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兜率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又弘通經教自應居勝地某甲是女人何能益法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡與令法師素疏不堪相見病既稍增飲粥日少為治無益漸就綿惙至七月十二日爾時天雨清涼悶勢如小退自云夢見迎來至佛殿西頭人入捉幡竿猶車在地幡之為理不異世間軍隊擔鼓旗幡也至二十日便絶不復進飲粥至二十二日令請相識衆僧設會意似分別至二十五日云見十方諸佛遍滿空中至二十七日中後泯然而臥作兩炊久方復動轉自云上兜率天見彌勒及諸菩薩皆黃金色上手中自有一琉璃清淨罌可高三尺許以上彌勒即放光明照於上身至兜率天亦不見飲食自然飽滿故不復須人間食也但聞人間食皆臭是以不肯食於彼天上得波利餅將還意欲與令法師有人問何意將餅去答云欲與令法師是人言令法師是人中果報那得食天上食不聽將去既而欲見令法師閒居上為迎法師來相見語法師可作好菜食以餉山中坐禪道人若修三業方得生兜率天耳法師不坐禪所以令作食餉山上道人者欲使與坐禪人作因緣也自入八月體中亦轉惡不復說餘事但云有三十二童子一名功德天二名善女天是迦毗羅所領恆來在左右與我驅使或言得人餉飲食令衆中行之復云空中晝夜作伎樂鬧人耳也廣弘明集二十三
