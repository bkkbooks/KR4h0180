body:
  text: 釋慧皎荅王曼穎書君白一日以所撰高僧傳相𥳑意存鍼艾而來告累紙更加拂拭顧惟道藉人弘理由教顯而弘道釋教莫尚高僧故漸染巳來照明遺法殊功異行列代而興敦厲後生理宜綜綴貧道少乏懷書抱篋自課之勤長慕鉛墨塗青揚善之美故于聽覽餘閒厝心傳錄每見一介可稱輒有懷三省但歷尋眾記繁約不同或編列參差或行事出沒已詳別序兼具來告所以不量寸管輕樹十科商攉條流意言略舉而筆路蒼茫辭語陋拙本以自備疏遺豈宜濫入高聽檀越既學兼孔釋解貫玄儒抽入綴藻內外淹劭披覽餘暇脫助詳閱故忘鄙俚用𥳑龍門然事高辭野久懷多愧來告吹噓更增㥏墨今以所著贊論十科重以相𥳑如有紕謬請備斟酌釋慧皎白高僧傳十四高僧傳序原夫至道沖漠假蹄筌而後彰玄致幽凝藉師保以成用是由聖迹迭興賢能異託辯忠烈孝慈以定名教之道明詩書禮樂以成風俗之訓或忘功遺事尚彼虛沖或體任榮枯重茲達命而皆教但域中功在近益斯蓋漸染之方末奧盡其神性至若能仁之為訓也考業果之幽微則循復三世言至理之高妙則貫絕百靈若夫啟十地以辯慧宗顯三諦以詮以智府窮神盡性之旨管一樞極之致餘教方之亦猶群流之歸巨壑眾星之拱北辰懋哉邈矣信難得以言尚至迺教滿三千形遍六道皆所以接引幽昏為大利益而以淨穢異開昇墜殊見故秋方先音形之奉東國後見聞之益雲龍表于夜明風虎彰乎宵夢洪風既扇大化斯融自爾西域名僧往往而至或傳度經法或教授禪道或以異迹化人或以神力拯物自漢之梁紀厤彌遠世踐六代年將五百此士桑門含章秀發群英閒出迭有其人眾家記錄敘載各異沙門法濟偏敘高逸一迹沙門法安但列志節一行沙門僧寶止命遊方一科沙門法進乃通撰論傳而辭事闕略竝皆互有繁𥳑出沒成異攷之行事未見其歸宗臨川康王義慶宣驗記及幽明錄太原王琰冥祥記彭城劉悛益部寺記沙門曇宗京師寺記太原王延秀感應傳朱君台徵應傳陶淵明搜神錄竝傍出諸僧敘其風素而皆是附見亟多疏闕齊竟陵文宣王三寶記傳或稱佛史或號僧錄既三寶共敘辭旨相關混濫難求更為蕪昧琅邪王中所撰僧史意似該綜而文體未足沙門僧祐撰三藏記止有三十餘僧所無甚眾中書郗景興東山僧傳治中張孝季廬山僧傳中書陸明霞沙門傳各競舉一方不通今古務存一善不及餘行逮于即時亦繼有作者然或襃贊之下過相揄揚或敘事之中空引辭費求之實理無的可稱或復嫌以繁廣刪滅其事而抗迹之疇多所遺削謂出家之士處國賓王不應勵然自遠高蹈獨絕辭榮棄愛本以異俗為賢若此而不論志何所紀嘗以暇日遇覽群作輒搜撿雜錄數十餘家及晉宋齊梁春秋書史秦趙燕涼荒朝偽厤地理雜篇孤文片記并博諮故老廣訪先達校其有無取其同異始于漢明帝永平十年終至梁天監十八年凡四百五十三載二百五十七人又傍出附見者二百餘人開其德業大為十例一曰譯經二曰義解三曰神異四曰習禪五曰明律六曰遺身七曰誦經八曰興福九曰經師十曰唱導然法流東土蓋由傳譯之勳或踰越沙險或汎漾洪波皆亡形殉道委命弘法震旦開明一焉是賴茲德可崇故列之篇首至若慧解開神則道兼萬億通感適化則彊暴以綏靖念安禪則功德森茂弘贊毗尼則禁行清潔忘形遺體則矜吝革心歌誦法言則幽顯含慶樹興福善則遺像可傳凡此八科竝以軌迹不同化洽殊異而皆德效四依功在三業故為群經之所稱美眾聖之所襃述及夫討覈源流商攉取捨皆列諸贊論備之後文而論所著辭微異恆體始標大意類由前序未辯時人事同後議若閒使前後如謂煩雜故總布一科之末通稱為論其轉讀宣唱雖原出非遠然而應機悟俗實有偏功故齊宋雜記咸條列秀才者今之所取必其製用超絕及有一介通感乃編之傳末如或異者非所存焉凡十科所敘皆散在眾記今止刪聚一處故述而無作俾夫披覽于一本之內可兼諸要其有繁辭虛贊或德不及稱者一皆省略故述六代賢異止為十三卷并序錄合十四軸號曰高僧傳自前代所撰多曰名僧然名者本實之賓也若實行潛光則高而不名寡德適時則名而不高名而不高本非所紀高而不名則備今錄故省名音代以高字其閒草創或有遺逸今此十四卷備贊論者意以為定如未隱括覽者詳焉高僧傳十四傳譯讚頻婆揜唱疊教攸陳五乘競轉八萬彌綸周星隱曜漢夢通神騰蘭讖什徇道來臻慈雲徙蔭慧水傳津俾夫季末方樹洪因高僧傳三義解讚遺風眇漫結浪邅迴匪伊粹哲孰振將頹潛安比曜遠叡聯環鐇斧曲戾彈沐斜埃素絲既染永變方來高僧傳八習禪讚禪那杳寂正受淵深凝夫輟慮方備幽尋五門棄惡九次叢林枯鑠山海聚散昇沈茲德裕矣如不厲心高僧傳十一明律讚盤盂設誠几杖施銘人如不勖奚用剋乘納衣既補篇聚由生緘持口意枯槁心形怡慼兩鏡欣憂二瓶高僧傳十一忘身讚若人挺志金石非英鑠茲所重祈彼寶城芬梧蓊蔚紫館浮輕騰煙曜采吐瑞含禎千秋尚美萬代傳馨高僧傳十二誦經讚法身既遠所寄者辭沈吟反復惠利難思無怠三業有競六時化人乃衛變眾來茲此焉實德誰與較之高僧傳十二興福讚真儀揜曜金石傳暉爰有塔像懷戀者依現奇表極顯瑞旍威巖藏地踊水汎空飛篤矣心路必契無違高僧傳十三傳譯論傳譯之功尚矣固無得而稱焉昔如來滅後長老迦葉阿難末田地等竝具足任持八萬法藏宏道濟人功用彌博聖慧日光餘輝未隱是後迦旃延子達磨多羅達摩尸梨帝等竝博尋異論各著言說而皆祖述四含宗軌三藏至若龍樹馬鳴婆藪磐頭則于方等深經領括樞要源發般若流貫雙林雖曰化洽窪隆而亦俱得其性故令三寶載傳輪轉未絕是以五百年中猶稱正法在世夫神化所被遠近斯屆一聲一光輒震他土一臺一蓋動覆恆國直丹之與迦維雖路絕蔥河里踰數萬若以聖之神力譬猶武步之閒而令聞見限隔豈非時也及其緣運將感名教潛洽或稱為浮屠之主或號為西域大神故漢明帝詔楚王英云王誦黃老之微言尚浮屠之仁祀及通夢金人遣使西域迺有攝摩騰竺法蘭懷道來化挾策孤征艱苦必達傍峻壁而臨深躡飛絚而渡險遺身為物處難能夷傳法宣經初化東土後學與聞蓋其力也爰至安清支讖康會竺護等竝異世一時繼踵宏贊然夷夏不同音韻殊隔自非精括詁訓領會良難屬有支謙聶承遠竺佛念釋寶雲竺叔蘭無羅叉等竝妙善梵漢之音故能盡翻譯之致一言二復辭旨分明然後更用此土宮商飾以成製論曰隨方俗語能示正義于正義中置隨義語蓋斯謂也其後鳩摩羅什碩學鉤深神鑒奧遠歷遊中土備悉方言復恨支竺所譯文製古質未盡善美迺更臨梵本重為宣譯故致今古二經言殊義一時有生融影叡嚴觀恆肇皆領悟言前辭潤珠玉執筆承旨任在伊人故長安所譯鬱為稱首是時姚興竊號跨有皇畿崇愛三寶城壍遺法使夫慕道來儀遐邇煙萃三藏法門有緣必睹自像運東遷在茲為盛其佛賢比丘江東所譯華嚴大部曇無讖河西所翻涅槃妙教及諸釋所出四含五部犍度婆沙等竝皆言符法本理愜三印而童壽有別室之逼佛賢有擯黜之迹攷之實錄未易詳究或以時運澆薄道喪人漓故所感見爰至于此若以近迹而求蓋亦珪璋一玷也又世高無讖法祖法祚等竝理思淹通仁澤成務而皆不得其死將由業有傳感義無違避故羅漢雖諸漏已盡尚有貫惱之厄比干雖忠謹竭誠猶招賜劍之禍匪其然乎聞有竺法度者自言專執小乘而與三藏乖越食用銅鉢本非律儀所許伏地相向又是懺法所無且法度生本南康不遊天竺晚值曇摩耶舍又非專小之師直欲谿壑其身故為矯異然而達量君子未曾迴適尼眾易從初稟其化夫女人理教難愜事迹易翻聞因果則悠然扈皆見變術則奔波傾飲隨墮之義即斯謂也竊惟正法淵廣數盈八億傳譯所得卷止千餘皆由踰越沙阻履跨危絕或望煙渡險或附杙前身及相會推求莫不十遣八九是以法顯智猛智嚴法勇等發跡則結旅成群還至則顧影唯一實足傷哉當知一經達此豈非更賜受命而頃世學徒唯慕鑽求一典謂言廣讀多惑斯蓋墮學之辭匪曰通方之訓何者夫欲攷尋理味決正法門豈可斷以胸襟而不博尋眾典遂使空勞傳寫永翳箱匣甘露正說竟莫扱尋無上寶珠隱而弗用豈不惜哉若能貫採禪律融冶經論雖復秖樹自蔭玄風尚啟婆羅變葉佛性猶彰遠報能仁之恩近稱傳譯之德倘護身命寍不勖歟高僧傳三義解論夫至理無言元致幽寂幽寂故心行處斷無言故言語路絕言語路絕則有言傷其旨心行處斷則作意失其真所以淨名杜口于方丈釋迦緘嘿于雙樹將知理致淵寂故為無言但悠悠夢境去理殊隔蠢蠢之徒非教孰啟是以聖人資靈妙以應物體冥寂以通神借微言以津道託形像以傳真故曰兵者不祥之器不獲巳而用之言者不真之物不獲巳而陳之故始自鹿苑以四諦為言初終至鶴林以三點為圓極其閒散說流文數過八億象融負而弗窮龍宮溢而未盡將令乘蹄以兔藉指以知月知月則廢指得兔則忘蹄經云依義莫依語此之謂也而滯教者謂至道極于篇章存形者謂法身定于丈六故須窮達幽旨妙得言外四辯莊嚴為人廣說示教利喜其在法師乎故士行尋經于于闐誓志而滅火終令般若于東川忘相傳乎季末爰次竺潛支遁于蘭法開等竝氣韻高華風道清裕傳化之美功亦亞焉中有釋道安者資學于聖師竺佛圖澄安又授業于弟子慧遠惟此三葉世不乏賢竝戒節嚴明智寶成就使夫慧日餘暉重光千載之下香吐遺芬再馥閻浮之地涌泉猶注實賴伊人遠公既限以虎溪安師反更同輦與夫高尚之道如有忒焉然而言嘿動靜所適唯時四翁赴漢用之則行也三閭辭楚舍之則藏也經云若欲建立正法則聽親近國王及持杖者安雖一時同輦迺為百民致諫故能終感應真開元顯報其後荊陜著名則以翼遇為言初廬山清素則以持永為上首融恆影肇德重關中生叡畼遠領宗建業曇度僧淵獨擅江西之寶超進惠基及摛浙東之盛雖復人世迭隆而皆道行懸會故使像運餘興歲將五百功效之美良足羨焉高僧傳八神異論神道之為化也蓋以抑誇強摧侮慢挫兇銳解應紛至若飛輪御寶則善信歸降竦石參煙則力士潛伏當知至治無心剛柔在化自晉惠失政懷愍播遷中州寇蕩竇羯亂交淵曜篡虐于前勒虎潛兇于後郡國分崩民遭屠炭澄公憫鋒鏑之方始痛刑害之未央遂彰神化于葛陂騁懸記于襄鄴祕咒而濟將盡擬香氣而拔臨危瞻鈴鞅掌坐定凶吉終令二石稽首荒裔子來澤潤蒼生固無以校也其後佛調耆域涉公杯度等或韜光晦影俯同迷俗或顯現神奇遙記方兆或死而更生或窆後空槨靈怪詭莫測其然但典章不同去取亦異至如劉安李脫書史則以為謀僭伏蕩仙錄則以為羽化雲翔夫理之所貴者合道也事之所貴者濟物也故權者反常而合道利用以成務然前傳所紀其詳莫究或由法身應感或是遁仙高逸但使一分兼人使足高矣至如慧則之感香甕能致痼疾消瘳史宗之過漁梁迺令潛鱗得命白足臨刃不傷遺法為之更始保誌分身圓戶帝王以之加信光雖和而弗污其體塵雖同而弗渝其真故先代文紀竝見宗錄若其誇衒方伎左道亂時因神藥而高飛藉芳芝而壽考與夫雞鳴雲中狗吠天上蛇鵠不死龜靈千年曾是為異乎高僧傳十習禪論禪也者妙萬物而為言故能無法不緣無境不察然後緣法察境唯寂乃明其猶淵池息浪則徹見魚石心水既澄則凝照無隱老子云重為輕根靜為躁根君故輕必以重為本躁必以靜為基大智論云譬如服藥將身權息家務氣力平健則還修家業如是以禪定力服智慧藥得其力已還化眾生是以四等六通由禪而起八除十入藉定方成故知禪之為用大矣哉自遺教東移禪道亦授先是世高法護譯出禪經僧光曇猷等竝依教修心終成勝業故能內踰喜樂外折妖祥擯鬼魅于重巖覩神僧于絕石及沙門智嚴躬履西域請罽賓禪師佛馱跋陀更傳業東土元高元紹等亦竝親受儀則出入盡于數隨往反窮乎還淨其後僧周淨度法期慧明等亦雁行其次然禪用為顯屬在神通故使三千宅乎毛孔四海結為凝酥過石壁而無壅擎大眾而弗遺及夫悠悠世道碌碌仙術尚能停波止雨咒火燒國正復元高逝矣而更起道法坐而從化焉足異哉若如鬱頭藍弗竟為禽獸所惱獨角仙人終為扇陀所亂皆由心道雖攝而與愛見相應比夫螢爝之于日明曾是為匹乎高僧傳十一明律論禮者出乎忠信之薄律亦起自防非是故隨有犯緣乃製篇目迄乎雙樹在迹為周自金河滅影迦葉嗣興因命持律尊者憂波離比丘使出律藏波離乃手執象牙之扇口誦調御之言滿八十反其文乃訖于是題之樹葉號曰八十誦律是後迦葉阿難末田地舍那波斯憂波鞠多此五羅漢次第任持至掘多之世有阿育王者王在波吒梨弗多城以因往昔見佛遂為鐵輪御世而猜忌不忍在政苛虐焚蕩經書害諸得道其後易心歸信追悔前失遠會應真更集三藏于是互執見聞各引師說依據不同遂成五部而所製輕重時或不同開遮廢立不無小異皆由如來往昔善應物機或隨人隨根隨時隨國或此處應開餘方則制或此人應制餘者則開五師雖同取佛律而各據一邊故篇聚或時輕重綱目不無優降依之修學竝能得道故如來在世有夢氈因緣已懸記經律應為五部大集經云我滅度後遺法分為五部顛倒解義隱覆法藏名曇無鞠多即曇無德也讀誦外書受有三世善能問難說一切性皆得受戒名薩婆即薩婆多也說無有我輕諸煩惱名迦葉毗說有我不說空名婆蹉富羅以廣博遍覽五部名摩訶僧祇善男子如是五部雖名別異而皆不妨諸佛法界乃大涅槃又文殊師利問經云我涅槃後百年當有二部起一摩訶僧祇二大眾老少同會共菩莚會出律也從此部流散更生七部二者體毗履部純老宿共會出律也從此部流散更生十一部故彼經偈云十八及二本悉從大乘出無是亦無非我說未來起又執見不同傳中亦有十八部而名字小異故以五部為根本從薩婆多部生四部彌沙塞生一部迦葉毗生二部竝是佛泥洹後二百年內僧祇生六部流傳至四百年中曇無德生五部經中或時止道五師者舉其領衷而言或時十八二十則通列異論也自大教東傳五部皆度始弗若多羅誦出十誦梵本羅什譯為晉文未竟多羅化焉後曇摩流支又誦出餘什譯都竟曇無德部佛陀耶舍所翻即四分律也摩訶僧祇部及彌沙塞部竝法顯得梵本佛馱跋陀羅譯出僧祇律佛馱什譯出彌沙塞部即五分律也迦葉毗部或言梵本已度末被翻譯其善見摩得勒伽戒因緣等亦律之枝屬也雖復諸部皆傳而十誦一本最盛東國以昔卑摩羅又律師本西士元匠來入關中及往荊陜皆宣通十誦盛見宗錄曇猷親承音旨僧業繼踵宏化其閒璩儼隱榮等竝祖述猷業列奇宋代而皆依文作解未甚鑽掘其後智稱律師竭有深思凡所披釋竝開拓開戶更立科目齊梁之閒號稱命世學徒傳記于今尚焉夫慧資于定定資于戒故戒定慧品義次第故當知入道即以戒律為本居俗則以禮義為先禮記云道德仁義非禮不成教訓正俗非禮不備經云戒為平地眾善由生三世佛道藉戒方住故神解五法制使先知斬草三根不可可識然後定慧法門以次修學而謬執之徒互生異論偏于律者則言戒律為指事數論虛誕薄知篇聚名目便言解及波離止能漉水翻囊已謂行齊羅漢唯我曰僧餘皆木想此則自讚毀他功不贖過我慢矜高蓋斯謂也偏于數論者則言律部為偏分數論為通方于是扈背毗尼專重陰入得意便行曾莫拘硋謂言地獄不燒智人鑊湯不煮般若此皆操之失柄還以自傷相鼠羺羊豈非斯謂高僧傳十一忘身論夫有形之所貴者身也請識之所貴者命也是故餐脂飲血乘肥衣輕欲其怡懌也餌朮含丹防生養性欲其壽考也至如析一毛以利天下則吝而弗為撤一餐以續餘命則惜而不與此其獘過矣自有宏知達見遺己贍人體三界為長夜之宅悟四生為夢幻之境精神逸乎蜚羽形骸滯于瓶穀是故摩頂至足曾不介心國城妻子捨若遺芥今之所論蓋其人也僧群止為一鴨而絕水以亡身僧富止救一童而畫腹以全命法進割肉以啖人曇稱自餧于災虎斯皆尚乎兼濟之道忘我利物者也昔王子投身功踰九劫刳肌貿鳥駭震三千惟夫若人固亦超邁高絕矣爰次法羽至于曇弘皆灰燼形骸棄捨珍愛或以情祈安養或以願生知足故雙桐表于房裏一館顯自空中符瑞彪炳與時閒出然聖教不同開遮一異若是大權為物適時而動利現萬端非教所制故經云能然手足一指迺勝國城布施若是出家凡僧本以威攝物而今殘毀形體壞福田相考而為談有得有失得在忘身失在違戒故龍樹云新行菩薩不能一時備行諸度或滿檀而乖孝如王子投虎或滿慧而乖慈如檢他斷食等皆由行未全美不無盈缺又佛說身有八萬戶蟲與人同氣命既盡蟲亦俱逝是故羅漢死後佛許燒身而今未死便燒或損于蟲命有失說者或言羅漢尚入火光夫復何怪有言入火光者先己捨命用神智力後迺自燒然性地菩薩亦未免報軀或時投形火聚或時裂體分人當知殺蟲之論其究莫詳焉夫三毒四倒乃生死之根栽七覺八道實涅槃之要路豈必燔炙形體然後離苦若其位鄰得忍俯迹同凡或時為物捨身此非言論所及至如凡夫之徒鑒察無廣竟知盡壽行道何如棄捨身命或欲激譽一時或欲流名萬代及臨火就薪悔怖交切彰言既廣恥奪其操于是僶俛從事空嬰萬苦若然非所謂也高僧傳十二誦經論諷誦之利大矣而成其功者希焉良由總持難得惽忘易生如經所說止復一句一偈亦是聖所稱美是以曇邃通神于石塢僧生感衛于空山道冏臨危而獲濟慧慶將沒而蒙全斯皆貫德內充故使徵應外啟經云六牙降室四王衛座豈曰虛哉若乃凝寒靖夜朗月長宵獨處閑房吟諷經典音吐遒亮文字分明足使幽顯忻踊精神畼悅所謂歌誦法言以此為音樂者也高僧傳十二興福論昔優填初刻梅檀波斯始鑄金質皆現寫真容工圖妙相故能流光動瑞避席施虔爰至髮爪兩塔衣影二臺皆是如來在世已見成軌自收迹河邊闍維林外八王請分還國起塔及瓶灰二所于是十剎興焉其生處得道說法涅槃肉結頂骨四牙雙跡鉢杖唾壺泥洹僧等皆樹塔勒銘標揭神異尒後百有餘年阿育王遣使浮海壞撤諸塔分取舍利還值風潮頗有遺落故令海族之中時或遇者是後八萬四千因之而起育王諸女亦次發淨心竝鐫石鎔金圖寫神狀至能浮江汎海影化東川雖復靈迹潛通而未彰視聽及蔡愔秦景自域還至始傳盡㲲釋迦于是涼臺壽陵竝圖其相自茲厥後形像塔廟與時競列洎于大梁遺光粵盛夫法身無像因感見有參差故形應有殊別若乃心路蒼茫則真儀隔化情志慊切則木石開心故劉殷至孝誠感釜庾為之生生銘丁蘭溫凊竭誠木毋以之變色魯陽迴戈而日返杞婦下淚而城崩斯皆隱惻入其性情故使徵祥照乎耳目至如慧達招光于剎杪慧力感瑞于塔基慧受申誠千浮木僧慧顯證于移燈洪亮竝忘形于鑄像意獻皆盡命于伽藍法獻專志于牙骨竟陵為之通感僧護蓄抱于石城南平以之獲應近有光宅丈九顯曜京畿宋帝四鑠而不成梁皇一冶而形備妙相踊而無虧瑞銅少而更足故知道藉人弘神由物感豈曰虛哉是以祭神如神在則神道交矣敬像如敬佛則法身應矣故入道必以智慧為本智慧必以福德為基譬猶鳥備二翼一舉萬尋車足兩輪一馳千里豈不勤哉豈不勖哉高僧傳十三經師論夫篇章之作蓋欲伸畼懷抱襃述情志詠歌之作欲使言味流靡辭韻相屬故詩序云情動于中而形于言之不足故詠歌之也然東國之歌也則結韻以成詠西方之讚也則作偃以和聲雖復歌讚為殊而竝以協諧鍾律符靡宮商方乃奧妙故奏歌于金石則謂之以為樂讚法于管絃則稱之以為唄夫聖人制樂其德四焉感天地通神明安明民成性類如聽唄亦其利有五身體不疲不忘所憶心不懈倦音聲不懷諸天懽喜是以般遮絃歌于石室請開甘露之初門淨居舞頌于雙林奉報一化之恩德其閒隨時讚詠亦在處成音至如億耳細聲于宵夜提婆颺響于梵宮或令無相之旨奏于篪笛之上或使本行之音宣于竽瑟之下竝皆抑揚通感佛所稱讚故咸池韶武無以四其工激楚塵無以較其妙自大教東流乃譯文者眾而傳聲蓋寡良由梵音重複漢語單奇若用梵音以詠漢語則聲繁而偈迫若用漢曲以詠梵文則韻短而辭長是故金言譯梵響無授始有魏陳思王曹植深愛聲律屬意經音既通般遮之瑞響又感漁山之神製于是刪治瑞應本起以為學者之宗傳聲則三千有餘在契則四十有二其帛橋支籥亦云祖述陳思而愛好通靈別感神製裁變有聲所存止一千而已至石勒建平中有天神降于安邑廳事諷詠經音七日乃絕時有傳者竝皆訛廢逮宋齊之閒有曇遷僧辯太傅文宣等竝殷勤嗟詠曲音律撰集異同斟酌科例存于舊法正可三百餘聲自茲厥後聲多散落人人致意補綴不同所以師師異法家家各製皆由昧乎聲旨莫以裁正夫立樂感動自古而然是以玄師梵唱赤鷹愛而不移比丘流響埥鳥悅而忘翥曇憑動韻猶令象馬踡跼僧辯折調尚使鴻鶴停飛量人雖復淺深籌感抑亦次焉故擊石拊石則百獸率舞簫韶九成則鳳凰來儀鳥獸且猶致感況乃人神者哉但轉讀之為懿貴在聲文兩得若唯聲而不文則道心無以得生若唯文而不聲則俗情無以得入故經言以微妙音歌歎佛德斯之謂也而頃也學者裁得首尾餘聲便言擅名當世經文起盡曾不措懷或破句以全聲或分文以足韻豈唯聲之不足亦乃文不成詮聽者唯增恍惚聞之但益睡眠使夫八真明珠未揜而藏曜百味淳乳不澆而自薄哀哉若能精達經旨洞曉音律三位七聲次而無亂五言四句契而莫爽其閒起擲盪舉平折放殺游飛郤轉反疊嬌哢動韻則掄靡弗窮張喉則變態無盡故能炳發八音光揚七善壯而不猛凝而不滯弱而不野剛而不銳清而不擾濁而不蔽諒足以超畼微言怡養神性故聽聲可以娛耳聆語可以開襟若然可謂梵音深妙令人樂聞者也然天竺方俗凡是歌詠法言皆稱為唄至于此士詠經則稱為轉讀歌讚則號為梵音昔諸天讚唄皆以韻入絃管五眾既與俗違故宜以聲曲為妙原夫梵唄之起亦肇自陳思始著太子頌及睒頌等因為之製聲吐納抑揚竝法神授今之皇皇顧惟蓋其風烈也其後居士支謙亦傳梵唄三契皆湮沒不存世有共議一章恐或謙之餘則也唯康僧會所造泥洹梵唄于今尚傳即敬謁一契文出雙卷泥洹故曰泥洹唄也爰至晉世有生法師初傳覓歷今之行地印文即其法也籥公所造六言即大慈哀愍一契于今時有作者近有西涼州唄源出關右而流于晉陽今之面如滿月是也凡此諸曲竝製出名師後人繼作多所訛漏或時沙彌小兒互相傳校疇昔成規殆無遺一惜哉此即同是聲例故備之論末高僧傳十三唱導論唱導者蓋以宣唱法理開導眾心也昔佛法初傳于時齊集止宣唱佛名依文致禮至中宵疲極事資啟悟乃別請宿德昇座說法或雜序因緣或傍引譬喻其後廬山釋慧遠道業貞華風才秀發至齋集輒自昇高座躬為導首光明三世因果卻辯一齋大意後代傳受遂成永則故道照曇穎等十有餘人竝駢次相師各擅名當世夫唱導所貴其事四焉謂聲辯才博非聲則無以警眾非辯則無以適時非才則言無可采非博則語無依據至若響韻鍾鼓則四眾驚心聲之為用也辭吐俊發適會無差辯之為用也綺製彫華文藻橫逸才之為用也商確經論采撮書史博之為用也若能善茲四事而適以人時如為出家五眾則須切語無常苦陳懺悔若為君王長者則須兼引俗典綺綜成辭若為悠悠凡庶則須指事造形直談聞見若為山民野處則須近局言辭陳斥罪目凡此變態與事而興可謂知時眾又能善說雖然故以懇切感人傾誠動物此其上也昔草創高僧本以八科成傳卻尋經道二伎雖于道為末而悟俗可崇故加此二條足成十數何者至如入關初夕旋繞周行煙蓋停氛燈帷靖燿四眾專心叉指緘嘿尒時導師則擎爐慷慨含吐抑揚辯出不窮言應無盡談無常則令心形戰慄語地獄則使怖淚交零徵昔因則如見往業覈當果則己示來報談怡樂則情抱畼悅敘哀慼則灑泣含酸于是闔眾傾心舉堂惻愴五體輸席碎首陳哀各各彈指人人唱佛爰及中宵後夜鍾漏將罷則言星河易轉勝集難留又使遑伯懷抱載盈戀慕當尒之時導師之為用也其閒經師轉讀事見前草皆以賞悟適時拔邪立信有一分可稱故編高僧之末若夫綜習未廣諳究不長既無臨時捷辯必應遵舊本然才非己出製自他成吐納宮商動見紕繆其中傳寫訛誤亦皆依而宣唱致使魚魯淆亂鼠璞相疑或時禮拜中閒懺疏忽至既無宿蓄恥欲出頭臨抽造謇荊棘難辯意慮荒忙心口乖越前語既久後語未就抽衣謦咳示延時節列席寒心觀徒啟齒施主失應時之福眾僧乖古佛之教既絕生善之萌祇增戲論之惑始獲濫吹之譏終致代匠之咎若然豈高僧傳之謂耶釋藏驅七高僧傳十三高僧傳序錄原夫至道沖漠假蹄筌而後彰元致幽凝藉師保以成用是由聖迹迭興賢能異託辯忠烈孝慈以定君父之道明詩書禮樂以成風俗之訓或忘功遺事尚彼虛沖或體任榮枯重茲達命而皆教但域中功存近益斯蓋漸染之方未奧盡其神性至若能仁之為訓也攷業果之幽微則循復三世言至理之高妙則貫絕百靈若夫啟十地以辯慧宗顯二諦以詮智府窮神盡性之旨管一樞極之致餘教方之猶群流之歸巨壑眾星之拱北辰懋哉邈矣信難得以言尚至迺教滿三千形遍六道皆所以接引幽昏為大利益而以淨穢異聞昇墜殊見故秋方先形聲之奉東國後見聞之益雲龍表于夜明風虎彰乎宵夢洪風既扇大化斯融自尒西域名僧往往而至或傳度經法或教授禪道或以異迹化人或以神力救物自漢之梁紀厤彌遠世涉六代年將五百此土桑門含章秀起群英閒出迭有其人眾家紀錄敘載各異沙門法濟偏敘高逸一迹沙門法安但列志節一行沙門僧寶止命遊方一科沙門法進迺通撰論傳而辭事闕略竝皆互有繁𥳑出沒成異攷之行事未見其歸宋臨川康王義慶宣驗記及幽明錄太原王琰冥詳記彭城劉悛益部寺記沙門曇宗京師寺記大原王延秀感應傳朱君台徵應傳陶淵明搜神錄竝傍出諸僧敘其風素而皆是附見亟多疏闕齊竟陵文宣王三寶記傳或稱物史或號僧錄既三寶共敘辭旨相關混濫難求更為蕪昧琅邪王中所撰僧史意似該綜而文體未足沙門僧祐撰三藏記止有三十餘僧所無甚眾中書郗景興東山僧傳治中張孝秀廬山僧傳中書陸明霞沙門傳各競舉一方不通今古務存一善不及餘行逮于即時亦繼有作者然或襃讚之下過相揄揚或敘事之中空列辭費求之實理無的可稱或復嫌以繁廣刪減其事而抗迹之奇多所遺削謂出家之士處國賓王不應勵然自遠高蹈獨絕尋辭榮棄愛本以異俗為賢若此而不論竟何所紀嘗以暇日遇覽群作輒搜檢雜錄數十餘家及晉宋齊梁春秋書史秦趙燕涼荒朝偽厤地理雜篇孤文片記并博諮故老廣訪先達校其有無取其同異始于漢明帝永平十年終至梁天監十八年凡四百五十三載二百五十七人又傍出附見者二百餘人開其德業大為十例一曰譯經二曰義解三曰神異四曰習禪五曰明律六曰遺身七曰誦經八曰興福九曰經師十曰唱導然去流東土蓋由傳譯之勳或踰越沙險或汎漾洪波皆忘形徇道委命宏法震旦開明一焉是賴茲德可崇故列之篇首至若慧解開神則道兼萬億通感適化則彊暴以綏靖念安禪則功德森茂宏讚毘尼則禁行清潔忘形遺體則矜吝革心歌誦法言則幽顯含慶樹興福善則遺像可傳凡此八科竝以軌迹不同化洽殊異而皆德效四依功在三業故為群經之所稱美眾聖之所襃述及夫計覈源流商攉取捨皆列諸讚論備之後文而論所著辭微異恆體始標大意類由前序未辯時人事同後議若閒使前後如謂煩雜故總布一科之末通稱為論其轉讀宣唱雖源出非遠然而應機悟俗實有偏功故齊宋雜記咸則秀者今之所取必其製用超絕及有一介通感迺編之傳末如或異者非所存焉凡十科所敘皆散在眾記今止刪在一處故述而無作俾夫披覽于一本之內可兼諸要其有繁辭虛讚或德不及稱者一皆省略故述六代賢異止為十三卷并序錄合十四軸號曰高僧傳自前代所撰多曰名僧然名者本實之賓也若實行潛光則高而不名寡德適時則名而不高名而不高本非所紀高而不名則備今錄故省名音代以高字其閒草創或有遺逸今此十四卷備讚論者意以為定如未隱括覽者詳焉高僧傳第十四
