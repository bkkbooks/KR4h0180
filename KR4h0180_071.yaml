body:
  text: 釋寶誌請雨啟誌病不差就官乞治若不啟白于官應得鞭杖願于華光殿講勝鬘請雨法苑珠林四十一引高僧傳今高僧傳略同天監五年旱上啟上使沙門法雲講勝鬘夜便大雪誌云須水一盆加刀其上俄而大雨伏龜山埋白石圅銘維天監十四年秋八月寶公理于此山詞曰若問江南事江南自有憑乘雞登寶位犬吠入金陵子建司南斗安人秉夜燈東鄰家道闕隨虎遇明君雲谷禪林志五宋張浚誌公菩薩行實碑銅碑記讖有一真人名知遠開口張弓在左邊了子子孫孫万万年雲谷禪林志張浚碑引楊文公談苑天監中讖太歲龍將無理蕭經霜草應死餘人散十八子南史六十三王僧辯傳請禁丹陽琅邪二郡蒐捕啟京畿既是福地而鮮食之族猶布筌網竝驅之客尚馳鷹犬非所以仰稱皇朝優治之旨請丹陽琅邪二境水陸竝不得蒐捕廣宏明集二十六武帝十六年下詔去宗廟犧牲上定林寺沙門僧祐龍華邑正柏超度等上啟敕付尚書詳之梵漢譯經音義同異記夫神理無聲因言辭以寫意言辭無迹緣文字以圖音故字為言蹄言為理筌音義合符不可偏失是以文字應用彌綸宇宙雖迹繫翰墨而理契乎神昔造書之主凡有三人長名曰梵其書右行次曰佉樓其書左行少者倉頡其書下行梵及佉樓居于天竺黃史倉頡在于中夏梵佉取法于淨天倉頡因華于鳥迹文畫誠異傳理則同矣仰尋先覺所說有六十四書鹿輪轉眼筆制區分龍鬼八部字體殊式唯梵及佉樓為世勝文故天竺諸國謂之天書西方寫經雖同祖梵文然三十六國往往有異譬諸中土猶篆籀之變體乎案倉頡古文沿世代變古移為籀籀遷至篆篆改成隸其轉易多矣至于傍生八體則有仙龍雲芝二十四書則有楷草鍼殳名實雖繁為用蓋鮮然原本定義則體備于六文適時為敏則莫要于隸法東西之書源亦可得而略究也至于梵音為語單複無恆或一字以攝眾理或數言而成一義尋大涅槃經列字五十總釋眾義十有四音名為字本觀其發語裁音宛轉相資或舌根脣末以長短為異且胡字一音不得成語必餘言足句然後義成譯人傳意豈不艱哉又梵書製文有半字滿字所以名半字者義未具足故字體半偏猶漢文月字虧其傍也所以名滿字者理既究竟故字體圓滿猶漢文日字盈其形也故半字惡義以譬煩惱滿字善意以譬常住又半字為體如漢文言字滿字為體如漢文諸子以者配言方成諸字諸字兩合即滿之例也言字單立即半之類也半字雖單為字根本緣有半字得成滿字譬凡夫始于無明得成常住故因字製義以譬涅槃梵文義奧皆此類也是以宣領梵文寄在明譯譯者釋也交釋兩國言謬則理乖矣自前漢之未經法始通譯音胥訛末能明練故浮屠桑門遺謬漢史音字猶然況于義乎案中夏彝典誦詩執禮師資相授猶有訛亂詩云有免斯首斯當作鮮齊語音訛遂變詩文此桑門之例也禮記云孔子蚤作蚤當作早而字同蚤蝨此古字同文即浮屠之例也中國舊經而有斯蚤之異華戎遠譯何怪于屠桑哉若夫度字傳義則置言由筆所以新舊眾經大同小異天竺語稱維摩詰舊譯解云無垢稱關中譯云淨名淨即無垢名即是稱此言殊而義均也舊經稱眾祐新經云世尊此文義之異旨也舊經云乾沓和新經云乾闥婆此國音之不同也略舉三條餘可類推矣是以義之得失由乎譯人辭之質文繫于執筆或善梵義而不了漢音或明漢文而不曉梵意雖有偏解終隔圓通若梵漢兩明意義四畼然後宣述經奧于是乎正前古譯人莫能曲練所以舊經文意致有阻礙豈經礙哉譯之失耳昔安息世高聰哲不群所以眾經質文允正安玄嚴調既亹亹以條理支越竺蘭亦彬彬而雅畼凡斯數賢竝見美前代及護公專精兼習華梵譯文傳經不愆于舊逮乎羅什法師俊神金照秦僧融肈慧機水鏡故能表發揮翰克明經奧大乘微言于斯炳煥至曇讖之傳涅槃跋陀之出華嚴辭理辯畼明踰日月觀其為美繼軌什公矣至于雜類細經多出四含或以漢來或自晉出譯人無名莫能詳究然文過則傷豔質甚則忠野野豔為獘同失經體故知明允之匠難可世遇矣祐竊尋經言異論咒術言語文字皆是佛說然則言本是一而梵漢分音義本不二則質文殊體雖傳譯得失運通隨緣而尊經妙理湛然常照矣既仰集始緣故次述末譯始緣興于西方末譯行于東國故原始要終寓之記末云爾釋藏迹一前後出經異記舊經眾祐新經世尊舊經扶薩亦云開士新經菩薩舊經右佛亦獨覺新經辟支佛亦緣覺舊經薩芸若新經薩婆若舊經溝港道亦道迹新經須陀洹舊經頻來果亦一往來新經斯陀含舊經不還果新經阿那含舊經無著果亦應真亦應儀新經阿羅漢亦阿羅訶舊經摩納新經長者舊經濡首新經文殊舊經光世音新經觀世音舊經須扶提新經須菩提舊經舍梨子亦鶖鷺子新經舍利弗舊經為五眾新經為五陰舊經十二處新經十二入舊經為持新經為性舊經背捨新經解脫舊經勝處新經除入舊經正斷新經正勤舊經覺意新經菩提舊經直行新經正道舊經乾沓和新經乾闥婆舊經除饉男除饉女新經比丘比丘尼舊經怛薩阿竭阿羅訶三邪三佛新經阿耨多羅三藐三菩提同上小乘迷學竺法度造異儀記夫至人應世觀眾生根根力不同設教亦異是以三乘立軌隨機而發五時說法應契而化沿麤以至妙因小以及大階漸殊時教之體也自正法稍遠受學乖互外域諸國或偏執小乘最後涅槃顯明佛性而猶執初教可謂膠柱鼓瑟者也元嘉中外國商人竺婆勒久停廣州每往來求利于南康郡生兒仍名南康長易字金伽後得入道為曇摩邪舍弟子改名法度其人貌雖外國實生漢土天竺科軌非其所諳但性存矯異欲臣攝物故執學小乘云無十方佛唯禮釋迦而已大乘經典不聽讀誦反抄著衣以此為法常用銅鉢無別應器乃令諸尼作鎮肩衣似尼師壇縫之為囊恆著肩上而不用坐以表眾異每至出路相捉而行布薩悔過但伏地相向而不胡跪法度善閑漢言至授戒先作梵語不令漢知案律之明文授法資解言不相領不得法事而竺度昧罔面行詭術明識之眾咸共駭棄唯宋故丹陽尹顏竣女宣業寺尼法弘交州刺史張牧女弘光寺尼普明等信受其教以為真實雖出貴族而識謝慧心毀眥方等既絕法雨妄學詭科乖背律儀來苦方深良可愍傷自正化東流木乘日曜英哲頂受遍遇服膺而使迷偽之人專行偏教莫或振止何其甚哉昔慧導拘滯疑惑大品曇樂偏執非撥法華罔天下之明信己情之謬關中大眾固已指為無間矣至如彭城僧淵誹謗涅槃舌根銷爛現表厥殃大乘難誣亦可驗也尋三人之惑竝惡止其躬而竺之悖以毒飲人凡女人之性智弱信強一受偽教則同惑相挻故京師數寺遂塵異法東境尼眾亦時染此風將恐邪路易開淄汙不已嗟乎斯豈魔斷大乘故先侮女人歟此實開士之所痛悼而法主所宜匡制也大方便經云釋迦如來昔為比丘專以四阿含教化謗毀方等于無數劫受大苦報從阿鼻出發大乘心致成正覺後進之賢宜思防斷古今明誡可不慎乎昔慧叡法師久歎愚迷製此喻疑防于今日故存之錄末雖于錄非類顯證同矣釋藏迹五菩薩善戒菩薩地持二經記祐尋舊錄此經十卷是宋文帝世三藏法師求那跋摩于京都譯出經文云此經名善戒名菩薩地名菩薩毗尼摩夷名如來藏名一切善法根本名安樂國名諸詖羅密聚凡有七名第一卷先出優波離問受戒法第二卷始方有如是我聞次第列品乃至三十而復有別本題為菩薩地經檢此兩本文句悉同唯一兩品分品品名小小有異義亦不殊既更不見有異人重出推之應是一經而諸品亂雜前後參差菩薩地本分為三段第一段十八品第二段有四品第三段有八品未詳兩本孰是三藏所出正木也又菩薩地持經人卷有二十七品亦分三段第一段十八品第二段四品第三段五品是晉安帝世曇摩讖于西涼州譯出經首禮敬三寶無如是我聞似撰集佛語文中不出有異名而今此本或題云菩薩戒經或題云菩薩地經與三藏所出菩薩善戒經二文雖異五名相涉故同一記又此二經明義相類根本似是一經異國人出故成別部也竝次第明六度品名多同製辭各異祐見菩薩地經一本其第四卷第十戒品乃是地持經中戒品又少第九施品當曝曬誤雜後人不悉便爾傳寫其本脫多恐方亂惑若細尋內題了然可見若有菩薩地經闕無第九施品者即是誤本也釋藏迹九大集虛空藏無盡意三經記祐尋舊錄大集經是晉安帝世天竺沙門曇摩讖于西涼州譯出有二十九卷首尾有十二段說共成一經第一瓔珞品第二陀羅尼自在王第三寶女第四不眴第五海慧第六無言第七不可說第八虛空藏第九實幢第十虛空目第十一寶髻第十二無盡意更不見異人別譯而今別部唯有二十四卷尋其經文餘悉同唯不可說菩薩品後寶幢分前中間闕無虛空藏所問品五卷又經唯盡寶髻菩薩品復無最末無盡意所說不可思議品四卷略無二品九卷分所餘二十卷為二十四卷耳又尋兩本並以海慧菩薩品為第五越至無言菩薩品第七無第六品未詳所以又檢錄別有大虛空藏經五卷成者即此經虛空藏品當是時世有益甄為異部又別有無盡意經四卷成者亦是此經末無盡意品也但護公錄復出無盡意經四卷未詳與此本同異同上賢愚經記十二部典蓋區別法門曠劫因緣既事照于本生智者得解亦理資于譬喻賢愚經者可謂兼此二義矣河西沙門釋曇學成德等凡有八僧結志遊方遠尋經典于于闐大寺遇般遮于瑟之會般遮于瑟者漢言五年一切大集眾集也三藏諸學各弘法寶說經講律依業而教學等八僧隨緣分聽于是競習梵音析以漢義精異通譯各書所聞還至高昌乃集為一部既而踰越流沙齎至涼州于時沙門釋慧朗河西宗匠道業淵博總持方等以為此經所記源在譬喻譬喻所明兼載善惡善惡相翻則愚之分也前代傳經已多譬喻故因事改名號曰賢愚焉元嘉二十二年歲在乙酉始集此經京師天安寺沙門釋弘宗者戒力堅淨志業純白此經初至隨師河西時為沙彌年始十四親預斯集躬覩其事洎梁天監四年春秋八十有四凡六十四臘京師之第一上座也經至中國則七十年矣祐總集經藏訪告遐邇躬往諮問面質其事宗年耆德峻心道據明故標諜為錄以示後學焉同上略成實論紀成實論十六卷羅什法師于長安出之曇晷筆受曇影正寫影欲使文玄後自轉為五翻餘悉依舊本齊永明七年十月文宣王招集京師碩學名僧五百餘人請定林僧柔法師謝寺慧次法師于普弘寺迭講欲使研覈幽微學通疑執即坐仍請祐及安樂智稱法師更集尼眾二部名德七百餘人續講十誦律志令四眾淨業還白公每以大乘經淵深漏道之津涯正法之樞紐而近世陵廢莫或敦修棄本逐未喪功繁論故即于律座令柔次等諸論師抄比成實𥳑繁存要略為九卷使辭約理舉易以研尋八年正月二十三日解座設三業三品別施獎有功勸不及上者得三十餘件中者得二十許種下者數物而已即寫略論百部流通教使周顒作論序今錄之于後釋藏百一異出經錄異出經者謂梵本同而漢文異也梵書複隱宣譯多變出經之士才趣各殊亂有質文意或詳略故今本一末二新舊參差若國言訛轉則音字楚夏譯辭格礙則事義胡越豈西傳之踳駮乃東寫之乖謬耳是以泥洹楞嚴重出至七般若之經別本迺八傍及眾典往往如茲今竝條目列入以表同異其異出雜經失譯名者皆附失源之錄釋藏迹二安公古異經錄古異經者蓋先出之遺文也尋安錄自道地要語迄四姓長者合九十二經標為古異雖經文散逸多有闕亡觀其存篇古今可辨或無別名題取經語以為錄目或撮略四含摘一事而立卷名號質實信古典矣安公覿其古異編之于末祐推其歲遠列之于首雖則失源而舊譯見矣釋藏迹三安公失譯經錄祐校安公舊錄其經有譯名則繼錄上卷無譯名者則條目于下尋安錄自修行本起訖于和達凡一百有三十四經莫詳其人又闕涼二錄竝闕譯名今總而次列入失源之部安錄誠佳頗恨太簡注目經名撮題兩字且不列卷數行閒相接後人傳寫名部混糅且朱點為標朱滅則亂循空追求困于難了斯亦璵璠之一玷也且眾錄雜經包集逸異名多複重迭相散紊今悉更刪整標定卷部使名實有分尋覽無惑焉同上律分為五部記錄佛泥洹後大迦葉集諸羅漢于王舍城安居命優波離出律八萬法藏有八十誦初大迦葉任持第二阿難第三末田地第四舍那波提第五優波崛至百一十餘年傳授不異一百十一餘年後阿育王出世初大邪見毀壞佛法焚燒經書僧眾星散故八十通灰滅後值羅漢更生信心懺悔除罪甚有神力為鐵輪王王閻浮提能役鬼神一日一夜壞舍利八塔起八萬四千塔還興顯佛法請諸羅漢通出經律時有五大羅漢各領徒眾弘通佛法見解不同或執開隨制共相傳習遂有五部出焉十六大國隨用竝行競各進業皆獲道證自非聖道玄通孰能使之然乎後時五部異執紛然競起阿育王言皆誦佛語我今何以測其是非問僧佛法斷事云何諸僧皆言法應從多阿育王即集五部僧共行籌當爾時眾取婆麤富羅部籌多遂改此一部為摩訶僧祇摩訶僧祇者大眾名也若就今時此土行籌便此十誦律名摩訶僧祇也大集經佛記未來世當有此等律出世與今事相應立名不異也又有因緣經說佛在世時有一長者夢見一張白㲲忽然自為五段驚詣佛所請問其故佛言此乃我滅度後律藏當分為五部耳同上律分為十八部記錄佛滅度二百年後薩婆多部分出婆蹉部婆䁟部又分出三部一者法盛二者名賢三者六成彌沙塞部分出中閒見迦葉維部分出二部一者僧迦提二者式摩一本三魔提摩訶僧祇部四百年時分出六部一者維迹二者多聞三者施設四者毗陀五者施羅六者上施羅又一本曇無德部此十八部見有同異文煩不復備寫同上律來漢地四部序錄昔甘露初開經法是先因事結戒律教方盛及㲲夢表其五分而鞠多當其異部故知道運推移化緣不一矣至于中夏聞法亦先經而後律律藏稍廣始自晉末而迦葉維部猶未東被既總集五家故存其名錄若乃梵文至止之歲胡漢宣譯之人大眾講集之處名德書翰之文竝具舉遺事交相為證使覽者昭然究其始末云爾同上薩婆多部十誦律薩婆多部者梁言一切有也所說諸法一切有相學內外典好破異道所集經書說無有我所受難能荅以此為號昔大迦葉具持法藏次傳阿難至于第五師優波掘本有八十誦優波掘以後世鈍根不能具受故刪為十誦以誦為名謂法應誦持也自茲已下師資相傳五十餘人至秦弘始之中有罽賓沙門弗若多羅誦此十誦梵本來遊關右羅什法師于長安逍遙園三千僧中共譯出之始得二分餘未及竟而多羅亡俄而有外國沙門曇摩流支續至長安于是廬山遠法師慨律藏未備思在究竟聞其至止乃與流支書曰佛教之興先行上國自分流已來近四百年至于沙門德式所闕猶多頃西域道士弗若多羅者是罽賓持律其人諷十誦梵本有鳩摩耆婆者通才博見為之傳譯十誦之中始備其二多羅早喪中塗而廢不得究竟大業慨恨良深傳聞仁者齎此經自隨甚欣所遇冥運之來豈人事而已邪想弘道為物感時而動叩之有人必情無所吝若能為律學之眾留此經本開示梵行洗其耳目使始涉之流不失無上之律參懷勝業者日月彌朗此則惠深德厚人神同感矣幸望垂懷不孤往心一二悉諸道人所具不復多白曇摩流支得書方于關中共什出所餘律遂具一部凡五十八卷後有罽賓律師卑摩羅叉來遊長安羅什先在西域從其受律羅叉後自秦適晉住壽春石澗寺重校十通律本名品遂正分為六十一卷至今相傳焉同上曇無德四分律曇無德者梁言法鏡一音曇摩鞠多如來涅槃後有諸弟子顛倒解義覆隱法藏以覆法故名曇摩鞠多是為四分律蓋罽賓三藏法師佛陀邪舍所出也初邪舍于罽賓誦四分律不齎梵本而來遊長安秦司隸校尉姚爽欲請邪舍于中寺安居仍令出之姚主以無梵本難可證信眾僧多有不同故未之許也羅什法師勸曰邪舍甚有記功數聞誦習未曾脫誤于是姚主即以藥方一卷民籍一卷竝可四十許紙令其誦之三日便栠僧執文請試之乃至銖兩人數年紀不謬一字于是咸信伏遂令出焉故肈法師作長阿含序云秦弘始十二年歲上章掩茂右將軍同隸校尉姚爽于長安中寺集名德沙門五百人請罽賓三藏佛陀邪舍出律藏四分四十卷十四年訖十五年歲昭陽奮若出長阿含涼州沙門佛念為譯秦國道士道含筆受余以嘉運猥參聽次雖無翼善之功而預親承之末略記時事以示來賢又荅江東隱士劉遺民書末云法師于大寺出新至諸經法藏淵曠日有異聞禪師于瓦官寺教習禪道門徒數百夙夜匪懈邕邕肅肅致可欣樂三藏法師于中寺出律本末精悉若覩初制毗婆沙于石羊寺出舍利弗阿毗曇梵本雖未及譯時問中事發言奇新貧道一生預參嘉會遇茲盛化自不覩釋迦祇洹之集餘復何恨但恨不得與道勝君子同斯法集耳故撮舉肈公書序以顯其證焉同上婆麤富羅律婆麤富羅者受持經典皆說有我不說空相猶如小兒故名為婆麤富羅比一名僧祇律律後記云中天竺昔時暫有惡王御世三藏比丘及諸沙門皆遠避四奔惡王既死善王更立還請沙門歸國供養時巴連弗邑有五百僧欲斷事既無律師又闕律文莫知承案即遣使到祇洹精舍寫此律文眾共奉行其後五部傳集諸律師執義不同各以相承為是爭論紛然于時阿育王言我今何以測其是非于是問僧佛法斷事云何皆言法應從多王言若爾當行籌知何眾多既而行籌婆麤富羅眾籌甚多以眾多故改名摩訶僧祇摩訶僧祇者言大眾也沙門釋法顯遊西域于摩竭提巴連弗邑阿育王塔天主精舍寫得梵本齎還京師以晉義熙十二年次壽星十一月共天竺禪師佛馱跋陀于道場寺譯出至十四年二月末乃訖同上彌沙塞律彌沙塞者佛諸弟子受持十二部經不作地相水火風相虛空識相是故名為彌沙塞部此名為五分律比丘釋法顯于師子國所得者也法顯記云顯本求戒律而北天竺諸國皆師師口傳無本可寫是以遠涉乃至中天竺于摩訶乘僧伽藍得一部律是摩訶僧祇復得一部鈔律可七千偈是薩婆多眾律即此秦地眾僧所行者也又得雜訶毗曇心可六千偈又得一部綖經二千五百偈又得一卷方等泥洹經可五千偈又得摩訶僧祇阿毗曇法顯住三年學梵書梵語悉寫之于是還又至師子國二年更求得彌沙塞部梵本法顯以晉義熙二年還都歲在壽星眾經多譯唯彌沙塞一部未及譯出而亡到宋景平元年七月有罽賓律師佛大什來至京師其年冬十一月琅邪王練比丘釋慧嚴竺道生于龍光寺請外國沙門佛大付出之時佛大什手執梵文于闐沙門智勝為譯至明年十二月都訖同上迦葉維律迦葉維者一音迦葉毗佛諸弟子受持十二部經說無有我及以受者輕諸煩惱猶如死屍是故名為迦葉毗此一部律不求梁地昔先師獻正遠適西域誓尋斯文勝心所感多值靈瑞而蔥嶺險絕弗果茲典故知此律于梁土眾僧未有其緣也同上續撰失譯雜經錄祐總集眾經遍閱群錄新撰失譯猶多卷部聲實紛糅尢難銓品或一本數名或一名數本或妄加游字以辭繁致殊或撮半立題以文省成異至于書誤益惑亂甚棼絲故知必也正名于斯為急矣是以讎校歷年因而後定其兩卷以上凡二十六部雖闕譯人悉是全典其一卷已還五百餘部率抄眾經全典蓋寡觀其所抄多出四含六度道地大集出曜賢愚及譬喻生經竝割品截偈撮略取義強製名號仍成卷軸至有題目淺拙名與實乖雖欲啟學實蕪正典其為愆謬良足深誡今悉標出本經注之目下鈔略記分全部自顯使沿波討源還得本譯矣尋此錄失源多有入經詳其來也豈天墜而地涌哉將是漢魏時來歲久錄亡抑亦秦涼宣梵成文屆止或晉宋近出忽而未講譯人之闕始由斯歟尋大法運流世移六代撰注群錄獨見安公以此無源未足怪也夫十二部經應病成藥而傳法淪昧實可悵歎祐所以杼軸于尋訪崎嶇于纂錄也但陋學謏聞多所未周明哲大士惠縫其闕言貴珙璧況法施哉釋藏迹四鈔經錄鈔經者蓋撮舉義要也昔安世高鈔出修行為大道地經良以廣譯為難故省文略說及支謙出經亦有孛鈔此竝約寫梵本非割斷成經也而後人弗思肆意鈔撮或棊散眾品或苽剖正文既使聖言離本復令學者逐末竟陵文宣王慧見明深亦不能免若相競不已則歲代彌繁蕪黷法寶不其惜歟名部一成難用刊削其安公時鈔悉附本錄新集所獲撰目如左庶誡來葉無效尢焉釋藏迹五疑經偽撰雜錄長阿念經云佛將涅槃為比丘說四大教法若聞法律當于諸經推其虛實與法相違則非佛說又大混槃經云我滅度後諸比丘輩鈔造經典令法淡薄種智所照驗于今矣自像運澆季浮競者多或憑真以構偽或飾虛以亂實昔安法師摘出偽經二十六部又指慧達道人以為深戒古既有之今亦宜然矣祐校閱群經廣集同異約以經律頗見疑夫真經體趣融然深遠假託之文辭意淺雜玉右朱紫無所逃形也今區別所疑注之于錄并近世妄撰亦標于末竝依倚雜經而自名題進不聞遠適外域退不見承譯西賓聞興于戶牖印可出于胸懷誑誤後學良寒心既躬所見聞寍敢默已嗚呼來葉慎而察焉同上僧法尼所誦出經二十一種凡三十五卷經如前件齊末太學士江泌處女尼子所出初尼子年在齠齔有時閉目靜坐誦出此經或說上天或稱神授發言通利有如宿習令人寫出俄而還止經歷旨朔續復如前京都道俗咸傳其異今上敕見面問所以其依事奉荅不異常人然篤信正法少修梵行父母欲嫁之誓而弗許後遂出家名僧法住青園寺祐既收集正典檢括異聞事接耳目就求省視其家祕隱不以見示唯得妙音師子吼經三卷以備疑經之錄此尼以天監四年三月亡有好事者得其文疏前後所出經二十餘卷厥舅孫質以為真經行疏勸化收拾傳寫既染亳牘必存于世昔漢建安末濟陰丁氏之妻忽如中疾便能梵語又求紙筆自為梵書復有西域梵人見其此書云是別經推尋往古不無此事但義非金口又無師譯取舍兼懷故附之疑例同上薩婆若陀眷屬莊嚴經一卷右一部梁天監九年郢州頭陀道人妙光戒歲七臘矯以勝相諸尼嫗人僉稱聖道彼州僧正議欲驅擯遂潛下都住普弘寺造作此經又寫在屏風紅妙映覆杳花供養雲集四部嚫供煙塞事源顯發敕付建康辯覈疑狀云鈔略諸經多有私意妄造借書人路琰屬辭潤色獄牒妙光巧詐事應斬刑路琰同謀十歲謫戍即以其年四月二十一日敕僧正慧超令喚京師能講大法師宿德如僧祐曇準等二十人共至建康前辯妙光事超即奉旨與曇準僧祐法寵慧令慧集智藏僧旻法雲等二十人于縣辯問妙光伏罪事事如牒眾僧詳議依律擯治天恩免死恐于偏地復為惑亂長繫東冶即收拾此經得二十餘本及屏風于縣燒除然猶有零散恐亂後生故復略記薩婆若陀長者是妙光父名妙光弟名金剛德體弟子名師子同上
