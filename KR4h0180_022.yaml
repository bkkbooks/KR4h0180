body:
  text: 臨川王宏令軍中人馬有前行者斬南史五十一答釋法雲書難范縝神滅論得所送敕答神滅論伏覽淵旨理精辭詣二教道叶於當年三世棟梁於今日足使迷途自反妙趣愈光遲近寫對更具披析蕭宏和南弘明集十與武帝啟前為景所擒使攝四海辭不獲免權總萬機今景既入輔乞解僭濫以王還邸魏書蕭衍傳侯景還以衍為主令正德通啟云臨江州下給船教刺史不德水潦為患可利之乎給船而已梁書安成王秀傳南史安成王秀傳臨荊州下招隱逸教夫鶉火之禽不匿影於丹山昭華之寶乍耀采於藍田是以江漢有濯纓之歌空谷著來思之詠弘風闡道靡不由茲處士河東韓懷明南平韓望南郡庾承先何東郭麻並脫落風塵高蹈其事兩韓之孝友純深庾郭之形骸枯槁或橡飯菁羹惟日不足或葭牆艾席樂在其中昔伯武貞堅就仕河內史雲孤劭屈志陳留豈曰場苖實惟攻玉可加引辟并遣喻意既同魏侯致禮之請庶無辟彊三緘之歎梁書安成王秀傳謝賜甘露啟臣欣啟某奉宣敕旨垂賚便殿桃葉甘露拜受雀躍載懷鳥抃伏以聖德至大和氣茂遠是以神液甘流靈滋膏被求之前代鏡諸終古或降邑都尚君臣動色遐邇趍慶未有發瑞殿庭呈祥翫矚視聽罕聞祥符絕代臣與奉休明曲蒙茲賜獨深抃舞實百常品不任下情謹以啟事以聞臣欣言初學記二荅釋法雲書難范縝神滅論辱告惠示敕荅臣下審神滅論天識昭遠聖情淵察伏覽玄徽實曉庸昧猥能存示深承篤顧蕭偉和南弘明集十奉湘東王為相國總百揆牋竊以嵩嶽既峻山川出雲大國有蕃申甫惟翰豈非皇建斯極以位為寶聖教辨方慎名與器是知太尉佐帝重華表黃玉之符司空相土伯禹降玄珪之錫伏維明公大王殿下命世應期挺生將聖忠為令德孝實天經地切應韓寄深旦奭五品斯訓七政以齊志存社稷功濟屯險夷狄內侵枕戈泣血鯨鯢未掃投袂勤王能使遊魂請盟以屈膝醜徒銜璧而讋氣親蕃外叛釁均吳楚義討申威兵不血刃湘波自息非築杜弢之壘峴山離貳不伐劉表之城九江致梗二別殊派纔命戈船底定灊霍泝流窮討路絕窺窬胡兵侵界鐵馬霧合神規獨運皆即梟懸翻同翅拆遂修職貢梁漢合契肆犀利之兵巴漢俱下竭驍勇之陣南通五嶺北出力原東夷不怨西戎即序可謂上流千里持戟百萬天下之至貴四海之所推也今海水飛雲崑山起燎魏文悲樂推之歲韓宣歎成禮之日陽臺之下獨有冠蓋相趨夢水之傍尚致車輿結轍麰麥兩穗出於南平之邦甘露泥枝降乎當陽之境野蠶自績何謝歐絲閑田生稻寧殊雨粟莫非品物咸亨是稱文明光大豈可徽號不彰於彝典明試不陳乎車服者哉昔晉鄭入周尚作卿士蕭曹佐漢且居相國宜崇茲盛禮顯荅群望恪等稽尋甲令博詢惇史謹再拜上進位相國總百揆竹使符一別準恆儀杖金斧以翦逆暴乘玉輅而定社稷傍羅麗於日月貞明合於天地扶危翼治豈不休哉恪等不通大體自昧伏奏以聞梁書元帝紀太清四年十一月甲子南平王恪侍中臨川王大款桂陽王大成散騎常侍江安侯圓正侍中左衛將軍張綰司徒左長史曇等府州國一千人奉牋荅晉安王書廣信縣開國侯蕭映惶恐死罪信至奉誨清言兼紙文采臣麗慰喻綢繆比日寒霜慘切伏願興居和悆民富重殷無過仰損下官智昏識闇學淺人凡遂得擁卷璇階親奉教義耳餐甘露心承制說天恩淵深叡情廣奧三明一鑒釋滯義於久迷四辯既陳闡難思而頓解豈漢皇夢迹而梵響復弘雖晉帝留心而微言始見每至夕趨瓊筵晨登朱陛不曾不憶芳林勝集玄圃法座殿下曳舄寶雲或從容而問道拖裾博望乍折角而解頤于時謬齒末筵預聞清論親奉話言數陪顏色至於今者講席殿下限同分陝謬頒天獎下官誰不欽仁寧無戀德傾心東注恆以係仰為先下官蒙蔽久已仰慕雖聞妙義愚心難啟方欲馳騖枌鄉訪疑下席忽逢令旨垂覓波餘尋讀戰皇俯仰慚恧庶為恩謼少泰下情正當慈雲智海翻以仰屬謝瓶慚㲲實歸庸菲下官惑緣既積塵累未消近攝衛乖方遂中途感疾不得餐承究竟闢開末品徒自剋責終關緣運不審比日何以怡神披閱儒史無乃損悆下官每訪西郵備餐令德仰承觀矚於章華之上或聽訟於甘棠之下未嘗不文翰紛綸終朝不息清論玄談夜分乃寐春華之客登座右而升堂災實之賓應虛左而入室文宗義府於焉總萃惟此最樂實驗茲晨下官昔游梁苑曲蒙眷顧今者獨隔清顏久暌接仰傾心已結興言涕欷惟冀音旨時錫沾及伏願珍重尋更下承曲奉恩誨用深銘荷映死罪死罪廣弘明集二十一荅釋法雲書難范縝神滅論惠示敕荅臣下審神滅論睿旨淵凝機照深邈可以筌蹄惑見訓誘蒙心鑽仰周環洗滌塵慮遂能存示戢眷良深蕭淵業和南弘明集十上言得劍餘姚縣掘地得劍二口又於縣東江水中得劍一口文漫若雌雄御覽三百四十二引梁書天監七年會稽太守衡陽王元𥳑上言上言得鏤麒麟廣陵宣城內鑿井得鏤麒麟一杖荅從兄安成王書奉告清言溢目眷逮周委炎光已盛願此勝宜仰承發止已次新林引邁務殷無妨怡賞三湘奧區九疑形勝浮洲動浪聞眠鷗之舊說安流洞浦憶採若之遺風昔景伯出蕃風高振古叔英之部清約見稱兄政譽平宣威和兼濟加以夏石奇雲秋江迥月翰飛紙落理豐辭富賞末興餘時希逮憶睽離方遠川塗修曠炎涼方改願加珍勖綠字可傳白雲終閒心傷淚灑投筆無宣蓺文類聚二十一載此文于陸景後荅釋法雲書難范縝神滅論辱告并伏見詔荅臣下審神滅論夫三世雖明一乘教遠或有偏蔽猶執異端聖上探隱索微凝神繫表窮理盡性包括天人內外辨析辭旨典奧豈直群生靡惑實亦闡提即曉方宣揚四海垂範來世惠使聞見惟深佩服孤子蕭昺頓首和南弘明集十衛尉卿蕭昺荅按梁書蕭景傳天監五年遷輔國將軍衛尉卿與弘明集正合知蕭景即蕭昺也荅釋法雲書難范縝神滅論辱告宣示敕荅臣下審神滅論聖旨披析使惑者渙然神之不滅著於通誥理既渺默故致有迷主上識照知來鑒踰藏往摛機外之妙思攻異端之妄說又引禮經取驗虛實孝敬之道於此方弘孤子蕭昂頓首和南弘明集十請解職表夏初陳啟未垂採照追懷慚懼實戰胸心臣聞暑雨祁寒小人猶怨榮枯寵辱誰能忘懷臣藉以往因得預枝戚之重緣報既雜時逢坎壈之運昔在齊季義師之始臣乃幼弱粗有識慮東西阻絕歸赴無由雖未能負戈擐甲實銜淚憤懣潛伏東境備履艱危首尾三年亟移數處雖復飢寒切身亦不以凍餒為苦每涉驚疑惶怖失魄既乖致命之節空有項領之憂希望開泰冀蒙共樂豈期二十餘年功名無紀畢此身骸方填溝壑丹誠素願溘至長罷俯自哀憐能不傷歎夫自媒自衒誠哉可鄙自譽自伐實在可羞然量已揆分自知者審陳力就列寧敢空言是以常願一試屢成干請夫上應玄象實不易叨錦不輕裁誠難其製過去業鄣所以致乖算測聖監既謂臣愚短不可試用豈容久居顯禁徒穢黃樞忝竊消積恐招物議請解今職乞屏退私門伏願天照特垂允許臣雖叨榮兩宮報效無地方違省闥伏深戀悚梁書蕭昱傳贈言賦張雲麾問望之美作牧南蕃維舟江漢留連飲餞發邁有期會面無日依依別袂恨恨江千古人贈別以言聊為贈言賦曰昔人有感於知己深情投分如斯已矣相知勢利之閒實君子之所鄙靜言神交之際亦難得而具美豈直鮮其令終曾自聞其善始日踰久而益敬蓋惟一人者爾語同志而好合諒今古之皆然苟託御而自說徐因芻而請前況英聲與茂實乃絕後而光先似臨潭而對鏡若披霧而覩天欽愛顧之罔已良佩服之在旃資淑美之上才超群雄而獨峻德既深於萬頃牆有高乎數仞思若神而泉湧文如華而玉振伊薄軀之固陋謬攝官於夏汭知美錦之難裁處棼絲而易結幸中途而遘止仰旌旆之踟躕似德星之東邁類祥雲之西徂亟留連於河渚或終宴於城隅賞既延於賓友懽亦洽於僕夫嗟灰琯之易逝慨離袂之云促借日車之不駐恨流影之難續觀善誘而不倦餐好音而未足佇浮雲之可寄願無比乎金玉蓺文類聚三十一設無礙福會教僚紀大士廣濟義非為己道弘群生種種方便所以虛已樂靜表之內經確乎難拔著自外典又加獨往斯意足論隱不隔真乃為菩薩廬山東林寺禪房智表法師德稱僧傑實號人龍懷道守素多歷年所不為事屈不為時伸上下無常一相無相遂能捨彼耆闍來遊垢濁興言一面定交杵臼余以薄德謬臨大邦教義未聞貴賢總至昔綺季之出漢年巢許之興唐日茲迺聖主流慈天澤滂被異人閒出復在此辰不勝舞蹈帝之恩普也剋今月十日於栖賢寺設無礙會并致敬開士躬諮聖福下筵餐道凡厥民隸爰乃庶士罔不率從咸皆請業上荅乾慈永同彼岸外依事宣行廣明集二十八上讓丹陽尹初表臣進非民譽退異宗英尸居戎號已紊彝典況京兆五守西漢難追河南二尹東京罕繼審已循涯自知莫可街談巷議尤見不勝蓺文類聚五十御覽二百五十二遵敕捨老子受菩薩戒啟臣綸啟臣聞如來端嚴相好巍巍架于有頂微妙色身的的顯乎無際假金輪而啟物託銀粟以應凡砥波若之利鎌收涅槃之碩果汎生死之苦海濟常樂於彼岸故能降慈悲雲垂甘露雨七處八會教化之義不窮四諦五時利益之方無盡並水清日盛露豁雲除爝火翳光塵熱自靜可謂入俗化於朦底出世冥此真如使稠林邪徑之人景法門而無倦渴愛聾瞽之土慕探賾而知迴道樹始乎迦維德音盛於京洛恆星不見周鑒娠徵滿月圓姿漢感宵夢五法用傳萬德方兆華俗潛啟競扇高風資此三明照迷途之失憑茲七覺拔長夜之苦屬值皇帝菩薩應天御物負扆臨民含光宇宙照清海表垂無礙辨以接黎庶以本願力攝受眾生故能隨根逗藥示權因顯崇一乘之旨廣十地之基是以萬邦迴向俱稟正識幽顯靈祇皆蒙誘濟人興等覺之願物起菩提之心莫不翹勤歸宗之境悅懌還源之趣共保慈悲俱修忍辱所謂覆護饒益橋梁津濟者矣道既光被民亦化之於是應真飛錫騰虛接影破邪外道堅持正國伽藍精舍寶剎相望講道傳經德音盈耳臣昔未達理源稟承外道如欲須甘果翻種苦栽欲除渴乏反趣鹹水今啟迷方粗知歸向受菩薩大戒戒節身心捨老子之邪風入法流之真教伏願天慈曲垂矜許謹啟天監三年四月十七日侍中安前將軍丹陽尹邵陵王臣蕭綸啟釋藏陪八又駕八荅皇太子示大法頌啟茲鋒鬱壯妙辯縱橫慧捨雨雪智包三藏故五時之說既陳七處之禮斯聚析般若之妙源顯無生之真諦心注八流意含五忍能使六地震動四花普雨折木蓋鱗開羅散翮香鳥步花馴遊於雲圃瑞雀飛環翔舞於風前高門洞啟不因銅馬之飾寶殿霞開寍假鳳皇之瑞雖復長卿壯辭曾何足數子雲妙句比此蔑如蓺文類聚七十七謝令賚馬啟連翩絕景沃若追風超渥水之形踰大宛之狀荷傳西蕃將達宮閫無任城之氣勇降東平之喜錫何以揚名沙漠仰稱隆慈戀德銘心矚恩雨淚蓺文類聚九十三與湘東王書伏以先朝聖德孝治天下九親雍睦四表無怨誠為國政實亦家風唯余與爾同奉神訓宜教旨諭共承無改且道之斯美以和為貴況天時地利不及人和豈可手足肱支自相屠害日者聞譽專情先訓以幼陵長湘峽之內遂至交鋒方等身遇亂兵斃於行陣殞於吳局方此非冤聞問號怛惟增摧憤念以兼悼當何可稱吾在州所居遙隔雖知其狀未喻所然及屆此藩備加覿訪咸云譽應接多替兵糧閉壅弟教亦不悛故興師以伐譽未識大體意斷所行雖存急難豈知竊思不能禮爭復以兵來蕭牆興變體親成敵一朝至此能不嗚呼既有書問雲雨傳流噂𠴲其閒委悉無因詳究方今社稷危恥創巨痛深人非禽蟲在知君父即日大敵猶強天讎未雪余爾昆季在外三人如不匡難安用臣子唯應剖心嘗膽泣血枕戈感誓蒼穹憑靈宗祀晝謀夕計共思康復至於其餘小忿或宜寬貸誠復子憾須臾將柰國冤未逞正當輕重相推小大易奪遣無益之情割下流之悼弘豁以理通識勉之今已喪鍾山復誅猶子將非揚湯止沸吞水療寒若以譽之無道近遠同疾弟復效尤攸非獨罪幸寬於眾議忍以事寍如使外寇未除家禍仍構料今訪古未或弗亡夫征戰之理義在克勝至於骨肉之戰愈勝愈酷捷則非功敗則有喪勞兵損義虧失多矣侯景之軍所以未窺江外者正為藩屏盤固宗鎮強密若自相魚肉是代景行師景便不勞兵力坐致成效醜徒聞此何快如之又莊鐵小豎作亂久挾觀寍懷安二侯以為名號當陽有事充製殊廢備境第聞征伐復致分兵便是自於瓜州至於湘雍莫非戰地悉以勞師侯景卒承虛藉亹浮江豕突豈不表裏成虞首尾難救可為寒心其事已切弟若苦陷洞庭兵戈不戢雍川疑迫何以自安必引進魏軍以求形援侯景事等內癰西秦外同瘤腫直置關中已為咽氣況復貪狼難測勢必侵吞弟若不安家國去矣吾非有深鑒獨能弘理正是採藉風謠博參物論咸以為疑皆欲解體故耳自我國五十許年恩格玄穹德彌赤縣雖有逆難未亂邕熙溥天率土忠臣憤慨比屋罹禍忠義奮發無不抱甲負戈衝冠裂眥咸欲剚刃於侯景腹中所須兵主唱耳今人皆樂死赴者如流弟英略振遠雄伯當代唯德唯蓺資文資武拯溺濟難朝野咸屬一匡九合非弟而誰豈得自違物望致招群讟其閒患難具如所陳斯理皎然無勞請箸驗之以實寧須確引吾所以曰閒關險道出自東川政謂上游諸藩必連師狎至庶以殘命預在行閒及到九江安北兄遂泝流更上全由餼饋懸斷卒食半菽阻以菜色無因進取侯景方延假息復緩誅刑信增號憤啟處無地計瀟湘穀粟猶當紅委若阻弟嚴兵唯事交切至於運轉恐無暇發遣即日萬心慊望唯在民天若遂等西河時事殆矣必希令弟豁照茲途解汨川之圍存社稷之計使其運輸糧儲應贍軍旅庶叶力一舉指日寧泰宗廟重安天下清復推弟之功豈非幸甚吾才懦兵寡安能為役所寄令弟庶得申情朝聞夕死萬殞何恨聊陳聞見幸無怪焉臨紙號迷諸失次緒梁書邵陵王綸傳又蓺文類聚載此有刪節未可互補今別載于後先朝聖德治天下九親維睦四表無怨誠為國政實亦家風弟弘識遠鑒無俟傍說事重情切不能默已勞兵損義虧失多矣可謂吞冰療寒揚湯止沸侯景所以未敢窺兵江外正為蕃屏盤固宗鎮強密若自相魚肉是為代景行師昔廉藺二虎且猶不鬭況弟與湘雍方須叶力唯親惟急萬倍於斯同怨同恥尢甚昔事豈得各恣目前不思久遠安臥積薪日待焚熾狂夫尚猶阻之智者反致其惑所冀聽識一聞斯悟蓺文類聚二十五揚州僧正智寂法師墓志銘緣城虛假欲海漂深三相難久八風易侵實惟上德為龍為光凝情內瑩被采外揚微言折角精義解頤有同商生譬彼名翳妙法方永慧水停滋五通軫慕四眾增悲蓺文類聚七十七隱居貞白先生陶君碑夫夜光結綠非胠篋之恆珍逸羽翔鱗豈園池之近玩寧期心於遠大蓋不知其所以然也是以潁陽高蹈洗耳於唐朝漢陰貞栖滅迹於周代盛德風流有自來矣應期而曜質者其在茲乎先生名弘景字通明本冀州平陽人也其先自帝堯陶唐氏之後胤堯治冀州平陽故因居止龍馬見五色之符欽明表八彩之瑞光宅於天下允釐於庶職洪源敻遠系緒綿長漢興陶舍為高祖右司馬子青翟位至丞相後至漢末南渡始居丹陽七世祖濬仕吳為鎮南將軍荊州刺史祖降宋南中郎參軍事父貞寶可徒建安王國侍郎並立履清約博涉文史先生含元精之和氣蓄陵飆之雅姿兼宣七善總脩九德行仁蹈義嶽峙淵渟牆仞無以覩清濁不能測道風與星漢同高勝氣與煙霞共遠六歲便解書能屬文七歲讀孝經毛詩論語數萬言曼倩幼習典墳公幹少誦詩賦方之於古彼有多慚是以岐嶷流聲黃中著稱有鄉人得葛洪神仙傳見淮南八公諸仙事乃歎曰讀此書便使人有淩雲之氣於是寢興諷誦晨夜不輟年二十七為宜都王侍讀總知管記事牓道求賢焚林招士朝難其選是曰得人阮瑀之書記不足扶衡孫楚之才辭何以捧轂齊代好治宮室方脩苑囿青溪舊觀便就起築仍奏表上頌辭事兼美邁彼樂職之篇踰乎景福之製帝省覽久之益以為善除奉朝請恪居官次夙夜惟寅春朝秋請是棫樸者也先生本不希榮常欲辭退乃與親友書曰疇昔之意不願處人閒年登四十志畢山藪今三十六矣時不我借知幾其神乎無為自苦明年遂拜表解職抽簪東都之外解組北山之陽同稷丘之栖真慕留侯之卻粒便具舟楫永言東邁朝廷錫問時賢餞別祖以二疏招茲四皓超然輕舉異世同符爾乃杖策孤征游踐山嶽既而到于句容登於茅嶺以此地神仙之宮府靈異之栖託往不能返遂卜居焉先生曰夫子云隱居以求其志行義以達其道吾聞其語未見其人我今義通無復其一請同求志之業故自稱隱居亦猶稚川之抱朴士安之玄晏倚巖栖隱依林遁跡交柯結宇剗徑為門懸崖對溜悲吟灌木深壑絕峭組織煙霞枕石漱流水禽無撓採藥耦耕野獸不亂逍遙閒曠放浪陵山嗒然若喪確乎難拔屬齊末道消天命既否水鬭穀洛地震由辰先生靜思冥數預識微兆於是近遠書問悉皆杜絕昔乃聞之夏甫今則見之先生我大梁休運應期受天明命三辰開朗四海寧諠先生奉表稱慶於是信問復通天監以來常有敕旨供給藥餌不乏歲時渥澤湛恩莫之與比先生七年暫游南嶽茲山也譬閬風之地軸若崑陵之天鎮八桂傍臨九純閒設樹有琅玕草生車騎遺世獨往是用忘歸一十年有敕遣左右司徒惠明徵還先生茅山別給廨宇軒后之降精天老漢帝之致禮河宗況於茲日弗能尚也養志山阿多歷年所攝生既善冥祥亦降猛獸不據魑魅莫逢庭無荊棘遠同闕里階吐神泉逕動疏勒於是羽人徘徊仙客上下鸞鳳游集芝英豐潤大造佛像爰及寫經起塔招僧備諸供養自誓道場受菩薩法夢登七地又得嘉名具以啟間蒙敕許可葛玄之夢見開士朱鸞之遠望尊儀何以擬茲通感匹此徵應以大同三年歲次景辰三月壬寅朔十二日癸丑告別年化春秋八十有一天子嗟惜儲皇軫悼有詔稱譽追贈中散大夫諡曰貞白先生禮也以其月十四日窆于丹陽郡句容縣雷平山若軒轅之葬衣冠如王喬之藏劍舄化於茲日可得偶焉先生器宇凝深思識精贍含章貞吉不脩廉隅年將中壽匪踰於矩眉目疏朗儀貌鮮潔實亡勸沮多行德惠恡惜光景愛好墳籍篤志勵節白首彌至若乃淮南鴻寶之訣隴西地動之儀太一遁甲之書九章厤象之術幼女銀鉤之敏允南風角之妙太倉素問之方中散琴操之法咸悉搜求莫不精詣爰及卞射荀棊蘇卜管筮一見便曉皆不用心張華之博物馬鈞之巧思劉向之知微葛洪之養性兼此數賢一人而已門人恆法闓等慕遙風於緱氏繪遺像於橋陽勒玄碑而相質騰絳霄之流芳乃為銘曰留舄表化棄劍凝神徘徊紫氣照耀丹鱗厥跡猶在餘風可遵誰其嗣此淵哉淑人高行邁種盛德日新朗猶懸鏡鬱似貞筠身以弘道行不違仁昔游纓綬頡頏搢紳厭乎匡救勞彼問津亦既解組乃襲山巾遠尋丘壑高蹈風塵情無緬世隱不隔真結宇依巖貞棲茂草水玉留年華精卻老乃有令問兼斯壽考泉過危庭峰臨窈洞露凝蘭階雲生桂棟日斜欄席花落窗甕尚平未反王孫不旋海桑交易陵谷貿遷豐碑有樹遺烈無騫文苑英華八百七十三又略見蓺文類聚三十七祀魯山神文敬奠魯君之靈竊以首山鬱律表二叔之清風趙國隱淪擅三公之靈迹北坂祠城流光夜起東嶺叢室甘雨晝零故能徵應不褰介福無爽金壇玉宇是眾妙之遊遨丹崖翠幄信靈人之響像霓裳孔蓋轉日車而競前駕象垂豹載靈旗而總集江妃漢女含睇來趨湘娥洛嬪宜言在側鳴璆撫劍俠席徘徊絳節陳竿滿堂繁會奠椒懷糈之歡傳卮代舞之樂桂醑溢於羽樽蕙肴盈於蘭藉既醉既飽景福攸同不震不騰神保是格炰胾之薦已畢慶報之澤攸先願化昌而俗阜俾多祐之在旃同匪石之無轉欣滯穗之有年惟東皇兮戾止等南山而不騫蓺文類聚七十九偽為討侯景啟侯景未平急宜征討已聞荊州鎮為景所滅疾下天軍南史五十三武陵王紀傳與湘東王啟昔申生不愛其死方等豈顧其生梁書世祖二子傳散逸論人生處世如白駒過隙耳一壺之酒足以養性一簞之食足以怡形生在蓬蒿死葬溝壑瓦棺石槨何以異茲吾嘗夢為魚因化為烏當其夢也何樂如之及其覺也何憂斯類良由吾之不及魚鳥者遠矣故魚鳥飛浮任其志性吾之進退恆存掌握舉手懼觸搖足死墮若使吾終得與魚鳥同遊則去人閒如脫屣耳梁書世祖二子傳
