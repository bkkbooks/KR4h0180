body:
  text: 元帝春賦洛陽小苑之西長安大道之東苔染池而盡緑桃含山而併紅露沾枝而重葉網縈花而曳風初學記三玄覽賦歲次旃蒙月建司空變淩陰之呂扇廣莫之風蕭子褰帷九水作牧三宮乃盱衡而言曰惟天惟大惟堯則之惟地惟厚惟王國之粵我皇之握鏡實乃神而乃聖陳六聯於八則弘九職於三令運璇樞而御宇執玉衡而齊政大矣廣矣無德而稱俯齱齵於軒羲諒斗筲於子姒包河圖與洛書括龍官乎鳳紀超大德於百王高鴻名於萬祀惟天縱於副后踰啓誦而惟首既倫儒於肅成復斷獄於長壽豈止丕莊屈膝將令班鄭捧帚譬衢樽而待酌若懸鍾之須扣前踰繫象之外聲高洙泗之右伊俯己之顓愚謬聯萼於天衢筮東門而畫野創南國而分墟詔伯宗以為儐誥內史而策書用分茲於茅社從侯服而俾豫類金獸以封建非桐圭以錫處爾其湘水之東即我龜蒙魏甘露而分邑吳太平而定中鎮麟山之崔嵬傍龍迹其穹窿金城高而相屬石燕起而依風豈連鑣於分陝羡追蹤於二公彼琅臺之作守有彭泗之嘉名殊並海之分地異魚石之所城經沈子之高墉蓋水運之堤封謝禮樂之干櫓閲武騎之輣衝軾錦車而前騖驅魚軒而繼蹤無復鸞歌鳳舞唯對緑柳青松留吳宮之宿燕響平陵之夜鍾飛余轡而西征戍太真之舊營鳴節鼓之金鐲屯戎車於石城戮滔天之封豕斬橫海之長鯨每輟書而歎息景樹德之風聲從王役於鏡中浮文鷁而載鴻經謝亭而帳飲想彥伯之高風度五城而騁望見三冀之無窮故以飛雲蒼隼白鱧青桐金吾舍利鳴鶴紫宮眺方嶽乎雲間望赤坂之珠殷想真長之送別懷思曠之還山此檜楫而方遠彼松舟而未間倦旅泊於新丘同渭水之不流或千人而並唱乍萬人而相鉤毀橋由於瑗度鑿空資於仲謀睇三茅之靈祕懷九轉之仙記紫臺石室之文青首銀函之字獨有披霧之心彌軫淩雲之志捫殷碑之愴望挹延州之高讓井觱沸而蜿蟺勢崎嶇而低昂見傳巴之度曲開安歌之浩唱想觀樂乎朝陽憶紆衣乎夕張回途舲之美風聳余棹乎雲陽彼桑梓之必敬況松榆之舊鄉將遊目於五湖乃浩覽於姑蘇臨閶門之跨水聳重闕而開都睇太伯之卜祀爰避國於句吳去西滸之樂政尊東夷之楷模時渡谷水之陽尚想嘉禾之方壯慶亭於吳后雄檇李於越王觀泉亭之涌波崖巍巍而峨峨張素蓋而縈州嶼馳白馬而越江沱鼓洪濤於萬里曾未動於纖羅及戾止乎東甌登玉笥與銅牛山東武而遙集雁南海而飛浮巖亭亭其似蓋氣苕苕其若樓登舜橋而延首瞰禹井而淹留御史之狀猶在督護之門不修雖濫同於借寇愧人瘼之何求皇覽揆余之忠誠詔入謁於承明既攝州於淮海且作尹乎中京慕張生之謫伏挹邊延之勵精珥金貂而待問鳴玉佩而趨庭兼三河及三輔總九緯乎九經揚王庭之俊選聞褎然於前則時濫假於中台掌邦教之觀國乍南宮而薦士且右鄉而表德判辟雍之樂語辨金馬之儒墨驅安居以騁望壯天居之麗極詳夫皇王爰處本無定所堯都平陽舜在冀方玄王居亳成周卜洛故知黃旗紫蓋域中為大天地之所合風雨之所會蔭美氣之蔥蔥浮卿雲之靄靄聳梁山而成闕縈長淮而似帶昔者甘泉暉章平樂未央淩霄飛雨麒麟鳳凰九華仁壽百福明光玉階紫闈雕柱錦牆木蘭為棟文杏為梁溫臺冬燠秋窗夏涼甲乙之帳庚辛之方未有祗園之右齊之仁壽用擬舟航長為稱首日殿月宮金池珠叢七重迢遞千柱玲瓏虹橋左跨雁苑南通紫紺之堂臨水青蓮之臺帶風及夫皎光未旭更籌曙促猶然陽燧之火尚執驪龍之燭或帶桃花之綬乍響玄山之玉爰八命而建旟誠非親而勿居應鳴鞞於龍角覆緹幕於熊車開轅門於淮渚泛艅皇之容與吟紫騮之長歌奏玄雲之疊鼓開右座而納文設左廣而投武既風起而雲飛復摧班而拉虎泛樓船而鬱紆憶霸楚之雄圖悲騅馬之不逝忘鹿逐之長驅豈烏江之天險資赤帝之神符於是途經灌壘水分當利彼吾王之連和延魏后之交質趙將軍之建節辛侍中之奉使亮鼎足其何言限修江而為二泊九井而問津蓋六服之都會方函谷之設險譬魯陽之襟帶觀棄繻之裂帛見高車之輔軑顧濡須之故巘每當食而忘飯鬭二虎於江干爭兩龍於修坂既凱捷而來旋遂鳴鐃而獨返彼銅山之可傷何驕容之無方已築長洲之苑復實海陵之倉遂稱兵而內侮宜朝起而夕亡原西陵以肇基始衝梯於士治載為前茅之首實表勤王之師同薏苡之興謗成貝錦之深疑良弓藏而高鳥盡入不謙而出不辭遊雷中而徜徉遇日吉而辰良祀公瑾以桂酒薦忠肅以椒漿賓討曹之英策蓋謀桓之祕方衣披披而屢舞神欣欣而樂康弔劉安於下雉聊載懷於惇吏或策杖而龍飛或叱石而羊起將雞鳴於天上遂埋魂於蒿里匪仙道之云偽蓋為仁其由己經釣臺而高邁過鄂渚而西浮變青門之三襲為黃塵之一丘城逶迆而中斷階坡陀而半留分沙羡而啓鎮即開蕃於夏州星尚連於翼軫舍兼分於斗牛麗滄浪之水清良信美乎濯纓嗟其釣而非釣復何慮而何營羌有願而不獲拂蘭橈而上征冬已謝而春辭聊方舟而水嬉看白沙而似雪望卻月而成眉臨石渚其如鏡玩弱柳其猶絲停赤壁而延佇聊愴望而方思吳水鄉之舟楫魏陸産之皋貔本吳長而魏短況地利與天時結憤風而炎上潦原火於驚颸灰霧霏而擊馬箭參差而麗龜成班車之逸氣碎當途於鹿麋分洞庭於吳上限東益於巴丘如淄澠之相別似涇渭之分流雖滔滔而直瀉終耿耿而橫浮想蘭香之薦枕懷娥媓之夜遊若夫子瑜設險之記閻遨遊湧之地既下車而踐境早詢求於方志曉泊鬻拳之津夕瞻荒谷之寺居柳下而布德坐棠陰而高視班六條於宰邑賢十部於從事每題輿於仲舉豈虛名乎叔治藉務隙於登臨乃紛吾之本志時復設羽蓋揚旌旆乘雕玉從貝帶浮雲起登高唐泛枉渚望涔陽荊棘生於龍門之下狐兔穴於馬牧之旁臨章華而流眄見舊楚之悽涼試極目乎千里何春心之可傷其舊渚宮也夾江帶阡布濩井田通逵交迸高門接連人要水心之劍家給火耕之田既追隨而得性實燕處而超然若平臺之中觀閣相通雄梁渡水壯翼臨空金堤之路銅鞮之宮閣寫陵霄樓布麗譙橫走馬而為觀擬牽牛而作橋爾乃樹之榛栗椅桐梓漆三色黃甘千戶朱橘桃蔭井而成蹊萍浮江而泛實蟬鳴枝而候稻范飛冠而吐蜜復有水底石髮山筋地骨書帶新抽屏風牙發反魂長生靈壽女貞金鹽玉豉堯韭舜榮交讓之目代謝之名忘憂長樂桃杷鼓箏竹則篔簹緑簏交戰策皮淚沾虞后龍還葛陂便娟防露檀欒夾池聊右書而左琴且繼踵於華陰彼門人之問道各家求而有心先鉛擲於魚魯乃紛定於陶陰識三家之云謬知五門之可尋時仰稟於皇猷討巴濮於裨鯈乃稜威於華墨出車檻之云修觀月窟之入附覩日勒之來遊既虎牙而成號又龍額而為侯仰皇德之洪深疑朱離於侏任見白題之踏鼓看烏孫之學瑟獻挂條之良賮奉桃枝之怪琛嗤聚米於馬援哂畫地於臧旻彼蠢爾之為鯁伊憑凌而未靜異黃金於黑山非緑林於青嶺余喟然以指蹤實濟寬而持猛負步光之文劍驚漢陽之夕景麾靈琚之左轉光玳簪而右篸白雲生而陳合紅塵起而軍暗於是驅驌驦命蹶張回翠蓋之金爪臨絳宮之玉堂擬都護之戊己模荊尸之甲裳作齊軍之減竈斆燕師之臥牆觀田畯於虞澤命車右而前驅猶從戎於細柳若驅馬於長榆矜猿鳴之抱木傷兔走之依株每愀然而作色方載馳而轉軾閲放麑而興憫對亂鱗而動惻矧高宴於城隅駐五馬而踟蹰乃有青琴碧玉絳樹緑珠西河王豹東野綿駒蘭缸夕然合璧斜天照流風之回雪映出水之初蓮非吾心之所悅曾未始而流連濫叨榮於分陝踰一紀之星躔子既生而冠字嗟留滯以回邅罷臨邊之瑞節觀楚黎之臥轍向秋野之蒼茫對寒江之幽咽散歸雲之鬱蓊吐長風之飉𩗭聞羌笛之哀怨聽胡笳之悽切慘余袂兮淚成行攀余轅兮不忍別奉信圭而入朝驅駟馬而乘軺既總司於戎旅亦兼飾於豐貂登贙踞而目極忽平原之已超帶方逵之九軌接馳道之三條彼重門之擊柝馮霞起以建標雜丹樓以藻井間青山於綺寮耆落星之嵸巃覩霩火之迢繞鬱如蓬萊之臨滄海憬如崑崙之出絳霄函夏之所覿江漢之所朝若夫天不愛道地不愛寶賓連紫達華平朱草麒麟五色飛兔雙翼集我君圃之旁遊我帝梧之側於斯時也天子郊禘於員丘高玉簡於東漢邁金版於西周奏蒼璧而服大裘樂有雲翹之舞牲非繭栗之牛設黃琮而禮地望方澤乎神州節會咸池之琯冕無繁露之旒觀三農乎九穀薦黍稷之穜稑命甸師而清塵詔封人而出宿敬青壇而致虞動翠耜而祈穀時季春之上巳臨祓褉乎沼沚杏花發於露寒棘實浮於濛泛爰長久之御節採日精於山趾天策夜而動星鉤陳朝而按軌豫是時也陪玉軑飾金羈驅騄駬曜翠羆乘倜儻控權奇寶劍昭晰綵䩸陸離乍俯馬足時仰月支見靈烏之占巽觀司南之候離習執鞭而珥筆雖日夕而忘疲奧重明堂地景已乎正陽乃八窗而四達開上員而下方置陰鑒之明水設圭瓚而盈觴誶天官乎冢宰服端委而辨方虔植物之蘊藻鄙將饗之牛羊藉鴻私而置傳復惟轂而懷方泝蛟川於匯澤沿鵠塞於潯陽何蠡川之浩浩而匡岫之蒼蒼其匡岫也盤紆崷崒嶾嶙鬱律峻極于天干霄秀出岑嶔崎巇烏兔蔽虧㟏岈豁闓背原面野噴飛流於天末鼓雷霆於巖下聳高館於雲中聯藂祠於星社雕甍綺閣吁可畏其欲落雲霧杳冥縈萬嶺而俱青照曜山莊岧嶢石梁雁門餘帳隆安故床鏡臨江而分影爐銜花而共香若乃羽族徘徊察風應雷鴛鴦感夢乾鵲知來露華挾雌而嘯侶銜環帶壟而含猜孔接影而颻揚鸓交頸而陪鰓爾其彭蠡際天用長百川沸渭渝溢瀲淡連延大則浩汗滉漾細則澆灌潺湲遇祈飆之弗爽彼所報之無愆且摶搖以九萬乍高風而三千其中則有瀺灂嘉魚燕羽龍鬚戴星含石蒲身雉軀乍浮圓鏡時泛明珠報蕩子之長信送仙人之短書恥觀魚而為樂解舒鴈於高繳必冀孔愈之龜當如噲參之鶴愾衝冠而發憤嗟吾人之施薄觀進退於我生每篤靖而居貞羞為金谷之富不矯石閭之清每鞠躬而遵節藉王道之既平貴靜者人所便豫得之於自然非三百之不足惜五十於豐年笑汙斜之行潦喜甘雨於石田飛新梅於倡粉拂輕絮於房綿月芝抽而曉落燈花開而夜然菊從風而金散荷帶水而珠員已寤歌於折柳復行吟而採蓮課七分與六日推兩地與參天夕章程而鉤股亦剡注而參連幼墳藉以自娛迄方今而不渝雲氣芝英之簡懸針倒薤之書緘乎蒸栗之帙飾乎酸棗之珠擬河獻之留真希淳儒之席珍笑彭聃之下士聊重義而自欣鑿戶牖而長望混木鴈而兼陳嗟今來而古往方絶筆於獲麟文苑英華一百二十六又見藝文類聚二十六有刪節言志賦天文既表人文可觀知負扆之來易信握鏡之云難差立極而補天驗璧合而珠連有庖羲之八索稱朱襄之五絃聞夏王之鑄鼎重農黃之播田雖車軌之未同亶彌愧於棟隆戮封豕於海內斬長狄於區中懷宿昔之璵璠並來遊於菟園悲元瑜之已逝歎靈光之獨存想延賓於北閣因置酒於南軒聞鶯鳴而懷友聽長笛其何言夙有尚於清靜叨再入於鄢郢東窺文命之穴南望鴻崖之井遂撫運而登庸謬垂旒而卷領雖有愧於前英每求衣於未明召司烜而照夜觀執圭而滿庭誠雖休以勿休實旨酒之忘憂絶何楊之妙舞廢綿駒之善謳彼知止與知足復何營而何欲柱何用於黃金案寧勞於青玉爾乃高步北園用蕩囂煩桂偃蹇而臨棟石穹隆而架門對灌木之修聳觀激水之飛奔澗不風而自響天無雲而晝昏聞賓鴻之夜飛想過沛而霑衣況登樓而作賦望懷海而思歸藝文類聚二十六蕩婦秋思賦蕩子之別十年倡婦之居自憐登樓一望唯見遠樹含煙平原如此不知道路幾千天與水兮相逼山與雲兮共色山則蒼蒼入漢水則涓涓不測誰復堪見鳥飛悲鳴隻翼秋何月而不清月何秋而不明況乃倡樓蕩婦對此傷情於時露萎庭蕙霜封階砌坐視帶長轉看腰細重以秋水文波秋雲似羅日黯黯而將暮風騷騷而渡河妾怨回文之錦君思出塞之歌相思相望路遠如何鬢飄蓬而漸亂心懷愁而轉歎愁縈翠眉斂啼多紅粉漫已矣哉秋風起兮秋葉飛春花落兮春日暉春日遲遲猶可至客子行行終不歸藝文類聚三十二對燭賦月似金波初映空雲如玉葉半從風恨九重兮夕掩怨三秋兮不同爾乃傳芳醁揚清曲長袖留賓待華燭燭燼落燭華明花抽珠漸落珠懸花更生風來香轉散風度焰還輕本知龍燭應無偶復訝魚燈有舊名燭火燈光一雙炷詎照誰人兩處情藝文類聚八十採蓮賦紫莖兮文波紅蓮兮芰荷緑房兮翠蓋素實兮黃螺於時妖童媛女蕩舟心許鷁首徐回兼傳羽杯棹將移而藻挂船欲動而萍開爾其纖腰束素遷延顧步夏始春餘葉嫩花初恐沾裳而淺笑畏傾船而斂裾故以水濺蘭橈蘆侵羅菊澤未反梧臺迥見荇溼霑衫菱長繞釧泛柏舟而容與歌採蓮於枉渚歌曰碧玉小家女來嫁汝南王蓮花亂臉色荷葉雜衣香因持薦君子願襲芙蓉裳藝文類聚八十二鴛鴦賦青田之鶴晝夜俱飛日南之鴈從來共歸雙飛兮不息自憐兮何極一別兮經年相去兮幾千雄飛入玄兔雌去往朱鳶豈如鴛鴦相逐俱棲俱宿勝林鳥之同心邁池魚之比目朝浮兮浪華夜集兮江沙萍隨流而傅岸網因風而綴花見虹梁之春色復相鳴而戢翼蘭渚兮相依同盛兮同衰魂上相思之樹文生新市之機金雞玉鵲不成群紫鶴紅雉一生分願學鴛鴦鳥連翩恆逐君藝文類聚九十二秋風搖落秋風起兮寒鴈歸寒蟬鳴兮秋草腓萍青兮水徹葉落兮林稀翠為蓋兮玳為席蘭為室兮金作扉水周兮曲堂花交兮洞房樹參差兮稍密紫荷紛披兮疏且黃雙飛兮翡翠並泳兮鴛鴦神女雲兮初度雨班妾扇兮始藏光且淹留兮日云暮對華燭兮歡未央文苑英華三百五十八又藝文類聚五十六引首四語
