body:
  text: 釋明徹將卒上武帝表告辭因果深明倚伏寄逭明徹雖復愚短忝窺至籍將謝之間豈復遺吝但知恩知慶輒欲言之明徹本出東荒賤民而巳微有善識得廁釋門契闊少年綢繆元覺雖未能體道微得善性運來不輟遇會昌時遂親奉御筵提攜法席且仁訓備沐恩獎恆願舒展丹誠奉揚慈化豈意報窮便歸塵土仰戀聖世何可而言特願陛下永劫永住益蔭無涯具足莊嚴道場訓物天垂海外同為淨土勝果遐流雍容遠集明徹以奉值之慶論道之善脫億代還生猶冀奉覲惟生惟死俱希濟拔臨盡之間匆匆如夢雖欲申心心何肯盡不勝悲哀之誠謹遣表以聞續高僧傳八經律異相序如來應迹投緣隨機闡教兼被龍鬼匪直天人化啓憍陳道終須跋文積巨萬簡纍大千自西徂東羌難得而究也若乃劉向校書玄言久蘊漢明感夢靈證彌彰自茲厥後翻譯相繼三藏奧典雖已略周九部雜言通未區集皇帝同契等覺比德遍知大弘經教並利法俗廣延博古旁采遺文于是散偈流章往往復出今之所獲蓋亦多矣聖旨以為像正浸末信樂彌衰文句浩漫鮮能該洽以天監七年敕釋僧旻等備鈔衆典顯證深文控會神宗辭略意曉于鑽求者已有太半之益但希有異相猶散衆篇難聞祕説未加標顯又以十五年敕寶唱鈔經律要事皆使以類相從令覽者易了又敕新安寺釋曾豪興皇寺釋法生等相助檢讀于是博綜經籍搜采祕要上詢宸慮取則成規凡為五十卷又目録五卷分為五帙名為經律異相將來學者可不勞而博矣釋藏路一名僧傳序夫深求寂滅者在于視聽之表考乎心行者彌須丹青之工是知萬象森羅立言之不可以已者也大梁之有天下也威加赤縣功濟蒼生皇上化範九疇神遊八正頂戴法橋服膺甘露竊以外典鴻文布在方册九品六藝尺寸罔遺而沙門淨行獨無紀述玄宗敏德名絶終古擁歎長懷靡茲永歲律師僧祐道心貞固高行超邈著述諸紀振發弘要寶唱不敏預班二落禮誦餘日捃拾遺漏釋藏轂一續高僧傳一名僧傳後序豈敢為僧之董狐庶無曲筆耳同上比丘尼傳序原夫貞心亢志奇操異節豈唯體率由于天真抑亦勵景行于仰止故曰希顏之士亦顏之儔慕驥之馬亦驥之乘斯則風列英徽流芳不絶者也是以握筆懷鉛之客將以語厥方來比事記言之士庶其勸誡後世故雖欲忘言斯不可已也昔大覺應乎羅衛佛日顯于閻浮三界歸依四生向慕比丘尼之興發源于愛道登地證果仍世不絶列之法藏如日經天自拘尸滅影雙樹匿迹歲曆蟬聯陵夷訛紊于是時澆信謗人或存亡微言興而復廢者不肖亂之也正法替而復隆者賢達維之也像法東流淨檢為首綿載數百碩德係興善妙淨圭窮苦行之節法辨僧果盡禪觀之妙至若僧端僧基之立志貞固妙相法令之弘震曠遠若此之流往往間出並淵深嶽歭金聲玉雲實惟菽葉之貞幹季緒之四依也夫年代推移清規稍遠英風將範于千載志事未集乎方册每懷慨歎其歲久矣始乃博采碑頌廣搜記集或訊之傳聞或訪之故老詮敘始終為之立傳起晉咸和訖梁普通凡六十五人不尚繁華務存要實庶乎求解脫者勉思齊之德而寡見庸疏或有遺漏博雅君子針其闕焉釋藏功五上昭明太子啓請開講釋法雲啓殿下以生知上識精義入神自然勝辨妙談出俗每一往復闔筵心醉真令諸天讚善實使釋梵雨華貧道雖幼知向方而長無成業簉之濫吹聖明而識塹無退者豈不願餐幽致敢祈仰者誠在希聞妙説今猥蒙啓旨未許群情退思輕脫用深悚懼渴仰有實飢虛非假循思檢願重以祈聞惟希甘露當開用得永祛鄙吝伏願四弘本誓曲允三請殷勤謹啓廣宏明集二十一奉敕難范縝神滅論與王公朝貴書主上答臣下審神滅論今遣相呈夫神妙寂寥可知而不可説義經丘而未曉理涉旦而猶昏主上凝天照本襲道赴機垂答臣下旨訓周密孝享之禮既彰桀懷曾史之慕三世之言復闡紂協波崙之情預非草木誰不歌歎希同挹風猷共加弘讚也釋法雲呈宏明集十續高僧傳六上昭明太子啓請開講釋法雲啓殿下以生知上識精義入神自然勝辨妙談出俗每一往復闔筵心醉真令諸天讚善實使釋梵雨華貧道雖幼知向方而長無成業簉之濫吹聖明而識慚無退者豈不願餐幽致敢祈仰者誠在希聞妙説今猥蒙答旨未許群情退思輕脫用深悚懼渴仰有實飢虛非假循思檢願重以祈聞唯希甘露當開用得永祛鄙吝伏願四宏本誓曲允三請殷勤謹啓廣宏明二十一奉敕答神滅論與沈約書主上答臣下審神滅論今遣相呈夫神妙寂寥可知而不可説義經丘而未曉理涉旦而猶昏至上凝天照本襲道赴機垂答臣下旨訓周密孝享之禮既彰桀懷曾史之慕三世之言復闡紂惙彼論之情預非草木誰不歔欷同挹風猷共加宏贊也續高僧傳六辭會啓夙昔顧省心或不調欲依佛一語于空間自制而從緣流二十餘載在乎少壯故可推斥今既老病身心俱減若復退一毫便不堪自課故願言靜處少自榮衛非敢傲世求名從間自誕特是常人近情懼前途之已迫耳續高僧傳六釋三破論論曰泥洹是死未見學死而得長生此滅種之化也釋曰夫生生之厚至于無生則張毅單豹之徒是其匹矣是以儒家云人莫不愛其死而患其生老氏云及吾無身吾有何患莊周亦自病痛其一身此三者聖達之流叵以生為患夫欲求無生莫若泥洹泥洹者無為之妙稱談其迹也則有王宮雙樹之文語其實也則有常住常樂之説子方輪回五道何由聞涅槃之要或有三盲摸象得象耳者爭云象如簸箕得象鼻者爭云象如春杵雖獲象一方終不得全象之實子説泥洹是死真摸象之一盲矣論云太子不廢妻使人斷種釋曰夫聖實湛然迹有表應太子納妃于儲二者蓋欲示人倫之道已足遂能棄茲大寶忽彼恩愛耳至如諸天夕降白驥飛城十號之理斯在何妻子之可有哉且世之孥孺為纍最深飢寒則生于盜賊飽暖則發于驕奢是以厲婦夕産忽求火照唯恐似己復更為厲凡夫之種若厲産焉經云一切衆生皆有佛性仰尋此旨則是佛種捨家從道棄厲就佛為樂為利寧復是加子迷于俗韻滯于重惑夢中之夢何當曉哉論云太子不剃頭使人落髮釋曰在家則有二親之愛出家則有嚴師之重論其愛也髮膚為上稱其嚴也翦落為難所以就剃除而歡若辭父母而長往者蓋欲去此煩惱即彼無為髮膚之戀尚或可棄外物之徒有何可惜哉不輕髮膚何以遵道不辭天屬何用嚴師譬如喪服出紹大宗則降其本生隆其所後將使此子執人宗廟之重割其歸顧之情還本政自一期非恩之薄所後頓伸三年實義之厚禮記云出必降者有愛我而厚其例矣經云諸天奉刀持髮上天不剃之談是何言也子但勇于穿鑿怯于尋旨相為慨然論云子先出家母後作尼則敬其子失禮之甚釋曰出家之人尊師重法棄俗從道寧可一概而求且太子就學父王致敬漢祖善嘉令之言以太皇為臣魏之高貴敬齊王作私晉之儲后臣厥父于公庭引此而判則非疑矣論云剃頭為浮圖釋曰經云浮圖者聖瑞靈圖浮海而至故云浮圖也吳中石佛泛海倏來即其事矣今子毀圖像之圖為刑屠之屠則泰伯端委而治故無慚德仲雍翦髮文身從容致化遭子今日必羅吠聲之尤事有似而非非而似者外書以仲尼為聖人內經云尼者女也或有謂仲尼為女子子豈信之哉猶如屠圖之相類亦何以殊論云喪門者死滅之門也釋曰門者本也明理之所出入出入從本而興焉釋氏有不二法門老子有衆妙之門書云禍福無門皆是會通之林藪機妙之淵宅出家之人得其義矣喪者滅也滅塵之勞通神之解即喪門也桑當為乘字之誤耳乘門者即大乘門也煩想既滅遇物斯乘故先云滅門末云乘門焉且八萬四千皆稱法門奚獨喪桑二門哉論云故人不信虛無老子入關故作形像之化也釋曰原夫形像始立非為教本意當由滅度之後係戀罔已檀香像亦有明文且仲尼既卒三千之徒永言興慕以有若之貌最似夫子坐之講堂之上令其説法門徒咨仰與往日不殊曾參勃然而言曰子起此非子之座推此而談思仰可知也羅什法師生自殊方聰敏淵博善談法相襁負佛經流布關輔詮以真容二名驗以境照雙寂振無為之高風激玄流于未悟所謂遣之至于無遣也子謂故人不信虛無誠非篤論君子且強理有優劣不係形像子以形像而語不亦攻乎異端論云剃頭本不求佛為服凶胡今中國人士不以正神自訓而取頑胡之法釋曰夫六戎五狄四夷八蠻不識王化不聞佛法者譬如畜生事均八難方今聖主隆三五之治闡一乘之法天人同慶四海欣欣蚑行喙息咸受其賴喘嚅之蟲自云得所子脫不自思厝言云云宜急緘其舌亦何勞提耳論云沙門者沙汰之謂也釋曰息心達源號曰沙門此則練神濯穢反流歸潔即沙汰之謂也子欲毀之而義逾美真可仰之彌高鑽之彌堅者也論云入國破國釋曰夫聖必緣感無往非應結繩以後民澆俗薄末代王教挻揚堯孔至如沙法所沾固助俗為化不待刑戮而自淳無假楚撻而取正石主師澄而興國古王咨勃以隆道破國之文從何取説論云入家破家釋曰釋氏之訓父慈子孝兄愛弟敬夫和妻柔備有六睦之美有何不善而能破家唯聞末學道士有赤章咒咀發擲陰私行壇被髮呼天叩地不問親疏親相厭殺此即破家之法矣論云入身破身釋曰夫身之為纍甚于桎梏老氏以形骸為糞土釋迦以三界為火宅出家之士故宜去奢華棄名利悟逆旅之難常希寂滅之為樂流俗之徒反此以求全即所謂殺生者不死生生者不生也近代有好名道士自云神述過人剋期輕舉白日登天曾末數丈橫墜于地迫而察之正大鳥之雙翼耳真所謂不能奮飛者也驗滅亡于即事不旋踵而受誅漢之張陵誣誷貢高呼曰米賊亦被夷翦入身破身無乃角弓乎論曰歌哭不同者釋曰人哭亦哭俗內之冥迹臨喪能歌方外之坦情原壤喪親登木而歌孔子過而不非者此亦是名教之一方耳論云不朝宗者釋者孔子云儒有上不臣天子下不事公侯儒者俗中之一物尚能若此況沙門者方外之士乎昔伯成子高子州交伯但希玄慕道似不近屑人事論云剃頭犯毀傷釋曰髮膚之解具于前答聊更略而陳之凡言不敢毀傷者正是防其非僻觸冒憲司五刑所加致有殘缺耳今沙門者服膺聖師遠求十地剃除鬚髮被服法衣立身不乖揚名得道還度天屬有何不可而入毀傷之義守文之徒未達文外之旨耳輪扁尚不移術于其兒豫何言哉論云出家者未見君子皆是避役釋曰噫唉何子之難喻邪左傳云言者身之文莊周云言不廣不足以明道余欲無言其可得乎夫出家之士皆靈根宿固德宇淵深湛乎斯照確乎不拔者也是以其神凝其心道超然遐想宇宙不能點其胸懷淡爾無寄塵垢何能攪其方寸割慈親之重恩棄房櫳之歡愛虛室生白守玄行禪或頭陀林野委身餒獸或靜節蔬餐精心無怠將勤求十力超登無上解脫天羅銷散地網兆百福于未萌濟蒼生于萬劫斯實大丈夫之宏圖非吾子所得聞也避役之談是何言歟孔子頨喙三尺者雖言出于口終不以長舌犯人則子之喙三尺矣何多口之為纍傷人之深哉論云三丁二出一何無緣者釋曰無緣即是緣無緣生有緣即是緣有緣起何以知其然邪世有闔門入道故曰緣有緣起有生不識比丘者故曰緣無緣生十六王子同日出家隨父入道是則緣之所牽闔門頓至何其宜出二之有哉無緣者自就無緣中求反諸己而己矣子方永墜無間遑復論此將不欲倒置干戈乎若能返迷殊副所望論云道家之教育德成國者釋曰道有九十六種佛為最尊梵志之徒蓋是培塿假使山川之神能出雲雨者亦是有國有家之所祀焉其云育德成國不無多少但廣濟無邊永拔塗炭我金剛一聖巍巍獨雄夫太極剖判之初已自有佛但于時衆生因緣未動故宜且昧名稱以言之推三皇已上何容都無禮易則乾坤兩卦履豫二爻便當與天地俱生雖曰俱生而名不俱出者良由機感不發施用未形其理常在其迹不著耳中外二聖其揆一也故法行云先遣三賢漸誘俗教後以佛經革邪從正李老之門釋氏之偏裨矣經云處處自説名字不同或為儒林之宗國師道士或寂漠無為而作佛事金口所説合若符契何為東西跳梁不避高下邪嗟乎外道籍我智慧資我神力遂欲撓亂我經文虔劉我教訓人之無良一至于此也論云道者氣釋曰夫道之名以理為用得其理也則于道為備是故沙門號曰道人陽平呼曰道士釋聖得道之宗彭聃居道之末得道宗者不待言道而道自顯居道之末者常稱道而道不足譬如仲尼博學不以一事成名遊夏之徒全以四科見目莊周有云生者氣也聚而為生散而為死就如子言道若是氣便當有聚有散有生有死則子之道是生滅法非常住也嘗聞子道又有合氣之事願子勿言此真辱矣莊子又云道在屎溺此屎溺之道得非吾子合氣之道乎宏明集八高僧傳後記右此傳是會稽嘉祥寺釋慧皎法師所撰法師學通內外精研經律著涅槃疏十卷梵網戒義疏並為世軌又撰此高僧傳及序共十四卷梁末承聖二年太歲癸酉避侯景難來至湓城少時講説甲戌歲二月捨化春秋五十有八江州僧正慧恭為首經營葬于廬山禪閣寺墓時龍光寺釋僧果同避難在山遇見時事聊記之云耳高僧傳大乘起信論序夫起信論者乃是至極大乘甚深祕典開示如理緣起之義其旨淵弘寂而無相其用廣大寬廓無邊與凡聖為依衆法之本以其文深旨遠信者至微故于如來滅後六百餘年諸道亂興魔邪競扇于佛正法毀謗不停時有一高德沙門名曰馬鳴深契大乘窮盡法性大悲內融隨機應現愍物長迷故作斯論盛隆三寶重興佛日起信未久回邪入正使大乘正典復顯于時緣起深理更彰于後代迷群異見者捨執而歸依暗類偏情之黨棄著而臻溱自昔已來久蘊西域無傳東夏者良以宣譯有時故前梁武皇帝遣聘中天竺摩伽陀國取經并諸法師遇值三藏拘蘭難陀譯名真諦其人少小博采備覽諸經然于大乘偏洞深遠時彼國王應即移遣法師苦辭不免便就泛舟與瞿曇及多侍從井送蘇合佛像而至未旬便值侯景侵擾法師秀采擁流含珠未吐慧日暫停而欲還反遂屬值京邑英賢慧顯智韶智愷曇振慧旻與假黃鉞大將軍大保蕭公勃以大梁承聖三年歲次癸酉九月十日于衡州始興郡建興寺敬請法師敷演大乘闡揚祕典示導迷徒遂翻譯斯論一卷以明論旨玄文二十卷大品玄文四卷十二因緣經兩卷九識義章兩卷傳語人天竺國月支首那等執筆人智愷等首尾二年方訖馬鳴沖旨更曜于時邪見之流伏從正化余雖慨不見聖慶遇玄旨美其幽宗戀愛無已不揆無聞聊由題記儻遇智者賜垂改作釋藏邑九合微密持經記合微密持陀鄰尺總持三本佛説無量門微密持經佛説總持經一名成道降魔得一切智此經凡有四本三于並各二名一本三名備如後列其中文句參差或梵或漢音殊或隨義制語各有左右依義順文皆可符同所為異處後列得法利三乘階級人數及動地雨華諸天妓樂供養多不悉備意所未詳一本一名無量門微密之持二名成道降魔得一切智此一本名行于世為常舊本一本一名阿難陀目佉尼阿離陀羅尼二名疾使人民得一切智一本一名無端底門總持之行二名菩薩降郤諸魔堅固于一切智一本一名出生無量門持二名一生補處道行三名成道降魔得一切智此本備明法利及動地妓樂事四本皆各標前一名于經首第二第三名不以題經也後舍利弗請名佛説名皆備如前列出三藏記
