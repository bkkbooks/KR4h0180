body:
  text: 元帝職貢圖贊北通玄菟南漸朱鳶交河悠遠合浦回邅茲海無際陰山接天遐哉鳥穴永矣雞田藝文類聚七十四孝德傳皇王篇贊天子之孝曰聖與仁重瞳表德參漏通神皇矣高祖連鑣舜禹天經地義重規沓矩道踰七十聲超三五藝文類聚二十孝德傳天性篇贊生之育之長之畜之顧我復我答施何時欲報之德不可方思涓塵之孝河海之慈廢書歎息泣下漣洏藝文類聚二十初學記十七忠臣傳記託篇贊太真英挺投袂勤王伯猷蹈節身殞名揚嶷嶷景倩主亡與亡嗟乎尚矣惟國之良藝文類聚二十初學記十七忠臣傳諫爭篇贊子政鏗鏗誠存社稷朱雲折檻遂其婞直藝文類聚二十初學記十七忠臣傳執法篇贊設官分職咸曰師師彼己之子邦之直司豺狼當路安問狐狸昏明有世直道無時藝文類聚二十東宮後堂仙室山銘太華削成本擅奇聲峰如雪委嶺若蓮生雲除紫蓋霞通赤城金壇是籙玉記題名鳳依桐樹鶴聽琴聲殿接南箕橋連北斗秋河從帶春禽銜綬朱鳥安窗青龍作牖藝文類聚七漏刻銘玉衡稱物金壺博施司南司火未符茲義帝曰欽哉納隍斯譬實惟簡在窮神體智宮槐晚合月桂宵暉清臺莫爽解谷胥依七分六日五祀三微事齊幽贊乃會通幾碧海有乾絳川猶竭飛流五色涓涓靡絶龍首傍注仙衣俯裂箭不停晷聲無暫輟用天之貞分地之平如絃斯直如渭斯清藝文類聚六十八香爐銘蘇合氤氳非烟若雲時穠更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薰藝文類聚七十梁安寺剎下銘阿閣峞𡿏洞房䆗窱似靈光之金扇類景福之銀鋪垂琬琰之文璫飾琅玕之仙寶神童戾止亟連翩於威鳳薩埵來遊屢徘徊於紺馬有識之所虔仰無著之所招提觀慧樓而下拜望天街而興善辭曰塵沙無始造色無先飛蛾不息縈蠶自纏篋蛇未斷藤鼠方緣苦流長泛愛火恆燃髻珠孰曉懷寶詎宣挺茲靈覺時惟天仙真籍表聖化乳稱權寶剎千道高翻四懸鳳樓含日龍臺吐煙紫山翠羽紅水青蓮雪宮月殿晨暉夜圓宵長梵響風遠鍾傳仙衣有拂靈剎無邊藝文類聚七十七庾先生承先墓志悠哉掌庾興自陶唐伯舅居晉連鑣渭陽爰斯厥後世挺圭璋乃登靈嶽言遵洞府乃陟石山將從輕舉實惟貞吉實惟退讓皎皎不群超超高尚本同壽夭寧論得喪諸方未遊佳城已望蓬生蔣徑釣罷磻溪檟悲新壟桃餘故蹊風翻嶺背月下松西揚名不朽高蹈夷齊藝文類聚三十七特進蕭琛墓志銘山東流水關西城市義府辭鋒風飛雲起遊楚宦梁桂馥蘭芳蓮花可賦迷迭成章學類五行書倅三篋已研金匱兼探玉牒石詞既擬欒社茲同桃李成徑松柏為叢天地長久永扇高風藝文類聚四十七侍中新渝侯墓志銘爰始降神誕茲初載方琮有燭圓珠無纇義若聯環文同藻繪三分竹使再徙建旟朱帷自舉白鹿隨車武實威邊文能懷遠乍歌去速時謠來晚昔我往矣千駟連輈今茲旋旆雙鴈隨舟山回素旐水導丹旒寂寥原野搖落徂秋藝文類聚四十八侍中吳平光侯墓志惟嶽降神表山甫之德敬如君所顯成季之徵潔靜精微岐嶷天挺學兼義府談均理窟歷太子洗馬八人掌籍為崇賢之領袖五日來朝冠承華之楷模遷豫章內史法井鸞峰甘露歲下蕭崖鶴嶺連理成陰徵為太子左衛率遘疾薨於道頗類陶基民號燕北取譬羊祜巷哭荊南副君早垂隆眄憫其石火瞻斯翠蓋忽變丹旒方使桓侯石椁載銘盛夏滕令佳城式鐫韶濩藝文類聚四十八黃門侍郎劉孝綽墓志銘蔡墨攸陳有草有茵梁荊世匱或魏或秦積善餘慶時推俊民孝乎惟孝其德有鄰曰風曰雅文章動神鶴開阮瑀鵬翥楊循身茲惟屈扶搖未申人罔石火山有楸椿佳城無曙寒野方春藝文類聚四十八散騎常侍裴子野墓志銘幾原博聞裁為典墳比良班馬等麗卿雲薰蕕既別涇渭以分聖皇御極欽賢盱顧儲后特聖降情文苑既匹嚴朱復同徐阮如何不憖卜期不遠藝文類聚四十八中書令庾肩吾墓志荊山萬里地産卞和之玉隋流千仞水出靈蛇之珠故能胤茲屈景育斯唐宋掌庾命族世濟琳琅遂昌開國蟬聯冠冕父易高尚其道遁肥貞吉關吏早逢夙表真人之氣少微晚映還彰隱士之星肩吾氣識淹通風神閒逸鍾鼓辭林笙簧文苑入為度支尚書任同北斗錫韓稜之劍朝此南宮識鄭崇之履余以其為人也瑚璉之器無慚垂棘杞梓之材有均廊廟故贈散騎常侍蓋旌賢也藝文類聚四十八太常卿陸倕墓志銘如金有礦如竹有筠體二方擬知十可鄰兩升鳳詔三侍龍樓南皮朝宴西園夜遊詞峰飆豎逸氣雲浮日往月來暑流寒襲東耀方遠北芒已及墜露曉團悲風暮急藝文類聚四十九玄圃牛渚磯碑竊以增城九重仙林八樹未有船如鳴鶴時度宓妃橋似牽牛能分織女丹鳳為群紫柱成列清風韻響即代歌仙桂影浮池仍為月浦璧月朝暉金樓啓扉畫船向浦錦纜牽磯花飛拂袖荷香入衣山林朝市併覺忘歸藝文類聚七廬山碑夫日月麗天皇穹所以貞觀川嶽帶地后土所以維寧廬山者亦南國之德鎮雖林石異勢而雲霞共色長風夜作則萬流俱響晨鼯曉吟則百嶺齊應東瞻洪井識曳帛之在茲西望石梁見指寶之可拾誠復慕類易悲山中難久攀蘿結桂多見淹留藝文類聚七隱居先生陶弘景碑昔大和中有許遠遊者乃雲霄之勝賓大虛之選客先生規同矩合實踵高步曩基先搆即駕胥宇千尋危聳憑牖以望奔星百拱高懸倚櫺而觀朝日飛流界道似天漢之橫波觸石起雲若奇峰之出岫銘曰肇彼冥默翻成協贊身託外臣心同有亂重道尊德爰積睿衷顧懷汾射璽問遙通朱楊鬱起華搆方崇靜臺冠月經榭迎風嶕嶢高棟育靄修櫳極望山川周觀京陸碧嶂千嶺清流萬谷景落崖重烟生岫復藝文類聚三十七皇太子講學碑皇太子洊雷種德重離作兩業冠孟侯道高上嗣宮牆纍仞高山仰止承華之闥更似通德之門博望之園反類華陰之市家丞庶子並入四科洗馬後車俱通六學轉金路而下辟雍晬玉裕而經槐市詳其懸鏡高堂衢樽待酌瞻後忽前博文約禮將使東極長男之宮不獨銘於銀榜南皮太子之序豈徒擅於金碑藝文類聚五十五初學記二十一荊州長沙寺阿育王像碑蓋聞琁璣玉衡穹昊所以紀物金版玉文淳精所以播氣何則咸秩社首義盡於寰中鑄鼎馮翊未窮於系素況復道冠萬靈理超千聖智周十地行圓四等變海成蘇移山入芥針鋒廣說藕絲見道惠音八種面門五色組鉢生華入青樓而吐曜金床照采出紫殿而相輝才度蓮河即處天冠之寺始遊羅衛便居堅固之林斯蓋俯應閻浮未臻常樂降情誘接豈窮妄相若乃境無引汲智生淺深明同一體惑起十重七地初刃方稱變易三達後心因窮智種然俱冥四德脫屣雙林示表金棺現焚檀椁浩浩焉不可知已卻望五津距青蓮之洞傍臨三天帶明月之流藝文類聚七十六荊善覺寺碑金盤上疏非求承露玉舄前臨寧資潤礎飛軒絳屏若丹氣之為霞綺井緑錢如青雲之入呂寶繩交映無慚紫紺之宮花臺照日有跡白林之地銘曰聿遵勝業代彼天工四園枝翠八水池紅花疑鳳翼殿若龍宮銀城映沼金鈴響風露臺含月珠幡拂空藝文類聚七十六鍾山飛流寺碑清梵夜聞風傳百常之觀寶鈴朝響聲揚千秋之宮同符上隴望長安之城闕有類偃師瞻洛陽之臺殿瞰連甍而如綺雜卉木而成帷銘曰雲聚峰高風清鐘徹月如秋扇花疑春雪極目千里平原迢遰藝文類聚七十六曠野寺碑雲楣膠葛桂棟陰崇刻虬龍於洞房倒蓮花於綺井月殿朗而相暉雪宮穆以華壯䡾䡾璇題虹梁生於暮雨嶪嶪銀榜飛觀入乎雲中銘曰圓璫旦暉方諸夜朗金盤曜色寶鈴成響藝文類聚七十六郢州晉安寺碑鳳皇之嶺芉綿映色蓮花之洞照曜增輝山云黃鶴疑鈞天之夜響城稱卻月似輕雲之霄蔽銘曰虹梁紫柱螭桷丹牆綺井飛棟華榱璧璫應龍若動威鳳疑翔玉舄霄潤金池夕光朱城卻梲紫陌潛通塹柳朝緑江暉暝紅落霞將暮鮮雲夕布峰下陽烏林生陰兔分珮隔浦皇檣隱霧俱聽法鐘同觀寶聚藝文類聚七十六揚州梁安寺碑竊以陽之有宗者莫擬於靈烏夜之有光者孰踰於陰兔故以日門見羲和之色月殿望奔娥之象而合璧迢遞丈尺猶且莫量朗鏡悠遠積空之所不算復有紫鳳青龍之水卻月朝霞之山白圭玄璧餞瑤池之上銀闕金宮出瀛洲之下空臺四柱隨仙衣而俱揚寶塹三重映瑞園而涵影旃檀散馥無復圓覺之風地湧神龕皆成多寶之塔藝文類聚七十六攝山栖霞寺碑金池無底已通寶塹之側玉樹生風傍臨綵船之上七重欄楯七寶蓮花通風承露含香映日銘曰苔依翠屋樹隱丹楹澗浮山影山傳澗聲風來露歇日度霞輕三災不毀得一而貞藝文類聚七十六歸來寺碑幡影揚於絳臺梵聲依於應塔三相不留蕭蠶終壞八苦遐長燈蛾未已銘曰鈴隨風振盤依露泫丹桂無枝朱楊自翦九苑萌枯三昧葉卷疏樹搖落翻流清淺藝文類聚七十六莊嚴寺僧旻法師碑夫宏才妙物雲液之所降生獨振孤標倫類之所遠絶是故隨光燭魏非折水之恆珍和璧入秦豈潤山之常寶僧旻法師蓋天地之淳精宇宙之瓌器本姓孫氏有吳開國大皇帝其先也法師道藹二儀德充四海含春夏之生長抱日月之貞明辭旨清新置言間遠千門萬戶必臻其奧九部五時若指諸掌坦然夷易豁爾洞開故緇素結轍華戎延道晨風之鬱北林龍魚之趣深澤哲人云逝指南誰屬銘曰永離百非聞之寂滅苟云未樹共歸今轍方墳結構伽藍罷設朱火一潛青松長列藝文類聚七十六光宅寺大僧正法師碑昂昂千里孰辨騏驎之蹤汪汪萬頃誰識波瀾之際望之若披雲霧覩之如觀日月至乃耆年宿望蓄思搆疑懸鍾無盡短兵有倦猶若分旦望景履冰待日莫不傾河注燭虛往實歸皇帝革命受圖補天紉地轉金輪於忍土策紺馬於閰浮逸翮方超圖南輟軌豈直盡茲相府署彼義年方當高步仙階永編金牒繁霜凝而旦委松風淒而暮來悲馬鳴之不反望龍樹而心哀銘曰澄月夜虧清氣旦卷曾巒遠岸蒼江傍緬藝文類聚七十六荊州放生亭碑魚從流水本在桃花之源龍處大林恆捻浮雲之路豈謂陵陽垂釣失雲失水莊子懸竿吞鉤吞餌雖復玄龜夜夢終見取於宋王朱鷺晨飛尚張羅於漢后譬如黃雀伺蟬不知隨彈應至青鸇逐兔詎識扛鼎方前北海之餐鸚鵡未始非人西王之使傳信誰云賤鳥故知魚鳥一觀俱在好生欲使金床之鴈更及衡陽之侶雪山之鹿不充食蘋之宴藝文類聚七十七南嶽衡山九貞館碑簫鼓騰空煙霞相接星辰奪采燈燭非明風牖雲梁千門萬戶樓施九柱已同賴鄉之地山帶五城復類玄洲之所玉版之經猶蘊金丹之處存焉上月臺而遺愛登景雲而忘老欣欣然不知所以而然日暉石瓦東眺靈壽之峰月蔭玉床西瞻華蓋之嶺竹類黃金既葳蕤而防露木似紅蓮且芬披而拂日杯傳九醞隱淪之車晨至堂開四扇西楹之鐘夜響藝文類聚七十八青溪山館碑原夫法象莫過於天地著明莫過於日月鼓之以雷電潤之以風雨咸秩無文所以名山致祭峻極於天青溪山者荊南之中嶽也隱隱干霄亭亭無際雲蓋三層如在帝臺之側桂林八樹非異景山之旁輕霞亘起影落照於陽溪清風遠至響猿鳴於巫峽西臨百丈之穴南帶千仞之水洪源湛淡長波縈復藝文類聚七十八釋奠祭孔子文粵若宗師猗歟乃聖惟嶽降神惟天所命上善如水至人若鏡藝文類聚三十八又祭顏子文欽哉體一亞彼至人乍分介石時知落鱗不先稱寶席上為珍致虛守靜曲巷安貧欽風味道其德有鄰藝文類聚三十八祭東耕文三農九穀為政所先萬箱億庾是曰民天繫稱斫耜書美厥田花開杏樹凍解新泉當使黍稷莫莫民翳胥樂甘雨祈祈遂及我私我私之熟表裏禔福禔福中田歲取十千是藨是袞登頌有年藝文類聚三十九山水松竹格夫天地之名造化為靈設奇巧之體勢寫山水之縱橫或格高而思逸信筆妙而墨精由是設粉壁運神情素屏連隅山脈濺朴首尾相映項腹相近丈尺分寸約有常程樹石雲水俱為正形樹有大小叢貫孤平扶疏曲直聳拔凌亭乍起伏於柔條便同文字或難合於破墨體向異於丹青隱隱半壁高潛入冥插空類劍陷地如坑秋毛冬骨夏蔭春英炎緋寒碧暖日涼星巨松沁水噴之蔚坰褒茂林之幽趣割雜草之芳情泉源至曲霧破山明精藍觀宇橋約關城門人犬吠獸走禽驚高墨猶緑下墨猶赬水因斷而流遠雲欲墜而霞輕桂不疏於胡越松不難於弟兄路廣石隔天遙鳥征雲中樹石宜先點石上枝柯末後成高嶺最嫌林刻石遠山大忌學圖經審問既然傳筆法祕之勿泄於戶庭即位改元詔王室不造嬰罹禍釁西都失守朝廷淪覆先帝梓宮播越非所王基傾弛率土罔戴朕以荒幼仍屬艱難泣血枕戈志復讎逆大恥未雪夙宵鯁憤群公卿尹勉以大義越登寡暗嗣奉洪業顧惟夙心念不至此庶仰憑元靈傍資將相克清元惡謝冤陵寢今墜命載新宗祊更祀慶流億兆豈子一人可改承聖四年為紹泰元年大赦天下內外文武賜位一等梁書敬帝紀搜舉孔子後并繕廟堂詔夫子降靈體哲經仁緯義允光素王載闡玄功仰之者彌高誨之者不倦立忠立孝德被蒸民制禮作樂道冠群后雖泰山頽峻一簣不遺而泗水餘瀾千載猶在自皇圖屯阻祀薦不修奉聖之門胤嗣殲滅敬神之寢簠簋寂寥永言聲烈實兼欽愴外可搜舉魯國之族以為奉聖後并繕廟堂供備祀典四時薦秩一皆遵舊梁書敬帝紀置中正詔諸州各置中正依舊訪舉不得輒承單狀序官皆須中正押上然後量授詳依品制務使精實其荊雍青兗雖暫為隔閡衣冠多寓淮海猶宜不廢司存會計罷州尚為大郡人士殷曠可別置邑居至如分割郡縣新號州牧並係本邑不勞兼置其選中正每求耆德該悉以他官領之梁書敬帝紀宗室聽襲本爵詔宗室在朝開國承家者今猶稱世子可悉聽襲本爵梁書敬帝紀
