body:
  text: 沈約授蔡法度廷尉制門下民命所懸繫乎三尺止殺除殘實由乎此是以皋陶作士五刑惟明于張蒞官世無冤獄且漢代律書出乎小杜吳雄以三世法家繼為理職郭恭以律學通明仍業司士爰及晉氏此風未泯叔則元凱並各名家自茲厥後斯尚漸薄迄至于今損棄頓盡衣冠士子恥復用心州郡姦吏恣其取捨舞文弄法非止一塗朕膺天受命為兆民主每一念此忘寢與食尚書刪定左曹郎中蔡法度少好律書明曉法令世之所廢篤志不怠至於章句蹐滯名程乖礙莫不斟酌厥衷允得其門方欲寄以國刑開示後學文才取士豈有定方自世道澆流浮偽雲起量計多少辨校錐刀若遵往從舊守而勿失豈所以軌儀上世垂風于後宜加褒擢弗繫常階可守廷尉卿主者施行文苑英華三百九十七授王繢蔡約王師制門下冠軍將軍司徒左長史始平縣五等男繢華宗冠胄器質詳和都官尚書約清源素範體業倫正訓茲蕃國僉議攸在繢可隨郡王師加散騎常侍男如故約可零陵王師加給事中主者速施行文苑英華四百五封徐世標制門下驍騎將軍彭城令徐世標才略貞濟志懷義烈忠節內款勳勤外著禦侮折衝任惟心膂頃姦慝潛煽危機驟發夷凶弭難實有力焉宜命賞疇庸錫茲土宇可封開國縣子食邑三百戶文苑英華四百十六授李居壬等制門下新除太子左衛率軍主李居壬志識開敏器懷貞濟盡力禁門誠著夷險新除太子右衛率軍主潮陽縣開國男胡松性業詳固才用果烈新除節督青冀二州諸軍事寧朔將軍青冀二州刺史柏和剛正款率屢著勤效新除左中將軍主鴻選氣質強果秉心壯宣並反旆南轅以赴危難身先士卒翦此鯨鯢功勤碩茂宜隆賞典居壬可封一千戶開國縣侯松可增封為七百戶和可封五百戶開國縣伯選可封三百戶開國縣男新除持節刺史將軍主男並如故主者施行文苑英華四百十六封左興盛等制門下逆豎王敬則縱兵內侮陵斥畿甸輔國將軍參軍將軍事左興盛直閣將軍劉山陽受律前驅焱勇爭路或衡至首旆或陷懸中麾元惡梟至氛梗載廓賞不踰時義弘前典可封開國男食邑二百戶并進位一階主者速施行文苑英華四百十六勸農訪民所疾苦詔門下執耜暫蹇則如懸比室秉機或惰則無褐終年非怠非荒雖由王道不稂不莠實寄民和頃歲多稼無爽遺秉如積而三登之美未臻萬斯之基尚遠且風土異宜百民殊務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務滋耕殖相畝闢疇廣開地利深樹國本克阜民天又詢訪獄市博聽謠俗傷風損化各以條聞無使瘥瘼之苦載興比屋主者詳為科格稱朕意焉文苑英華四百六十二又南齊書鬱林王紀略有刪節封申希祖詔門下持節督司州諸軍事冠軍將軍司州刺史申希祖志器沈隱才略開濟在昔多難任參心膂爰及中興忠款彌著契闊艱虞盡其心力逮獯獫侵斥武節飆騰殘寇外殄危城獨困休庸茂績朕有嘉焉宜錫茅土以疇勤烈可封開國伯食邑五百戶本官如故主者施行文苑英華四百十六南郊赦詔門下朕昧旦夙興念茲治道而明不燭遠弘之未易仰尋先烈思致隆平日頃多故戎役代有軍政國容事緒非一刑禮參用未臻和簡向隅之情永言增歎今郊禋載洽幽明允從思隆嘉祉被之兆庶可大赦天下主者施行初學記二十文苑英華四百二十四為齊明帝遺詔徐令可重申八命中書監本官悉如故沈文季可左僕射常侍護軍如故江祐可右僕射江祀可侍中劉暄可衛尉軍政大事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祐其大事與沈文季江祀劉暄參懷心膂之任可委劉悛蕭惠休崔慧景南齊書明帝紀立太子赦詔門下朕夙纘璿祚君臨四方夕惕寅畏若置淵谷思所以光闡洪基克隆鼎命王公卿士咸以為樹元立嫡有邦所先守器傳統於斯為重是用俾茲幼蒙體乾作二永固宗祀以貞萬國元良之寄非獨在余宜令嘉慶被之億兆可大赦天下賜民為父後者爵一級主者速施行文苑英華四百三十二赦詔門下朕肅纂乾統思弘祖業方欲克廣法猷寧濟遐邇實賴群才共康世務至於股肱宗戚情委特隆垂拱責成緝熙是寄而各包藏禍心規縱醜逆朕每存容隱冀或能悛而靡懲前慝彌結後釁七百業艱宗廟事重不得不垂涕行戮以義斷恩或藩屬皇宗或睦姻近戚夫豈不懷社稷故也雖四門已穆群凶靡餘而泣辜之歎義兼自昔方勵精思治登賢任官隆平之化庶從茲始宜播嘉惠咸與維新可大赦天下自今月二十日昧爽已前謀反大逆手殺人以下皆赦除之頃歲軍旅繁興叛征者衆其質繫家屬及同伍代役三署見徒詳所由原遣主者施行文苑英華四百三十一授王亮左僕射詔門下朝端任重刑政斯出自非民望時宗莫諧茲舉通直散騎常侍吏部尚書領太子左衛率王亮器識夷遠風鑒清奧贊務釐朝庶績惟允宜崇名器以副具瞻可尚書左僕射主者速施行文苑英華三百八十五沈文季加侍中詔門下散騎常侍尚書左僕射西豐縣開國侯新除鎮軍將軍沈文季業宇流正鑑識超凡秉茲恭恪誠著匪躬難起非慮密邇墉圻罄力盡勤萬雉增固寵服攸加實為朝典可侍中僕射新除侯如故主者速施行文苑英華三百八十崔慧景加侍中詔門下護軍將軍樂安縣開國子慧景志氣淹通識履詳正誠烈款盡義簡朕心加榮近侍抑惟廟序可加侍中子如故主者速施行文苑英華三百八十王亮王瑩加授詔門下京輔華貫端副要重政首民經任切朝寄尚書左僕射亮濬哲淵深道風清邈時宗民譽僉望所歸中領軍南徐州大中正南鄉侯瑩德宇夷曠鑑識凝遠上下協隆內外允諧逆徒從慝躬衛時難氛祲既澄並宜光贊緝熙穆茲景化亮可侍中丹陽尹瑩可侍中尚書左僕射本官中正侯並如故主者速施行文苑英華三百八十臨川王子晉南康侯子恪遷授詔門下侍中臨川王子晉志業清敏器尚夷通祕書監右領軍南康縣開國侯子恪理識間悟思懷韻警宜出聞朝政入侍帷幄子晉可左民尚書子恪可侍中王侯並如故主者速施行文苑英華三百八十大赦詔門下王室多難祲沴相仍昔歲紛阻鋒交九達今茲狂煽兵連萬雉時事屯厄罕有斯逆故令迷疑互起向背者多元惡既懸猜懼彌廣奔亡草澤自反莫因近雖曲赦與之更始而愚昧之徒猶多竄伏且遏寇未夷役連遐邇刑政弛張陷罪非一思所以廣敷嘉惠被之億兆可大赦天下凡與崔慧景協契同謀首為姦逆爰及降叛輸力盡勤良由世道交喪流源浸遠風概靡立以至如斯悉皆蕩滌一無所問凡諸反側咸與維新並加宣慰還復民伍國信之明皎如日月榜勒畿要咸使聞知惟崔慧景諸子不在赦例主者施行文苑英華四百三十一授蕭重俅左僕射詔門下尚書萬事之本隆替是寄總司頓闕宜速有人征虜將軍吳興太守建安縣開國子蕭重俅才學淹通識裁詳允內著嘉庸外敷美政入副朝端僉議斯在可守尚書左僕射餘如故主者施行文苑英華三百八十五南郊恩詔門下朕肅膺乾貺君臨率土雖日晏劬勞而仁恕未洽星琯驟回履端告始禋饗云備誠敬兼申宣和布澤情深待旦凡內外文武可各賜勞一年叛亡未擒若百日內自首還役不問往罪女子質繫悉且散遣文書輕重坐罪並皆從原主者詳為條格疾速施行文苑英華四百二十四劉暄封侯詔門下南國是式事昺興周原鹿啓土義昭洪漢領軍舅親德之重朝野式瞻在昔中興任推心膂哀疚眇然未堪多難允賴徽猷嗣隆寶業及釁起不虞咫尺宮禁內參嘉謨外宣戎略密勿劬勞誠力備盡宗社克固實倚高謨無言不讎無德不報況忠勳至戚義兼於此者乎宜錫圭裂壤允副僉屬可封開國縣侯食邑二千戶主者施行文苑英華四百十六王亮等封侯詔門下尚書左僕射亮中領軍南鄉侯南徐州大中正瑩守吏部尚書志並時宗民秀徽望允集協贊朝機彝倫是寄秉文經武任惟腹心方賴嘉謨克弭時難宜疏爵建社與國同休亮瑩可各封一千五百戶開國縣侯本官中正如故志封千戶開國縣侯本官如故主者速施行文苑英華四百十六常僧景等封侯詔門下廬陵王中兵參軍事宣閣將軍軍主新除右軍常僧景車騎江夏王參軍事宣閣將軍新除右軍中郎將薛元嗣安東廬陵王參軍事振武將軍徐元稱假寧朔將軍廬陵王國侍郎延明主帥殷係宗前軍將軍宣閣格虎隊主馬廣或氣略強果或志識貞濟或忘家奉國誠著夷險方寄戎昭克清時難宜命爵啓土以獎厥勞可封一千戶開國縣侯本官新除驅使悉如故主者施行文苑英華四百十六封三舍人詔門下輔國將軍驍騎將軍南高平太守兼中書通事舍人沈徽孚給事中驍騎將軍臨淮太守兼中書通事舍人王咺之寧朔將軍南濮陽太守兼中書通事舍人裴長穆並以素胄清才服勤禁省契闊劬勞自頃多難軍國務殷內參帷幄外濟師旅忠規款志義感朕心宜錫茅社同蒞賞册可封三百戶開國縣伯本官郡驅使並如故主者速施行文苑英華四百十六立左降詔刑乖政失其源已久罰罪之奏日聞於蚤朝弊獄之書亟勞于晏寢免黜相係補代紛紜一離愆囚乃永歲月非所以棄瑕録用隨分盡才者也是故減秩居官前代通則貶職左遷往朝繼軌自今內外群司有事者可開左降之科初學記二十降死罪詔朕樹洪業光宅區宇而本枝之慶未廣椒掖滕衛之地猶闕蕃屏言念弓韣不能忘懷策三子始有盤石之資於焉彌固慶雖自已恩加覃及凡死罪可降一等五歲刑降二等三歲刑以下並悉原放初學記二十改天監元年赦詔門下五精遞襲皇王所以受命四海樂推殷周所以改物雖禪代相舛遭會異時而微明迭用其流遠矣莫不振民育德光被黎元朕以寡暗命不先後寧濟之功屬當期運乘此時來因心萬物遂振厥弛維大造區夏永言前蹤義均慚德齊氏以代終有徵曆數云改欽若前載集大命于朕躬顧惟菲德辭不獲命寅畏上靈用膺景業執禋柴之禮當與能之祚繼迹百王君臨四海若涉大川罔知攸濟洪基初兆萬品權輿思俾慶澤覃被率土可大赦天下改齊中興二年為天監元年賜民爵二級文武加位二等鰥寡孤獨不能自存者人穀五斛逋布口錢宿債勿復收其有犯鄉論清議贓汙淫盜一皆蕩滌洗除前注與之更始長從敕繫之身特皆原遣亡官失爵禁錮奪勞一依舊典文苑英華四百二十一又梁書武帝紀中有刪節封授臨川等五王詔門下神牧帝鄉冠冕列嶽渚宮樊鄧形勝是歸居中作衛翌宣戎勳隆茲寵號實允舊章並非親勿居惟賢斯授西中郎將護軍宏朕之介弟早宣德譽董一藩政緝是嘉庸國禮家情瞻寄隆重使持節督南徐兗二州諸軍北中郎將南徐州刺史秀風穎雋邁識業標簡任居藩翰政以化成使持節都督雍梁南北秦四州諸軍事安北將軍寧蠻校尉雍州刺史偉體韻淹穆神宇凝正經綸夷雅參贊王業冠軍右衛將軍恢神檢外洽淵量內湛奉職鉤陳周衛以穆使持節督荊湘益寧南北秦七州諸軍事安西將軍荊州刺史憺秀識沖情允文允武經啓王業實有厥勤並契闊綢繆分形並氣處家盡其匪躬朕承運迭興光宅四海藩維廣樹經朔攸屬出納之宜望實惟允宏可使持節散騎常侍都督揚南徐州諸軍事後將軍揚州刺史封臨川郡王秀可進號征虜將軍餘官如故封安成郡王偉可使持節散騎常侍都督雍梁荊寧南北秦六州郢州之竟陵司州之隨郡諸軍事寧蠻校尉雍州刺史將軍如故封建安郡王恢可侍中前將軍領石頭戍事領兵景佐封鄱陽郡王憺可使持節都督荊湘益寧四州諸軍事平西將軍荊州刺史封始興郡王食邑各二千戶文苑英華四百四十四又略見藝文類聚五十一以為任昉作立太子詔朕屬當期運係迹前王思所以長世流祚垂之萬葉百辟咸以元良之寄有國莫先自昔哲后降及近代莫不立儲樹嫡守器承祧乃旁挹群議遠惟七百建茲蒙稚仰副宗祊承華肇開崇基克永無疆之慶非獨在余思霑渥澤被之遐邇可賜天下為父後者爵一級王侯以下量錫幣帛藝文類聚十六初學記十立內職詔刑于垂訓周文所以表德壼闈失序漢氏所以喪邦並被諸方策式昭戒勸魏晉以來雖云簡薄而內職名號參差不同在宋太始位置繁遂設九品且擬外朝填委椒掖徵費無已自此相仍踵以成舊昭陽九華千門萬戶朕受命自天始基七百思所以立防自邇貽厥方來前代職品所宜因革外可詳議務令該允藝文類聚十五初學記十搜訪隱逸詔高尚其志義煥通爻山林不出訓光惇史朕聽朝晏罷尚想幽人蒲玉之禮佇聞峻節可班下州郡博訊巡遠若有道映丘園事浮高尚可以弭競遷澆還風拯俗皆以名聞靡或遺漏朕將闢衢室而置几杖開東序而授袞職庶令江海無遺異人必至藝文類聚三十七資給何點詔遠趣高情前王所貴義兼昔款倍用興懷徵士何點居貞物表縱心塵外夷坦之風率由自遠往因素志頗申宴言眷彼子陵情兼惟舊昔仲虞邁俗受俸漢朝安道逸志不辭晉祿此蓋前代盛軌往賢所同可議加資給並出在所日契資須太官別給既人高曜卿故事同垣下梁書何點傳藝文類聚三十七酬荊雍義士獻物者詔昔義舉之初人懷自竭輸賦罄産同致厥誠言稔一概思有所酬其雍荊郢三州有獻物助軍國者外可詳加蠲報焉初學記二十南郊恩詔門下卜日禋饗政道莫先厚下布澤哲王是務朕仰祗靈眷府臨億兆歲象回環恭事亡及牲玉必薦感敬備申升煙燎於穹昊致精誠於太一思霑颽潤惠茲窮生應天監三年內犯奪勞及左降可悉原降繼市職不充人身及家口質繫悉散還私家督備前歲三五犯譴因及隨曹景宗授司州委叛應謫役者並量所蠲降尚書所檢巧陳淫辭普更開恩百日各聽自首不問往罪京師三縣尤窮之民詳加賑恤主者速條格施行文苑英華四百二十四使四方士民陳刑政詔徑寸之寶或隱沙泥以人廢言君子斯戒朕聽朝晏罷思闡政術雖百辟卿士有懷必聞而蓄響邊遐未臻魏闕或屈以貧陋或間以山川頓足延首無因奏達豈所謂沈浮靡漏遠邇兼得者乎四方士民若有欲陳言刑政益國利民淪礙幽遠不能自通者可各詮條布懷於刺史二千石有可申採大小以聞梁書武帝紀中初學記二十以為沈約作王茂加侍中詔門下居中作衛號望清重任總儲宮朝難其選望蔡縣開國公新除尚書右僕射茂器度淹弘志局詳穩契闊艱夷情深恆寄顯命載加允副僉屬可侍中衛將軍領太子詹事開國公如故給鼓吹一部主者施行文苑英華三百八十梁武帝踐祚後與諸州郡敕欽惟邃古爰及近代雖禪代異時而成功一揆豈惟靜民寧亂實由符運總集故能啓業垂統光宅區夏齊氏遘茲昏詖斯亡奄及民命蠢蠢倒懸非喻朕大懼四海舟覆二象雲傾億兆與崑岡並燎縉紳與蘊崇共日永言悽悼發憤經營推鋒投袂電擊風掃藉上天之靈因熊羆之用德未半古功侔前烈齊民既欽若虞夏高揖萬邦兼以冥符先著樂推攸在幽顯宅心辭不獲命猥以虛寡君臨萬國川壑之懷寤寐盈慮方欲昧旦丕顯日昃忘勞思與賢能康濟世道卿擁旄萬里共治是寄當求民瘼留念獄市威斷以御強猾仁惠以撫貧孤使遠近幽深咸得其所方虛位欽能懸爵佇效勿令漢代璽書獨行於自古晉世班條靡用於茲日想加克勉副其側席藝文類聚十四為武帝與謝朏敕吾以菲德屬當期運鑒與吾言思隆治道而明不遠燭所蔽者多實寄賢能匡其寡暗嘗謂山林之志上所宜弘激貪厲薄義等為政自居元首臨對百司雖復執文經武各修厥職群才競爽以致和美而鎮風靜俗變教論道自非箕潁高人莫膺茲寄是用虛心側席屬想清塵不得不屈茲獨往同此濡足便望釋蘿襲袞出野登朝必不以湯有慚德武未盡善不降其身不屈其志使璧帛虛往蒲輪空歸傾首東路望兼立表羲軒邈矣古今殊事不獲總駕崆洞依風問道今方復引領雲臺虛己宣室紆賢之愧載結寢興藝文類聚三十七又與何胤敕吾猥當期運膺此樂推而顧己蒙蔽昧於治道雖復劬勞日昃思致隆平而先王遺範尚蘊方策息舉之用存乎其人兼以世道澆暮爭詐繁起改俗遷風良有未易自非以儒雅弘朝高尚軌物則汩流所至莫知其限治人之與治身獨善之與兼濟得失去取為用孰多吾雖不學頗好博古尚想高塵每懷擊節今世務紛糾憂責是當不得不屈道巖阿共成世美必望深達往懷不吝濡足今遣領軍司馬王果宣旨諭意遲面在近梁書何胤傳高祖踐祚詔為特進右光祿大夫手敕云云又見藝文類聚三十七以為沈約作為梁武帝除東昏制令令夫樹以司牧非役物以養生視人如傷豈肆上以縱虐廢主棄常自絶宗廟窮凶極悖書契未有苛酷滋章征賦不一緹繡草木朝構夕毀撫梁易柱不待匠人徵發閭左以充繕築流離寒暑繼以疫厲轉死溝渠曾莫收恤朽肉枯骸烏鳶是厭加以天災人火屢焚宮掖官府臺寺尺椽無遺悲甚黍離痛兼麥秀遂使億兆離心疆徼侵弱壽春內地鞠為寇場辱及祖宗恥深諸夏斯人何辜離此塗炭今明昏遞運大道公行思化之萌來蘇茲日猥以寡薄屬當大寵雖運距中興難同草昧思闡皇休與之更始凡昏制繆賦淫刑濫役外可詳檢前源悉皆蕩除其主守散失諸所愆耗精立科條咸從原例便施行文館詞林六百九十五答詔訪古樂竊以秦代滅學樂經殘亡至於漢武帝時河間獻王與毛生等共採周官及諸子言樂事者以作樂記其內史丞王定傅授常山王禹劉向校書得樂記二十三篇與禹不同向別録有樂歌詩四篇趙氏雅琴七篇師氏雅琴八篇龍氏雅琴百六篇唯此而已晉中經簿無復樂書別録所載已復亡逸案漢初典章滅絶諸儒捃拾溝渠牆壁之間得片簡遺文與禮事相關者即編次以為禮皆非聖人之言月令取呂氏春秋中庸表記防記緇衣皆取子思子樂記取公孫尼子檀弓殘雜又非方幅典誥之書也禮既是行己經邦之切故前儒不得不補綴以備事用樂書事大而用緩自非逢欽明之主制作之君不見詳議漢氏以來主非欽明樂既非人臣急事故言者寡陛下以至聖之德應樂推之符實宜作樂崇德殷薦上帝而樂書淪亡尋案無所宜選諸生分令尋討經史百家凡樂事無大小皆別纂録乃委一舊學撰為樂書以起千載絶文以定大梁之樂使五英懷慚六莖興愧隋書音樂志上天監元年下詔訪百寮於是散騎常侍尚書僕射沈約奏答
