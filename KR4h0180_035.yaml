body:
  text: 江淹遣大使巡詔門下昔明王馭世巡嶽采政睿后司朝觀俗調化故生無鬱滯物獲修通釐風拯患於茲為急朕以輶薄昧于大道因璿璣之曆遵三德之運緬鑒前哲寤寐永歎思所以闢訪治蠹詢求民瘼才寡務殷若無津漈故以情深危薄心疚夙夜矣可普遣大使分行四方推賢薦能問疾舉滯若其采野不闢犴訟有虧妨氓利害擾黷政經者具以奏聞如其讜言嘉話真士智才亦依名謄上隨事均量務取厥中朕將親覽以弘遠化本集賜赦交州詔門下交部昔值時詖負海不朝因迷遂往歸款莫由今創制萬宇煙熅造物原刑四裔澤浹中畿慜彼邊氓未均王化宣弘遠仁蕩以更始可曲赦彼州統內咸同曠泰李叔獻一人即撫南土其股肱文武詳材選推并遣大使宣揚朝旨本集斷募士詔門下設募取將懸賞購士蓋出權宜非曰經制頃者民罹氛藹世襲艱阻因時流故浸以成俗斯風蕩而未返且滋長逋逸開罪山湖遂乃黥刑不辱草竊無咎平政察治萌合甄革自今已後可悉斷衆募本集封江冠軍等詔門下締基緯業序功攸急開曆闡祚酬庸為先故以式藹曩書載炳前軌文仲假等或誠亮艱危效彰屯詖皆績幹兩宣勤圖兼立宜各分圭社以酬厥勞謐本集大赦詔門下朕思弘風教而刑圄猶積永言前烈兢歎載懷今履端告始群后執贄治洽樂郊華夷同泰雖歌慚擊石采愧卿雲然景業初基義深恆典慶動玄靈歡溢都縣憫彼幽黔猶隔茲澤思我兆民共熙至化本集北伐詔門下朕統曆馭政志包函夏庶總文軌無思不服而逖焉狡虜久為邊虞及宋末不庭授策乖律北州外淪威風內毀鑒彼隆替慨歎盈懷冕旒濟河翦彼凶狄咸秩中嶽望祀汾陰則聲教鬯矣猶以經綸惟始恩化甫洽勞民擾衆為政所重故方輟六師按經九伐今淮泗告驚羽書馳聞醜羯妖燼送死北垂徵天人之數撫自來之會無勞遠兵剿撲為易蓋因茲大號蕩其巢藪可遣使某官組甲十萬鐵騎千馬斜趣潁洛衝其要津某官某虎旅八萬舳艫數千沿淮長驅稜威青汴某官某舟師五萬直出淮淝某官控江右之鋭駱驛繼進某官某率羽林徑勇為水陸形援某官某甲等並率義勇之衆牙制掎角之機戎車戒路事宜總一使持節都督南徐兗二州諸軍事後軍將軍南徐州刺史長沙王晃出次江都為衆軍節度驍雄競奮火烈風掃剋定中原肅清河洛便可內外纂嚴以時備辦本集王僕射為左僕射詔門下端二樞祕實惟國禎緝典宣機所寄時彥尚書右僕射領吏部尚書南昌縣開國公儉器懷明亮風情峻遠業積圭璋才兼經緯況乃節亮帷幄譽敷端揆升授之宜蓋允具瞻可左僕射本集王僕射領太子詹事詔門下管司東朝歷代所重自非國華莫允斯任侍中尚書左僕射南昌縣開國公儉鑒識清贍理懷秀徹績亮朝端譽敷僉議贊業攸光物聽斯緝宜總二官以穆彝序本集王撫軍為安東吳興詔門下震澤殷奧撫馭須才都官尚書撫軍潯陽郡開國公敬則志幹貞烈秉情開敏忠勤之至形乎出內必能綏懷大邦剋隆美政可安東將軍吳興太守本集曲赦丹陽等四郡詔門下朕興言民瘼昧旦求政所以庶存簡惠緝茲治道而玉燭未調祥風尚鬱京輔及二吳昔歲水災秋登既罕今茲厲疾罹患者多納隍之歎為矜良深可曲赦揚州所統丹陽吳興南徐州所統義興等四郡其遭水尤劇之縣自今年以前三調未充而虛例已畢官長局吏應共備償者雖即事為愆情在可亮外詳所除以弘優澤本集何詹事為吏部尚書詔門下官人之職實難其選所以弼諧彝品謨明庶績今思治惟急彌不可曠侍中太子詹事戢業履修平體識詳穩自升宮闥美譽咸聞必能無懈于位燮茲流序本集王侍中為南蠻校尉詔門下荊楚殷曠任重寄深毗佐之選非良勿授侍中領祕書監驍騎將軍奐秉心貞元志局開亮績譽之美在公屢彰必能贊政南紀播惠西夏本集王光祿為征南湘州詔門下衡嶽名區荊湘奧壤自頃凋弊綏撫須賢侍中光祿大夫丹陽尹僧虔德履淹邃識局詳正沖素之行朝望攸歸歷職之庸載懷僉聽往任沅湘餘惠在民今宜重敷善政申此懿績本集柳僕射為南兗州詔門下河兗衝要維扞中畿司牧之任宜詳其授後將軍領軍新除尚書左僕射溳陽郡國公世隆業體淹濟思情通敏功書王府績彰纍任必能宣弘恩政威懷萬里雖哀疾毀頓而禮有權奪本集王僕射加兵詔門下散騎常侍尚書左僕射太子詹事南昌縣開國公儉忠款昭著任寄隆深既光朝猷允屬民聽宜增威飾以崇望實可加兵二百本集立學詔門下夫膠庠之典彝倫攸先所以招振才端啓發性緒弘世字氓納之軌儀是故五禮之迹可傳六樂之容不泯朕自膺曆受圖志闡經訓且有司群寮奏議橫集以戎車屢警文教未敷思樂辟雍永言多慨今關燧無虞時和歲稔遠邇同風華夷慕義便可式遵前準修建斆學精選儒官廣延國胄本集案南齊書高恕有此詔王鎮軍為中書令右光祿詔門下綸言要密歷選為難優秩崇顯允在舊德使持節都督江州豫州之新蔡晉熙二郡諸軍事鎮南將軍江州刺史延之業履沖約秉情間素譽彰頻試績著纍朝自居南服徽庸剋舉宜升寵章管兼樞祕本集張令為太常領國子祭酒詔門下庠議既敷縉紳攸屬師氏之任宜歸儒素散騎常侍中書令驍騎將軍揚州大中正緒器識清簡理懷恬約譽洽朝聞聲緝民聽必能闡揚玄宗式範胄子兼掌宗伯望實惟宜本集蕭冠軍進號征虜詔門下維翰之重實資名品使持節都督郢州司州之義陽諸軍事冠軍將軍郢州刺史南昌縣開國侯鸞體局弘濟器操端敏自蒞任夏首美政殷流必能聿宣國化以庇人瘼宜崇顯秩允茲聲望本集褚侍中為征北長史詔門下蕃佐須才非良莫寄侍中領步兵校尉炫識業清悟思懷淹暢出內之譽日聞其美宜弼諧親屏以申茂績本集慰勞雍州文皇帝謝鎮軍寧蠻二府雍州文武士庶等夫忠為令德或感概殺軀信實美行或殉義蹈節而沈攸之小豎反覆稱逆西藩袁粲劉秉潛使相扇遂擁據石頭並圖廟社粲秉既從王憲蒼黎同慶攸之孤州蟻聚勢必燼滅刺史張敬義氣雲騰秣馬星驅全羽十萬殄茲氛鯨曾不旋踵彼州南陽白水將相遺風忠義之士霜戈電發但戎車暫動念原未寧冬寒卿皆無恙本集為宋建平王聘逸士教府州國紀綱夫媯夏已沒大道不行雖周惠之富猶有魚潭之士漢教之隆亦見棲山之夫迹絶雲氣意負青天皆待絳螭驤首翠虬來儀是以遺風獨扇百代餘烈激厲後生斯乃王教之助古人之意焉吾稅駕舊楚憩乘汀潭挹於陵之操想漢陰之高而山川遐久流風無沫養志數人並未徵采善操將棄良用慨然宜速詳舊禮各遣纁招庶暢此幽襟以旌蓬蓽本集藝文類聚三十七建平王散五刑教府州國紀綱吾謬紲朝組乃班恩命重渥華藩踐寵懋甸永言政惠良攪情寐況舊楚地曠前郢氓殷水帶枉渚山匝魯陽自頃田邑榛故封井萊蕪財賦方屈犴獄實繁思所以厚風釐俗變瑟改調自五歲刑已下未連臺者一皆原遣文武彈坐亦悉復職主局依舊施散薄紓此懷本集蕭驃騎發徐州三五教州府紀綱沈攸之背慢靈極稽誅之日久矣況稱兵江漢之上圖釁廟闕之下惡熾罪盈民靈所絶朝廷以剋辰纂嚴令輿夙駕吾任先責遠義兼常慨挺刃投袂信見其時方當水斬龍蛟陸斷犀兕雖烈士銜志壯夫投概然雲羅既舒宜廣威防所統郡縣便普三五咸依舊格以赴戎麾主者飛火施行本集蕭驃騎築新亭壘埋枯骸教府州綱紀夫汝南稱慈諒由掩胔廣漢流仁實存殯朽近袤製茲塋崇堞浚塹古墟曩隧時有湮移深松茂草或致刊剃憑壙動懷巡隍增愴宜並為收改葬奠祀主局詳辨施行本集蕭太傅東耕教三府二州綱紀夫寶農賤貨綵照周縢巡耕去販光炎漢籙故能業滋都野産殷紘縣吾任屬弘寄思闡治源慮以晨感情以宵嘆今玄司調氣青祇佇節陳既柔服方秀電爍有期桐萌無遠便當躬速紺耦道先列辟事均暫勞迹在永豫可剋日備辦詳典施行本集尚書符侍御史大夫尊冠賤履君臣斯位愛順惡逆成敗可曉未有憑凌我江郊侵軼我河縣而不流魂漂骨丹宗血祀者也沈攸之寂寥無聞起自甲卒邀我百戰之軍乘彼一捷之幸鐫山裂地紐紫要金擁旗藩伯便無北面之禮受符方屏即有專征之釁箕賦深斂毒被南郢枉法矯刑害著西荊鬼怪其性故從始而遂終狼戾其志乃沿少而得老山陵不奔移殃為慶踐祚無賀按劍稱豫遂乃關馳送書亭照妖火此而可孰不可宥今遣陳承叔彭文之等敢徑三萬前驅電躍呂安國任侯伯垣崇祖曹虎頭等樓艦萬射蛟中流苟元賓郭文孝程隱雋等輕舸二萬高旌蔽日周盤龍張文憘薛道淵等鐵馬五千龍驤後陳凡此諸帥莫不氣薄日月精變虹霓或飲羽石梁或超踰亭樓索鐵拔距孤視萬旅顧眄則前後生風喑嗚則左右激電然後鑾戎薄臨驍虎百萬六軍徐軌五輅遲旆丹艦發照素甲生波樓煩白羽投鞍成嶽漁陽黑騎浴鐵為雲於是高山與深谷共湮紫芝與白艾同滅不亦惜乎符至之日幸加三省其驅逼寢手之人鋒陳塢壁之主若有投命軍門一無所問或能因罪立績賞不示私斬袪射玦唯功是與購募之科具列如上信如白水皎然無二臺明詳旨飛火普加宣下文書千里馳驛本集宋書沈攸之傳始安王拜征虜將軍丹陽尹章既耀軒禮涵蕤龔恩爽泗靦默中謝臣少識猶晦哀辛方襲藉以育采上霄摶華中漢飲惠延光偭爵假息不悟瑤離降映繩河低文遂翊言關禁徙第京部進憲蒙淺塵紊徒盈還迷懅悚風製罔樹循伏憂欷滅慮燋衷不勝荷佩之情本集始安王拜征虜將軍南兗州刺史章絢服騰照懋册凝芬夤對迷墜慚泣交集中謝臣職右南陽謝蒲鞭之政任重臨淄無遣獄之化自分金帝關參風尹訟璧緯裁復圭露詎淹不悟旻靈拂采霄景汰色復交書河楚置傳江吳環章清潤旗文肅路寵艷內維榮炫外圉方梗名慮有陋莩識沖生靦氣安以輸謝不勝荒震屏營之情本集建平王拜右衛將軍荊州刺史章圭册停徽車旗寫曜襲禮炫衷迎恩震色中謝臣聞爵以能委命以績降亦有玄雲結吹褒成燻之厚朱箱纍轍崇試宰之高而臣紐組頒守要玉備政績廢江區聲隘河部浮榮曠年叨光賒日諒以具察輿歌取鏡民誚不悟皇德至凝亭物帷幄復使承官楚封祗秩漳土任班河冀事亞崤陝橫術輻輳殷氓訟積寧曰明哲疇剋克勝寄雖瀝丹局終懼蒙咎不任銘戴匪處之情本集建平王慶少帝登祚章上書皇帝陛下伏承肇嗣天震雲飛璿極戎夏歸服民靈以戴中射臣聞黃旗紆藻瑞益於姬帝紫雲垂蓋效異於劉后實乃深賜天衷廣映祇迹伏惟陛下騫英駕聖涵靈縱睿矩心明裁繩道哲時遙裔雒符雜沓河紀是以膺符寶宮輯命珍殿誼洗雲密德徽媯夏濬發鴻原長禘偉業方絢聲金圖騰華玉曆波掩下氓炎躔上漢臣沿莩締寵誠兼親屏禮升之日守官楚甸不獲勉躬儲外奉揣行間魂泣江郊心泫京國不任悲仰哽慰之情本集建平王慶王太后正位章上書王太后殿下伏承以令日淑辰曾光樞景慶芬祗外禮蔚寰中中射臣聞道懋第昌業廣祉盛藻秩攸臻憲章斯飾伏惟殿下柔明固天夙資龔懿芬蕙翔聲端簡散譽冠采摯妊騰耀徽姒丹陵蘊德玄丘棲聖煙熅國牒衍溢民聽涵道席教且詠且洽臣忝任蕃圉無由隨例闕廷不勝荒情本集建平王慶江皇后正位章上書皇后殿下伏承以嘉月蕙時膺曜宸正翠珩照品褕組在飾休遍函夏譽殷靈昧中謝伏惟殿下嶽曜靜德式懷謙順升降圖傳左右詩史夙鍾茂資早摛芳訓故以騰馥祕閨寫問中帷今靈緯載升崇正輝典衍教紫庭麗軌華屋聲激綺組風偃家邦黎玄湊仁雲祗宅慶遠邇有聞莫不傾渥臣限外任無由恭列軒屏不勝荒情本集藝文類聚十五初學記十蕭領軍拜侍中刺史章上書皇帝陛下即日詔書以臣為侍中驃騎大將軍開府儀同三司班劍三十人等持節都督如故峻命在庭光册充軒虹驂聳服朱轙佇蓋夤對以懅心影若傾中謝臣功乏至道不足以題象魏績非振民無可以書廟閣半漏未晏中鍾而驚實忌徵庸超乘盛服竊疑國寵頓萃末躬今寰海順典瓊都咸光調御惟新鎔製就始良宜整變憲經詮明典緯九河式耀三辰載晰不悟陛下皇靈曲溢大賚斯降而鴻賞之行乃於臣始非所以騰振遙風激昂品流輿人之誦具聞其黷頻露慊祈未阻鑒順今使虔禮青軒謹躬丹墀憂符怵怡慚屬兼軫不任屏營之情本集蕭拜相國齊公十郡九錫章殊命寶典鬱降雲天采昭軒騎光流城禦震驚華禮神氣交越中謝臣才謝深英器慚遠度進寡兵車召陵之盟退靡朝歌河內之會無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼況納陛朱戶事絶群班金璽緑綬儀參鴻典聞命屏營以憂以墜近申微款日月之鑒既阻方懼難慊蘭芳之旨愈峻遂致百辟卿后踟蹰於衛闕鑾輅旗旗方幸於臣府悵然遙慮將貽厚戾文章徒單迄無蠲省而天威咫尺丹懷罔固輒肅恭文物翹拜榮禮違距以深追增怵迫德輶寵盛於斯為徵非臣鄙虛所能酬對本集
