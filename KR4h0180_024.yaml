body:
  text: 蕭子暉冬草賦有閑居之蔓草獨幽隱而羅生對離披之苦節反蕤葳而有情若夫火山滅焰湯泉沸瀉日悠揚而少色天陰霖而四下於時直木先摧曲蓬多隕眾芳摧而萎絕百卉颯以徂盡未若茲草凌霜自保挺秀色於冰塗厲貞心於寒道已矣哉徒撫心其何益但使萬物之後凋夫何獨知於松柏蓺文類聚八十一反舌賦彼陶嘉之盛月氣依遲於池沼眷霏霏之花落愛翹翹之令鳥無榮辱之可因弄樞機而自表爾其聲也嘹唳罥結鬱抑縈咽繁音瑣碎眾響攢巀或急囀赴機或緩引趨節或洪纖共起或長短俱折意疑續而更斷謂當舉而忽垂聲憑林而逾厲響因風而益危蓺文類聚九十二荅釋法雲書難范縝神滅論辱告并伏見敕荅臣下審神滅論性與天道稱謂理絕曠劫多幸猥班妙訓接足頂受歡敬載懷竊謂神道寂寞法海難邊是以智積麻葦而未測識了色塵而猶昧豈其庸末所能激仰然自慧雲東漸寶舟南濟歲序綿長法音流遠明君良宰雖世能宗服至於躬挹玄源親體妙極者竟未聞焉是使兩諦八解獨闕皇言九部三藏偏蕪國學嗚呼可為歎息者也竊尋神滅之起則人出樓伽經名衛世雖義屈提婆而餘俗未弭故使群疑異學習以成見若不稟於先覺實終累於後生道濟天下機洞無方虎觀與龍宮并閱至德與實相齊導故能符俗教而諦真道即孝享以弘覺性照此困蒙拔茲疑網雖復牟尼之柔軟巧說孔文之博約善誘曷以喻斯巍巍乎十善已行金輸何遠法師稟空慧於曠生習多聞於此運法輪轉而八部雲會微言發而天人攝受故能播誡香於鳳闈藻覺華於宸側信矣哉能以佛道聲令一切聞者也弟子無記識藏不逮孔門雖願朝聞終慚吝薄庶緣無盡之法兼利人我耳疾塞甫爾心慮惛悸謹力裁白不識詮次傾遲諮展親承至教也弟子蕭眕素頓首和南弘明集十諫納侯景表臣抱患私門竊聞侯景以渦陽敗績隻馬歸命陛下不悔前禍復敕容納臣聞凶人之性不移天下之惡一也昔呂布殺丁原以事董卓終誅董而為賊劉牢反王恭以歸晉還背晉以構妖何者狼子野心終無馴狎之性養獸之諭必見飢噬之禍侯景獸之心種鳴鏑之類以凶狡之才荷高歡翼長之遇位忝台司任居方伯然而高歡墳土未乾即還反噬逆力不逮乃復逃死關西宇文不容故復投身於我陛下前者所以不逆細流正欲以屬國降胡以討匈奴冀獲一戰之效耳今既亡師失地直是境上之匹夫陛下愛匹夫而棄與國之好臣竊不取也若國家猶待其更鳴之晨歲暮之效臣竊惟侯景必非歲暮之臣棄鄉國如脫屣背君親如遺芥豈知遠慕聖德為江淮之純臣事跡顯然無可致惑一隅尚其如此觸類何可具陳臣朽老疾侵不應輒干朝政但楚囊將死有城郢之忠衛魚臨亡亦有屍諫之節臣忝為宗室遺老敢忘劉向之心伏願天慈少思危苦之語梁書蕭介傳嗣君廟見議竊聞祗見厥祖義著商書朝于武宮事光晉冊豈有正位居尊繼業承天而不虔敬祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭於祖考告嗣位也又篇曰閔予小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之喪將始即政朝於廟也則隆周令典煥炳經記體嫡居正莫若成王又二漢由太子而嗣位者西京七主東都四帝其昭成哀和順五君並皆謁廟文存漢史其惠景武元明章六君前史不載謁事或是偶有闕文理無異說議者乃云先在儲宮已經致敬卒哭之後即親奉時祭則是廟見故無別謁之禮竊以為不然儲后在宮亦從郊祀若謂前虔可兼後敬開元之始則無假復有配天之祭矣若以親奉時祭仍為廟見者自漢及晉支庶嗣位並皆謁廟既同有蒸嘗何為獨修繁禮且晉成帝咸和元年改號已謁廟咸康元年加元服又更謁夫時非異主猶不疑二禮相因況位隔君臣而追以一謁兼敬宜遠纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國南齊書禮志上永泰元年有司奏應廟見不尚書令徐孝嗣以為無廟見之文左丞蕭琛議奏可郎官緩杖密啟郎有杖起自後漢尒時郎官位卑親主文案與令史不異故郎三十五人令史二十人是以古人多恥為此職自魏晉以來郎官稍重今方參用高華吏部又近於通貴不應官高昔品而罰遵曩科所以從來彈舉雖在空文而許以推遷或逢赦恩或入春令便得悉停宋元嘉大明中經有被罰者別由犯忤主心非關常準自泰始建元以來未經施行事廢已久人倩未習自奉敕之後已行倉部郎江重欣杖督五十皆無不人懷慚懼兼有子弟成長彌復難為儀適其應行罰可特賜輸贖使與令史有異以彰優緩之澤南史十八蕭琛傳齊明帝用法嚴峻尚書郎坐杖罰者皆即科行琛乃密啟帝從之荅釋法雲書難范縝神滅論弟子琛和南辱告伏見敕旨所答臣下審神滅論妙測機神發揮禮教實足使淨法增光儒門敬業物悟緣覺民思孝道人倫之本於茲益明詭經亂俗不撝自壞誦讀藻抃頂戴不勝家弟闇短招愆今在北理公私煎懼情慮震越無以仰讚洪謨對揚精義奉化聞道伏用竦怍眷獎覃示銘佩仁誘弟子蕭琛和南弘明集十難范縝神滅論內兄范子縝著神滅論以明無佛自謂辯摧眾口日服千人予意有惑焉聊欲薄其稽疑詢其未悟論至今所持者形神所誦者精理若乃春秋孝享為之宗廟則以為聖人神道設教立禮防愚杜伯關弓伯有被介復謂天地之閒自有怪物非人死為鬼如此便不得詰以詩書校以往事唯可於形神之中辯其離合脫形神一體存滅罔異則范子奮揚蹈厲金湯邈然如靈質分途興毀區別則予剋敵得儁能事畢矣又予雖明有佛而體佛不與俗同爾兼陳本意係之論左焉問曰子云神滅何以知其滅邪答曰神即形也形即神也是以形存則神存形謝則神滅也問曰形者無知之稱神者有知之名知與無知即事有異神之與形理不容一形神相即非所聞也答曰形者神之質神者形之用是則形稱其質神言其用形之與神不得相異凡問答並縝原論難為琛辭難曰今論形神合體則應有不離之證而直云神即形形即神形之與神不得相異此辯而無徵有乖篤喻矣予今據夢以驗形神不得共體當人寢時其形是無知之物而有見焉此神遊之所接也神不孤立必憑形器猶人不露處須有居室但形氣是穢闇之質居室是蔽塞之地神反形內則其識微惛惛故以見為夢人歸室中則其神暫壅壅故以明為昧夫人或夢上騰玄虛遠適萬里若非神行便是形往邪形既不往神不弗離復焉得如此若謂是想所見者及其安寐身似僵木氣若寒灰呼之不聞撫之無覺既云神與形均則是表裏俱勌既不外接聲音寧能內興思想此即形靜神馳斷可知矣又疑凡所夢者或反中詭遇或理所不容或先覺未兆或假借象類或即事所無或乍驗乍否此皆神化茫渺幽明不測易以約通難用理檢若不許以神遊必宜求諸形內恐塊爾潛靈外絕覲覿雖復扶以六夢濟以相因理亦不得然也問曰神故非質形故非用不得為異其義安在答曰名殊而體一也問曰名既已殊體何得一答曰神之於質猶利之於刃形之於用猶刃之於利利之名非刃也刃之名非利也然而捨利無刃捨刃無利未聞刃沒而利存豈容形亡而神在難曰夫刃之有利砥礪之功故能水截蛟螭陸斷兕虎若窮利盡用必摧其鋒鍔化成鈍刃如此則利滅而刃存即是神亡而形在何云捨利無刃名殊而體一邪刃利既不俱滅形神則不共亡雖能近取譬理實乖矣問曰刃之與利或如來說形之與神其義不然何以言之木之質無知也人之質有知也人既有如木之質而有異木之知豈非木有其一人有其二邪答曰異哉言乎人若有如木之質以為形又有異木之知以為神則可如來論也今人之質質有知也木之質質無知也人之質非木質也木之質非人質也安在有如木之質而復有異木之知問曰人之質所以異木質者以其有知耳人而無知與木何異答曰人無無知之質猶木無有有知之形問曰死者之形骸豈非無知之質也邪答曰是無知之質也問曰若然者人果有如木之質而有異木之知矣答曰死者猶如木之質而無異木之知生者有異木之知而無如木之質問曰死者之骨骼非生者之形骸邪答曰生形之非死形死形之非生形區已革矣安有生人之形骸而有死人之骨骼哉問曰若生者之形骸非死者之骨骼死者之骨骼則應不由生者之形骸不由生者之形骸則此骨骼從何而至答曰是生者之形骸變為死者之骨骼也問曰生者之形骸雖變為死者之骨骼豈不因生而有死則知死體猶生體也答曰如因榮木變為枯木枯木之質寧是榮木之體問曰榮體變為枯體枯體即是榮體如絲體變為縷體縷體即是絲體有何咎焉答曰若枯即是榮榮即是枯則應榮時凋零枯時結實又榮木不應變為枯木以榮即是枯故枯無所復變也又榮枯是一何不先枯後榮要先榮後枯何也絲縷同時不得為喻問曰生形之謝便應豁然都盡何故方受死形綿歷未已邪答曰生滅之體要有其次故也夫欻而生者必欻而滅漸而生者必漸而滅欻而生者飄驟是也漸而生者動植是也有欻有漸物之理也難曰論云人之質有知也木之質無知也豈不以人識涼燠知痛痒養之則生傷之則死邪夫木亦然矣當春則榮在秋則悴樹之必生拔之必死何謂無知今人之質猶如木也神留則形立神去則形廢立也即是榮木廢也即是枯木子何以辯此非神知而謂質有知乎凡萬有皆以神知無以質知者也但草木蜆蟲之性裁覺榮悴生死生民之識則通安危利害何謂非有如木之質以為形又有異木之知以為神邪此則形神有二居可別也但木稟陰陽之偏氣人含一靈之精照其識或同其神則異矣骨骼形骸之論死生授受之說義既前定事又不經安用曲辯哉問曰形即神者手等亦是神邪答曰皆是神分問曰若皆是神分神應能慮手等亦應能慮也答曰手等有痛痒之知而無是非之慮問曰知之與慮為一為異答曰知即是慮淺則為知深則為慮問曰若爾應有二慮慮既有二神有二乎答曰人體惟一神何得二問曰若不得二安有痛癢之知而復有是非之慮答曰如手足雖異總為一人是非痛癢雖復有異亦總為一神矣問曰是非之慮不關手足當關何也答曰是非之慮心器所主問曰心器是五臟之心非邪答曰是也問曰五臟有何殊別而心獨有是非之慮答曰七竅亦復何殊而所用不均何也問曰慮思無方何以知是心器所主答曰心病則思乖是以知心為慮本問曰何知不寄在眼等分中邪答曰若慮可寄於眼分眼何故不寄於耳分問曰慮體無本故可寄之於眼分眼自有本不假寄於他分答曰眼何故有本而慮無本苟無本於我形而可遍寄於異地亦可張甲之情寄王乙之軀李丙之性託趙丁之體然乎哉不然也難曰論云形神不殊手等皆是神分此則神以形為體體全即神全體傷則神缺矣神者何識慮也今人或斷手足殘肌膚而智思不亂猶孫臏刖趾兵略愈明膚浮解腕儒道方謐此神與形離形傷神不害之切證但神任智以役物託器以通照視聽香味各有所憑而思識歸乎心器譬如人之有宅東閣延賢南軒引景北牖招風西櫺映月主人端居中霤以收四時之用焉若如來論口鼻耳目各有神分一目病即視神毀二目應俱盲矣一耳疾即聽神傷兩耳俱應聾矣今則不然是知神以為器非以為體也又云心為慮本慮不可寄之他分若在於口眼耳鼻斯論然也若在於他心則不然矣耳鼻雖共此體不可以相雜以其所司不同器用各異也他心雖在彼形而可得相涉以其神理俱妙識慮齊功也故書稱啟爾心沃朕心詩云他人有心予忖度之齊桓師管仲之謀漢祖用張良之策是皆本之於我形寄之於他分何云張甲之情不可託王乙之軀李丙之性勿得寄趙丁之體乎問曰聖人之形猶凡人之形而有凡聖之殊故知形神之異矣答曰不然金之精者能照穢者不能照能照之精金寧有不照之穢質又豈有聖人之神而寄凡人之器亦無凡人之神而託聖人之體是以八彩重瞳勛華之容龍顏馬口軒皞之狀此形表之異也比干之心七竅並列伯約之膽其大如拳此心器之殊也是以知聖人區分每絕常品非惟道革群生乃亦形超萬有凡聖均體所未敢安問曰子云聖人之形必異於凡敢問陽貨類仲尼項籍似虞帝舜項孔陽智革形同其故何邪答曰珉似玉而非玉鶋類鳳而非鳳物誠有之人故宜爾項陽貌似而非實以心器不均雖皃無益也問曰凡聖之殊形器不一可也聖人圓極理無有二而丘旦殊姿湯文異狀神不係色於此益明答曰聖與聖同同於聖器而器不必同也猶馬殊毛而齊逸玉異色而均美是以晉棘楚和等價連城驎騮盜驪俱致千里問曰形神不二既聞之矣形謝神滅理固宜然敢問經云為之宗廟以鬼饗之何謂也答曰聖人之教然也所以從孝子之心而厲渝薄之意神而明之此之謂矣問曰伯有被甲彭生豕見墳素著其事寧是設教而已邪答曰妖怪茫茫或存或亡強死者眾不皆為鬼彭生伯有何獨能然乍人乍豕未必齊鄭之公子也問曰易稱故知鬼神之情狀與天地相似而不違又曰載鬼一車其義云何答曰有禽焉有獸焉飛走之別也有人焉有鬼焉幽明之別也人滅而為鬼鬼滅而為人則吾未知也難曰論云豈有聖人之神而寄凡人之器亦無凡人之神而託聖人之體今陽貨類仲尼項籍似帝舜即是凡人之神託聖人之體也珉玉鶋鳳不得為喻今珉自名珉玉實名玉鶋號鶢鶋鳳曰神鳳名既殊稱皃亦爽實今舜重瞳子項羽亦重瞳子非有珉玉二名唯覩重瞳相類又有女媧蛇軀皋陶馬口非直聖神入於凡器遂乃託於蟲畜之體此形神殊別明暗不同茲益昭顯也若形神為一理絕前因者則聖應誕聖賢必產賢勇怯愚智悉類其本既形神之所陶甄一氣之所孕育不得有堯睿朱嚚瞍頑舜聖矣論又云聖同聖器而器不必同猶馬殊毛而齊逸今毛復是逸氣邪馬有同毛色而異駑駿者如此則毛非逸相由體無聖器矣人形骸無凡聖之別而有貞脆之異故遐靈栖於遠質促神寓乎近體唯斯而已耳向所云聖人之體指直語近舜之形不言器有聖智非矛盾之說勿近於此惑也問曰知此神滅有何利用答曰浮屠害政桑門蠹俗風驚霧起馳蕩不休吾哀其弊思拯其溺夫竭財以趣僧跛產以趨佛而不恤親戚不憐窮匱者何也良由厚我之情深濟物之意淺是以圭撮涉於貧友吝情動於顏色千鍾委於富僧歡懷暢於容髮豈不以僧有多稌之期友無遺秉之報務施不關周給立德必於在己又惑以茫昧之言懼以阿鼻之苦誘以虛誕之辭欣以兜率之樂故捨逢掖襲橫衣廢俎豆列瓶鉢家家棄其親愛人人絕其嗣續至使兵挫於行閒吏空於官府粟罄於情游貨殫於土木所以姦宄弗勝頌聲尚擁惟此之故也其流莫已其痛無垠若知陶甄稟於自然森羅均於獨化忽焉自有怳爾而無來也不禦去也不追乘夫天理各安其性小人甘其壟畝君子保其恬素耕而食食不可窮也蠶以衣衣不可盡也下有餘以奉其上上無為以待其下可以全生可以養親可以為己可以為人可以匡國可以霸君用此道也難曰佛之有無寄於神理存滅既有往論且欲略言今指辯其損益語其利害以弼夫子過正之談子云釋氏蠹俗傷化費貨損役此惑者為之非佛之尤也佛之立教本以好生惡殺修善務施好生非止欲繁育鳥獸以人靈為重惡殺豈可得緩宥逋逃以哀矜斷察修善不必瞻丈六之形以忠信為上務施不苟使殫財土木以周給為美若悉絕嗣續明必法種不傳如並起浮圖又亦播殖無地凡人且猶知之況我慈氏寍樂爾乎今守株桑門迷瞀俗士見寒者不施之短褐遇餒者不錫以糠豆而競聚無識之僧爭造眾多之佛親戚棄而弗眄祭祀廢而弗修良繒碎於剎上丹金縻于塔下而謂為福田期以報業此並體佛末深解法不妙雖呼佛為佛豈曉歸佛之旨號僧為僧寧達依僧之意此亦神不降福予無取焉夫六家之術各有流弊儒失於僻墨失於蔽法失於峻名失於訐咸由祖述者失其傳以致泥溺今子不以僻蔽誅孔墨峻訐責韓鄧而獨罪我如來貶茲正覺是忿風濤而毀舟楫也今悖逆之人無賴之子上罔君親下虐儔類或不忌明憲而乍懼幽司憚閻羅之猛畏牛頭之酷遂悔其穢惡化而遷善此佛之益也又罪福之理不應殊於世教背乎人情若有事君以忠奉親惟孝與朋友信如斯人者猶以一眚掩德蔑而棄之裁犯蟲魚陷於地獄斯必不然矣夫忠莫踰於伊尹孝莫尚於曾參若伊尹宰一畜以膳湯曾子烹隻禽以養點而皆石趨炎鑊俱赴鋒樹是則大功沒於小過奉上反於惠下昔彌子矯駕猶以義弘免戮嗚呼曾為靈匠不如衛君乎故知此為忍人之防而非仁人之誡也若能鑒彼流宕亹不在佛觀此禍福識悟教誘思息末以尊本不拔本以拯未念忘我以宏法不後法以利我則雖曰未佛吾必謂之佛矣弘明集九答釋法雲書難范縝神滅論惠示敕答臣下審神滅論披覽未周情以抃悅主上凝神天縱將聖多能文奧不刊辭溢繫表義證周經孝治之情爰著旨該釋典大慈之心彌篤謹置之座隅陳之机枕寢興鑽閱永用書紳班示不遺戢眷良厚弟子蕭靡和南弘明集十螢火賦聊披書以娛性悅草螢之夜翔乍依欄而回亮或傍牖而舒光或翔飛而暫隱時淩空而更颺竹依窗而度影蘭因風而送香此時逸趣方遒良夜淹留眺姮娥之澄景觀熠燿之群遊類乾沙之飛火若清漢之星流入元夜而光淨出明燈而色幽時臨池而汎影與列宿而俱浮覺更籌之稍竭見微光之漸收爾其斜月西傾獨照蓬楹矚曙河之低漢聞伺廟之遠聲望落星之掩色見晨禽之曉征悲扶桑之吐曜翳微軀而不明寫余襟其未盡聊染翰以書情初學記三十拾遺記序拾遺記者晉隴西安陽人王嘉字子年所撰凡十九卷二百二十篇皆為殘缺當偽秦之季主綱遷號五都淪覆河洛之地沒為戎墟宮室榛蕪書藏堙毀荊棘霜露豈獨悲於前主鞠為禾黍彌深嗟於茲代故使典章散滅黌館焚埃皇圖帝冊殆無一存故此書多有亡敗文起羲炎已來事訖西晉之末五運因循十有四代王子年乃搜撰異同而殊怪必舉紀事存朴愛廣向奇憲章稽古之文綺綜編雜之部山海經所不載夏鼎未之或存乃集而記矣辭趣過誕音旨迂闊推理陳迹恨為繁𤕠多涉禎祥之書博采神仙之事妙萬物而為言蓋絕世而弘博矣世德陵夷文頗缺略綺更刪其繁紊紀其實美搜刊幽祕捃采殘落言匪浮詭事弗空誣推詳往迹則影徹經史考驗真怪則叶附圖籍若其道業遠者則辭省朴素世德近者則文存靡麗編言貫物使宛然成章數運則與世推移風政則因時迴改至如金繩鳥篆之文玉牒蟲章之字末代流傳多乖曩跡雖探研鐫寫抑多疑誤及言乎政化訛乎禎祥隨代而次之土地山川之域或以名例相疑草木鳥獸之類亦以聲狀相惑隨所在而區別或因方而釋之或變通而會其道寧可采於一說今搜檢殘遺合為一部凡一十卷序而錄焉拾遺記
