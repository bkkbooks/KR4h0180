body:
  text: 孫謙誡外孫荀匠主上以孝治天下汝行過古人故發明詔擢汝此職非唯君父之命難拒故亦揚名後世所顯豈獨汝身哉梁書荀匠傳臨終遺命吾少無人閒意故自不求聞達而仕歷三代官成兩朝如我資名或蒙贈諡自公體耳氣絶即以幅巾就葬每存儉率比見轜車過精非吾志也士安束以蘧蒢壬孫倮入后地雖是匹夫之節取于人情未允今使棺足周身壙足容棺旐書爵里無曰不然旒表命數差可停息直僦轜床裝之以䉬以常所乘者為魂車他無所用南史孫謙傳與沈約書辭表薦名者實之賓本所不庶中央無心空勤南北為惠反凶將在於斯南史七十六沈麟士傳答張永使者辭功曹明府德屨沖素留心山谷民是以被褐負杖忘其疲病必欲飾混沌以蛾眉冠越客以蟬冕走雖不敏請附高節有蹈東海而死耳未忍受此黥劓引沈麟士別傳沈氏述祖德碑沈莫盛于吳興始吾祖戎建大勳辭顯秩繇江北避地居吳之餘不鄉其卒也於永平元年葬鄉之金鼇山時有金鵝飛集三鳴而去童謠曰金鵝鳴沈氏興代代出公卿遂更名其山曰金鵝夫天發物祥人應歌詠繇來之數厥非偶然蓋由沈氏積善纍行肇基既遠而戎祖盛德大業足以纘先緒光祖宗感天祐昌後嗣故吉祥之事動而先見耳沈本姬姓自帝嚳之妃姜嫄踐巨人跡而生后稷樹藝五穀開粒食之源貽萬世之利書曰后稷播種蒸民而粒是也傳棨璽叔望裔不窟生鞠鞠生公劉復修后稷之業百姓懷之子慶節國于豳繼皇僕差弗毀隃公非辟方高圉侯牟亞圉雲都組紺諸及古公亶父篤于仁義避狄遷岐民皆舍故土而歸之古公傳王季文王聖化普被歸命者四十國孔子曰周之德其可謂至德也已矣逮武王受命其同母弟聃季載乃文王十子也有才德為司空寺于汝南平輿之沈亭為沈子國沈氏得姓實始諸此聃季卒子伯桓立伯桓卒子坰立坰卒子采立采卒子乙初立乙初卒子蘇立蘇卒無嗣弟杼承統杼之子庚向壬局而庚向入為周卿勤于王事仍封其子忽于沈忽卒子不離立不離卒子辛生立辛生卒子已濟立已濟卒子遇立遇卒子楫立楫卒子德胤立德胤卒子鯆立鯆卒子逞立年尚幼周敬王元年吳伐之奔楚子嘉立以不赴召陵之會晉怒使蔡人滅其國自聃季至嘉歷世十八國雖小弱然率忠厚鮮有兵革之警嘉生尹丙尹戌才略傑出精於兵機入楚為令尹戌生諸梁字子高有五虎之威九牛之力怒髮強鬚摧鋒敢戰楚封為葉公生茂春及尹射尹文茂春襲葉爵傳葉氏族尹射生尹赤尹未隱華山尹文生隨楚內史司戶參軍隨生永中乙奇永中生猶行受業於曾子之門仕齊衛大夫猶行生安仁安仁生同俱齊大夫居武城同生郢有才名秦始皇併天下詔封丞封辭徙江南郢生平平生祖祖生保漢文帝以征蠻功封竹邑侯保生遵太子太傅敷德侯家九江之壽春遵生達及逵達為驃騎將軍生乾拜尚書令乾生南陽太守弘弘生河南郡守昂及勖昂生御史中丞奮奮生將作大匠子恪恪生尚書關內侯諫及謙謙生靖濟陰太守諫生戎字威卿初為光祿勳以九江從事遷濟陽太守時尹良逆命戎不煩兵甲往諭降之光武錫茅海昏侯辭不受因居吳興子孫蕃衍育秀産靈凡金鵝鄉之沈皆出于祖戎德文並著輝映後先戎子酆字聖通零陵太守有善政芝草生黃龍見次曰禮尚書令酆子侍御史景字孟高安平相滸字仲高帝以景端鯁清直遷相河閒王捕諸奸佞導王以禮帝賜衣一襲以嘉之景子荊州刺史彥彥子湘東守文淶淶子海陽令夔夔子瀾瀾子充充子徑官揚威將軍死節不屈朝廷嘉其忠贈東陽太守徑子大長秋赤黥及吏部尚書嘉赤黥長子膺期晉大中大夫中子叔任益州刺史少子說道梓潼太守嘉子發散騎常侍次子坰車騎將軍膺期生四子長慶之纍建大功加始興公贈司空次虔之為樂安令居官清素民皆德之之嶽次峻並文名冠世峻為西臺學士其他支派咸昌名人代有照耀史策統而舉之或遠引高蹈或致君澤民或立言垂範或折衝禦侮或孝友于家庭或忠節殉國難沈氏之興莫是過也斯豈非戎祖盛德垂統之所致歟宋元嘉三年伯父叔兄輩侍中懷文貞公演之襄公慶之樂安令虔之參軍璞之新寧男融之吏部尚書曇慶五兵尚書懷明光祿大夫孟頲征西長史叔仁等念祖德不忘表請于朝誥曰東漢故臣沈戎沈國嫡系世有善行才智兼長忠義自矢遂敢身入虎穴諭以至誠一矢不加逆子格面茅社之錫用以旌功乃國難既夷掛冠遠遁捨故宅為佛寺棄封侯如脫屣進不為身退不為名忠上潔己邦家之光沈氏積善唯戎述之可追封為述善侯併敕其所捨寺曰懷德寺嗚呼戎祖之德久而彌彰矣夫人于利害之關富貴之際見不透決不力避難苟祿死無得稱以視戎祖為何如邪是知叶祥于天人而昭顯于嗣裔贈爵于後王皆繇德也麟士自愧固陋雅志林泉緝古人之遺書考先世之德業竊恐前徽或湮後昆罔繼故述其大凡勒之墓側以志不忘云時大梁天監癸未春三月吉旦湖録金石考四終制遺令氣絶剔被取三幅布以覆尸及斂仍移布於尸下以為斂服反被左右兩際以周上不復製覆被不須沐浴唅珠以米裙衫筅著褌凡二服上加單衣幅巾履枕棺中唯此依士安用孝經既殯不復立靈座四節及祥權鋪席於地以設玄酒之奠人家相承漆棺今不復爾亦不須旐成服後即葬作冢令小後祔便作小冢於濱口合葬非古也冢不須聚土成墳使上與地平王祥終制亦爾不須轜車靈舫魌頭也不得朝夕下食祭奠之法至於葬唯清水一杯南史七十六沈麟士傳南郊明堂異日議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲于郊先儒以為先甲三日辛後甲三日丁可以接天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則理應郊堂南齊書禮志上永明二年牛埭稅格議尋始立牛埭之意非苟逼僦以納稅也尚當以風濤汛險人力不捷屢致膠溺濟急利物耳既公私是樂所以輸直無怨京師航渡即其例也而後之監領者不達其本各務已功互生理外或禁遏別道或空稅江行或撲船倍價或力周而猶責凡如此類不經埭煩牛者上詳被報格外十條並蒙停寢從來喧訴始得暫弭案吳興頻歲失稔今茲尤饉去之從豐良由饑棘或徵貨貿粒還拯親纍或提攜老弱陳力糊口埭司責稅依俗弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振廩蠲調而元懿幸災榷利重增困瘼人而不仁古今共疾且比見加格置市者前後相屬非惟新加無贏竝皆舊格猶闕愚恐元懿今啓亦當不殊若事不副言懼貽譴詰便百方侵苦為公賈怨元懿稟性苛刻已彰往效任以物土譬以狼將羊其所欲舉腹心亦當虎而冠耳書云與其有聚斂之臣寧有盜臣此言盜公為損蓋微斂民所害乃大也今雍熙在運草木含澤其非事宜仰如聖旨然掌斯任者應𥳑廉平廉則不竊於公平則無害於民矣愚又以便宜者蓋謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地者也率皆即日不宜於民方來不便於公名與實反有乖政體凡如此等誠宜深察山陰一縣課戶二萬其民資不滿三千者殆將居半刻又刻之猶且三分餘一凡有資者多是士人復除其貧極者悉皆露戶役民三五屬官蓋惟分定百端輸調又則常然比衆局檢校首尾尋續橫相質纍者亦復不少一人被攝十人相追一緒裁萌千孽互起蠶事弛而農業廢賤取庸而貴舉責應公贍私日不暇給欲無為非其可得乎死且不憚矧伊刑罰身且不愛何況妻子是以前檢未窮後巧復滋網辟徒峻猶不能悛竊尋民之多僞實由宋季軍旅繁興役賦殷重不堪勤劇倚巧祈優積習生常逐迷忘反四海之大黎庶之衆心用參差難卒澄一化宜以漸不可疾責誠存不擾藏疾納汙實增崇曠務詳寬𥳑則稍自歸淳又被𥳑符前後年月久遠其事不存符旨既嚴不敢暗信縣𥳑送郡郡𥳑呈使殊形詭狀干變萬源聞者忽不經懷見者實足傷駭兼親屬里伍流離道路路轉寒涸事方未巳其士人婦女彌難厝衷不𥳑則疑其有巧欲𥳑復未知所安愚謂此條宜委縣𥳑保舉其綱領略其毛目囊漏不出貯中庶嬰疾沈痼者重荷生造之恩也又永興諸暨離唐寓之寇擾公私殘燼彌復特甚儻值水旱實不易思俗諺云會稽打鼓送恤吳興步檐令史會稽舊稱沃壤今猶若此吳興本是塉土事在可知因循餘斃誠宜改張治元懿今啓敢陳管見南齊書陸慧曉傳永明六年憲之為隨王東中郎長史行會稽郡太守時西陵戍主杜元懿啓牛埭稅格乞為官領攝世祖敕示會稽郡此詎是事宜可訪察即啓憲之議竝從之又見南史三十五咸淳臨安志八十九終制夫出生入死理均晝夜生既不知所從來死亦安識所往延陵所云精氣上歸於天骨肉下歸於地魂氣則無所不之良有以也雖復茫昧難徵要若非妄百年之期迅若馳隙吾今豫為終制瞑目之後念竝遵行勿違吾志也莊周淡臺達生者也王孫士安矯俗者也吾進不及達退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以粗布為使人勿惡也漢明帝天子之尊猶祭以杅水脯糗范史雲烈士之高亦奠以寒水乾飯況吾卑庸之人其可不節衷也喪易寧戚自是親親之情禮奢寧儉差可得由吾意不須常施靈筵可止設香燈使致哀者有憑耳朔望祥忌可權安小床暫設几席唯下素饌勿用牲牢蒸嘗之祠貴賤罔替備物難辦多致疏怠祠先人自有舊典不可有闕自吾以下祠止用蔬食時果勿同於上世也示令子孫四時不忘其親耳孔子云雖菜羹瓜祭必齊如也本貴誠敬豈求備物哉梁書顧憲之傳臨終為制以敕其子圍郢城議窮壁易守攻取勢難頓甲堅城兵家所忌誠宜大弘經略詢納群言軍主以下至於匹夫皆令獻其所見盡其所懷擇善而從選能而用不以人廢言不以多罔寡又須量我衆力度賊樵糧窺彼人情權其形勢若使賊人衆而食少故宜計日而守之食多而力寡故宜悉衆而攻之若使糧力俱足非攻守所屈便宜散金寶縱反閒使彼智者不用愚者懷猜此魏武之所以定大業也若三事未可宜思變通觀於人情計我糧穀若德之所感萬里同符仁之所懷遠邇歸義金帛素積糧運又充乃可以列圍寬守引以歲月此王翦之所以剋楚也若圍之不卒降攻之未可下閒道不能行金粟無人積天下非一家人情難可豫此則宜更思變計矣變計之道實資英斷此之深要難以紙宣輒布言於席衛尉特願垂採梁書夏侯詳傳車旗議齊德尚青五路五牛及五色幡旗竝宜以先青為次軍容戎事之所乘犧牲繭握之所薦竝宜悉依尚色三代服色以姓音為尚漢不識音故還尚有行運之色今既無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚南齊書輿服志永明初太子步兵校尉伏曼容議齊德尚青車旗先青次赤次白次黑軍容戎事宜依漢道行運之色因宋金根車而修玉輅畫輪金塗兩箱上望板前優游通緑金塗鏤鍱碧紋箱鑿鏤金簿帖兩箱外織成衣兩箱裏金塗鏤回釘玳瑁帖望板箱上帖金博山優游上和鑾立花趺銜給銀帶玳瑁筒優游下隱漆裏施金塗鏤回花釘織成文優游橫前施玳瑁帖金塗花釘金塗倒龍後損鑿銀玳瑁龜甲金塗花沓望板金塗受福望龍諸校飾軛及諸末皆螭龍首龍形板在車前銀帶花獸金塗受福緣裏邊鏤鍱玳瑁織成衣裏金塗鏤回花釘外金塗博山辟邪障鳳凰銜花升蓋金塗鏤鍱二十八爪支子花黃錦升衣復碧絹漆布緣油頂絳絲織成顏芚赭舌孔雀毛復綿緣紋隨陰懸諸珠蚌佩金塗鈴雲珠結綵綬雜色真孔雀眊一轅漆畫車衡銀花帶衡上金塗博山四鸞鳥立花趺銜鈴龍首銜軛插翟尾上下花沓絳線絲的望繩八丈旗有十二斿畫升龍竿首金塗龍銜大鄒幡真眊棨戟織成衣金塗沓駐織成衣金塗雁鏤鍱漆安立床在車中錦復黃紋為安立衣錦復黃紋障泥八幅長九尺緑紅錦芚帶織成花五輅江左丞相駕駟左右騑為六施絳絲遊銜繩其重轂二轄飛軨幡赤油金紫真眊左纛置左騑馬軛上金鍐方釳繁纓金塗紫皮帶真眊橫在馬膺前其鏤鍚皆如古制初加玉輅為重蓋樓寶鳳凰綴金鑷珠璫玉蚌珮四角金龍銜五采眊又麒麟頭加以綵畫馬首戴之通典六十四答釋法雲書難范縝神滅論猥垂班示至尊所答臣下審神滅論伏奉淵旨頓祛群疑天情獨照妙鑒懸覽故非凡愚所可鑽仰然常師管見亦竊懷往求今復稟承教義遠尋經旨重規疊矩信若符契法師宣揚睿理弘讚聖言方使二教同歸真俗一致預得餐沐誨誘陶染至化抃擊下風實兼舞蹈遲比咨覿乃盡襟誠臨白欣佩不知裁述伏𣈶呈宏明集十致徐勉書昔士德懷顧戀興數日輔嗣思友情勞一旬故知深心所係貴賤一也況復恩隆世親義重知己道庇生人德弘覆蓋而朝野懸隔山川邈殊雖咳唾時沾而顏色不覯東山之歎豈云旋復西風可懷孰能無思加以靜居廓處顧影莫酬秋風四起園林易色涼野寂寞寒蟲吟叫懷抱不可直置情慮不能無託時因吟詠動輒盈篇楊生沈鬱且猶覆盎惠子五車彌多踳駮一日聊呈小文不期過賞還逮隆渥纍牘兼翰紙縟字磨誦復無已徒恨許與過當有傷準的昔子建不欲妄讚陳琳恐見嗤哂後代今之過奢餘論將不有纍清談挺竄迹草萊事絶聞見藉以謳謠得之輿牧仰承有事砭石仍成簡通娛腸悅耳稍從擯落宴處榮觀務在滌除綺羅絲竹二列頓遣方丈員案三杯僅存故以道變區中情沖域外操彼絃誦賁茲觀損追留侯之卻粒念韓卿之辭榮眷想東都屬懷南嶽鑽仰來貺有符下風雖云幸甚然則未喻雖復帝道康寧走馬行卻由庚得所寅亮有歸悠悠之人展氏猶且攘袂浩浩白水寧叟方欲褰裳是知君子拯物義非徇己思與赤松子遊誰其克遂願驅之仁壽綏此多福雖則不言四時行矣然後黔首有庇薦紳靡奪白駒不在空谷屠羊豫蒙其賚豈不休哉豈不休哉昔杜真自閉深室郎宗絶迹幽野難矣誠非所希井丹高潔相如慢世尚復遊涉權門雍容鄉邑常謂此道為泰每竊慕之方念擁帚延思以陳侍者請至農隙無待邀求挺誠好屬文不會今世不能促節局步以應流俗事等昌菹謬彼偏嗜是用不羞固陋無憚龍門昔敬通之賞景卿孟公之知仲蔚止乎通人猶稱盛美況在時宗彌為未易近以蒲槧勿用箋素多闕聊效東方獻書丞相須得善寫更請潤訶儻逢子侯比復削牘梁書伏挺傳奏定朝直敕旨以軍旅務殷且停朝直竊謂匪懈于位義昭夙興國容舊典不可頓闕與兼右丞江詮等參議八座丞郎以下宜五日一朝有事郎坐侍下鼓無事許從實還外南齊書蕭穎胄傳和帝西臺即位左丞樂藹奏與竟陵王子良箋道德以可久傳聲風流以浸遠隳稱雖復青簡締芳未若玉石之不朽飛翰圖藻豈伊雕篆之無沫丞相沖粹表於天真淵照殆乎機象經邦緯民之範體國成務之規故以業茂惟賢功高則哲神輝眇邈睿算不追感纏奉車恨百留滯下官夙稟名節思義軫慕望隧結哀輒欲率荊江湘三州僚吏建碑壟首庶徽猷有述茂則方存昔子香淳德留銘江介巨平遺烈墮淚漢南況道尊前往惠積聯綿者哉下官今便反假無由躬事刊斫須至西州鳩集所資託中書侍郎劉繪營辦南齊書豫章王嶷傳與右率沈約書請撰豫章文獻王碑文夫道宣餘烈竹帛有時先朽德孚遺事金石更非後亡丞相獨秀生民傍照日月標勝丘園素履穆於忠義譽應華袞功迹著於弼諧無得而稱理絶照載若夫日用闃寂雖無取於錙銖歲功宏達諒有寄於衡石竊承貴州士民或建碑表俾我荊南閲感無地且作紀江漢道基分陜衣冠禮樂咸被後昆若其望碑盡禮我州之舊俗傾廛罷肆鄙士之遺風庶幾前烈或不泯墜荊江湘三州策名不少竝欲各率毫釐少申景慕斯文之託歷選惟疑必待文蔚辭宗德僉茂履非高明而誰豈能騁無愧之辭酬式瞻之望吾西州窮士一介寂寥恩周榮譽澤遍衣食永惟道廕日月就遠緬尋遺烈觸目崩心常謂福齊南山慶鍾仁壽吾儕小人貽塵帷蓋豈圖一旦遂投此請南齊書豫章王嶷傳齊書褚淵王儉贊淵既世族儉亦國華不賴舅氏遑恤國家梁書何點傳答皇太子啓胤性愛山泉情篤魚鳥而從鷗未狎入獸相驚兼年齒衰暮荒徑榛梗既無語稼之客寧有論書之賓緘默畎畝栖息丘壑秀水清潭於茲永已伏惟明察之德誕縱自天忠孝之規不待因習猶復留神六經降意百代同仁博古等物簉聞闢承華而延儒雅掃黃闥而列文學嘉美聿宣無思不勸胤無解歸之談屢蒙獎飾之重匪南皮之舊每荷存問之恩銜茲污朽罔知攸置藝文類聚三十七答釋法雲書難范縝神滅論炯和南辱所賜書并垂示答臣下審神滅論竊聞神其如在求前王而未測住其不移徙伏膺而曉鑽仰淵祕渙爾冰開故知紛綸聖跡不由一道參差動應本自因時今澆流已息無明將啓物有其機教惟斯發篤孝治之義明覺者之旨預有靈識誰不知慶豈炎昊所謂爭衡非軒唐所能競爽巍巍至德莫或可名昭然大道於斯為極何炯和南宏明集十庫部郎中何炯答入學無齒胄議參點並事宣尼回路同咨泗水鄒魯稱盛洙汶無譏師道既光得一資敬無虧亞二況於兩公而云不可隋書禮儀志四大同七年皇太子表其子寧國臨城公入學時議者以與太子有齒胄之義疑之侍中尚書令何敬容等以為云云制曰可答弟義宗書買猶未得云何巳賣南史第九弟義宗年少未有位宦居在雍州市邊富人姓向以見錢百萬欲埤義宗以妹適之義宗遣人送書竟陵咨景宗景宗題書後答之義宗貪鏹遂成婚焉答釋法雲書難范縝神滅論枉告所宣答神滅敕理周萬古旨包三世六趣長迷於此永悟五道恆疑曉若發蒙自非鑒窮八解照侔十號排罔逸俗安得如此奉佩書紳敢違寢食法師識踰有境學詣無生揄揚之善煥如東里披玩周環用忘所疾曹景宗白答宏明集十上齊高帝表陳讜言宋自大明以來漸見凋敝徵賦有增於往天府尢貧於昔兼軍警屢興傷夷不復戍役殘丁儲無半菽小民嗷嗷無樂生之色貴勢之流貨室之族車服伎樂爭相奢麗亭池第宅競趣高華至于山澤之人不敢採飲其水草貧富相輝捐源尚末陛下宜發明詔吐德音布惠澤禁邪僞薄賦斂省徭役絶奇麗之賂塞鄭衛之倡變曆運之化應質文之用不亦大哉又彭汴有鴟梟之巢青丘為狐兔之窟虐害踰紀殘暴日滋鬼泣舊泉人悲故壤童孺視編髮而慚生耆老看左衽而恥沒陛下宜仰答天人引領之望下弔氓黎傾首之勤授鉞衛霍之將遺策蕭張之師萬道俱前窮山蕩谷此即恆山不足指而傾渤海不足飲而竭豈徒殘寇塵滅而已哉南齊書顧歡傳榜郡門諸縣有疑滯者可就永寧令決梁書蕭景傳齊建武中遷永寧令政為百城最永嘉太守范述曾雅服景為政乃榜郡門
