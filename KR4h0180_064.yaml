body:
  text: 張纘秋雨賦霡霂興乎爽節膚寸起于曾岑乃娛情而悅體猶冬陽與夏陰褰南帷以寓目警北戶而披襟商律戒于茲辰涼雨感而已作甘泉集而溟溟油雲興而漠漠溫飆革于早暮炎涼改于今昨乍斜簷而上階或從風而灑幕周小庭而密下泫高枝而疏落淥池泛淡員波倏鑠低昂弱篠葳蕤叢薄藝文類聚二南征賦歲次娵訾月帷中呂余謁帝于承明將述職于南楚忽中川而反顧懷舊鄉而延佇路漫漫以無端情容容而莫與乃弭節歎曰人之寓于宇宙也何異夫栖蝸之爭戰附蚋之遊禽而盈虛倚伏俯仰浮沈矜榮華于尺景總萬慮于寸陰彼忘機于粹日乃聖達之明針妙品物于貞觀曾何足而繫心撫余躬之末迹屬興王之盛世蒙三欒之休寵荷通家之渥惠登石渠之三閣典校文乎六藝振長纓于承華眷儲皇之上睿居銜觴而接席出方舟以同濟彼華坊與禁苑常宵盤而晝憩思德音其在耳若清塵之未逝經二紀以及茲悲明離之永翳惟平生之褊能實有志于棲息慚滅汲之千里謝韓哀于八極如簑裘之代用譬輪轅之曲直愧周任之清規諒無取于陳力逢濯纓之嘉運遇井汲之明時懷君恩而未答顧靈瑣而依遲總端揆以居副長庶僚而稱師猶深泉之短綆若高墉而無基伊吾人之罪薄豈斯滿之能持奉皇命以奏舉方驅傳於衡疑遵夕宿以言邁戒晨裝而永辭行搖搖于南逝心眷眷而西悲爾乃橫濟牽牛傍瞻雉庫前觀隱脤郤視雲布追晉氏之啓戎覆中州之鼎祚鞠三川于茂草霑西京于朝露故黃旗紫蓋運在震方金陵之兆允符厥祥及歸命之銜璧爰獻璽于武王啓中興之英主宣十世而重光觀其內招人望外攘千紀草創江南締構基址豈徒能布其德主晉有祀雲漢作詩斯干見美而已哉乃得正朔相承于茲四代多歷年所三百餘載割疆埸于華戎拯生靈于宇內不被髮而左衽繄明德其是賚次臨滄之層巘尋叔寶之舊埏蘊珠玉之餘潤昭羅綺之遺妍懷若人之遠理豈喜慍其能遷雖魂理于百世猶映徹于九泉經法王之梵宇覩因時之或躍從四海之宅心故取亂而誅虐在蒼精之將季翦洪柯以銷落既觀蝎而逞刑又施獸而為謔候高烽以巧笑俟長星而歡噱何惵惵之黔首思假命其無託信人欲而天從爰物覩而聖作我皇帝膺籙受圖聰明神武乘舋而運席卷三楚師克在和仁義必取形猶積決應若飆舉于是殪桑林之封狶繳青丘之大風戢干戈以耀德肆時夏而成功放流聲于鄭衛屏豔質于傾宮配軒皇以邁迹豈商周之比隆化致升平于茲四紀六夷膜拜八蠻同軌教穆于上庠冤申于大理顯三光之照燭降五靈之休祉諒殊功于百王固無得而稱矣泝金牛之迅渚覩靈山之雄壯實江南之丘墟平雲霄而竦狀摽素嶺乎青壁葺赬文于翠嶂跳巨石以驚湍批衝巖而駭浪鏟千尋之峭岸潀萬流之大壑隱日月以蔽虧搏風煙而回薄崖映川而晃朗水騰光而倏爍積霜霰之往還鼓波濤之前郤下流沫以洊險上岑崟而將落聞知命之是虞故違風而靡託訊會骸之詭狀云怒特之來奔及漁人之垂餌沈潛鎖于洪源鑒幽塗于忠武馳四馬之高軒不語神以徵怪情存之而勿論曬姑熟之舊朔訪遺迹兮宣武挾仲謀之雄氣朝委裘而作輔歷祖宗之明君猶負芒于盛主勢傾河以覆岱威回天而震宇雖明允之篤誠在伊稷而未舉矧有功而無志豈季葉其能處懼貽笑于文景憂象賢之覆餗雖苞櫱以代興終夷宗而殄族彼儋石之贏儲尚邀之而俟福況神明之大寶乃暗干于天祿造扃鍵之候司發傳書于關尉據轘轅乎伊洛守衡津于河渭無矯且以招賓闕捐繻而待貴實祗敬于王典懷鞠躬而屏氣惟函谷之襟帶疑武庫之精兵採風謠于往昔聞乳獸于寧成在當今而簡易止譏鑒其姦情陋文仲之廢職鄙耐門之食征于是近睇赭岑遙瞻鵲岸島嶼蒼茫風雲蕭散屬時雨之新晴觀百川之浩涆水泓澄以暗夕山參差而辨旦忽臨睨于故鄉眇江天其無畔遡回流而右阻遵長薄而左貫獨向風以舒情搴芳洲其誰玩息銅山而繫纜訪叔文之靈宇得舊名而猶存皆攢蕪而積楚想夫君之令問實有聲于前古拯巴漢之廢叢爰配名于鄒魯辨山精以息訟對祠星而寤主每撫事以懷人非末學其能覩嘉梅根之孝女尚乘肥于媵姬嗟吳人之重辟憂峻網于將貽彼沈瓜而顯義指滄波而為期此浮履以明節赴丹爓其何疑信理感而情悼實悽悵于余悲空沈吟以遐想愧邯鄲之妙詞望南陵以寓目美牙門之守志當晉師之席卷豈藩籬而不庇攜老弱于窮城猶區區乎一簣雖挈瓶之小善實君子之所識是謂事人之禮入雷池之長浦想恭岱之芳塵臨魚官以輟膳踐寒蒲之抽筠又有生為令德沒為明神或捐家事主攜手拜親或正身殉義哀感市人所以家稱純孝國號能臣揚清徽于上列並異世而為鄰發曉渚而遡風苦神吳之難習岸曜舟而不進水騰沙以驚急天曀曀其垂陰雨霏霏而來集愍征夫之勞瘁每搴帷而佇立由江沱之派別望彭匯之通津塗未中乎及絳日已盈于浹旬于是千流共歸萬嶺分狀倒景懸高浮天瀉壯清江洗滌平湖夷畼翻光轉彩出沒搖漾岷山嶓家悠遠寂寥青湓赤岸控汐引潮望歸雲之蓊蓊揚清風之飄飄界飛流干翠薄耿長虹于青霄若夫灌莽川涯層潭水府遊泳之所往還喧鳴之所攢聚群飛沙漲掩薄草渚奇甲異鱗雕文綷羽聽寡鶴之偏鳴聞孤鴻之慕侶在客行而多思獨傷魂而悽楚美中流之衝要因習坎以守固既因之而設險又居之而務德南通珠崖夜郎西款玉津華墨莫不內清姦宄外弭苛慝籬屏京師事有均于齊德也匡嶺以躊躇想霞裳于雲𠆮流姮娥之逸響發王子之清韻若夜光而可投豈榮華之難擯羡還丹其何術佇一丸于來信徑遵途乎鄂渚迹孫氏之霸基陳利兵而蓄粟抗十倍之鋭師在賢才之必用寧推誠而忍欺圖富強以法立屬貞臣而日嬉識徐基于江畔云釣臺之舊址方戰國之多虞猶從容而宴喜欽輔吳之忠諒歎仲謀之虛己處君臣而並得良致霸其有以伊文侯之雅望誠一代之偉人禰觀書以心服玉比德而譽均遘時雄之應運方協義以經綸名既逼而愈賞言雖聞而彌親惜勤王于延獻俾漢京之惟新何天命其弗與悲盛業之未申汛蘆洲以延佇聞伍員之所濟出懷珠而免讎歸投金以答惠彼無求于萬鍾唯長歌而鼓枻慨斯誠之未感乃沈軀以明誓空負恨其何追徒臨餐而先祭及旋師于鄭國美邀福于來裔入郢都而抵掌壯天險之難窺允分荊之勝略成百代之良規賈生方于指大應侯譬之木披所以居宗振末強本弱枝聞古今之通制歷盛衰而不移可不謂然與美經國之遠體也酌忠言于城郢播終古之芳猷忘我躬之匪閲顧社稷而懷憂服莊王之高義乃徵名於夏州恥蹊田之過罰納申叔之嘉謀觀巫臣之獻針鑒周書以明喻何自謀其多僻要桑中而遠赴若葆申之誅丹實匡君以成務在雨臣而優劣居二主其並裕臨赤崖而慷愾榷雄圖於魏武乘戰勝以長驅志吞吳而并楚總八州之毅卒期姑蘇而振旅時有便乎建瓴事無留于蕭斧霸孫赫其霆奮杖邁俗之英輔裂宇宙而三分誠決機乎一舉嗟玄德之矯矯思興復于舊京招臥龍于當世配管仲而稱英收散亡之餘弱結與國而連橫延五紀乎岷漢紹四百于炎精望巴丘以邅回遵洞庭而敞恍沈輕舟而不繫何靈胥之浩蕩眺君褊之雙峰徒臨風以增想償瑤觴而一酌駕彩霓而獨往爾乃南奠衡霍北距咀漳包括沅澧汲引瀟湘滮滮長邁漫漫回翔蕩雲沃日吐霞含光青碧潭嶼萬頃澄徹綺蘭從風素沙被雪雜雲霞以舒卷間河洲而斷絶回曉仄於中川起長飆而半滅稅遺構之舊浦瞻汩羅以隕泗豈懷寶而迷邦猶殷勤而一致蘊芳華以襞積非黨人之所媚合小雅之怨辭兼國風之美志譬彈冠而振衣猶自別于泥滓且殺身以成義寧露才而揚己悲先生之不辰逢椒蘭之妬美有驊騮而不馭焉遑遑于千里既踐境以思人彌流連其無卩修行潦之薄薦敢憑誠于沼沚謁黃陵而展敬奠瑤席乎川湄具蘭香以膏沐懷椒糈而要之延帝子于三后降夔龍于九疑騰河靈之水駕下太一之靈旗撫安哥以會儛疏緩節而依遲日徘徊以將暮情眇默而無辭慍秦皇之川幸尤土壤以加戮昧天道之無親覲望祀以祈福將人怨而神怒故飛川而蕩谷推冥理以歸愆遂刊山而赭木于是下車入部班條理務砥課庸薄夕惕兢懼存問長老隱恤氓庶奉宣皇恩寬徭省賦遠哉盛乎斯邦之舊也有虞巡方以託終夏后開圖而疏決太伯讓嗣以來遊臣祈仙而齊潔固是明王之塵軌聖賢之蹤轍也若夫屈平懷沙之賦賈子遊湘之篇史遷摛文以投弔揚雄反騷而沈川其風謠雅什又是詞人之所流連也亦有仲寧咸德仍世相繼父子三台緇衣改敝古初抱于烈火劉先高而忤世蔣公琰之弘通桓伯緒之匡濟鄧兗時之絶述谷思恭之藻麗實川嶽之精靈常間出而無春也至于殊庭之客帝鄉之賢神奔鬼化吐吸雲煙玉笥登之而郤老金人植杖以尊泉蘇生騎龍而出入處靜駕鹿以周旋配北燭之神女偶南榮之偓佺時髣佛其遙見亦往往而有焉爾乃歷省府庭周行街術山川遠覽邑居近悉割黔中以置守獻青陽而背質鄒生所謂還舟楚王于焉乘馹巡高山之纍仞褒吳文之為宰彼非劉而八王皆國士而身醢在長沙而著令經五葉其未改知天道之福謙勝一時之經始尋太傅之故宅今築室以安禪邑無改于舊井尚開流而洌泉懷伊管之政術遇庸臣而見遷終被知于時主嗟漢宗之得賢受齊居之遠託豈理謝而生全哀懷王之不秀遂抱恨而傷年修定祀於北郭對林野而幽藹庶無吐于馨香祀瓊茅而沃酹景十三以啓國惟君王其能大逮炎正之中微實斯藩而是賴顧四阜之紆餘乍升高以遊目審山川之面帶將取名于衡麓下彌漫以爽塏上欽虧而重復風瑟瑟以鳴松水琤琤而響谷低四照于若華竦千尋于建木冀囂塵之可屏登巖阿而寤宿捨域中之常戀慕遊仙之靈族是時涼風暮節萬實西成華池迥遠飛閣淒明嘉南洲之炎德愛蘭蕙之秋榮下名柑于曲榭采芳菊于高城樹羅軒而並列竹被嶺而叢生玩棲禽之夕返送旅雁之晨征悲去鄉而遠客寄覽物而娛情惟傳車之所騖實鷹揚其是掌或解組以立威乍露服而加賞遵聖主之恩刑荷天地之厚德沾河潤于九里澤自家而刑國闕小道之可觀寧畏塗其易克眄高衢而願騁憂取纍于長纆聞困石之非據承炯戒乎明則愧壽陵之餘子學邯鄲而匍匐也梁書張纘傳大同九年為使持節都督湘桂南寧三州諸軍事湘州刺史述職經途乃作南征賦其詞云云又見藝文類聚二十七離別賦并序太常劉侯前輩宿達余在紈綺之歲固巳欽其風矣及理棹江干攬涕還望采蕭之詠不覺成篇彼劉侯之矯矯承世德之清輝挺荊衡之箘簬輝江漢之珠璣昔相知于一定逾盛衰乎二紀豈因媒以成親非彈冠而來仕分自諧于金石情冥符乎蘭芷忘時輩之後先略相知之年齒及胥遇于雲閣又方駕而聯曹宵擁衾而暗語晝稅鞅以遊遨案方前而等食衣共體而同袍猶合歡之蠲忿如來蘇之釋勞唯吾人之與子兮諒不言其巳召在百代而奚殊雖千年而同調寧風波之所移豈流俗之能要非高唱而云擬逢下士而或笑隔願言于信次尚眷眷而興懷矧雲崖之遠訣抱離袖而長乖顧龍門而掩涕瞻郢路而何偕在驚禽之屢感迫徂年之將暮眺湘沅之分流遵洞庭之永路山峻高而易隱浦邅回而難泝猿啾啾而夜吟鵑騷騷而曉度撫客子兮其何心能辭鄉兮別故共抱荃蕙之遺芳不離披于霜露藝文類聚三十初學記十八懷音賦并序西平劭陵王以親賢近能作蕃夏首下走叨竊時命驅傳湘羅久託下風素蒙淑顧及塗經鄢郢淹泊纍旬君王彈隨珠于千仞乃貽之以麗則詩云懷我好音敢為懷音賦云爾伊宗周之令望巡召南而述職襟帶鄖夏之鄉宣條江漢之域服詩書于懷袖抱仁義于胸臆總九德以棲身橫四溟而撫翼循微躬之末迹謬馳傳于衡嶷由洞庭而左轉指酃醴而為期仰芳塵于夏汭路將近而彌滋棹陵波以遄務舟望浦而倦遲自清光之未覯逾一紀以歷茲敢憑情于往昔逢君恩之未遺陪桂苑之良遊接蘭臺之高會既醉酒以飽德亦傾羞而緩帶感平原之愛客傷岐路之難留戀西園之餘賞泣南浦之徂舟結煩言于將贈情有重乎琳球顧龍門其不見過夏首而西浮申服義之未沫長記言于還郵藝文類聚三十一妬婦賦惟婦怨之無極羌于何而弗有或造端而構末皆莠言之在口常因情以起恨每傳聲而妄受乍隔帳而窺屏或覘窗而瞰牖若夫室怒小憾反目私言不忍細忿皆成大冤閨房之所隱私床第之所討論咸一朝之發泄滿四海之器喧忽有逆其妬鱗犯其忌制赴湯蹈火瞋目攘袂或棄産而焚家或投兒而害壻藝文類聚三十五瓜賦惟茲瓜之實茂體太素之純精翕玄潤于浮霄含皇澤于夏庭于是蒼春發歲天地交和乃啓沃壤是殖是播納佳種于畦畹應時運而剖牙揮萌散櫱栽葉負柯蓊茸鬱薈莽䔿婆娑晞慶雲以吐蕤仰旭日之敷華朝希重陽夕承朗月清靈湛而霄降翔風穆以晨發振柯條之繞若顧惠氣以滋悅感靈化而絪縕覩佳實之並結始懷徵而苦發終感宮而甘通信不和而自馨與九鼎乎齊功蔓草是藉密葉是蔽潛湫獨熟墮莖落蒂芬馥酷烈氣畼雲際申狄不能詳其味隸首不能為之計昔東陵之甘瓜美顯名于中古彼服閭之攸簷乃衆仙之所睹美人神之同好何厥用之弘普惟令實于無窮永可殖于靈圃藝文類聚八十七擬若有人兮若有人兮傍巖石新莆衣兮杜衡席表幽居兮翠微上臨春風兮聊騁望日已暮兮夕雲飛懷君王兮未能歸藝文類聚五十六讓吏部尚書表漢革民曹魏仍東掾毛孝先以清公見美盧子若以貞固任職降及晉代希覩其人樂彥輔雍容自守當時恨其寡譽山巨源意存賞拔不免與世浮沈鄧攸牧馬家庭何益止競之操卞壼如金丸在石未聞檢裁之功藝文類聚四十八初學記十一讓尚書僕射表自出守股肱入尸衡尺可以仰首伸眉論列是非者矣而寸襟所滯近蔽耳目深淺清濁豈有能預加以矯心飾貌酷非所間不喜俗人與之共事雖復吐言如傷屈體無骨動容竊斧猶成多憾曾闈如闕坐客恆滿情態參差世塗盈虛薏苡興謗舍塵見猜疑似雖分聖賢致惑人之包藏山川非險況在於臣焉可證綜梁書張纘傳藝文類聚四十八謝東宮賚園啓性愛山泉頗樂間曠雖復伏膺堯門情存魏闕至於一丘一壑自謂出處無辨常願卜居幽僻屏避喧塵傍山臨流面郊負郭依林結宇憩桃李之夏陰對徑開軒采橘柚之秋實而王畿陸海畝號一金涇渭土膏豪傑所競徙居好畤必待使越之裝別館河陽亦資牧荊之富此園左帶平湖修陂千頃右臨長薄清潭百仞前逼逸陌朝夕爽塏後望鍾阜表裏煙霞每賸春迎夏華卉競發背秋向冬雲物澄霽歸瞰戶牖不異登臨升降階墀巳窮歷覽舟楫所屆纍日不能究其源魚鳥之豐山澤不能喻其美藝文類聚六十五謝皇太子賚果然褥啓伏以狐裘熊席徒負舊名玄豹青𤟤未能適體嚴冰在節朔飆結宇吹綸愧暖挾纊慚溫但勤非伏寢恩重夜覆道愧徑明坐叨重席仰榮俯愧進退在顏藝文類聚九十五與陸雲公叔襄兄晏子書都信至承賢兄子賢弟黃門殞折非唯貴門喪寶實有識同悲痛惋傷惜不能已已賢兄子賢弟神情早著標令弱年經目所覩殆無再問懷橘抱奈稟自天情倨坐列薪非因外獎學以聚之則一箸能立問以辨之則師心獨寤始踰弱歲辭藝通洽升降多士秀也詩流見與齒過肩隨禮殊拜絶懷抱相得忘其年義朝遊夕宴一載于斯玩古披文終晨訖暮平生知舊零落稍盡老夫記意其數幾何至若此生寧可多過賞心樂事所寄伊人弟遷職瀟湘維舟洛汭將離之際彌見情款夕次帝郊亟淹信宿徘徊握手忍分岐路行役數年羈病侵迫識慮惛悅久絶人世憑几口授素無其功翰動若飛彌有多愧京洛遊故咸成雲雨唯有此生音塵數嗣形迹之外不為遠近隔情襟素之中豈以風霜改節客遊半紀志切首丘日望東歸更敦昔款如何此別永成異世揮袂之初人誰自保但恐衰謝無復前期不謂華齡方春掩質埋玉之恨撫事多情想引進之情懷抱素篤友于之至兼深家寶奄有此恤當何可言臨白增悲言以無次梁書陸雲公傳詒湘東王書河東載檣上水欲襲江陵嶽陽在雍共謀不逞周書蕭察傳河東已豎檣上水將襲荊州梁書張纘傳河東起兵嶽陽聚米共為不逞將襲江陵梁書河東王譽傳纘密報世祖又南史五十三末二句但作將來襲江陵丁貴嬪哀策文菆塗既啓桂樽虛凝龍帷巳薦象服將升皇帝傷璧臺之永閟悼曾城之不踐罷鄉歌乎燕樂廢徹齊于祀典風有采蘩化行南國爰合史臣俾流嬪德其辭曰軒緯之精江漢之英歸于君袂生此離明誕自厥初時維載育樞電繞郊神光照屋爰及待年含章早穆聲被洽陽譽宣中谷龍德在田聿恭茲祀陰化代終王風攸始動容咨式出言顧史宜其家人刑于國紀膺斯眷命從此宅心狄綴采珩珮動雅音日中思戒月滿懷針如何不局天高照臨玄紞莫修褘章早缺成物誰能芳猷有烈素魄貞明紫宮照晣逮下靡傷思賢罔蔽躬儉則節昭事惟虔金玉無玩筐筥不捐祥流德化慶表親賢甄昌軼啓孕魯陶燕方論婦教明章閫席玄池早扃湘沅已穸展衣委華朱幩寢迹慕結儲闈哀深蕃辟嗚呼哀哉令龜兆良葆引遷祖具僚次列承華接武日杳杳以霾春風淒淒而結緒去曾掖以依遲飾新宮而延佇嗚呼哀哉啓丹旗之星旆振容車之黼裳擬靈金而鬱楚泛悽管而凝傷遺備物乎營寢掩重閽于窒皇椒風暖兮猶昔蘭殿幽而不陽嗚呼哀哉側闈高義彤管有懌道變虞風功參唐迹婉如之人休光赤舄施諸天地而無朝夕嗚呼哀哉梁書高祖丁貴嬪傳故左氏尚書忠子沈憎旻墓志銘漸東振古龜組三襲政若解繩吏如燥溼十升龍管四至九卿居高首映比德腰明藝文類聚四十八中書令蕭子顯墓志君狀貌丘墟風神磊落間瞻動于容止英奕發于流盻筆鋒席上皆如素蓄切問近思見稱間敏帝嘗顧問君曰我撰通史若成衆史可廢乃答詔曰仲尼贊易道黜八索述職方除九丘聖制符同復在茲日儲君育德少陽情協陳阮親妙思式表玄石藝文類聚四十八龍樓寺碑蓋聞井魚之不識巨海夏蟲之不見冬冰故知局于泥甃者未測滄溟之浩汗篤于一時者寧信寒暑之推移何異乎玩即世而弗悟于生死之流耽假樂而迷于真覺之觀銘曰識相裁萌無明重蔽五住次起四生無際苦海倒流業風橫厲彼岸何遠津航絶濟輕毛易轉花水難留實逢象正悟彼生修照曜真法逍遙寶舟占彼勝地胥宇攸宅遙川縈帶峻矩盤桓霞生蓮堞風起長瀾冬室停燠夏臺增寒藝文類聚七十六
