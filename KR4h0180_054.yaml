body:
  text: 張充與王儉書吳國男子張充致書於琅邪王君侯侍者頃日路長愁霖韜晦涼暑未平想無虧攝充幸以魚釣之閑鎌採之暇時復以卷軸自娛逍遙前史從橫萬古動默之路多端紛綸百年昇降之徒不一故以圓行方止用之異也金剛水柔性之別也善御性者不違金石之質善為器者不易方圓之用所以北海掛簪帶之高河南降璽言之貴充生平少偶不以利欲干懷三十六年差得以棲貧自澹介然之志峭聳霜崖確乎之情峰橫梅岸彯纓天閣既謝廊廟之華綴組雲臺終慚衣冠之秀所以擯跡江皋徉狂隴畔者實由氣岸疏凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖每邅回於在世故君山直上蹙壓於當年叔陽敻舉𨍜𨎹乎千載充所以長群魚鳥畢影松阿半頃之田足以輸稅五畝之宅樹以桑麻嘯歌於川澤之閒諷詠於澠池之上泛濫於漁父之遊偃息於卜居之下如此而已充何識焉若夫驚巖罩日壯海逢天竦石崩尋分危落仞桂蘭綺靡叢雜於山幽松柏森陰相繚於㵎曲元卿於是乎不歸伯休亦以茲長往若迺飛竿釣渚濯足滄洲獨浪煙霞高臥風月悠悠琴酒岫遠誰來灼灼文談空罷方寸不覺鬱然千里路阻江川每至西風何嘗不眷聊因疾隙略舉諸襟持此片言輕在高聽文人歲路未彊學優而仕道佐蒼生功橫海望人朝則協長倩之誠出議則抗仲子之節可謂盛德維時孤松獨秀者也素履未詳斯旅尚眇茂陵之彥望冠蓋而長懷霸山之氓佇衣車而聳歎得無惜乎若鴻裝撰御鶴駕軒空則岸不辭枯山被其潤奇禽異羽或巖際而逢迎弱霧輕煙乍林端而菴藹東都不足奇南山豈為貴充昆西之百姓岱表之一民蠶而衣耕且食不能事王侯覓知己造時人聘遊說蓬轉於屠博之閒其歡甚矣丈人早遇承華中逢崇禮肆上之眷望溢於早辰鄉下之言謬延於造次然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見埽心胸述平生論語默所以通夢交魂推衿送抱者其惟丈人而已關山敻阻書罷莫因儻遇樵者妄塵執事梁書張充傳繡賦尋造物之妙巧固飭化於百工嗟莫先於黼繡自帝虞而觀風雜藻火於粉米鬱山龍與華蟲若夫觀其締綴與其依放龜龍為文神仙成象總五色而極思藉羅紈而發想具萬物之有狀盡眾化之為形既緜華而稠彩亦密照而疏明若春隰之揚蘤似秋漢之含星巳閒紅而約紫又表玄而裹素閒綠竹與蘅杜雜青松與芳樹若乃邯鄲之女宛洛少年顧影自媚窺鏡自憐極車馬之光飭盡衣裳之妖妍既徙倚於丹墀亦徘徊於青閣不息末而反本吾謂遂離乎澆薄初學記二十七河南國獻舞馬賦應詔并序臣聞天用莫如龍地用莫如馬故禮稱驪騵詩誦駵駱先景遺風之美世所得聞吐圖騰光之異有時而出洎我大梁光有區夏廣運自中員照無外日入之所浮琛委贄風被之域越險效珍軨服鳥號之駿騊駼豢龍之名而河南又獻赤龍駒有奇貌絕足能拜善舞天子異之使臣作賦曰維梁受命四載元符既臻協律之事具舉膠庠之教心陳檀輿之用已偃玉輅之御方巡攷帝文而率通披皇圖以大觀慶惟道而必先靈匪聖其誰贊見河龍之瑞唐矚天馬之禎漢既叶符而比德且同條而共貫詢國美於斯今邁皇王於曩昔散大明以燭幽揚義聲而遠斥固施之於不窮諒無所乎朝夕竝承流以請吏咸向風而率職納奇貢於絕區致龍媒於殊域伊況古而赤文爰在茲而朱翼既效德於炎運亦表祥於尚色資皎月而載生祖河房而挺授種北唐之絕類嗣西宛之鴻冑稟妙足而逸倫有殊姿而特茂善環旋於齊夏知蹈躧於金奏超六種於周閑踰八品於漢廄伊自然之有質寍改觀於肥瘦豈徒服皁而養安與進駕以馳驟爾其挾尺縣鑿之辨附蟬伏兔之別十形五觀之姿三毛八肉之勢臣何得而稱焉固已詳於前製徒觀其神爽視其豪異軼跨野而忽踰輪齊秀騏而竝末駟貶代盤而陋小華越定單而少天驥信無等於漏面孰有取於決鼻可以迹章亥之所未遊踰禹益之所未至將不得而屈指亦何暇以理轡若跡遍而忘反非我皇之所事方潤色於前古邈深文而儲思既而機事多暇青春未移時惟上已美景在斯遵鎬飲之故實陳洛讌之舊儀漕伊川而分派引激水以回池集國良於民儁列樹茂於皇枝紛高冠以連衽鏘鳴玉而肩隨清輦道於上林肅華臺之金座望發色於綠苞佇流芬於紫裹聽磬鎛之畢舉聆韶夏之咸播承六奏之既闋及九變之已成均儀禽於唐序同舞獸於虞廷懷夏后之九代想陳王之紫騂乃命涓人效良駿經周衛入鉤陳言右牽之已來寍執樸而後進既傾首於律同又蹀足於鼓振擢龍首回鹿軀睨兩鏡蹙雙鳧既就場而雅拜時赴曲而徐趨敏躁中於促節捷繁外於驚桴騏行驥動獸發龍驤雀躍鷰集鵠引鳧翔妍七盤之綽約陵九劍之抑楊豈借儀於褕袂寍假器於髦皇婉眷投傾俛膺合雅露沫歕紅沾汗流赭乃卻走於集靈馴惠養於豊夏鬱風雷之壯心思展足於南野若彼符瑞之富可以臻介丘而昭卒業搢紳群后誠希末光天子深穆為度未之訪也何則進讓殊事豈非帝者之彌文哉今四衛外封五岳內郡宜弘下禪之規增上封之訓背清都而日行指云郊而玄運將絕塵而弭轍類飛鳥與駏驉總三才而驅鶩案五御而超攄翳卿雲於華蓋翼條風於屬車無逸御於玉軫不泛駕於金輿飭中岳之絕軌營奉高之舊墟訓厚況於人神弘施育於黎獻垂景炎於長世集繁祉於斯萬在庸臣之方剛有從軍之大願必自茲而展采將同畀於庖煇悼長卿之遺書憫周南之留恨梁書張率傳天監四年三月河南國獻舞馬詔率賦之與到溉書哲人云亡儀表長謝元龜何寄指南誰託梁書任昉傳昉出為新安太守卒於官舍陳郡殷芸與建安太守到溉書答昭明太子奉賜手令并繆道臻宣旨伏讀感咽肝心塗地小人無情動不及禮但稟生尪劣假推年歲罪戾所鍾復加橫疾頃者綿微守盡晷漏目亂玄黃心迷哀樂惟救危苦未能以遠理自制薑桂之滋實聞前典不避粱肉復忝今慈臣亦何人降此夏愍謹當循復聖言思自補續如脫申延實由亭造梁書殷鈞書答釋法雲書難范縝神滅論近辱告惠示主上所答臣下審神滅論性與天道誠不得聞徒觀二諦兼通三聖俱闡片言析妙半字合靈辭存五禮之中旨該六合之外譬河海之紀地猶日月之麗天伏讀歡愉魂影相慶何者弟子夙陶玄化乃長不虧常恐識業未弘中塗迴枉或端然靜念心翔翔而靡薄或吐言設論時見屈於辯聰夫大道甚夷而黎元好徑咸用此也今猥奉神旨昭若發蒙且服且誦永為身寶數日來公私牽挽還輒頓臥未即白答銜眷彌深殷鈞和南弘明集十答前晉陵令劉蒨書高晉陵自答南史卞彬傳答人告躓書守羊無食何不貨羊糴米同上有人送書與爽告躓云比日守羊困苦爽答題延陵縣孫抱鼓徒有八尺圍腹無一寸腸面皮如許厚受打未詎央南史卞彬傳屐謎諭孫廉刺鼻不知嚏蹋高不知嗔齧齒作步數持此得勝人梁書孫謙傳請臨海王改封外州啟周定雒邑天子置畿內之民漢都咸陽三輔為社稷之衛中晉南遷事移威弛近郡名邦多有國食宋武創業依擬古典神州部內不復別封而孝武末年分樹寵子苟申私愛有乖訓準隆昌之元特開母弟之貴竊謂非古聖明御寓禮舊為先畿內限斷宜遵昔制賜茅授土出典外州南齊書巴陵王昭秀傳郊壇不起瓦屋啟伏見南郊壇員兆外內永明中起瓦屋形製宏壯檢案經史無所準據尋周禮祭天於圜丘取其因高之義兆於南郊就陽位也故以高敞貴在上昭天明旁流氣物自秦漢以來雖郊祀參差而壇域中閒並無更立宮室其意何也政是質誠尊天不自崇樹兼事通曠必務開遠宋元嘉南郊至時權作小陳帳以為退息太始薄加脩廣永明初彌漸高麗往年工匠遂啟立瓦屋前代帝皇豈於上天之祀而昧營構所不為者深有情意記稱埽地而祭於其質也器用陶匏天地之性也故至敬無文以素為貴竊謂郊事宜擬休偃不俟高大以明謙恭蕭敬之旨庶或仰允太靈俯愜群望南齊書禮志上建武二年通直散騎常侍庾曇隆啟又祭天尚質秦漢以來郊兆壇域無立宮室以明謙恭通典四十二永明元年案此與前啟略同惟作永明為異曇隆作曇崇避唐諱答釋法雲書難范縝神滅論辱告伏見主上答臣下審神滅論昏蒙啟悟煥爾照朗夫至理虛寂道趣空微上聖極智乃當窮其妙實步浮生自不辨深達玄淵如聞立論者經典垂訓皆是教跡至於在佛胡書詭怪難以理期此則言語道斷仰勞聖思為臣下剖釋群情豈不欣讚銘挹明旨抱用始終法師曲誨彌增慚戢弟子庾曇隆和南弘明集十頭陁寺碑文益聞挹朝夕之池者無以測其淺深仰蒼蒼之色者不足知其遠近況視聽之外若存若亡心行之表不生不滅者哉是以掩室摩竭用啟息言之津杜口毗邪以通得意之路然語彝倫者必求宗於九疇談陰陽者亦研幾於六位是故三才既辨識妙物之功萬象已陳悟太極之致言之不可以已其在茲乎然爻繫所筌窮於此域則稱謂所絕形乎彼岸矣彼岸者引之於有則高謝四流推之於無則俯弘六度名言不得其性相隨迎不見其終始不可以學地知不可以意生及其涅盤之蘊也夫幽谷無私有至斯響洪鍾虛受無來不應況法身圓對規矩冥立一音稱物宮商潛運是以如來利見迦維託生王室憑五衍之軾拯溺逝川開八正之門大庇交喪於是玄關幽揵感而遂通遙源濬波酌而不竭行不捨之檀而施洽群有唱無緣之慈而澤周萬物演勿照之明而鑒窮沙界導亡機之權而功濟塵刦時義遠矣能事畢矣然後拂衣雙樹脫屣金沙惟怳惟惚不皦不昧莫繫於去來復歸於無物因斯而談則棲遑大千無為之境不撓焚燎堅林不盡之靈無歇大矣哉正法既沒象教陵夷穿鑿異端者以違方為得一順非辯偽者比微言於目論於是馬鳴幽讚龍樹虛求並振頹綱俱維絕紐蔭法雲於真際則火宅晨涼曜慧日於康衢則重昏夜曉故能使三十七品有樽俎之師九十六種無藩籬之固既而方廣東被教肄南移周魯二莊親昭夜景之鑒漢晉兩朝並勒丹青之飾然後遺文閒出列剎相望澄什結轍於山西林遠肩隨乎江左矣頭陀寺者沙門釋慧宗之所立也南則大川浩汗雲霞之所沃蕩北則層峰削成日月之所迴薄西眺城邑百雉紆餘東望平皋千里超忽信楚都之勝地也宗法師行絜珪璧擁錫來遊以為宅生者緣業空則緣廢存軀者惑理勝則惑亡遂欲捨百齡於中身殉肌膚於猛鷙班荊蔭松者久之宋大明五年始立方丈茅茨以庇經像後軍長史江夏內史會稽孔府君諱覬為之薙草開林置經行之室安西將軍郢州刺史江安伯濟陽蔡使君諱興宗復為崇基表剎立禪誦之堂焉以法師景行大迦葉故以頭陀為稱首後有僧勤法師貞節苦心求仁養志纂脩堂宇未就而沒高軌難追藏舟易遠僧徒闃其無人榱椽毀而莫構可為長太息矣惟齊繼五帝洪名紐三王絕業祖武宗文之德昭升嚴配格天光表之功弘啟興服是以惟新舊物康濟多難步中雅頌驟合韶濩炎區九譯沙場一候粵在於建武焉乃詔西中郎將郢州刺史江夏王觀政藩維樹風江漢擇方域之令典酌龜蒙之故實政肅刑清於是乎在寍遠將軍長史江夏內史行事彭城劉府君諱諠智刃所遊日新月故道勝之韻虛往實歸以此寺業廢於已安功墜於幾立慨深覆簣悲同棄井因百姓之有餘間天下之無事庀徒揆日各有司存於是民以悅來工以心競恒丘被陵因高就遠層軒延袤上出雲霓飛閣逶迤下臨無地夕露為珠網朝霞為丹雘九衢之草干計四照之花萬品崖谷共清風泉相渙金資寶相永藉閑安息心了義終焉遊集法師釋曇珍業行淳脩理懷淵遠今屈知寺任永奉神居夫民勞事功既鏤文於鐘鼎言時稱代亦樹碑於宗廟世彌積而功宣身逾遠而名劭敢寓言於彫篆庶髣髴於眾妙其辭曰質判玄黃氣分清濁涉器千名含靈萬族淳源上派澆風下黷愛流成海清塵為岳皇矣能仁撫期命世乃睠中土聿來迦衛奄有大干遂荒三界殷鑒四門幽求六歲亦既成德妙盡無為帝獻方石天開淥池祥河輟水寶樹低枝通莊九折安步三危川靜波澄龍翔雲起耆山廣運給園多士金粟來儀文殊戾止應乾動寂順民終始法本不然今則無滅象正雖闌希夷未缺於昭有齊式揚洪烈釋網更維玄津重枻惟此名區禪慧攸託倚據崇巖臨睨通壑溝池湘漢堆阜衡霍膴膴亭皋幽幽林薄媚茲邦后法流是挹氣茂三明情超六入眷言靈宇載懷興葺丹刻翬飛輪奐離立象設既闢睟容已安桂深冬燠松疏夏寒神足遊息靈心往還勝幡西振貞石南刊文選國諱不宜廢學表古之建國君民者必教學為先將以節其邪情而禁其流欲故能化民裁俗習與性成也是以忠孝篤焉信義成焉禮讓行焉尊教宗學其致一也是以成均煥於古典虎門炳於前經陛下體睿淳神纘承鴻業今制書既下而廢學先聞將恐觀國之光者有以擬議也若以國諱故宜廢昔漢武立學爰洎元始百餘年中未嘗暫廢其閒豈無國諱矣且晉武之崩又其學猶存斯皆先代不以國諱而廢學之明文也永明以德太子故廢斯非古典也尋國之有學本以興化致治也天子於以諮謀焉於以行禮焉故記云天子出征受命於祖受成於學執有罪反釋奠於學又云食三老五更於太學天子袒而割性執爵而酳以教諸侯悌也於斯學是天子有國之基教也或以之所言皆太學事也今引太學不非證也據臣所見今之國學即古之太學晉初太學生三千人既多猥雜惠帝時欲辯其涇渭故元康三年始立國子學官品第五以上得入國學天子去太學入國學以行禮也太子去太學入國學以齒讓也太學之與國學斯是晉世殊其士庶異其貴賤耳然貴賤士庶皆須教成故國學太學兩存之也非有太子故立也然繫廢興於太子者此永明之鉅牝也漢崇雅懦幾致刑厝而猶道謝三五者以其致教之術未篤也古之教者家有塾黨有庠術有序國有學以諷誦相摩今學非唯不宜廢而已乃宜更崇向其道望古作規使郡縣有學鄉閭立教請付尚書及二學詳議南齊書禮志上永泰元年尚書符依永明舊事廢學領國子助教曹思文上表又見通典五十三諸侯祭五廟議天子受命之日便祭七廟諸侯始封即祭五廟隋書禮儀志二中興二年梁武初為梁公曹文思議祠部郎謝廣等並駁之遂不施用上武帝啟難范縝神滅論思文啟竊見范縝神滅論自為賓主遂有三十餘條思文不惟闇蔽聊難論大旨二條而已庶欲以此傾其根本謹冒上聞但思文情用淺匱懼不能徵折詭經仰黷天照伏追震悸謹啟弘明集上又啟思文啟始得范縝答神滅論猶執先迷思文料其理致衝其四證謹冒奏聞但思文情識愚淺無以折其鋒銳仰塵聖鑒伏追震悚謹啟同上答釋法雲書難范縝神滅論辱送敕書弟子適近亦親奉此旨范中書遂迷滯若斯良為可慨聖上深懼黔黎致惑故垂折衷之昭此旨一行雖復愚暗之識了知神不滅矣弟小近聊就周孔以為難今附相簡願惠為一覽之折其詭經不尋故束展此不多白弟子曹思文和南弘明集十難范縝神滅論論曰神即形也形即神也是以形存則神存形謝則神滅也難曰形非即神也神非即形也是合而為用者也而合非即矣生則合而為用死則形留而神逝也何以言之昔者趙𥳑子疾五日不知人秦穆公七日乃寤並神遊於帝所帝賜之鈞天廣樂此其形留而神逝者乎若如論言形滅則神滅者斯形之與神應如影響之必俱也然形既病焉則神亦病也何以形不知人神獨遊帝而欣歡於鈞天廣樂乎斯其寤也魂交故神遊於蝴蝶即形與神分也其覺也形開蘧蘧然周也即形與神合也然神之與形有分有合合則共為一體分則形亡而神逝也是以延陵窆子而言曰骨肉復歸於土而魂氣無不之也斯則形亡而神不亡也然經史明證灼灼也如此寍是形亡而神滅者也論曰問者曰經云為之宗廟以鬼饗之通云非有鬼也斯是聖人之教然也所以達孝子之心而厲偷薄之意也難曰今論所云皆情言也而非聖旨請舉經記以證聖人之教孝經云昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝若形神俱滅復誰配天乎復誰配帝乎且無神而為有神宣尼云天可欺乎今稷無神矣而以稷配斯是周旦其欺天乎果其無稷也而空以配天者既其欺天矣又其欺人也斯是聖人之教教以欺妄也設欺妄以立教者復何達孝子之心厲偷蒲之意哉原尋論旨以無鬼為義試重詰之曰孔子菜羹瓜祭祀其祖禰也記云樂以迎來哀以送往神既無矣迎何所迎神既無矣送何所送迎來而樂斯假欣於孔貌送往而哀又虛淚於丘體斯則夫子之祭禮也欺偽滿於方寸虛假盈於廟堂聖人之教其若是乎而云聖人之教然也何哉弘明集九重難范縝神滅論論曰若合而為用者明不合則無用如蛩駏之相資廢一則不可此乃是滅神之精據而非存神之雅決子意本欲請戰而定為我援兵也論又云形之於神猶刃之於利未聞刃沒而利存豈形亡而神往又伸延陵之言即形消於下神滅於上故云無不之也又云以稷配天非欺天也猶湯放武伐非弒君也子不責聖人放弒之迹而勤勤於郊稷之妄邪難曰蛩蛩駏驉是合用之證耳而非形滅即神滅之據也何以言之蛩非驉也驉非蛩也今滅蛩蛩而駏驉不死斬駏驉而蛩蛩不亡非相即也今引此以為形神俱滅之精據又為救兵之良援斯倒戈授人而欲求長存也悲夫斯即形滅而神不滅之證一也論云形之與神猶刃之於利未聞刃沒而利存豈容形亡而神在雅論據形神之俱滅惟此一證而已愚有惑焉何者神之與形是二物之合用即論所引蛩駏相資是也今刃之於利是一物之兩名耳然一物兩名者故捨刃則無利也二物之合用者故形亡則神逝也今引一物之二名以徵二物之合用斯差若毫釐者何千里之遠也斯又是形滅而神不滅之證二也又伸延陵之言曰即是形消於下神滅於上論云形神是一體之相即今形滅於此即應神滅於形中何得云形消於下神滅於上而云無不之乎斯又是形滅而神不滅之證三也又云以稷配天非欺天也猶湯放桀武伐紂非弒君也即是權假以除惡乎然唐虞之君無放伐之患矣若乃運非太平世值三季權假立教以救一時故權稷以配天假文以帝則可也然有虞氏之王天下也禘黃而郊嚳祖顓而宗堯既淳風而未殄時非權假而令欺天罔帝也可乎引證若斯斯又是形滅而神不滅之證四也斯四證既立而根本自傾其餘枝葉庶不待風而靡也論曰樂以迎來哀以送往此義不假通而自釋不復費於無用禮記有斯言多矣又云夫言欺者謂傷化敗俗耳苟可以安上治民復何欺妄之有乎難曰前難云迎來而樂是假欣於孔貌送往而哀又虛淚於丘體斯實鄙難之雲梯弱義之鋒的在此言也而答者曾不慧解惟云不假通而自釋請重言之曰依如論旨既已許孔是假欣而虛淚也又許稷之配天是指無以為有也宣尼云亡而為有虛而為盈斯爻象之所不占而格言之所攸棄用此風以扇也茲化何得不傷茲俗於何不敗而云可以安上治民也何哉論云已通而昧者未悟聊重往諮側聞提耳弘明集九
