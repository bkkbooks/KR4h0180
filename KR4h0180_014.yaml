body:
  text: 簡文帝吳興楚王神廟碑昔者武王詢於太公五神之禮正伊陟贊於巫咸三篇之義作抑又玄矩司於坎宮漢興北畤黃蛇感於通夢秦作西郊幽則鬼神其來已尚楚王既弘茲釋教止獻車牛既舍黃駒安俟騂角掌擊無左滌之勞牧人止楅衡之務周房殷俎惟有玄澗芳芝玉斝瑤樽止陳丹桂清酌漸符不殺之教方行大士之心比夫黃樹赤光紫衣朱髮茂矣哉王制云山川神祇有不舉者為不敬太守元景仲稽諸古典於茲往烈永傳不朽式樹高碑翠石勒文事偕神掌靈龜負字還擬洛書藝文類聚七十九長沙宣武王北涼州廟碑黃曲之祀九井尚慚洙水之堂七壁猶在豈非德含體氣神降空桑蒸民仰其立功太上懷其貴德公諱懿蘭陵人皇帝之長兄也命世降靈峻極開著宗百川而成海倍萬俊而為英為南梁北秦二州刺史華陽黑水改號難堪加以嶽牧遷回軍民徙散同高闕以為塞象玉門而置關三尉寢謀六屯罷業功同疏勒之守備甚即墨之堅圍公臨危制變殷如敵國是以六角摧鋒兩賢釁鼓指撝則破勍敵叱吒而靜邊塵公德應大賢照惟殆庶如鍾資叩似鐸發聲含朝陽於千仞散風行於萬頃神武所固士卒忘水火之難簞醪所驅小大一死生之志微管之風餘芳無絶人畏其神德音不泯梁秦二州刺史宜封侯條刺舉漢陽親覩遺愛有表請立碑置廟天子許焉反宇飛風伏檻含日參差丹桂周流紫房躨跜刻獸下臨網戶菡萏荷華傍連屈屋庶使邊韶所立之石豈稱高於陳郡袁逢所勒之字非獨擅於華陽乃為贊曰帝圖開道皇源配天功書緑字事燭青編天漢之陽黑水惟梁如仁永播流詠寧忘扶風高碣召伯甘棠餘芳無泯望古可方構斯象室循茲洞房琉璃照戶璧玉開堂秋條下葉春卉含芳九微夜火百味朝漿藝文類聚四十五丞相長沙宣武王碑金表龍符緑地龜圖且稱瑞漢實日開虞於昭帝緒蟬聯厥初有微玄水亦作司徒重簷偃蹇曲注逶迤重櫨鳳翥桂棟蓮披文檀晚麗采節晨輝春藤絡戶寒菊臨池惟馨惟德無絶於斯藝文類聚四十五招真館碑夫東瀛淥水三變成田西嶽靈桃千年未子尚以星起牽牛蔀首迢遞律生甲子氣數杳冥況復上遊玉清損之又損高排金闕玄之又玄豈言象之能詮非時節之所辨海虞縣者則虞農都尉太康置其宰境有虞山越絶書云巫咸之所出也高巖鬱起帶青雲而作峰瀑水懸流雜天河而俱灑吳門採藥之地楚望懷椒之歌湯反流沙之魂錦飾汾陰之鼎無以喻焉其峰則有石城石門虛峗自然不度句吳之馬神功挺起豈似岡陵之畫魏后冰城夜陳權息長安慈石浴鐵暫流較迹比期優劣斯遠道士沛郡張君諱道裕字弘真即漢朝天師陵十二代孫天監二年來至此岫栖遁十有餘載夜忽夢見聖祖云峰下之地面勢間寂宜立館宇可以卜居裕師潘洪隱始寧四明山無何有人耳長髮短云從虞山招真治來言訖忽然不見潘馳信報君君因辭山舊居而以夢中所指峰下之地即以為治故號招真高臺迥立有類玉臺之山長廊宛轉還如步廊之岫柱削芳桂豈俟開陽木飛材選海檀無勞豫章神拔黃庭司命之府有類玲瓏朱陵赤石之觀同符弘敞遠望仲雍而高墳蕭瑟旁臨齊女則衰壟蒼茫蘚尋千仞之木氣叶星晷華飛五香之草形圖宮室帷葉綵花卷舒蹊徑陽桃候棗榮落巖崖樹息金烏簷依銀鳥鳳將九子應吹能歌鶴生七歲逐節成舞旭日晨臨同迎若華之色夕陽斜影俱成拂鏡之暉玉礎微潤應山雲於高牖鳴籟徐響引和風於空谷方當專氣致柔入無為之境周行不殆窮混成之致茅子算歸輟轡無已魏姬宴罷留駕不還何止持節變淮南之金傳符蒔北鐘之稻明月蛟龍之騎驅之使鬭四銖七子之鏡引以成刀散季齋之羽起雄鳴之霧而已哉乃為銘曰玉龜二始金書八會道浹地心功浮天外故帝可小唯真能大德起同塵善生塞兌物寶自然人符交泰掩映緑蘿穹隆紫蓋仙治之美此焉為最雄柱千步陽臺百丈水均下矚山踰高掌野寂雲興禽繁山響升虹夕栖豐雷朝上元陽作石竹龍成杖書藏玉匣藥蘊銀筒燒鉛雜鯉析桂和蔥羽衣可服雲軿易通斧柯雖朽碑石無窮王鏊姑蘇志三十藝文類聚七十八善覺寺碑蓋聞在天成象倬彼雲漢在地成形嵩高惟嶽蒼蒼斡運靈槎猶且去來巖巖峻極巫咸可以升降穆貴嬪宿植達因已於恆沙佛所經受記莂有緣娑婆降迹斯土行邁英皇德降華附河南望浮雲之瑞新野表升天之詳光前絶後建茲福地乃於建康之太清里建善覺寺焉大通元年龍集己酉有令使立碑文未獲構撰居諸不息寒暑推移軒曜夙傾前星次掩歲在諏訾始得補綴何言之陋何事之隆竊等仲由空悲負粟之哽復異恆良終無維山之日永言纏慕獨咽丹心銘曰效彼毗城建斯福舍四柱浮懸九城靈架重欒交峙回廊逢迓掩映花臺崔嵬蘭榭陽燧暉朝青蓮開夜藝文類聚七十六神山寺碑天地始終愆長不極劫數沙塵寂寥誰辨雖鐵界銅圍如影如約補石擎金隨生焰滅獨有鷲嶽靈境淨土不燒螺髻金質聲聞難覩故髮塔喜園流名天上耆山鵠苑布迹人中自非莊嚴妙土吉祥福地何以標茲淨域置此伽藍皇太子殿下幾圓上聖智周物外澄明離日照影春星長歌安勝表察書之獨見馳道回車騖班輪而不絶銘曰藝文類聚七十六關號天井山稱地雌碧雞金馬越瀆梁池懷靈蘊德孕寶含奇此亦仙岫英名遠摛昔有鷲窟不燒淨土邁彼高蹤構茲法宇引葉成帷即樹為柱石砌危橫崖階斜豎藝文類聚七慈覺寺碑竊以易表含貞記稱厚載龍星啓曜璧月儀暉是以河外黃雲沙傍崩鹿故能發緯伊緒重闡劉系亦有觀津美於西漢扶風盛彼東京未若樊川之邦宛葉之境休祥茂祉獨繁前迹莊姬流譽之所烈后業興之地南陽稱其何氏新野猶曰鄧家逖彼遐蹤復履今慶貴嬪金聲早振淑範增徽才實母師行為女楷窮茲四德洞彼六經溫明內湛慈慧天發綱綴慶璇枝聯休紫漢幸得愆無負斧任重束薪實以契闊言提綢繆善誘事其從居義深則盼而叨恩作牧釁結幽祇一訣椒慈長違寶幄風枝弗靜陟屺何期祗奉儲訓謬茲刊撰夫道長業大遺範事隆嗟油素之可捐懼故老之難述藝文類聚七十六相宮寺碑真人西滅洎羅漢東遊五明盛士並宣北門之教四姓小臣稍罷南宮之學超洙泗之濟濟比舍衛之洋洋是以高簷三丈乃為祀神之舍連閣四周並非中宮之宅雪山忍辱之草天宮陀樹之花四照芬吐五衢異色能令扶解説法果出妙衣鹿苑豈殊祇林何遠皇太子蕭緯自昔蕃邸便結善緣雖銀藏蓋寡金地多闕有慚四事久立五根泗川出鼎尚刻之罘之石崏峨作鎮猶銘劍壁之山矧伊福界寧無鐫刻銘曰洛陽白馬帝釋天冠開基紫陌峻極雲端實惟爽塏棲心之地譬若淨土長為佛事銀鋪曜色玉礎金光塔如仙掌樓疑鳳皇珠生月魄鍾應秋霜鳥依交露幡承杏梁窗舒意蕊室度心香天琴夜下紺馬朝翔生滅可度離苦獲常相續有盡歸乎道場藝文類聚七十六吳郡石像碑蓋聞軒后之圖載浮河洛秦王之璧更涌滄溟昭覃之洲乘清源而西泛蓬萊之岫逐安流而南徙況夫道由慈善應起靈覺是以無方之迹隨機示現無緣之力因物成感晉建興元年癸酉之歲吳郡婁縣界淞江之下號曰滬瀆此處有居人以漁者為業挂此詹綸無甄小魪布斯九罭常待六鼇遙望海中若二人像朝視沈浮疑諸蜃氣夕復顯晦乍若潛火於是謂為海神即與巫祝同往祈候七盤圓鼓先奏盛唐之歌百味椒漿屢上東皇之曲遂乃風波駭吐光景晦明咸起渡河之悲竊有覆舟之懼相顧失色於斯而返又有受持黃老好尚神仙職在三洞身帶八景更竭丹款復其奉迎尊像沈軀沒而不見經歷旬日遐邇普聞吳縣華里朱膺清信士也獨謂大覺大慈將宏化迹乃沐浴清齋要請同志與東靈寺帛尼及胡伎數十人乘船至滬瀆口頂禮歸依歌唄贊德于時微風送棹淑景浮波雲舒蓋而未移浪開花而不噴雖舟子招招弗能遠騖而靈相峨峨漸來就浦仰覩神像嶷然雙泛非因鷁首詎假龍橋豈藉銀連寧須玉軸背各有題一名維衛一名迦葉於是時衆踊躍得未曾有復懼金仙之姿非凡所徙試就提捧豁爾勝舟指燕宮而西歸望葑門而一息道俗側塞人祗協慶膺家住近通玄寺乃孫權為乳母陳氏之所立也亦一邦之勝地胥山之神塔乃遷像於此寺武夫數百咸不能勝共怪曰朱膺帛尼二人之力而能捧持不覺為異今人工甚盛確乎不移此必精誠弗能致也乃復竭心同時稽顙然後乃動至自舟中故知據井夜飛實無以異石不能重有覺憑焉後有外國沙門釋法開來稱彼國衆聖所記云東方有二石像及阿育王塔若能恭往禮覲滅無量罪免離三塗禮已而去中大通四年歲在壬子臨汝靈侯奉敕更造銅光二枚其一高九尺其一高八尺五寸銅邁丹陽恥論劉向之術區選攻金無俟嵇康之鍛既鐫既鎪是磨是銑曄如光定湛似日輪亦當遠照三千普瞻色像遙覩十方俱聞説法豈止惜命小鳥欣入影中重罪衆生還逢愛日而已哉吳郡僧正慧法師深修五定淨持七支於三寶中盡力宏護立摩尼之勝殿製飛行之寶塔至於莊嚴妙色實有厥徵夫魯聖云亡尚追儀於有若楚臣殞世亦託似於優孟放勳之后更圖長樂之畫文命之君不稽命之祀或傳諸往牘或布在前司或贊述盈耳或壽宮虛置況遠追應身近規靈迹不銘不勒何以稱揚乃為銘曰巍巍天像堂堂最勝慧日獨圓無生永證愍此魚鉤傷茲螺孕乍動慈舟時延寶乘留住待緣獨有傳應傳應伊何寶茲靈像履冰晨遊淩濤夜上七衆有憑九垓咸仰照此真容開斯俗網千輪足起萬字胸書身橫五分衣刻三銖嗟爾末俗心王所驅顙浮水沫命役馳驅宜宏希嚮必盡勤劬覩相塵滅聞聲惑祛湛然神迹長處全吳蘇州府志藝文類聚七十七祭戰亡者文降夫既旋功臣又賞班荷元勳蘇逢漏網校尉霑榮屬國蒙獎獨念斷魂長畢灰壤膏原染刃委骨埋泉徒聞身沒詎辨名傳藝文類聚三十八祭灰人文積注奄旬祭在灰人消茲獸炭焚此桂薪積如玉屑聚若遊塵庶人之風不拂獄吏之慢寧陳當令金光小史侍使玉童奏雲師於執法力水伯於天宮鑕星誅於電女貫索囚於雷公廓重氛於八極靜連絲於四空既曈曈於車蓋又赫赫於飛盤且疑威於趙盾實望近於長安藝文類聚一百六根懺文今日此衆誠心懺悔六根障業眼識無明易傾朱紫一隨浮染則千紀莫歸雖復天肉異根法慧殊美故因見前境隨事起惡今願捨此肉眸俱瞬佛眼如抉目王見淨名方丈之室多寶踊塔之瑞牟尼鷲嶽之光彌勒龍華之始常遊淨土永步天宮耳根暗鈍多種衆惡悅染絲歌聞勝法善音昏然欲睡聽鄭衛淫靡聳身側耳知勝善之事樂之者希淫靡之聲欣之者衆願捨此穢耳得彼天聰聞開塔關鑰之聲彈指謦咳之響諸佛所説悉皆總持香風淨土之聲寶樹鏗鏘之響於一念中恍然入悟鼻根過患彌復頑嚚耽染六蘭流連百和鬱金易著薝蔔難排雖復一薰一蕕叶性難遣空中海上彌不自覺至如雕爐在彼翠霧霏煙識染相牽彌生織纍所以蝍蛆甘螮自謂馨香烏鴉嗜鼠不疑穢惡今願捨此鼻根得彼天受振裳屣步跨栴檀之迥林提囊拭鉢捧香積之寶飯長離穢濁永保清升舌根障重染惡尤深毒刺爭興惡蛇競起既貪五黃六禽之旨又甘九鼎八珍之味所以焚山破卵涸水枯鱗黿臛不斟有染指之過羊羹不及致入陳之苦雖復鴇䐿鹿胃猶不稱甘鳳肺龍胎更云不美雖羅鼎俎未必皆嘗在彼衆生於命已酷或復間朋亂友破俗傷真變紫奪朱反白為黑所以讒言三至曾母投杼端木一説越霸吳亡故知三寸之舌未易可掉駟馬既出於事難追願斷煩惑入清淨境既同阿難乞乳之譏又等淨名寂默之致餐禪悅之六味服法喜之三德形恭心到永趣菩提身根頑觸唯貪細軟質體塵礙不重戈矛莫不愛我輕他陵人傲物縱此裸蟲不羈醉象六塵四倒自此而生五蓋十纏因斯而致所以象簟清潤遨遊於夏室重衾狐白溫煦於冬房結駟廣廈動靜必安鷁首翠樓去來有託所以三業之過出自機關四大假成豈有真我願捨此畫瓶得彼金色淨寶珠之法飾煦琉璃之慧體長歸五分永等十身意識攀緣其罪山積險同夢幻譬若猴猿懸鏡高堂一念難淨走丸索上百慮先馳至如二十五有紛繞不息九十八使驚騖無已所以灰心滅智行拔于三乘風禪露飲道高於六度今願斷此意根祛纍斯盡心當恬怕洞煦無生一切衆罪悉滅俗門三界異途歸之真域懺悔已竟誠心作禮釋藏策六廣宏明集二十八下悔高慢文弟子蕭綱又重至心歸依三寶竊聞禮稱弗傲表洙泗之遺文經云不慢驗踰闍之妙典故一遇恆神陵伽尚生餘習上賓天帝淮南猶有誤辭亦有才曰隱淪調惟高俗猶足座痺晉君立前齊主況復道隆三學法兼五衆如過前殿似出北門而不密室致恭遺弓接足敢藉勝緣願起弘誓從今日始乃至菩提於諸出家悉表虔敬方欲削除七慢折制六根賓頭下步庶無厥咎耆達棄車方思景慕幽顯大衆咸為證明廣宏明集二十八下唱導文夫十惡緣巨易惑心塗萬善力微難感靈性是以摩鉗赴火立志道場薩埵投身必之妙覺衆生積染流浪不歸苦海易沈慈波空蕩渴愛與生死共門無明與結網同路各趣百非纏茲四苦人思戮力昭彼三明是以如來因機致化如大醫王隨病施藥當今皇化之基格天網地扇仁風於萬古改世季於百王覆載蒼生慈育黎首天涯海外奉道餐風抱嗉吹脣含仁飲德民無賢肖愛均一子衆等宜各克己丹誠澄心慊到奉為至尊敬禮娑婆世界釋迦文佛歡喜世界栴檀德尊水精剎土月電如來寶明世界山海慧佛奉願聖御與天地比隆慈明與日月齊照九有被康哉之澤八方延仁壽之恩玉燭之美日著遐方擊壤之歌遍聞天下敬由心起五體所以外恭情發於中六識所以遍到故一善染心萬劫不朽百燈曠照千里通明憑法致安積善延慶今日幸遇茲訓誘豈得不罄竭心途奉為皇太子敬禮東方寶海南方燈明西方無量壽北方相德奉願離明內映合璧外和玉振雲浮金聲海鏡日朝顏色四善流風既擅溫文之德實著監國之重蒼生飲德有識餐仁燮和內化事炳周經讚德含章訓高惇史故以配正奉天表七教於仁德宣風緝惠闡六服於溫慈各宜攝心奉為貴嬪歸命敬禮五十三佛三十五尊當來賢劫千劫在百七十奉願月相與萬善同休金聲與四時並祐興七覺以炳照冏十智於常樂閨守奉仁宮儲欽德暉同疊璧煥若崑瓊蓋聞嵩高惟嶽作屏皇家宗子維城克固磐石所以戚均魯衛任等蕭曹三台正席坐而論道九棘勤王恪居連事宜各運心奉為臨川安成建安鄱陽始興豫章及南康廬陵湘東武陵諸王家國戚屬六司鼎貴歸命敬禮舍利形像菩提妙塔多寶踊現釋迦碎身奉願心鏡凝深身清嶽峙克隆帝祉永茂皇枝衆各一心歸命三寶三界異術五道分徑天人植業各歸一果鬼神牽報事炳冥途十善花果既乖正力五濁煩心彌多惱纍雖復聰明正直三牲之祀未虧陰陽不測六根之滯猶染衆等宜各露誠逮為天龍八部護塔善王乃至修羅八臂摩醯三目盡為敬禮尊經正典清淨波若究竟涅槃法華會一之文淨名不二之説願一切善神永斷無明長遵正本臥處寶宮坐甘香積帝釋淵廣泛般若之舟淨居深沈駕牛車之美澤及三界明照四天大悲拔苦事炳前經弘慈與樂義高名訓是以靈權降迹出沒不同菩薩位懷顯晦多術無邊劇惱扇八苦於修途有縛纏情繞六趣於危道金鎖玉床猶念解脫雕珠飾綺不及塗中至於飄颻熱風滄浪冰水暗室千重黑城百仞鐵輪碎骨銅柱焦腸傍出刀峰橫抽劍鍔如斯衆苦尤為險脆一息不追則萬劫永別剎那暫斷則千代長離相與共託閻浮泡生幻處危脆之質有險蜉蝣風電之馳誠難可駐況復三相併蹙二鼠攢危毒箭惡蛇尤為可畏庶憑正法拔茲纍染長享百福永斷六塵對至無疆唯佛可恃今為六道四生三途八難慈悲懇到一心遍禮十住菩薩三行聲聞禮救世觀音獻蓋寶積西方大勢東國妙音四辨淨名二土螺髻珠頂善宿彌勒文殊金剛藏解脫月棄陰蓋常舉手十大弟子五百羅漢願囹圄空虛疾惱消息域中百縣方外千城凡在幽執一同寬蕩人協覆蛇俗化匡蟻類服鴆之不死同拔劍之無傷含生不縷轉死自溫渭橋日飽翳桑無餓打塞三塗填碎地獄破魔兵衆壞生死軍閻羅發十善之心牛傍啓五戒之業如魚少水若雁窮林一聽法音即捨穢質人運五體歸命三寶釋藏肥九廣宏明集十五四月八日度人出家願文弟子蕭綱以今日建齋設會功德因緣歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧竊聞涅槃經言身如畫水隨畫隨合是身不淨九孔常流凡夫愚人常行味著愚癡羅剎止住其中又如瑞應經言沙門之為道也捨家妻子捐棄愛欲斷絶六情守戒無為其清淨得一心者則萬邪滅矣一心之道謂之羅漢聲色不能染榮位不能屈難動如地以免憂苦故知出恩愛獄薄俗為難善來比丘其福深重弟子以此因緣今日度人出家願一切六道四生常離愛欲永拔無明根削遣暗惑心修習般若慧足踐輕輪之光口説懸殊之辨披忍辱鎧秉智慧刀乘菩薩車坐如來座結纏披解頂相光明戒因清白後報尊重所有果業皆悉勝出受持法藏為佛真子一切道行皆悉能行一切大誓不休不息仰願十方盡虛空界一切諸佛仰願十方盡虛空界一切尊法仰願十方盡虛空界一切聖僧咸加證明又仰願十方盡虛空界一切諸天仰願十方盡虛空界一切諸仙仰願十方盡虛空界一切聰明正直守護一切善神又願今日見前幽顯大衆咸加證明今日誓願使弟子蕭綱得如所願滿菩提願一切衆生皆悉隨從得如所願廣宏明集二十八上千佛願文蓋聞九土區分四民殊俗昏波易染慧業難基故法身寂鏡有照斯感滌無明於欲海度蒼生於寶船或輕慈導捨薄笑牽悲曲豔口宣斜光頂入自鹿樹表光金河匿曜故像法衆生希向有形雖千聖異迹一智同塗弟子某甲久沒迷波長流苦沫不生意樹未啓心燈而蓋生一念敬造千佛雖復無上無為極相難辨非空非有妙智難觀而紺髮日光蓮眸月面庶可長表誠敬永寄心期廣宏明集十六為諸寺檀越願疏菩薩戒弟子蕭綱歸依十方盡虛空界一切諸佛歸依十方盡虛空界一切尊法歸依十方盡虛空界一切聖僧積習長夜輪轉覆灰末劫易危煩流難拯不樹兩門豈修二翼常恐虛蕉染惑永結駚河愛藤懸網長垂苦岸敢承三寶覺悟之力於幽顯前發弘誓願今願為武當山太平寺并此鎮望楚白塔同安習善延明頭陀上鳳林下鳳林廣嚴等寺皆盡形壽永為檀越雖七寶四事多謝往賢一念片言庶符般若方類不滅之燈終非起煙之蜜以此功德仰福皇帝春宮家國內外咸同此善乃至天龍八部六道四生普皆蒙福廣宏明集二十八上為人造丈八夾紵金薄像疏比丘某甲敬白竊以慧日潛影慈輪罷應業逐惱飄愛隨情熾徒愍衣珠抱名珍而弗悟眇歎葉金惑空言而啼止自非表茲勝業樹彼妙緣何以去此心堂移茲身窟故水精龍塔永愴恨於遺髦明鏡石龕獨徘徊於留影某甲久發誓願遍為六道四生造夾紵丈八佛像一軀年月已流因緣易奪常恐暫有之身忽隨畫水還無之報飆爾電光今便建立誠心遂茲本誓使聚月見容金山表迹見形善發聞名惡捨拔六根之痛惱去五燒之焚灼但四寶屢空七財多匱仰雙蓮而獨慨覩萬字而無由儻能薄離五家微捐四事結此冥慈共成因果則素㲲之功非唯昔世散華之報方驗來緣語善無奢在言多恧謹疏廣宏明集十六為人作造寺疏郢州某甲敬白竊以布金須達表精舍於給園影石仙人造伽藍於離越莫不事表區中心憑真外但四纏惑惱去善源而無滌五濁重繭非慧刃而安揮故以愍彼溼薪傷茲滴器今於郢州某山為十方僧建立招提寺縈負郊原面帶城雉枕倚巖壑吐納煙雲重門洞啓未創飛行之殿步櫩中霤猶寡密石之功巖飾之理難階瓶鉢之資已罄道俗儻能微留善念薄獎勝緣則事等觀香義同錫乘昔人修檀手雨七寶前賢薄施掌出雙金福有冥移言無多遜謹疏廣宏明集二十八上
