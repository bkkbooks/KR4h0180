body:
  text: 任昉答陸倕感知己賦原知己之時義故相知之信然乃貪廉之異貫奈勇怯之相懸貪在物而成纍怯在我而可甄既自得於為御又甘心於執鞭矧相知其如此獨攬涕而潺湲雖有望於己知更非謂其知己信偉人之世篤本侯服於陸鄉緬風流與道素襲袞衣與繡裳逮伊人而世載並三駿而龍光過龍津而一息望鳳條而載翔彼白玉之雖潔此幽蘭之信芳思在物之取譬非斗斛而能量匹方峙於東嶽比凝厲於秋霜不一飯以忘過每三錢以投渭匪蒙袂之敢嗟豈溝壑之能衣既蘊藉其有餘又淡然而無味得意同乎卷懷違方似乎仗氣類平叔而靡雕似子雲而不朴冠衆善而貽操綜群言而名學折高戴於后臺異鄒顏乎董幄採三詩於河閒訪九師於淮曲術兼口傳之書藝廣鏗鏘之樂時坐睡而梁懸裁據梧而錐握既文過而意深又理勝而辭縟咨余生之荏苒迫歲暮而傷情測徂陰於堂下聽鳴鐘於洛城唯忘年之陸子定一遇於班荊余獲田蘇之價爾得海上之名信落魄而無産終長勤於短生飢虛表於徐步逃責顯於疾行子比我於叔則又方余於耀卿心照情交流言靡惑萬類暗求千里懸得言象可廢筌蹄自默居非連棟行待同車冬夜不足夏日靡餘肴核非餌絲竹豈娛我未捨駕子已回輿中飲相顧悵然動色邦壤雖殊離會難測存異山陽之居沒非要離之側以膠投漆中離婁豈能識梁書陸倕傳藝文類聚三十一賦體俶征侶兮艤行舟奉君命兮不俟駕屬軒軌之易循值堯民之可化慚孺雉之聲朝惡細魚之在夜奉玉檢之陸離待金罍之云舍藝文類聚五十六靜思堂秋竹應詔靜思堂連洞房臨曲沼夾修篁竹宮豐麗於甘泉之右竹殿弘敞於神嘉之傍緑條發丹楹翠葉映雕梁入戶掃文石傍簷拂象床常生偶蘭桂結實值鴛皇逢性與之至道偶斯文之在茲歡柏梁之有賦恨相如之異時藝文類聚八十九封梁公詔夫日月麗天高明所以表德山嶽題地柔博所以成功故能庶物出而資始河海振而不泄二象貞觀代之者人是以七輔四叔致無為於軒昊韋彭齊晉靖衰亂於殷周大司馬攸縱自天體茲齊聖文洽九功武苞七德欽惟厥始徽猷早樹誠著艱難功參帷幕錫賦開壤式表厥庸建武升曆邊隙屢啓公釋書輟講經營四方司豫懸切樊漢危殆覆彊寇於沔濱僵胡馬於鄧汭永元肇號難結群醜專威擅虐毒被含靈溥天惴惴命懸晷刻否終有期神謨載挺首建大策惟新鼎祚投袂勤王沿流電舉魯城雲撤夏汭霧披加湖群盜一鼓殄拔姑熟連旍倏焉冰泮取新壘其如拾芥撲朱爵其猶掃塵霆電外駭省闥內傾餘醜纖蠹蚳蝝必盡援彼已溺解此倒懸塗歡里抃自近及遠畿甸夷穆方外肅寧解茲虐網被以寬政積弊窮昏一朝載廓聲教遐漸無思不被雖伊尹之執茲一德姬旦之光於四海方斯蔑如也昔呂望翼佐聖君猶享四履之命文侯立功平后尚荷二弓之錫況於盛德元勳超邁自古黔首惵惵待以為命救其已然拯其方斫式閭表墓未或能比而大輅渠門輟而莫授眷言前訓無忘終食便宜敬升大典式允群望其進位相國總百揆揚州牧封十郡為梁公備九錫之禮加璽紱遠遊冠位在諸王上加相國緑綟綬其驃騎大將軍如故依舊置梁百司梁書武帝紀上進梁公爵為王詔嵩高惟嶽配天所以流稱大啓南陽霸德所以光闡忠誠𥳑帝番君膺上爵之尊勤勞王室姬公增附庸之地前王令典布諸方策長祚字氓罔不由此相國梁公體茲上哲齊聖廣淵文教內洽武功外暢推轂作藩則威懷被於殊俗治兵教戰則霆雷赫於萬里道喪時昏讒邪孔熾豈徒宗社如綴神器莫主而已哉至於兆庶殲亡衣冠殄滅餘類殘喘指命崇朝含生業業投足無所遂乃山川反覆草木塗地與夫仁被行葦之時信及豚魚之日何其遼敻相去之遠歟公命師鞠旅指景長騖而本朝危切樊鄧遐遠凶徒盤據水陸相望爰自姑熟屆於夏首嚴城徑卒憑川為固公沿漢浮江電激風掃舟徒水覆地險雲傾藉茲義勇前無彊陳拯危京邑清我帝畿撲既燎於原火免將誅於比屋悠悠兆庶命不在天茫茫六合咸受其賜匡俗正本人不失職仁信竝行禮樂同暢伊周未足方軌桓文遠有慚德而爵後藩牧地終秦楚非所以式酬光烈允答元勳實由公履謙為本形於造次嘉數未申晦朔增佇便宜崇斯禮秩允副遐邇之望可進梁公爵為王以豫州之南譙廬江江州之尋陽郢州之武昌西陽南徐州之南琅邪南東海晉陵楊州之臨海永嘉十郡益梁國并前為二十郡其相國揚州牧驃騎大將軍如故梁書武帝紀上禪位詔夫五德更始三王迭興馭物資賢登庸啓聖故帝跡所以代昌王度所以改耀革晦以明由來尚矣齊德淪微危亡薦襲隆昌凶虐實違天地永元昏暴取紊人神三光再沈七廟如綴鼎業幾移含識知泯我高明之祚眇焉將墜永惟屯難冰谷載懷相國梁王天誕睿哲神縱靈武德格玄祇功均造物止宗社之橫流反生人之塗炭扶傾頽構之下拯溺逝川之中九區重緝四維更紐絶禮還紀崩樂復張文館盈紳戎亭息警浹海㝢以馳風罄輪裳而稟朔八表呈祥五靈效祉豈止鱗羽禎奇雲星瑞色而已哉勳茂於百王道昭乎萬代固以明配上天光華日月者也河嶽表革命之符圖讖紀代終之運樂推之心幽顯共積歌頌之誠華裔同著昔水政既微木德升緒天之曆數實有所歸握鏡璇樞允集明哲朕雖庸蔽暗於大道永鑒崇替為日已久敢忘列代之高義人祇之至願乎今便敬禪於梁即安姑熟依唐虞晉宋故事梁書武帝紀上梁武帝初封諸功臣詔草昧權輿事深締構康俗成務義在庇民自非群才竝軌文武宣翼將何以啓茲景祚弘此帝圖或運籌帷帳經啓王業或攻城略野殉義忘生或腹心爪牙折衝禦侮忠勤茂德夷險一致竝宜建國開宇藩屏王室山河之誓永永無窮藝文類聚五十一武帝追封永陽王詔亡兄德履沖粹識業深通徽聲善譽風流籍甚道長世短清塵緬邈感惟既往永慕慟心可追封永陽郡王藝文類聚五十一追封丞相長沙王詔夫褒崇名器率由舊章光昭德祀永世作則亡兄道被如仁功深微管懸諸日月久而彌新故能拯龜玉於已毀導涸源於將塞今理運惟新賢戚竝建感惟永遠觸目崩心可追封長沙郡王藝文類聚五十一追封衡陽王桂陽王詔亡弟暢風標秀物器體淹弘朱方之役盡勤王事策出無方物惟不賞亡弟融業行清𥳑風度間綽蚤優名輩夙廣令聞朕應天紹命君臨萬㝢祚啓郇滕感興魯衛事往運來永懷傷切暢可追封衡陽郡王融可追封桂陽郡王藝文類聚五十一封臨川安興建安等五王詔神州帝城冠冕列嶽渚宮樊鄧形勝是歸居中作衛翼宣戎重隆茲寵號實允舊章竝非親勿居惟賢斯授宏朕之介弟早富德譽董一蕃政緝是嘉庸國禮家情瞻寄隆重秀風穎俊邁誠業摽𥳑任居蕃翰政以化成偉體韻淹穆神㝢凝正經綸夷險參贊王業藝文類聚五十一求薦士詔夫進賢茂賞蔽善明罰前王盛則咸必由之朕纂統洪業夤畏大寶思求俊異協贊雍熙歷聽九工物色輿皂而白駒盈谷萇楚未刈所以臨朝永歎日昃伊佇便可博詢卿士各舉所知將量才授能擢以不次庶同則哲之明稱朕急賢之旨藝文類聚五十三初學記二十策梁公九錫文二儀寂寞由寒暑而代行三才竝用資立人以為寶故能流形品物仰代天工允茲元輔應期挺秀裁成天地之功幽協神明之德撥亂反正濟世寧民盛烈光於有道大勳振於無外雖伊陟之保乂王家姬公之有此丕訓方之蔑如也今將授公典策其敬聽朕命上天不造難鍾皇室世祖以休明早崩世宗以仁德不嗣高宗襲統宸居弗永雖夙夜劬勞而隆平不洽嗣君昏暴書契弗覩朝權國柄委之群孽𠟿戮忠賢誅殘台輔含冤抱痛噍類靡餘實繁非一竝專國命嚬笑致災睚眥及禍嚴科毒賦載離比屋溥天熬熬置身無所冤頸引決道樹相望無近無遠號天靡告公藉昏明之期因兆人之願援帥群后翊成中興宗社之危已固天人之望允塞此實公紐我絶綱大造皇家者也永明季年邊隙大啓荊河連率招引戎荒江淮擾逼勢同履虎公受言本朝輕兵赴襲縻以長算制之環中排危冒險彊柔遞用坦然一方還成藩服此又公之功也在昔隆昌洪基已謝高宗慮深社稷將行權道公定策帷帳激揚大節廢帝立王謀猷深著此又公之功也建武闡業厥猷雖遠戎狄內侵憑陵關塞司部危逼淪陷指期公治兵外討卷甲長騖接距交綏電激風掃摧堅覆鋭咽水塗原執俘象魏獻馘海渚焚廬毀帳號哭言歸此又公之功也樊漢阽切羽書續至公星言鞠旅稟命徂征而軍機戎統事非己出善策嘉謀抑而莫允鄧城之役胡馬卒至元帥潛反不相告報棄甲捐師餌之虎口公南收散卒北禦雕騎全衆方軌案路徐歸拯我邊危重獲安堵此又公之功也漢南迥弱咫尺勍寇兵糧盡闕器甲靡遺公作藩爰始因資靡託整兵訓卒搜狩有序俾我危城翻為彊鎮此又公之功也永元紀號瞻烏已及雖廢昏有典而伊霍稱難公首建大策爰立明聖義踰邑綸勳高代入易亂以化俾昏作明此又公之功也文王之風雖被江漢京邑蠢動湮為洪流句吳於越巢幕匪喻公投袂萬里事惟拯溺義聲所覃無思不韙此又公之功也魯城夏汭梗據中流乘山置壘縈川自固公御此烏集陵茲地險頓兵坐甲寒往暑移我行永久士忘歸願經以遠圖御以長策費無遺矢戰未窮兵踐華之固相望俱拔此又公之功也惟此群凶同惡相濟緣江負險蟻聚加湖水陸盤據規援夏首桴旝一臨應時褫潰此又公之功也姦孽震皇復懷舉斧蓄兵九派用擬勤王公稜威直指勢踰風電旌斾小臨全州稽服此又公之功也姑熟衝要密邇京畿凶徒熾聚斷塞津路公偏師啓塗排方繼及兵威所震望旗自駭焚舟委壁卷甲宵遁此又公之功也群豎猖狂志在借一豕突淮涘武騎如雲公爰命英勇因機騁鋭氣冠版泉勢踰洹水追奔逐北奄有通津熊耳比峻未足云擬睢水不流曷其能及此又公之功也琅邪石首襟帶岨固新壘東墉金湯是埒憑險作守兵食兼資風激電駭莫不震疊城復於隍於是乎在此又公之功也獨夫昏狠憑城靡懼鼓鐘鞺鞜慠若有餘狎是邪孽忌斯冠冕凶狡因之將逞孥戮公奇謨密運盛略潛通忠勇之徒得申厥效白旗宣室未之或比此又公之功也公有拯億兆之勳重之以明德爰初厲志服道儒門濯纓來仕清猷映代時運艱難宗社危殆崑岡已燎玉石同焚驅率貔貅抑揚霆電義等南巢功齊牧野若夫禹功寂寞微管誰嗣拯其將魚驅其被髮解茲亂網理此棼絲復禮衽席反樂河海永平故事聞之者歎息司隸舊章見之者隕涕請我民命還之斗極憫憫搢紳重荷戴天之慶哀哀黔首復蒙履地之恩德踰嵩岱功鄰造物超哉邈矣越無得而言焉朕又聞之疇庸命德建侯作屏咸用剋固四維永隆萬葉是以二南流化九伯斯征王道淳洽刑措罔用覆政弗興歷茲永久如燬既及晉鄭靡依惟公經綸天地寧濟區夏道冠乎伊稷賞薄於桓文豈所以憲章齊魯長轡宇宙敬惟前烈朕甚懼焉今進授相國改揚州刺史為牧以豫州之梁郡歷陽南徐州之義興揚州之淮南宣城吳吳興會稽新安東陽十郡封公為梁公錫茲白土苴以白茅爰定爾邦用建冢社在昔旦奭入居保佑逮於畢毛亦作卿士任兼內外禮實宜之今命使持節兼太尉王亮授相國揚州牧印綬梁公璽紱使持節兼司空王志授梁公茅土金虎符第一至第五左竹使符第一至第十左相國位冠群后任總百司恆典彝數宜與事革其以相國總百揆去録尚書之號上所假節侍中貂蟬中書監印中外都督大司馬印綬建安公印策驃騎大將軍如故又加公九錫其敬聽後命以公禮律兼修刑德備舉哀矜折獄罔不用情是用錫公大輅戎輅各一玄牡二駟公勞心稼穡念在人天丕崇本務惟穀是寶是用錫公袞冕之服赤舄副焉公鎔鈞所被變風以雅易俗陶民載和邦國是用錫公軒懸之樂六佾之舞公文德廣覃義聲遠洽椎髻髽首夷歌請吏是用錫公朱戶以居公揚清抑濁官方有序多士聿興棫朴流詠是用錫公納陛以登公正色御下以身軌物式遏不虞折衝惟遠是用錫公虎賁之士三百人公威同夏日志清姦宄放命圮族刑茲罔赦是用錫公鈇鉞各一公跨躡嵩溟陵厲區宇譬諸日月容光必至是用錫公彤弓一彤矢百盧弓十盧矢千公永言惟孝至感通神恭嚴祀典祭有餘敬是用錫公秬鬯一卣圭瓚副焉梁國置丞相以下一遵舊式欽哉其敬循往策祗服大禮對揚天眷用膺多福以弘我太祖之休命梁書武帝紀上又見南史六禪位梁王策咨爾梁王惟昔邃古之載肇有生人皇雄大庭之辟赫胥尊盧之后斯竝龍圖鳥跡以前恍忽杳冥之世固無得而詳焉洎乎農軒災皞之代放勳重華之主莫不以大道君萬姓公器御八紘居之如執朽索去之若捐重負一駕汾陽便有窅然之志暫適箕嶺即動讓王之心故知戴黃屋服玉璽非所以示貴稱尊乘大輅建旗旌蓋欲令歸趣有地是故忘己而字兆人殉物而君四海及於精華內竭畚橇外勞則撫茲歸運惟能是與況兼乎笙管革文威圖啓瑞攝提夜朗熒光晝發者哉四百告終有漢所以高揖黃德既謝魏氏所以樂推爰及晉宋亦弘斯典我太祖握河受曆應符啓運二葉重光三聖係軌嗣君喪德昏棄紀度毀紊天綱凋絶地紐茫茫九域翦為仇讎溥天相顧命懸晷刻斫涉刳孕於事已輕求雞徵杖曾何足譬是以谷滿川枯山飛鬼哭七廟已危人神無主惟王體茲上哲明聖在躬稟靈五緯明竝日月彝倫攸序則端冕而協雍熙時難孔棘則推鋒而拯塗炭功踰造物德濟蒼生澤無不漸仁無不被上達蒼昊下及川泉文教與鵬翼齊舉武功與日車竝運固以幽顯宅心謳訟斯屬豈徒桴鼓播地卿雲叢天而已哉至如晝覩爭明夜飛枉矢土淪彗刺日既星亡除舊之徵必顯更姓之符允集是以義師初踐芳露凝甘仁風既被素文自擾北闕藁街之使風車火徼之民膜拜稽首願為臣妾鍾石畢變事表於遷虞蛟魚竝出義彰於事夏若夫長人御衆為之司牧本同己於萬物乃因心於百姓寶命無常主帝王非一族今仰祗乾象俯藉人願敬禪神器授帝位於爾躬大祚告窮天祿永終於戲王允執其中式遵前典以副昊天之望禋上祀而臨億兆格文祖而膺大業以傳無疆之祚豈不盛歟梁書武帝紀上南史六禪位梁王璽書夫生者天地之大德人者含生之通稱竝首同本未知所以異也而稟靈造化愚賢之情不一託性五常彊柔之分或舛群后靡一爭犯交興是故建君立長用相司牧非謂尊驕在上以天下為私者也兼以三正迭改五運相遷緑文赤字徵河表洛在昔勳華深達茲義眷求明哲授以蒸人遷虞事夏本因心於百姓化殷為周實受命於蒼昊爰自漢魏罔不率由降及晉宋亦遵斯典我高皇所以格文祖而撫歸運畏上天而恭寶曆者也至於季世禍亂薦臻王度紛糾姦回熾積億兆夷人刀俎為命已然之逼若線之危局天蹐地逃形無所群凶挾煽志逞殘戮將欲先殄衣冠次移龜鼎衡保周召竝列宵人巢幕纍卵方此非切自非英聖遠圖仁為己任則鴟梟厲吻翦焉已及惟王崇高則天博厚儀地鎔鑄六合陶甄萬有鋒馹交馳振靈武以遐略雲雷方扇鞠義旅以勤王揚旍斾於遠路戮姦宄於魏闕德冠往初功無與二弘濟艱難緝熙王道懷柔萬姓經營四方舉直措枉較如畫一待旦同乎殷后日昃過於周文風化肅穆禮樂交暢加以赦過宥罪神武不殺盛德昭於景緯至義感於鬼神若夫納彼大麓膺此歸運烈風不迷樂推攸在治五韙於已亂重九鼎於既輕自聲教所及車書所至革面回首謳吟德澤九山滅祲四瀆安流祥風扇起淫雨靜息玄甲遊於芳荃素文馴於郊苑躍九川於清漢鳴六象於高岡靈瑞雜沓玄符昭著至於星孛紫宮水效孟月飛鴻滿野長彗橫天取新之應既昭革故之徵必顯加以天表秀特軒狀堯姿君臨之符諒非一揆書云天鑒厥德用集大命詩云文王在上於昭于天所以二儀乃眷幽明允叶豈惟宅是萬邦緝茲謳訟而已哉朕是用擁璇沈首屬懷聖哲昔水行告厭我太祖既受命代終在日天祿云謝亦以木德而傳於梁遠尋前典降惟近代百辟遐邇莫違朕心今遣使持節兼太保侍中中書監兼尚書令汝南縣開國侯亮兼太尉散騎常侍中書令新吳縣開國侯志奉皇帝璽紱受終之禮一依唐虞故事王其陟茲元后君臨萬方式傳洪烈以答上天之休命梁書武帝紀上
