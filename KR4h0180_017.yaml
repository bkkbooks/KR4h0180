body:
  text: 元帝與學生書吾聞斫玉為器諭乎知道惟山出泉譬乎從學是以執射執御雖聖猶然為弓為箕不無以矣抑又聞曰漢人流麥晉人聚螢安有挾册讀書不覺風雨以至朗月章奏不知爝火為微所以然者良有以夫可久可大莫過乎學求之於己道在則尊藝文類聚二十三答晉安王敘南康簡王薨書南康兄器宇沖貴風神英挺魏之中山徒聞退讓晉之扶風雖號師範用今方昔若吞夢雲及尋陽私疾孝感神明殆不勝喪扶而後起猶冀天道可期豈謂福善虛説且分違易久嘉會難逢綢繆宮閫不過紈綺之事離群作鎮動回星紀之曆志異雙鸞之集遽切四鳥之悲松茂柏悅夙昔歡抃芝焚蕙歎今用嗚咽藝文類聚二十二與劉孝綽書君屏居多暇差得肆意典墳吟詠情性比復稀數古人不以委約而能不伎癢且虞卿史遷由斯而作想摛屬之興益當不少洛地紙貴京師名動彼此一時何其盛也近在道務間微得點翰雖無紀行之作頗有懷舊之篇至此已來衆諸屑役小生之詆恐取辱於廬江遮道之姦慮興謀於從事方且褰帷自厲求瘼不休筆墨之功曾何暇豫至於心乎愛矣未嘗有歇思樂惠音清風靡聞譬夫夢想溫玉飢渴明珠雖愧卞隨猶為好事新有所製想能示之勿等清慮徒虛其請無由賞悉遣此代懷數路計行遲還芳札梁書劉孝綽傳孝綽免官時世祖出為荊州至鎮與孝綽書與蕭挹書闊別清顏忽焉已久未復音息勞望情深暑氣方隆恆保清善握蘭雲閣解紱龍樓允膺妙選良為幸甚想同僚多士方駕連曹雅步南宮容與自玩士衡已後唯在茲日惟昆與季文藻相暉二陸三張豈獨擅美比暇日無事時復含毫頗有賦詩別當相簡但衡巫峻極漢水悠長何時把袂共披心腹藝文類聚三十賜劉璠書鄧禹文學尚或執戈葛洪書生且云破賊前修無遠屬望良深周書劉璠傳元帝承制授樹功將軍鎮西府咨議參軍賜書遺周弘直書適有都信賢兄博士平安但京師搢紳無不附逆王克已為家臣陸緬身充卒伍唯有周生確乎不拔言及西軍潺湲掩淚恆思吾至如望歲焉松柏後凋一人而已陳書周弘正傳京城陷弘直為衡陽內史元帝在江陵遺弘直書與周弘正手書獯醜逆亂寒暑亟離海內相識零落略盡韓非之智不免秦獄劉歆之學猶斃亡新音塵不嗣每以耿灼常欲訪山東而尋子雲問關西而求伯起遇有今信力附相聞遲比來郵慰其延佇陳書周弘正傳王僧辨之討侯景也弘正與弘讓自拔迎軍僧辨得之甚喜即日啓元帝元帝手書與弘正云云仍遣使迎之答劉縮求述制旨義書學山學海未臻其極為龍為光或從王事所賴昔經陝服頗足良書憑几據梧靜供遊目枕中之記即用為枕帷首之帙仍可為帷對此自娛敬而待命叩而必應已謝懸鍾汲而無竭復乖井養藝文類聚五十八為書責數鮑泉二十罪面如冠玉還疑木偶鬚似蝟毛徒勞繞喙南史六十二答齊國雙馬書名重桂條形圖柳谷襄陽地穴近求未易滇池水裏遠訪猶難價匹龍媒聲齊驥子河精曜采似伏波之鑄銅震象飛文笑東瀛之刻玉加以控斯銀勒利此金銜鞍揭鏤衢光含兩月纏縈紫縷色麗雙絲方嗤晉后恆乘鄭國之駟更鄙曹君經餉蜀王之馬藝文類聚九十三又書於戲馬之為用遠矣大矣斯所以乾為脊馬震為馵足有是哉有是哉何則泮渙而馳可以及日躊躇而蹀可以追風赤菟之騰聲的顱之濟主陳王有照羈之説班生有韁絆之談抑聞斯美遠勞此費懷哉老生不云乎雖有拱璧以先駟馬良用此道中心藏之何日忘之藝文類聚九十三與武陵王紀書止蜀軍東下蜀中斗絶易動難安弟可鎮之吾自當滅賊南史五十三武陵王紀傳紀總戎將發益鎮繹使胡智監至蜀書止之又別紙地擬孫劉各安境界情深魯衛書信恆通同上與西魏書子糾親也請君討之答王僧辨書昔文康獻橘十有二子用今方古彼有慚色今景之凶惡既稔凱歌之聲已及嘉瑞遠臻但增歎慰御覽九百六十六引三國典略遺王僧辨書賊既乘勝必將西下不勞遠擊但守巴丘以逸待勞無慮不克與武陵王紀書皇帝敬問假黃鉞太尉武陵王自九黎侵軼三苗寇擾天長喪亂獯醜憑陵虔劉象魏黍離王室朕枕戈東望泣血西浮殞愛子於二方無諸侯之八百身被屬甲手貫流矢俄而風樹之酷萬恨始纏霜露之悲百憂繼集扣心飲膽志不圖全直以宗社綴旒鯨鯢未翦嘗膽待旦龔行天罰獨運四聰坐揮八柄雖復結壇侍將褰帷納士拒赤壁之兵無謀於魯肅燒烏巢之米不訪於荀攸才智將殫金貝殆竭傍無寸助險阻備嘗遂得斬長狄於駒門挫蚩尤於楓水怨恥既雪天下無塵經營四方專資一力方與嶽牧同茲清靜隆暑炎赫弟比如何文武具僚當有勞斃今遣散騎常侍光州刺史鄭安忠指宣往懷梁書武陵王紀傳與又與武陵王紀書甚苦大智季月煩暑流金礫石聚蚊成雷封狐千里以茲玉體辛苦行陳乃眷西顧我勞如何自獯醜憑陵羯胡叛換吾年為一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所遲也如曰不然於此投筆友于兄弟分形其氣兄肥弟瘦無復相代之期讓棗推梨長罷歡愈之日上林靜拱聞四鳥之哀鳴宣室披圖嗟萬始之長逝心乎愛矣書不盡言梁書武陵王紀傳裂帛為書催王僧辨入援吾忍死待公可以至矣南史八與蕭咨議等書蓋聞圓光七尺上映真珠之雲面門五色傍臨珊瑚之地化為金案奪麗水之珍變同珂雪高玄霜之彩豈不有機則感感而遂通有神則智智而必斷故碧玉之樓升堂未易紫紺之殿入室為難必須五根之信以信為首六度之檀以檀為上故能捨財從信去有即空率斯而談良可知矣竊以瑞像放光倏將旬日蹈舞之深形於寤寐抃躍之誠結於興寢稍覺十字之蒸嗤何曾之饌五鼎之味笑主偃之辭黿羹麟脯空聞其説羊酪猩脣曷足云也困于酒食未若過中不餐螺蚳登俎豈及春蔬為淨欲吾子三日潔齋自寅至戌一中而已自有米如玉鋭鹽類虎形雲夢之芹遼東之藻十斤之梨千樹之橘青筍紫薑固粟霜棗適口充腸無索弗獲八功德水並入法流四王俱至偕讓弘道同志為友豈不盛歟廣宏明集二十七上與劉智藏書菩薩蕭法車置郵大士劉智藏侍者自林宗遄反玄度言歸以結元禮之心彌益真長之歎故以臨風望美對月懷賢有勞寤寐無忘興寢方今玄冥在節歲聿云遒日似青緹雲浮紅蕊清臺炭重北宮井溢想禪説為娛稍符九次成誦之功轉探三密山間芳杜自有松竹之娛巖穴鳴琴非無薜蘿之致修德之暇差足樂也昔韓梅兩福求羊二仲鄭林騰名於馮翊周黨傳芳於太原或有百鎰可捐千金非貴松子為餐蒲根是服未有高蹈真儒歸宗法海梵王四鶴集林籞而相鳴帝釋千馬經丘園而局步有一於此猶或稱奇兼而總之何其盛也故知南臨之水已類呂梁之川北眺之山彌同武安之嶺豈復還思漵浦尚想強臺眷彼漢池載懷荒谷以此相求心可知矣僕久厭塵邦本懷人外加以服膺常住諷味了因彌用思齊每增求友常欲登卻月之嶺蔭偃蓋之松挹璇玉之源解蓮華之劍藩維有限脫屣無由每坐向詡之床恆思管寧之榻夢匡山而太息想桓亭而延佇白雲間之蒼江不極未因抵掌我勞如何想無金玉數在郵示弱水難航猶致書於青鳥流川弗遠佇芳音於赤玉鶴望還信以代萱蘇得志忘言此寧多述法車叩頭叩頭廣宏明集二十八上鄭衆論漢世銜命胸奴困而不辱者二人而已子卿手持漢節臥伏冰霜仲師固無下拜隔絶水火況復風生稽落日隱龍堆翰海飛沙皋蘭走雪豈不酸鼻痛心憶雒陽之宮陛屑泣橫悲想長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在己之願自隆而於時之報未盡藝文類聚五十三御覽七百七十九全德志論物我俱忘無貶廊廟之器動寂同遣何纍經綸之才雖坐三槐不妨家有三徑接五侯不妨門垂五柳但使良園廣宅面水帶山饒甘果而足花卉葆筠篁而玩魚鳥九月肅霜時饗田畯三春捧繭乍酬蠶妾酌升酒而歌南山烹羔豚而擊西缶或出或處並以全身為貴優之遊之咸以忘懷自逸若此衆君子可謂得之矣藝文類聚二十一論詩詩多而能者沈約文少而能者謝朓何遜梁書何遜傳御覽五百九十九職貢圖序竊聞職方氏掌天下之圖四夷八蠻七閩九貉其所由來久矣漢氏以來南羌旅距西域憑陵創金城開玉關絶夜郎討日逐覩犀甲則建朱崖聞蒲陶則通大宛以德懷遠異乎是哉皇帝君臨天下之四十載垂衣裳而賴兆民坐巖廊而彰萬國梯山航海交臂屈膝占雲望日重譯至焉自塞以西萬八千里路之峽者尺有六寸高山尋雲深谷絶景雪無冬夏與白雲而共色冰無早晚與素石而俱貞踰空桑而歷昆吾度青邱而跨丹穴炎風弱水不革其心身熱頭痛不改其節故以明珠翠羽之珍細而弗有龍文汗血之驥卻而不乘尼丘乃聖猶有圖人之法晉帝君臨實聞樂賢之象甘泉寫閼氏之形後宮玩單于之圖臣以不佞推轂上遊夷歌成章胡人遙集款開蹶角沿泝荊門瞻其容貌訊其風俗如有來朝京輦不涉漢南別加訪採以廣聞見名為職貢圖云爾藝文類聚五十五丹陽尹傳序傳曰大夫受郡漢書曰尹者正也及其用人實難斯授廣漢和顏接下子高自輔經術孫寶行嚴霜之誅袁安留冬日之愛自二京版蕩五馬南渡固乃上燭天文下應地理爾其地勢可得而言東以赤山為成皋南以長淮為伊洛北以鍾山為芒阜西以大江為黃河既變淮海為神州亦即丹陽為京尹雖得仁之盛頗愧前賢而眄遇之深多用宰輔皇上受圖負扆寶曆惟新制禮以告成功作樂以彰治定豈直四三皇六五帝孕夏陶周而已哉若夫位以德敘德以位成每念忝蒞京河茲焉四載以入安石之門思勤王之政坐真長之室想清談之風求瘼餘晨頗多夏景今綴采英賢為丹陽尹傳藝文類聚五十懷舊志序吾自北守琅臺東探禹穴觀濤廣陵面金湯之設險方舟宛委眺玉笥之干霄臨水登山命儔嘯侶中年承乏攝牧神州戚里英賢南冠髦俊蔭真長之弱柳觀茂弘之舞鶴清酒繼進甘果徐行長安群公為其延譽扶風長者刷其羽毛於是駐伏熊回結駟命鄒湛召王祥余顧而言曰斯樂難常誠有之矣日月不居零露相半素車白馬往矣不追春華秋實懷哉何已獨軫魂交情深宿草故備書爵里陳懷舊焉藝文類聚三十四全德志序老子言全德歸厚莊周云全德不刑呂覽稱全德之人故以全德創其名也此志陸大夫為首伊人有學有辨不夭不貧寶劍在前鼓瑟從後連環炙輠雍容卒歲駟馬高車優遊宴喜既令公侯踞掌復使要荒蹶角入室生光豈非盛矣若乃河宗九策事等神鉤陽雍雙璧理歸玄感南陽樊重高閣連雲北海公沙門人成市咨此八龍各傳一藝夾河兩郡家有萬石人生行樂止足為先但使樽酒不空坐客恆滿寧與孟嘗聞琴承睫淚下中山聽息悲不自禁同年而語也藝文類聚二十一孝德傳序夫天經地義聖人不加原始要終莫踰孝道能使甘泉自涌鄰火不焚地出黃金天降神女感通之至良有可稱藝文類聚二十忠臣傳序夫天地之大德曰生聖人之大寶曰位因生所以盡孝因位所以立忠事君事父資敬之理寧異為臣為子率由之道斯一忠為令德竊所景行且孝子烈女逸民咸有別傳至於忠臣曾無述製今將發篋陳書備加論討藝文類聚二十初學記十七忠臣傳死節篇序自非識君臣之大體鑒生死之弘分何以能滅七尺之軀殉一顧之感然平路康衢從容之道進危塗險徑忠貞之節興登平路者易為功涉險塗者難為力從容之用世不乏人忠貞之概時難屢有藝文類聚二十忠臣傳諫爭篇序富貴寵榮人所不能忘也刑戮流放人所不能甘也而士有冒雷霆犯顏色吐一言終知自投鼎鑊取離刀鋸而曾不避者其故何也蓋傷茫茫禹迹毀於一朝赫赫宗周滅成禾黍何者百世之後王化漸頽欽若之信既盡解網之仁已泯徒以繼體所及守器攸歸出則清警傳路處則憑玉負扆事無暫舛意有必從所謂生於深宮之中長於婦人之手未嘗知憂未嘗知懼況惑褒人之巧笑迷陽阿之妙舞重之以刳斫用之以逋逃亦有傾天滅地汙宮瀦社之罪拔本塞源裂冠毀冕之釁於是策名委質守死不二之臣以剛腸疾惡之心確乎貞一之性不忍見霜露麋鹿栖於宮寢麥穗黍離被於宗廟故瀝血抽誠披胸見款赴焦爛於危年甘滅亡於昔日冀桐宮有返道之明望夷無不言之恨而九重懸遠百雉嚴絶丹心莫亮白刃先指見之者掩目聞之者傷心然後鳴條有不收之魂商郊致白旗之戮藝文類聚二十四金樓子序先生曰余於天下為不賤焉竊念臧文仲既歿其言立於世曹子桓云立德著書可以不朽杜元凱言德者非所企及立言或可庶幾故戶牖懸刀筆而有述作之志矣常笑淮南之假手每嗤不韋之託人由是年在志學躬自搜纂以為一家之言粵以凡庸早賜茅社祚土瀟湘搴帷陝服早攝神州晚居外相文案盈前書幌未輟俾夜作晝勤亦至矣其間屢事玄言亟登講肆外陳玉鉉之文內宏金疊之典從乎華陰之市廢乎昌言之説其事一也六戒多務千乘糾紛夕望湯池觀仰月之勢朝瞻美氣眺非煙之色替於筆削其事二也復有西園秋月岸幘舉柸左海春朝連章摛翰雖有欣乎寸錦而久棄於尺璧其事三也而體多羸病心氣頻動臥治終日睢陽得善政之聲足不跨鞍聊城有卻兵之術吾不解一也常貴無為每嗤有待間齋寂莫對林泉而握談柄虛宇遼曠玩魚鳥而拂叢蓍愛靜之心彰乎此矣而候騎交馳仍麾白羽之扇兵車未息還控蒼兕之軍此吾不解二也有三廢學二不解而著書不息何哉若非隱淪之愚谷是謂高陽之狂生者也竊重管夷吾之雅談諸葛孔明之宏論足以言人世足以陳政術竊有慕焉老生有言知我者希則我者貴矣有是哉有是哉裴幾原劉嗣芳蕭光侯張簡憲余之知己也伯牙之琴嗟緑綺之長廢巨卿之驥驅白馬其安歸昔為俎豆之人今成介胄之士智小謀大功名其安在哉蓋以金樓子為文也氣不遂文文常使氣材不值運必欲師心霞間得語莫非撫臆松石能言必解其趣風雲玄感儻獲見知今纂開闢已來至乎耳目所接即以先生為號名曰金樓子蓋士安之玄晏稚川之抱朴者焉金樓子永樂大典本洞林序蓋聞玄枵之野鬼方難測朱鳥之舍神道莫知而緹幔曉披即辨黃鍾之氣靈臺夕望便知玉井之色復以談乎天者雖絶名言之外存乎我者還居稱謂之中余幼學星文多歷歲稔海中之書略皆尋究巫咸之説偏得研求雖紫微迢遞如觀掌握青龍顯晦易乎窺覽羡門五將亟經玩習韓終六壬常所寶愛至如周王白雉之筮殷人飛燕之卜蓍名聚雪非關地極之山卦有密雲能擁西郊之氣爻通七聖世經三古山陽王氏直解談玄河東郭生才能射覆兼而兩之竊自許矣藝文類聚七十五追思張纘詩序簡憲之為人也不事王侯負才任氣見余則申旦達夕不能已已懷夫人之德何日忘之梁書張纘傳法寶聯璧序竊以觀乎天文日月所以貞麗觀乎人文藻火所以昭發況復玉毫朗照出天人之表金牒空解生文章之外雖境智冥焉言語斯絶詠歌作焉可略談矣粵乃書稱湯誥篇陳夢説昔則王畿居亳今則帝業維揚功施天下我之自出豈與姚墟石紐譙城溫縣御龍居夏唐杜入周而已哉皇帝垂衣負扆辨方正位車書之所會同南暨交趾風雲之所沾被西漸流沙武實止戈秉宜生之劍樂彰治定減庖犧之瑟相兼二八知微知彰將稱四七如貔如虎寧俟容成翠屋之遊廣成石室之會故以宗心者忘相歸憑者常樂昔轉輪獲法南宮有金龍之瑞梵天請道東朝開寶蓋之祥盡善盡美獨高皇代古者所以出師入保冬羽秋籥實以周頌幼沖用資端士漢盈末學取憑通議大傅之論孟侯小戴之談司業山川珍異俟郊迎而可知帷幄後言藉墾田而求驗以今方昔事則不然我副君業邁宣尼道高啓筮之作聲超姬發寧假卞蘭之頌譬衡華之峻極如渤澥之波瀾顯忠立孝行修言道博施尚仁動微成務智察舞雞爻分封蟻爰初登仕明試以功德加三輔威行九流董師虎據操鈹蟬冕津鄉沈濟物仰平分之恩沂岱邛岷民思後來之政陳倉留反裘之化淮海高墨幘之聲威漸黃支化行赤谷南通舜玉北平堯柳朝鮮航海夜郎款塞然後體道方震雨施雲行漢用戊申晉維庚午增暉前曜獨擅元貞恩若春風惠如冬日履道為輿策賢成駟降意韋編留神緗帙許商算術王圍射譜南龜異説東馳雜賦任良奕棊羡門式法針興琴劍銘自盤盂無不若指諸掌尋涇辨渭重以鳳豔風飛鸞文飆豎纖者入無倫大者含元氣韻調律呂藻震玄黃豈俟取讚彥先詢聞雅主至於鹿苑深義龍宮奧説遠命學徒親登講肆詞為憲章言成楷式往復王粲事軼魏儲酬答蔡謨道高晉兩似懸鐘之應響猶衢尊之待酌率邇者踵武逖聽者風聲是使金堅閉法寶冥夕夢無懷不滅華胥夜感自非建慧橋明智劍薰戒香沐定水何以空積忽微塵賢劫而終現黍纍回幹蘊珠藏而方傳加以大秦之籍非符八體康居之篆有異六爻二乘始闢譬馬傳兔一體同歸棄犀崇象潤業滋多見思平積本有凝邈了正相因雖談假續不攝單影即此後心還蹤初焰俱宗出倒蓮華起乎淤泥並會集藏明珠曜於貧女性相常空般若無五時之説不生煩惱涅槃為萬德之宗無不酌其菁華撮其旨要採彼玳鱗拾茲翠羽潤珠隨水抵玉崑山每至鶴關旦啓黃綺之儔朝集魚燈夕爛陳吳之徒晚侍皆仰稟神規躬承睿旨爰錫嘉名謂之聯璧聯含珠而可擬璧與日而俱升以今歲次攝提星在監德百法明門於茲總備千金不刊獨高斯典合二百二十卷號曰法寶聯璧雖玉杯繁露若傍蒹葭金臺鑿楹似吞雲夢繹自伏櫪西河攝官南國十回鳳琯一奉龍光筆削未勤徒榮卜商之序稽古盛則文慚安國之製謹抄纂爵位陳諸左右使持節平西將軍荊州刺史湘東王繹年二十七字世誠侍中國子祭酒南蘭陵蕭子顯年四十八字景暢散騎常侍御史中丞彭城劉溉年五十八字茂灌散騎常侍步兵校尉東宮侍南琅邪王修年四十二字彥遠吳郡太守前中庶子南琅邪王規年四十三字威明都官尚書領右軍將軍彭城劉孺年五十五字孝稚太府卿步兵校尉河南褚球年六十三字仲寶中軍長史前中庶子陳郡謝僑年四十五字國美中庶子彭城劉遵年四十七字孝陵中庶子南琅邪王稚年四十五字孺通宣城王友前僕東海徐喈年四十二字彥雍前御史中丞河南褚澐年六十字士洋北中郎長史南蘭陵太守陳郡袁君正年四十六字世忠中散大夫金華宮家令吳郡陸襄年五十四字師卿中散大夫琅邪王藉年五十五字文海新安太守前家令東海徐摛年六十四字士繢前尚書左丞沛國劉顯年五十三字嗣芳中書侍郎南蘭陵蕭幾年四十四字德玄雲麾長史尋陽太守前僕京兆韋稜年五十五字威直前國子博士范陽張綰年四十三字孝卿輕車長史南蘭陵蕭子範年四十九字景則庶子吳郡陸罩年十八字洞元庶子南蘭陵蕭瑱年四十字文容祕書丞前中舍人南琅邪王許年二十五字幼仁宣城王文學南琅邪王訓年二十五字懷範洗馬權兼太府卿彭城劉孝儀年四十九字孝儀洗馬陳郡謝禧年二十六字休度中軍録前洗馬彭城劉蘊年三十三字懷芳前洗馬吳郡張孝總年四十二字孝總南徐州治中南蘭陵蕭子開年四十四字景發平西中録事參軍典書通事舍人南郡庾肩吾年四十八字子慎安北中記室參軍潁川庾仲容年五十七字仲容宣惠記室參軍南蘭陵蕭滂年三十二字希傅舍人南蘭陵蕭清年二十七字元專宣惠主簿前舍人陳郡謝嘏年二十五字茂範尚書都官郎陳郡殷勸年三十字弘善安北兵參軍彭城劉孝威年三十九字孝威前尚書殿中郎南蘭陵蕭愷年二十九字元才廣宏明集二十內典碑銘集林序夫法性空寂心行處斷感而遂通隨方引接故鵲園善誘馬苑弘宣白林將謝青樹已列是宣金牒方寄銀身自象教東流化行南國吳主至誠歷七霄而光曜晉王畫像經五帝而彌新次道孝伯嘉賓玄度斯數子者亦一代名人或修理止於伽藍或歸心盡於談論銘頌所稱興公而已夫披文相質博約溫潤吾聞斯語未見其人班固碩學尚云讚頌相似陸機鉤深猶聞碑賦如一唯伯喈作銘林宗無愧德祖能誦元常善書一時之盛莫得係踵況般若玄淵真如妙密觸言成纍係境非真金石何書銘頌誰闡然建塔紀功招提立寺或興造有由或誓願所記故鐫之立石傳諸不巧亦有息心應供是曰桑門或謂智囊或稱印手高座擅名預伊師之席道林見重陪飛龍之座峨眉廬阜之賢鄴中宛鄧之哲昭哉史册可得而詳故碑文之興斯焉尚矣夫世代亟改論文之理非一時事推移屬詞之體或異但繁則傷弱率則恨省存華則失體從實則無味或引事雖博其意猶同或新意雖奇無所倚約或首尾倫帖事似牽課或翻復博涉體製不工能使豔而不華質而不野博而不繁省而不率文而有質約而能潤事隨意轉理逐言深所謂菁華無以間也豫幼好雕蟲長而彌篤遊心釋典寓目詞林頃常搜聚有懷著述譬諸法海無讓波瀾亦等須彌同歸一色故不擇高卑唯能是與倘未詳悉隨而足之名為內典碑銘集林合三十卷庶將來君子或裨觀見焉廣宏明集二十
