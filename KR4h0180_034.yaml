body:
  text: 江淹扇上綵畫賦臨淄之雅女宋鄭之妙工織素麗於日月傳畫明之綵虹洛陽之伎極江南之巧窮故飾以赤野之玉文以紫山之金空青出峨嵋之陽雌黃出嶓冢之陰丹石發王屋之岫碧髓挺青蛉之岑粉則南陽鉛澤墨則上黨松心山乃嶄巖鬱峍路必𡿓㟿崎嶔馭龍所不遠至駕鳳未之前尋乃雜族以為此扇為君翳素女與玉琴玉琴兮散聲素女兮弄情旻天兮舒縹暮雲兮含頳窗中暖兮露始滴池上凝兮月又明玉琴兮珠徽素女兮錦衣促織兮始鳴秋蛾兮載飛識桂莖之就罷知蘭葉之行衰願解珮而捐玦指黃墟而先歸重曰碧臺寂兮無人蔓丹草與朱塵度俄然如一代經半景若九春命幸得為綵扇兮出入玉帶與綺紳本集藝文類聚六十九初學記二十五丹沙可學賦并序咸曰金不可鑄僕不信也試為此辭精思云爾惟雲場之少折乃人徑之多憂雖瑤笙及金瑟雜翠帳與丹幬吞悲欣於得失銜哀樂於春秋煥如星絶黯如火滅星絶難光火滅可傷故從師而問道冀幽路之或暘測神宗之無緩踐雲根之不賒訊名山及石室驗青澒與丹沙撝五難之重滯攬九仙之輕華故抱魄寂處凝神空居泯邈深晝窈鬱重虛覘炫耀而可見聽泬寥而有餘於是乘河漢之光氣騎列星之綵色輟陰陽於形有傳變化於心識浮恍惚而無涯泛靈怪而未極架日月之精照騫蛟龍之毛翼遂乃氣穆肅而神奔骨窈窈而鬼怪綴葳蕤而成冠點雜錯而為珮出湎泣而遐鶩貫濛鴻而上厲鳳之來兮蔽日鸞之集兮為群左昆吾之炎景右崦嵫之卿雲爛七采之照耀漫五色之絪縕非世俗之質見焉鬼神之嘗聞既而曖碧臺之錯落耀金宮之瓏玲幻蓮華於繡闥化蒲桃於錦屏赩丹光而電烻颯翠氛而杳冥軒惝惘於冤虹階侘傺於奔鯨惑龍宮之殿稱迷忉利之宮名故靈偃蹇兮姣服女嬋娟兮可觀秀青色之泯靡熳美目之波瀾襞日月之纂組襲星宿之羅紈百味酒兮靈之集河供鯉兮靈之安卻交甫之玉質笑陳王之妙顏所以樂精玄於太一妙宮徵於清都簫含聲而遠近琴吐音而有無奏神鼓於玉袂舞靈衣於金裾韻躑躅而易變律參差而難圖非南風之能擬詎濮水之可摹於是流漾不一遨曹無邊蛾眉既散鍾鼓都捐乘綵霞於西海駟行雨於丹淵山差池而鏡壑水清明而抱天山含玉以永歲水藏圭以窮年擬若木以寫意拾瑤草而悠然遂乃凝虛斂一守仙閉方智寂術盡魄兀心亡白生不能關其説惠子無以挫其芒原其恥市朝之失道疾讒嬖之不祥卻文綵之淫冶去利劍之鏗鎗懅生死於半氣惜百年於一光故以鑄金為器丹沙為漿慚吝既盡妖怨當忘吾師以為可學而公子謂之不良歟本集藝文類聚七十八水上神女賦江上丈人遊宦荊吳首衛國望燕途歷秦關出宋都遍覽下蔡之女具悅淇上之姝未有粉白黛黑鬼神之所無也乃造南中渡炎洲徑玉澗越金流路逶迤而無軌野忽漭而鮮儔山反覆而參錯水澆灌而縈薄石五采而橫峰雲千色而承萼日炯炯而舒光雨屑屑而稍落紫莖繞徑始參差紅荷緣水才灼爍忽而精飛視亂意走心移綺靡菱蓋悵望蕙枝一麗女兮碧渚之崖曖曖也非雲非霧如煙如霞諸光諸色雜卉雜華的的也象圭象璧若虛若實綾錦共文瑤貝合質遂乃紅唇寫朱真眉學月美目艷起秀色爛發窈窕暫見偃蹇還沒冶異絶俗奇麗不常青琴羞艷素女慚光笑李后於漢主恥西施於越王神翻覆而愈悅志離合而感傷女遂俯整玉軼仰肅金鑣或採丹葉或拾翠條守明璣而為誓解琅玕而相要情乍合而還散色半親而復嬌聳軿車於水際停雲霓於山椒奄人祗之仿像共光氣而寂寥於時也綵霞繞繞卿雲縵縵石瓊文而翕赩山龍鱗而照爛苔緑根而攢集草紅葩而舒散日炫晃以朧光樹葳蕤而蔥粲無西海之浩蕩見若木之千尋非丹山之赫曦聞琴瑟之空音理洞徹於俗聽物驚怪於世心恨精影之不滯悼光晷之難惜閲有無於俄頃驗變化於咫尺視空同而失貌察倏忽而亡迹野田田而虛翠水湛湛而空碧乃唱桂棹凌衝波背橘浦向椒阿硉矹木石洪漭蛟鼉顧御僕而情饒巡左右而怨多弔石渚而一欷悵沙洲而少歌苟懸天兮有命永離決兮若何退以為妙聲無形奇色非質麗於嬪嬙精於琴瑟尋漢女而空佩觀清角而無匹嬪楊不足聞知夔牙焉能委悉何如明月之忌玄雲秋露之慚白日愁知形有之留滯非英靈之所要術也本集藝文類聚七十九燈賦淮南王信自華淫命綵女兮餌丹砂而學鳳音紫霞沒白日沉挂明燈散玄陰顧謂小山儒士斯可賦乎於是泛瑟而言曰若大王之燈者銅華金檠錯質鏤形碧為雲氣玉為仙靈雙碗百枝艷帳充庭照錦地之文席映繡柱之鴻箏恣靈修之浩蕩釋心疑而永平茲侯服之誇詡而處士所莫營也若庶人之燈者非珠非銀無藻無縟心不貴美器窮於朴是以露冷帷幔風結羅紈螢光別桂蛾命辭蘭秋夜如歲秋情如絲怨此愁抱傷此秋期必丹燈坐歎停説忘辭至夫霜封園橘冰裂池蓀雲雪無際河海方昏冬膏既凝冬箭未度悁連冬心寂歷冬暮亦復朱燈空明但為傷故乃知燈之為寶信可賦也王遂讚善澄意斂神屈原才華宋玉英人恨不得與之同時結佩共紳今子凝章挺秀近出嘉賓吐蘅吐蕙含瓊含珉璀驂雕輦以愛國之有臣焉本集藝文類聚八十初學記二十五空青賦夫赤瓊以照㷈為光碧石以萎蕤為色咸見珍於東國並被貴於西極況空青之麗寶亦挺山海之不測其所處則峻巘層石龜穴龍壁素岸成雲頳砂如磧外隱青苔丹草內伏玉枝瑪瑙銅鉛合生𥒪崔堅英自非索嶮覓危乘鱟履螭倦春厭秋斫異鐫奇能得廁於軒宇接君子之光儀於是寫雲圖氣學靈狀仙寶波麗水華峰艷山陽谷之樹崦嵫之泉西海之草炎州之煙銀臺之鳥穆王之馬都廣之國番禺之野皆咫尺八極鏡見四荒雲煙始出日月既張若夫邃古之世汗漫窈微惟此青墨所以造之至乃翠燦軒室蔥鬱臺殿雜蛟龍之文章發麟鹿之炳絢騁神形於鐘虡舒怪物與雷電亦有曲帳畫屏素女綵扇錦色窈鬱綺質蔓衍點拂濃薄如隱如見山水萬象丹青曲變成百鎰之可珍亦千金而不賤雖楚之夏姬越之西施趙妃燕后秦娥吳娃溺愛靡意魂飛心離候青翳為藻飾方赩紅華與素儀冠衆寶而獨立信求之而無虧本集藝文類聚八十一蓮華賦并序余有蓮華一池愛之如金宇宙之麗難息絶氣聊書竹素儻不滅焉撿水陸之具品閲山海之異名珍爾秀之不定乃天地之精英殖東國之流詠出西極而擅名方翠羽而結葉比碧石而為莖蕊金光而絶色藕冰拆而玉清載紅蓮以吐秀披絳華以舒英故香氛感俗淑氣參靈躑躅人世茵蒀祇冥青桂羞烈沉水慚馨於是生乎澤陂出乎江陰見綵霞之夕照覿雕雲之晝臨既翕赩於洲漲亦映曖於川潯奪夜月及熒光掩朝日與赩火出金沙而延曜被淥波而覃拖冠百草而絶群出異類之衆夥故仙聖傳圖英隱流記一為道珍二為世瑞發青蓮於王宮驗奇花於陸地若其江淡澤芬則照電爍日池光沼緑則明壁洞室曜長洲而瓊文映青崖而火質或憑天淵之清峭或殖疏圃之蒙密故河北棹歌之姝江南採菱之女春水厲兮楫潺湲秋風駃兮舟容與著縹芰兮出波攬緗蓮兮映渚迎佳人兮北燕送上客兮南楚知荷華之將晏惜玉手之空佇乃為謠曰秋鴈度兮芳草殘琴柱急兮江上寒願一見兮道我意千里遠兮長路難若其華實各名根葉異辭既號芙蕖亦曰澤芝麗詠楚賦艷歌陳詩非獨瑞草爰兼上藥味靈丹沙氣驗青雘乃可棄劍海岫龍舉雲崿畫臺殿兮霞蔚圖縑縞兮炳爍永含靈於洲渚長不絶兮川壑本集藝文類聚八十二青苔賦并序余鑿山楹為室有苔焉意之所之故為是作云嗟青苔之依依兮無色類而可方必居間而就寂以幽意之深傷故其處石則松栝交陰泉雨長注絶澗俯視崩壁仰顧悲凹嶮兮唯流水而馳騖遂能崎屈上生班駮下布異人貴其貞精道士悅其迥趣咀松屑以高想捧丹經而永慕若其在水則鏡帶湖沼錦匝池林春塘秀色陽鳥好音青郊未謝兮白日照路貫千里兮緑草深乃生水而搖蕩遂出波而沉淫假青條兮總翠借黃花兮舒金遊梁之客徒馬疲而不能去兔園之女雖蠶飢而不自禁至於修臺廣廡幽閣間楹流黃以織琴瑟且鳴戶牖祕兮不可見履袂動兮覺人聲乃蕪階翠地繞壁點墻春禽悲兮蘭莖紫秋蟲吟兮蕙實黃晝遙遙而不暮夜永永以空長零露下兮在梧楸有美一人兮欷以傷若乃崩隍十仞毀冢萬年當其志力雄俊才圖驕堅錦衣被地鞍馬耀天淇上相送江南採蓮妖童出鄭美女生燕而頓死豔氣於一旦埋玉玦於窮泉寂兮如何苔積網羅視青蘪之杳杳痛百代兮恨多故其所詣必感所感必哀哀以情起感以怨來魂慮斷絶精念徘徊者也彼木蘭與豫章既中繩而獲夭及薜荔與蘪蕪又懷芬而見表至哉青苔之無用吾孰知其多少本集藝文類聚八十二初學記二十七金燈草賦山華綺錯陸葉錦名金燈麗草鑄氣含英若其碧莖凌露玉根升霜翠葉暮媚紫榮晨光非錦罽之可學詎瓊瑾之能方乃御秋風之獨秀值秋露之餘芬出萬枝而更明冠衆花而不群既艷溢於時暮方照麗於霜分是以移馥蘭畹徙色曲池軼長洲兮杜若跨幽渚兮芳蘺映霞光而爍爚懷風氣而參差故植君玉臺生君椒室炎萼耀天朱英亂日永緒恨於君前不遺風霜之蕭瑟藉綺帳與羅袿信草木之願畢本集靈丘竹賦登崎嶇之碧巘入朱宮之瓏玲臨曲江之回蕩望南山之蔥青鬱春華於石岸赩夏彩於沙汀遠亘紫林祕野近匝玉苑禁坰於是緑筠繞岫翠篁綿嶺參差黛色陸離紺影上謐謐而留間下微微而停靖蒙朱霞之丹氣曖白日之素景故非英非蕊非香非馥而珍跨仙草寶踰靈木夾池水而檀欒繞園塘而橚矗既間霜而無凋亦中暑而增肅每冠名於華戎將擅奇於水陸況有朝雲之館行雨之宮窗崢嶸而緑色戶踟蹰而臨空綺疏蔽而停日朱簾開而留風被箘簬之窈蔚結篠簜之溟濛或産鳷鵲之右或居露寒之東此皆金輿之所出入瑤輦之所周通初學記二十八翡翠賦彼二鳥之奇麗生金洲與炎山映銅陵之素氣濯碧磴之紅泉石錦質而入海雲綺色而出天峰炎巖而蔽日樹靜暝而臨泉霞輕重而成彩煙尺寸而作緒熱風翕而起濤丹氣赫而為暑對滫流之蛟龍衝汶漻之霧雨耀緑葉於冬岫鏡朱華於寒渚斂惠性及馴心騫頳翼與青羽終絶命於虞人充南琛於祕府備寶帳之光儀登美女之麗飾雜白玉以成文糅紫金而為色專妙綵於五都擅精華於八極傳貴質於竹素晦深聲於百億嗟乎雞鶩以稻梁致憂燕雀以堂搆貽愁既銜利之情近又遁害之無由今乃依赮火之絶垠出赤縣之紘州逭人迹而獨立攬天倪而為儔竟同獲於河鴈不俱恕於海鷗必性命兮有當孰能合兮可求本集藝文類聚九十二石劫賦并序海人有食石劫一名紫𧄤蚌蛤類也春而發華有足異者戲書為短賦我海若之小臣具品色於滄溟既爐天而銅物亦翕化而染靈比文豹而無恤方珠蛤而自寧冀湖濤之蔽迹願洲渚以淪形故其所巡左委羽右窮髮日照水而東升山出波而隱沒光避伏而不耀智埋冥而難發何弱命之不禁遂永至於夭閼已矣哉請去海人之仄陋充公子之嘉客儻委身於玉盤從風雨而可惜本集藝文類聚九十七應謝主簿騷體山櫺靜兮悲凝涼澗軒掩兮酒涵霜曾風激兮緑蘋斷積石閉兮紫苔傷芝原寂少色筠庭黯無光沐豫冠於極浦馳豫珮兮江陽弔秋冬之已暮憂與憂兮不忘使杜蘅可翦而棄夫何貴於芬芳本集十梁刻本四劉僕射東山集學騷含秋一顧眇然山中檀欒循石便娟來風木瑟瑟兮氣芬蒀石戔戔兮水成文擲江崖之素草窺海岫之青雲願芙蓉兮未晦遵江波兮待君本集十梁刻本四山中楚辭五首青春素景兮白日出之藹藹吾將弭節於江夏見杜若之始大結雕鱗以成車懸雜羽而為蓋草色緑而馬聲悲欷沿袖以流帶本集十梁刻本四豫將禮於太一乃雄劍兮玉鉤日華粲於芳閣月金披於翠樓舞燕趙之上色激河淇之名謳薦西海之異品傾東嶽之庶羞乘文魚兮錦質要靈人兮中洲同上入橘浦兮容與心惝惘兮迷所識視煙霞而一色深秋窈以虧天上列星之所極桂之生兮山之巒紛可愛兮柯團團溪崎嶬兮石架阻䬀飀颼兮木道寒煙色閉兮喬木撓嵐氣暗兮幽篁難忌蟪蛄之蚤吟惜王孫之晚還信於邑兮白露夭天病兮秋蘭石𥱰𥱰兮蔽泉雪疊疊兮薄樹車蕭條兮山徑舟容與兮水路愍晨夜之摧挫感春秋之欲暮征夫輟而在位御者局而載顧同上魂兮歸來異方不可以親蝮蛇九首雄虺戴鱗炎穴一光骨爛魂傷玄狐曳尾赤象為梁至日歸來無往此異方同上雜三言五首并序豫上國不才黜為中山長史待罪三載究識煙霞之狀既對道書官又無職筆墨之勢聊為後文搆象臺曰上妙兮道之精道之精兮俗為名名可宗兮聖風立立聖風兮茲教生寫經記兮寄圖剎畫影象兮在丹青起淨法兮出西海流梵音兮至柬溟網紫宙兮洽萬品冠璇宇兮濟群生余汨阻兮至南國迹已徂兮心未扃立孤臺兮山岫架半空兮江汀纍青杉於澗構積紅石於林櫺雲八重兮七色山十影兮九形金燈兮江蘺環軒兮匝池相思兮豫章戴雪兮抱霜栽異木而同秀種雜草而一香苔蘚生兮統石戶蓮花舒兮繡池梁伊日月之寂寂無人音與馬迹耽禪情於雲徑守息心於端石永結意於鷲山長憔悴而不惜本集十梁刻本四訪道經百學兮異文錦派兮綺分珍君之言兮皎無際悅子之道兮迥不群淡深韻於白水儼高意於浮雲軌賢豪於後學軼望識於前文茲道兮可傳可傳兮皓然挾茲心兮赴絶國懷此書兮坐空山空山隱轔兮窮翠崿水散漫兮涵素壑海外陰兮氣曇曇江上月兮光灼灼東南出兮是一山西北來兮乃雙鶴池中蓮兮十色紅窗前樹兮萬葉落四壁深兮乃泬漻左右虛兮如寂寞寂寞兮山室德經兮道帙蕩魂兮刷氣掩憂兮靜疾信若人兮先覺聊與子兮如一同上鏡論語巡青史之殘誥覽朱管之遺册惟魯濱之一叟信銜道而探寂世艱險而多阻君英明而不革講業兮齊衛論精兮洙泗子之説兮義已祕成賈鄭之雄理考黃何之壯思惜古人之取才瞰青雲而靖意意惆悵兮有端才嶒峻兮可觀憲媯禹而折法襲仁誼而求安不嬿婉於戚施寧踸踔於馬蘭俾後生之庶士鑒明德之音翰惟山中兮寂寞沉憂思兮無從石紅青兮百疊山濃淡兮萬重日下兮月出兮銅峰竹色兮拂戶水氣兮繞窗味哲人之遺珍折片句兮忘老嘉石門之埋名憐柳子之沈道書吳伯於衣袖鏤顏子於心抱籌出處之叔仲酌言默之多少若妙行與上靈非積學之所紹至遊夏以升降幸砥心而勿夭同上悅曲池北山兮黛柏南江兮頳石頳峰兮若虹黛樹兮如畫暮雲兮十里朝霞兮千尺千尺兮綿綿青氣兮往旋桐之葉兮蔽日桂之枝兮刺天百谷多兮瀉亂波雜澗饒兮騖叢泉竟長洲兮匝東島縈曲嶼兮繞西山山巒岏兮水環合水環合兮石重沓林中電兮雨冥冥江上風兮木颯颯盟清泠兮適潺湲白雲起兮弔石蓮客子思兮心斷絶心斷絶兮愁無間步東池兮夜未艾臥西窗兮月向山引一息於魂內擾百緒於眼前意春蘭與秋若願不絶於江邊同上愛遠山伯鸞兮已遠名山兮不返逮紺草之可結及朱華之未晚緤余馬於椒阿漾余舟於沙衍臨星朏兮樹暗看日爍兮霞淺淺霞兮駮雲一合兮一分映壑兮為飾綴澗兮成文碧色兮婉轉丹秀兮葐蒀深林寂以窈窈上猿狖之所群群猿兮聒山大林兮蔽天楓岫兮筠嶺蘭畹兮芝田紫蒲兮光水紅荷兮艷泉香枝兮嫩葉翡纍兮翠疊非郢路之遼遠實寸憂之相接欷美人於心底願山與川之可涉若溘死於汀潭哀時命而自愜同上遂古篇并序僕嘗為造化篇以學古制今觸類而廣之復有此文兼象天問以遊思云爾聞之遂古大火然兮水亦溟涬無涯邊兮女媧煉石補蒼天兮共工所觸不周山兮河洛交戰寧深淵兮黃炎共鬭涿鹿川兮女岐九子為氏先兮蚩尤鑄兵幾千年兮十日並出堯之間兮羿乃斃日事豈然兮姮娥奔月誰所傳兮豐隆騎雲為靈仙兮夏開乘龍何因緣兮傅説託星安得宣兮夸父鄧林義亦艱兮建木千里烏易論兮穆王周流往復旋兮河宗王母可與言兮青鳥所解路誠亶兮五色玉石出西偏兮崑崙之墟海此間兮去彼宗周萬二千兮山經古書亂編篇兮郭釋有兩未精堅兮上有剛氣道家言兮日月五星皆虛懸兮倒景去地出雲煙兮九地之下如有天兮土伯九約寧若先兮西方蓐收司金門兮北極禺強為常存兮帝之二女遊湘沅兮霄明燭光向焜煌兮太一司命鬼之元兮山鬼國殤為遊魂兮迦維羅衛道最尊兮黃金之身誰能原兮恆星不見頗可論兮其説彬炳多聖言兮六合之內心常渾兮幽明詭性令智惛兮河圖洛書為信然兮孔甲豢龍古共傳兮禹時防風處隅山兮春秋長狄生何邊兮臨洮所見又何緣兮蓬萊之水淺於前兮東海之波為桑田兮山崩邑淪寧幾千兮石生土長必積年兮漢鑿昆明灰炭全兮魏開濟渠螺蚌堅兮白日再中誰使然兮北斗不見藏何間兮建章鳳闕神光連兮未央鐘虡生華鮮兮銅為兵器秦之前兮丈夫衣綵六國先兮周時女子出世間兮班君絲履遊太山兮人鬼之際有隱淪兮四海之外孰方圓兮沃沮肅慎東北邊兮長臂兩面亦乘船兮東南倭國皆文身兮其外黑齒次祼民兮侏儒三尺並為鄰兮西北丁零又烏孫兮車師月支種類繁兮馬蹄之國善騰奔兮西南烏弋及罽賓兮天竺于闐皆胡人兮條支安息西海漘兮人迹所極至大秦兮珊瑚明珠銅金銀兮琉璃瑪瑙來雜陳兮硨磲水精莫非真兮雄黃雌石出山垠兮青白蓮華被水濱兮宮殿樓觀並七珍兮窮陸溟海又有民兮長股深目豈君臣兮丈夫女子及三身兮穿胸反舌一臂人兮跂踵交脛與羽民兮不死之國皆何因兮茫茫造化理難循兮聖者不測況庸倫兮筆墨之暇為此文兮薄暮雷電聊以忘憂又示君兮宣城本隱陵集五釋藏駕七廣宏明集三
