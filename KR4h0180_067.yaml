body:
  text: 任孝恭為羊侍中讓表摶風扇翮不覺高升擊水揚鬐遂迷遠大猶願長城巨防射魯仲之書白羽朱旗振武安之瓦深入五千張空拳以報主橫行十萬勒燕嶺而酬君藝文類聚四十八為汝南王檄魏文夫大盜移國終繼梟翦之誅凶狡憑陵必致殲夷之戮所以董卓稱亂徒藉群雄之手王莽偷安卒成光武之業故市耀臍燈府傳飲器我有魏今臨一境十世相承保乂黔黎事踰年祀爾朱榮胡貊遺種邊塞是居姦宄妄才凶愚醜類茹血餐腥本非人品依隨水草取類馬牛而包藏禍圖竊懷反噬遂長驅種落用襲我周南率彼酋豪侵陵我河縣所以流離播越亟淹星紀仰慕園陵俯傷黎庶遂得式仰唐朝宣奉舜闕梁大皇帝功踰五帝道邁三王負扆當軒平章百姓垂拱而治協和萬邦今遣同州刺史范遵等董率前鋒揚旌致討先取滑臺鼓行金谷關東英俊河北雄才痛桑梓淪蕪室家顛殞飲氣吞聲志申讎怨士各懷歸民思父母表裏符契神靈響集王者之師有征無戰鋒刃所裁幸勿罹染藝文類聚五十八為何敬容移報東魏文侍中宣惠將軍尚書左僕射何敬容報魏執事成湯二十七征志唯靜難軒轅五十二戰義在拯民既異時而同致信殊政而一揆豈其黷武以窮兵寧為仗威而尊大我皇帝降茲仁聖承彼百王負扆君臨不以四海為貴冕旒日吳常以百姓為心同二儀以覆載一六合而光宅德口羲昊道邁唐虞諒開闢之一君信典謨而莫擬均心彼我等悅怨親物有常懷人無異念自北闕紛擾河洛沸騰牝雞索家蕭牆起釁事似談尚義類閼沈競尋干戈民無定主候馬泣師月陳庭廄裹糧請救日填闕下單民有時雨之望遺黎興徯后之悲誠感仁恕理惻皇慈任好璅璅納二晉君小白區區存三亡國況我朝廷寧忘拯救是以命師薄伐至於伊川雲旗屢張非為玩武鉦鼓載陳豈尚威力湯武不祀周有義兵匹夫是讎尺土非利百戰百勝非善之善九拒九攻終勞率土納隍之慮無忘寢食李陵失律催身晉陽獲彼來移文見委曲知魏當壁得人龜兆有主作相惟賢棟梁克室欲偃兵戎式敦鄰好九皋既響唳天巳聞銅山一啓靈鍾斯應矧乃出其言善千里莫違嘉言孔昭良以收納且敵怨敵惠不在後嗣亡羊補牢亦所未失移至之日輒以奏聞即蒙詔可不爽來意行符緣邊偃兵解甲庶烽火不警邊亭息候征夫捨刁斗之勤處婦無憤望之志尋常不爭農桑是務分災恤患繼好息民稜在此歲久情無疑難還使齎移報彼來懷文苑英華六百五十答魏初和移文蓋聞軒轅五十二戰義在拯民湯武二十七征本惟靜難明異時而同致信殊政而一揆我皇帝屈茲上聖承彼百王卷六合而包容弘二儀而覆載照高日月澤富雲雨值魏氏紛綸亟離星晷競尋干戈爭以興廢王無卒歲相不浹辰隻馬泣師月陳庭闕裹糧請救日款關扉故屢動雲旗再驅蒼兕同小白之存亡等任好之繼絶匹婦是讎尺土非利然百戰百勝猶苦四民九拒九攻終勞萬姓納皇之念無忘日昃李陵失律暫摧羽鱗同孟明之反秦似荀罃之歸晉并賚來移聞之委曲知彼當壁得人兆龜有主欲偃兵戈式敦雅好鶴鳴九皋戾天已響出其言善良以欣然輒勒緣邊屯戍各息烽警旌旗晝卷刁斗夜停混雞犬于四鄰接桑麻于二境藝文類聚五十八辭縣啓但以執笏丹墀纍飛庭葉垂纓禁裏屢改欄花顧慕階墀不願違奉不使戀主之心施于犬馬傾日之志偏在葵藿藝文類聚五十謝賚錢治宅啓繩樞斷續薄雨已傾席戶穿闌微風自卷不悟恩隆問舍降自天造事深更宅乃被庸微跪條可授毀垣再築遂得窗臨上路戶望東家人悅爽塏里驚輪奐門學于公逆容駟馬巷均王濬豫擬幡旗藝文類聚六十六謝裙襦啓加以庭闕桑麻室空機杼床無暖席桁靡懸衣值蓬卷北郊雁飛南浦雪暗河陰冰生海岸而繩帶屢盡苦風霜之切弊履恆穿踐泥沙之凍自憐袖短雖內手而猶寒每恨衣輕徒斂襟而彌愴藝文類聚六十七謝示圍棊啓隱雷自天昆蟲已聽浮陰在漢柱礎先霑笑古人之不工知前事之巳拙既妙藉手傳乃事因辭見微而能顯婉以成章孝恭人實下愚才歸未品效嚬醜反學步蹇歸文業未彰武功已墜內愧齊竿外羞魯服濫出簪纓非增後車之數謬頒計食空貴長安之米藝文類聚七十四為李慶州孟堅使與覃無名書昔陸賈皇華定交知于南越長卿披繡通夷險于夜郎故傳美于往書流芳于篆素足下南中盛族嶺表豪門籍譽既深承芳已舊但道曠風雲論平生而是即江山間阻銜杯酌以何因空想神魂徒勞夢寐僕世稟威儀門勒鍾鼎提戈海嶽推轂數千逮我不才無兼文武鴻私弗替應茲閫外麾蓋所臨實宣慈造足下刺舉一隅同奉家國進止之宜實俟高算藝文類聚五十三文佚文佚多寶寺碑銘寶傳茲日法像斯時瞻風候景石陛開基準繩秋子取則迦夷業隆千載道盛一期上當星紀下接蓮峰還瞻朱閣郤昔青松朝雲曖曖夕霧溶溶階通獸迹徑有禽蹤衣移峻嶽錫叩飛泉土木綈錦玉石雕鐫寶階雲構綺壁霞鮮蓮舒藻井芰繞蘭椽法堂每喧禪室恆靜藏韜仙說臺含佛影葉下秋林烟生春嶺藝文類聚七十七祭雜墳文惟爾冥然往代求圓石而無名邈矣遐年討方磚而不記封樹遭殄誰別羽商之家墳壟傾回炵迷庚癸之向近創此伽藍實須泥丸命彼碩人置茲屯邑不謂綸繩所用遂毀牛亭之基鍬鍤所侵爰傷馬鬣之勢重使翠幕臨風佳城見日昔靈沼枯骨周王改以衣冠廣武橫尸漢主加其轊櫝輒勒彼山虞覆頽隍于舊趾命茲匠者修反壤于故林還蟻結之文依似坊之勢幸得宜陽大道無變無移京兆長阡勿回勿徙庶幽魂遊止踐昔徑而不疑塗車往還瞻舊轍而猶在藝文類聚四十賽鍾山蔣帝文嘗聞河南少雨漢主避其正殿許下輟潤魏后計彼塵書和氣乖運陰陽舛互風至若湯雲生猶火速能制茲東井告彼南箕水滿畢星氣衝卯地使君子有亹亹之心耕天無戚戚之念藝文類聚一百致書戒何敬容草莢之人聞諸道路君侯已得瞻望朝夕出入禁門醉尉將不敢呵灰然不無其漸甚休甚休敢賀于前又將弔也昔流言裁作公旦東奔燕書始來子孟不入夫聖賢被虛過以自斥未有嬰時釁而求親者也且曝鰓之鱗不念杯杓之水雲霄之翼豈顧籠樊之糧何者所託已盛也昔君侯納言加首鳴玉在要回豐貂以步文昌聳高蟬而趨武帳可謂盛矣不以此時薦才拔士少報聖主之恩今卒如爰絲之說受責見過方復欲更窺朝廷觖望萬分竊不為左右取也昔竇嬰楊惲亦得罪明時不能謝絶賓客猶交黨援卒無後福終益前禍僕之所弔實在于斯人人所以頗猶有踵君侯之門者未必皆感惠懷仁有灌夫任安之義乃戒翟公之大署冀君侯之復用也夫在思過之日而挾復用之意未可為智者說矣君侯宜杜門念失無有所通築茅茨于鍾阜聊優游以卒歲見可憐之意著待終之情復仲尼能改之言惟子貢更也之譬少戢言于衆口微自救于竹帛所謂失之東隅收之桑榆如此今明主聞知尚有冀也僕東皋鄙人入𤕠幸無銜寠恥天下之士不為執事道之故披肝膽示情素君侯豈能鑒焉梁書何敬容傳為先師讓刺史湘東王贈賻先師平素食不求飽衣不求輕凡有贈遺皆無所受臨終之日誡約家門薄棺周形巾褐為斂雖蒙賚及不敢輕承教旨以違平生之操錢布輒付使反南史七十六庾承先傳致武帝書雙林樹下當來解脫善慧大士白國主救世菩薩今欲修上中下善希能受持其上善略以虛懷為本不著為宗亡相為因涅槃為果其中善略以治身為本治國為宗天上人閒果報安樂其下善略以護養衆生勝殘去殺普令百姓俱稟六齊今聞皇帝崇法欲伸論議未遂襟懷故遣弟子傅暀馳書告白續高僧傳景德傳燈録心王銘觀心空王玄妙難測無名無相大有神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定其有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪瞋體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂于此漂沈諸佛菩薩非此安心明心大士悟此玄音身心性妙用無能改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性雖空能凡能聖是故相勸好自防慎剎那造作還復漂沈清淨心智如世黃金般若法藏盡在身心無為法寶皆淺非深諸佛菩薩了此本心有緣遇者非去來今元釋念常佛祖歷代通載云昭明太子問大士何不論義答曰答薩所說非長非短非廣非狹非有邊非無邊如如正理復有何言嘗著心王銘一篇與沙門慧皎書弟子孤子王曼穎頓首和南一日蒙示所撰高僧傳并使其掎托刀尋始竟但見偉才紙斃墨渝迄未能罷若乃至法既被名德已興年幾五百時經六代自摩騰法蘭發軫西域安侯支讖荷錫東都雖迹標出沒行實深淺咸作舟梁大為利益固宜油素傳美鉛槧定辭昭示後昆揄揚往秀而道安羅什閒表秦書佛澄道進雜聞趙冊晉史見拾復恨局當時宋典所存頗因其口會兼且攙出君台之記糅在元亮之說感應或所商攉幽明不無梗概泛顯傍文未足光闡閒有諸傳文非隱括景興偶采居山之人僧寶偏綴遊方之士法濟唯張高逸之例法安止命志節之科康泓專紀單開王季但稱高座僧瑜卓爾獨載元畼超然孤録雖釋法進所造王巾有著意存該綜可擅一家然進名博而未廣巾體立而不就梁來作者亦有病諸僧祐成𥳑既同法濟之責孝秀染毫復獲景興之誚其唱公纂集最實近之求其鄙意更恨煩𤕠法師此製始所謂不刊之筆綿亙古今包括內外屬辭比事不文不質謂繁難省元約豈加以高為名既使弗逮者恥開例成廣足使有善者勸同之二三諸子前後撰述豈得潔長量短同年共日而語之哉信門徒竟無一言可豫市肆空設千金之賞方入簉龍函上登鱗閣出內瓊笈卷舒玉笥第子雖實不敏少嘗好學頃日尪餘觸途多昧且獲披來帙其文在斯鑽仰弗暇討論何所誠非子通見元則之論良愧處道知休奕之書徒深謝安慕竺曠風流殷浩憚支遁才俊耳不見旬日窮情已勞扶力此白以代訴盡弟子孤子王曼穎頓首和南梁高僧傳十四答釋法雲書難范縝神滅論弟子績和南垂示敕答臣下神滅論伏深欣躍弟子竊惟道不自弘弘實由人人須其識識須其位周易所稱聖人大寶日位豈其意乎然或位而不人或人而不位三丈云備其理至難故宣尼絶筆于獲麟孟軻反身于天爵誠無其位也嗚呼真化殆將淪汲今天子以仁聖盛明據至尊之位蓋層山可以衆照飄其和不可移也鐘鼓可以雞豚亂其鳴不可聞也將使惵惵黔首濟其長夜自非德合天地誰能若斯弟子早沐虛風既聞之矣然而燕雀之集猶或相昏飛蓬之門尚自交構聖旨爰降辭高理愜敦以人天之善誡以莫大之刑一言作訓內外俱闡夫以孺子入井凡民猶或傷之況乃聖慈御物必以惻隱為心邪能指白馬之非白猶見屈于中庸至于神享機外志存弘化魍魎摧其頰舌焉足道哉神牘天貴本非窺觀遂能存示用慚寡德弟子沈績和南弘明集十立神明成佛記注序夫神道冥默宣尼固已絶言心數理妙柱史又所未說非聖智不周近情難用語遠故也是以先代玄儒談遺宿業後世通辨亦淪滯來身非夫下天之極慮何得而詳焉故惑者聞識神不斷而全謂之常聞心念不常而全謂之斷云斷則迷其性常云常則惑其用斷因用疑本謂在本可滅因本疑用謂在用弗移莫能精求互起偏執乃使天然覺性自汲浮談聖王稟以玄符御茲大寶覺先天垂則觀民設化將恐支離詭辨搆義橫流徵敘繁絲伊誰能振釋教遺文其將喪矣是以著斯雅論以弘至典績早念身空棲心內教每餐法音用忘寢疾而暗情難曉觸理多疑至于佛性大義頓迷心路既天誥遠流頂同撫覿萬夜獲開千昏永曙分除之疑朗然俱徹竊惟事與理亨無物不識用隨道合奚心不辨故行雲徘徊猶感美音之和游魚踴躍尚賞清絲之韻況以入神入妙發自天衷此臣所以舞之蹈之而不能自已者也敢以膚受謹為注釋豈伊錐管用窮天奧庶幾固惑所釋焉弘明集九芳林園甘露頌福以德彰慶沿業皎茲嘉露因祥特表翻潤星夕流草月嘵奇越雕氛珍逾素鳥至道伊融大化斯肇惟此大化實感天眷降液丹墀飛津綺殿九服依風八荒改面敢述朦詞式旌舞忭初學記二天部露五孝敬寺剎下銘并序夫妙覺靈遠隨方應現衣瓶影迹資以護持髮爪齒牙咸能利益孝敬寺者公上璡為亡母楊叔女之所立也波斯請生悲號靡贖日磾觀畫泣血寧追即以三從之居建為伽藍之地舊井無遷喬木猶在前瞻綺陌郤背青門寶殿霞臨長廊霧繞寺初欲豎剎導倉令鉏曇誕忽有雙舍利降之放光滿室止取得一舍利璡訖就曇誕云巳奉送還臺于御前分身為六後數日中夜忽聞鐘鳴驚視復得一舍利寺主蒨法師夢人謂之曰法身尋降俄而曇誕送舍利井諸處所送其數其八大同六年太歲庚申五月十五日壬戍建剎四衆圍繞歌唄成群綵鳳珠幡含風曜日與大地而長存隨賢劫以永久乃作銘曰填智絶境應有權歸譬空無迹指日齊暉寶舟潛運法雨隨機分形散體調御歸依聿造應真規摹踊現雕飾彪炳丹青蔥蒨寫彼金園圖茲紺殿猗歟清信惇孝斯在追慕愷風安親慧海福善隨積薰修無改陵移谷徙暑往寒來衣貞石池變深灰長辭八難永離三姦衆生有盡誓願無回古刻叢鈔又志梁大同六年太歲庚申五月十五日壬戍菩薩戒弟子公上璡奉為亡母楊叔女捨所居宅僧伽藍皇帝賚名孝敬寺願諸佛菩薩龍天神常加護衛寺舍安立僧衆證明弟子璡建立功德藉此善根七世久遠眷屬冢暮寧貼亡殃永使斷絶同生方無量壽國沐浴通寤無生忍六道四生皆得解脫其登菩提入正覺路現世兒孫長幼竝願安隱無餘煩惱鄣礙中妙願皆悉果遂古刻叢鈔論書所學正書宜以殷鈞范懷約為主方正循紀修短合度所學草書宜以張融王僧虔為則體用得法意氣有餘章表箋書于斯足矣夫才能則關性分耽嗜殊妨大業但令緊快分明屬辭流便字不須體語輒投聲若以已巳莫分東柬相亂則兩王妙迹二陸高才頃來非所用也王延之有言曰勿欺數行尺牘即表三種人身豈非一者學書得法二者作字得體三者輕重得宜意謂猶須言無虛出斯則善矣近何令貴隔勢傾朝野聊爾疏漏遂遭十穢之書今聊存兩字書曰有寒士自陳𥳑於掌選詩云伎能自寡薄支葉復單貧柯條濫垂景大石詎知晨狗馬雖難畫犬羊誠易馴效嚬終未似學步豈如真實云朝亂緒是曰斁彝倫俗作于茲混人途自此沌離合之詩由來久矣不知譏剝爰加稱贊是其第六穢也近來貴宰于二品清宦進不假手作書而筆跡過鄙無法度彼恭拜忽云永感答人借車還白不具真本流傳合朝恥辱是其第七穢也以此而言書何容易且梁制與平吉人箋書有壞懷語者不得答書許乃告絶私弔答中彼此言感思乖錯者州望須刺大中正處入清議終身不仕盛名年少宜留意勉之余見學阮研書者不得其骨力婉媚唯學攣拳委盡學薄紹之書者不得其批研淵微徒自經營嶮急晚途別法貪省愛異濃頭纖尾斷腰頓足一八相似十小難分屈等如勻變前為草咸言祖述王蕭無妨日有訛謬星不從生籍不從丰許慎門徒居然嗢噱衛恆子弟寧不傷嗟詿誤衆家豈宜改習書字之興由來尚矣沮誦倉頡黃帝史也周宣王時柱下史史籀始著籀書今六八之法雖存十五之篇亡矣及秦相李斯破大篆為小篆造倉頡七章中車府令趙高造爰曆六章太史胡毋敬造博學七章後人分五十五章為三倉上卷至哀帝元嘉中揚子雲作訓纂記滂喜為中卷和帝永元中賈升郎更續記彥均為下卷皆是記字字出衙人故人稱為三倉也夫蒼雅之學儒博所宗自景純注解轉加敦尚漢晉正史及古今字書竝云倉頡九篇是李斯所作今竊尋思必不如是其第九章論豨信京劉等郭云豨信是陳豨韓信京劉是大漢西土是長安此非讖言豈有秦時朝宰談漢家人物牛碩馬腹先達何以安之江左碩儒相係梁初復有任昉及沈約悉未有譏駮余忽橫議實不自許敬俟明哲定其可否而字韻集方言廣雅凡録字者十有四家許穿鑿賈氏慎乃奏說文曹産開拓許侯爰成字苑說文則形聲具舉字苑則品類周悉追悟典墳字弗全體周禮以雞斯為笄纚禮記以相近為禳祈致今衆議叢殘音辭䮞互蓋由程邈變隸流傳未一鄭公詩譜頗顯其源且書文一反草木相從凡五百六十七部合一萬五千九百一十五字即曰世中所行十分裁一而今點畫失體深成怪也近有居士阮孝緒撰古今文字三卷窮搜正典次丹陽五官丘陵撰文字指要二卷精右擲發惟此兩書可稱要用余以值明師留心字法所以坐右作午疆宇不依羲獻妙跡不逐陶葛名方作蓴羹不斆晉書不循韻集爰以淺見輕述字府自謂此文或均螢露齊未王融圖古今雜體六十四書少年崇倣家藏紙貴而鳳魚蟲鳥是七國時書元常皆作隸書故貽後來所詰湘東王遣沮陽令韋仲定為九十一種次功曹謝善勛增其九法合成百體其中以八卦書為一以大為兩去徑文一字方寸千言大上止傳可爾鬼書惟有業殺刁斗出干古器爾時由乎內典散隸露書終是飛白意謂此等竝非通論今所不取余經為正階侯書十牒屏風作百體閒以采墨當時衆所驚異自爾絶筆惟留草本而已其百體者懸針書垂露書秦望汲冢書金鵲書玉文書鵠頭書虎爪書倒薤書偃波書幡信書飛白篆古頑書籀文書奇字謬篆制書列書日書月書風書雲書星隸填隸蟲食葉書科斗書署書胡書蓬書相書天竺書轉宿書一筆篆飛白書一筆隸飛白草古文隸橫書楷書小科書此五十種皆純墨璽文書節文書真文書符文書芝英隸花草隸幡信隸鍾鼓隸龍虎篆鳳魚篆騏驎篆仙人篆科斗蟲篆雲篆蟲篆魚篆鳥篆龍篆龜篆虎篆鸞篆龍虎隸鳳魚隸麟鳳隸仙人隸科斗隸雲隸蟲隸魚隸鳥隸龍隸龜隸鸞隸蛇龍文隸書龜文書鼠書牛書虎書兔書龍草書蛇草書馬書羊書猴書犬書豕書此十二時書已上五十種皆采色其外復有大篆小篆銘鼎摹印刻符石經象形篇章震書倒書反左書等及宋中庶宗炳出九體書所謂縑素書𥳑奏書箋表書弔記書行押書楫書藁書半草書全草書此九法極真草書之次第焉刪捨之外所存猶一百二十體張芝始作一筆飛白書此干井冊等字為妙所以唯云一筆飛白書則無所不通矣反左書者大同中東宮學士孔敬通所創余見而達之于是座上酬答諸君無有識者遂呼為衆中清間法今學者稍多解者益寡敬通又能一筆草書一行一斷婉約流利特出天性頃來莫有繼者宗炳又造畫瑞應圖千卓絶王元長頗加增定乃大虞舜獬豸周穆狻猊漢武神鳳衛加舞鶴五城九井螺杯魚硯金縢玉英玄圭朱草等凡二百一十物余經取其善草嘉禾露禽瑞獸樓臺器服可為玩對者盈縮其形狀參詳其動植制一部焉此乃青出于藍而實世中未有復于屏風上作雜體篆二十四種寫凡百名將恐一筆鄣子凡百屏風傳者逾謬併懷歎息世本云史皇作圖黃帝臣也其唐虞之文章夏后之鼎象則圖畫之宗焉其後繪事逾精丹青轉妙乃以釘女心痛圖魚獺集敬君以之亡婦王嬙由此失身近代陸綏足稱畫聖所聞談者一筆之外僅可蟬雀顧長康稱為三絶終是半癡人耳雜體既資于畫所以附乎書末又見御覽七百四十八有刪節馳書報黃羅漢吾至梵境境帖然前日所言皆兒戲耳御覽三百四引三國典略于謹大軍次于樊鄧梁主戒嚴王琛既至石梵未見我軍乃馳書報黃羅漢云云羅漢入啓梁主疑之與陳丞相箋今月五日平旦于御路見龍跡自大社至象闕亙三四里陳書武帝紀上紹泰二年九月壬寅改年曰太平元年進高祖位丞相丁未中散大夫王彭箋稱云云
