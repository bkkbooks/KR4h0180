body:
  text: 武帝罷鳳皇銜書詔朕君臨南面道風蓋闕嘉祥時至為愧已多假令巢侔軒閣集同昌戶猶當顧循寡德推而不居況於名實頓爽自欺耳目一日元會太樂奏鳳皇銜書伎至乃舍人受書升殿跪奏誠復興乎前代率由自遠內省懷慚彌與事篤可罷之隋書音樂志上贈諡呂僧珍詔思舊篤終前王令典追榮加等列代通規散騎常侍領軍將軍平固縣開國侯僧珍器思淹通識宇詳濟竭忠盡禮知無不為與朕契闊情兼屯泰大業初構茂勳克舉及居禁衛朝夕盡誠方參任台槐式隆朝寄奄致喪逝傷慟於懷宜加優典以隆寵命可贈驃騎將軍開府儀同三司常侍鼓吹侯如故給東園祕器朝服一具衣一襲喪事所須隨由備辦諡曰忠敬侯梁書呂僧珍傳求言詔昔公卿面陳載在前史令僕陛奏列代明文所以釐彼庶績成茲群務晉氏陵替虛誕為風自此相因其失彌遠遂使武帳空勞無汲公之奏丹墀徒闢闕鄭生之履三槐八座應有務之百官宜有所論可入陳啓庶藉周爰少匡寡薄梁書武帝紀中停將送老小詔夫刑法悼耄罪不收孥禮著明文史彰前事蓋所以申其哀矜故罰有弗及近代相因厥網彌峻髫年華髮同坐入愆雖懲惡勸善宜窮其制而老幼流離良亦可愍自今逋謫之家及罪應質作若年有老小可停將送梁書武帝紀中隋書刑法志通典一百六十四收藏魏人戰亡者詔去歲朐山大殲醜類宜為京觀用旌武功但伐罪弔民皇王盛軌掩骼埋胔仁者用心其下青州悉使收藏梁書武帝紀中議南北二郊坎位詔禮祭月於坎良由月是陰義今五帝天神而更居坎又禮云祭日於壇祭月於坎並是別祭不關在郊故得各從陰陽而立壇坎兆於南郊就陽之義居於北郊就陰之義既云就陽義與陰異星月與祭理不為坎隋書禮儀志一收斂道死詔掩骼埋胔義重周經槥櫝有加事美漢策朕向隅載懷每勤造次收藏之命亟下哀矜而宇縣遐深遵奉未洽髐然路隅往往而有言愍沈枯彌勞傷惻可明下遠近各巡境界若委骸不葬或蒢衣莫改即就收斂量給棺具庶夜哭之魂斯慰霑霜之骨有歸梁書武帝紀中改建明堂詔明堂地勢卑溼未稱乃心外可量就埤起以盡誠敬梁書武帝紀中又見南史六議盥及滌爵各一匜詔祭祀用洗匜中水盥仍又滌爵爵以禮神宜窮精潔而一器之內雜用洗手外可詳議隋書禮儀志二贈諡柳慶遠詔念往篤終前王令則式隆寵數列代恆規使持節都督雍梁南北秦四州郢州之竟陵司州之隨郡諸軍事安北將軍寧蠻校尉雍州刺史雲杜縣開國侯柳慶遠器識淹曠思懷通雅爰初草昧預屬經綸遠自升平契闊禁旅重牧西藩方弘治道奄至殞喪傷慟於懷宜追榮命以彰茂勳可贈侍中中軍將軍開府儀同三司鼓吹侯如故諡曰忠惠賻錢二十萬布二百匹梁書柳慶遠傳求賢詔朕恭祗明祀昭事上靈臨竹宮而登泰壇服裘冕而奉蒼璧柴望既升誠敬克展思所以對越乾元弘宣德教而缺於治道政法多昧實佇群才用康庶績可班遠近博採英異若有確然鄉黨獨行州閭肥遁丘園不求聞達藏器待時未加收採或賢良方正孝弟力田並即騰奏具以名上當擢彼周行試以邦邑庶百司咸事兆民無隱又世輕世重隨時約法前以劓墨用代重辟猶念改悔其路已壅並可省除梁書武帝紀中贈諡王茂詔旌德紀勳哲王令軌念終追遠前典明誥故使持節散騎常待驃騎將軍開府儀同三司江州刺史茂識度淹廣器宇凝正爰初草昧盡誠宣力綢繆休戚契闊屯夷方賴謀猷永隆朝寄奄至薨殞朕用慟於厥心宜增禮數式昭盛烈可贈侍中太尉加班劍二十人鼓吹一部諡曰忠烈梁書王茂傳加孫謙優秩詔光祿大夫孫謙清慎有聞白首不怠高年舊齒宜加優秩可給親信二十人并給扶梁書孫謙傳務本詔觀時設教王政所先兼而利之實惟務本移風致治咸由此作頃因革之令隨事必下而張弛之要未臻厥宜民瘼猶繁廉平尚寡所以佇旒纊而載懷朝玉帛而興歎可申下四方政有不便於民者所在具條以聞守宰若清潔可稱或侵漁為蠹分別奏上將行黜陟長吏勸課躬履堤防勿有不修致妨農事關市之賦或有未允外時參量優減舊格梁書武帝紀中恤民詔朕當扆思治政道未明昧旦劬勞亟移星紀今太皞御氣勾芒首節升中就陽禋敬克展務承天休布茲和澤尢貧之家勿收今年三調其無田業者所在量宜賦給若民有産子即依格優蠲孤老鰥寡不能自存咸加賑恤班下四方諸州郡縣時理獄訟勿使冤滯並若親覽梁書武帝紀中量代牲牢詔夫神無常饗饗於克誠所以西鄰禴祭實受其福宗廟祭祀猶有牲牢無益至誠有纍冥道自今四時蒸嘗外可量代隋書禮儀志二通典四十九又詔今雖無復牲腥猶有脯修之類即之幽明義猶未盡可更詳定悉薦時蔬隋書禮儀志二通典四十九以何遠為給事黃門侍郎詔何遠前在武康已著廉平復蒞二邦彌盡清白政先治道惠留民愛雖古之良二千石無以過也宜升內榮以顯外績可給事黃門侍郎梁書何遠傳聽流民還本詔夫樂所自生含識之常性厚下安宅馭世之通規朕矜此庶氓無忘待旦亟弘生聚之略每布寬恤之恩而編戶未滋遷徙尚有輕去故鄉豈其本志資業殆闕自返莫由巢南之心亦何能弭今開元發歲品物惟新思俾黔黎各安舊所將使郡無曠土邑靡遊民雞犬相聞桑柘交畛凡天下之民有流移他境在天監十七年正月一日以前開恩半歲悉聽還本蠲課三年其流寓過遠者量加程日若有不樂還者即使著土籍為民準舊課輸若流移之後本鄉無復居宅者村司三老及餘親屬即為詣縣占請村內官地官宅令相容受使戀本者還有所託凡坐為市埭諸職割盜衰減應被封籍者其田宅車牛是民生之具不得悉以沒入皆優量分留使得自止其商賈富室亦不得頓相兼併遁叛之身罪無輕重並許首出還復民伍若有拘限自還本役並為條格咸使知聞梁書武帝紀中以蕭景為安右將軍監揚州詔揚州應須緝理宜得其人侍中領軍將軍吳平侯景才任此舉可以安右將軍監揚州并置佐史侍中如故梁書蕭景傳贈諡張惠紹詔張惠紹志略開濟幹用貞果誠勤義始績聞纍任爰居禁旅盡心朝夕奄至殞喪惻愴於懷宜追寵命以彰勳烈可贈護軍將軍給鼓吹一部布百匹蠟二百斤諡曰忠梁書張惠紹傳旌表甄恬詔朕虛己欽賢寤寐盈想詔彼群嶽務盡搜揚恬既孝行殊異聲著邦壤敦風厲俗弘益茲多牧守騰聞義同親覽可旌表室閭加以爵位梁書孝行甄恬傳州將始興王憺表其行狀旌沈崇傃詔前軍沈崇傃少有志行居喪踰禮𪗋制不終未得大葬自以行乞淹年哀典多闕方欲以永慕之晨更為再期之始雖即情可矜禮有明斷可便令除釋擢補太子洗馬旌彼門閭敦茲風教梁書沈崇傃傳贈丘仲孚詔豫章內史丘仲孚重試大邦責以後效非直悔吝云亡實亦政績克舉不幸殞喪良以傷惻可贈給事黃門侍郎梁書丘仲孚傳答蕭昱手詔昱表如此古者用人必前明試皆須績用既立乃可自退之高昔漢光武兄子章興二人並有名宗室就欲習吏事不過章為平陰令興為緱氏宰政事有能方遷郡守非直政績見稱即是光武猶子昱之才地豈得比類焉往歲處以淮南郡既不肯行續用為招遠將軍鎮北長史襄陽太守又以邊外致辭改除招遠將軍永嘉太守復云內地非願復問晉安臨川隨意所擇亦復不行解巾臨郡事不為薄數有致辭意欲何在且昱諸兄遞居連率相繼推轂未嘗缺歲其同産兄景今正居藩鎮朕豈厚於景而薄於昱正是朝序物議次第若斯於其一門差自無愧無論今日不得如此昱兄弟昔在布衣以處成長於何取立豈得任情反道背天違地孰謂朝廷無有憲章特是未欲致之於理既表解職可聽如啓梁書蕭昱傳答陶弘景解官詔卿遣纍卻粒尚想清虛山中間靜得性所樂當善遂嘉志也若有所須便可以聞仍賜帛十匹燭二十挺又別敕朕月給上茯苓五斤白蜜二斗以供服餌道藏本陶隱居集贈諡馮道根詔豫寧縣開國伯新除散騎常侍領左軍將軍馮道根奉上能忠有功不伐撫人留愛守邊難犯祭遵馮異郭伋李牧不能過也奄致殞喪惻愴於懷可贈信威將軍左衛將軍給鼓吹一部賻錢十萬布百匹諡曰威梁書馮道根傳給辦永陽太妃喪事詔永陽大太妃奄至薨逝哀摧切割不能自勝便出敘哀可給東園祕器喪事所須隨由辦祖行有辰式弘茂典古刻叢鈔徐勉撰永陽太妃墓志銘諡永陽太妃詔故永陽大太妃禮數有殊德行惟光訓範蕃嗣式盛母儀即遠戒期悲懷抽割可詳典故以隆嘉諡禮也同上以江革為太尉臨川王長史詔前貞威將軍鎮北長史廣陵太守江革才思通贍出內有聞在朝正色臨危不撓首佐台鉉實允僉諧可太尉臨川王長史梁書江革傳收養孤獨詔春司御氣虔恭報祀陶匏克誠蒼璧禮備思隨乾覆布茲亭育凡民有單老孤稚不能自存主者郡縣咸加收養贍給衣食每令周足以終其身又於京師置孤獨園孤幼有歸華髮不匱若終年命厚加料理尢窮之家勿收租賦梁書武帝紀下徙籍田詔夫欽若昊天曆象無違躬執耒耜盡力致敬上協星鳥俯訓民時平秩東作義不在南前代因襲有乖禮制可於震方簡求沃野具茲千畝庶允舊章梁書武帝紀下停賀瑞詔王公卿士今拜表賀瑞雖則百辟體國之誠朕懷良有多愧若其澤漏川泉仁被動植氣調玉燭治致太平爰降嘉祥可無慚德而政道多缺淳化未凝何以仰叶辰和遠臻冥貺此乃更彰寡薄重增其尢自今可停賀瑞梁書武帝紀下下百濟王餘隆詔行都督百濟諸軍事鎮東大將軍百濟王餘隆守藩海外遠修貢職乃誠款到朕有嘉焉宜率舊章授茲榮命可使持節都督百濟諸軍事寧東大將軍百濟王梁書東夷百濟傳耕籍詔夫耕藉之義大矣哉粢盛由之而興禮節因之以著古者哲王咸用此作眷言八政致茲千畝公卿百辟恪恭其儀九推畢禮馨香靡替兼以風雲叶律氣象光華屬覽休辰思加獎勸可班下遠近廣闢良疇公私畎畝務盡地利若欲附農而糧種有乏亦加貸恤每使優遍孝悌力田賜爵一級預耕之司剋日勞酒梁書武帝紀下贈諡昌義之詔護軍將軍營道縣開國侯昌義之幹略沈濟志懷寬隱誠著運始效彰邊服方申爪牙寄以禁旅奄至殞喪惻愴於懷可贈散騎常侍車騎將軍并鼓吹一部給東園祕器朝服一具賻錢二萬布二百匹蠟二百斤諡曰烈梁書昌義之傳以會稽太守武陵王紀為東揚州刺史詔貞白儉素是其清也臨財能讓是其廉也知法不犯是其慎也庶事無留是其勤也南史五十三武陵王紀傳尋授揚州刺史中書詔成武帝加四句贈諡周捨詔太子詹事豫州大中正捨奄至殞喪惻愴於懷其學思堅明志行開敏劬勞機要多歷歲年才用未窮彌可嗟慟宜隆追遠以旌善人可贈侍中護軍將軍鼓吹一部給東園祕器朝服一具衣一襲喪事隨由資給諡曰簡子梁書周捨傳應接元法僧詔廟謨已定王略方舉侍中領軍將軍西昌侯深藻可便親戎以前啓行鎮北將軍南兗州刺史豫章王綜董馭雄桀風馳次邁其餘衆軍計日差遣初中後師善得嚴辦朕當六軍雲動龍舟濟江梁書武帝紀下褒異周捨詔故侍中護軍將軍簡子捨義該玄儒博窮文史奉親能孝事君盡忠歷掌機密清貞自居食不重味身靡兼衣終亡之日內無妻妾外無田宅兩兒單貧有過古烈往者南司白渦之劾恐外議謂朕有私致此黜免追愧若人一介之善外可量加褒異以旌善人梁書周捨傳答徐勉表上五禮詔經禮大備政典載弘今詔有司案以行事也梁書徐勉傳又詔勉表如此因革允釐憲章孔備功成業定於是乎在可以光被八表施諸百代俾萬世之下知斯文在斯主者其案以遵行勿有失墜同上徙臨賀王正德詔汝以猶子情兼常愛故越先汝兄剖符連郡往年在蜀昵近小人猶謂少年情志未定更於吳郡殺戮無辜劫盜財物雅然無畏及還京師專為逋逃乃至江乘要道湖頭斷路遂使京邑士女早閉晏開又奪人妻妾略人子女徐敖非直失其配匹乃橫尸道路王伯敖列卿之女誘為妾媵我每加掩抑冀汝自新了無悛革怨讎逾甚遂匹馬奔亡志懷反噬遣信慰問冀汝能還果能來歸遂我夙志謂汝不好文史志在武功令汝杖節董戎前驅豈謂汝狼心不改包藏禍胎志欲覆敗國計以快汝心今當宥汝以遠無令房纍自隨敕所在給汝稟餼王新婦見理等當停太尉間汝餘房纍悉許同行南史五十一臨賀王正德傳六年為輕車將軍隨豫章王北侵正德輒棄軍委走為有司所奏下獄帝復詔云云於是免官削爵土徙臨海郡贈諡臨川王宏詔侍中太尉臨川王宏器宇沖貴雅量弘通爰初弱齡行彰素履逮於應務嘉猷載緝自皇業啓基地惟介弟久司神甸歷位台階論道登朝物無異議朕友于之至家國兼情方弘燮贊儀刑列辟天不憖遺奄焉不永哀痛抽切震慟於厥心宜增峻禮秩式昭懋典可贈侍中大將軍揚州牧假黃鉞王如故并給羽葆鼓吹一部增班劍為六十人給溫明祕器斂以袞服諡曰靖惠梁書臨川王宏傳贈諡鄱陽王恢詔故使持節散騎常侍都督荊湘雍梁益寧南北秦八州諸軍事驃騎大將軍開府儀同三司荊州刺史鄱陽王恢風度開朗器情凝質爰在弱歲美譽克宣洎於從政嘉猷載緝方入正論道弘燮台階奄焉薨逝朕用傷慟於厥心宜隆寵命以申朝典可贈侍中司徒王如故并給班劍二十人諡曰忠烈梁書鄱陽王恢傳徵庾詵庾承先詔明揚振滯為政所先旌賢求士夢佇斯急新野庾詵止足棲退自事卻掃經史文藝多所貫習潁川庾承先學道黃老該涉釋教並不競不營安茲枯稿可以鎮躁敦俗詵可黃門侍郎承先可中書侍郎勒州縣時加敦遣庶能屈志方冀鹽梅梁書庾詵傳俸祿給見錢并原失散官物詔朕思利兆民惟日不足氣象環回每弘優簡百官俸祿本有定數前代以來皆多評準頃者因循未遑改革自今已後可長給見錢依時即出勿令逋緩凡散失官物不問多少並從原宥惟事涉軍儲取公私見物不在此例梁書武帝紀下南郊恩詔奉時昭事虔薦蒼璧思承天德惠此下民凡因事去土流移他境者並聽復宅業蠲役五年尢貧之家勿收三調孝悌力田賜爵一級梁書武帝紀下賜陳慶之手詔本非將種又非豪家觖望風雲以至於此可深思奇略善克令終開朱門而待賓揚聲名於竹帛豈非大丈夫哉梁書陳慶之傳諡安成王機詔王好內怠政可諡曰煬梁書安成王秀傳贈諡裴子野詔鴻臚卿領步兵校尉知著作郎兼中書通事舍人裴子野文史足用廉白自居劬勞通事多歷年所奄致喪逝惻愴空懷可贈散騎常侍賻錢五萬布五十匹即日舉哀諡曰貞子梁書裴子野傳立晉安王綱為皇太子詔非至公無以主天下非博愛無以臨四海所以堯禪舜讓惟德是與文王舍伯邑考而立武王格于上下光被四表今岱宗牢落天步艱難淳風猶鬱黎民未乂自非克明克哲允武允文豈能荷神器之重嗣龍圖之尊晉安王綱文義生知孝敬自然威惠外宣德行內敏群后歸美率土宅心可立綱為皇太子庶百年勝殘方流餘慶畢世後仁永固洪業梁書簡文帝紀藝文類聚十六初學記十多末四句賜宗戚侯爵詔推恩六親義彰九族班以侯爵亦曰惟允凡是宗戚有服屬者並可賜沐食鄉亭侯各隨遠近以為差次其有昵親自依舊章梁書武帝紀下贈諡孔休源詔慎終追遠歷代通規褒德疇庸先王令典宣惠將軍金紫光祿大夫監揚州孔休源風業貞正雅量沖邈升榮建禮譽重搢紳理務神州化覃歌詠方興仁壽穆是彝倫奄然永逝倍用悲惻可贈散騎常侍金紫光祿大夫賻第一材一具布五十匹錢五萬蠟二百斤剋日舉哀喪事所須隨便資給諡曰貞子梁書孔休源傳諡庾詵詔旌善表行前王所敦新野庾詵荊山珠玉江陵杞梓靜侯南度固有名德獨貞苦節孤芳素履奄隨運往惻愴於懷宜諡貞節處士以顯高烈梁書庾詵傳贈諡南平王偉詔旌德紀功前王令典慎終追遠列代通規故侍中中書令大司馬南平王偉器宇宏曠鑒識弘簡爰在弱齡清風載穆翼佐草昧勳高樊沔契闊艱難劬勞任寄及贊務論道弘茲袞職奄焉薨逝朕用震慟於厥心宜隆寵命式昭茂典可贈侍中太宰王如故給羽葆鼓吹一部並班劍四十人諡曰元襄梁書南平王偉傳以臧盾兼領軍詔總一六軍非才勿授御史中丞新除散騎常侍盾志懷忠密識用詳慎當官平允處務勤恪必能緝斯戎政可兼領軍常侍如故梁書臧盾傳詔答周弘正設卦觀象事遠文高作繫表言辭深理奧東魯絶編之思西伯幽憂之作事逾三古人更七聖自商瞿稟承子庸傳授篇簡湮沒歲月遼遠田生表災川之譽梁丘擅琅邪之學代郡范生山陽王氏人藏荊山之寶各盡玄言之趣説或去取意有詳略近搢紳之學咸有稽疑隨答所問已具別解知與張譏等三百一十二人須釋乾坤文言及二繫萬機小暇試當討論陳書周弘正傳
