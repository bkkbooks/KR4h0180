body:
  text: 徐勉萱草花賦覽詩人之比興寄草木以命詞惟平章之萱草欲忘憂而樹之爰有幽憂庭間志靜高木列其陰蘭芳糅其影玩叢花之爭芬悅群根之競穎或開紅而散紫咸𦯀蒀於上春信茲花之獨秀投金質於炎辰既耀色以祛痗亦含香而可均不恃合歡之木無俟孫枝之筠同芰荷於蘭暑及蟬露乎首旻其葉四垂其跗六出亦曰宜男加名斯吉麗而不艷雅而不質隨晦明而舒卷與風霜而榮悴笑杜蘅與揭車何衆彙之能匹初學記二十七鵲賦觀羽族之多類實巨細以群飛既若雲而彌上亦棲睫而忘歸爰有茲禽六翮斯具生無隱默質有玄素匪違景而就暑通四節以馳騖出崑山而抵玉入召南而興賦其識知求其巢知風比之烈士時起則雄逢翳薈而翔集乘清吹而西東荷休明以得性游苑囿以自終初學記三十上修五禮表臣聞立天之道曰陰與陽立人之道曰仁與義故稱導之以德齊之以禮夫禮所以安上治人弘風訓俗經國家利後嗣者也唐虞三代咸必由之在乎有周憲章尤備因殷革夏損益可知雖復經禮三百曲禮三千經文三百威儀三千其大歸有五即宗伯所掌典禮吉為上凶次之賓次之軍次之嘉為下也故祠祭不以禮則不齊不莊喪紀不以禮則背死忘生者衆賓客不以禮則朝覲失其儀軍旅不以禮則致亂於師律冠婚不以禮則男女失其時為國修身於斯攸急洎周室大壞王道既衰官守斯文日失其序禮樂征伐出自諸侯小雅盡廢舊章缺矣是以韓宣適魯知周公之德叔侯在晉辨郊勞之儀戰國從橫政教愈泯暴秦滅學掃地無餘漢氏鬱興日不暇給猶命叔孫於外野方知帝王之為貴末葉紛綸遞有興毀或以武功鋭志或好黃老之言禮義之式於焉中止及東京曹褒南宮制述集其散略百有餘篇雖寫以尺𥳑而終闕平奏其後兵革相尋異端互起章句既淪俎豆斯輟方領矩步之容事滅於旌鼓蘭臺石室之文用盡於帷蓋至乎晉初爰定新禮荀顗制之於前摯虞刪之於未既而中原喪亂罕有所遺江左草創因循而已釐革之風是則未暇伏惟陛下睿明啓運先天改物撥亂惟武經時以文作樂在乎功成制禮弘於業定光啓二學皇枝等於貴遊闢茲五館草萊升以好爵爰自受命迄于告成盛德形容備矣天下能事畢矣明明穆穆無德而稱焉至若玄符靈貺之祥浮溟機山之賮固亦日書左史副在司存今可得而略也是以命彼群才搜甘泉之法延茲碩學闡曲臺之儀淄上淹中之儒連蹤繼軌負笈懷鉛之彥匪旦伊夕諒以化穆三雍人從五典秩宗之教勃焉以興伏尋所定五禮起齊永明三年太子步兵校尉伏曼容表求制一代禮樂於時參議置新舊學士十人止修五禮咨稟衛將軍丹陽尹王儉學士亦分住郡中製作歷年猶未克就及文憲薨殂遺文散逸後又以事付國子祭酒何胤經涉九載猶復未畢建武四年胤還東山齊明帝敕委尚書令徐孝嗣舊事本末隨在南第永元中孝嗣於此遇禍又多零落當時鳩斂所餘權付尚書左丞蔡仲熊驍騎將軍何佟之共掌其事時修禮局住在國子學中門外東昏之代頻有軍火其所散失又踰大半天監元年佟之啓審省置之宜敕使外詳時尚書參詳以天地初革庶務權輿宜俟隆平徐議刪撰欲且省禮局併還尚書儀曹詔旨云禮壞樂缺故國異家殊實宜以時修定以為永准但頃之修撰以情取人不以學進其掌知者以貴總一不以稽古所以歷年不就有名無實此既經國所先外可議其人人定便即撰次於是尚書僕射沈約等參議請五禮各置舊學士一人人各自舉學士二人相助抄撰其中有疑者依前漢石渠後漢白虎隨源以聞請旨斷決乃以舊學士右軍記室參軍明山賓掌吉禮中軍騎兵參軍嚴植之掌凶禮中軍田曹行參軍兼太常丞賀暘掌賓禮征虜記室參軍陸璉掌軍禮右軍參軍司馬褧掌嘉禮尚書左丞何佟之總參其事佟之亡後以鎮北咨議參軍伏𣈶代之後又以𣈶代嚴植之掌凶禮𣈶尋遷官以五經博士繆昭掌凶禮復以禮儀深廣記載殘缺宜須博論共盡其致更使鎮軍將軍丹陽尹沈約太常卿張充及臣三人同參厥務臣又奉別敕總知其事末又使中書侍郎周捨庾於陵二人復豫參知若有疑義所掌學士當職先立議通咨五禮舊學士及參知各言同異條牒啓聞決之制旨疑事既多歲時又積制旨裁斷其數不少莫不網羅經誥玉振金聲義貫幽微理入神契前儒所不釋後學所未聞凡諸奏決皆載篇首具列聖旨為不刊之則洪規盛範冠絶百王茂實英聲方垂千載寧孝宣之能擬豈字章之足云五禮之職事有繁簡及其列畢不得同時嘉禮儀注以天監六年五月七日上尚書合十有二秩一百一十六卷五百三十六條賓禮儀注以天監六年五月二十日上尚書合十有七秩一百三十三卷五百四十五條軍禮儀注以天監九年十月二十九日上尚書合十有八秩一百八十九卷二百四十條吉禮儀注以天監十一年十一月十日上尚書合二十有六秩二百二十四卷一千五條凶禮儀注以天監十一年十一月十七日上尚書合四十有七秩五百一十四卷五千六百九十三條大凡一百二十秩一千一百七十六卷八千一十九條又列副祕閣及五經典書各一通繕寫校定以普通五年二月始獲洗畢竊以撰正履禮歷代罕就皇明在運厥功克成周代三千舉其盈數今之八千隨事附益質文相變故其數兼倍猶如八卦之爻因而重之錯綜成六十四也昔文武二王所以網紀周室君臨天下公旦修之以致太平龍鳳之瑞自斯厥後甫備茲日孔子日其有繼周雖百代可知豈所謂齊功比美者歟臣以庸識謬司其任淹留歷稔允當斯責兼勒成之初未遑表上實由才輕務廣思力不周永言慚惕無忘寤寐自今春輿駕將親六師搜尋軍禮閲其條章靡不該備所謂郁郁文哉煥乎洋溢信可以懸諸日月頒之天下者矣愚心喜抃彌思陳述兼前後聯官一時皆逝臣雖幸存耄已將及慮皇世大典遂闕騰奏不任下情輒具載撰修始末并職掌人所成卷秩條目之數謹拜表以聞梁書徐勉傳普通六年又南史六十上疏請禁速斂禮記問喪云三日而後斂者以俟其生也三日而不生亦不生矣自頃以來不遵斯制送終之禮殯以朞日潤屋豪家乃或半晷衣衾棺椁以速為榮親戚徒隸各念休反故屬纊才畢灰釘已具忘狐鼠之顧步愧燕雀之徊翔傷情滅理莫此為大且人子承衾之時志悶心絶喪事所資悉關他手愛憎深淺事實難原如覘視或爽存沒違濫使萬有其一怨酷已多豈若緩其告斂之晨申其望生之冀請自今士庶宜悉依古三日大斂如有不奉加以糾繩梁書徐勉傳時人閒喪事多不遵禮朝終夕殯相尚以速勉上疏詔可釋奠會升階議鄭玄云由命士以上父子異宮宮室既異無不由阼階之禮請釋奠及晏會太子升堂並宜由東階若輿駕幸學自然中陛又檢東宮元會儀注太子升崇正殿不欲東西階責東宮典儀列云太子元會升自西階此則相承為謬請自今東宮大公事太子升崇正殿並由阼階其預會賓客依舊西階隋書禮儀志四天監八年皇太子釋奠吏部郎徐勉議又見通典五十三謝敕賜絹啓臣勉言傳詔傳靈惠宣敕垂賜絹二十匹伏惟皇太子睿情天發粹性玄凝作震春方繼離朱陸嘉日茂辰畢宮告始龍樓起曜博望增華含生鳧藻率土抃躍臣運屬會昌命逢多幸預奉休盛復頒恩錫白素起獨麗之色兼兩邁丘園之賁慶荷之情實百常品不任下情謹奉啓謝聞謹啓初學記二十七報伏挺書復覽來書纍牘兼翰事苞出處言兼語默事義周悉意致深遠發函伸紙倍增憤歎卿雄州擢秀弱冠升朝穿綜百家佃漁六學觀眸表其韶慧視色見其英朗若魯國之名駒邁雲中之白鶴及占顯邑試吏腴壤將有武城弦歌桐鄉謠詠豈與卓魯斷斷同年而語邪方當見賞良能有加寵授飾茲簪帶置彼周行而欲遠慕卷舒用懷愚智既知益之為纍爰悟滿則辭多高蹈風塵良所欽挹況以金商戒節素秋御序蕭條林野無人相樂偃臥墳籍遊浪儒玄物我兼忘寵辱誰滯誠乃歡羡用有殊同今逖聽傍求興懷寤宿白駒空谷幽人引領貧賤為恥鳥獸難群故當捐此薜蘿出從鵷鷺無乖隱顯不亦休哉吾智乏佐時才慚濟世稟承朝則不敢荒寧力弱途遙愧心非一天下有道堯人何事得因疲病念從間逸若使車書混合尉候無警作樂制禮紀石封山然後乃返服衡門實為多幸但夙有風咳遘茲虛眩瘠類士安羸同長孺簿領沈廢臺閣未理娛耳爛腸因事而息非關欲追松子遠慕留侯若乃天假之年自當靖恭所職擬非倫匹良覺辭費覽復循環爽焉如失清塵獨遠白雲飄蕩依然何極猥降書札示之文翰覽復成誦流連縟紙昔仲宣才敏藉中郎而表譽正平穎悟賴北海以騰聲望古料今吾有慚德倘成卷帙力為稱首無令獨耀隨掌空使辭人扼腕式閭願見宜事掃門亦有來思赴其懸榻輕苔魚網別當以薦城闕之歎曷日無懷所遲萱蘇書不盡意梁書伏挺傳報答釋法雲書難范縝神滅論天旨所答臣下神滅論一日粗蒙垂示辱告重送伏加研讀窮理盡寂精義入神文義兼明超深俗表詳求三世皎若發蒙非直謹加誦持輒令班之未悟惠示承眷至弟子徐勉和南宏明集十為書誡子嵩吾家世清廉故常居貧素至於産業之事所未嘗言非直不經營而已薄躬遭逢遂至今日尊官厚祿可謂備之每念叨竊若斯豈由才致仰藉先代風範及以福慶故臻此耳古人所謂以清白遺子孫不亦厚乎梁書徐勉傳又略見藝文類聚二十三遺子黃金滿贏不如一經詳求此言信非徒語吾雖不敏實有本志庶得遵奉斯義不敢墜失所以顯貴以來將三十載門人故舊亟薦便宜或使創闢田園或勸興立邸店又欲舳艫運致亦令貨殖聚斂若此事衆皆距而不納非謂拔葵去織且欲省息紛紜中年聊於東田閒營小園者非在播藝以要利人正欲穿池種樹少寄情賞又以郊際間曠終可為宅儻獲懸車致事實欲歌哭於斯慧日十住等既應營婚又須住止吾清明門宅無相容處所以爾者亦復有以前割西邊施宣武寺既失西廂不復方幅意亦謂此逆旅舍耳何事須華常恨時人謂是我宅古往今來豪富繼踵高門甲第連闥洞房宛其死矣定是誰室但不能不為培塿之山聚石移果雜以花卉以娛休沐用託性靈隋便架立不在廣大惟功德處小以為好所以內中逼促無復房宇近營東邊兒孫二宅乃藉十住南還之資其中所須猶為不少既牽挽不至又不可中塗而輟郊閒之園遂不辦保貨與韋黯乃獲百金成就兩宅已消其半尋園價所得何以至此由吾經始歷年粗已成立桃李茂密桐竹成陰塍陌交通渠畎相屬華樓迥謝頗有臨眺之美孤峰叢薄不無糾紛之興瀆中竝饒菰蔣湖裏殊富芰荷雖云人外城闕密邇韋生欲之亦雅有情趣追述此事非有𠫤心蓋是筆勢所至耳憶謝靈運山家詩云中為天地物今成鄙夫有吾此園有之二十載矣今為天地物物之與我相校幾何哉此吾所餘今以分汝營小田舍親纍既多理亦須此且釋氏之教以財物謂之外命儒典亦稱何以聚人曰財況汝曹常情安得忘此聞汝所買姑熟田地甚為舄鹵彌復可安所以如此非物競故也雖事異寢丘聊可髣佛孔子曰居家理治可移於官既已營之宜使成立進退兩亡更貽恥笑若有所收穫汝可自分贍內外大小宜令得所非吾所知又復應沾之諸女耳汝既居長故有此及凡為人長殊復不易當使中外諧緝人無閒言先物後己然後可貴老生云後其身而身先若能爾者更招巨利汝當自勗見賢思齊不宜忽略以棄日也棄日乃是棄身身名美惡豈不大哉可不慎歟今之所敕略言此意正謂為家已來不事資産既立墅舍以乖舊業陳其始末無愧懷抱兼吾年時朽暮心力稍殫牽課奉公略不克舉其中餘暇裁可自休或復冬日之陽夏日之陰良辰美景文案閒隙負杖躡屩逍遙陋館臨池觀魚披林聽鳥濁酒一杯彈琴一曲求數刻之暫樂庶居常以待終不宜復勞家閒細務汝交關既定此書又行凡所資須付給如別自茲以後吾不復言及田事汝亦勿復與吾言之假使堯水湯旱吾豈知如何若其滿庾盈箱爾之幸遇如斯之事竝無俟令吾知也記云夫孝者善繼人之志善述人之事今且望汝全吾此志則無所恨矣梁書徐勉傳南史六十又略見藝文類聚二十三答客喻普通五年春二月丁丑余第二息晉安內史悱喪之問至焉舉家傷悼心情若隕二宮竝降中使以相慰勗親遊賓客畢求弔問輒慟哭失聲悲不自已所謂父子天性不知涕之所從來也於是門人慮其肆情所鍾容致委頓乃斂衽而進曰僕聞古往今來理運之常數春榮秋落氣象之定期人居其閒譬諸逆旅生寄死歸著於通論是以深識之士悠爾忘懷東門歸無之旨見稱往哲西河喪明之過取誚友朋足下受遇於朝任居端右憂深責重休戚是均宜其遺情下流止哀加飯上存奉國俯示隆家豈可縱此無益同之兒女傷情損識或虧生務門下竊議咸為君侯不取也余雪泣而答曰彭殤之達義延吳之雅言亦常聞之矣顧所以未能弭意者請陳其說夫植樹階庭欽柯葉之茂為山纍仞惜覆簣之功故秀而不實尼父為之歎息析彼岐路楊子所以留連事有可深聖賢靡仰今吾所悲亦以悱始踰立歲孝悌之至自幼而長文章之美得之天然好學不倦居無塵雜多所著述盈帙滿笥淡然得失之際不見喜慍之容及翰飛東朝參伍盛列其所遊往皆一時才俊賦時頌詠終日忘疲每從容謂吾以遭逢時來位隆任要當應推賢下士先物後身然後可以報恩明主克保元吉俾余二紀之中忝竊若是幸無大過者繄此子之助焉自出閩區政存清靜冀其旋反少慰衰暮言念今日眇然長往加以闔棺千里之外未知歸骨之期雖復無情之倫庸詎不痛於昔夷甫孩抱中物尚盡慟以待賓安仁未及七旬猶殷勤於詞賦況夫名立官成半途而廢者亦焉可已巳哉求其此懷可謂苗實之義諸賢既貽格言喻以大理即日輟哀命駕修職事焉梁書徐勉傳勉第二子悱卒痛悼甚至不欲久廢王務乃為答客喻其辭云云臨海太守伏曼容墓志銘為大司馬咨議參軍出為武昌太守文選謝朓和伏武昌登孫權故城詩注給事黃門侍郎伏𣈶墓志銘東區南服愛結民胥相望伏闕繼軌奏書或臥其轍或攀其車或圖其像或式其閭思耿借寇曷以尚諸梁書伏𣈶傳故侍中司空永陽昭王墓志銘尚書右僕射太子詹事臣徐勉奉敕撰公諱敷字仲達蘭陵蘭陵人皇帝之次兄也炳靈聖緒體璇源積德賢仁之基配天經營之業固以詳乎二策載在六詩今無得而稱矣公夙挺圭璋早標時儀明神容潤凝孝友天至率由而盡義讓因心無待傍習行為素綴動成鎔範勘酌流品核群藝莫不採其英華振其綱領雖墻宇重仞而溫其如玉氣厲秋霜而體含春露故之者識涯涘挹之者虛往實歸加以沖謙下物傾身接士愛好間靜雅善談諷寵辱不干懷抱喜慍岡滯胸襟汪汪焉亹亹焉固不可量已解褐齊後軍長沙王行參軍武陵王始開戎號又行參冠軍征虜二府軍事人為太子舍人濯纓承華清風載穆衡陽王冠婚禮備問彼以公為文學稱為盛選俄遷太子洗馬又為南海王友洗馬之職既儀形會友任宜弘斧藻長虞公幹莫或加焉出補丹楊尹丞傷入為太子中舍人三龍樓仍歷禁清談論咸以為榮司部濱接蠻虜亟有充斥漢東之國貽憂西顧以公兼資文武出為建威將軍隋郡內史下車威德大著時獯獫侵逼義陽四山牙相影響郡內孤危兵糧弱公加視險若夷於是百姓相攜入城城中殆無復相容處咸曰賊若能來必為府君死戰物情如遂息於是關抵清夷民俗殷阜進號寧朔將軍內史如故久之徵為後軍廬陵王咨議參軍從容諷味雅有弘益天不憖遺遠塗未至以齊建武四年八月六日薨春秋卅有七知與不知咸嗟殄悴聖上應期革命受終文祖覽周南而雪涕詠常棣而興哀天監元年四月八日詔曰亡兄齊故後軍咨議參軍德履沖粹識業淵通徽聲嘉譽風流藉甚道長世短塵緬邈感惟既往永慕慟心可追贈侍中司空永陽郡王食邑二千戶諡曰昭王禮也子恭王伯遊嗣恭王早世子隆嗣昭王之妃之氏於本國為大太妃以今普通元年十一月九日薨其月草八日申祔葬之典又下詔曰亡兄故侍中司空永陽昭王墳塋當開靈筵暫設追慕摧慟不能自勝可遣使奉祭言增感哽惟公體道淵塞風格峻遠履信基仁自家形國寶運勃興地隆魯衛茂冊徒烋神猷永戢今幽埏暫啓裝餝虛陳皇情深孔懷之悲縉紳仰人百之慟爰詔司事式改明旌乃作銘曰惟山峻極群峰以搆惟海泱泱百流是湊赫矣皇業昭哉洪胄布葉分如彼列宿恭惟茂德英明在躬該茲學行穆是清風令問不已羽儀克隆若林之蔚若川之沖資以冥乘心而蹈立人之美亦符前誥泰靡革情約不移操莫覩其涯莫窺其奧爰初理翰振藻騰光出高蕃采入映華坊且文且會煥彼周行言二河輔綽有餘芳關候未息亂繩宜理作守漢濱威懷斯俟既弭烽又清獄市樹蹟來歸復遊衡里云與善遙塗始半萃繁霜遽捐華館歲時荏苒松陰行飛典章有爛姬公制祔禮載幽扄斯啓客物暫陳窮深於焉反真我皇德攸新俾諸來葉永鑒清塵碑拓本故永陽敬太妃墓志銘永陽大太妃王氏琅邪臨沂人也其先周靈王之後自秦漢逮於晉宋世載光羽儀相屬既以備于前志故可得而略焉祖粹給事黃門侍郎父儼左將軍司馬尋陽內史竝見稱時輩太妃體中和之氣稟華宗之烈蹈此溫恭表茲淑慎孝敬資於冥發仁愛於自然至乎四教六訓之間工言貞婉之德無待教成岡不該備故景行著于中淑問顯乎言歸作嬪盛德實光輔佐親縫幕之用躬服浣之勤及早世釐居遺孤載藐提攜撫育逮乎成備斷織之訓既明䦱門之禮斯洽劬勞心盡曾不移志用能緝睦于中外亦以弘濟乎艱難雖魯姜之勤節曹妃之敬讓方之蔑如也皇業有造殷憂啓聖追惟魯衛建國永陽恭王纂嗣蕃號式顯乃拜為太妃策曰維天監二年六月甲午朔十日癸卯皇帝遣宗室員外散騎侍郎持節兼散騎常侍蕭敬寶策命永陽王母王氏為國太妃曰於戲惟爾茂德內湛粹範外昭國序凝芬蕃庭仰訓是用式遵舊典載章徽服往欽哉肅茲休烈可不慎歟備褕瑱之華而降心彌約居千乘之貴而處物愈厚既而恭王不永禮從訓導嗣孫載光榮祉年高事重志義方隆宜永綏福履而奄奪鴻慶以普通元年十月草三日遘疾十一月九日已卯薨於第春秋五十有九詔曰永陽大太妃奄至薨逝哀摧切割不能自勝便出敘哀可給東園祕器喪事所須隨由辦祖行有辰武弘茂典又詔曰故永陽大太妃禮數有殊德行惟光訓範蕃嗣式盛母儀即遠戒期悲懷抽割可詳典故以隆嘉諡禮也粵其月草八日戊戌祔瘞于琅邪臨沂縣長千里黃鵠山用宣風烈以昭弗朽乃為銘曰清瀾悠邈其儀尚矣龍光疊照風流世祀猗歟岡匱於昭不已誕資仁淑作嬪君子幽間表操明德自躬推厚處薄秉默居沖參差採芼掩映言工鑒昭彤管識懋休風凝芬載湛芳猷允塞徙舍為訓止閭成則曹號母儀豈伊婦德穆茲閨閫形于邦國龍飛集運禮數攸鍾憲章盛典車服有容泰而愈約貴則彌恭蕃祉方茂纂嗣克重巾帚差池朝夕咸事雖曰任傅永請斯備是惟仁姑厥德可庇恂恂濟濟蘭芳瓊祕光陰易晚祺福難留閨儀罷映褕華奄收奠遷朱邸駕指行楸芳是勒大方攸尚書右僕射太子詹事臣勉奉敕撰古刻叢鈔上闕天降玄鳥以居亳白馬初啓是惟文終寺上闕書府勳紀太常為後集命家之於斯乎資三明之人上闕友因心敬年生吳太妃有疾衣不解帶上闕室邇人則應之千里府西中郎遊戎佐言詠齊念上闕風雲之會乘天地之臣十紛紜勇公參贊神謨夙興帷幄功州以公將軍西中郎咨議中郎俄遷給事黃門侍郎行南平守部于宅心百脅會人神協契莫不率從而之猶實繁有徒王公肅奉成規事等蕭寇出七西壘南平梁州齊興太守顏都魏興太守師仁踰一万謀據漢北將至城下必毗贊訏謨盡其晨宀及蕭休烈來寇姦回猶騁豕突方縱又鎮軍將軍蕭穎胄佐命西朝政教攸在一朝徂殞內外然以公式遏下榮徵公入輔聞命選徒裹糧遄邁紀上闕以英罪人斯得七底定百揆時敘大蕃興后來之歌皇輿無反顧之慮和帝西下以公為使持節都督荊湘益寧南北秦六州諸軍事平西將軍行上闕承業維城勳兼望奭惟魯衛帝曰欽哉字南服天監元年四月封始興郡王食邑二千戶江漢之實惟南國形勝之要鎮西楚苞含蠻挻控接巴巫分陜上闕總督詔使持節都督荊湘益寧南北秦六州諸軍事安西將軍荊州刺史公褰襜以化梨氓張袖以納夷狄先之以德惠後之以威刑廣田省伇階無滯訟應接如神上闕我命公折𥳑以示禍福俟兵卒之勞成都乂安公之力也事閒務隙常集賓僚訪問政道談述詩賦親屈車騎軾隱者之廬虛己降尊延白屋之士給醫藥以拯疾病建上闕以古方今豈外被茂於楚山尋加鼓吹一部六年沮漳暴水汛濫原隰南岸邑居頻年為患老弱遑遽將至沈溺公匪憚櫛沐躬自臨視忘垂堂之貴上闕歎服德之攸皆曰神明四郡所漂賑以私粟𩭒眉糸髮莫不歌頌是歲嘉禾一莖九穗生於邴洲甘露降于府桐樹唐叔之美事上闕水漿不入口六日毀瘠三年扶旨喻以大軍之後直盡綏表自陳哀苫次服制有闋毀踰羊枯不堪屐履荀顗面不可識哀瘠在皇憂未忘也其上闕詔都督北討衆率中書令中衛將軍衛尉卿公趨事紫兼總關柝絲綸襟帶以八斯謐千廬無警其年秋更授使持節散騎常侍徐五州諸軍事鎮北將軍兗州刺史以服舊曰難治公車懷遠能邇貝錦在路不盜竊於逵中桃李乘蔭不潛掇於樾下李珣率由清約馬傳述九年六月遷使持節散騎常侍都督益寧梁南北秦沙六州諸軍事鎮西將軍益州刺史北指秦州鳥河沙之酋龜茲隴右之長万上闕百道過不於祭仲元於圭畿表君平之舊廬軾長卿之故館上闕則十四年更授使持節散騎常侍上闕莫不改過上闕安成康王異體彌深友上闕夙夜匪懈吐握怠上闕月八日疾至大漸輿駕驟幸有廢寢膳公慮貝神不稱上闕勳隆陜服契闊屯夷劬勞寄內掌司嘉猷彌著方正位論道奄用傷悼于厥心上闕諡曰忠武王禮也惟公棲心衡泌則繕性虛淨枕戈授律則勳隆協贊孝敬盡于君親仁義仁于鄉孜孜為善溫溫克讓神妙極斧藻上闕存勿績著荊蠻化行其其推賢下士降尊就卑無棄賤貧所珍儒雅鹽梅鼎實舟楫大川信列辟之羽儀庶僚之准的者也加以深信大道妙識若空味絶滋腴身離煩渴上闕固能使世鑽仰道俗功高宇宙譽穆惇吏民哀慟衰絰成林瞻太山而彌悲仰棟宇而興慕諒已鏤金雕玉昭像鳳墀飾碧繪丹啚刑驎閣戎狄思耿胡羌悲鄧告哀墮淚不上闕羅玄昭等烟霞阻川路悠長不及卜遠之辰罔逯易名之請灑泣寄銜恨莫申謹遵前義刊立碑髣佛令德依稀神儀傳世代而莫朽等山川而無酬其辭曰梁故侍中司徒驃騎將軍始興忠武王碑日月貞明川岫澄清奉職毗世作楨於鑠忠武體二于情義均奭旦道藹平棟梁世則羽翼人英木運告圮倫殄覆上闕水虎嘯樊谷關河之寄允歸親睦若恂係兵猶可轉穀締構寶玄山河万寓雲雷利土比漢於梁方周于魯擁旄推轂出蕃入輔車服有庸旗章有序六條設教八命𦙃彰再臨七澤傍上闕彭泗恩浹樊襄有來斯穆無思不康弘聖化休我烈光文武兼姿出內均美式肅雍中壘儀形三事飛騰九軌緝是謳歌明茲獄市方趍上鉉燮理陰陽陪鑾日觀侍蹕龍鄉遐上闕台光報施為虛福仁遂爽瓌樹云落人倫安放罷市四蕃行號十壤吏民摧慕賓迎罔山海安託禪珮空想如鄭喪僑由晉亡嚮西光曖曖東川漾漾時謝恩深年流德廣式雕玄永寄希仰侍中尚書右僕射宣惠將軍東海徐勉造碑拓本與將帥書事事往人口具南史五十三武陵王紀傳冬蕉卷心賦拔殘心於孤翠植晚玩於冬餘枝橫風而悴色葉漬雪而傍枯藝文類聚八十七婦見舅姑議儀禮云質明贊見婦於舅姑雜記又云婦見舅姑兄弟姊妹皆立于堂下政言婦是外宗未審嫺令所以停坐三朝觀其七德舅延外客姑率內賓堂下之儀以備盛禮近代婦於舅姑本有戚屬不相瞻看夫人乃妃姪女有異他姻覿見之儀謂應可略梁書徐摛傳臨城公納夫人王氏晉宋已來婦見舅姑衆賓皆列觀摛曰云云太宗從其議為蕭僕射與袁昂書夫禍福無門興亡有數天之所棄人孰能匡機來不再圖之宜早頃藉聽道路承欲狼顧一隅既未悉雅懷聊申往意獨夫狂勃振古未聞窮凶極虐歲月滋甚天未絶齊聖明啓運兆民有賴百姓來蘇吾荷任前驅掃除京邑方撥亂反正伐罪弔民至止以來前無橫陳今皇威四臨長圍已合遐邇畢集人神同奮鋭卒萬計鐵馬千群以此攻戰何往不克況建業孤城人懷離阻面縛軍門日夕相繼屠潰之期勢不云遠兼熒惑出端門大白入氐室天文表於上人事符於下不謀同契實在茲辰且范岫申胄久薦誠款各率所由仍為掎角沈法瑀孫𦙝朱端已先肅清吳會而足下欲以區區之郡禦堂堂之師根本既傾枝葉安附童兒牧豎咸謂其非求之明鑒實所未達今竭力昏主未足為忠家門屠滅非所謂孝忠孝俱盡將欲何依豈若翻然改圖自招多福進則遠害全身退則長守祿位去就之宜幸加詳擇若執迷遂往同惡不悛大軍一臨誅及三族雖貽後悔寧復云補欲布所懷故致今白梁書袁昂傳昂為吳興太守永元末義師至京師州牧郡守皆望風降款昂獨拒境不受命高祖手書喻丹陽琅邪二郡斷搜捕議聖人之道以百姓為心仁者之化以躬行被物皇德好生協于上下日就月將自然改俗一朝抑絶容恐愚民且獵山之人例堪跋涉捕水之客不憚風波江寧有禁即達牛渚延陵不許便往陽羡取生之地雖異殺生之數是同空有防育之制無益全生之術廣宏明集二十六
