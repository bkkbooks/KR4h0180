body:
  text: 昭明太子統殿賦觀華䂄之美者莫若高殿之麗也高殿博敞華色照朗內備雜藻外發珍象延脰觀之欣然俯仰闌檻參差棟宇齊畟玄黃既具鮮麗亦發椽并散節若山若谷或象翔烏或擬森竹藻梲鮮華而粲色山節珍形而曜目旅視刑則委纍嵯峨雕丹文於簷際鏤華形以列羅若乃日照珠簾彪炳灼爍輕風吹幌乍揚乍薄接長棟之耿耿簷垂溜於四隅建廂廊於左右造金墀於前廡卷高帷於玉楹且散志於琴書銅博山香爐賦稟至精之純質産靈嶽之幽深經般倕之妙旨運公輸之巧心有薰帶而巖隱亦霓裳而升仙寫嵩山之巃嵸象鄧林之阡眠方夏鼎之瓌異類山經之俶詭制一器而備衆質諒茲物之為侈于時青女司寒紅光翳景吐圓舒於東嶽匿丹曦於西嶺翠帷已低蘭膏未屏爨松柏之火焚蘭麝之芳熒熒內曜芬芬外揚似慶雲之呈色若景星之舒光齊姬合歡而流盻燕女巧笑而蛾揚超公聞之見錫粵文若之留香信名嘉而器美永服玩於華堂藝文類聚七十初學記二十五御覽七百三扇賦匠人之巧製女工之妙織九折翠竹之枝直截飛禽之翼雖復草木燋枯金沙銷鑠火山熾寒泉涸能使淒兮似秋隆暑斯卻藝文類聚六十九芙蓉賦色兼列綵體繁衆號初榮夏芬晚花秋曜興澤陂之徽章結江南之流調藝文類聚八十二鸚鵡賦有能言之奇鳥每知來而發聲乍青質而翠映或體白而雪明喙前鉤而趨步翼高舞而翩翾足若丹而三布目如金而雙圓藝文類聚九十一蟬賦茲蟲清潔惟露是餐初學記三十駁劉僕舉樂之議以東宮禮絶傍親月尋傍絶之義稱兼慕並張鏡儀記云依士禮終服月稱慕悼又云凡三朝發哀者踰月不舉樂劉僕議云傍絶之義義在去服服雖可奪情豈無悲卒哭之後依常舉樂稱悲竟此理例相符尋情悲之說非止卒哭之後緣情為論此自難一也用張鏡之舉樂棄張鏡之稱悲一張鏡之言取舍有異此自難二也陸家令止云多歷年所恐非事證雖復纍稔所用意常未安近亦常以此問外由來立意謂猶應有慕悼之言張豈不以舉樂為大稱悲事小所以用小而忽大良亦有以至此元正六佾事為國章雖情或未安而禮不可廢饒吹軍樂比之亦然書疏方之事則成小差可緣心聲樂自外書疏自內樂自他書自己劉僕之議即情未安可令諸賢更共詳衷解梁書昭明太子傳與晉安王綱令明北兗到長史遂相係凋落傷怛悲惋不能已已去歲陸太常殂歿今茲二賢長謝陸生資忠履貞冰清玉潔文該四始學遍九流高情勝氣貞然直上明公儒學稽古淳厚篤誠立身行道始終如一儻值夫子必升孔堂到子風神開爽文義可觀當官蒞事介然無私皆海內之俊乂東序之祕寶此之嗟惜更復何論但遊處周旋並淹歲序造膝忠規豈可勝說幸免祇悔實二三子之力也談對如昨音言在耳零落相仍皆成異物每一念至何時可言天下之寶理當惻愴近張新安又致故其人文筆弘雅亦足嗟惜隨弟府朝東西日久尤當傷懷也比人物零落特可傷惋屬有今信乃復及之梁書到洽傳又見張率傳又釋藏輕五廣宏明集二十又略見羅願新安志九與明山賓令明祭酒雖出撫大藩擁旄推轂珥金拖紫而恆事屢空聞構宇未成今送薄助梁書明山賓傳與殷藝令北兗信至明常侍遂至殞逝聞之傷怛此賢儒術該通志用稽古溫厚淳和倫雅弘篤授經以來迄今二紀若其上交不諂造膝忠規非顯外迹得之胸懷者蓋亦積矣攝官連率行當言歸不謂長往眇成疇日追憶談緒皆為悲端往矣如何昔經聯事理當酸愴也梁書明山賓傳與東宮官屬令威明昨宵奄復殂化甚可痛傷其風韻遒上神峰標映千里絶迹百尺無枝文辨縱橫才學優贍跌宕之情彌遠濠梁之氣特多實俊人也一爾過隙永歸長夜金刀掩芒長淮絶涸去歲冬中已傷劉子今茲寒孟復悼王生俱往之傷信非虛說答玄圃園講頌啓令得書并所製講頌首尾可觀殊成佳作辭典文豔既溫且雅豈直斐然有意可謂卓爾不群覽以回環良同愈疾至於雙因八辨彌有法席之致銀草金雲殊得物色之美吾在原之意甚用欣懌遲回乃悉此不盡言統報廣弘明集二十請停吳興丁役疏伏聞當遣王奕等上東三郡人開漕溝渠導泄震澤使吳興一境無復水災誠矜恤之至仁經略之遠旨暫勞永逸必獲後利未萌難覩竊有愚懷所聞吳興纍年失收人頗流移吳郡十城亦不全熟唯信義去秋有稔復非常役之民即日東境穀稼猶貴劫盜屢起在所有司皆不聞奏今征戍未歸強丁數少此雖小舉竊恐難合吏一呼門動為人蠹又出丁之處遠近不一比得齊集已妨蠶農去年稱為豐歲公私未能足食如復今茲失業慮恐為弊更深且草竊多伺候人間虛實若善人從役則抄盜彌增吳興未受其益內地已罹其弊不審可得權停此功待優實以不聖心垂矜黎庶神量久已有在臣意見庸淺不識事宜苟有愚心願得上啓梁書昭明太子傳謝敕賚地圖啓漢氏輿地形茲未擬晉代方丈比此非妙匹之長樂唯畫古賢儔之未央止圖將帥未有洞該八藪混觀六合域中天外指掌可求地角河源戶庭不出豈問千秋自識烏丸之地脫逢壯武方著博物之書藝文類聚六初學記五謝敕賚水犀如意啓臣某啓應敕左右伯佛掌奉宣敕旨垂賚水犀如意一柄式是道義所須白玉照采方斯非貴珊瑚挺質匹此未珍雕剖既成先被庸薄如蒙漢帝之簪似獲趙堯之印謹仰承威神陳諸講席方使歡喜羅漢懷棄鉢之嗟王式碩儒欣驪駒之辨熊飾寶刀子桓恧其大賚犛牛輕拂張敞慚其舊儀殊恩特降伏深荷躍不任下情謹啓事以聞謹啓廣弘明集二十一藝文類聚七十謝敕賚廣州甌等啓淮南承月之杯豈均符彩西國浮雲之碗非謂瓌奇臣南珍靡究未讀奏曹之表方物罕逢不識議郎之畫藝文類聚七十三御覽七百五十九謝敕賚銅造善覺寺塔露盤啓是稱邢陽之珍實亦昆吾之寶燥濕無變九市見奇寒暑是宜六律成用況復神龍負子光斯妙塔金鳥銜帶飾茲高表函谷恥其詠歌臨淄恧其祥應陽燧含影還辟日輪甘露入盤足稱天酒辭林本闕心辨又慚徒戴重恩終難陳謝不任銘荷之至謹奉啓聞略見藝文類聚七十七張溥編入簡文帝集非謝敕賚河南菜啓海水無波來因九譯周原澤洽味備百羞堯韭未儔姬歜非喻藝文類聚八十二引梁皇太子作張溥編入𥳑文集非下同謝敕賚大菘啓吳愧千里之蓴蜀慚七菜之賦是知泮宮採茆空入魯詩流火烹葵徒傳豳曲藝文類聚八十二謝敕賚魏國所獻錦等啓山羊之毳東燕之席尚傳登高之文北鄴之錦猶見胡綾織大秦之草戎布紡玄菟之花藝文類聚八十五引皇太子作張溥誤入𥳑文集謝敕賚邊城橘啓結根龍首垂陰漸土甘踰石蜜味重金衣暉章縹李豈止稱於晉世上林美棗非獨高於漢日藝文類聚八十六張溥誤入𥳑文集謝敕參解講啓臣某啓主書周昂奉宣敕旨垂參臣今講解伏以至理希夷微言淵奧非所能鑽仰遂以無庸叨茲宣釋將應讓齒反降教胄之恩允宜尚學翻荷說經之詔竊以挾八威之策則神物莫干服九丹之華則仙徒可役臣仰承皇威訓茲學侶奉揚聖旨洞曉群儒鼓冶異師陶鈞久滯方使惠施恧其短長公孫罷其堅白王生挫辨既盡神氣法開受屈永隱東峰中使曲臨彌光函席仰戴殊慈不知啓處不任下情謹奉啓事謝聞謹啓廣弘明集二十一謝敕賚制旨大涅槃經講疏啓臣某啓後閣應敕木佛子奉宣敕旨垂賚制旨大般涅槃經講疏一部十帙合目百一卷寒鄉覩日未足稱奇采藥逢仙曾何譬喜臣伏以六爻所明至邃窮於幾象四書所總施命止於域中豈有牢籠因果辨斯寶城之教網羅真俗開茲月滿之文方當道洽大千化均百億雲彌識種雨遍身田豈復論唐帝龜書周王策府何待刊寢盤盂屏黜丘索甘露妙典先降殊恩揣己循愚不勝慶荷不任頂戴之至謹奉啓謝聞謹啓釋藏輕六廣弘明集二十一謝敕賚制旨大集經講疏啓臣某啓宣詔王慧寶奉宣敕旨垂賚制旨大集經講疏二帙十六卷甘露入頂慧水灌心似暗遇明如饑獲飽伏以非色非欲二界同坊匪文匪理三詮雲集四辨言而未極八聲闡而莫窮俯應天機垂茲聖諦同真如而無盡與日月而俱懸但觀寶春山獲珠大海臣實何能恆蒙誘被張奏谷筆豈足陳心抗袖長言未伸歌舞不任喜荷之至謹奉啓謝聞謹啓釋藏輕六廣弘明集二十一太簇正月錦帶書十二月啓伏以北斗周天送玄英之故節東風拂地啓青陽之芳辰梅花舒兩歲之裝柏葉泛三光之酒飄颻餘雪入簫管以成歌皎潔輕冰對蟾光而寫鏡敬想足下神遊書帳性縱琴堂談叢發流水之源筆陳引崩雲之勢昔時文會長思風月之交今日言離永嘆參辰之隔但某執鞭賤品耕鑿庸流沉形南畝之間滯迹東皋之上長懷盛德聊吐愚衷謹憑黃耳之傳佇望白雲之信夾鍾二月伏以節應佳辰時登令月和風拂迥淑氣浮空走野馬於桃源飛少女於李徑花明麗月光浮竇氏之機鳥哢芳園韻響王喬之管敬想足下優游泉石放曠烟霞尋五柳之先生琴尊雅興謁孤松之君子鸞鳳騰翩誠萬世之良規實百年之令範但某席戶幽人蓬門下客三冬勤學慕方朔之雄才萬卷常披習鄭玄之逸氣既而風塵頓隔仁智並乖非無衰侶之憂誠有離群之恨謹伸數字用寫寸誠姑洗三月伏以景逼徂春時臨變節啼鶯出谷爭傳求友之音翔蕊飛林競散佳人之靨魚遊碧沼疑呈遠道之書燕語雕梁狀對幽閨之語鶴帶雲而成蓋遙籠大夫之松虹跨澗以成橋遠現美人之影對茲節物寧不依然敬想足下聲馳海內名播雲間持郭璞之毫鸞詞場月白吞羅含之彩鳳辨囿日新某山北逸人墻東隱士龍門退水望冠冕以何年鷁路頽風想簪纓於幾載既違語默且阻江湖聊寄八行之書代申千里之契中呂四月節屆朱明晷鍾丹陸依依聳蓋俱臨帝女之桑鬱鬱丹城並挂陶潛之柳梅風拂戶牖之內麥氣擁宮闕之前敬想足下聲聞九皋詩成七步涵蚌胎於學海卓爾超群蘊抵鵲於文山儼然孤秀但某窮途異縣岐路他鄉非無阮籍之悲誠有楊朱之泣每遇秋風振響鶉驚子夏之衣夜月流輝鵲繞將軍之樹既乖連璧之契終隔斷金之情中心藏之卑誠至矣今因去雁聊寄芻蕘如遇回鱗希垂玉翰蕤賓五月麥隴移秋桑律漸暮蓮花泛水艷如越女之腮蘋葉漂風影亂秦臺之鏡炎風以之扇戶暑氣於是盈樓涷雨洗梅樹之中火雲燒桂林之上敬想足下追涼竹徑托蔭松間彈伯牙之素琴酌嵇康之緑酒縱橫流水酩酊頽山實君子之佳游乃王孫之雅事某沉痾漳浦臥病泉山頓懷劉幹之勞鎮抱相如之酷是知枯榮莫測生死難量驗風燭之不停如水泡之易滅聊伸弊札以代勞人佇覩芳詞希垂愈疾林鍾六月三伏漸終九夏將謝螢飛腐草光浮帳裏之書蟬噪繁柯影入機中之鬢濯枝遷而潦溢芳槿茂而發榮山土焦而流金海水沸而漂爍敬想足下藏形月府遁跡冰床披莊子之七篇逍遙物外玩老聃之兩卷恍惚懷中但某白社狂人青緗末學不從州縣之職聊立松鶴之間時假德以為鄰或借書而取友三千年之獨鶴暫逐雞群九萬里之孤鵬權潛燕侶既非得意正可忘言諸不具伸應俟面會夷則七月素商驚辰白藏屆節金風曉振偏傷征客之心玉露夜凝直泫仙人之掌桂吐花於小山之上梨翻葉於大谷之中故知節物變衰草木搖落敬想足下時稱獨步世號無雙萬頃澄陂黃叔度之器量千尋聳幹嵇中散之楷模但某一介庸才三隅頑學懷經問道不遇披雲負笈尋師罕逢見日俯仰興嘆形影自憐不知龍前不知龍後鶯鵬雖異風月是同幸矣擇交希垂影拂南呂八月一嘆分飛三秋限隔遐思盛德將何以伸白雲斷而音信稀青山暝而江湖遠敬想足下羽儀勝眷領袖嘉賓傾玉醅於風前弄瓊駒於月下但某登山失路涉海迷津聞猿嘯而寸寸斷腸聽鳥聲而雙雙下淚當以黃花笑冷白羽悲秋既傳蘇子之書更泛陶公之酌聊因三鳥略敘二難面會取書不能盡述或叨鳳念不黜魚緘無射九月宿昔親朋平生益友不謂窮通有分雲雨將乖既深伐木之聲更問采葵之詠屬以重陽變敘節景窮秋霜抱樹而擁柯風拂林而下葉金堤翠柳帶星采而均調紫塞蒼鴻追風光而結陳敬想足下秀摽東箭價重南金才過吞鳥之聲德邁懷蛟之智但某衡門賤士甕牖微生既無白馬之談且乏碧雞之辨嘆分飛之有處嗟會面以無期聊伸布服之言用述併糧之志應鍾十月節屆玄靈鍾應陰律愁雲拂岫帶枯葉以飄空翔氣浮川映危樓而疊迥胡風起截耳之凍趙日興曝背之思敬想足下山嶽鍾神星辰挺秀潛明晦跡隱於朝市之間縱法化人不混鄉閭之下某陋巷孤遊穿墻自活終朝息爨若孔子之為貧竟日停炊如范生之在職牛衣當被畏見王章犢鼻親操恐逢犬子雖此慚賤而不羞貧綺服有時此言何述黃鍾十一月日往月來灰移火變暫乖語默頓隔秦吳既傳蘇李之書更共范張之志冷風盛而結鼻寒氣切而凝唇虹入漢而藏形鶴臨橋而送語彤雲垂四面之葉玉雪開六出之花敬想足下世號冰壺時稱武庫命長袂而留客施大被以招賢酌醇酒而據切骨之寒溫獸炭而袪透心之冷某攜戈日久荷戟年深揮白刃而萬定死生引虹旗而千決成敗退龍劍而卻步月下開營進鯨鼓而橫行雲前起陳徒勞斬斫豈用功勳諸不具陳謹伸微意大呂十二月分手未遙翹心且積引領企踵朝夕不忘眷友思仁行坐未捨既屬嚴風極冷苦霧添寒冰堅漢地之池雪積袁安之宅敬想足下棲神鶴駕眷想龍門披玩之間願無捐德某種瓜賤士賣餅貧生入爨竈以揚聲不逢蔡子駕鹽車而顯跡罕遇孫陽徒懷叩角之心終想暴腮之患既為久要聊吐短章紙盡墨窮何能懇露
